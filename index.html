 \n\n세금의 대부분은 부동산 초부자 4만여 명이 냈습니다.\n\n나머지 대상자 90%가 낸 세금 액수는 전체 11.5%에 그쳤습니다.\n\n\n\n1주택만 가진 시민에게 지나친 고통을 준다고 합니다.\n\n지난해 종부세 납부대상 1가구 주택자는 17만 명입니다.\n\n공시가격은 평균 17억 1000만 원, 시가로 24억~28억원 정도입니다.\n\n1인당 평균 납부세액은 82만 원 정도입니다.\n\n\n\n서울에서 보증금 5천만 원 이하, \n\n10평 미만 집 월세가 평균 63만 원 정도입니다.\n\n우리 청년들이 이런 곳에서 삽니다. \n\n1년이면 756만 원입니다.\n\n그런데 시가 20억 원이 넘는 집에서 살면서\n\n1년에 80만 원도 못 내겠다는 것입니까?\n\n\n\n더욱이 최근 강민수 국세청장 후보자 인사청문회에서는\n\n후보자 부부 공동 소유인 40억원 시세 아파트의 종부세가\n\n25만 5천원에 불과하다는 사실이 드러났습니다.\n\n\n\n종부세 폐지 이유로 1주택자를 드는 것은\n\n빈대 잡으려고 초가삼간을 태우는 격입니다.\n\n\n\n최근 주택가격 상승 기미가 보이자 윤석열 정부는\n\n이번 세제 개편에서는 종부세에 손을 대지 않았습니다.\n\n그러나 이 정부는 기어코 종부세를 줄이거나 없애려고 할 것입니다.\n\n\n\n더 큰 문제가 있습니다. 지역 지원금이 줄고 있습니다.\n\n국회의원이 예산을 많이 따왔다고 지역에 현수막을 많이 겁니다.\n\n그게 대부분 지방교부세, 즉 종부세에서 나온 돈입니다.\n\n종부세의 70%를 수도권에서 걷지만, 75%는 지역으로 내려갑니다.\n\n\n\n지난해 종부세를 세원으로 하는 \n\n부동산 교부세는 4조 1951억원입니다.\n\n전년보다 40% 가까이 줄었습니다.\n\n부동산 교부세가 지방세 수입의 50% 이상인 지자체는\n\n전체의 4분의 1입니다.\n\n지방세보다 부동산 교부금이 많은 곳은 14곳입니다.\n\n이런 곳에 교부세가 안 들어오면 큰일이 납니다.\n\n\n\n그런 일이 실제로 벌어졌습니다. 감세 직격탄을 맞은 것입니다.\n\n예를 들어봅시다. 지난해 전북특별자치도는 심각한 수준입니다.\n\n전년도 대비 김제시는 144억 원, 익산 140억 원,\n\n정읍 139억 원, 남원 137억 원이 줄었습니다.\n\n강원특별자치도도 심각합니다.\n\n화천, 양구, 인제는 부동산 교부세액이 지방세 수입보다 많습니다.\n\n\n\n이런 지경인데도 종부세를 줄이거나 없애면 지역은 완전히 망합니다.\n\n그렇지 않아도 윤석열 정부는 초부자 감세 정책으로\n\n세수가 부족한데 더 줄여주겠다고 합니다.\n\n무슨 배짱으로 그러는지 도무지 알 수가 없습니다.\n\n\n\n이런 제정신이 아닌 장단에 맞춰주면 초부자 감세,\n\n서민 쥐어짜기에 동조하는 셈이 됩니다.\n\n조국혁신당은 빈익빈부익부, 가렴주구식 세금 정책을 막겠습니다.\n\n지역 소멸을 멈추고 지역 부활로 전환하는 계기로 만들겠습니다."}, {"id": 281, "filename": "2기 제7차 최고.txt", "title": "2기 제7차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["교육", "윤석열"], "preview": "2024. 8. 2 9:30 본청316    ■ 조국 당대표  제가 오늘 윤석열 정부의 비밀 하나를 누설하겠습니다.  윤석열 정권 하에서 출세하는 비법이 있습니다. 다섯 가지입니다.     첫째, 극우 일베가 되십시오.  두 번째, 친일파여야 합니다.  세 번째, 이게 중요한데, 국회를 무시하십시오.  네 번째, 검사 혹은 검찰 수사관 출신이어야 합니다.  다섯 번째, 윤석열 대통령 배우자 김건희 씨 연줄을 타십시오.    과장 같습니까? 멀리...", "content": "2024. 8. 2 9:30 본청316\n\n\n\n■ 조국 당대표\n\n제가 오늘 윤석열 정부의 비밀 하나를 누설하겠습니다.\n\n윤석열 정권 하에서 출세하는 비법이 있습니다. 다섯 가지입니다. \n\n\n\n첫째, 극우 일베가 되십시오.\n\n두 번째, 친일파여야 합니다.\n\n세 번째, 이게 중요한데, 국회를 무시하십시오.\n\n네 번째, 검사 혹은 검찰 수사관 출신이어야 합니다.\n\n다섯 번째, 윤석열 대통령 배우자 김건희 씨 연줄을 타십시오.\n\n\n\n과장 같습니까? 멀리 갈 것도 없습니다.\n\n윤석열 대통령은 김문수 경사노위원장을\n\n고용노동부장관으로 지명했습니다.\n\n김문수 후보자는 “노동계는 머리부터 세탁해야 한다,\n\n불법파업에 손배 폭탄이 특효약이다,\n\n쟁의 행위는 공산주의다”라고 합니다.\n\n또 “문재인 전 대통령은 김일성주의자로 총살감”이라고 합니다.\n\n\n\n최근 ‘빵진숙’, ‘빵통위원장’으로 불리는 이진숙씨,\n\n법인카드 사용의 달인으로 등극했습니다.\n\n국회 청문회에서 오만방자한 모습을 보입니다.\n\n\n\n‘위안부는 강제적인가 자발적인가’라는 질의에\n\n“논쟁적 사안이라 답변하지 않겠다”라고 답합니다.\n\n5?18민주화운동 폄훼 글에 ‘좋아요’를 누른 이유로\n\n“앞으로 손가락 운동에 신경을 쓰겠다”라고 비아냥거립니다.\n\n자료를 달라는 청문위원의 거듭된 촉구에\n\n이진숙 씨는 “말씀드렸습니다”라고 말합니다.\n\n자기 말이 곧 자료라는 뜻입니다.\n\n“짐이 곧 국가”라고 했던 프랑스 루이 14세가 떠오릅니다.\n\n\n\n이 정도로 국회를 우습게 여겨야\n\n걸핏하면 거부권을 쓰는 윤석열 대통령 눈에 드나 봅니다.\n\n\n\n김영호 통일부 장관은 평화통일에는 관심도 없는 교수였습니다.\n\n그는 “6.15 남북공동선언은 북한의 선동에 놀아난 것”\n\n이런 말을 서슴지 않고 합니다. 일베 유튜버 주장과 똑같습니다.\n\n\n\n차관급인 김채환 국가공무원인재개발원장은 실제 극우 유튜버입니다.\n\n그는 “문재인 전 대통령이 재임 시절 군인을\n\n생체 실험 대상으로 사용하라는 지시를 내렸다,\n\n중국 공산당이 박근혜 전 대통령 퇴진 시위에 영향력을 행사했다”\n\n이런 기가 막히는 주장을 버젓이 했습니다.\n\n\n\n친일파는, 윤석열 정부에는 아주 넘쳐납니다.\n\n신원식 국방부 장관은 이완용에 대해 \n\n“매국노였지만, 한편으론 어쩔 수 없는 측면도 있었던 것이 사실”이라고 합니다.\n\n\n\n김광동 진실화해위원장은 “친일 청산할 것이 없다”고 합니다.\n\n김낙년 한국중앙연구원장은 “위안부, 강제징용은 없었다”,\n\n이배용 국가교육위원회 위원장은 “우리의 근대화 실패는\n\n준비 없이 근대화의 흐름에 밀려왔기 때문”이라고 합니다.\n\n독립운동가 후손들은 윤석열 정권 고위직은 포기해야 합니다.\n\n검찰 출신들도 현 정권보다 잘 나가는 때가 없었습니다.\n\n대통령실과 공기업 등에 검찰 출신이 그득 합니다.\n\n\n\n용산 대통령 비서실은 물론,\n\n행정부 요직에 검찰 출신을 넣었습니다.\n\n방송은 하나도 모르는 김홍일을 \n\n방송통신위원장에 앉혔던 것 기억하시지요?\n\n\n\n정부 외곽기관 중 노른자 자리도 검찰 출신이 차지합니다.\n\n이진숙 방송통신위원장은 방문진 이사에 검찰 출신을 넣었습니다.\n\n\n\n그중에서도 가장 든든한 출세 비법, 김건희 씨 연줄입니다.\n\n김건희 씨가 운영하던 코바나컨텐츠 전시에 관여했던\n\n김행 씨는 전 여가부 장관 후보자가 됐다가 낙마했습니다.\n\n코바나컨텐츠 행사에서 특별 도슨트를 했던 김동조씨는\n\n대통령 국정기획비서관이 됐습니다.\n\n김동조 씨의 재산은 지난 1년간 210억 원 늘었습니다.\n\n\n\n김건희 여사의 도이치모터스 주가 조작 사건 공범 이종호씨,\n\n그가 밀어준 임성근 전 해병대 1사단장은 채 해병 순직에도\n\n자리를 보전할 뻔했다가 들켰습니다.\n\n이종호 씨는 마약사건 외압 의혹을 받고 있는 조병노 경무관에 대해\n\n“별 2개 달아줄 것 같다”라는 말을 합니다.\n\n이렇게 김건희 씨 이름이 곳곳에서 불쑥불쑥 튀어나옵니다.\n\n\n\n다섯 가지 조건 중 두 가지를 갖추면 후보자가 됩니다.\n\n세 가지를 갖추면 출세길이 열리게 됩니다.\n\n\n\n지금 대한민국은 그 어느 때보다 극우, 극렬주의자, 친일파 모리배가\n\n살기 좋은 세상이 됐습니다.\n\n\n\n이주일 뒤면 광복절인데, 이런 세상을 보여드리게 돼 선열들과\n\n국민께 죄송할 뿐입니다. 빨리 끝장내겠습니다."}, {"id": 282, "filename": "2기 제8차 최고.txt", "title": "2기 제8차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["민생", "윤석열"], "preview": "- 2024. 08.05.(월) 09:30. 본관 316호     ■ 조국 당대표     윤석열 대통령이 “휴가를 잘 쓰는 것도 직무”라며  오늘(5일)부터 여름 휴가를 갔다고 합니다.  대통령이 일손을 놓는다고 하니 오히려 안도감이 듭니다.  뭔가 크게 잘못된 상황입니다.     그런데 윤석열 정부는 이미 사고 칠 준비를 하고 있습니다.  여당 훼방을 뚫고 방송4법, 노란봉투법, 민생회복지원금법이  어렵사리 국회를 통과해 정부로 넘어갔습니다....", "content": "- 2024. 08.05.(월) 09:30. 본관 316호\n\n \n\n■ 조국 당대표\n\n \n\n윤석열 대통령이 “휴가를 잘 쓰는 것도 직무”라며\n\n오늘(5일)부터 여름 휴가를 갔다고 합니다.\n\n대통령이 일손을 놓는다고 하니 오히려 안도감이 듭니다.\n\n뭔가 크게 잘못된 상황입니다.\n\n \n\n그런데 윤석열 정부는 이미 사고 칠 준비를 하고 있습니다.\n\n여당 훼방을 뚫고 방송4법, 노란봉투법, 민생회복지원금법이\n\n어렵사리 국회를 통과해 정부로 넘어갔습니다.\n\n정부와 대통령실은 벌써부터 거부권 행사 군불을 때고 있습니다.\n\n \n\n혹시 이번 주에 국무회의를 열어 재의요구안을 의결하거나,\n\n휴가 복귀 뒤 거부권을 행사할 수도 있습니다.\n\n택일만 남은 듯 합니다.\n\n \n\n이렇게 거부권을 행사하면 앞서 15건을 합쳐, 20건이 넘게 됩니다.\n\n총 행사 횟수에서 독재자 이승만 대통령 뒤를 이은 압도적 2위입니다.\n\n집권 기간 중 연간 행사 횟수에서는 1위입니다.\n\n가히 ‘거부왕’이라 칭할 만합니다.\n\n폭염으로 온 국민이 힘든데, 국민의 화를 더욱 치밀게 할 것입니다.\n\n \n\n특히 사적 이익을 위해 거부권을 남용하는 게 더 문제입니다.\n\n특검법이 그렇습니다.\n\n본인, 배우자, 장모, 선후배, 부하들을 보호하려고 합니다.\n\n자신들 죄가 줄줄이 드러날까 봐 그러는 것 같습니다.\n\n특검은 무조건 틀어막고 보는, ‘특틀막 거부권’입니다.\n\n‘거부왕’이 아무리 거부권을 남발해도,\n\n진실을 영원히 묻어둘 수는 없습니다.\n\n조국혁신당이 진실을 다시 햇볕 아래로 불러내겠습니다.\n\n모든 방법을 동원해서 진실을 밝힐 것입니다.\n\n \n\n조국혁신당은 ‘3년은너무길다 특별위원회’, 즉 ‘탄추위’를\n\n구성해 법적·정치적 의혹을 면밀하게 살피고 있습니다.\n\n이와 함께 조국혁신당은 특검과 국정조사를 동시 추진할 것입니다.\n\n \n\n이미 조국혁신당은 5월 21일 ‘3국조 3특검’을 국민께 약속했습니다.\n\n라인-야후 경영권 논란, 잼버리 관리와 부산엑스포 유치 실패,\n\n언론장악 등 3가지는 국정조사 대상입니다.\n\n채해병·김건희·한동훈 등 3특검도 약속한 바 있습니다.\n\n \n\n이제 의혹이 있는 모든 사안에 전면적 국정조사 실시를 촉구합니다.\n\n \n\n이는 국회 권능을 제대로 발휘하기 위한 합법적 수단입니다.\n\n거부권의 벽에 막혀있는 교착상태를 돌파할 수 있는\n\n실효적 조치입니다.\n\n \n\n정기국회 시작 전까지,\n\n윤 대통령이 거부한 특검법 재추진과 병행하여\n\n국정조사를 추진할 것입니다.\n\n우선 채 해병 순직사건의 대통령 등 국가기관 개입과\n\n수사방해 행위 등을 조사하는 국정조사를 준비하겠습니다.\n\n이미 발의한 ‘윤석열 수사외압 특검’ 등\n\n여러 특검법은 계속 추진합니다.\n\n \n\n국회가 자체적으로 할 수 있는 국정조사를 통해\n\n의혹에 대한 증거를 찾고, 책임을 물을 것입니다.\n\n국정조사에서 나온 진실들은 특검으로 가는 징검다리가 될 것이고,\n\n그때에는 윤 대통령도 특검법을 거부하지 못할 것입니다.\n\n \n\n김건희 종합특검과 한동훈 특검, 화천대유 ‘50억 클럽’ 특검도\n\n국정조사와 병행해서 추진하겠습니다.\n\n이들 특검도 윤 대통령이 이미 거부했고, 앞으로도 거부할 것입니다.\n\n국조를 병행해야 하는 이유가 여기에 있습니다.\n\n \n\n저희 혁신당만으로는 안 됩니다.\n\n국정조사는 재적의원 4분의 1, 75명 이상 요구해야 실시할 수 있습니다.\n\n마침 민주당도 ‘2특검 4국조’를 추진 중인 것으로 압니다.\n\n다른 야당과 연대해서 특검에 준하는 국정조사가 될 수 있도록,\n\n가장 실효성 있는 방안을 찾도록 할 것입니다.\n\n \n\n“임기 5년짜리 대통령이 뭐가 대단하다고 너무 겁이 없다.”\n\n윤석열 대통령이 후보 시절 했던 말입니다.\n\n참 맞는 말입니다. 그대로 돌려주고 싶습니다.\n\n임기 3년도 간당간당한 대통령이 너무 겁이 없습니다.\n\n귀하와 배우자의 범죄 혐의가 영원히 덮이지는 않습니다.\n\n \n\n‘윤석열·김건희 공동 정권’, 이를 떠받치는 국민의힘에\n\n다시 한번 경고합니다.\n\n당신들의 권력은 영원하지 않습니다.\n\n "}, {"id": 283, "filename": "2기 제9차 최고.txt", "title": "2기 제9차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당", "민생·경제"], "tags": ["민생", "윤석열"], "preview": "- 2024. 8. 7.(수) 09:30, 본관 316호        ■ 조국 당대표     최근 증시가 매우 위태롭게 출렁거렸습니다.  급락과 급등을 거듭해, 투자자들은 가슴을 졸여야 했습니다.  외부 변수가 많아 아직도 마음이 안 놓입니다.  중동에서 긴장감이 높아지며 세계 증시 모두 크게 흔들립니다.  우리 경제에 미칠 악영향도 우려가 큽니다.     윤석열 정부가 못하는 것을 나열하면 밤을 새야 할 판이지만,  특히 경제는 엉망진창입니다...", "content": "- 2024. 8. 7.(수) 09:30, 본관 316호\n\n \n\n \n\n■ 조국 당대표\n\n \n\n최근 증시가 매우 위태롭게 출렁거렸습니다.\n\n급락과 급등을 거듭해, 투자자들은 가슴을 졸여야 했습니다.\n\n외부 변수가 많아 아직도 마음이 안 놓입니다.\n\n중동에서 긴장감이 높아지며 세계 증시 모두 크게 흔들립니다.\n\n우리 경제에 미칠 악영향도 우려가 큽니다.\n\n \n\n윤석열 정부가 못하는 것을 나열하면 밤을 새야 할 판이지만,\n\n특히 경제는 엉망진창입니다.\n\n앞으로 충격이 가해질 때 어떻게 버틸지 우려됩니다.\n\n \n\n최근 한덕수 국무총리가 “정부 출범 당시\n\n우리가 물려받은 경제를 봤을 때 우리나라가 망할 수도 있겠구나\n\n그런 생각을 절실하게 했다”라고 말했습니다.\n\n \n\n정말 어처구니없는 말입니다.\n\n외환위기나 코로나 같은 위기 상황도 아닌\n\n평시에 이렇게 경제를 많이 망가뜨린 정부 총리가 할 말은 아닙니다.\n\n \n\n몇 개만 살펴봅시다.\n\n윤석열 정부가 들어서 1년을 운용한\n\n2023년 경제성장률이 1.4%입니다.\n\n이는 대한민국 70년 경제사에서 6번째로 낮습니다.\n\n나머지는 외환위기, 금융위기, 석유파동 등 위기 때였습니다.\n\n \n\n도대체 무슨 위기가 발생해서 이런 일이 생겼을까요?\n\n윤석열 정부가 들어선 것이 위기였던 것입니다.\n\n이 경제성장률로 일본에게 25년 만에 역전당했습니다.\n\n참으로 장한 ‘친일 정부’답습니다.\n\n \n\n1인당 국민소득, 즉 GNI는 국민 생활 수준을 나타내는 지표입니다.\n\n2021년 3만 5,523달러였는데,\n\n윤석열 정부 1년 차인 지난해 3월\n\n3만 3,745달러가 됩니다.\n\n1,778달러나 줄었습니다.\n\n \n\n그런데 6월에 한국은행은 3만 6,194달러라고 고쳐 발표했습니다.\n\n기준연도를 2015년에서 2020년으로 개편해서라고 합니다.\n\n \n\n이전 정부에서 이렇게 했으면, 통계 조작이라면서\n\n감사원 감사와 검찰 수사가 들어갔을 겁니다.\n\n \n\n국민이 가장 피부로 체감하는 생활물가 상승률만 봐도 그렇습니다.\n\n문재인 정부 1년 때 월평균 1.9% 상승했습니다.\n\n윤석열 정부 1년 때에는 5.8%로 폭등했습니다.\n\n자고 나면 물가가 오른다는 말이 괜히 생긴 말이 아닙니다.\n\n \n\n수출을 보면 문재인 정부 1년 때\n\n월 평균 12.8% 증가했는데\n\n윤석열 정부 1년에는 마이너스로 돌아서 6.2% 감소합니다.\n\n \n\n무역수지도 문재인 정부 1년차에 105조원 흑자였던 게\n\n윤석열 정부 1년 차에는 80조원 적자가 됩니다.\n\n올 상반기는 다행히 무역수지가 개선되었는데\n\n반도체에 기대는 상황이라 불안합니다.\n\n재정을 잘 관리하겠다며 큰소리치더니\n\n적자 투성이입니다.\n\n \n\n총수입에서 총지출을 뺀 통합재정수지에 국민연금 등\n\n4대 보장성 기금의 흑자 수지를 뺀 것이 바로 ‘관리재정수지’입니다.\n\n이게 정부의 실질적 재정상태입니다.\n\n \n\n지난 5월 말 기준 74조 4,000억원 적자를 기록했습니다.\n\n집계를 시작한 2014년 이후로,\n\n코로나 때인 2020년 이어 역대 2위입니다.\n\n \n\n지난해 세수 펑크가 56조 4,000억원이나 발생했고,\n\n올해 상반기 국세가 지난해보다 10조원 가량 덜 걷혔습니다.\n\n2년 연속 세수 펑크가 확실시됩니다.\n\n \n\n이것도 이전 정부 탓입니까?\n\n그럼 지금은 문재인 정부 7년 차라는 말입니까?\n\n \n\n이 정부는 보수라서 경제는 잘할 것이라고 강변했습니다.\n\n진짜 보수는 시장 중심, 경제 자유 확대를 가치로 내세웁니다.\n\n윤석열 정부는 그 가치에 맞게 행동하고 있습니까?\n\n \n\n전혀 아닙니다.\n\n걸핏하면 가격이 높네, 낮네하며 시장에 개입합니다.\n\n예금과 대출 금리를 올리라 내리라 하고,\n\n인사에 관여하는 등 금융시장에 개입합니다.\n\n‘신(新) 관치’라는 말이 나옵니다.\n\n \n\n이 정권 실세라는 이복현 금감원장은\n\n관치의 화신이 된 듯 굴더니\n\n위메프 사태가 터졌는데도 손도 못 쓰고, 수사 운운만 합니다.\n\n \n\n걸핏하면 경제인이나 기업을 수사하고 압수수색하고 구속시킵니다.\n\n일타강사가 돈 많이 번다고 수사를 합니다.\n\n그게 보수의 가치입니까?\n\n보수가 경제는 잘 한다고요?\n\n주변의 아무 기업인이나 소상공인에게 물어보십시오.\n\n \n\n윤석열 정권은 양두구육, 표리부동,\n\n보수의 탈을 쓴 검찰독재정권,\n\n그리고 1% 부자만을 위한 카르텔 정권에 불과합니다.\n\n \n\n그리고 경제, 물가, 재정관리 모두에 무능한\n\n경제폭망 정권입니다.\n\n정말, 나라가 걱정됩니다."}, {"id": 284, "filename": "2019년 ‘조국 수사’에 이어 윤석열 검찰은 ‘울산 시장 선거.txt", "title": "2019년 ‘조국 수사’에 이어 윤석열 검찰은 ‘울산 시장 선거", "date": "", "category": "기타", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["검찰개혁", "윤석열"], "preview": "2019년 ‘조국 수사’에 이어 윤석열 검찰은 ‘울산 시장 선거 개입 사건’을 벌였다. 문재인 대통령과 청와대 핵심인사를 죽이기 위함이었다. 기소된 사람들 모두 무죄를 받았고, 나는 2025년 추석을 앞두고서야 불기소처분을 받았다.  애초부터 말도 안되는 수사권과 기소권 남용이었더. ’조국 수사‘에서 권력형 비리가 나오지 않자, 윤석열은 청와대 전체를 털기로 한 것이다. 이 과정에서 청와대 민정수석실 소속 백재영 검찰수사관은 검찰의 압박수사를 ...", "content": "2019년 ‘조국 수사’에 이어 윤석열 검찰은 ‘울산 시장 선거 개입 사건’을 벌였다. 문재인 대통령과 청와대 핵심인사를 죽이기 위함이었다. 기소된 사람들 모두 무죄를 받았고, 나는 2025년 추석을 앞두고서야 불기소처분을 받았다. \n애초부터 말도 안되는 수사권과 기소권 남용이었더. ’조국 수사‘에서 권력형 비리가 나오지 않자, 윤석열은 청와대 전체를 털기로 한 것이다. 이 과정에서 청와대 민정수석실 소속 백재영 검찰수사관은 검찰의 압박수사를 견디다 못해 유명을 달리했다. 윤석열과 이 사건 수사팀은 백재영의 죽음에 책임을 져야 한다. 수사로 기소로 고통받은 사람들 앞에 사죄해야 마땅하나, 하지 않을 것이다. \n정치검사들의 악행이 쌓이고 쌓여 마침내 검찰청은 문패를 떼게 되었다. 그러나 검찰개혁은 끝나지 않았다. ‘공소청’ 소속 검사의 권한을 분명히 하고 민주적으로 통제하는 작업이 남았다. 조국혁신당은 검찰개혁의 마무리투수 역할을 수행할 것이다"}, {"id": 285, "filename": "2025 국민미래포럼 현장축사.txt", "title": "2025 국민미래포럼 현장축사", "date": "", "category": "축사·포럼", "topics": ["조국혁신당", "인권·사회", "민생·경제"], "tags": ["교육", "비대위"], "preview": "2025 국민미래포럼 현장축사 25.10.23  안녕하십니까, 조국혁신당 비상대책위원장 조국입니다.  2025 국민미래포럼의 개최를 진심으로 축하드립니다. 함께해 주신 내외 귀빈 여러분, 뜻깊은 자리를 마련해주신 조민제 회장님과  국민일보 관계자 여러분께 감사의 말씀을 드립니다. 강연자 여러분께도 존경과 감사의 마음을 전합니다.  지금 인류는 과학기술이 곧 힘이 되는 시대를 살고 있습니다. 인공지능, 바이오, 에너지, 우주항공 등에서 시작된 변...", "content": "2025 국민미래포럼 현장축사\n25.10.23\n\n안녕하십니까, 조국혁신당 비상대책위원장 조국입니다.\n\n2025 국민미래포럼의 개최를 진심으로 축하드립니다.\n함께해 주신 내외 귀빈 여러분,\n뜻깊은 자리를 마련해주신 조민제 회장님과 \n국민일보 관계자 여러분께 감사의 말씀을 드립니다.\n강연자 여러분께도 존경과 감사의 마음을 전합니다.\n\n지금 인류는 과학기술이 곧 힘이 되는 시대를 살고 있습니다.\n인공지능, 바이오, 에너지, 우주항공 등에서 시작된 변화는 \n국민의 모든 삶의 부분에서 거대한 변화를 촉진하고 있습니다.\n산업의 형태를 넘어 일자리의 변화, 공동체의 관계까지 바꾸고 있습니다.\n\n과학기술은 이제 생존의 조건입니다.\n국가의 경쟁력도, 국민의 삶의 질도 기술 역량에 달려 있습니다.\n그러나 기술의 발전이 곧 사람의 행복을 뜻하지는 않습니다.\n그 중심에 사람이 없다면, 결국 공동체를 위한 진보가 아닙니다. \n\n우리가 직면한 문제는 사람중심의 성장을 이룰수 있느냐의 문제입니다. \n기술의 혜택이 소수에게 집중되고, 다수의 국민이 그 결실에서 배제된다면\n그것은 혁신이 아니라 불평등의 또 다른 이름입니다.\n소득, 교육, 기회의 불평들을 이어 기술 불평등이 새로운 격차를 야기할 것입니다.\n혁신은 삶의 격차를 넓히는 경쟁이 아니라 \n모두가 함께 잘 사는 가능성을 키우는 방향이어야 합니다.\n사람이 중심이 되는 기술 사회를 함께 만들어 나가기를 희망합니다.\n\n오늘의 포럼이 그러한 길을 찾는 시작이 되기를 바랍니다.\n\n감사합니다. "}, {"id": 286, "filename": "2025 아시아미래포럼 현장축사.txt", "title": "2025 아시아미래포럼 현장축사", "date": "", "category": "축사·포럼", "topics": ["인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "비대위", "의료"], "preview": "2025 제16회 아시아미래포럼 현장축사 25.10.23  안녕하십니까, 조국혁신당 비상대책위원장 조국입니다.  제16회 아시아미래포럼의 개최를 진심으로 축하드립니다. 최우성 한겨레 대표이사님, 최태원 아시아미래포럼 조직위 공동위원장님, 그리고 관계자 여러분의 헌신과 노고에 깊이 감사드립니다.  아시아미래포럼의 올해 주제는 ‘민주주의의 미래’입니다.  내란의 상처를 회복하고 있는 우리에게 어느 때보다 무겁게 다가옵니다.  김대중 대통령께서 말씀...", "content": "2025 제16회 아시아미래포럼 현장축사\n25.10.23\n\n안녕하십니까, 조국혁신당 비상대책위원장 조국입니다.\n\n제16회 아시아미래포럼의 개최를 진심으로 축하드립니다.\n최우성 한겨레 대표이사님, 최태원 아시아미래포럼 조직위 공동위원장님,\n그리고 관계자 여러분의 헌신과 노고에 깊이 감사드립니다.\n\n아시아미래포럼의 올해 주제는 ‘민주주의의 미래’입니다. \n내란의 상처를 회복하고 있는 우리에게 어느 때보다 무겁게 다가옵니다.\n\n김대중 대통령께서 말씀하셨듯이 “민주주의에 공것은 없습니다.”\n지난 12.3 내란을 맨몸으로 맞선 평범한 시민들에게\n우리는 또 한 번 민주주의의 빚을 졌습니다.\n이제는 책임 있는 실천으로 더 좋은 민주주의로 나아가야 합니다.\n\n세계는 지금, 새로운 민주주의의 격변기에 있습니다.\n자산의 격차, 기회의 격차 등이 사람의 존엄까지 갈라놓고 있습니다.\n불평등은 민주주의의 가장 깊은 균열입니다.\n불평등이 커질수록 민주주의는 더 크게 흔들리게 됩니다. \n극우가 불평등을 먹고 자라는 현상에 주목해야 합니다. \n\n그래서 한국적 진보의 길을 모색해야 할 때입니다.\n사회권 선진국의 토대 위에 사회경제적 민주주의를 세워야 합니다. \n주거, 돌봄, 의료 등 국가가 국민의 사회권을 책임지는 시대로 나아가야 할 것입니다.\n\n‘균등한 책임’과 ‘동등한 참여’가 ‘공정한 결실’로 이어질 때 \n우리는 서로를 배제하지 않는 사회, 차별을 외면하지 않는 사회,\n더욱 평등한 사회로 나아갈 수 있습니다. \n오늘 포럼이 새로운 미래의 방향을 비추는 나침반이 되기를 희망합니다.\n\n감사합니다."}, {"id": 287, "filename": "20251123 [조국 조국혁신당 당 대표 수락 연설문(현장)].txt", "title": "[조국 조국혁신당 당 대표 수락 연설문(현장)]", "date": "", "category": "연설·기념사", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["부동산", "민생", "의료", "내란", "비대위"], "preview": "[조국 조국혁신당 당 대표 수락 연설문(현장)]   사랑하는 당원 동지 여러분, 감사합니다.  저를 조국혁신호의 선장으로 다시 임명해 주셨습니다.  여러분의 간절하고 단호한 뜻을 잘 알고 있습니다.  어떤 어려움이 있더라도  끝까지 포기하지 않고 나아가겠습니다.   새로운 최고위원 두 분께  축하의 인사 드립니다.  항로를 잘 안내하는  유능한 항해사가 되실 것이라 믿습니다.  전당대회를 뜨겁게 만들고  혁신의 경쟁을 보여주신  임형택, 정경호...", "content": "[조국 조국혁신당 당 대표 수락 연설문(현장)] \n\n사랑하는 당원 동지 여러분, 감사합니다.\n\n저를 조국혁신호의 선장으로 다시 임명해 주셨습니다. \n여러분의 간절하고 단호한 뜻을 잘 알고 있습니다. \n어떤 어려움이 있더라도 \n끝까지 포기하지 않고 나아가겠습니다. \n\n새로운 최고위원 두 분께 \n축하의 인사 드립니다. \n항로를 잘 안내하는 \n유능한 항해사가 되실 것이라 믿습니다.\n\n전당대회를 뜨겁게 만들고 \n혁신의 경쟁을 보여주신 \n임형택, 정경호 두 분 후보께도\n위로와 감사의 말씀을 드립니다. \n\n이제, 당원 동지들과 함께 \n혁신의 대항해를 시작하겠습니다. \n조국혁신호의 돛을 더 높이, \n더 힘차게 올리겠습니다. \n\n<국민 중심 ‘큰 정치’ 선언>\n\n존경하는 당원 동지 여러분.\n\n조국혁신당의 주인은 당원입니다. \n당원의 책임과 권한을 \n더 강화하겠습니다. \n동시에 당의 문을 활짝 열고, \n더 많은 국민을 \n당원으로 모시겠습니다.\n\n혁신의 이어달리기를 \n멈추지 않겠습니다. \n비상대책위원회가 마련한\n‘뉴파티 비전’으로 \n정당 민주주의의 \n새 장을 열겠습니다.\n내란을 격퇴한 ‘응원봉 혁명’을 \n다원 민주주의로 구현하는 \n‘미래 정당’이 되겠습니다. \n\n존경하는 국민 여러분, \n사랑하는 당원 동지 여러분.\n\n저는 오늘 \n‘국민 중심 큰 정치’를 선언하고자 합니다. \n조국혁신당은 당원주권과 \n국민주권이 조화롭게 실현되는 \n정당으로 진화(進化) 될 것입니다.\n\n‘팬덤’에 의존하는 정치, \n하지 않겠습니다. \n당원의 열정은 엔진이 되고, \n국민의 목소리는 방향이 될 것입니다.\n두 목소리가 따로 가지 않고, \n함께 가는 정치를 하겠습니다.\n\n큰 가치, 큰 비전, 큰 책임을 갖고 \n국민의 삶과 대한민국의 미래를 \n새롭게 만들어 내는 ‘큰 정치’를 하겠습니다.\n\n김대중과 김영삼의 정신을 모두 잇겠습니다!\n조봉암과 노회찬의 정신도 모두 받아안겠습니다!\n\n조국혁신당은 현재 비록 작은 정당이지만,\n나라 전체와 다음 세대까지 생각하는 \n‘큰 정당’이 되겠습니다. \n\n<“정치는 국민의 하루를 책임지는 것”>\n\n존경하는 당원 동지 여러분.\n\n짧은 전당대회 기간이었지만, \n저는 당원들의 삶에서 \n정치가 무엇을 해야 하는지 \n다시 배웠습니다.\n\n새벽 꽃시장에서 하루를 여는 \n청년 당원을 만났습니다. \n가족이 함께 운영하는 식당을 찾았습니다. \n가족 모두 당원이었습니다.\n편의점을 운영하는 당원을 만났고, \n첫 손님을 기다리던 \n당원의 택시도 탔습니다.\n\n골목 사장님들부터 농촌의 청년까지, \n소매·유통·제조업에 이르기까지 \n당원들의 다양한 삶을 마주했습니다. \n저는 그분들의 목소리를 \n빠짐없이 기록했습니다. \n그분들의 치열한 삶에 응답하도록 \n당의 정책을 준비하겠습니다.\n\n정치는 구호가 아닙니다. \n정치는 누군가의 하루를 \n응원하고 지키는 일입니다.\n\n조국혁신당 대표가 된 오늘,\n저는 정치를 이렇게 말하고자 합니다.\n\n“정치는 국민의 하루를 책임지는 것이다”! \n\n조국혁신당은 국민의 삶에서 \n다시 시작하겠습니다. \n민생으로 응답할 것입니다.\n국민의 하루를 책임지는, \n민생 개혁정당이 되겠습니다.\n\n<행복이 권리가 되는 나라>\n\n헌법 10조는 “모든 국민은 행복을\n추구할 권리를 가진다”라고 말합니다. \n그러나 현실은 그렇지 못합니다.\n\n대한민국은 자살률 \n비상사태 상황입니다. \n정치가 어느 순간부터 \n세계 최고의 자살률에 둔감해졌습니다.\n세계 최저의 출생률도 마찬가지입니다. \n정치의 실패입니다. \n\n자살까지는 아니더라도, \n주거, 돌봄, 의료 등 \n사회권을 제대로 보장받지 못해 \n삶이 불안하고 \n무너지는 국민들이 부지기수입니다.\n\n지금 우리 사회에 필요한 건, \n더 많은 평등, 더 넓은 기회입니다.\n\n조국혁신당은\n‘행복이 권리가 되는 나라’, \n‘사회권 선진국’으로 나아가야 합니다.\n\n제가 제시한 사회권 비전은, \n국민의 기본적인 생활 보장에 그치지 않습니다.\n사회권의 또 다른 핵심은 \n인적 자본에 대한 투자와 성장입니다. \n사회권 각 분야에 국가의 \n사회 투자를 대폭 확충해서  \n인적 자본을 향상 시키고, \n이를 통해서 새로운 \n성장동력을 만드는 것입니다.\n향후 본격적으로 정책 작업에 나서겠습니다.\n\n<주거권 보장을 위한 5대 제안>\n\n‘행복이 권리가 되는 나라’를 \n만들기 위해서는 \n가장 먼저 주거권이 해결되어야 합니다.\n\n조국혁신당은 청년을 비롯한 \n모든 국민의 주거권 보장을 위해 \n총력을 다하겠습니다. \n\n지금 부동산 시장은, \n다주택자의 이기심, 투기꾼의 탐욕, \n정당과 국회의원의 선거 득표 전략, \n민간 기업의 이해득실이 얽힌 \n복마전입니다. \n\n결국, 전세와 월세에 짓눌리는 \n청년과 국민은 소외되고 있습니다. \n부동산 시장의 복마전을 끝내야 합니다. \n조국혁신당이 끝내겠습니다.\n국민의 주거권을 외면하는 정치 \n퇴장해야 합니다.\n\n첫째, 토지공개념을 입법화하고, \n행정수도 이전을 실천해야 합니다.\n\n토지공개념은 ‘부동산 공화국’과 \n‘강남 불패 신화’를 \n해체하기 위한 \n근본적 처방입니다.\n감사원, 헌법재판소, \n대법원, 대검찰청 등 \n모두 지방으로 이전해야 합니다.\n\n둘째, 보유세를 정상화합시다. \n\n불평등 해소와 조세 정의 \n실현을 위해 반드시 필요합니다. \n그리고 거래세는 완화해야 합니다. \n다주택자의 매물을 유도하는 \n가장 빠른 방안입니다. \n\n셋째, 토지주택은행을 설립하고 \n국민 리츠를 시행합시다. \n\n강남권을 중심으로 고품질의 \n100% 공공임대 주택을 공급해야 합니다.\n\n넷째, 전세사기 특별법의 즉각 통과시켜야 합니다. \n\n전세사기로 청년들이 고통받고 있습니다. \n전세사기는 뿌리 깊은 \n불평등의 결과물로 사회적 재난입니다. \n반드시 \n국가가 공적 책임을 져야 합니다.\n\n<민주당은 대선 약속을 지키십시오>\n\n이제 집권당이자, \n내란 격퇴의 굳건한 동지인 민주당에게\n몇 말씀 올리고자 합니다.\n\n국민들은 빛의 광장에서 분명하게 명령했습니다.\n새로운 민주주의 다수 연합을 만들어서  \n이재명 정부의 개혁을 뒷받침하고, \n이재명 대통령을 성공시키라고 명령하셨습니다. \n\n지금 이 자리에서 다시 한번 묻습니다.\n민주당에게 묻습니다. \n정치개혁, 언제까지 미룰 것입니까? \n\n대선 전 지난 4월, \n국회 개혁 5당이 맺은 \n‘원탁회의 선언문’을 기억하십니까? \n\n대선 직전 지난 5월, \n광장의 시민사회까지 참여한 \n‘공동선언문’은 휴지조각에 불과합니까? \n\n공동선언문에는 “결선투표제 도입, \n의원 선거 시 비례성 확대 강화, \n원내교섭단체 기준 완화 등 \n정치개혁을 추진할 것을 선언한다” \n\n이 선언문은 \n국민 앞에서 한 약속입니다.\n대선공약과 다름없는 \n공식적이고 공개적인 약속이었습니다.\n\n대선이 끝났으니, \n그 합의는 없던 일이 된 것입니까? \n그래도 되는 것입니까?\n민주당이 계속해서 \n공동선언문을 서랍 속에 넣어두고 방치한다면, \n그것은 대국민 약속 파기이자, \n개혁정당들에 대한 신뢰 파기입니다.\n\n민주당 동지들께 강력하게 촉구합니다. \n지금이라도 국민과의 약속을 지키고, \n개혁정당들과의 신뢰 회복에 나서십시오.\n\n<‘정치개혁 원포인트’ 국회 공동 교섭단체 추진>\n\n민주당 지도부가 계속 \n정치개혁 추진을 회피한다면,\n조국혁신당은 개혁 야당들과 \n정치개혁 단일 의제로,  \n‘원 포인트 국회 \n공동 교섭단체’를 추진하겠습니다. \n\n이미 조국혁신당, 진보당, \n기본소득당, 사회민주당은 \n‘정치개혁 연석회의’를 출범시켰습니다.\n이 연석회의를 \n공동 교섭단체로 발전시켜서 \n멈춰있는 정치개혁을 촉진하겠습니다. \n가능하면 빠른 시간에 \n개혁정당들을 만나서 노력을 기울이겠습니다. \n동시에 광장의 시민들과 \n‘정치개혁 공동행동’에 나서겠습니다.\n\n<제7공화국을 여는 개헌연대와 지방선거 동시투표> \n\n새로운 대한민국은 \n개헌으로 이어져야 합니다. \n조국혁신당은 제7공화국을 여는 \n쇄빙선이 되겠습니다.\n\n국회가 더는 \n개헌을 미룰 핑계는 없습니다. \n늦어도 내년 초에 \n주요 개혁 과제들이 \n대부분 매듭지어질 것입니다. \n내란 세력은 법적 처벌을 \n피할 수 없습니다. \n국민은, 이제 \n내란 청산 이후의 \n세상을 묻습니다. \n지금이 개헌의 적기입니다. \n지금부터 개헌의 시간입니다.\n\n저는 제7공화국을 여는 \n두 가지 개헌 경로를 제안합니다.\n\n첫째, 즉각적인 ‘국회 개헌연대’를 구성 합시다.\n개헌으로 내란의 완전한 청산을 넘어 \n한국 사회의 구조적 모순을 \n전면 개혁해야 합니다. \n이 대의와 명분에 동의하는 정당들과 \n개헌연대를 구성하겠습니다.\n향후 시민사회까지 참여하는 \n‘국민 개헌연대’로 확장하겠습니다.\n\n둘째, ‘지방선거와 지방분권 개헌’ 동시 투표를 \n내년 6월에 실시합시다.\n\n내년 지방선거에서 \n여야 이견이 없는 의제부터 \n최소 개헌을 해냅시다.\n\n지방선거를 하는 만큼, \n지방분권 개헌을 같이 이루어 냅시다. \n국민의 관심은 커지고, \n지방선거의 의미는 빛날 것입니다.\n\n조국혁신당은 이미 \n지방분권 개헌안을 발표했습니다.\n헌법에 ‘지방분권 공화국'과 \n‘수도 조항’을 명시합시다.\n지금보다 훨씬 강한 지방분권, \n지역발전이 가능하고, \n전국에 행정수도, 경제수도, \n문화수도, 해양수도 등이 \n고르게 분포되도록 만들어야 합니다. \n특히 주거, 교육, 일자리 불평등이 \n해소될 것임은 명약관하 합니다.\n\n여기에 부마민주항쟁, \n5·18민주화운동, 6·10민주항쟁을 \n헌법 전문에 수록해야 함은 물론입니다. \n\n<조국혁신당의 이름으로 대한민국 바꿀 것> \n\n사랑하는 당원 동지 여러분, \n\n우리는 창당 이후 \n가장 어려운 시기를 통과하고 있습니다. \n솔직히 우리 앞에 놓인 환경 어렵습니다. 나쁩니다. \n거대양당 독점체제는 공고합니다.\n조국혁신당의 조직 미미 합니다. \n지지율 많이 떨어졌습니다. \n모르고 있지 않습니다. 다 알고 계실 것입니다.\n\n그런데 이런 상황에서\n지방선거는 다가오고 있습니다. \n불안하실 것입니다. \n두려우실 것입니다. \n걱정이 가득 차실 것입니다.\n많은 사람들은 동의하는 점이 있습니다.\n“특정 정당이 지방행정부와 의회를 \n독점하는 것 나쁘다”\n모두가 말합니다.\n“지방정치 발전을 위해서 \n경쟁과 견제가 필요하다”\n다들 동의한다고 말합니다.\n\n그렇게 말하면서도\n조국혁신당이 지방선거에 도전한다고 말할 때\n이렇게 말합니다. \n“지방 정치 개혁 필요한 것 안다.\n그러나 잘 되겠느냐. 포기해라. \n하더라도 힘 빼지 마라. "}, {"id": 288, "filename": "20251126 끝까지간다.txt", "title": "끝까지간다", "date": "", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["내란", "민생", "윤석열", "끝까지간다"], "preview": "2025.11.26. 안녕하십니까, 끝까지간다 특별위원회 위원장 조국입니다.  내란 사태가 일어난 지 1년이 다 돼 갑니다. 내란범들은 재판정에서 희희낙락하는 모습을 연출해 국민을 분노케 합니다. 내란 세력에 기생해 호의호식했던 자들, 내란을 비호하며 기득권을 지키려는 자들은 여전히 활개치고 있습니다.   내란 세력 변호인들의 최근 행태는 가관입니다. 재판정에서 난장판을 벌여 감치 명령을 받는가 하면, 법관들을 향해 입에 담지 못할 욕설을 해댑...", "content": "2025.11.26.\n안녕하십니까, 끝까지간다 특별위원회 위원장 조국입니다.\n\n내란 사태가 일어난 지 1년이 다 돼 갑니다.\n내란범들은 재판정에서 희희낙락하는 모습을 연출해\n국민을 분노케 합니다.\n내란 세력에 기생해 호의호식했던 자들,\n내란을 비호하며 기득권을 지키려는 자들은\n여전히 활개치고 있습니다. \n\n내란 세력 변호인들의 최근 행태는 가관입니다.\n재판정에서 난장판을 벌여 감치 명령을 받는가 하면,\n법관들을 향해 입에 담지 못할 욕설을 해댑니다.\n내란에 대해 비판적인 국민의힘 인사들에게\n“민주당만도 못한 쓰레기”라는 욕설을 퍼부었습니다.\n\n이들은 변호인입니까? 내란 선동꾼입니까?\n대한변협은 이들을 그대로 놔둘 것입니까?\n재판부는 이들의 법정 모독, 국민 모독 행위를\n더 이상 용인해서는 안 됩니다.\n법이 정한 바대로 재판을 엄정하게 진행하고\n방해하는 자들에게는 온정이 아닌 철퇴를 내려야 합니다.\n\n더 심각한 곳은 국민의힘 지도부입니다.\n장동혁 대표는 “체제 전쟁 깃발 아래 우파가 함께 모이자”고 합니다.\n장 대표는 내란을 선동했던 황교안 전 총리에 대해\n“우리가 황교안이다”라고 옹호합니다.\n석고대죄하며 쇄신을 천명해도 시원치 않을 판에,\n내란당 대표처럼 굽니다.\n\n중진인 나경원 의원은 한발 더 나아갑니다.\n“윤 어게인, 부정선거론자라 안 된다고 내칠 필요 없다,”\n“도둑 표라서 안 되고, 사기꾼 표라서 안 된다고 하지 않는다”고 합니다.\n표만 되면 누구라도 좋다는 말에 소름이 끼칩니다.\n히틀러, 전두환도 무덤에서 꺼내 손 잡을 태세입니다.\n\n“노상원 수첩대로 됐으면 좋았을 것”이라고 했던 송언석 원내대표,\n이번에는 \"특검은 정권의 충견”이라고 합니다.\n극우를 대표하는 듯한 김민수 최고위원,\n“윤 어게인 청년들, 고맙다”, “윤 대통령 계엄은 내란이 아니다”라고\n국민 가슴에 대못 박는 말만 골라서 합니다.\n\n대한민국 국민의 인내는 이제 임계점에 다다랐습니다.\n국민의힘에 경고합니다.\n내란의 방패, 내란 중요임무 종사당 역할을 즉각 멈추십시오.\n\n특히 내란 1년을 맞아 내란 세력과의 철저한 절연을 천명하십시오.\n좌고우면할 일이 아닙니다.\n윤석열 지킴이를 자처하는 당내 인사들을 축출하십시오.\n“윤 어게인”을 외치는 자들, 사이비 단체들은\n연락조차 수신 거부하십시오.\n그렇지 않고 입으로만 ‘절연’을 외치면\n위장 이혼, 대국민 사기극일 뿐입니다.\n\n내란의 수렁에서 빠져나와\n상식을 갖춘 ‘좋은 보수 정당’으로 거듭나십시오.\n그리고 누가 국민의 삶을 더 좋게 하는지를 놓고\n우리 조국혁신당과 경쟁해 봅시다.\n국민의힘의 맹성을 촉구합니다.     /끝/"}, {"id": 289, "filename": "251210 김용균 7주기.txt", "title": "251210 김용균 7주기", "date": "", "category": "기타", "topics": ["조국혁신당", "민생·경제"], "tags": ["민생"], "preview": "7년 전 오늘, 스물넷 청년 김용균은 어두운 발전소 현장에서 우리 곁을 떠났습니다. 그의 죽음은 대한민국에 뿌리 깊게 자리한 ‘위험의 외주화’라는 잔혹한 현실을 적나라하게 드러냈습니다.  생명의 무게가 ‘고용 형태’에 따라 달라져서는 안 됩니다. 그러나 기업은 비용을 줄이고 책임을 피하기 위해 가장 위험한 일을 가장 취약한 노동자에게 떠넘겨 왔습니다. 하청 노동자들은 가장 위험한 곳에서 가장 적은 보호 속에 일하고 있으며, 산업재해의 희생은 비...", "content": "7년 전 오늘, 스물넷 청년 김용균은 어두운 발전소 현장에서 우리 곁을 떠났습니다. 그의 죽음은 대한민국에 뿌리 깊게 자리한 ‘위험의 외주화’라는 잔혹한 현실을 적나라하게 드러냈습니다.\n\n생명의 무게가 ‘고용 형태’에 따라 달라져서는 안 됩니다. 그러나 기업은 비용을 줄이고 책임을 피하기 위해 가장 위험한 일을 가장 취약한 노동자에게 떠넘겨 왔습니다. 하청 노동자들은 가장 위험한 곳에서 가장 적은 보호 속에 일하고 있으며, 산업재해의 희생은 비정규직·하청·고령 노동자, 그리고 이주노동자에게 집중되어 왔습니다.\n\n김용균 씨의 죽음 이후 우리는 다시는 이런 일이 없게 하겠다고 약속했고, 중대재해처벌법도 제정됐습니다. 그러나 7년이 지난 지금도 현장의 현실은 크게 달라지지 않았습니다. 노동자들은 여전히 위험 속에서 홀로 버티고 있습니다.\n\n모든 성장은 노동자를 위한 성장이어야 합니다. 노동자의 안전은 선택이 아니라 가장 기본적인 권리입니다. 죽음마저 외주화되는 사회, 반드시 끝내야 합니다.\n\n조국혁신당이 지향하는 사회권 선진국은 모든 노동자의 생명과 안전이 온전히 보장되는 나라입니다. 노동이 권리가 되고, 행복이 권리가 되는 나라입니다. 노동법의 보호를 받지 못하는 사각지대를 없애고, 특수고용직·플랫폼 노동자·프리랜서까지 포괄하는 보편적 안전망을 제도화하겠습니다. 누구나 ‘일터에서 집으로 안전하게 돌아오는 것’이 너무나 당연한 대한민국을 만들겠습니다.\n\n‘또 다른 김용균’을 더 이상 잃지 않도록, 끝까지 지키겠습니다.\n삼가 고인의 명복을 빕니다.\n\n2025.12.10. 조국혁신당 대표 조국."}, {"id": 290, "filename": "5월 17일 국회 개헌특위 설치 및 제7공화국 개헌 제안(202.txt", "title": "5월 17일 국회 개헌특위 설치 및 제7공화국 개헌 제안(202", "date": "", "category": "기타", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["5.18", "지방선거", "민생", "교육", "개헌"], "preview": "<5월 17일 국회 개헌특위 설치 및 제7공화국 개헌 제안>(2024.5.17.)  존경하는 국민 여러분, 조국혁신당 대표 조국입니다. 저는 제 7공화국으로 진입하기 위한 열 번째 헌법 개정을 촉구하기 위해 이 자리에 섰습니다. 국민 여러분과 의원들께 우리의 미래를 향한 담대한 여정을 제안합니다. 헌법은 ‘나라가 돌아가는 근본 원칙’입니다. 국민의 삶은 이 안에서 이뤄집니다. 현세대와 미래 세대의 가치와 지향을 담고 있습니다. 그래서 대단히 중...", "content": "<5월 17일 국회 개헌특위 설치 및 제7공화국 개헌 제안>(2024.5.17.)\n\n존경하는 국민 여러분,\n조국혁신당 대표 조국입니다.\n저는 제 7공화국으로 진입하기 위한 열 번째 헌법 개정을 촉구하기 위해 이 자리에 섰습니다. 국민 여러분과 의원들께 우리의 미래를 향한 담대한 여정을 제안합니다.\n헌법은 ‘나라가 돌아가는 근본 원칙’입니다. 국민의 삶은 이 안에서 이뤄집니다. 현세대와 미래 세대의 가치와 지향을 담고 있습니다. 그래서 대단히 중요한 규범입니다.\n현행 제 6공화국 헌법은 국민들께서 길고 긴 투쟁 끝에, 1987년 피맺힌 6·10 항쟁을 통해 일궈낸 것입니다. 영화 <변호인>, <남영동1985>, <1987>을 상기해보십시오. 그런 투쟁과 희생으로 만들어진 현행헌법의 요체는 두 가지입니다. ‘독재 종식과 대통령 직선’, 그리고 ‘자유권 보장’입니다.\n37년, 한 세대가 훌쩍 지났습니다. 다른 선진 국가에서 일, 이백 년에 걸쳐 벌어질 일이 그새 우리나라에서 재연됐습니다. 중진국이던 대한민국은 선진국 문턱에 서 있습니다. 국제통화기금(IMF) 외환위기, 두 차례의 남북 정상회담, 한 차례의 대통령 탄핵, 다섯 차례의 평화적 정권 교체가 이뤄졌습니다. 정부 부재에 의한 사회적 참사가 잇달았습니다.\n국민은 이제 “국가란 무엇인가”, 국가의 존재 이유를 묻습니다. 권력이 군림하는 게 아니라 봉사해야 한다는, 당연한 요구를 하고 있습니다. 겨우 연명할 정도가 아니라 사람답게 잘살 수 있도록 국가가 보장해야 한다고 말씀하십니다. 이는 국가가 베푸는 ‘시혜’가 아니라 국민의 기본적 ‘권리’여야 합니다.\n이에 저는 22대 국회에 개헌특별위원회를 설치하자고 제안합니다. 개헌특위에서는 제7공화국 헌법을 논의하게 될 것입니다.\n조국혁신당은 개헌안에 담고 싶은 것이 많고, 준비도 충분히 했습니다. 그러나 조국혁신당은 7공화국 개헌에 반드시 담아야 할 최소한의 개정사항 7가지를 다음과 같이 제시합니다.\n첫째, 부마민주항쟁, 5·18민주화운동, 6·10민주항쟁을 헌법 전문에 수록합니다. 현행 헌법 전문은 ‘3·1운동으로 건립된 대한민국 임시정부의 법통과 불의에 항거한 4·19민주이념을 계승’한다고 돼 있습니다. 이에 더하여 부마, 5·18, 6·10 정신의 계승을 헌법에 수록하는 일은 지극히 당연한 일입니다. 이들 운동과 항쟁은 정치적으로는 물론, 법률적으로도 복권돼 국민 마음에 뿌리내렸습니다.\n7공화국 헌법 전문에 ‘유구한 역사와 전통에 빛나는 우리 대한국민은 3·1운동으로 건립된 대한민국임시정부의 법통과 불의에 항거한 4·19혁명, 부마민주항쟁과 5·18민주화운동, 6·10항쟁의 민주이념을 계승하고’라고 새겨야 합니다. \n두 번째, ‘수도는 법률로 정한다’는 조항을 신설합니다. 현행헌법에는 수도 규정이 없습니다. 그러자 서울이 대한민국 수도인 것은 “관습헌법”이라고 헌법재판소가 결정했습니다. 이 때문에 지방분권과 자치 발전을 위해 수도를 이전하려는 노력이 좌절됐습니다. 현재 지방 공동화를 넘어 지방소멸 위기론이 나오는 지경입니다. 헌법에 새 규정을 넣어 법률로 이를 정하면 수도를 온전히 이전할 수 있게 됩니다.\n세 번째, 대통령 5년 단임제를 4년 중임제로 바꿉니다. 1987년 헌법이 대통령 단임제를 채택한 이유는 딱 하나입니다. 독재정권의 장기 집권을 막기 위해서입니다. 대한민국은 이제 평화적 정권 교체가 자연스러운 나라가 됐습니다. 국민 역량을 믿고 대통령 중임제를 채택할 시점이 됐습니다. 책임정치를 구현하고, 국정의 연속성과 일관성을 강화하기 위해 중임제로 바꿔야 합니다.\n그리하여 현행 ‘대통령의 임기는 5년으로 하며, 중임할 수 없다’를 ‘대통령의 임기는 4년으로 하되, 연이어 선출되는 경우에만 한 번 중임할 수 있다’로 바꾸어야 합니다.\n개헌을 위한 국민투표를 2026년 6월 3일로 예정된 지방선거 전에 할지, 지방선거와 함께 실시할지는 개헌특위에서 논의하면 됩니다. 혁신당은 가능한 다음 지방선거 전에 국민투표를 실시하고, 대통령 선거를 지방선거 때 함께 실시할 것을 요구합니다. 대선과 지방선거 시기를 맞춰 전국 단위 선거 횟수를 줄이면 그만큼 국력 낭비를 막을 수 있습니다. 이를 위해 부칙 조항을 두어 현직 대통령 재임 기간을 조정할 수 있을 것입니다. \n네 번째, 검사의 영장 신청권을 삭제합니다. 현행헌법에 영장은 검사의 신청에 따라 법관이 발부하게 돼 있습니다. 검찰청은 법무부 외청에 불과하지만, ‘준 사법기관’을 참칭하며 사실상 무소불위의 기소 권력을 누립니다. 통제도 거의 받지 않습니다. 해외에서도 일부 독재국가를 빼고 이처럼 강한 권능을 가진 검찰은 없습니다. 이로 인한 폐해는 자의적 수사와 기소권 남용을 넘어 ‘검찰독재정권’의 탄생으로 이어졌습니다. 이에 영장 신청권을 헌법에서 삭제하고 신청 주체를 법률로 정하도록 합니다.\n현행 12조 3항과 16조의 ‘검사의 신청에 의하여’를 각각 고쳐, ‘체포·구속이나 압수·수색을 할 때에는 적법한 절차에 따라 청구 되고 법관이 발부한 영장을 제시해야 한다’와 ‘주거에 대한 압수나 수색을 하려 할 때에는 적법한 절차에 따라 청구되고 법관이 발부한 영장을 제시해야 한다’로 바꿉시다. \n다섯 번째, ‘사회권’을 강화하는 일반 조항을 신설합니다. 인간다운 생활을 할 권리 보장 내용이 그것입니다. 사회권은 이미 헌법에 규정돼 있습니다. 근로권, 교육권, 환경권, 복지권 등입니다. 다만, 현재는 각 권리 증진을 위해 ‘국가가 노력해야 한다’고 돼 있습니다. 이를 ‘국민이 각 권리를 가진다’로 선언해야 합니다. \n지금처럼 최저 한계 보장이 아니라 인간 존엄성이 보장되면서 삶의 질을 유지할 수 있는 권리를 국가가 적극 보장토록 하는 것입니다. 이에 ‘모든 국민은 장애·질병·노령·실업·빈곤 등 다양한 사회적 위험으로부터 벗어나 적정한 삶의 질을 유지할 수 있도록 사회보장을 받을 권리를 가진다’, ‘모든 국민은 임신ㆍ출산ㆍ양육과 관련하여 국가의 지원을 받을 권리를 가진다’. ‘모든 국민은 쾌적하고 안정적인 주거생활을 할 권리를 가진다’ 등의 조항을 신설합니다. 민생이 선진이 되는 나라에서 국민이 누릴 권리를 헌법에 명기하자는 게 저희의 요청입니다.\n여섯 번째, 동일 가치 노동 동일 수준 임금을 명문화합니다. 고용 형태, 인종, 종교, 성별 등에 관계 없이 동일 직업에 종사하는 노동자에는 동일 임금 수준을 적용하고 노동의 양에 따라 임금을 지급해야 한다는 인식은 이미 국제적으로 인정되고 있습니다. ‘국가는 동일한 가치의 노동에 대해서는 동일한 수준의 임금이 지급되도록 노력해야 한다’라고 헌법에 써넣어야 합니다.\n일곱 번째, ‘토지공개념’을 강화합니다. 경제질서와 관련해 불평등과 불공정을 고치기 위해서입니다. 부동산이 투기의 대상이 됐고, 부의 대물림이 강화되고 있습니다. 청년들은 집 문제로 좌절합니다. 결혼을 포기해야 할 처지입니다. 그대로 둘 수 없습니다. ‘국가는 토지의 공공성과 합리적 사용을 위하여 필요한 경우에 한하여 특별한 제한을 하거나 의무를 부과할 수 있다’라고 토지공개념의 내용을 헌법에 분명히 할 필요가 있습니다.\n지난 한 세대 동안 대한민국과 대한국민의 역량은 넉넉히 입증됐습니다. 현행헌법보다 국민의 권리를 더 인정하고, 국가가 국민을 더 지원하도록 규율하는 헌법을 가질 자격이 충분합니다. 여기에 더해 현재가 아닌 미래 세대를 위해서 우리가 나아갈 방향에 대해 밝혀야 합니다.\n그러기 위해 우리 정치적 상상력을 최대치까지 뻗어 보자고 요청합니다. ‘왜 안 되는지’가 아니라, ‘왜 해야 하는지’를 논의합시다.\n국민 요구 사항은 더 다양합니다. 잘 알고 있습니다. 향후 논의 과정에서 넣거나 빠질 것입니다. 이는 정치권과 국민이 참여하는 열띤 논의를 통해 결정될 것입니다. 저는 그렇게 될 것이라고 확신합니다. 우리 헌법 1조 2항 ‘대한민국의 주권은 국민에게 있고, 모든 권력은 국민으로부터 나온다’라고 돼 있기 때문입니다. 22대 국회가 열리면 국회와 국민 모두 개헌을 논의합시다.\n감사합니다. <끝>"}, {"id": 291, "filename": "[대법원 내란회의록 공개 및 조희대 사퇴 요구 기자회견].txt", "title": "[대법원 내란회의록 공개 및 조희대 사퇴 요구 기자회견]", "date": "", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "기자회견", "사법개혁"], "preview": "[대법원 내란회의록 공개 및 조희대 사퇴 요구 기자회견] - 25.10.28. 13:30 대법원 앞  조국혁신당은 ‘조희대의 대법원’을 ‘국민의 대법원’으로  바로 세우기 위해 이 자리에 섰습니다.   지난 12월 3일, 불법 비상계엄이 일어나자,  대법원은 심야 긴급회의를 열어 계엄사령관의 지시에 따르려 했습니다.  당시 대법원 관계자를 인용한 언론 보도가 그 증거입니다. “사법권의 지휘·감독은 계엄사령관에게 옮겨간다.” “계엄사령관의 지시와...", "content": "[대법원 내란회의록 공개 및 조희대 사퇴 요구 기자회견]\n- 25.10.28. 13:30 대법원 앞\n\n조국혁신당은 ‘조희대의 대법원’을 ‘국민의 대법원’으로 \n바로 세우기 위해 이 자리에 섰습니다. \n\n지난 12월 3일, 불법 비상계엄이 일어나자, \n대법원은 심야 긴급회의를 열어 계엄사령관의 지시에 따르려 했습니다.\n\n당시 대법원 관계자를 인용한 언론 보도가 그 증거입니다.\n“사법권의 지휘·감독은 계엄사령관에게 옮겨간다.”\n“계엄사령관의 지시와 매뉴얼에 따라 대응하겠다.”\n\n조희대의 대법원은 내란 성공을 전제로 계엄사령관의 지시에 순순히 따르려 했습니다.\n‘국민의 법원’을 ‘내란의 군홧발’ 아래 두려고 했습니다. \n대법원이 헌법을 짓밟았습니다. 결코 용서할 수 없는, 명백한 내란 행위입니다.\n\n노상원 수첩에 적힌 ‘특별재판소’, ‘법체계를 이용해’, ‘사형·무기징역’ 등의 구상은\n대법원이 내란의 합법화를 ‘인증’하는 기관으로 설계되었음을 보여줍니다. \n국회가 계엄을 해제하지 못해서 내란이 성공했다면, \n대법원은 ‘특별재판소’로 변신해서 계엄사령부를 뒷받침했을 것입니다.\n\n내란의 밤에 긴급회의를 주관한 법원행정처는 입장을 밝혀야 합니다.\n당시 회의록 일체를 국민께 공개해야 합니다. \n조국혁신당이 반드시 밝혀내겠습니다.\n\n법원행정처는 양승태 대법원 시절 재판거래를 했습니다.\n그때 해체가 되었어야 마땅했습니다. \n이제는 내란까지 동참했습니다. 조국혁신당은 법원행정처를 해체하겠습니다.\n\n조희대 대법원은, 대선에 노골적으로 개입했습니다. \n내란 행위의 정점이었습니다. \n그‘희대의 판결'은 국민의 참정권과 주권에 대한 도전이었습니다. \n더는 긴말하지 않겠습니다. 조희대 대법원장은 탄핵되어야 합니다. \n\n조국혁신당은 국민과 함께 다음을 강력히 요구합니다. \n\n1. 계엄 당시 대법원 긴급회의 회의록과 관련 문서를 즉각 공개하라.\n2. 내란특검은 대법원의 내란 동조 의혹을 즉각 수사하라. \n3. 대선 개입 판결에 대해 국민 앞에 즉각 사죄하라.\n4. 조희대 대법원장은 즉각 사퇴하라.\n5. 대법원은 법원행정처 폐지 등 사법개혁안을 즉각 수용하라.\n\n이것이 국민의 명령입니다. \n만약 이 요구가 외면된다면, 조희대 대법원장의 탄핵을 포함한 \n모든 법적·정치적 수단을 강력히 추진하겠습니다.\n\n조희대는 법의 옥좌에서 내려와야 합니다. 조희대는 법의 심판대 앞에 서야 합니다. \n조국혁신당은 끝까지 갑니다. \n‘조희대의 대법원’을 ‘국민의 대법원’으로 바로 세우겠습니다.\n\n2025년 10월 28일 조국혁신당 "}];
const CAT_COLORS = {"최고위원회": "#3b82f6", "비상대책위원회": "#8b5cf6", "끝까지간다위원회": "#ef4444", "페이스북 메시지": "#10b981", "기자회견·간담회": "#f59e0b", "인터뷰": "#06b6d4", "성명·입장·논평": "#ec4899", "현장발언": "#84cc16", "연설·기념사": "#f97316", "결의문·성명": "#a855f7", "정책설명회": "#14b8a6", "정책발표": "#6366f1", "축사·포럼": "#eab308", "기타 메시지": "#94a3b8", "대변인 논평": "#fb923c", "기타": "#6b7280"};
const TOPIC_COLORS = {"내란·윤석열": "#ef4444", "검찰·사법개혁": "#8b5cf6", "정치·선거개혁": "#3b82f6", "민생·경제": "#10b981", "개헌·민주주의": "#f59e0b", "외교·안보": "#06b6d4", "조국혁신당": "#ec4899", "인권·사회": "#84cc16", "기타": "#6b7280"};

let currentView = 'card';
let activeCats = new Set();
let activeTopics = new Set();
let activeYears = new Set();
let searchQuery = '';
let filteredSpeeches = [...SPEECHES];

const catCounts = {};
const topicCounts = {};
const yearCounts = {};
SPEECHES.forEach(s => {
  catCounts[s.category] = (catCounts[s.category]||0) + 1;
  s.topics.forEach(t => { topicCounts[t] = (topicCounts[t]||0) + 1; });
  const y = s.date ? s.date.slice(0,4) : '미상';
  yearCounts[y] = (yearCounts[y]||0) + 1;
});

function buildSidebar() {
  const catDiv = document.getElementById('cat-filters');
  Object.keys(catCounts).sort((a,b) => catCounts[b]-catCounts[a]).forEach(cat => {
    const color = CAT_COLORS[cat] || '#6b7280';
    const btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.dataset.filter = 'cat'; btn.dataset.value = cat;
    btn.innerHTML = `<span class="dot" style="background:${color}"></span>${cat}<span class="count">${catCounts[cat]}</span>`;
    btn.onclick = () => toggleFilter('cat', cat, btn);
    catDiv.appendChild(btn);
  });

  const topicDiv = document.getElementById('topic-filters');
  Object.keys(topicCounts).sort((a,b) => topicCounts[b]-topicCounts[a]).forEach(topic => {
    const color = TOPIC_COLORS[topic] || '#6b7280';
    const btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.dataset.filter = 'topic'; btn.dataset.value = topic;
    btn.innerHTML = `<span class="dot" style="background:${color}"></span>${topic}<span class="count">${topicCounts[topic]}</span>`;
    btn.onclick = () => toggleFilter('topic', topic, btn);
    topicDiv.appendChild(btn);
  });

  const yearDiv = document.getElementById('year-filters');
  Object.keys(yearCounts).sort().reverse().forEach(year => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.dataset.filter = 'year'; btn.dataset.value = year;
    btn.innerHTML = `<span class="dot" style="background:#6b7280"></span>${year}년<span class="count">${yearCounts[year]}</span>`;
    btn.onclick = () => toggleFilter('year', year, btn);
    yearDiv.appendChild(btn);
  });
}

function toggleFilter(type, value, btn) {
  let set = type==='cat' ? activeCats : type==='topic' ? activeTopics : activeYears;
  if (set.has(value)) { set.delete(value); btn.classList.remove('active'); }
  else { set.add(value); btn.classList.add('active'); }
  updateActiveFiltersBar(); render();
}

function updateActiveFiltersBar() {
  const bar = document.getElementById('activeFilters');
  bar.innerHTML = '';
  const hasFilters = activeCats.size > 0 || activeTopics.size > 0 || activeYears.size > 0 || searchQuery;
  if (!hasFilters) { bar.classList.add('empty'); return; }
  bar.classList.remove('empty');
  activeCats.forEach(cat => {
    const color = CAT_COLORS[cat] || '#6b7280';
    bar.innerHTML += `<span class="filter-tag" style="border-color:${color}30"><span style="color:${color}">●</span> ${cat}<button onclick="removeFilter('cat','${cat}')" title="제거">✕</button></span>`;
  });
  activeTopics.forEach(topic => {
    const color = TOPIC_COLORS[topic] || '#6b7280';
    bar.innerHTML += `<span class="filter-tag" style="border-color:${color}30"><span style="color:${color}">●</span> ${topic}<button onclick="removeFilter('topic','${topic}')" title="제거">✕</button></span>`;
  });
  activeYears.forEach(year => {
    bar.innerHTML += `<span class="filter-tag">📅 ${year}년<button onclick="removeFilter('year','${year}')" title="제거">✕</button></span>`;
  });
  if (searchQuery) {
    bar.innerHTML += `<span class="filter-tag">🔍 "${searchQuery}"<button onclick="clearSearch()" title="제거">✕</button></span>`;
  }
  bar.innerHTML += `<button class="clear-all" onclick="clearAllFilters()">모두 해제</button>`;
}

function removeFilter(type, value) {
  if (type==='cat') activeCats.delete(value);
  else if (type==='topic') activeTopics.delete(value);
  else activeYears.delete(value);
  document.querySelectorAll(`.filter-btn[data-filter="${type}"][data-value="${value}"]`).forEach(b => b.classList.remove('active'));
  updateActiveFiltersBar(); render();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  updateActiveFiltersBar(); render();
}

function clearAllFilters() {
  activeCats.clear(); activeTopics.clear(); activeYears.clear();
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.querySelectorAll('.filter-btn.active').forEach(b => b.classList.remove('active'));
  updateActiveFiltersBar(); render();
}

function getFiltered() {
  let result = SPEECHES;
  if (activeCats.size > 0) result = result.filter(s => activeCats.has(s.category));
  if (activeTopics.size > 0) result = result.filter(s => s.topics.some(t => activeTopics.has(t)));
  if (activeYears.size > 0) result = result.filter(s => activeYears.has(s.date ? s.date.slice(0,4) : '미상'));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    result = result.filter(s =>
      s.title.toLowerCase().includes(q) ||
      s.preview.toLowerCase().includes(q) ||
      s.content.toLowerCase().includes(q) ||
      s.category.toLowerCase().includes(q) ||
      s.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  return result;
}

function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = escHtml(text);
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(re, '<mark class="highlight">$1</mark>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const sort = document.getElementById('sortSelect').value;
  let data = getFiltered();
  if (sort==='date-asc') data = [...data].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  else if (sort==='date-desc') data = [...data].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  else data = [...data].sort((a,b) => a.title.localeCompare(b.title));

  filteredSpeeches = data;
  document.getElementById('resultNum').textContent = data.length;
  document.getElementById('shownCount').textContent = data.length;

  const container = document.getElementById('cards-container');
  container.className = `view-${currentView}`;

  if (data.length === 0) {
    container.innerHTML = `<div class="no-results"><div class="icon">🔍</div><h3>검색 결과가 없습니다</h3><p>다른 키워드나 필터를 사용해 보세요</p></div>`;
    return;
  }
  if (currentView === 'timeline') {
    let html = '', lastYear = null;
    data.forEach(s => {
      const y = s.date ? s.date.slice(0,4) : '미상';
      if (y !== lastYear) { html += `<div class="year-divider">📅 ${y}년</div>`; lastYear = y; }
      html += renderCard(s);
    });
    container.innerHTML = html;
  } else {
    container.innerHTML = data.map(s => renderCard(s)).join('');
  }
}

function renderCard(s) {
  const color = CAT_COLORS[s.category] || '#6b7280';
  const dateStr = s.date ? s.date.replace(/-/g, '.') : '날짜 미상';
  const titleHtml = highlight(s.title || s.filename.replace('.txt',''), searchQuery);
  const previewHtml = highlight(s.preview, searchQuery);
  const tags = s.tags.map(t => `<span class="tag" onclick="event.stopPropagation();tagSearch('${t}')">#${t}</span>`).join('');
  return `<div class="speech-card" style="--card-color:${color}" onclick="openModal(${s.id})">
    <div class="card-header">
      <span class="card-cat" style="--card-color:${color}">${escHtml(s.category)}</span>
      <span class="card-date">${dateStr}</span>
    </div>
    <div class="card-title">${titleHtml}</div>
    <div class="card-preview">${previewHtml}</div>
    <div class="card-tags">${tags}</div>
  </div>`;
}

function tagSearch(tag) {
  searchQuery = tag;
  document.getElementById('searchInput').value = tag;
  document.getElementById('searchClear').style.display = 'block';
  updateActiveFiltersBar(); render();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn'+v.charAt(0).toUpperCase()+v.slice(1)).classList.add('active');
  render();
}

function openModal(id) {
  const s = SPEECHES.find(x => x.id === id);
  if (!s) return;
  const color = CAT_COLORS[s.category] || '#6b7280';
  const catEl = document.getElementById('modalCat');
  catEl.textContent = s.category;
  catEl.style.cssText = `--card-color:${color};background:color-mix(in srgb,${color} 20%,transparent);color:${color};border:1px solid color-mix(in srgb,${color} 40%,transparent)`;
  document.getElementById('modalTitle').textContent = s.title || s.filename.replace('.txt','');
  document.getElementById('modalMeta').innerHTML = `<span>📅 ${s.date || '날짜 미상'}</span><span>📁 ${s.filename}</span>`;
  const tagsDiv = document.getElementById('modalTags');
  const topicsHtml = s.topics.map(t => {
    const tc = TOPIC_COLORS[t] || '#6b7280';
    return `<span class="topic-badge" style="--t-color:${tc}">${t}</span>`;
  }).join('');
  const tagsHtml = s.tags.map(t => `<span class="tag">#${t}</span>`).join('');
  tagsDiv.innerHTML = `<div class="modal-topics">${topicsHtml}</div>${tagsHtml}`;
  document.getElementById('modalContent').textContent = s.content;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

// ===== THEME TOGGLE =====
let isDark = true;
function applyTheme(dark) {
  isDark = dark;
  if (dark) {
    document.body.classList.remove('light');
    document.getElementById('themeIcon').textContent = '🌙';
    document.getElementById('themeLabel').textContent = '다크';
  } else {
    document.body.classList.add('light');
    document.getElementById('themeIcon').textContent = '☀️';
    document.getElementById('themeLabel').textContent = '라이트';
  }
  try { localStorage.setItem('kkutbot-theme', dark ? 'dark' : 'light'); } catch(e) {}
}
function toggleTheme() { applyTheme(!isDark); }

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim();
  document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
  updateActiveFiltersBar(); render();
});
document.getElementById('searchClear').onclick = clearSearch;
document.getElementById('mobileMenu').onclick = () => document.getElementById('sidebar').classList.toggle('open');
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open'); });

// Restore theme
(function() {
  try { if (localStorage.getItem('kkutbot-theme') === 'light') applyTheme(false); } catch(e) {}
})();

// Init
buildSidebar();
render();
</script>
</body>
</html>
