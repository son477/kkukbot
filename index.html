이재명 정부는 민주당 힘만으로 세워지지 않았습니다.\n다양하고 다채로운 응원봉을 들고 나온 주권자들의 힘의 결실입니다.\n다양하고 다채로운 국민의 희망과 요구를 기꺼이 껴안아야 합니다.\n그래야 지지기반이 확대됩니다. \n이재명 정부가 성공하고, 민주 정부를 재창출할 수 있습니다.\n그것은 조국혁신당의 한결같은 바람이기도 합니다.     /끝"}, {"id": 155, "filename": "2025.12.6 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-06", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "페이스북"], "preview": "2025.12.6 조국 대표 페이스북 메시지  전국 법원장 회의, 뒷북도 한참 뒷북이다. 12.3 내란에 맞서 온 국민이 싸울 때 침묵하다가 이제서야 ‘위헌’이라고 말한다. 법원 차원에서 대법원 예규를 만들어 내란전담재판부를 만들 수 있었음에도 만들지 않았다. 이러니 입법부가 ‘내란특별재판부’ 설치를 추진할 수 밖에 없었던 것이다.  물론 조국혁신당이 발표했듯이, 내란특별재판부법에 위헌 소지를 말끔이 없애야 한다. 그렇지 않으면 위헌제청과 피고...", "content": "2025.12.6 조국 대표 페이스북 메시지\n\n전국 법원장 회의, 뒷북도 한참 뒷북이다. 12.3 내란에 맞서 온 국민이 싸울 때 침묵하다가 이제서야 ‘위헌’이라고 말한다. 법원 차원에서 대법원 예규를 만들어 내란전담재판부를 만들 수 있었음에도 만들지 않았다. 이러니 입법부가 ‘내란특별재판부’ 설치를 추진할 수 밖에 없었던 것이다. \n물론 조국혁신당이 발표했듯이, 내란특별재판부법에 위헌 소지를 말끔이 없애야 한다. 그렇지 않으면 위헌제청과 피고인 석방이라는 사태가 발생할 가능성이 엄존하기 때문이다(이 판단은 국회가 하지 않는다). 현재 진행되는 내란 재판에 대한 국민의 우려와 불안을 불식해야 한다는 당위를 외치는 것만이 입법부의 역할이 아니다. 법안 조문 하나하나를 냉정하게 따지고 검토하여 모든 위험성을 제거해야 하는 것도 입법부의 역할이다. 집권여당 민주당이 현명하게 처리해줄 것을 기대한다."}, {"id": 156, "filename": "2025.12.03 로텐다 홀 지도부 의원 연석회의 모두 발언.txt", "title": "로텐다 홀 지도부 의원 연석회의 모두 발언", "date": "2025-12-03", "category": "기타", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "윤석열"], "preview": "2025. 12.03 08:45 로텐다 홀 지도부 의원 연석회의 모두 발언  존경하는 국민 여러분, 사랑하는 당원 동지 여러분, 조국혁신당 대표 조국입니다. 이 자리에 다시 서니, 만감이 교차합니다. 술 취한 폭군 윤석열이 불법 비상계엄을 선포한 지 1년이 지났습니다.  생생하게 기억합니다. 천둥처럼 날아오던 헬리콥터들, 총을 들고 뛰어오던 특수부대원들.  조국혁신당 지도부와 의원들은 국회로 달려왔습니다. 목숨을 건 위험을 감수하고 국회 담장을...", "content": "2025. 12.03 08:45\n로텐다 홀 지도부 의원 연석회의 모두 발언\n\n존경하는 국민 여러분, 사랑하는 당원 동지 여러분,\n조국혁신당 대표 조국입니다.\n이 자리에 다시 서니, 만감이 교차합니다.\n술 취한 폭군 윤석열이 불법 비상계엄을 선포한 지 1년이 지났습니다.\n\n생생하게 기억합니다.\n천둥처럼 날아오던 헬리콥터들,\n총을 들고 뛰어오던 특수부대원들.\n\n조국혁신당 지도부와 의원들은 국회로 달려왔습니다.\n목숨을 건 위험을 감수하고 국회 담장을 넘어,\n의원 12명 전원이 바로 이곳 로텐더 홀에 모였습니다.\n순간순간이 급박했습니다. 위태로웠습니다.\n\n그렇지만 우리가 이긴다고 확신했습니다.\n당시 저는 바로 이 자리에서 \n\"국회로 모여, 민주주의를 지켜주십시오”라고 외쳤습니다.\n\"군은 위헌·위법한 계엄령에 따르지 말라”고 경고했습니다.\n\n기적 같은 일들이 일어났습니다.\n국민들이 국회 앞을 가득 메웠습니다.\n맨몸으로 장갑차를 막고, 총을 든 군인을 막아섰습니다.\n민주 대(對) 독재, 애국 대 매국, 헌정수호 대 국헌문란,\n제복 입은 시민 군인 대 군사 반란 지휘부의 대결이었습니다.\n그리고 끝내 우리는 이겼습니다.\n\n존경하는 국민 여러분, 사랑하는 당원 동지 여러분,\n감히 자부합니다.\n윤석열 독재정권 격퇴, 누가 선봉에서 서서 싸웠습니까?\n\n지난해 2월 \"3년은 너무 길다”를 처음 외쳤습니다.\n다들 탄핵의 ‘탄 ’자도 언급을 꺼렸지만,\n7월 20일 전당원대회에서 이렇게 외쳤습니다.\n\"술 취한 선장을 끌어내야 한다. 윤석열 당신은 대통령 자격이 없다.”\n10월 26일 정당 최초로 윤석열 탄핵 장외집회를 열었습니다.\n그때부터 박성재 법무장관은 법무부 검사로부터 집회 동향을 불법 보고 받았습니다.\n\n11월 20일 광화문 이순신 동상 앞에서\n15개 사항으로 구성된 윤석열 탄핵안을 처음 공개했습니다.\n윤석열의 무도·무능·무책임에 대한 시민 분노가 치솟고\n‘왕 게임’을 하던 배우자 김건희 씨에 대한 수사가 조여왔습니다.\n이에 윤석열은 자멸적인 친위쿠데타를 일으켰습니다.\n저희는 그 다음 날 12월 4일 내란죄를 포함한 탄핵안을\n정당 사상 처음으로 내놓았습니다.\n\n조국혁신당은 국민과 함께 기나긴 투쟁을 시작했습니다.\n광화문 천막당사부터 전국 응원봉과 K팝 시위까지, 축제 같은 저항이었습니다.\n그리고 윤석열은 파면되었습니다. \n\n비상계엄 1년, 민주주의 회복을 축하합시다. \n그러나 내란옹호세력은 변함이 없습니다. \n국민의힘은 ‘내란 주요 임무 종사당’ 역할을 합니다.\n“윤 어게인” 무리, 부정선거 음모론자, 뉴라이트 친일 파쇼들은\n좀비처럼 돌아다닙니다.\n윤석열 정권의 주구였던 검찰은 반성은커녕 반격할 기회를 엿보고 있습니다.\n내란에 무심했지만 대선에는 적극 개입했던 법원은 개혁을 거부하고 있습니다.\n\n그러나, 저는 다시 확신합니다.\n우리는 이길 것입니다. 새로운 대한민국은 만들어질 것입니다.\n\n국민 여러분, 당원 동지들께 약속드립니다.\n조국혁신당은 지난해 총선 때부터\n“가장 앞에서 싸우고, 가장 끝까지 싸우겠다”고 했습니다.\n지치지도 않고, 머뭇거리지 않겠습니다.\n조국혁신당, 아직 부족함이 많지만 \n오로지 국민만 믿고, 국민과 함께 가겠습니다.\n탄핵의 벽을 쇄빙했고, 내란 종식을 예인해왔습니다.\n내년 지방선거에서, 이어 28년 총선에서 \n차례차례 국민의힘을 격퇴하여\n내란 정치세력을 제로로 만들겠습니다.\n우리는 이길 것입니다.\n감사합니다.     /끝"}, {"id": 157, "filename": "2025.12.03 진보개혁4당 정치개혁 연석회의 대표단 모두발언.txt", "title": "진보개혁4당 정치개혁 연석회의 대표단 모두발언", "date": "2025-12-03", "category": "현장발언", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["내란", "윤석열"], "preview": "2025. 12.03 15:00 진보개혁4당 정치개혁 연석회의 대표단 모두발언  안녕하십니까, 조국혁신당 대표 조국입니다.  오늘은 12·3 내란이 발생한 지 1년이 되는 날입니다. 술취한 폭군 윤석열은 자신과 배우자 김건희의 범죄를 덮기 위해  비상계엄을 선포했습니다. 북한의 자극하여 도발을 유도하려 했습니다. 국회의원, 언론인, 판사, 시민운동가를 체포하고 죽이려 했습니다.  그날 밤 의원들은 국회 담장을 넘어 본회의장으로 들어갔습니다. 국...", "content": "2025. 12.03 15:00\n진보개혁4당 정치개혁 연석회의 대표단 모두발언\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n\n오늘은 12·3 내란이 발생한 지 1년이 되는 날입니다.\n술취한 폭군 윤석열은 자신과 배우자 김건희의 범죄를 덮기 위해 \n비상계엄을 선포했습니다.\n북한의 자극하여 도발을 유도하려 했습니다.\n국회의원, 언론인, 판사, 시민운동가를 체포하고 죽이려 했습니다.\n\n그날 밤 의원들은 국회 담장을 넘어 본회의장으로 들어갔습니다.\n국민들은 국회 담장 밖에서 맨몸, 맨손으로 군인을 막았습니다.\n그런 목숨을 건 싸움으로 내란을 격퇴했습니다.\n\n내란을 격퇴하고 민주주의를 회복하는 과정에서 \n수많은 국민적 요구가 분출했습니다.\n‘빛의 혁명’을 밝힌 응원봉의 모양과 색깔처럼\n다양하고 다채로운 주권자의 꿈과 희망을 정치가 담아야 합니다. \n현재의 거대 양당 체제만으로는 불가능합니다.\n다양한 민주 개혁적 소수 정당들이 정치에서 배제되지 않을 때,\n비로소 주권자의 다양한 목소리가 대표될 수 있습니다.\n\n이것이 우리가 주창하는 정치개혁의 핵심입니다.\n이는 특히 대선 전 이루어졌던 원탁회의의 합의문은 이행되어야 합니다.\n이재명 대통령님은 정치개혁 논의를 지지하고 계십니다.\n집권당인 민주당이 약속을 지켜주시기 바랍니다.\n\n개혁진보 4당은 동원할 수 있는 모든 방법으로\n다양성이 숨 쉬는 민주주의 실현에 앞장서겠습니다.\n국민이 맡긴 역할과 우리가 할 수 있는 모든 일을\n멈추지 않고 실행해, \n미래를 만들겠습니다.\n\n1년 전 그날 밤, 수많은 시민이 모여 민주주의를 지켜냈습니다.\n오늘 이 자리에 모인 개혁진보 4당 대표단도\n그처럼 대한민국 정치개혁을 해낼 것을 확신합니다.\n\n감사합니다.    /끝\n\n◎ 향후 추진계획에 대해 말씀드리겠습니다.\n\n개혁진보 4당은 우원식 국회의장, 민주당 정청래 대표, 국민의힘 장동혁 대표와의 면담을 추진할 예정입니다. 면담의 핵심 요구사항은 ‘4당 공동 요구안 전달, 그 처리를 위한 정개특위 즉각 구성’입니다. 개혁진보 4당 대표단이 함께하는 공동 면담 형식이 될 것입니다.\n\n이를 위한 실무 단위인 정치개혁 연석회의 기획단은 12월 4일부터 국회의장실,\n민주당 대표실, 국민의힘 대표실을 차례로 방문해 정식 공문을 접수할 예정입니다.\n\n제가 더불어민주당 정청래 대표를 예방했을 때 정 대표님도 정개특위 구성 필요성을\n언급하셨습니다. 정개특위를 즉시 구성해 주십사 다시 한번 요청합니다.\n\n오늘 우리 개혁진보 4당은 중대선거구제 도입, 기초의원 비례대표 확대, 결선투표제 도입\n등 공직선거법 개정, 지역 정당 관련 정당법 개정을 합의하고 공동발의를 추진하기로\n하였습니다. 연합정치도 저희의 주요한 의제입니다.\n\n추가되는 개혁 의제들이 있습니다. 향후 기획단에서 논의하여 공동발의에 담을 예정입니다.\n/끝"}, {"id": 158, "filename": "2025.12.3 내란1년 사회대개혁 시민대행진 현장발언.txt", "title": "내란1년 사회대개혁 시민대행진 현장발언", "date": "2025-12-03", "category": "현장발언", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "윤석열"], "preview": "2025.12.3 내란 1년 <내란외환 청산과 종식, 사회대개혁 시민대행진> ■ 조국 당대표 존경하는 국민 여러분, 안녕하십니까. 조국혁신당 대표 조국입니다. 추운 날씨에도 많은 분이 모이셨습니다. 1년 전 오늘, 술 취한 미치광이 윤석열은 자신의 범죄와 배우자 김건희의 범죄를 은폐하고 자신의 반대자 비판자를 없애기 위해서 내란을 일으켰습니다. 그렇지만, 바로 오늘 이 자리에 모이신 주권자 국민들의 힘찬 용기와 싸움으로 그들을 격퇴했습니다. 윤...", "content": "2025.12.3 내란 1년 <내란외환 청산과 종식, 사회대개혁 시민대행진>\n■ 조국 당대표\n존경하는 국민 여러분, 안녕하십니까. 조국혁신당 대표 조국입니다.\n추운 날씨에도 많은 분이 모이셨습니다. 1년 전 오늘, 술 취한 미치광이 윤석열은 자신의 범죄와 배우자 김건희의 범죄를 은폐하고 자신의 반대자 비판자를 없애기 위해서 내란을 일으켰습니다.\n그렇지만, 바로 오늘 이 자리에 모이신 주권자 국민들의 힘찬 용기와 싸움으로 그들을 격퇴했습니다.\n윤석열과 김건희는 감옥에 갔습니다. 그 내란 일당들도 감옥에 갔습니다. 그렇지만 내란은 끝나지 않았습니다. 곳곳에 윤석열 일당들이 도사리고 복귀를 노리고 있습니다.\n국민의힘은 어떻습니까?\n여전히 윤어게인을 외치고 있습니다. 부정선거 음모론을 믿고 있습니다. 뉴라이트에 포획되어 있습니다.\n검찰은 어떻습니까. 윤석열 정권의 주구였던 검찰은 호시탐탐 복귀를 노립니다.\n내란의 침묵했고 대선에 개입했던 법원은 반성조차 하지 않고 있습니다.\n그렇지만, 우리는 이길 것입니다.\n왜냐하면, 여러분이 계시기 때문입니다. 그렇지 않습니까?\n내란 세력을 완전히 청산하고 내란 이후의 대한민국을 만드실 결기가 있습니까. 그럴각오가 되어 있습니까. 그럴용기가 있으십니까.\n조국혁신당 “3년은너무길다” 외치고 지금까지 왔습니다. 앞으로도 내란세력의 완전한 격퇴, 내란 이후의 대한민국을 위해서 끝까지 싸우겠습니다.\n함께 해주십시오."}, {"id": 159, "filename": "2025.12.1 장동혁 대표 예방 인사말씀.txt", "title": "장동혁 대표 예방 인사말씀", "date": "2025-12-01", "category": "기타", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["사법개혁", "윤석열", "민생", "의료", "내란", "검찰개혁"], "preview": "2025.12.1 장동혁 대표 예방 인사말  장동혁 대표님, 반갑습니다. 국민의힘 대표실 방문은 처음입니다. 대한민국은 하나의 바퀴로 달릴 수 없고, 진보와 보수 두 바퀴가 조화롭게 굴러가야 한다고 믿습니다. 그래야 우리 사회에 더 많은 평등과 더 넓은 기회를 불어넣을 수 있습니다 과거 한국의 보수정당은 대한민국 발전에 중요한 역할을 했습니다. 북방외교의 지평을 열었고, 건강보험과 국민연금을 처음 도입했습니다. 토지공개념 실현 노력도 보수 정부...", "content": "2025.12.1 장동혁 대표 예방 인사말\n\n장동혁 대표님, 반갑습니다.\n국민의힘 대표실 방문은 처음입니다.\n대한민국은 하나의 바퀴로 달릴 수 없고,\n진보와 보수 두 바퀴가 조화롭게 굴러가야 한다고 믿습니다.\n그래야 우리 사회에 더 많은 평등과 더 넓은 기회를 불어넣을 수 있습니다\n과거 한국의 보수정당은 대한민국 발전에 중요한 역할을 했습니다.\n북방외교의 지평을 열었고,\n건강보험과 국민연금을 처음 도입했습니다.\n토지공개념 실현 노력도 보수 정부가 우선 도입하고 실시했습니다.\n조국혁신당과 국민의힘이 정책은 다르지만 향후 정치개혁, 민생개혁 이런 주제와 관련해서는 얼마든지 합의점을 만들 수 있다고 생각합니다.\n장동혁 대표님께서 저의 대장동 항소 포기 토론을 받아주셔서 감사드립니다. 이미 저희 실무자가 여러 번 접촉한 걸로 알고 있습니다만 빨리 장소와 시간을 확정해서 대장동 사건 관련 수사·기소·재판 논의는 물론 이와 관련된 검찰개혁·사법개혁 문제까지 솔직하고 진지한 토론을 할 수 있기를 희망합니다.\n오늘 이후에 실무 단위에서 시간과 장소를 확정할 것으로 믿습니다.\n국민의힘 대표실 방문은 처음인데 제가 외람되지만 몇 말씀 올리도록 하겠습니다.\n아까 말씀드렸던 대한민국 발전에서 보수정당이 해온 역할은 존중하고 앞으로도 그렇게 되어야 한다고 믿습니다만,\n안타깝게도 현재 국민의힘은 보수의 가치와 많이 멀어진 것 같습니다. 당 중진과 지도부는 내란 우두머리 윤석열의 비호자, 황교안과 전광훈으로 대표되는 극우 태극기 부대의 대변자로 비춰집니다.\n국익을 생각하지 않고 중국 때리기에 몰두하는 것이 보입니다.\n오죽하면 보수 언론들조차 이대로는 안 된다고 말하고 있지 않습니까?\n장동혁 대표님은 지난해 12월 4일 새벽,\n비상계엄 해제 결의안에 찬성하셨습니다.\n소속 정당이 다르지만 감사했습니다.\n그런데 지금은 어떠신지 의문이 듭니다.\n마치 당시의 판단을 후회하는 것처럼 느껴집니다.\n곧 응원봉 혁명 1주년입니다. 계엄 1년을 맞이해서 윤석열 일당과 확실한 절연을 선언해주십시오.\n부정선거론자들, 사이비 종교단체 결탁 세력, 극우 파쇼 세력들과 절연해주십시오.\n민주당이 중도, 조국혁신당이 진보적 위치의 책임을 다할 것입니다. 국민의힘도 진정한 보수의 가치가 살아난 정치를 해주시기 바랍니다. 그 속에서 대한민국 정치가 발전되기를 믿습니다.\n/끝/"}, {"id": 160, "filename": "2025.12.1 제4차 최고위원회 모두발언.txt", "title": "제4차 최고위원회 모두발언", "date": "2025-12-01", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["최고위", "부동산", "민생", "내란", "개헌"], "preview": "2025.12.1 제4차 최고위원회 모두발언  안녕하십니까, 조국혁신당 대표 조국입니다. 조국혁신당이 토지공개념 재추진을 천명하자, 내란비호당에서 온갖 헛소리가 나옵니다. “자본주의 체제 부정”이라거나 “중국에서나 시행중인 제도”라고 합니다. “헌법 원칙 부정”이라고도 합니다. 황당무계한 정치선동이자 색깔론입니다.   토지공개념은 토지를 국유화하는 게 아닙니다. 개인의 토지 소유권을 인정하면서도, 공익을 위해 이용과 처분을 제한할 수 있다는 것...", "content": "2025.12.1 제4차 최고위원회 모두발언\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n조국혁신당이 토지공개념 재추진을 천명하자, 내란비호당에서 온갖 헛소리가 나옵니다.\n“자본주의 체제 부정”이라거나 “중국에서나 시행중인 제도”라고 합니다.\n“헌법 원칙 부정”이라고도 합니다.\n황당무계한 정치선동이자 색깔론입니다. \n\n토지공개념은 토지를 국유화하는 게 아닙니다.\n개인의 토지 소유권을 인정하면서도,\n공익을 위해 이용과 처분을 제한할 수 있다는 것입니다.\n\n우리나라는 보수가 토지공개념 제도를 도입하고 주장했습니다.\n이승만 정권 때 헌법에 경자유전, 소작 금지를 명시하고,\n법으로 농지개혁을 실시했습니다.\n박정희 군사정권이 만들었던 유신헌법에 이런 내용이 있습니다.\n“국토의 효율적인 이용·개발과 보전을 위해\n법률이 정하는 바에 의해 필요한 제한과 의무를 부과할 수 있다.”\n노태우 정부도 집값이 급등하자, 강력한 토지공개념 3법을 내놓았습니다.\n이들이 자본주의 체제를 부정하려 했습니까?\n\n외국의 예를 봅시다.\n홍콩과 싱가포르는 전 국토에 토지 공공임대제를 적용하고 있습니다.\n핀란드 수도 헬싱키의 경우 토지 60% 정도가 정부 소유입니다.\n이스라엘, 스웨덴, 덴마크도 부분적으로 토지공공임대제를 시행합니다.\n이 나라들이 중국식 공산주의를 따르고 있습니까?\n\n이념의 색안경을 벗고 사태의 본질을 보십시오.\n부동산 문제는 불평등과 불공정의 주원인입니다.\n서민과 청년은 치솟는 부동산을 쫓아가기에 버겁습니다.\n무주택의 설움은 그들 자녀에게 대물림됩니다.\n\n시장 만능주의자들은 말합니다.\n“시장에 맡겨라. 보이지 않는 손이 조절한다.”\n그런데 ‘보이지 않는 손’에 맡겼더니,\n결국 ‘보이지 않는 큰 손’만 배 불렸습니다.\n이제 국가가 나서 해결에 나서야 합니다.\n\n위헌 운운하는 이들도 있습니다.\n그렇지만 헌법재판소는 1989년 토지거래허가제 심판에서 분명히 밝혔습니다.\n“토지 소유권은 절대적일 수 없으며, 공공의 이익을 위해 제약될 수 있다.”\n\n저는 문재인 정부 시절 민정수석으로 \n대통령의 뜻에 따라 개헌안 작성작업을 한 바 있습니다.\n당시 “토지의 공공성과 합리적 사용을 위하여 필요한 경우\n특별한 제한을 하거나 의무를 부과할 수 있도록”하는 내용을 명시했습니다.\n2018년 3월 이 내용을 발표하면서,\n “국민 간의 소득격차, 빈곤의 대물림,\n중산층 붕괴 등 양극화가 경제성장과 국민통합을 가로막는 상황이다.\n이런 문제를 해결하지 않으면 대한민국 미래는 어두울 수밖에 없다”라고 \n이유를 설명했습니다.\n\n7년이 지났지만, 부동산 문제와 사회적 불평등은 악화 일로입니다.\n이제 악순환을 끊어야 합니다. \n조국혁신당이 나서겠습니다.\n조속한 시기에 당에 ‘토지공개념 재입법 추진단’을 결성하겠습니다.\n헌재가 문제 삼은 부분을 해소한 토지공개념 3법을 제·개정하겠습니다.\n\n택지소유상한에 관한 법률을 새로 만들겠습니다.\n이를테면, 택지소유상한 기준을 400평으로 하고,\n5년 이상 실거주자는 600평까지 인정합니다.\n(※위헌 당시 일률적으로 200평)\n개발이익환수에 관한 법률을 고치겠습니다.\n예컨대, 부담률을 1990년 법제정 당시 기준인 100분의 50 이상으로 재인상하고,\n(※現 25/100)\n마련된 재원은 균형발전과 서민 청년 주거생활 안정 도모에 씁니다.\n\n주택 공급에 대한 구체적 구상도 있습니다.\n미군 부대가 떠난 자리에 국민 세금을 들여 서울 용산공원만 조성하면\n인근 아파트 소유자만 큰 혜택을 봅니다.\n용산공원 둘레에 100% 고품질 임대주택을 지으면,\n주택 공급과 훌륭한 공원 조성이라는 일거양득이 될 것입니다.\n향후 대법원, 대검찰청, 헌법재판소, 감사원 등을 지역으로 이전하고\n그 부지에 고품질 임대주택을 지을 수 있습니다.\n\n조국혁신당은 국민의 상식, 헌법 정신에 따라\n불평등과 불공정, 투기를 내리누르고\n국민 주거권을 보장하는 길을 책임 있게 걸어가겠습니다.    /끝"}, {"id": 161, "filename": "2025.11.30 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-30", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["개헌", "페이스북", "윤석열"], "preview": "2025.11.30 조국 대표 페이스북 메시지  1. 국힘 당무감사위원장이 바뀐 후 신속하게 한동훈에 대한 감사에 착수했다. 새로운 당무감사위원장 이호선 국민대 교수는 윤석열 탄핵을 반대하고 사전투표 폐지를 주장한 강경보수 법학자다. 이 교수는 한동훈 같은 스타일의 사람을 매우 싫어하는 것으로 안다.  이제 한동훈이 당대표 시절 조사를 하지 않았던 당원게시판 사건의 진상은 밝혀질 것이다. 당내 토론의 자유 있지만, 집권당 대표의 가족이 나서서 ...", "content": "2025.11.30 조국 대표 페이스북 메시지\n\n1.\n국힘 당무감사위원장이 바뀐 후 신속하게 한동훈에 대한 감사에 착수했다. 새로운 당무감사위원장 이호선 국민대 교수는 윤석열 탄핵을 반대하고 사전투표 폐지를 주장한 강경보수 법학자다. 이 교수는 한동훈 같은 스타일의 사람을 매우 싫어하는 것으로 안다. \n이제 한동훈이 당대표 시절 조사를 하지 않았던 당원게시판 사건의 진상은 밝혀질 것이다. 당내 토론의 자유 있지만, 집권당 대표의 가족이 나서서 익명게시판에 대통령 비난 글을 썼다면, 특이함을 넘어 경망(輕妄)한 가족이다. 사실이라면 본인이 인정하고 이유를 밝히고, 사실이 아니면 정식으로 아니라고 단호하게 말하면 되지 왜 말을 빙빙 돌리는 것인가.\n향후 어떤 선거에서건 한동훈이 국힘 공천을 받는 일은 없을 것 같다. 현재 국힘 당원 구조에서 한동훈이 당권을 잡을 가능성도 없다. 그렇다고 한동훈은 탈당하여 신당을 만들 배짱도 용기도 없다. 차라리 과감히 신당을 만든 이준석이 더 용감하다.\n한동훈이 바라는 것은 내년 지선에서 국힘이 대패하여 장동혁 체제가 무너지는 것이다. 이럴 경우에만 자신에게 기회가 생기므로. 국힘 당권파는 이러한 한동훈의 속셈을 잘 알고 있으니, 더욱 싫어한다. 이하 사진처럼, 이들은 한동훈을 “국민의 짐”이라고 부르고 있다.\n2.\n국힘은 극우화되어 저 멀리 간 사이, 그리고 집안 싸움에 여념이 없는 사이에 민주당이 ‘중도 보수’를 장악했다. 김용남 전 의원 같은 검사 출신 국힘 정치인이 개혁신당을 거쳐 민주당에 들어간 것이 증표다. 좋은 일이다. \n조국혁신당이 비록 신생영세정당이지만 '중도 진보'의 운동장을 열심히 뛸 것이다. 주거권 등 사회권 보장, 토지공개념 재입법화, 소득과 자산의 불평등 완화, 연합정치 활성화를 위한 정치개혁, 차별금지법 제정 등 인권개혁 등등 민주당이 하지 않는 시대적 과제를 수행할 것이다. 이 모든 과제는 '제7공화국'으로 수렴된다. \n조국혁신당이 처한 상황, 녹록지 않다. 그러나 난관은 극복하라고 있는 것이다. 조소, 야유, 비난, 저주를 모두 감당하며 한 걸음의 진전을 이루어내는 것이 ‘선수’의 책무다.\n극우 정당 국힘은 더욱 주변화, 소수화되어야 한다. 내년 지선에서 범민주개혁정당은 연대를 통하여 국힘을 제로로 만들고, 새로운 정치지형을 만들어야 한다. 그렇게 되겠냐고? 연대만 하면 실현가능하다! 그런데 소수지만 일부 민주당 지지자와 유튜버들이 나와 조국혁신당을 비난하는데 열을 올리고 있다. 과거 총선과 재보궐선거 시기 일어난 현상의 재현이다. 안타까운 일이다. 이 점에서 역시 박지원 의원이 ‘정치 9단’이고, '프로'시다. 의견 차이가 있더라도 넓게 가야 이긴다. 크게 가야 이긴다.\n추신: 한동훈이 윤석열이 자신을 잡아 죽이려 한다는 것을 안 후 결별했다. 그러나 그 전에는 \"있지도 않을 계엄\", \"외계인 대비법\" 운운하며 조롱하고 비방했음을 잊어서는 안된다. 이 때도 한동훈은 이재명, 김민석, 김병주 의원에게 토론을 제안했었다. 한동훈은 이 세 사람에게 사과부터 해야 할 것이다."}, {"id": 162, "filename": "2025.11.28 조국 대표 페이스북 메시지 박성재 전 장관 조국혁신당 사찰 의혹입장.txt", "title": "조국 대표 페이스북 메시지 박성재 전 장관 조국혁신당 사찰 의혹입장", "date": "2025-11-28", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북", "윤석열"], "preview": "2025.11.28 조국 대표 페이스북 메시지 <박성재 전 장관 조국혁신당 사찰 의혹관련 입장>  박성재가 나와 조국혁신당의 동향을 사찰했음이 확인되었다. 박성재는 이를 윤석열에게 보고했을 것이다. 계엄 후 나는 체포 및 수감 대상이었다. 나와 조국혁신당이 윤석열 일당에게 얼마나 눈엣가시였는지 보여준다. 이 자들은 법무부를 동원하여 독재정권이 하던 불법사찰까지 벌였다. 이러한 불법사찰의 이유와 목적, 사찰의 참여자 및 보고 경로 모두 밝혀져야 ...", "content": "2025.11.28 조국 대표 페이스북 메시지 <박성재 전 장관 조국혁신당 사찰 의혹관련 입장>\n\n박성재가 나와 조국혁신당의 동향을 사찰했음이 확인되었다. 박성재는 이를 윤석열에게 보고했을 것이다. 계엄 후 나는 체포 및 수감 대상이었다. 나와 조국혁신당이 윤석열 일당에게 얼마나 눈엣가시였는지 보여준다. 이 자들은 법무부를 동원하여 독재정권이 하던 불법사찰까지 벌였다. 이러한 불법사찰의 이유와 목적, 사찰의 참여자 및 보고 경로 모두 밝혀져야 한다. 절대 가만두지 않겠다! "}, {"id": 163, "filename": "2025.11.28 조국 대표 페이스북 메시지 한덕수 15년 구형에 따른 내란양형 예상.txt", "title": "조국 대표 페이스북 메시지 한덕수 15년 구형에 따른 내란양형 예상", "date": "2025-11-28", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2025.11.28 조국 대표 페이스북 메시지 <한덕수 15년 구형에 따른 내란양형 예상>  한덕수 총리 구형 15년(특검의 판단으로 '내란 방조')을 기초로, 윤석열 정권 장관 중 내란에 관여한 국무위원들에 대한 구형을 대충 예상해본다. 1. 윤석열 대통령(구속): 무기 2. 김용현 국방부장관(구속): 30-35년 3. 이상민 행안부장관(구속): 25-30년 4. 박성재 법무부장관(혐의 유무 다툼 이유로 불구속): 20-25년 이들은 한덕수 ...", "content": "2025.11.28 조국 대표 페이스북 메시지 <한덕수 15년 구형에 따른 내란양형 예상>\n\n한덕수 총리 구형 15년(특검의 판단으로 '내란 방조')을 기초로, 윤석열 정권 장관 중 내란에 관여한 국무위원들에 대한 구형을 대충 예상해본다.\n1. 윤석열 대통령(구속): 무기\n2. 김용현 국방부장관(구속): 30-35년\n3. 이상민 행안부장관(구속): 25-30년\n4. 박성재 법무부장관(혐의 유무 다툼 이유로 불구속): 20-25년\n이들은 한덕수 보다 내란 관여도가 훨씬 높다. V0 였던 김건희가 내란에도 관여했을 것이라는 합리적 의심이 있으나, 증거가 없는 상태이다. 윤석열이 계엄 후 뜬금없이 \"김건희는 몰랐다\"라는 말을 한 이유는 ‘보스’을 보호하려는 의도였을 것이라고 추측한다.\nCf. 이석기 전 통진당 의원의 경우 '내란 음모'로 기소되었는데, 20년 구형됨."}, {"id": 164, "filename": "2025.11.28 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-28", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북", "윤석열"], "preview": "2025.11.28 조국 대표 페이스북 메시지  이하 조갑제 선생의 글에서 확인되듯이, ‘국힘 제로’, ‘극우 제로’, 'TK 자민련'은 조국혁신당만 말하는 것이 아니다. 조 선생도 국힘이 소멸될 가능성이 70%라고 보고 있다. 조국혁신당은 “3년은 너무 길다”와 ’윤석열 탄핵‘을 단지 정치적 구호가 아니라 실현가능한 목표로 설정하고 싸웠고, 이 싸움은 윤석열의 자멸적 선택으로 연결되어 마침내 목표를 이루어냈다.  ’국힘 제로‘ 역시 마찬가지다...", "content": "2025.11.28 조국 대표 페이스북 메시지\n\n이하 조갑제 선생의 글에서 확인되듯이, ‘국힘 제로’, ‘극우 제로’, 'TK 자민련'은 조국혁신당만 말하는 것이 아니다. 조 선생도 국힘이 소멸될 가능성이 70%라고 보고 있다.\n조국혁신당은 “3년은 너무 길다”와 ’윤석열 탄핵‘을 단지 정치적 구호가 아니라 실현가능한 목표로 설정하고 싸웠고, 이 싸움은 윤석열의 자멸적 선택으로 연결되어 마침내 목표를 이루어냈다. \n’국힘 제로‘ 역시 마찬가지다. “3년은 너무 길다”를 외쳤을 때 성급한 또는 과장된 구호라는 ’평론‘ 많이 들었다. 나는 ‘평론’하기 위해 정치하지 않는다. 불가능해보이는 목표를 설정하고 다시 달려갈 것이다. '국힘 제로'를 목표로 싸워야 'TK 자민련'을 만들 수 있다. 이상을 달성하기 위해서는 '윤석열 탄핵'으로 뭉친 정치세력이 다시 연대해야 함은 물론이다."}, {"id": 165, "filename": "2025.11.27 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-27", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2025.11.27 조국 대표 페이스북 메시지  특검, 한덕수에 대하여 15년 구형.   특검은 한덕수를 ‘내란 방조’로 보고 있기에 이 정도를 구형한 것으로 보인다. 재판부가 공소장 변경을 요청했던 ‘내란 주요임무 종사’ 혐의를 인정하면, 중형 선고는 필연적이다. 한덕수, 올해 76세다. 서울대와 하바드를 졸업한 엘리트 경제관료의 몰락을 목도한다. 여러 번 반복하지만, 민주헌정은 엘리트가 아니라 국민이 지키는 것이다. 한덕수 외, 이번 내란 ...", "content": "2025.11.27 조국 대표 페이스북 메시지\n\n특검, 한덕수에 대하여 15년 구형. \n\n특검은 한덕수를 ‘내란 방조’로 보고 있기에 이 정도를 구형한 것으로 보인다. 재판부가 공소장 변경을 요청했던 ‘내란 주요임무 종사’ 혐의를 인정하면, 중형 선고는 필연적이다. 한덕수, 올해 76세다. 서울대와 하바드를 졸업한 엘리트 경제관료의 몰락을 목도한다. 여러 번 반복하지만, 민주헌정은 엘리트가 아니라 국민이 지키는 것이다. 한덕수 외, 이번 내란 과정에서 법무부장관, 검찰총장, 민정수석, 그리고 대법원장과 대법관 등등 법조 엘리트의 행태를 생각해보라. 동조하거나 침묵했다.\n계엄 후 국민의힘 대선후보가 되려 했던 진짜 이유가 무엇이었는지 확인한다. 특검 수사를 피하려고 대선 출마를 선택했던 것이다. 그리고 이번 구형으로 내란 우두머리 윤석열에 대한 구형량이 예상된다. 최소 무기징역 구형이다\n이하 기사는 한덕수의 변론 중 헛웃음을 나오게 한 변론이다."}, {"id": 166, "filename": "2025.11.26 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-26", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북", "윤석열"], "preview": "2025.11.26 조국 대표 페이스북 메시지  한동훈 당시 법무부장관은 이재명 대표 체포동의안을 설명할 때 이 대표가 대장동 사건의 주범인냥 몰았고, 노웅래 의원 체포동의안을 설명할 때는 생생한 묘사까지 하면서 체포필요성을 강조했다. ‘정치검사’의 DNA가 가감없이 드러냈다. 그러나 법원은 이런 주장 모두를 받아들이지 않았다. 노웅래 의원 무죄판결을 내리면서 재판부는 “검찰의 적법절차 위반 정도가 결코 가볍지 않다”며 검찰의 불법수사를 질타했...", "content": "2025.11.26 조국 대표 페이스북 메시지\n\n한동훈 당시 법무부장관은 이재명 대표 체포동의안을 설명할 때 이 대표가 대장동 사건의 주범인냥 몰았고, 노웅래 의원 체포동의안을 설명할 때는 생생한 묘사까지 하면서 체포필요성을 강조했다. ‘정치검사’의 DNA가 가감없이 드러냈다. 그러나 법원은 이런 주장 모두를 받아들이지 않았다. 노웅래 의원 무죄판결을 내리면서 재판부는 “검찰의 적법절차 위반 정도가 결코 가볍지 않다”며 검찰의 불법수사를 질타했다. 그럴리 없겠지만, 한동훈은 이재명, 노웅래 두 분에게 사과해야 한다. \n한동훈은 정치검사 중 엘리트로 승승장구하여 윤석열 정권의 황태자까지 되었다. 윤-김 부부의 눈 밖에 나기 전까지는 한동훈은 윤석열 정권 탄생과 유지의 핵심이었음을 잊어서는 안된다. 윤석열에게 부역했던 자들이 이제 한동훈을 ‘합리적 보수 정치인’인냥 치켜세우지만, 그는 뼛속까지 ‘정치검사’일 뿐이다."}, {"id": 167, "filename": "2025.11.25 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-25", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당", "인권·사회"], "tags": ["페이스북", "윤석열"], "preview": "2025.11.25 조국 대표 페이스북 메시지  윤석열 정권 하 김건희는 법무부장관을 지휘하는 존재였다. 법무부장관은 “네,네”하며 따랐을 것이다. 윤석열이 검찰총장 시절에는 김건희는 윤석열을 지휘했을 것이다. 윤석열도 “응, 응”하며 따랐을 것이다.  한동훈, 강백신, 엄희준 등 친윤 정치검사들은 \"형수님\" 하면서 알랑거렸을 것이고, 평검사들은 김건희를 중전마마로 받들었을 것임은 뻔하다. 많이 잊혀졌지만, 한동훈은 검사장 시절 김건희와 무려 ...", "content": "2025.11.25 조국 대표 페이스북 메시지\n\n윤석열 정권 하 김건희는 법무부장관을 지휘하는 존재였다. 법무부장관은 “네,네”하며 따랐을 것이다. 윤석열이 검찰총장 시절에는 김건희는 윤석열을 지휘했을 것이다. 윤석열도 “응, 응”하며 따랐을 것이다.  한동훈, 강백신, 엄희준 등 친윤 정치검사들은 \"형수님\" 하면서 알랑거렸을 것이고, 평검사들은 김건희를 중전마마로 받들었을 것임은 뻔하다. 많이 잊혀졌지만, 한동훈은 검사장 시절 김건희와 무려 332회 카톡을 주고 받았다. \n2019년 ‘조국 (가족) 수사’의 최초 지휘자도 김건희일 것이라고 의심한다. 공개된 김건희와의 대화 녹음을 들으면, 김건희는 유독 나를 비난하고 있다. 이유가 무엇이었을까? 의존하던 무당이나 역술인의 말에 따른 것은 아니었을까? 내가 ”대호(大虎) 프로젝트“ 수행에 최고의 걸림돌이었던가?\n한편, 김건희와의 통화를 자랑하고, 김건희 비판을 ‘여성혐오’라고 반박하고 특검을 해도 나올 것이 없을 것이라고 김건희를 비호하던 자들은 입을 닫고 있다. 그러면서 슬쩍 '친한동훈'으로 말을 갈아탔다."}, {"id": 168, "filename": "25.11.24 제2차 최고위 대표 모두발언.txt", "title": "제2차 최고위 대표 모두발언", "date": "2025-11-24", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "개헌", "윤석열"], "preview": "25.11.24 제2차 최고위 대표 모두발언  안녕하십니까, 조국혁신당의 새 대표 조국입니다. 이렇게 당 대표로 인사드리는 게 1년쯤 되는 듯합니다. 감회가 정말 남다릅니다.  어제 전당원대회에서 제게 뜨거운 성원을 보내주셨습니다. 압도적으로 지지해주셨습니다.  당원 동지들, 그리고 국민 여러분께 깊이 감사드립니다.   오늘은 조국혁신당 제2막의 첫날입니다. 조국혁신당은 지향, 문화, 태도 등 모든 면에서 다를 것입니다. 늘 혁신하고, 늘 새롭...", "content": "25.11.24 제2차 최고위 대표 모두발언\n\n안녕하십니까, 조국혁신당의 새 대표 조국입니다.\n이렇게 당 대표로 인사드리는 게 1년쯤 되는 듯합니다.\n감회가 정말 남다릅니다.\n\n어제 전당원대회에서 제게 뜨거운 성원을 보내주셨습니다.\n압도적으로 지지해주셨습니다. \n당원 동지들, 그리고 국민 여러분께 깊이 감사드립니다. \n\n오늘은 조국혁신당 제2막의 첫날입니다.\n조국혁신당은 지향, 문화, 태도 등 모든 면에서 다를 것입니다.\n늘 혁신하고, 늘 새롭겠습니다.\n그게 조국혁신당 제2막의 모습입니다.\n\n조국혁신당 제1막은 윤석열 검찰 독재정권 해체를 향한\n투쟁의 깃발을 드는 기간이었습니다.\n조국혁신당 제2막은 내란을 완전히 종식하고\n제7공화국 문을 여는 신세기가 될 것입니다.\n\n저는 조국혁신당 제2막의 성공을 확신합니다.\n세 가지 이유입니다.\n첫째, 조국혁신당에는 성공 DNA가 있습니다.\n모두 고개를 젓던 윤석열 탄핵과 검찰 해체,\n바로 조국혁신당이 처음 부르짖었고, 마침내 해냈습니다.\n윤석열의 내란을 막고 민주주의를 회복하고 정권을 교체하는데, \n자부하건대 조국혁신당은 한 축을 담당했습니다.\n\n두 번째, 우리 당원들의 강철같은 의지입니다.\n어제 전당원대회를 보신 분들은 느끼셨을 것입니다.\n당원들은 저에게 명령하셨습니다.\n“진군하라, 멈추지 말라, 직진하라.”\n또 ‘1%의 가능성에 도전할 때 어깨 걸고 가보시겠느냐’고\n당원들께 여쭸습니다.\n0.1초의 망설임도 없이 천둥처럼 동의해주셨습니다.\n전율을 느낀 건 저 혼자만은 아니었을 것입니다.\n\n세 번째, 이는 거스를 수 없는 대한민국의 흐름입니다.\n독재, 독점, 독단은 이미 쇠했습니다.\n밀실, 폐쇄, 짬짜미는 명이 다했습니다.\n\n대신 조국혁신당의 이상이 뉴노멀이 됐습니다.\n정치·경제·사회·문화 모든 면에서\n다원화와 다양화가 이루어지는 나라,\n기득권 유지와 능력주의 맹신이 아니라\n연대와 나눔이 삶을 살찌우는 나라,\n그게 조국혁신당의 비전입니다.\n그래서 실패할 수 없습니다.\n\n조국혁신당은 내란 종식이라는 목표에서 한눈팔지 않겠습니다.\n높은 곳에서 국민을 내려다보는 통치가 아니라,\n매일매일 “국민의 하루를 책임지는 정치”를 하겠습니다.\n제7공화국, 사회권 선진국, 행복이 권리인 나라를 향해\n구체적 정책을 내고, 뚜벅뚜벅 걸어가겠습니다.\n\n어제 이를 위해 토지공개념 입법화, 행정수도 이전, 보유세 정상화,\n토지주택은행 설립과 국민 리츠 시행, 전세사기 특별법 처리 등\n주거권 공약을 내놓았습니다.\n앞으로 돌봄권, 건강권 등 사회권 공약을 연속으로 내놓겠습니다.\n\n국회 개헌연대 구성을 시작으로 국민 개헌연대로 확장하는 등\n개헌의 쇄빙선이 되겠습니다.\n지방선거와 지방분권 개헌 동시 투표도 저희의 약속입니다.\n\n국민께 감히 요청 드립니다.\n조국혁신당은 이제 두 돌을 앞두고 있습니다.\n미흡합니다. 부족한 점이 있으면 매섭게 혼내주십시오.\n그렇지만 조국혁신당에 대한 믿음만은 거두지 말아주십시오.\n저희가 믿고 기댈 곳은 국민뿐입니다.  /끝/"}, {"id": 169, "filename": "2025.11.18 조국 대표 페이스북 메시지 대장동 1심 관련 판결 입장.txt", "title": "조국 대표 페이스북 메시지 대장동 1심 관련 판결 입장", "date": "2025-11-18", "category": "페이스북 메시지", "topics": ["검찰·사법개혁"], "tags": ["페이스북"], "preview": "2025.11.18 조국 대표 페이스북 메시지 대장동 1심 관련 판결 입장  언론 기사를 보니, 대장동 사건 1심 판결 관련하여 오해가 있다.  1. 1심 법원은 “성남도시공사가 민사소송으로 피해회복이 어려워보인다는 사정이 있다”라고 판단하고 민사소송 대신 피고인으로부터 범죄수익 433억 원을 몰수 추징한다고 결정했다. 통상은 민사소송의 처리해야 하나, 이 경우는 예외라는 것이다. 우리나라는 ‘독립몰수’ 제도가 없다. 그 다음 부분부터 오해가 ...", "content": "2025.11.18 조국 대표 페이스북 메시지 대장동 1심 관련 판결 입장\n\n언론 기사를 보니, 대장동 사건 1심 판결 관련하여 오해가 있다. \n1.\n1심 법원은 “성남도시공사가 민사소송으로 피해회복이 어려워보인다는 사정이 있다”라고 판단하고 민사소송 대신 피고인으로부터 범죄수익 433억 원을 몰수 추징한다고 결정했다. 통상은 민사소송의 처리해야 하나, 이 경우는 예외라는 것이다. 우리나라는 ‘독립몰수’ 제도가 없다. 그 다음 부분부터 오해가 있다. 이 433억 원은 추후 피해를 본—이미 민사소송을 제기한—성남도시공사에 지급된다.\n2. \n1심 법원은 대장동 사건 2차 수사팀(엄희준, 강백신 등)이 무리하게 기소한 이해충돌방지법의 경우 공소시효가 끝났다고 명확히 밝히고 있다. 이는 2차 수사팀이 얼마나 무리하게 수사, 기소를 했는지 보여주는 예다. 항소를 했더라도 이해충돌방지법 위반이 인정될 가능성은 0이었을 것이다. 따라서 동법 위반에 따라 얼마를 더 환수할 수 있다고 주장하는 것 자체가 정치적 선동이다."}, {"id": 170, "filename": "2025.11.18 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-18", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북", "윤석열"], "preview": "2025.11.18 조국 대표 페이스북 메시지  대통령 경호처가 졸업식에 참석하여 항의하는 대학원생의 입을 막고 끌어내고 정권 차원에서 언론인을 억압하고 처벌하려 했던 것과, 집단항명 검사장을 강등 또는 징계하는 것이 같다? 과잉동일화다. ‘윤석열 검찰’의 문재인 정부 인사 및 이재명 대통령에 대한 표적 수사—많은 사건이 무죄가 났고 선고유예, 집행유예 등 가벼운 선고가 내려졌다—를 과도할 지 모르나 정당한 법집행이니 감수해야 한다고 주장했던 ...", "content": "2025.11.18 조국 대표 페이스북 메시지\n\n대통령 경호처가 졸업식에 참석하여 항의하는 대학원생의 입을 막고 끌어내고 정권 차원에서 언론인을 억압하고 처벌하려 했던 것과, 집단항명 검사장을 강등 또는 징계하는 것이 같다? 과잉동일화다. ‘윤석열 검찰’의 문재인 정부 인사 및 이재명 대통령에 대한 표적 수사—많은 사건이 무죄가 났고 선고유예, 집행유예 등 가벼운 선고가 내려졌다—를 과도할 지 모르나 정당한 법집행이니 감수해야 한다고 주장했던 논리가 재현된 것 같다. ‘검찰권 통제’가 필요한 시대에 ‘검찰권 독립’을 강조하는 논리는 그럴싸하게 들리지만 결국 현실과 괴리된 주장으로 이어진다.\n정의당은 검찰에 대한 과잉신뢰에서 벗어나지 못하고 있다. 과거 정의당 지도부 일부는 검찰을 거악시하는 것은 시대착오라고 강변했고, 당론으로 이재명 대표에 대한 체포동의안에 찬성표를 던졌다. 2022년 심상정 대선후보가 이재명은 “행정독재”, 윤석열은 “검찰독재”라고 규정했을 때 드러났지만, 정의당에게는 이재명이나 윤석열이나 똑같다."}, {"id": 171, "filename": "2025.11.17 조국혁신당 조국 당대표 후보 전남도의회 기자회견 모두발언.txt", "title": "조국혁신당 조국 당대표 후보 전남도의회 기자회견 모두발언", "date": "2025-11-17", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["기자회견", "윤석열", "지방선거", "민생", "의료", "내란", "교육"], "preview": "2025.11.17 조국혁신당 조국 당대표 후보 전남도의회 기자회견 모두발언  존경하는 전남도민 여러분,  사랑하는 조국혁신당 당원 여러분,  조국혁신당 당 대표에 출마한 조국입니다. 저와 조국혁신당은  한국 정치의 코뿔소가 되겠습니다.  강력한 힘, 단단한 맷집,  빠른 돌진 능력을 가진 코뿔소처럼  내란 극복과 정치개혁을 향해  거침없이 나아가겠습니다. 전남의 정치발전과 지역발전을  가로막아 온 오래된 장벽을  코뿔소의 뿔로  정면에서 들이...", "content": "2025.11.17 조국혁신당 조국 당대표 후보 전남도의회 기자회견 모두발언\n\n존경하는 전남도민 여러분, \n사랑하는 조국혁신당 당원 여러분, \n조국혁신당 당 대표에 출마한 조국입니다.\n저와 조국혁신당은 \n한국 정치의 코뿔소가 되겠습니다. \n강력한 힘, 단단한 맷집, \n빠른 돌진 능력을 가진 코뿔소처럼 \n내란 극복과 정치개혁을 향해 \n거침없이 나아가겠습니다.\n전남의 정치발전과 지역발전을 \n가로막아 온 오래된 장벽을 \n코뿔소의 뿔로 \n정면에서 들이받고 부수겠습니다. \n동시에 ‘정치적 메기’가 되어 \n전남 정치를 ‘확’ 바꾸겠습니다. \n민주당 중심의 ‘안방정치’를 \n도민 중심의 민생정치로 혁신하겠습니다.\n전남도민들께 세 가지를 약속드립니다.\n첫째, 지방정부 곳곳에 숨어있는 \n내란 극우세력을 뿌리 뽑겠습니다. \n내년 지방선거는 국민의힘 심판 선거입니다. \n윤석열은 탄핵됐고, 재판을 받고 있습니다. \n하지만 내란에 가담하고, 윤석열 체포를 막아서며, \n헌정을 파괴하는 데 동조했던 국민의힘은 \n국민으로부터 심판받지 않았습니다.\n오히려 “우리가 황교안이다”를 외치며, \n내란 극우세력을 결집하고, \n이재명 정부의 실패를 기도하고 있습니다.\n내란 극복과 이재명 정부의 성공을 위해서 \n반드시 국민의힘을 소멸시켜야 합니다.\n조국혁신당이 \n가장 강력한 심판의 도구가 되겠습니다.  \n서울, 부산, 대구시장 등 \n국민의힘의 광역단체장을 ‘제로’로 만들고,\n기초단체장과 기초·광역의원들을 반토막 내서 \n전국의 지방정부 곳곳에 숨어있는 \n국민의힘 세력을 확실히 청산하겠습니다. \n둘째, 김대중 대통령께서 단식으로 쟁취한 \n지방정치를 되살리겠습니다. \n전남도민을 무시하는 ‘무투표 당선’, \n반드시 끝내겠습니다. \n2022년 지방선거에서 전국에 \n무투표 당선자가 오백여덟 명입니다. \n2018년보다 무려 5배가 늘어났습니다. \n이대로 두면 10배 이상도 시간문제입니다. \n전남은 무투표로 당선된 \n광역의원이 26명으로 \n전국 1위의 오명을 썼습니다. \n전북이 22명으로 2위, \n대구가 20명으로 3위입니다. \n이것은 ‘김대중 정신’이 아닙니다. \n양당 체제는 이제 거대 재벌 체제가 됐습니다.\n저는 이 ‘그들만의 리그’를 \n양당의 ‘적대적 공존’으로 규정합니다. \n서로 싸우지만, \n서로의 기득권을 지켜주는 구조입니다. \n그 결과 도민의 다양한 요구를 대변하는 \n영세정당은 문을 닫아야 하고, \n골목골목에서 활성화되어야 할 \n민생정치는 사라졌습니다. \n양당의 재벌 정치는 \n지방정치를 자치가 아니라 \n‘자기 통치’로 변질시켰습니다. \n그 피해는 전남도민이 떠안고 있습니다. \n최근 나주 시의회의 무더기 송치, \n곡성군의 전현직 군수와 군의원의 줄줄이 송치, \n이것이 양당 재벌 정치의 폐단입니다. \n반면 조국혁신당 소속 군수가 있는 담양군은 \n인구감소지역 중 생활인구 1위라는 \n성과를 만들었습니다.\n조국혁신당이 정치적 메기가 되겠습니다. \n민주당이 만든 \n‘경쟁 실종, 정책 실종, 책임 실종’의 정치를 \n퇴장시키겠습니다.\n조국혁신당이 인물경쟁, 비전경쟁, 민생경쟁으로 \n전남 정치를 뜨겁게 만들겠습니다.\n셋째, 전남도민을 위한 \n‘더 좋은 성장’을 만들겠습니다.\n전남의 성장 잠재력을 \n끌어올리는 데 전력을 다하겠습니다. \nAI 데이터센터 클러스터, RE100 미래첨단 국가산단, \n석유화학·철강산업 지원, 국립의대 신설 등 \n전남의 핵심 프로젝트들이 차질 없이 추진되도록 \n이재명 정부와 긴밀히 협력하겠습니다.\n중요한 것은 모든 전남도민들이 \n성장의 열매를 함께 누려야 한다는 것입니다. \n‘조국’의 전남 비전은,‘행복이 권리가 되는 전남’입니다. \n전남도민들이 주거, 의료, 돌봄, 교육 등 \n삶의 기본적인 문제로 \n고통받지 않는 나라를 만드는 데, \n모든 노력을 다하겠습니다. \n함께해 주시길 부탁드립니다. \n감사합니다."}, {"id": 172, "filename": "2025.11.15 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-15", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북"], "preview": "2025.11.15 조국 대표 페이스북 메시지  요즘 유행하는 표현을 쓰자면, 한동훈씨가 국힘 내에서도 전망이 없는 상태라 \"긁\"힌 상태인가 보다. 3프로 차원에서 대담 영상의 제목을 여러 차례 바꾸고 있는데, 그것을 내가 바꾸었다고 조롱하면서 다시 공개토론을 하자고 제안한다. 사실을 왜곡하여 대상자를 공격하는 정치검사의 전형적 수법이다. 그리고 나를 공격하면 언론과 대중의 관심을 받으니까 재미를 붙인 것 같다.  한동훈 씨의 칭얼거림에 응할 ...", "content": "2025.11.15 조국 대표 페이스북 메시지\n\n요즘 유행하는 표현을 쓰자면, 한동훈씨가 국힘 내에서도 전망이 없는 상태라 \"긁\"힌 상태인가 보다.\n3프로 차원에서 대담 영상의 제목을 여러 차례 바꾸고 있는데, 그것을 내가 바꾸었다고 조롱하면서 다시 공개토론을 하자고 제안한다. 사실을 왜곡하여 대상자를 공격하는 정치검사의 전형적 수법이다. 그리고 나를 공격하면 언론과 대중의 관심을 받으니까 재미를 붙인 것 같다. \n한동훈 씨의 칭얼거림에 응할 생각은 없다. 단, 이하는 말한다.\n1. 법무부장관으로 국회에 출석하여 이재명 대표 체포동의안 설명을 하면서 이 대표를 대장동 사건의 \"최대수혜자\"이자 \"대규모 비리의 정점\"이라고 비난했다. 1심 판결에서 이는 부정되었다. 한동훈은 이재명 대통령에게 공개 사과해야 한다.\n2. 법무부장관으로 한동훈은 자신의 동지였던 강백신, 엄희준 등  '친윤정치검사'들이 이재명 대표를 표적으로 수사하는 것을 보고받고 독려했을 것이다. 향후 대장동 수사에서의 조작에 대한 수사가 이루어져야 하는데, 한동훈의 연관성을 반드시 밝혀야 한다.\n3. 박성재 전 장관의 수첩에는 12월 4일 계엄 해제 후 당정대 회의가 열렸고, 여기서는 계엄을 정당화하는 논리를 개발할 필요가 있다는 \"당 콘센서스\"를 마련했다고 기재되어 있다. 이후 수사에서 이 회의에서 한동훈이 무슨 발언을 했는지, 어떤 태도를 취했는지 밝혀져야 한다.\n4. 한동훈이 집을 '폐문부재' 상태로 만들고 법원이 결정한 공판 전(前) 증인신문을 계속 거절하는 것은 2와 3과 관련이 있다. 증인신문에서 잘못 답하다가 이후 전개될 2와 3 수사에서 영장이 청구될 수 있기 때문이다.\n요컨대, 한동훈씨는 이재명 대통령에게 사과하고, 나에게 토론하자고 징징거리는 글 쓰는 시간에 수사받을 준비를 하는 것이 좋겠다."}, {"id": 173, "filename": "2025.11.14 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-14", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "개헌·민주주의", "외교·안보"], "tags": ["검찰개혁", "사법개혁", "페이스북"], "preview": "2025.11.14 조국 대표 페이스북 메시지  박성재 장관에 대해 재청구된 구속영장이 기각되자 많은 국민이 분노하고 있다. '삼권분립' 사상의 원조가 몽테스키외임은 중고교 교과서에도 나와있다. 그런데 몽테스키외는 사법권이 입법권과 행정권으로부터 분리되어야 함을 강조하면서도, 사법권은 민주적 통제를 받아야 한다고 역설했다. 그러나 우리나라에서는 후자는 잊어졌다. 교과서적 요약만 알려진 명저 <법의 정신> 일부를 옮긴다. \"재판권을 상설적인 원로...", "content": "2025.11.14 조국 대표 페이스북 메시지\n\n박성재 장관에 대해 재청구된 구속영장이 기각되자 많은 국민이 분노하고 있다.\n'삼권분립' 사상의 원조가 몽테스키외임은 중고교 교과서에도 나와있다. 그런데 몽테스키외는 사법권이 입법권과 행정권으로부터 분리되어야 함을 강조하면서도, 사법권은 민주적 통제를 받아야 한다고 역설했다. 그러나 우리나라에서는 후자는 잊어졌다. 교과서적 요약만 알려진 명저 <법의 정신> 일부를 옮긴다.\n\"재판권을 상설적인 원로원에 주어서는 안된다. 그것은 ... 시민단체로부터 선출된 사람들에 의해서 행사되어야 한다. ... 재판관은 언제나 사람들의 눈앞에 있지 않다. 사람들은 재판관직을 두려워하지만 재판관은 두려워하지 않는다. ... 재판관은 피고와 같은 신분의 사람 즉 동배(同輩)여야 하는데, 그것은 피고가 자기에게 폭력을 휘두를 것 같은 사람들의 수중에 빠진 것이 아닌가 하고 생각하는 일이 없도록 하기 위해서이다.\"[<법의 정신>(동서문화사,2009),180-181면].\n미국이 배심제와 판사 직선제를 운영하고 있는 사상적 배경이 여기에 있다.\n사법부의 독립은 판사가 자기 마음대로 재판할 수 있도록 보장한다는 의미가 아니다. 그러나 한국의 판사는 민주적 통제에서 완전히 자유롭다. 자신이 내린 판결에 대하여 누가 비판하면, “법도 모르는 무식한 자들이, 쯧쯧쯧. 내 권한 내가 쓰는데 어쩔 건데“할 뿐이다. 현행 법체제에서는 견제 방안이 없다. 이제 입법부가 입법부 일을 해야 한다. 법을 바꾸는 것은 사법부가 아니라 오롯이 입법부의 권한이다. \n검찰개혁에 이어 사법개혁의 필요성을 주권자 국민이 체감하고 있다. 재판소원 제도 도입, 법원행정처 폐지(→합의제 사법행정위원회 설치)와 독립감찰기구 설치, 반드시 필요하다. 판사의 판결도 헌법 위배가 있는지 점검되어야 하고, 대법원장이 인사를 통해 판사를 통제하는 기구는 없어져야 하며, 판사의 비리는 엄정하게 감찰되어야 함은 민주주의의 기본이다. 이상의 개혁이 위헌이 아님은 물론이다."}, {"id": 174, "filename": "2025.11.13 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-13", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "외교·안보"], "tags": ["페이스북"], "preview": "2025.11.13 조국 대표 페이스북 메시지  이 ‘당정대 회의’ 참석자는 모두 특검 수사 대상이다. \"당정대 회의는 당시 서울 종로구 삼청동 국무총리 공관에서 오후 2시부터 1시간 30분 정도 진행됐다. 국민의힘에선 한동훈 당시 대표와 추경호 원내대표, 김기현·나경원 의원이 참석했다. 정부 측 참석자는 한덕수 전 총리와 방기선 전 국무조정실장, 그리고 박 전 장관이다. 대통령실에선 정진석 전 비서실장, 김주현 전 민정수석, 신원식 전 국가안...", "content": "2025.11.13 조국 대표 페이스북 메시지\n\n이 ‘당정대 회의’ 참석자는 모두 특검 수사 대상이다.\n\"당정대 회의는 당시 서울 종로구 삼청동 국무총리 공관에서 오후 2시부터 1시간 30분 정도 진행됐다. 국민의힘에선 한동훈 당시 대표와 추경호 원내대표, 김기현·나경원 의원이 참석했다. 정부 측 참석자는 한덕수 전 총리와 방기선 전 국무조정실장, 그리고 박 전 장관이다. 대통령실에선 정진석 전 비서실장, 김주현 전 민정수석, 신원식 전 국가안보실장, 홍철호 전 정무수석이 자리했다. 일반 부처 국무위원 중 유일하게 박 전 장관만 당정대 회의에 불려갔는데, 계엄 후속 조치와 관련해 법무 대응이 중요하기 때문에 참석한 것으로 보인다.\""}, {"id": 175, "filename": "2025.11.11 조국 대표 당대표 후보 메시지.txt", "title": "조국 대표 당대표 후보 메시지", "date": "2025-11-11", "category": "기타 메시지", "topics": ["정치·선거개혁", "인권·사회", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["지방선거", "개헌", "민생"], "preview": "2025.11.11 조국 대표 당대표 후보 메시지  안녕하십니까!  조국혁신당, 당 대표 후보 조국입니다.  어제 출마 선언을 통해  저의 각오와 비전을 말씀드렸습니다.  오늘은 전당대회 슬로건을  말씀드리려고 합니다.  슬로건은, “멈추지 마, 직진 조국, 이제 조국”입니다.  당원과 국민의 집단지성을 바탕으로  세 가지 의미로 구성했습니다.  1. 먼저 “멈추지마”입니다.  멈추지마는, 당원과 국민이  저를 향해 외치는 명령이자 격려입니다....", "content": "2025.11.11 조국 대표 당대표 후보 메시지\n\n안녕하십니까! \n조국혁신당, 당 대표 후보 조국입니다. \n어제 출마 선언을 통해 \n저의 각오와 비전을 말씀드렸습니다. \n오늘은 전당대회 슬로건을 \n말씀드리려고 합니다. \n슬로건은,\n“멈추지 마, 직진 조국, 이제 조국”입니다. \n당원과 국민의 집단지성을 바탕으로 \n세 가지 의미로 구성했습니다. \n1. 먼저 “멈추지마”입니다. \n멈추지마는, 당원과 국민이 \n저를 향해 외치는 명령이자 격려입니다. \n당원 여러분처럼, \n조국은 결코, 멈추지 않겠습니다.\n정치개혁! 민생개혁! 멈추지 않겠습니다. \n경제개혁! 사회개혁! 인권개혁! \n멈추지 않겠습니다.\n평등한 기회의 나라! \n사회권 선진국! 모두의 성장! \n무엇보다 청년과 서민이 \n집과 돌봄을 걱정하지 않는 나라, \n국민이 원하는 \n제7공화국로 가는 길을 \n멈추지 않겠습니다.\n2. 다음은, “직진조국”입니다.\n조국혁신당만의 가치와 방식으로 \n지방선거에 임하겠습니다. \n양당 독점 지역에\n‘창조적 파괴’를 일으키겠습니다. \n지난 총선에서 독자적인 힘으로 \n국회 교두보를 마련했듯이, \n내년 지방선거도 조국혁신당의 힘으로 \n지방정치의 교두보를 세우겠습니다. \n세가 불리하다고 위축되거나 \n회피하지 않겠습니다.\n풀뿌리 민주주의에 혁신과 경쟁의 \n새바람을 불러일으키기 위해 \n직진하겠습니다. \n3. 그렇다면, “이제조국”입니다. \n국민이 “와”하고 놀라는 변화, \n가슴 뛰고 흥이 나는 혁신으로, \n조국혁신당의 제2막을 열겠습니다.\n당의 단결과 통합을 위해서도 \n“이제 조국”입니다. \n제가 책임지고 당의 흩어진 \n모든 역량을 하나로 모으겠습니다. \n혁신으로 뭉치고, \n혁신으로 돌파하고, \n혁신으로 도약하겠습니다! \n마지막으로 저의 \n선거 캠페인도 말씀드리겠습니다. \n저는 현재 '동네방네 조국’ 이라는 이름으로, \n당원들의 삶의 현장을 찾아가고 있습니다. \n식당과 꽃집을 창업한 \n청년 당원의 이야기를 들었고, \n오늘도 일터에서 땀 흘리는 \n다양한 직업과 세대의 \n당원들을 만납니다. \n앞으로 당원들의 생생한 목소리를 \n당의 정책에 반영할 계획입니다. \n국민의 삶과 함께할 때 조국혁신당이 \n더 신뢰받을 수 있을 것입니다. \n많은 관심을 부탁드립니다. \n감사합니다!"}, {"id": 176, "filename": "2025.11.11 조국 대표 페이스북 메시지 항소포기 건.txt", "title": "조국 대표 페이스북 메시지 항소포기 건", "date": "2025-11-11", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁"], "tags": ["교육", "페이스북"], "preview": "2025.11.11 조국 대표 페이스북 메시지 항소포기 건  정치인이 된 후 법학교수 출신 티를 안내려고 하는데 이번 건은 할 수 없다. 많은 언론에서 대장동 재판 항소 포기 관련하여 한동훈 등 국민의힘 정치인들의 주장을 점검없이 그대로 싣고 있다. 부패재산 몰수ㆍ추징은 언제 가능한지는 '부패재산의 몰수 및 회복에 관한 특례법' 제6조가 규정하고 있다.  즉, \"제3조의 재산이 범죄피해재산으로서 범죄피해자가 그 재산에 관하여 범인에 대한 재산반...", "content": "2025.11.11 조국 대표 페이스북 메시지 항소포기 건\n\n정치인이 된 후 법학교수 출신 티를 안내려고 하는데 이번 건은 할 수 없다.\n많은 언론에서 대장동 재판 항소 포기 관련하여 한동훈 등 국민의힘 정치인들의 주장을 점검없이 그대로 싣고 있다. 부패재산 몰수ㆍ추징은 언제 가능한지는 '부패재산의 몰수 및 회복에 관한 특례법' 제6조가 규정하고 있다. \n즉, \"제3조의 재산이 범죄피해재산으로서 범죄피해자가 그 재산에 관하여 범인에 대한 재산반환청구권 또는 손해배상청구권 등을 행사할 수 없는 등 피해회복이 심히 곤란하다고 인정되는 경우에는 몰수ㆍ추징할 수 있다.\"\n이 사건의 피해자는 국가가 아니라 성남시(정확히는 성남도시개발공사)다. 성남시가 민사소송을 제기할 수 없는 경우에만 몰수ㆍ추징이 가능하다. 그런데 성남시(시장은 국민의힘 소속 신상진)는 이미 민사소송을 제기했고, 이번 검찰의 항소 포기 이후 손해배상액을 증대할 것이라고 공표했다. 요컨대, 검찰의 항소 포기로 민사소송의 손해액 산정에 부정적 영향을 줄 수 있다고 주장할 수는 있으나, 이번 사건은 원칙적으로는 국가가 몰수ㆍ추징할 수 없는 사건이다. \n그리고 국민의힘이나 보수언론은 이번 항소 포기를 이재명 대통령과 연결시키는 프레임을 구사하는데, 이 대통령은 이번 항소 포기로 얻는 이익이 없다.\n법조계에 회자되는 유명한 농담성 문구가 있다. \"검사 10년에 민사를 모르고, 검사 15년에 형사를 모르고, 검사 20년에 법 자체를 모른다.\" 검사 생활 10년을 하면 민사사건을 다루지 않으니 모르게 되고, 15년이 되어 부장검사가 되면 결재만 하니 형사도 모르게 되고, 20년이 되면 자신이 법 위에 있다고 생각하거나 법을 마음대로 쥐락퍼락할 수 있다고 생각하게 되어 법을 신경 쓰지 않고 살게 된다는 것이다."}, {"id": 177, "filename": "2025.11.11 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-11-11", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북", "윤석열"], "preview": "2025.11.11 조국 대표 페이스북 메시지  한동훈 씨가 나에게 “무식한 티만 난다”고 말한 것에 대한 답은 이미 올린 검사 출신 김규현 변호사의 글로 대신한다. 김 변호사가 한 씨와 1 대 1 TV 토론을 원하고 있으니, 한 씨는 장혜영 전 의원과 했던 것처럼 토론하길 바란다. 김 변호사는 이렇게 말했다. \"자신 있으면 저랑도 한번 하시죠. ^^ 채상병 사건 때처럼 도망다니지 마셔요.\" 이와 별도로 왜 한 씨가 대장동 사건에 길길이 날뛰는...", "content": "2025.11.11 조국 대표 페이스북 메시지\n\n한동훈 씨가 나에게 “무식한 티만 난다”고 말한 것에 대한 답은 이미 올린 검사 출신 김규현 변호사의 글로 대신한다. 김 변호사가 한 씨와 1 대 1 TV 토론을 원하고 있으니, 한 씨는 장혜영 전 의원과 했던 것처럼 토론하길 바란다. 김 변호사는 이렇게 말했다. \"자신 있으면 저랑도 한번 하시죠. ^^ 채상병 사건 때처럼 도망다니지 마셔요.\"\n이와 별도로 왜 한 씨가 대장동 사건에 길길이 날뛰는지 부연 설명할 필요가 있다. 그는 윤석열의 총애를 받던 법무부장관 시절, ‘친윤 정치 검사’들이 표적으로 삼아 진행한 대장동 수사를 보고 받고 독려하면서 당시 이재명 대표가 “최대 수혜자”이지 “대규모 비리의 정점“이라고 국회에서 역설했다. \n그런데 이번 1심 판결은 이런 주장을 받아들이지 않았다. 그리고 ”배를 가를 수 있다“ 등등의 검찰에 의한 불법적 협박과 진술회유가 있었음이 드러났다. 그래서 나는 일관되게 공소취소해야 할 사건이라고 주장해왔다. 양심이 있다면 당시 법무부장관이었던 한 씨는 이재명 대통령에게 사과를 해야 한다. \n그러나 한 씨는 그럴 생각이 없다. 여전히 당시의 생각을 그대로 가지고 있다. 그러고는 검찰의 항소 포기를 빌미삼아, 이재명 대통령을 공격하고 강백신 등 잔존해 있는 친윤검사들의 궐기를 선동하고 있다. 한동훈은 윤석열과 함께 검찰권 오남용을 자행한 주범 중의 주범이다. 윤석열의 계엄 선포 이후 윤석열과 척을 졌지만, 정치검사의 DNA 는 변하지 않았다. 홍준표 전 대구시장의 말이 맞다. 한동훈은 정치를 해서는 안될 사람이다."}, {"id": 178, "filename": "제16차 끝까지간다 특별위원회 25.11.05..txt", "title": "제16차 끝까지간다 특별위원회 25.11.05.", "date": "2025-11-05", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["사법개혁", "윤석열", "끝까지간다", "지방선거", "내란", "비대위"], "preview": "제16차 끝까지간다 특별위원회 25.11.05. - 조국 비상대책위원장 모두발언  <추경호 구속영장 관련>  국민의힘은 무슨 낯으로 ‘추경호 구속영장’에 반발하고 있습니까?   12.3 불법 계엄 해제 표결을 방해한 행위는, 내란 청산을 위해서  반드시 진상을 규명하고, 책임을 물어야 할 중대한 헌정 범죄입니다.   내란 특검이 추경호 국민의힘 의원에 대해 구속영장을 청구한 이유는,  ‘내란 중요임무 종사’ 혐의가 있기 때문입니다.  내란에 가...", "content": "제16차 끝까지간다 특별위원회 25.11.05.\n- 조국 비상대책위원장 모두발언\n\n<추경호 구속영장 관련>\n\n국민의힘은 무슨 낯으로 ‘추경호 구속영장’에 반발하고 있습니까? \n\n12.3 불법 계엄 해제 표결을 방해한 행위는, 내란 청산을 위해서 \n반드시 진상을 규명하고, 책임을 물어야 할 중대한 헌정 범죄입니다. \n\n내란 특검이 추경호 국민의힘 의원에 대해 구속영장을 청구한 이유는, \n‘내란 중요임무 종사’ 혐의가 있기 때문입니다. \n내란에 가담한 혐의로 구속영장이 청구된 첫 현역 국회의원입니다. \n이 영장의 의미는, 추 의원의 수사 결과에 따라 국민의힘 다른 국회의원에게도 \n잇따라 영장이 청구될 수 있다는 뜻입니다. \n\n그리고 18명을 제외한 국민의힘 국회의원 전원은, \n불법 계엄 해제 표결에 불참했습니다. \n또한 45명의 국회의원은 윤석열 체포영장 집행을 조직적으로 방해했습니다. \n국민의힘 자체가 내란 관련 혐의가 있습니다. \n‘내란 중요임무 종사당’으로 불러야 할 판입니다.\n\n심지어 어제는 시정연설을 거부한 것도 모자라 \n국회 로텐더홀에서 계엄군처럼 도열한 채 \n이재명 대통령을 향해 막말을 퍼부었습니다.\n석고대죄해도 모자랄 판에 저토록 뻔뻔할 수 있는지, 국민은 환멸을 느낍니다. \n\n장동혁 국민의힘 대표는 이재명 대통령을 향해 \n“대통령으로서 마지막 시정연설이 될 것”이라고 망언을 내뱉었습니다. \n국민의힘은, 정신 똑바로 차리십시오,\n어제가 귀하들에게 국민의힘으로서 마지막 시정연설이었습니다. \n\n지금, 국민의힘은 두 갈래 길 위에 서 있습니다. \n과거 윤석열 선출 과정에서 드러난 선거법 위반으로 파산정당의 길을 걷느냐, \n아니면 내란 공범 정당으로서 위헌 정당 해산의 길로 가느냐입니다. \n경제적 파산정당과 헌법적 파산정당, 국민의힘의 길은 둘 중 하나입니다.\n혹시라도 이 두 가지 길이 운 좋게 늦어지더라도 \n결국 국민으로부터 ‘정치적 파산정당’의 길을 걷게 될 것입니다. \n조국혁신당은 지방선거에서 내란 중요임무에 종사하거나 옹호한 국민의힘을, \n국민들의 힘으로 반드시 ‘제로’로 만들겠습니다. \n\n내란특검에 강력히 촉구합니다. \n추경호 전 원내대표와 원내대표실에 모였던 국민의힘 국회의원들, \n윤석열 체포를 막기 위해 한남동 관저에 집결했던 국민의힘 국회의원들, \n내란 선동 시위에 참여한 국민의힘 국회의원들을 \n한 명도 빠짐없이 철저하게 수사하십시오. \n\n<대법원, 헌법 84조 해석 내놓아야>\n\n‘조희대 대법원’이 당장 해야 할 일이 있습니다. \n바로, ‘헌법 84조’에 대한 분명한 해석입니다. \n\n지난 5월 대법원은 대선 개입 판결을 내리면서, \n'헌법 84조'의 해석을 의도적으로 회피했습니다. \n물론 이재명 후보의 대통령 당선 직후 관련 사건의 재판부들이 \n“공판기일을 추후 지정한다”고 발표했습니다. \n그러나 이 부분이 내란 세력에게 빌미를 주고, 정쟁의 소재로 활용되고 있습니다.\n정상적인 대법원이라면, 이 부분을 하루빨리 해소하는 것이 책임있는 자세입니다.\n\n조희대 대법원은 첫째, 최근 국정감사에서 서울 고등법원장의 \n재판 재개 가능성 언급에 대해서 공식 입장을 발표하십시오. \n국정 안정이라는 중대성이 달려 있는데, 왜 침묵하고 있습니까?\n그 침묵이 국민들의 사법부에 대한 신뢰를 더욱 떨어뜨리고, \n사법부의 저의를 더욱 의심하게 만들고 있습니다. \n\n둘째, 지금이라도 당장 ‘헌법 84조’의 정확한 해석을 발표하십시오.\n헌법 84조에 명시된 형사상 소추는, 기소부터 모든 재판에 적용되는 절차라는 것이 \n다수 헌법학자들의 압도적인 의견입니다. \n\n침묵으로 국민을 기만하는 것을 더는 용납하지 않겠습니다.\n침묵이 길어질수록 사법개혁에 대한 국민의 요구는 \n더욱더 거세진다는 것을 명심해야 할 것입니다. /끝/"}, {"id": 179, "filename": "25.10.15 끝까지간다 특별위원회 조국 위원장 모두발언.txt", "title": "끝까지간다 특별위원회 조국 위원장 모두발언", "date": "2025-10-15", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "사법개혁", "끝까지간다"], "preview": "끝까지간다 특별위원회 조국 위원장 모두발언 25.10.15  조국혁신당 ‘끝까지간다 특별위원회’ 위원장 조국입니다.   조국혁신당은 조희대 대법원장의 국회 출석을 무거운 마음으로 지켜봤습니다.  대법원장이 국회 국정감사를 통해 12·3 비상계엄에 왜 침묵했는지,  대선을 앞두고 왜 희대의 판결을 내렸는지를 국민 앞에 성실히 답변하고,  대법원의 자체 개혁안을 내놓을 것으로 기대했습니다.   그러나 조희대 대법원장은 13일 국회 대법원 국정감사에...", "content": "끝까지간다 특별위원회 조국 위원장 모두발언\n25.10.15\n\n조국혁신당 ‘끝까지간다 특별위원회’ 위원장 조국입니다. \n\n조국혁신당은 조희대 대법원장의 국회 출석을 무거운 마음으로 지켜봤습니다.\n\n대법원장이 국회 국정감사를 통해 12·3 비상계엄에 왜 침묵했는지, \n대선을 앞두고 왜 희대의 판결을 내렸는지를 국민 앞에 성실히 답변하고, \n대법원의 자체 개혁안을 내놓을 것으로 기대했습니다. \n\n그러나 조희대 대법원장은 13일 국회 대법원 국정감사에 출석해서 \n위법과 위헌을 운운하며 입을 닫았습니다. \n특히 이재명 후보에 대한 파기환송과 관련한 질의는, \n삼권분립에 반한다는 태도를 보였습니다. \n국민의 눈에 오만한 권력의 모습 그 자체였습니다.\n\n조희대 대법원장이 사법부 독립을 내걸고 침묵한 모습은 \n전 국민 앞에 생방송으로 중계됐습니다. \n많은 국민들은 대한민국 사법부의 민낯을 실시간으로 지켜보며, \n‘조희대 없는 대법원’으로 개혁할 것을 강력하게 요구하고 있습니다.\n\n조국혁신당이 앞장서서 국민의 뜻대로 실천하겠습니다. \n\n대법원장은 공무원입니다. 헌법 제7조는 “공무원은 국민 전체에 대한 봉사자이며, \n국민에 대하여 책임을 진다.”고 명시했습니다. \n조희대 대법원장은 공무원의 자격을 상실했습니다.\n\n조국혁신당은 최후의 수단으로 조희대 대법원장 탄핵소추안을 공개히겠습니다. \n이와 함께 준비된 사법개혁안도 발표하겠습니다.\n더는 무책임한 사법부를 개혁하는 과제를 미뤄서는 안 되기 때문입니다. \n \n피소추자인 조희대 대법원장의 탄핵 사유를 말씀드리겠습니다.\n\n피소추자는 의도적으로 정치에 개입했습니다. \n주권자에 의해서 결정되어야 할 대통령 선거의 결과를 바꾸려 했습니다. \n이는 매우 중대한 헌법위반 사유입니다. \n\n피소추자는 사법부의 신뢰 위기를 자초한 장본인입니다. \n비상계엄이라는 국가적 비상 상황 앞에 늘 침묵했습니다. \n계엄이 관철되었다면 사법부의 권한은 위축되었을 것이고, \n심지어 전직 대법원장을 비롯한 법관들이 \n이른바 수거 대상으로 거론됐음에도 침묵했습니다. \n서울서부지방법원 폭동 사태로 \n법원이 파괴되고 판사의 신변이 위태로웠을 때도 침묵했습니다. \n\n이처럼 국가적 비상사태에 대하여 침묵으로 일관하던 대법원장은\n‘이재명 후보 재판’은 유례를 찾아볼 수 없을 정도의 빠른 속도로 움직였습니다. \n사건을 즉시 전원합의체로 회부하고, 심리종결 후 일주일 만에 파기환송을 선고했습니다. \n그동안 대법원이 침묵했던 ‘정치적 배경’이 드러난 순간입니다. \n\n‘이재명 후보의 사건’은 이미 대법원에 도착하기도 전에, \n대법원 수뇌부가 결론을 내리고 기다리고 있었습니다. \n피소추자가 전체 대법원을 끌어들여 대선에 개입한 초유의 ‘정치 사건’입니다. \n\n피소추자의 중대한 헌법위반은, 우리 헌법의 민주주의 원칙을 정면으로 위배한 것으로 \n파면을 결정해야 할 정도로 크며, 국민 신임을 되돌리기 어려운 상황입니다.\n\n따라서 조국혁신당은 권력분립의 한 축인 사법부를 정상화시키기 위해서 \n대법원장인 피소추자의 탄핵을 소추하기에 이르렀다는 말씀을 드립니다.\n\n조국혁신당은 탄핵안과 사법개혁안을 함께 발표하고, \n탄핵은 탄핵대로, 사법개혁은 사법개혁대로, \n국민 눈높이에서 철저하게 실천해 나가겠습니다. /끝/\n"}, {"id": 180, "filename": "2025.10.12 조국 대표 국민일보 인터뷰.txt", "title": "조국 대표 국민일보 인터뷰", "date": "2025-10-12", "category": "인터뷰", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["내란", "기자회견", "사법개혁", "윤석열"], "preview": "2025.10.12 조국 비대위원장 국민일보 인터뷰 조국 “내년 지지율 10% 확보해 지선 돌입…외국이면 지귀연 탄핵”[인터뷰]  -당 지지율이 개혁신당보다 낮다. “비대위 체제지만 정치 활동을 멈춘 상태다. 성비위 문제 해결이 무엇보다 먼저다. 11·23 전당대회(청주 개최)로 새 지도부 들어서면 연말까지 회복할 것으로 본다. 개혁신당은 충분히 제치고 내년 봄 10%대가 목표다.”  -호남 지지율이 떨어지고, 추세도 좋지 않다. “성 비위 사...", "content": "2025.10.12 조국 비대위원장 국민일보 인터뷰\n조국 “내년 지지율 10% 확보해 지선 돌입…외국이면 지귀연 탄핵”[인터뷰]\n\n-당 지지율이 개혁신당보다 낮다.\n“비대위 체제지만 정치 활동을 멈춘 상태다. 성비위 문제 해결이 무엇보다 먼저다. 11·23 전당대회(청주 개최)로 새 지도부 들어서면 연말까지 회복할 것으로 본다. 개혁신당은 충분히 제치고 내년 봄 10%대가 목표다.”\n\n-호남 지지율이 떨어지고, 추세도 좋지 않다.\n“성 비위 사건 피해자 기자회견 전후로 리얼미터 기준 개혁신당보다 지지율이 떨어졌지만, 지난주 다시 올라섰다. 개혁신당보다 의원 수도 많은데 아직도 한참 멀었다. 이유 막론하고 그만큼 국민께 나쁜 인상을 준거다.\n\n11월 23일 전당대회로 선출지도부가 만들어지면 연말까진 자연스럽게 극복되지 않을까 생각한다. 지지율 10%가 기본적으로 유지가 돼야 후보들 개인기로 5%를 더 가져올 수 있다. 평균적으로 전국적으로 10% 확보돼야 한다고 본다. 그 아래로 가면 선거 치르기 매우 어렵다. 또 조국에 대한 개인 지지도와 당 지지도가 몇 배 이상 큰 격차가 나는데, 이걸 극복해야지 당이 산다.”\n\n-부산 가서 민심 들어보니 어땠나.\n“부산은 당세를 보면 국민의힘이 55 민주당이 45 정도 될 거다. 민주당보다 조직이나 재정이나 모든 게 10분의 1밖에 안 되지만 부산은 일단 제 고향이니 저에 대한 인지도는 높지 않나. 호남 분들도 만나면 혁신당 걱정하고 잘하길 바란다고 하고 제게 덕담도 많이 한다. 전국적으로 비슷하다. 이제 시작이라고 본다.”\n\n-전당대회 계기로 본격 지선 모드인가.\n“그렇다. 사실 많이 늦었다. DJ가 강조했듯, 지선의 본령은 풀뿌리 민주주의 활성화다. 담양군수 사례처럼 조국혁신당표 풀뿌리 민주주의를 보여줄 생각이다.”\n\n-검찰·사법·언론 3대 개혁에서 민주당이 놓치고 있는 부분은.\n“검찰청은 1년 뒤 문을 닫는다. 그 뒤로 어떻게 할 것인가에 대한 민주당 입장이 당·정·대 합의로 나와야 하는데 충돌이 있어 보인다. 합의안이 빨리 나와야 한다.”\n\n-조국혁신당의 차별화 관점이 있다면.\n“검찰의 보완수사요구권은 당연히 인정돼야 하고 직접 보완수사권 행사는 극히 예외로 인정돼야 한다는 생각이다. 대법관 증원은 필요하다. 업무량도 그렇고 ‘부’가 너무 적다. 부의 숫자뿐 아니라 ‘5060 서울대 출신 남성’ 위주에서도 벗어나야 한다. 여성 대법관 비율을 의무화하거나 노동·상법, 지식재산권 전문가 등 대법관 구성에도 다양성과 전문성을 가미해야 한다. 지금은 민사만 하던 사람이 대법관이 되고, 사건이 올라오면 재판연구관 보고서를 받아 판단하는 구조인데, 이건 현대 한국사회의 법적 분쟁 복잡성에 걸맞지 않다. 전문화된 대법관이 늘어나야 하고, 출신 배경과 성별 등 뭐든 달라져야 한다. 또 영미나 독일처럼 시민 참여를 전제로 한 사법개혁이 반드시 이뤄져야 한다.”\n\n-시민 참여를 어떻게 구현할 수 있나.\n“OECD 국가는 대부분 시민 참여를 실시한다. 배심제든, 영미식 배심제든 대륙법 국가의 참심제는 아예 법대에 시민이 앉아 있다. 독일은 1심의 경우 전문법관 1인과 좌우에 시민이 법대에 있다. 2심은 판사 두 명에 시민이 세 명 참여한다. 우린 그런 모습을 상상할 수 없다. 노무현정부에서 국민참여재판 도입했지만 형사재판 중 비중이 0.1% 이하다. 버스 기사가 돈 받았는데 그중 하나로 드링크 사 먹었다고 횡령으로 자른다든지, 곽상도(전 의원) 아들의 50억원(특가법상 뇌물 등)이 (1심에서) 무죄 판결이 났다. 거기 있는 고위법관들은 다 이유가 있다. 훈련받은 대로 무죄 논리를 만들 수 있다. 하지만 일반 시민 법의식하고 안 맞는다. 미국은 기소될 때도 시민이 참여해 기소 여부를 판단한다. OECD 국가에서 사법부는 독립되고, 정치권이 판결에 개입할 수 없다. 다만 기소든 재판이든 시민 참여를 전제로 사법부 독립을 하게 돼 있는 거다. 우린 한 번도 그런 경험이 없다.”\n\n-성비위 사건 쇄신안은 어떻게 준비되고 있나.\n“추석 연휴 빼고 3주간 일단 2차 가해를 금지했고, 신생정당이라 없던 고충상담센터 만들고 외부전문가 고용하려고 찾고 있다. 고충처리위원회 신설했고 외부 위원장 임명할 거다. 당직자·의원실 보좌관 대상으로 성희롱·성추행 전수조사했고 결과분석 중이다. 제도적으론 어느 정당보다 제도적으로 완비됐다고 본다. 여성 인권단체, 피해자가 요구한 거 다 제도적으로 정비된 상황이다. 당이 만들어지자마자 총선 치르고 윤석열 탄핵, 내란 이렇게 가다 보니 내부구조, 당 안에서 소통 문제, 성 평등 의식문제가 미비했던 게 사실이다. 10월 말, 11월 초 정도에 발표할 거다.”\n\n-구체적으로 소개한다면.\n“이번 사태 겪으면서 보니 소통 자체가 잘 이뤄지지 않았다. 어떻게 하면 신속하고 원활하게 할 건가. 장치를 마련할 생각이다. 내부에 어떤 문제가 있는지 돌아볼 시간이 없었던 것 같다. 레드팀이 있어서 이런 신호를 당 지도부에 알려줘야 하는데, 레드팀이 작동 못 했단 생각을 한다. 레드팀이 안에서 작동하면서 상시 문제를 제기하는 팀을 만들려 한다. 사고가 난 뒤에 고치기보단 빨리 빨간불 켜줘야 하니까. 당외인사로 하겠다. 더 근본적으로 정당 주인은 당원이다. 당원 목소리를 당의 노선 정책 의정활동에 반영할 수 있는 제도가 필요하다.”\n\n-민주당 강성지지층의 부작용 우려도 크다.\n“개딸은 비하적 표현이니 적극적 강성당원이라고 하겠다. 민주당이 당원 투표권을 대의원과 같게 한다고도 했었고, 당원 발언권에 따라 후보 공천권에도 영향을 준다. 그러면 정치인은 강성 당원에 따라갈 수밖에 없지 않나. 혁신당은 상황이 조금 다르다. 민주당 강성 당원 주장은 오히려 민주당 지도부에 많이 관철되는 게 문제라면 저희는 당이 작다 보니 당원 주장이나 의견이 덜 반영되는 구조가 돼 있다. 다른 당 평가하긴 그렇지만 지난 당대표 선거 당시 정청래·박찬대 후보 경쟁했을 때 양쪽 지지하는 강경 당원 간 욕설까지 포함해 격렬한 논쟁을 벌였고, 후유증도 남아있다. 그래서 많은 분이 걱정하는 거다. 저희는 그게 아니라 과잉이 문제가 아니라 과소가 문제다. 일률적 비교는 어렵고 두 당이 처한 당원 조건이 다르다.”\n\n-방향은 올바르나 균형점을 찾아야 한다는 뜻인가.\n“당연하다. 당대표가 강성 당원 목소리 경청해야 하지만 그 말만 따라가는 건 정치인의 역할이 아니다. 수용·반영은 해야 하지만 어느 시점에는 당원 목소리와 다른 선택도 할 수 있어야 한다. 혁신 당은 오히려 당원 목소리를 활성화해야 하는 상황이니, 민주당과는 상황이 다르다.”\n\n-‘조희대 국감’으로 시끄러울 것 같은데.\n“조희대 대법관도 결코 헌법 위에 있지 않다. 국민 물음에 답할 의무가 있다. 침묵하는 것은 오만 그 자체다. 알다시피 대선 국면에서 급작스러운 이재명 후보에 대한 후보자격 박탈하는 파기환송 판결을 했다. 시기나 내용 모두 부적절하고, 유례도 없다. 정당은 물론 언론도 의문을 제기하면 대법원은 답을 해야 하는 거다. 그 판결 하나로 대선 판국이 요동을 쳤다.\n\n머리 좋은 사람들이 ‘그런 파동이 있을 걸 몰랐다’, ‘순수하게 법리적 판단했다’하면 거짓말이다. 최근 제주도에서 음주 소동 일으킨 부장판사 징계 안 했다. 지귀연(부장판사) 스마트폰 몇 번 바꿨는데 문제없다고 한다. 적어도 룸살롱에서 판사가 접대받았는데, 그걸 중징계를 안 했다. 오히려 혐의가 없다 그랬지. 전 외국 같았으면 이미 판사 탄핵당했다고 본다.”\n\n-조 대법원장 탄핵 카드를 실제 꺼낼 건가.\n“최후수단이라 말씀드리지 않겠다. 민주당 입장에선 조심스럽겠다. 우리는 그 점에서 몸이 가벼우니 할 얘기는 하는 입장이다.”\n\n-사회개혁은 평소 주장하는 ‘사회권 선진국’ 이야기인가.\n“6공화국에서 자유권을 보장했다면 7공화국에서는 사회권을 국가의 적극적 의무로 명확히 규정해야 한다. 특히 주거권과 돌봄권을 강조하고 싶다. 주거권 강화를 위해 토지 공개념을 제도화하고, 아이와 부모 돌봄도 국가가 일부 해결해야 한다. 4년 연임제 등 정치개혁은 민주당과 의견이 비슷하다.”\n\n-수감 중 어떤 ‘공부’를 했나.\n“정치와 사회개혁 두 축을 선도할 계획이다. 원내교섭단체 요건 ‘정상화’뿐 아니라 광역단체장 결선 투표제, 3인 이상 중대선거구제 도입 등으로 지방정치도 중앙정치처럼 판을 넓혀야 한다.”\n\n-교섭단체 요건 완화는 원탁회의까지 했었는데.\n“유신 이전에는 구성 요건이 10석이었다. 정청래 대표 시절 민주당에서는 하지 않기로 했다는 말을 들었는데 매우 유감이다. 정치는 대의와 명분이다. 5개 당이 서명으로 합의한 사안이다. 집권여당이 대승적으로 풀어야 할 문제다.”\n\n-정치 신인 조국의 최종 목표는.\n“정치는 10년 하겠다고 했다. 7공화국 틀을 만들고 다음 세대에 넘겨주는 게 정치인 조국의 목표다. 너무 거창해 보일 수 있지만 민정수석·법무장관·국회의원 짧게라도 해봤다. 정치 하겠다고 마음먹은 이상 의원 한 번 더 하겠다고 몸 던지는 건, 건방진 얘기겠지만 그건 아닌 거 같다. 성공할지 아닐지 모르겠지만 나름 큰 기획은 갖고 있어야 한다. 윤석열 정권과 실제 끝을 보게 싸웠고 지금 큰 틀에서 마무리된 거 아닌가. 다음 과제가 더 중요하다고 생각한다. 7공화국으로 요약되는 사회·경제·정치 개혁 문제가 이뤄지지 않으면 저희 자식 세대는 이미 힘들다.”\n\n"}, {"id": 181, "filename": "2025.10.12 조국 비대위원장 조선일보 인터뷰.txt", "title": "조국 비대위원장 조선일보 인터뷰", "date": "2025-10-12", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["합당", "윤석열", "민생", "내란", "검찰개혁"], "preview": "2025.10.12 조국 비대위원장 조선일보 인터뷰 “YS처럼 與 호랑이 굴로? 포수 실력 키워 굴밖서 호랑이 잡겠다”  -광복절 특사로 정치에 복귀한 소감은.  “성 비위 사건에 대해 해명하기보다는 창당 주역으로서 무겁게 책임져야 한다는 걸 깨닫는 시간이었다.”  -입시 비리에 대해 사과하나.  “부모 네트워크를 활용해 자식에게 인턴 기회를 주고 공정성 논란을 일으킨 데 대해 국민께 사과드린다. 그런 기회가 없는 청년들께 특히 죄송하다는 말씀...", "content": "2025.10.12 조국 비대위원장 조선일보 인터뷰\n“YS처럼 與 호랑이 굴로? 포수 실력 키워 굴밖서 호랑이 잡겠다”\n\n-광복절 특사로 정치에 복귀한 소감은.\n\n“성 비위 사건에 대해 해명하기보다는 창당 주역으로서 무겁게 책임져야 한다는 걸 깨닫는 시간이었다.”\n\n-입시 비리에 대해 사과하나.\n\n“부모 네트워크를 활용해 자식에게 인턴 기회를 주고 공정성 논란을 일으킨 데 대해 국민께 사과드린다. 그런 기회가 없는 청년들께 특히 죄송하다는 말씀을 꼭 드리고 싶다. 스스로에 대해 훨씬 엄격해야 했는데 잘못했다. 반성하며 정치를 다시 시작하겠다.”\n\n-내로남불에 대해선 뭐라고 얘기할 건가.\n\n“내로남불 비판 역시 그대로 받아들인다. 정치하기 전에 내 언행이 비판의 소지를 제공했다. 앞으로 성찰하면서 조국의 정치로 평가받을 수밖에 없다.”\n\n-본인과 가족에 대해 관종이라는 지적도 나왔다.\n\n“그런 비판도 할 수 있다. 정치인으로서 대중적 관심을 받아야 하기 때문에 그런 조롱도 감수한다. 다만 내 딸(조민)은 공인도 아닌데 그런 딱지를 붙이는 건 좀 과도하지 않나.”\n\n-여권에선 ‘조국이 가족까지 도륙되고 과도한 징벌을 받았다’고 했는데 아직 억울하다고 느끼나.\n\n“재판을 받기도 전에 검찰과 언론 등에서 사회적 유죄의 낙인을 찍었다. 제 해명이 온전히 수용되지 못한 건 안타깝다. 지금이라면 재판 결과가 좀 달랐을 수 있다는 상상도 해봤다. 하지만 다 과거다. 정치는 해명이 아니라 결과에 책임지는 것이다. 억울하다는 말 하지 않겠다.”\n\n-사과한다면서 왜 2030 남성이 극우화됐다고 주장하나. 남녀 갈라치기인가.\n\n“전혀 아니다. 20대 남성 전체가 아니라 일부가 극우화됐다고 말한 것이다. 각종 통계나 연구 보고서에 기초한 것이다. 2030 남성 전체가 저를 공격하는 상황이 됐지만 그 조사가 맞다고 생각한다. 극우 성향의 2030 조직도 있다. ‘윤석열 어게인’에 ‘중국인 물러가라’고 외친다. 일부 2030이 이러는 건 사회·경제 현실에 대한 불안 때문이다. 이들을 비하하려는 게 아니라 해결책을 찾자는 것이다.”\n\n-광복절 사면에 반대한 국민이 많다.\n\n“그분들께 조국의 새로운 효능감을 보여야 한다. 그동안 윤석열 탄핵과 검찰 개혁에 앞장섰지만 이제 그 효능은 다했다. 호남에서 기대감과 동정 여론도 떨어졌다. 앞으로 내란·극우 정치를 타파하고 불평등을 없애는 ‘스리 제로’ 정치를 펼치겠다.”\n\n-과거엔 정치를 안 하겠다고 했다. 그런데 또 정치를 하는데 사적인 명예 회복 때문인가.\n\n“내가 정치를 안 한다고 했던 것은 정치 근육이 없기 때문이었다. 학자로 살겠다는 생각이었다. 그런데 6년간 검찰·언론·정치권에서 무수히 매를 맞다 보니 맷집과 근육이 생겼다. 성찰하면서 한편으론 투지도 커졌다. 처음엔 내 힘으로 윤석열 검찰 정권을 끝장내겠다고 생각했다. 사적 명예 회복의 생각이 없지는 않았다.\"\n\n-당내 성 비위 사건에 제대로 대처하지 못했다는 비판이 크다.\n\n“고통받는 피해자들을 빨리 만났어야 하는데, 사면 후 지역 돌며 인사하다 늦어버렸다. 내 변명이다. 잘못을 인정한다. 피해자들 마음을 살피는 데 소홀했다. 거듭 사과드린다. 늦었지만 소 잃고 외양간 고치겠다. 다시 소를 잃을 순 없다. 피해자 측과 계속 소통하고 제도적 조치도 마련 중이다.”\n\n-조국 1인 정당의 한계 아닌가. 혁신당을 어떻게 혁신할 건가.\n\n“1인 정당은 과도하다. 내가 독재자처럼 결정하진 않는다. 하지만 당원 주권과 소통을 대폭 강화하겠다. 그래야 1인 정당이라는 말이 사라지지 않겠나. 나와 가까운 분들이 당직에 복귀하진 않을 것이다.”\n\n-민주당이 합당하자는데 압박을 견딜 수 있나.\n\n“민주당이 대기업이면 우리는 스타트업이고 영세 상인이다. 아직 유니콘이 되진 못했다. 민주당이 덮어놓고 합당하자는 건 부당하다. 대기업을 넘어서긴 힘들지만 독자 브랜드로 경쟁할 것이다. 대기업만 보지 말고 스타트업과 영세 상인도 좀 챙겨 달라.”\n\n-민주당 2중대라고들 한다.\n\n“진보 성향 영세 정당이 항상 받는 질문이지만 2중대 아니다. 혁신당의 길을 가고 있다. 차별금지법 제정과 토지 공개념, 중대선거구제 도입 등 독자적 정책이 있다. 민주당은 동의하지 않는다. 그런데 무조건 합치자고 하나. 정당 민주주의에 맞지 않는다.”\n\n-YS처럼 호랑이를 잡으러 호랑이 굴에 들어갈 의향은 없나.\n\n“호랑이 굴에 들어가서 잡는 방법이 있고 호랑이를 굴 밖으로 나오게 해서 잡는 방법이 있다. 지금 중요한 것은 포수의 실력을 키우는 것이다. 자강이 먼저다. 실력도 없이 굴에 들어가면 뭐 하나. 굴 밖에서 잡으면 된다.”\n\n-어떻게 민심을 얻을 건가.\n\n“호남이든 영남이든 독과점 구조가 되면 반드시 비리나 부조리가 생긴다. 동쪽이든 서쪽이든 (선거에서) 대단한 성과는 내지 못하더라도 변화를 일으킬 것이다. 승산이 있는 곳에 집중해서 성과를 내고 그걸 토대로 2026년 이후 (총·대선에서) 승부를 보겠다.”\n\n-호남에서 시도지사나 기초단체장 후보가 있나.\n\n“후보가 되려는 분들과 접촉하고 있다. 출마 의사를 먼저 밝히는 분들이 많다. 영남에도 후보를 내고 민주당 후보와 단일화하겠다. 우리 후보가 우위에 있으면 우리로 단일화될 것이다. 나도 당연히 선거에서 역할을 하겠지만 아직 어디로 나갈지는 말하기 힘들다.”\n\n-이재명 대통령과는 어떤 사이인가.\n\n“2014년 이 대통령이 성남시장일 때 내가 정책 자문단이었다. 세월호 단식 농성 때 제가 응원 방문해서 현장 토크도 했다. 사석에서 술도 하고 신뢰 관계가 있다. 가족까지 검찰 수사를 당했다는 점에서 동병상련도 있다.”\n\n-정청래 민주당 대표는 협력자인가 경쟁자인가.\n\n“개혁 정책 추진엔 협력하고 선거에선 경쟁자다.”\n\n-민주당이 교섭단체 요건 완화해 줄까.\n\n“대선 때 약속했는데 안 해주려 한다는 소문이 들린다. ‘교섭단체 20석’은 유신의 잔재다. 정당 다원주의 위해 완화해야 한다. 정 대표가 약속을 안 지킨다면 매우 유감이다.”\n\n-일부 조사에서 조 위원장이 민주당 지지층에서 정 대표보다 지지율이 높게 나왔다.\n\n“민주당 지지층이 조국의 역할과 효능에 대해 기대한다는 방증이다. 다만 차기 대선은 아직 까마득하게 남았다. 지지율 자체는 의미가 없다.”\n\n-정 대표에 대해 여의도 대통령이란 말이 나올 정도로 당정 갈등이 깊다는데.\n\n“여의도 대통령은 언급하지 않겠다. 다만 이재명 정부 초기인데 당정 관계는 대통령 중심으로 원팀이 돼야 한다.”\n\n-친문 대표 주자로 친문을 규합할 생각이 있나.\n\n“내가 왜 친문 주자인가. 문 전 대통령을 모셨고 그분을 존경하지만 친문 정치인은 아니다. 조국은 조국의 정치를 할 뿐이다.”\n\n-윤석열 검찰총장 임명 때 검증 책임자였는데.\n\n“결과적으로 검증에 실패했고 아주 후회되는 일이다. 하지만 당시 민주당 전체가 윤 총장을 지지했고 이재명 대통령도 마찬가지였다. 한 가지 궁금한 건 윤 전 대통령과 김건희 여사가 왜 저를 개인적으로 그렇게 미워했는지다.”\n\n-조희대 대법원장을 왜 탄핵하자고 하나.\n\n“이재명 대통령 선거법 사건 파기환송 판결은 명백한 대선 개입이다. 판결을 부정할 순 없지만 왜 이런 판결을 했는지 해명을 요구하고 비판할 권리는 있다. 조 원장이 설명을 하든가 사퇴해야 한다.”\n\n-조 위원장처럼 찬반이 뚜렷하게 갈리는 정치인도 드물다. 앞으로 어떤 정치를 할 건가.\n\n“저를 비판하고 반대하는 데는 그만한 이유가 있을 것이다. 거기에 따박따박 반박하는 건 정치인이 취할 태도가 아니다. 제가 성과를 내면 반대했던 분들도 조금씩 달라질 것이다. 지금 여야가 대립하며 XY축 정치를 하고 있는데, 불평등 제로를 목표로 Z축 정치를 하겠다. 가장 중요한 것은 새로운 성장 전략을 찾고 사회·경제적 불평등을 해소하는 것이다. 그중에서도 청년 주거 안정이 절실하다. 이명박 전 대통령이 하려다 실패했지만 반값 아파트는 꼭 실현하고 싶다.”\n\n\n\n\n"}, {"id": 182, "filename": "2025.09.02 조국 대표 연합뉴스 인터뷰.txt", "title": "조국 대표 연합뉴스 인터뷰", "date": "2025-09-02", "category": "인터뷰", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당"], "tags": ["합당", "윤석열", "지방선거", "민생", "의료", "내란", "교육"], "preview": "2025.09.02 조국 대표 연합뉴스 인터뷰  [인터뷰] 조국 \"내란세력·국힘·불평등 '쓰리제로'…'등대 정당' 되겠다\"  -- 사면 이후 호남투어를 끝냈고 TK(대구·경북) 지역 일정을 준비 중인데.  ▲ 지금은 일부 TK 분들이 윤석열에 대해 애틋한 마음으로 지지할 수도 있지만, 시간문제다. 일정한 시간이 흐르면 거기와 단절된 새로운 보수로 갈 수밖에 없다.  TK 지역 유권자들에게 비판과 공격을 받더라도 '윤석열 방식은 아니다'라고 공개...", "content": "2025.09.02 조국 대표 연합뉴스 인터뷰\n\n[인터뷰] 조국 \"내란세력·국힘·불평등 '쓰리제로'…'등대 정당' 되겠다\"\n\n-- 사면 이후 호남투어를 끝냈고 TK(대구·경북) 지역 일정을 준비 중인데.\n\n▲ 지금은 일부 TK 분들이 윤석열에 대해 애틋한 마음으로 지지할 수도 있지만, 시간문제다. 일정한 시간이 흐르면 거기와 단절된 새로운 보수로 갈 수밖에 없다.\n\nTK 지역 유권자들에게 비판과 공격을 받더라도 '윤석열 방식은 아니다'라고 공개적으로 얘기하고 소통하려고 한다. 험지라고 하는데 일부러 가야 하는 게 맞다.\n\n-- 내년 지방선거의 목표는.\n\n▲ 윤석열 이후의 정치 지형에서 지금과 같은 극우 국민의힘이 존재해선 안 된다. 우리 사회에서 보수가 필요한데 저런 식의 보수는 나라를 망친다. 내년 지선에서 국민의힘 지방자체단체장 0명, 2028년 총선에서 의석수 반 토막을 내야 한다. 내란 세력 제로, 국민의힘 제로가 목표다.\n\n-- 내년 지선 출마 의사를 밝혔다. 지자체장, 국회의원 보궐선거 가운데 선택을 해야 하는데 시점을 언제로 보는가.\n\n▲ (올해 11월 전당대회에서) 제가 당 대표가 된다고 전제하면 대표 복귀 이후가 결정 시점이 될 것이다. 연말 연초에 선거기획단을 짜서 조국이 어떤 역할을 해야 할 것인가 논의해야 한다.\n\n-- 사면 이후 민주당 일각에서 '자숙과 성찰의 시간이 필요하다'며 견제구가 날아오는데 어떻게 보는가.\n\n▲ 저에 대한 충언이라고 생각하고, 감사한 마음으로 돌아보고 있다. 혁신당이 작은 정당이 아니냐. 비판받더라도 혁신당의 역할, 시대적 과제를 얘기하고 움직이는 게 맞다.\n\n-- 민주당과의 관계를 얘기하며 '좌완투수 역할론'을 언급했는데.\n\n▲ 혁신당은 시대적 과제를 아주 선명하게 제시하는 '등대 정당' 역할을 해야 한다. 이재명 정부는 중도보수 정당을 자임하고 공정·성장 전략을 얘기하는데 현명한 전략이다. 혁신당의 역할은 불평등 제로 전략을 펴는 것이다. 내란 세력·국민의힘에 더해 불평등 제로까지 '쓰리 제로' 전략이다. 윤석열이 감옥에 갔다고 삶이 좋아지는 게 아니다. 등록금·집·일자리·결혼·육아 등 생애주기 전체에 있어 문제를 해결해야 한다. 국가가 재정·조세정책을 통해서 훨씬 더 깊이 개입해야 한다.\n\n-- 민주당 일각에서 흘러나오는 합당설에 대한 생각은.\n\n▲ 중대선거구제 도입, 소수정당의 (원활한) 국회 진입 등 정치개혁을 해야 한다. 주거·의료·돌봄·교육 분야에서 불평등 문제를 해결하는 민생 개혁도 필요하다. 인권 개혁도 중요한데 가장 큰 쟁점이 포괄적 차별금지법 문제다.\n\n3개 과제에서 지금은 적어도 민주당과 혁신당이 (입장이) 다른 게 분명하다. 정당이라는 게 이념과 비전과 정책이 같으면 같이하는 것 아니냐. (민주당과 혁신당의 생각이 같아지면) 그때는 합당할 수 있다. 지금은 '따로 또 같이' 가야 할 때이고 덮어놓고 결혼시키면 남녀가 잘 산다는 보장이 어디 있느냐. 민주당과 혁신당을 합한다고 파이가 커지지 않을 것이다. 또 초콜릿 파이에 에그타르트나 애플파이를 팍 섞어버리면 이상한 맛이 나올 것이다.\n\n-- 사면 반대 여론이 다른 연령층에 비해 청년층에서 높게 나왔다. 입시 비리 관련 사건 영향도 있어 보인다.\n\n▲ 이른바 '조국 사태'에 대해서 저는 '조국 사냥'이라고 얘기를 하는데, 그때 벌어진 일에 대한 평가가 세대별로 차이가 있는 것 같다. 2030 분들이 왜 분노하고 화를 내고 저에 대해 비판적인지 충분히 이해하고 그 점에 대해 죄송하다. 더욱더 낮은 마음과 자세로 정치를 할 것이다.\n\n-- 2030세대 남성 일부의 극우화를 언급한 것을 두고 보수 진영에서 비판의 목소리가 나온다.\n\n▲ '20대 남성 10명 중 3명은 극우이고, 비율이 20대 여성보다 1.5배 높다'는 연구·조사 결과가 있다. 극우는 불평등을 먹고 자란다. 불평등하고 소외됐기 때문에 내부의 적을 만든다. 극우는 아니라고 하더라도 2030 남성들이 가진 소외감이 있다. 남성보다 여성들을 너무 많이 보호하는 것 아니냐는 관념을 가진 게 사실이다. 그 문제도 기성세대가 해결해야 한다. 이준석(개혁신당 대표)이 저한테 갈라치기를 한다고 했는데 '거울보고 자신한테 해야 할 얘기를 왜 나한테 하지'하고 의아했다.\n\n한동훈(국민의힘 전 대표) 씨도 저한테 무죄라면 재심 청구하라고 했는데 법률가가 맞느냐. 재심과 사면은 성격이 다르고, 재심 요건은 매우 까다롭다. 제가 충분한 증거 없이 재심 신청을 해서 재심이 기각되는 것을 원하는 뻔한 속셈인데 정치검사의 전형적인 낚시질이다."}, {"id": 183, "filename": "2025.09.02 조국 혁신정책연구원장 헤럴드경제 인터뷰.txt", "title": "조국 혁신정책연구원장 헤럴드경제 인터뷰", "date": "2025-09-02", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["윤석열", "지방선거", "민생", "의료", "교육"], "preview": "2025.09.02 조국 혁신정책연구원장 헤럴드경제 인터뷰 조국 “혁신당이 잘하면 민주당이 긴장…호남서 메기 역할할 것”[헤경이 만난 사람]  -복당 후 혁신정책연구원장을 맡았다. 역할에 대해 소개해달라.  ▶11월경 전당대회를 하기 전에 제가 지금까지 고민했던 여러 구상들, 즉 당의 비전과 정책을 다듬어 연말 전까지 보다 더 구체적으로 명료하게 만들 생각을 갖고 있었다. 특히 대중화하는 작업들을 좀 하려고 한다. 저희는 정책적 비전을 보통의 ...", "content": "2025.09.02 조국 혁신정책연구원장 헤럴드경제 인터뷰\n조국 “혁신당이 잘하면 민주당이 긴장…호남서 메기 역할할 것”[헤경이 만난 사람]\n\n-복당 후 혁신정책연구원장을 맡았다. 역할에 대해 소개해달라.\n\n▶11월경 전당대회를 하기 전에 제가 지금까지 고민했던 여러 구상들, 즉 당의 비전과 정책을 다듬어 연말 전까지 보다 더 구체적으로 명료하게 만들 생각을 갖고 있었다. 특히 대중화하는 작업들을 좀 하려고 한다. 저희는 정책적 비전을 보통의 국민들에게 어떻게 알릴 것인가가 매우 중요하다. 예를 들어 (지난해 총선 때 내건) ‘검찰독재정권 조기종식’이라는 말이 이론적 느낌을 주는데, 그걸 ‘3년은 너무 길다’로 바꿔 내세웠다. 비전과 정책도 그런 게 필요하다. 어려운 정책들도 시민들이 직관적으로 이해할 수 있게 전달하는 역할에 집중하려 한다.\n\n-내년 지방선거 아니면 국회의원 재·보궐 선거에 출마하겠다고 공식화했다.\n\n▶정치인이니 만큼 큰 선거를 회피하는 것은 말도 안 된다고 생각한다. 다만 지금 어느 선거, 어느 지역에 나갈 것인지는 밝힐 수 없다. 전당대회를 통해 당대표로 복귀하게 되면 가칭 ‘지방선거 기획단’을 만들 것 아니겠나. 저를 포함해 여러 후보들을 어디에 낼 것인지 논의해 그때 결정할 것이다. 지방선거 기획단을 가능한 한 빠른 시간 내에 구성하게 될 텐데 저의 경우도 늦어도 내년 초까지는 어느 선거, 어느 지역에 나갈지 결정이 될 것이다. 전당대회 일정과도 관련이 있는 부분이다.\n\n-내년에 치러질 선거에서 당의 목표는.\n\n▶(사면으로 석방된) 8월 15일부터 지금까지 일관되게 극우화된 국민의힘을 소멸시키겠다는 얘기를 계속 했지 않나. 지방선거에서는 광역자치단체장에서 국민의힘을 ‘0’으로 만들고 2028년 총선에서 국민의힘 의석을 반토막 낼 것이다. 지난 8개월의 고민이다. 그 목표 하에 정치 일정을 수행할 것이다. 민주주의 국가에서 극우정당이 제2당, 제1야당인 건 용납할 수가 없다고 생각한다.\n\n정책적인 측면에서 동시에 진행돼야 할 것은, ‘윤석열-김건희 시대’는 끝났지만 우리 국민들의 삶이 급격히 개선된 건 아니란 점이다. 예를 들어서 젊은 세대 같은 경우 대학생은 등록금 문제, 그 다음에 졸업하면 일자리 문제, 그 다음 결혼하고 난 뒤에는 집 문제와 육아 문제가 있다. 좀 더 나이가 들면 교육비 문제, 부모님이 아프시면 의료비 문제 등 생애 전 주기에 걸쳐 보통의 시민들이 감수해야 하는 어려움이 있고 이건 ‘이재명 시대’에도 존재하는 어려움이다. 민생의 어려움을 어떻게 해결해야 될 것인가에 대한 비전, 보통 사람들의 삶을 개선하는 정책을 제시하려고 한다.\n\n-내년 지방선거 공천 전략 내지 구상은.\n\n▶제가 지금(인터뷰 당일인 8월 27일) 호남에 있지만 9월 첫째주에는 TK 지역으로 가고, 그 다음에는 충청도도 가고 전국에 다 간다. 상대적으로 호남이 (다른 지역에 비해) 유리하다는 얘기는 할 수 있겠지만 저희가 호남만 선거를 하진 않는다. 당연히 그건 말도 안 되는 얘기다. 지금 혁신정책연구원장으로서 잠정적 생각이지만 개인적 생각은, 상징적이고 의미 있는 지역에는 후보를 내서 반드시 이기고 어떤 경우는 아예 내지 않고 이런 선택과 집중을 해야 된다고 본다. 제가 당대표가 되고 나면 그 다음 지방선거 기획단을 만들고 나면 자연스럽게 목표치를 발표하게 될 거다.\n\n-당대표에 복귀하는 건 기정사실로 당 안팎에서 받아들여지는데, 당대표가 되고 나서 해야 하는 가장 중요한 일은.\n\n▶당 조직 확대와 활성화라고 본다. 김선민 당대표 권한대행을 포함해서 많은 의원님들, 시도당 위원장들이 노력을 하셨는데 제가 없던 8개월간 당이 좀 정체돼 있었다. 빠른 시간 내에 활성화하고 그걸 확대하고, 많은 분들을 새롭게 영입하고 하는 이런 일들을 빠른 시간 내에 할 생각이다. 그래야 그 다음 단계로 갈 수 있다.\n\n-민주당에서 조 원장에 대한 사면 필요성을 제기하는 목소리들이 있었는데, 사면 후 현 시점에선 자중을 주문하고 있다. 어떻게 생각하는지.\n\n▶ 어떤 취지인지 알고 감사한 마음으로 받아들인다. 하지만 조국혁신당은 민주당에 비해 훨씬 규모가 작은 정당이다. 제가 적극적으로 당을 만든 주체 중 한 명 아닌가. 창당의 주역이기도 한데 비판을 감수하고 당의 활성화를 위해 뛰는 것이 맞지, 비판이 두려워서 자숙을 하겠다고 해외에 나간다든가 하는 건 아니라고 본다.\n\n비판이 국민의힘에서도 있고 민주당에서도 있는데 민주당에서 비판하는 이유 중 하나는 지방선거 경쟁 때문 아니겠나. 제가 전남 담양에 다녀왔다. (조국혁신당 첫 지방자치단체장인) 정철원 군수의 군정에 대한 평가가 매우 좋다. 내년 6월에 제2, 제3의 정철원을 배출하려고 노력할 건데 민주당에선 자리가 줄어들어서 불만이 있을 수 있겠지만 유권자 입장에서는 선택지가 생기는 것이다. 저희가 잘하면 민주당이 긴장을 할 것이고, 호남에서 메기 역할을 할 것이다. 정치적으로 특정 정당의 시각이 아니라 투표를 하는 유권자 관점에서 이 경쟁을 바라보자는 것이다.\n\n-조국혁신당과 민주당의 관계 설정을 어떻게 해야 된다고 보는지.\n\n▶이재명 정부는 성공해야 한다. 이재명 대통령 발목을 잡거나 차별화를 중심에 두는 전략은 펴지 않을 것이고, 이 대통령은 성공하셔야 한다. 그리고 극우정당을 소멸시키거나 반토막 내야 한다는 점에는 일체의 차이가 없을 거다. 이것은 무조건 연대한다.\n\n그런데 그렇지 않은 영역, 지방정치 지역정치 발전을 누가 잘하느냐, 또 구체적인 방법을 갖고 있느냐 이런 문제는 경쟁을 해야 한다. 그게 국민의힘을 도울리는 만무하다. 그런 점에서 협력과 연대, 협력과 경쟁이라는 것이 계속 같이 가는 건데 그게 민주당에게도 나쁜 일이 아니라고 본다.\n\n-사면 후 이른바 ‘친문(친문재인)’이 부활했다는 얘기도 민주당 일각에서 언급한다.\n\n▶이게 프레임인데 조국혁신당은 친문·반명(반이재명) 정당이 아니다. 우선 저희 의원들을 친문·반명이라고 분류할 수 없다. 저 같은 경우 문재인 전 대통령을 모셨으니 친문 인사로 불리는데 저는 이재명 대통령을 비판·비난한 적이 한 번도 없다. 제가 과거 (문재인 정부 시절) 청와대에 있었다고 친문 정치인들을 모아서 하는 것도 아니잖나. 정말 잘못된 프레임이다.\n\n-조 원장 부재 기간 동안 조국혁신당의 존재감이 드러나지 않는다는 지적들이 많았다. 검찰개혁의 선명성이 가장 강조된 정당인데, 검찰개혁 외의 정책적 부분이 시민들에게 와닿지 않는다는 비판도 적지 않다.\n\n▶맞는 말씀이라고 본다. 객관적으로 봤을 때 조국이란 스피커가 사라진 것 아닌가. 준비가 된 게 있는데 전달이 안 되는 거다. 그래서 저라는 스피커의 볼륨을 높이고 영향력을 높여서 제 부재 기간 부족했던 것들을 보완하려고 지금 이렇게 움직이고 있는 거다. 또 앞으로 제가 당대표가 되면 스피커 볼륨이 센, 소위 스타급이라고 할 수 있는 분들을 많이 모셔올 것이다.\n\n사회경제적 개혁 문제, 특히 불평등 해소 문제, 주거·일자리·의료·돌봄 이런 문제에 대해 조국혁신당의 비전과 정책이 무엇인가 덜 알려져 있는 건 사실이다. 혁신정책연구원장으로 있으면서 그걸 구체적으로 다듬어서 접근성이 좋도록 계속 국민들께 알려야 한다.\n\n-스스로 ‘정치인 조국’이라는 표현을 쓰기도 했다. 앞으로 어떤 정치인이 되고자 하는지.\n\n▶변화를 만드는 정치인이 되고자 한다. 변화를 평가하는 정치인이 아니라 또 흐름을 따라가는 정치인이 아니라 흐름을 만드는 정치인이 될 것이다. 언제나 그 시대에 대세가 있고 흐름이라는 게 있지 않나. 조국혁신당 창당 때도 어떤 분이 “무소속 출마하면 당선될 거다. 그리고 민주당 입당해라”라고 했다. 하지만 그렇게 가지 않고 다른 흐름을, 변화를 만들었잖나. 지금도 마찬가지다.\n"}, {"id": 184, "filename": "2025.08.30 조국 혁신정책연구원장 시사저널 인터뷰1.txt", "title": "조국 혁신정책연구원장 시사저널 인터뷰1", "date": "2025-08-30", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["내란", "지방선거", "검찰개혁", "윤석열"], "preview": "2025.08.30 조국 혁신정책연구원장 시사저널 인터뷰1 [조국 인터뷰①] \"'극우 본당' 국민의힘 응징해야\"…'2030년까지 심판' 로드맵 제시  지난 총선 직후 인터뷰에서 르상티망, 불의한 강자에 대한 공적 복수를 강조했다. 그 핵심 과제로 윤석열 정부 탄핵을 이뤘는데 소회는 어떤가.  \"제가 정치를 하겠다고 선언을 했을 때 국민의힘에서 '사적 복수'를 위한 것이냐고 비난했지 않나. 그때 철학자 프리드리히 니체가 《도덕의 계보학》에서 언급...", "content": "2025.08.30 조국 혁신정책연구원장 시사저널 인터뷰1\n[조국 인터뷰①] \"'극우 본당' 국민의힘 응징해야\"…'2030년까지 심판' 로드맵 제시\n\n지난 총선 직후 인터뷰에서 르상티망, 불의한 강자에 대한 공적 복수를 강조했다. 그 핵심 과제로 윤석열 정부 탄핵을 이뤘는데 소회는 어떤가.\n\n\"제가 정치를 하겠다고 선언을 했을 때 국민의힘에서 '사적 복수'를 위한 것이냐고 비난했지 않나. 그때 철학자 프리드리히 니체가 《도덕의 계보학》에서 언급한 르상티망, 즉 '공적 응징'을 외쳤다. 이후 혁신당이 '3년은 너무 길다' '윤석열 탄핵' '검찰 종식'을 가장 먼져 외쳤고 결과적으로 다 이뤄졌다. 물론 우리 당만의 힘으로 된 건 아니지만 맨 먼저 외쳐서 이룬 점에서 보람이 크다.\"\n\n지금까지 윤석열 정부와 국민의힘을 향한 3대(내란·김건희·채해병) 특검 활동은 어떻게 평가하나.\n\n\"지금까지 매우 잘하고 있다고 생각한다. 그 이전에 검찰이 수사하지 않았던 수많은 윤석열·김건희의 범죄 혐의가 고구마 넝쿨 캐듯 다 드러나고 있지 않은가. 이는 과거 윤석열 검찰이 얼마나 정치 편향적이었고 선택적 수사·기소를 했는지 보여주는 반증이다. 앞으로도 특검이 해야 될 일이 더 많아질 것이다. 특히 당시 윤석열 정부와 국민의힘의 주요 인사 중에서 내란과 계엄에 가담한 자들에 대한 조사가 더 철저히 이뤄져야 된다고 본다.\"\n\n'공적 응징'을 위해 남은 과제는 무엇인가.\n\n\"국민의힘은 여전히 내란과 계엄을 옹호하는 극우 본당이라는 사실이 드러났다. 최근 국민의힘 전당대회에서 장동혁과 김문수 두 사람이 당대표 선거에 결선 투표까지 올라갔다. 두 사람 모두 여전히 계엄과 윤석열을 옹호하고 심지어 전한길 앞에서 머리를 조아리는 사람들이지 않았나. 둘 중 전한길보다 더 강경한 '친(親)내란' '친윤석열' '친전한길'인 장동혁이 당대표가 됐다. 우리는 내란을 경험한 후 격퇴까지 했는데, 여전히 우리나라의 제2 당이자 제1 야당인 국민의힘은 정신을 못 차렸다. (그렇기에) 국민의힘의 존재는 대한민국의 수치고 정치 발전에 암적인 존재다. 그래서 국민의힘에 대한 공적 응징은 여전히 필요하다고 본다.\"\n\n장동혁 대표가 첫 일성으로 윤 전 대통령의 접견 계획을 시사했다.\n\n\"거기다 윤석열 탄핵에 찬성한 한동훈 전 국민의힘 대표도 제명할 것 같더라. 탄핵 반대 과정에서 분열 일으킨 사람들에 대해서도 당 차원에서 제재를 가한다고 하고, 참 잘들 하고 있다고 본다.\"\n\n앞으로 혁신당은 장동혁 체제의 국민의힘과 어떤 관계를 설정해 나가야 한다고 보는가.\n\n\"통상 OECD(경제협력개발기구) 국가에서 극우 세력이 있을 수 있고 이들은 대부분 소수였다. 하지만 우리나라는 현재 주류 보수 제1 당 자체가 극우가 돼버렸다. 뉴라이트, 반공, 냉전, 반북, 이단, 신천지, 통일교 단체 등이 집합한데다 사이비 극우 유튜브, 전한길 같은 자들이 모두 뭉쳐 '윤 어게인'을 외치고 있지 않나. 이런 정당이 우리나라 보수 정당을 자처한다는 것은 어불성설이다. 반드시 심판받아야 될 정당이다. 그래서 저는 반드시 국민의힘이 사멸되도록 만들 것이다.\"\n\n국민의힘 심판을 위한 구체적 로드맵도 있나.\n\n\"앞으로 세 번의 중대 선거가 있다. 2026년(지방선거), 2028년(국회의원 총선거), 2030년(대통령 선거)인데 이 세 번의 선거를 거치면서 국민의힘은 사멸돼야 된다. 지방선거 때는 광역자치단체장 0석, 총선 때는 현재 의석의 과반수마저 잃고, 대선 때는 군소정당 후보가 되도록 차례차례 만들어야 한다. 국민의힘 자체의 영역이 반 이상이 줄게 되면, 나머지 영역 반은 민주당과 혁신당을 비롯한 다른 정당들이 나눠 가진다는 것이 제 구상이다.\"\n\n일각에서는 '보수 신당' 출현 가능성도 거론된다.\n\n\"그 점에서 다양한 정당들이 나올 수 있도록 원내 교섭단체 요건 완화가 필요하다. 혁신당만의 문제가 아니라 정치 개혁 차원에서 필요하다. 예를 들어 유신 체제 이전 수준인 10석 수준으로 완화된다면, 지금 장동혁 체제의 국민의힘에서 정치적 전망이 없는 찬탄(탄핵 찬성)파 인사들이 10명 이상 나올 것이다. 이들이 별도로 나와서 교섭단체를 만드는 것이다. 이후 2028년 총선이 되면 보수 유권자들은 국민의힘이라는 극우 정당과 찬탄파들의 신당 중에서 선택을 할 것이다. 그때 당연히 유권자들은 찬탄 쪽을 더욱 선택하지 않겠나.\"\n\n다당제를 이루려면 선거제 개편도 필수다. 정치개혁 과제 구상에 포함되나.\n\n\"그렇다. 검찰·사법·방송개혁은 민주당과 80% 이상 합의돼 있고 곧 완성된다. 그런데 민주당과 의견차가 있는 핵심 부분은 정치개혁이다. 일단 원내 교섭단체를 낮출 것인가 말 것인가를 놓고 생각이 다르다. 또 기존의 사표(死票)를 방지하고 기후 위기를 비롯한 전문가들의 목소리가 원내에 들어올 수 있도록 표의 비례성을 높이려면, 지금의 소선거구제 중심 준연동 비례대표제에서 '완전한 연동형 비례대표제'로 가거나 '중대선거구제'로 바뀌어야 한다. 이를 통해 선거구 내에 3~4명의 후보가 들어간다면 두 거대 정당뿐 아니라 다른 정당도 들어갈 수 있지 않겠나. 그런 정치 개혁을 과감하게 해야 된다. 그런데 민주당은 그렇게 하면 의원 수가 줄어들어서 우리와 의견이 다른 부분이 있다.\"\n\n최근 검찰개혁을 놓고 당정 간 불협화음도 제기된 바 있다. 이 부분은 어떻게 보는가.\n\n\"제가 청와대 민정수석을 역임했지 않은가. 원래는 당·정·대가 의견 차가 있다 해도 민정수석실이 중심이 돼서 조율하고 최종안을 발표하게 돼있고, 항상 그래왔다. 내부 의견차는 공개되지 않도록 조치를 했다. 그런데 지금은 양측 의견차가 바로 공개되고 있다. 민주당 의견과 법무부 의견이 다른 것은 물론, 국정기획위원회 의견까지 다르다. 법무부와 집권여당이 서로 긴장감을 발휘하는 건 매우 나쁜 것이라 생각한다. 또 국민들에게 상당히 혼란을 주고 있어 이 부분을 대통령이 직접 가르마를 타서 조속히 해소해야 된다고 본다.\"\n\n'검찰의 보완수사권 요구' 등 양측 쟁점 사안에 대해선 어떻게 생각하는가.\n\n\"검찰의 보완수사권 요구를 어디까지 인정할 것인지 문제도 남아 있다. 최근 정성호 법무부 장관은 아주 전면적으로 인정하는 것 같은데, 이 경우 처음에는 경찰에게 시키고 그다음에 검찰이 수사를 해버리면 수사·기소 분리의 의미가 없어진다. 단지 순서만 늦게 하는 것뿐이다. 그래서 보완수사권 요구 범위를 빨리 특정해야 된다. 과거 문재인 정부 때는 그 범위를 정했더니 윤석열이 준칙을 통해서 완전히 엎어버렸다. 그래서 문재인 정부 때 정했던 보완수사권 요구 범위부터 지금 시점에서 확정했으면 좋겠다.\"\n\n문재인 정부 때는 '탄핵 이후'에 대한 사회 비전 제시가 '미완'으로 남았다는 아쉬움이 있었다.\n\n\"그렇다. 그래서 지금은 제가 국회의원이 아니지만 곧 당대표로 복귀한다면 사회권 선진국, 특히 '주거' '의료' '돌봄' 세 가지 과제 키워드를 더욱 강화하는 비전과 정책을 제시하고 그걸로 내년 6월 지선에서 유권자들의 선택을 받을 것이다. 저는 지난해 비교섭단체 연설에서도 사회권을 강조하면서 특히 '주거' '의료' '돌봄' 세 가지의 국가 부담 수준을 대폭 높여야 된다고 얘기한 바 있다. 국가가 적극 개입해야 한다. 앞서 말한 정치개혁과 함께 사회·경제 대개혁을 민주당보다 더 강력하게 추진하려고 한다.\"\n"}, {"id": 185, "filename": "2025.08.30 조국 혁신정책연구원장 시사저널 인터뷰2.txt", "title": "조국 혁신정책연구원장 시사저널 인터뷰2", "date": "2025-08-30", "category": "인터뷰", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "지방선거", "교육", "윤석열"], "preview": "2025.08.30 조국 혁신정책연구원장 시사저널 인터뷰2 [조국 인터뷰②] \"저에 대한 비판 모두 끌어안고 '과거' 대신 '미래 성과'로 평가 받겠다\"  정치인 조국에게 '감옥의 시간'은 어떤 의미였나.  \"제 자신을 돌아보는 '성찰'과 '구상'의 시간이었다. 해당 시간 동안 내란, 계엄, 탄핵, 대선까지 모든 과정이 진행됐지 않나. 이후 어떻게 해야 될 것인가, 그리고 나 자신과 혁신당은 어떻게 될 것인가에 대해서도 구상하는 시간이었다. 물...", "content": "2025.08.30 조국 혁신정책연구원장 시사저널 인터뷰2\n[조국 인터뷰②] \"저에 대한 비판 모두 끌어안고 '과거' 대신 '미래 성과'로 평가 받겠다\"\n\n정치인 조국에게 '감옥의 시간'은 어떤 의미였나.\n\n\"제 자신을 돌아보는 '성찰'과 '구상'의 시간이었다. 해당 시간 동안 내란, 계엄, 탄핵, 대선까지 모든 과정이 진행됐지 않나. 이후 어떻게 해야 될 것인가, 그리고 나 자신과 혁신당은 어떻게 될 것인가에 대해서도 구상하는 시간이었다. 물론 내부에서 언론 인터뷰도 하고 메시지도 냈지만 결국 제한적이었다. 감옥, 특히 독방에 갇혀있는 것은 비관과 절망의 시간일 수 있지만 독서하고 운동하고 성찰하면서 희망과 낙관의 힘도 함께 키웠다.\"\n\n일각에선 이번 사면·복권에 대해 부정적 시각도 존재한다.\n\n\"제 일관된 생각은 과거보다 '미래'로 평가받겠다는 것이다. 역대 모든 대통령의 사면은 다 비판받았지 않나. 옛 논어에 '성사불설(成事不說·이미 이뤄진 일에 대해서는 말하지 않는다)'이라는 말도 있는데, 이미 사면은 이뤄진 일이다. 대통령도 사면을 철회할 수는 없다. 그래서 의도를 가지고 조국 사면에 대해 계속 이야기하는 것은 힘이 없을 것이라 본다. 이미 이뤄진 일이고, 그에 대한 비판도 다 받을 것이다. 또 저는 그것을 가지고 제 정치를 하지 않는다. 과거에 대해 집착하지 않고 향후 미래 활동과 성과를 통해 평가받겠다.\"\n\n정치인 조국에게는 사면이 '자산'이자 '부채'로도 작용할 수 있을 것 같다. 현장에서는 어떤 민심을 느끼고 있는가.\n\n\"사면 전 여론조사를 보면 딱 반반 아니었나. 반대 48%, 찬성 47% 사이에서 여론이 움직이는 상황이었다. 물론 제가 거리에 돌아다니면 저를 지지하는 분도 많은데 이분들은 반이다. 또 침묵하고 싫어하고 욕하는 분들도 반이다. 그런데 그분들도 국민이다. 저는 정치적 자산과 부채를 모두 안고 가야 한다고 생각한다. 앞으로 제 활동을 통해 자산을 늘리고 부채를 줄이는 방법 밖에는 없다. 또 찬성하는 분들도 제게 석방 이후 미래가 뭔가, 앞으로 펼칠 미래의 조국 정치는 무엇이냐고 꼭 물어본다. 그에 응답하는 것이 제 과제다.\"\n\n이재명 대통령도 사면·복권을 결심한 계기나 의도가 있지 않겠나.\n\n\"이 대통령과 소통을 안 해봐서 본심은 모르지만, 앞서 윤석열이 김경수 전 경남지사를 풀어줄 때 사면만 해주고 복권을 안 해줬다. 근데 저는 이 대통령이 복권까지 했다. 이는 정치 활동을 할 수 있다는 얘기다. 이후 저는 바로 복당·복직했다. 그렇다면 이 대통령은 왜 그랬을까. 이 대통령은 매우 현명하신 분인데 조국이 사면·복권을 받으면 정치 활동을 한다는 것은 당연한 대목이었다. 근데 그것까지 전제하고 감수해서 사면·복권 결단을 내렸다는 것은 두 가지 측면이 있을 걸로 추측한다.\n\n첫째는 저뿐만 아니라 윤석열 검찰에 의해 피해를 받았던 대부분의 사람들을 풀어줬다. 결국 윤석열 검찰에 의한 수사·기소권 남용 문제를 본인이 조기에 정리하겠다는 판단을 하신 것 같다. 두 번째는 다른 사면·복권 받은 사람들이 있는데도 저만 여론의 관심을 받고 있지 않나. 저는 당 대표였고 또 복귀가 분명한 사람 아니었나. 결국 대통령께서 제가 하는 활동에 대해 일정 역할을 인정하고 필요하다고 판단하셨을 것이라 추측한다.\"\n\n조만간 대통령을 만나게 된다면 가장 먼저 하고 싶은 말씀은 무엇인가.\n\n\"제가 당대표로 복귀하면 그때 공식적인 의전 행사에서 만날 가능성이 많을 것이다. 그러면 일단 '부담이 있으셨을 텐데 사면·복권을 해주셔서 감사합니다' 그 말씀을 드려야겠다. 그리고 '대통령님 반드시 성공하셔야 됩니다. 4년 반, 5년 뒤에 성공한 대통령으로 역사에 기록되셔야 합니다. 저도 미력이나마 돕겠습니다' 이렇게 말씀드릴 것 같다.\"\n\n수감 동안 썼던 책 이야기로 넘어가보자. 《조국의 공부》 공동 저자인 정여울 작가가 본인에게 '공적 싸움에 집중하면서 자기희생을 너무 많이 한다'고 한 대목도 있었는데, 관련해 그간 힘들었던 순간을 떠올린다면.\n\n\"대한민국 검찰사(史)에서 저와 제 가족이 받았던 정도의 고통 사례는 없는 걸로 알고 있다. 6년간의 과정에서 주먹을 쥐고 이를 악문 적이 여러 번이다. 그걸 통해서 제가 뭘 할 것인가 고민했고, 결국 과거엔 전혀 생각조차 않았던 '정치 투신'을 국민만 믿고 결심했다. 그 결과 국민이 저를 선택하고 구해 주셨다. 윤석열은 지금 나락으로 떨어진 거 아닌가. 그런 부분들을 돌아보면 제가 인적·개인적 고통과 시련을 겪었지만 결국 주권자인 '국민의 선택'이 제일 중요하다는 마음을 갖게 된다.\"\n\n정치인 조국에게 혁신당은 어떤 의미인가.\n\n\"정치는 정당 없이 할 수 없다. 물론 지금의 혁신당은 규모는 작지만 맨 처음 윤석열 탄핵 기치를 열었을 때 가장 먼저 동조하고 손 잡아주신 첫 번째 동지들이 만들어 놓은 집이고 성곽이다. 사람들이 방어도 하고 재충전도 하려면 성곽이 없어선 안 된다. 지금 필요한 건 이 성곽을 더 튼튼하게 만드는 작업이다. 그러면서도 성곽 안에만 갇혀 있어선 안 된다. 동시에 성곽 바깥에 나가서 영토를 개척해야 한다.\"\n\n수감 직전 가장 걱정했던 부분이 당에 '풀뿌리 지역 조직'이 부족하다는 점이었다고 들었다.\n\n\"그렇다. 당의 풀뿌리 조직을 만드는 것이 초기부터 과제였다. 특히 8개월간 저의 부재 등 이유로 여전히 당의 풀뿌리 조직이 약한 건 사실이다. 물론 풀뿌리 조직이 부족함에도 불구하고 지난 4월 재보궐선거에서 전남 담양에서 승리했다. 그렇지만 여전히 조국혁신당의 풀뿌리 지역 조직은 민주당에 비해 훨씬 약하다.\"\n\n그렇다면 앞으로 당을 어떻게 확장시킬 계획인가.\n\n\"앞으로도 전국을 돌고 당대표가 돼서도 제가 집중할 사안이 풀뿌리 조직을 강화하는 것이다. 전국의 풀뿌리 인재들을 발굴하고 그들과 연대해서 당의 저변을 확대하는 것이 사회권 선진국 정책 비전에 이어 가장 중요한 두 번째 과제 중 하나다. 관련해 지금 당 차원의 정치연수원을 운영하고 당원 교육도 진행하고 있는데 이를 전국적으로 더 확대할 계획이다.\"\n\n혁신당 운명을 좌우할 시험대로 불리는 '내년 지방선거' 전략은 어떻게 구상 중인가.\n\n\"국민의힘을 정치적으로 심판하는 것이 핵심 목표다. 먼저 광역자치단체, 그 다음 의회 등에서 국민의힘 자리를 최대한 줄이면 자연스럽게 지방의회에서도 국민의힘이 반토막 날 것이다. 그걸 위해서 민주당과도 연대하면서 경쟁할 것이다.\"\n\n지난 총선에서 '3년이 너무 길다' '지민 비조(지역구 후보는 민주당, 비례대표는 조국혁신당)' 등의 슬로건이 효과가 컸다. 이번에도 그런 슬로건을 구상하고 있는가.\n\n\"당연히 준비 중이다. 지난 총선의 경우 '3년은 너무 길다' 슬로건으로 압도했다면 내년 6월은 어떤 슬로건으로 갈 것인가로 고민하고 있다. 딱 들으면 직관적으로 각이 잡히고 확실한 느낌을 주는 슬로건이 필요하다고 본다. 지금은 거칠게 몇 가지 후보군을 생각하고 있는데, 나중에 당대표가 되면 전문가들하고 얘기해서 확정할 것이다.\"\n\n일각에서는 혁신당의 미래와 관련해 '자강론'부터 민주당과의 '합당론' 등 여러 이야기가 나오고 있다. 혁신당을 만든 주역으로서 어디에 더 방점을 찍고 있는가.\n\n\"자강론과 합당론, 두 가지는 모순이 아니다. 검찰·사법·방송개혁은 민주당과 일치하는 부분이 많은 반면, 정치개혁이나 선거제 현안에서 민주당은 소극적이고 혁신당은 적극적이다. 또 우리나라의 불평등 문제를 해소하려는 의지나 계획도 저희가 민주당보다 더 낫다고 생각한다. 왜냐하면 민주당이 중도 보수 정당을 선언했지 않나. 그런 측면에서 저희는 중도 진보를 지향하고 있는 만큼, 불평등 해소에 있어서 더 강하게 실현시킬 수 있을 것이라 본다.\"\n\n본인과 당의 핵심 과제인 '사회권 선진국' 정리 작업은 어떻게 진행되고 있는가.\n\n\"당 혁신연구원장을 맡았으니 이제 시작이다. 사회권 선진국 키워드를 제일 먼저 제안하긴 했는데 여전히 내용이 풍부하지 않고 메시지가 대중에게는 어렵게 들리는 것도 사실이다. 그래서 연구원장으로 있는 동안 내용을 풍부하게 하고 구체화하고 대중화하는 것, 이 세 가지 작업이 저의 과제라 생각한다. 구체적으로 관련 세미나도 하고 전문가들도 만나 조언도 구하면서 배우려고 한다. 결국 '공부의 연장'인 셈이다.\"\n\n마지막으로 정치인 조국이 역사에 남기고 싶은 유산은 무엇인가.\n\n\"추상적이지만 저는 흐름을 따라가는 정치인이 아니라 '흐름을 만드는' 정치인이 되고 싶다. 또 사건을 추종하는 정치인이 아니라 '사건을 창조하는' 정치인이 되고 싶다.\"\n\n\n"}, {"id": 186, "filename": "2025.08.28 조국 혁신정책연구원장 전북도민일보 인터뷰.txt", "title": "조국 혁신정책연구원장 전북도민일보 인터뷰", "date": "2025-08-28", "category": "인터뷰", "topics": ["정치·선거개혁", "조국혁신당", "민생·경제"], "tags": ["내란", "지방선거", "합당", "민생"], "preview": "2025.08.28 조국 혁신정책연구원장 전북도민일보 인터뷰 조국 혁신정책연구원장 “전북도민들의 뜻을 받들어 조국 정치가 무엇인지 보여드리겠습니다”  1.이번 전북특별자치도 방문 두고 지역 내 다양한 해석이 나오고 있습니다. 어떤 의미입니까?  “전북도민들께서는 조국혁신당의 창당부터 22대 총선까지 아주 강한 지지를 보내주셨습니다. 특히, 사면되기까지 나상호 원불교 교정원장님을 비롯해 원불교 교무님들과 전북도민들이 격려와 함께 탄원서를 제출, ...", "content": "2025.08.28 조국 혁신정책연구원장 전북도민일보 인터뷰\n조국 혁신정책연구원장 “전북도민들의 뜻을 받들어 조국 정치가 무엇인지 보여드리겠습니다”\n\n1.이번 전북특별자치도 방문 두고 지역 내 다양한 해석이 나오고 있습니다. 어떤 의미입니까?\n\n“전북도민들께서는 조국혁신당의 창당부터 22대 총선까지 아주 강한 지지를 보내주셨습니다. 특히, 사면되기까지 나상호 원불교 교정원장님을 비롯해 원불교 교무님들과 전북도민들이 격려와 함께 탄원서를 제출, 저에 대한 애정을 힘껏 표현해주셨습니다.\n\n여기에 조국혁신당 전북특별자치도당은 상대적으로 다른 지역의 도당보다 아주 강한 응집력을 가지고 활동을 해오고 있습니다.\n\n이러한 애정에 대한 감사한 마음을 전하고자 인사를 드리는 건 당연한 도리라 생각해 전북을 방문하게 됐습니다.”\n\n2.하지만 현재, 더불어민주당에서는 ‘N분의 1’, ‘2030에게 사과한다고 마음이 바뀌겠냐’라는 발언 등에 대해서 불편한 기색을 드러내고 있습니다. 아무래도 호남권이 지지기반이다 보니 이번 방문에 더욱 촉각을 곤두세우고 있습니다. 이에 대해 어떻게 생각하십니까?\n\n“제가 사면복권된 후 자숙하지 않고 정치 활동을 펼치며 이재명 대통령 지지율에 영향을 준 것에 대한 비판으로 생각합니다. 이를 충분히 이해하고 겸허하게 수용하고 있습니다. 하지만 이런 비판을 받더라도 활동을 펼칠 수밖에 없는 것은 조국혁신당을 만들었던 주축이기도 하며 민주당처럼 여러 역할을 할 수 있는 사람들이 많은 구조가 아니기 때문입니다.\n\n지난 8개월 동안 조국혁신당을 떠나있으면서 전체적인 위상이나 주목도가 좀 떨어져 있는 상태라고 한다면 저의 활동이 당세를 확장하는 데 도움이 될 것이니 당연히 활동을 펼쳐야 한다고 생각합니다. 이게 대외적으로 비판을 받더라도 활동을 펼치고 있는 이유이자 조국혁신당을 위한 길이라 생각합니다.”\n\n3.이제 정치시계는 내년 6월 3일 제9회전국동시지방선거에 맞춰 돌고 있습니다. 그렇다 보니 앞으로의 정치적 행보에 관심이 쏠리고 있습니다. 이미, 당 대표로 복귀하겠다는 뜻을 밝히셨는데, 어떤 역할을 하실 계획입니까?\n\n“조국혁신당의 전당대회는 11월에 진행될 예정으로, 당 대표로 출마할 생각입니다. 아마도, 혁신정책연구원장보다 강한 책임감과 사명감을 가지게 될 것입니다.\n\n제가 생각하는 당 대표의 역할은 두 가지입니다. 먼저, 당을 떠나서 시대적 과제로 국민의힘을 해체하는 것을 최우선적으로 생각할 계획입니다. 두 번째로는 이재명 정부의 성공과 함께 당 대표로서 조국혁신당을 활성화 시키는 것을 목표를 가지고 당을 이끌어 나갈 생각입니다.”\n\n4.그렇다면, 내년 6월에 열리는 지방선거 또는 국회의원 재보궐선거에 직접 출마하실 생각입니까? 또, 민주당과의 합당 가능성이 크다는 말도 나오고 있는데, 이에 대해 어떻게 생각하십니까?\n\n“당연히 참가할 생각이지만 현재까지 지방선거냐, 재보궐선거냐의 방향이라던지, 출마지역에 대해 아무것도 결정된 것은 없습니다. 그저, 국민을 위한 길이 무엇인지 신중하게 고민해 출마할 생각입니다. 하지만 이는 제 개인이 어디로 나가는 것보다는 지선에 나설 후보를 발굴하고 키우는 것이 우선입니다.\n\n또, 합당에 대해서 말씀을 드리자면 시기상조라고 조심스럽게 말씀드릴 수 있을 것 같습니다. 지금은 합당을 이야기 할 때가 아닙니다.\n\n더불어민주당과 조국혁신당이 지역 정치와 지역 경제 발전을 위해 무엇을 하려고 하는지를 묻는게 먼저라고 생각합니다. 합당이 아닌 어느 정당이 지역 발전에 도움이 되느냐로 질문을 바꿨으면 합니다.\n\n조국혁신당은 지역발전을 위해 새로운 선택지가 될 것입니다.\n\n전북은 오랫동안 민주당을 지지해왔습니다. 하지만, 지역발전 등 전북도민의 민생에 얼마나 긍정적이었는지에 대해 묻고싶습니다.\n\n조국혁신당 등장은 전북도민에게 선택의 폭을 넓히는 기회이자, 양 정당의 선의의 경쟁은 전북이 발전할 수 있는 기회가 될 것입니다.\n\n더욱이 합당이 긍정적인 시너지 효과를 일으킬지 모르는 상황인 만큼 지금은 조국혁신당이 지역 발전을 위해 무엇을 하는지부터 알리는 게 먼저다 생각하고 있습니다.”\n\n5.이번 지선에서 14개 시군 단체장에 모든 후보를 낼 계획으로 알고 있습니다. 그렇다면 어떤 기준을 가지고 후보를 발굴하실 생각입니까?\n\n”후보에 대해서는 전 민주당, 무소속이든 상관없이 조국혁신당과 같은 호흡을 같이 할 수 있고, 노선이 맞는 사람을 발굴할 생각입니다.\n\n또 신인 발굴에도 주력할 생각으로 특히, 청년 여성을 많이 발굴할 계획을 가지고 있습니다.\n\n이를 통해 경험과 연륜이 있는 후보자, 참신한 생각을 가지고 있는 신인들을 잘 융합해 기초단체장, 기초의원에 맞는 인재를 발굴해 나갈 생각입니다.”\n\n6.사실, 전북은 그동안 삼중 소외론에 시달려 왔고, 상대적으로 낙후된 곳입니다. 혹시 전북에 대한 발전 구상이 있으신가요?\n\n“현재 전북의 소외현상에 대해 잘 알고 있습니다. 더욱이 전북이 전북특별자치도로 출범했지만, 여전히 인사조직, 재정문제 등이 해결되지 않은 상황입니다. 이러한 상황을 타개하기 위해선 재정이 뒷받침이 필수 불가결이며 해결책 중 하나가 종부세입니다.\n\n우선, 저는 민주당이 바라보고 있는 종부세에 대해 생각이 다릅니다. 종부세의 최대 90%까지 지방으로 내려가는데 이를 깎는다는 것은 곧 지방 재정의 약화와 세수가 약한 지역의 낙후를 가속화 하는 길이라 생각해 강하게 반대해왔습니다. 이에 삭감됐던 종부세를 복원시켜 전북자치도의 세수를 증대시켜 발전으로 이끌어야 합니다.\n\n또, 앵커기업 유치를 위해선 지역 본사제, 지역 복수 본사제를 운영해 지역으로 옮기는 기업에 법인세 감소 등 인센티브를 주는 방법을 구상하고 있습니다”\n\n7.국민의힘이 새로운 대표를 선출했습니다. 이를 두고 강한 어조로 비판, 국민의힘 소속 단체장이 나오지 못하도록 막겠다고도 하셨습니다. 앞으로 국민의힘과의 협치는 없으신 건가요?\n\n“국민의힘 당 대표로 선출된 장동혁 대표는 내란을 옹호하는 친윤세력임과 동시에 전한길 씨 같은 인사들을 입당시키려 했던 사람입니다. 이는 곧 국민의 힘이 극우정당임을 공표한 것과 다름이 없으며, 자멸의 길에 들어 섰다고 판단합니다. 이에 저는 이들이 활동하는 것을 용납하지 않고 끝까지 심판, 자멸을 도울 것입니다.”\n\n8.마지막으로 전북특별자치도민에게 하고 싶으신 말씀이 있다면.\n\n“조국혁신당의 시작부터 많은 지지와 성원을 보내주신 전북특별자치도민 모두에게 감사를 드립니다. 개인적으로 어려움을 겪을 때도 전북에서 정말 많은 응원의 편지를 받았습니다. 그 마음과 뜻을 받아서 앞으로의 정치 일정도 수행할 것입니다. 감사의 마음으로 전북도민들께 조국의 정치가 무엇인지 보여주고, 평가받도록 하겠습니다.”\n\n\n"}, {"id": 187, "filename": "2025.08.28 조국 혁신정책연구원장 전북일보 인터뷰.txt", "title": "조국 혁신정책연구원장 전북일보 인터뷰", "date": "2025-08-28", "category": "인터뷰", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["지방선거", "5.18", "민생", "윤석열"], "preview": "2025.08.28 조국 혁신정책연구원장 전북일보 인터뷰 [대담] 조국 “정치의 창조적 파괴…민주당 호남 독점 깨야 진보가 산다”  - 사면 직후 행보가 너무 빠르다는 비판, 자중론이 나옵니다.  \"그런 지적 충분히 이해합니다. 제가 8개월간 부재했던 만큼 행보가 빠르다고 느끼실 수 있습니다. 그러나 그 공백을 메우는 건 제 의무라고 봅니다. 정치인이 비판이 두렵다고 방 안에만 머무는 건 책임을 저버리는 겁니다. 비난을 감수하더라도 현장에 나가...", "content": "2025.08.28 조국 혁신정책연구원장 전북일보 인터뷰\n[대담] 조국 “정치의 창조적 파괴…민주당 호남 독점 깨야 진보가 산다”\n\n- 사면 직후 행보가 너무 빠르다는 비판, 자중론이 나옵니다.\n\n\"그런 지적 충분히 이해합니다. 제가 8개월간 부재했던 만큼 행보가 빠르다고 느끼실 수 있습니다. 그러나 그 공백을 메우는 건 제 의무라고 봅니다. 정치인이 비판이 두렵다고 방 안에만 머무는 건 책임을 저버리는 겁니다. 비난을 감수하더라도 현장에 나가 유권자와 당에 책임을 다하는 것이 제 길입니다. 민주당에도 부탁드리고 싶습니다. 단순히 견제의 눈으로만 보지 마시고, 긴 안목에서 제 행보가 진보 진영 전체 성장에 도움이 될 수 있다는 점을 봐주시길 바랍니다.\"\n\n\n- 조국혁신당은 호남 위주라는 시각도 있습니다. TK·영남에도 후보를 낼 계획입니까?\n\n\"사실과 다릅니다. 혁신당은 전국 정당을 지향합니다. TK·영남에도 기초의원을 낼 계획입니다. 국민의힘이 제2당이라는 현실은 선진국 정치 지형에 맞지 않습니다. 극우정당이 제2당을 차지하는 것은 대한민국 정치의 비극입니다. 민주당과 혁신당이 함께 대구·경북 유권자들에게 '여러분의 대표가 극우정당이어도 되겠느냐'고 호소할 겁니다. 과거 탄핵 정국 때 제가 대구에 가장 먼저 가 시민들에게 직접 호소했듯, 이번에도 똑같이 행동할 것입니다. 호남은 물론이고 TK·영남에도 새로운 선택지를 제시하겠습니다.\"\n\n \n- 내년 지방선거에서 직접 출마할 계획이 있습니까?\n\n\"아직 어느 지역, 어느 선거에 출마할지 전혀 결정하지 않았습니다. 우선 11월에 전당대회가 열려 새 당 대표가 선출돼야 하고, 그 과정을 거쳐 내년 초쯤이면 제 쓰임새가 어디에 있는지 가닥이 잡힐 겁니다. 언론에서 서울시장, 부산시장 이야기를 많이 하시고, 심지어 광주시장 이야기도 나오더군요. 분명히 말씀드리지만 특정 지역을 미리 정하지 않았습니다. 중요한 건 우리 당이 어디서 어떤 의미 있는 성과를 낼 수 있느냐 입니다. 당에 보탬이 되는 선거라면 어디든지 나서야 한다고 생각합니다. 선거를 피하거나 회피할 생각은 전혀 없습니다. 다만 당과 상의해 가장 전략적으로 의미 있는 선택을 할 겁니다.\"\n\n \n- 공천 시스템과 기준은 어떻게 구상하고 계시는지요.\n\n\"크게 두 부류를 균형 있게 섞어야 한다고 봅니다. 하나는 기존 정당과 무관하게 새 정치를 하려는 청년·여성 같은 신인, 다른 하나는 무소속이나 민주당 출신처럼 지역에서 검증된 인물입니다. 다만 국민의힘 출신은 엄격히 심사해야 합니다. 무엇보다 중요한 건 지역 발전을 위한 비전과 능력입니다. 윤석열 정권이 끝났지만 불평등은 여전히 심각합니다. 자산·소득 격차, 일자리·주거·육아·돌봄 문제를 해결할 정책을 내년 지방선거 아젠다로 제시할 겁니다. 결국 공천은 이런 의제에 동의하는지가 핵심 기준이 될 것입니다.\"\n\n \n- 스스로를 야구에 빗대 진보진영에서의 '좌완 파이어볼러'라 부르셨습니다. 어떤 의미입니까?\n\n\"민주당은 중도 보수 정당을 자임했고, 우완 투수가 많습니다. 물론 그 역할도 필요하지만 우완만으로는 경기를 이길 수 없습니다. 저는 직설적이고 강한 메시지를 던지는 좌완 파이어볼러 역할을 맡겠습니다. 윤석열 탄핵을 선도적으로 제기했을 때도 민주당은 '과하다'고 했지만 현실이 됐습니다. 지금 국민의힘은 보수가 아니라 극우입니다. 이를 정면으로 돌파하는 강한 메시지가 필요합니다. 민주당이 신중한 투수라면, 저는 좌완 투수로 강속구를 던지며 극우 정당을 심판하겠습니다. 좌·우완이 균형을 이뤄야 진보 진영 전체가 승리할 수 있습니다.\"\n\n \n- 현역 의원이 10명이 넘는데도 전북과 호남을 위한 발전 성과가 눈에 띄지 않는다는 지적이 있습니다.\n\n\"그 비판 충분히 받아들입니다. 저희 당이 원내에 자리 잡은 지 이제 1년이 조금 넘었습니다. 솔직히 말씀드리면 지금까지는 여의도 정치에 뿌리 내리느라 전북과 호남에 뚜렷한 성과를 보여드리지 못한 게 사실입니다. 그러나 앞으로는 달라질 겁니다. 담양 사례가 대표적입니다. 당세가 약했던 곳에서 저희 후보가 당선된 뒤, 우리 당 의원들이 힘을 합쳐 전남도 전체 예산 중 담양이 가장 많은 수해지원 예산을 받게 만들었습니다. 12명이 모두 달려든 결과입니다. 똑같은 방식으로 전북에도 집중할 겁니다. 각 의원들이 상임위원회 전문성을 살려 전북의 현안을 밀어붙이고, 제가 직접 예산 확보에 나서겠습니다. 전북 도민들이 체감할 수 있는 변화를 반드시 보여드리겠습니다.\"\n\n \n- 바쁜 일정을 보내고 계신데, 향후 조국혁신당의 방향성이 궁금합니다.\n\n\"저는 '창조적 파괴'를 말하고 싶습니다. 기업 세계에서 혁신이 일어나는 과정을 보면, 늘 새로운 상품과 시장이 기존 질서를 흔들면서 발전이 이뤄집니다. 새로운 상품이 나오면 기존 기업은 긴장하고, 결국 품질과 서비스가 개선되죠. 정치도 이와 크게 다르지 않습니다. 지금 민주당은 이 지역에서 거의 독점적 지위를 차지하고 있습니다. 국민 입장에서 선택지가 민주당밖에 없다면 '그 상품을 살 것인가 말 것인가'만 고민하게 됩니다. 품질이 좋으면 모르겠지만, 불만족스럽거나 A/S가 부실할 수도 있지 않습니까? 이럴 때 혁신당이라는 새로운 상품을 제시하면 국민은 비교·검토할 수 있고, 그 과정에서 민주당도 자신을 돌아보며 더 나아질 수 있습니다. 결국 우리 존재 자체가 민주당을 긴장시키고 변화하게 만드는 촉매제가 되는 겁니다. 그게 바로 제가 말하는 정치의 창조적 파괴입니다.\" "}, {"id": 188, "filename": "2025.08.26 조국 혁신정책연구원장 광주일보 인터뷰.txt", "title": "조국 혁신정책연구원장 광주일보 인터뷰", "date": "2025-08-26", "category": "인터뷰", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["합당", "5.18", "지방선거", "민생", "의료"], "preview": "2025.08.26 조국 혁신정책연구원장 광주일보 인터뷰 조국 “호남 유권자에 새로운 선택지 제공하는 시민정당 될 것”  -호남 방문 이유는  ▲광주·전남 시민들께서 제 사면을 촉구하며 현수막을 걸고 탄원서를 써주셨다. 감사 인사를 드리는 게 첫째 이유다. 또 5·18 정신은 혁신당의 핵심 뿌리이기에 광주를 가장 먼저 찾는 것이 당연하다.  -민주당의 견제가 심상치 않다.  ▲민주당은 70년 역사와 100만 당원을 가진 정당이다. 그런데 왜 이...", "content": "2025.08.26 조국 혁신정책연구원장 광주일보 인터뷰\n조국 “호남 유권자에 새로운 선택지 제공하는 시민정당 될 것”\n\n-호남 방문 이유는\n\n▲광주·전남 시민들께서 제 사면을 촉구하며 현수막을 걸고 탄원서를 써주셨다. 감사 인사를 드리는 게 첫째 이유다. 또 5·18 정신은 혁신당의 핵심 뿌리이기에 광주를 가장 먼저 찾는 것이 당연하다.\n\n-민주당의 견제가 심상치 않다.\n\n▲민주당은 70년 역사와 100만 당원을 가진 정당이다. 그런데 왜 이렇게 집중적으로 견제하는지 모르겠다. 오히려 호남 정치 발전에는 일정한 경쟁 구도가 필요하다.\n\n-민주당과 합당을 주문하는 목소리가 있다.\n\n▲덮어놓고 합당은 안 된다. 과거 탄핵 문제도 민주당은 머뭇거렸지만 우리가 밀어붙여 성과를 냈다. 이번에도 민주당이 꺼리는 개혁 과제를 선도하겠다.\n\n-내년 지방선거에서 호남 차별화 전략은.\n\n▲호남 정치의 문제는 특정 정당이 독점하면서 견제와 균형이 사라졌다는 데 있다. 혁신당은 시민중심 정치, 즉 유권자에게 새로운 선택지를 제공하는 정당이 될 것이다. 지방의회가 한 당으로만 채워져 있으면 행정 견제가 불가능하다. 혁신당이 진입하면 예산 낭비와 행정 비효율을 막을 수 있다. 민주당이 기성 정치의 안정을 중시한다면, 우리는 정치개혁과 불평등 해소를 훨씬 더 강하게 추진한다. 대선·지방선거 결선투표제를 도입해 시민들의 선택권을 넓히고, 주거·돌봄·의료 같은 생활문제에 대한정책이 대표적이다.\n\n-민주당과 경쟁이 불가피해 보인다.\n\n▲호남에서는 당연히 민주당과 경쟁할 것이다. 그러나 이 경쟁은 민주당을 무너뜨리려는 게 아니라 유권자 선택지를 넓히려는 전략이다. 민주당이 하지 않는 개혁 과제를 우리가 선도해 정치에 활력을 불어넣겠다. 표의 등가성을 높여 소수정당도 국회에서 제 목소리를 내게 해야 한다. 기후·복지 같은 의제정당이 들어와야 정책 경쟁이 살아난다. 대선과 광역단체장 선거는 결선투표제를 도입해야 한다.\n\n-수도권·영남에서 민주당과 협력할건가.\n\n▲국민의힘이 다시 집권하는 일은 막아야 한다. 따라서 지역별로 전략을 달리할 수 있다. 호남에서는 경쟁하고, 수도권·영남에서는 단일화를 통해 국민의힘을 심판하는 방식이다.\n\n-현 정부의 지역발전 정책에 대한 생각은.\n\n▲‘5극3특’의 기본 방향엔 동의한다. 다만 국채 발행만으로는 부족할 수 있다. 조세정책과 함께 재원 로드맵을 분명히 해야 한다.\n\n-호남 발전 구상은.\n\n▲기업 본사를 지방으로 옮기거나 복수본사 제도를 도입할 필요가 있다. 법인세 인센티브를 부여하는 방식도 가능하다. 또 지역균형발전 예산을 국가재정 증가율만큼 확대해야 한다. 이 원칙을 지켜야 사람과 돈이 수도권으로 쏠리지 않는다.\n\n-조 원장에게 광주는 어떤 의미인가.\n\n▲부산 사람이지만 정치·정신적으로는 광주의 아들이라고 생각한다. 부마항쟁과 광주항쟁이 제 정신세계를 지배했다. 5·18 정신은 특정 지역이 아니라 세계적 사건으로 자리매김해야 한다.\n\n-전당대회 이후 로드맵은.\n\n▲당대표에 복귀하면 지역별 정책 시리즈, 후보 인재풀 공개, 단일화 원칙을 순차적으로 밝히겠다. 서두르지 않고 검증 가능한 계획으로 가겠다.\n\n-인재 영입의 방향은.\n\n▲기성 정치에 갇히지 않은 청년·여성·전문가를 전면에 세우겠다. 민주당 네트워크 밖의 새로운 인물들에게 기회를 열 것이다.\n"}, {"id": 189, "filename": "2025.08.26 조국 혁신정책연구원장 뉴스1 인터뷰.txt", "title": "조국 혁신정책연구원장 뉴스1 인터뷰", "date": "2025-08-26", "category": "인터뷰", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "검찰개혁", "민생", "의료"], "preview": "2025.08.26 조국 혁신정책연구원장 뉴스1 인터뷰 조국 \"20·30에 13번 사과, 필요하면 더…이들 불만 해소해 성과 입증할 것\"  - 과거 시민단체 '손잡고' 공동대표 당시 '노란봉투법(노조법 2·3조)' 제정을 호소했다. 이번에 통과됐는데 소회가 어떤지.   ▶11년 전 법 제정을 주장했을 당시에는 그 외침이 잘 울려 퍼지지 않았다. 그 당시 손해배상 문제를 노동자 파업에 참여한 노동자 개인에게 해서 집안 파탄이 나는 경우가 많아 '...", "content": "2025.08.26 조국 혁신정책연구원장 뉴스1 인터뷰\n조국 \"20·30에 13번 사과, 필요하면 더…이들 불만 해소해 성과 입증할 것\"\n\n- 과거 시민단체 '손잡고' 공동대표 당시 '노란봉투법(노조법 2·3조)' 제정을 호소했다. 이번에 통과됐는데 소회가 어떤지. \n\n▶11년 전 법 제정을 주장했을 당시에는 그 외침이 잘 울려 퍼지지 않았다. 그 당시 손해배상 문제를 노동자 파업에 참여한 노동자 개인에게 해서 집안 파탄이 나는 경우가 많아 '이건 아니지 않냐'는 생각에 시민단체가 만들어졌다. 그때는 법 제정과 관련해 '말도 안 된다'는 얘기가 많았다. 하지만 시간이 흐르면서 그 요구가 현실로 실현됐다는 점에서 아주 기쁘고 보람 있다. 일각의 반대는 여전히 있지만, 노동 인권 문제와 관련해서 너무 좋은 일이고 조국혁신당이 얘기하는 사회권의 중요한 한 부분이기도 해 큰 의미가 있다고 생각한다.\n\n- 당 대표에 출마하겠다고 했는데 어떤 비전을 갖고 준비 중인가. \n\n ▶ 전당대회 일정이 잡히면 (당 대표직에) 출마할 것이다. 그게 책임 있는 태도다. 제가 창당을 주도했고, 공백기를 거쳐서 돌아온 만큼 당을 재활성화시키고, 당의 역량을 강화해야 한다. 현시점에서 저와 혁신당의 목표는 다음과 같다. ①첫째, 이재명 정부의 성공이다. 이재명 정부는 민주당뿐만 아니라 빛의 혁명을 전체 대변하는 정부이다. ②둘째, 국민의힘 심판과 제1야당의 교체다. 국민의힘이 극우화되고 있다. 우리나라 수준에서 저 정도의 극우 수준의 내란을 옹호·방조하는 인사들이 주권 행사하는 정당이 제1야당이란 것은 말도 안 된다. ③셋째, 중요한 과제는 '국민 삶의 개선'이다. 주거·일자리·돌봄 등 문제를 개선하는 건 결국 돈 문제, 즉 '세금 문제'와 직결된다. 재정·조세 없이는 사회권을 강화하는 길이 불가능하다. 지금 정부는 국채 발행으로 이를 해결하려는 것 같다. 하지만 국채만으로는 안 된다고 생각한다. 당 대표가 되면 재정·조세 정책에 관해 얘기할 생각이다. 중도보수를 자처하는 민주당의 시각만으로는 안 될 수 있다. '좌완 투수'가 돼 사회·경제적 개혁 문제를 앞세우고 책임지는 역할을 하고 싶다.\n\n- 당 대표가 되면 국민의힘과 '악수'할 생각은.\n\n▶ 공식 석상에서 만나면 악수는 한다. 그러나 그들과 협치는 없다. 국민의힘을 예방할지도 생각해 봐야겠다. 국민의힘 당대표가 누가 되든 오히려 내가 그들에게 할 말이 더 많을 거다. 그리고 진보와 보수는 같이 있어야 하는 날개란 말도 있지만, 국민의힘은 대한민국의 오른쪽 날개에 붙어 있는 큰 암 덩어리다. 암 덩어리는 잘라내야 한다. 국민의힘은 보수가 아니다. 민주주의 국가에서 극우정당이 제2당이라는 게 말이 되나. 저런 정당이 보수를 차지하고 있다는 얘기는 대한민국의 미래를 어둡게 하는 것이고 정치적 암이라고 생각한다.\n\n- 정부의 검찰개혁 어떻게 보나. 혁신당의 검찰개혁안에서 반영했으면 좋겠다는 게 있는지.\n\n▶ 검찰개혁 법안은 조국혁신당이 제일 먼저 냈다. '수사기소 분리' 원칙은 변함이 없는 것 같고, 문제는 디테일이다. 이번에 신설되는 중대범죄수사청(중수청)을 어디에 둘 건지, 검찰의 보완 수사권을 어느 범위에서 인정할 건지에 대해서는 당·정·대가 정리가 안 된 것 같다. 조국혁신당은 '중수청을 법무부에 주고, 검찰의 보완수사 요구권을 매우 엄격한 조건에서 한정적으로만 인정한다'고 법안에 담은 바 있다. 국회 법제사법위원회에서 본격 논의를 할 때 조정해 볼 필요가 있다.\n\n- 정부에 '이런 개혁은 꼭 해줬으면 좋겠다' 생각하는 게 있나. \n\n▶ 있다. 지난해 비교섭단체 대표 연설을 할 때 '주거', '돌봄', '의료' 이 3가지를 강조한 바 있다. 이 3가지에 대해 국가가 지금보다 훨씬 더 많이 부담해야 한다. '의료' 문제는 문재인 케어 정책을 통해 그 이전보다 국가가 많이 부담하고 있다. 하지만 '주거', '돌봄' 문제는 여전히 국가의 책임 정도가 좁다. 국가에서 지금보다 훨씬 많이 부담해야 한다. 이 3대 불평등 문제를 국가가 직접, 아주 깊이 개입해서 나서야 한다. 청년·가족 등에겐 주거비 부담이 워낙 크기 때문에 이를 해결하지 않고는 보통 국민들 삶의 고달픔이 해결되지 않는다. 대통령께서 이 과제들에 더욱더 관심을 가져주셨으면 좋겠다.\n\n- 일각에서는 '조국 전 대표의 인기가 전만큼 없을 것'이란 말도 나온다. \n\n▶ 고마운 얘기다. 잘하라는 얘기라고 생각하고, 고깝게 생각하지 않는다. '사건 창조적 인간'이 되고 싶다. 사후적으로 어떤 일에 대해서 하나하나 답하는 것은 '조국 정치'의 핵심이 아니다. 정치인 조국이 하고자 하는 일은, 비판·조롱 다 받아 안고 성과·변화를 만들어서 보여주는 것이다. 새로운 변화를 만들어내면 그에 대해 언론·학계 등에서 다시 평가하지 않겠나. 제 길을 간 뒤에 다음 단계의 성과를 보고 또 평가를 받겠다.\n\n- 20·30 청년층에 '몇 번의 사과를 한다고 해서 마음을 열겠나'라고 발언한 것은. \n\n. ▶ 당시 그 발언 맥락을 보면 청년층에게 '난 사과 안 하겠다'는 뜻이 아니지 않나. 제가 13번 정도 공식 사과를 했고, 앞으로 사과를 하라고 하면 더 할 것이다. 사과를 계속한다고 20·30 세대 마음이 풀리는 게 아니라, 그들이 지금 삶에서 느끼는 고통·불만을 해소하고 1년 뒤 평가를 다시 받는 게 제 일이라고 생각한다. 20·30 세대를 포함해서 저를 비판하는 분들에게 저의 성과·효능을 입증하는 것이 주어진 역할이라 생각한다.\n\n- 사면·복권이 됐기 때문에 혁신당이 민주당을 비판하거나 다른 목소리를 내지 못할 것이란 지적도 있다. \n\n ▶ 전혀 그럴 리 없다. 개인적으로 이재명 대통령께 감사하고 죄송하다. 청와대 민정수석을 해봐서 아는데, 대통령이 사면·복권을 결정하면 무조건 지지율이 떨어진다. 그럼에도 불구하고 사면 결단을 내려주셨단 점에서 감사하고 죄송하다. 다만, 그와 별개로 조국혁신당이 해야 할 역할은 다른 문제다. 민주당은 공식적으로 중도보수 정당이라고 규정했다. 이로 인해 빈 왼쪽 공간을 우리가 확보하고, 정치·사회·경제개혁 문제나 차별금지법 제정 등을 얘기해 나가야 한다. 혁신당은 '한국적 진보'를 추구한다고 생각한다. 민주당과 공통의 부분도 확실히 있다. 그건 언제든지 손잡아야 할 것이고, 다른 부분은 다르다고 얘기를 할 것이다.\n\n- 민주당과 합당, 선거 연대 가능성 관련 언급이 계속 나온다. \n\n ▶ 자강이 우선이다. 합당 가능성보다 조국혁신당과 민주당의 공통 과제가 무엇인지, 이를 실현하기 위해서 어떤 관계를 맺는 게 좋은지부터 얘기해야 한다. 합당한다고 무조건 좋을 거란 보장은 없다. 각 당이 무엇을 추구하는지, 비전·정책이 같은지 봐야 한다. 그런 논의도 없이 합하자고 하면 어떻게 동의할 수 있겠나. 그 점에서 곤란하다. 다만, 다음 선거에서 민주당과 연대하는 것은 100% 무조건 필요하다. 저와 혁신당의 목표는 국민의힘을 심판하는 것이다. 국민의힘 광역자치단체장을 0으로, 다음 총선에서는 의석을 반토막 내야 한다는 저의 목표를 밝히고 실천할 것이다.\n\n- 사면·복권되고 제2의 정치 인생이 열렸단 평이 나오는데 과거와 달라진 점, 앞으로의 행보는.\n\n▶ 창당 시기 내세웠던 정권교체와 윤석열 탄핵이라는 일차적인 목표를 달성했다. 형사 처벌의 문제가 남아있지만 그것은 특검과 법원의 몫이다. 이제 국면이 달라졌고, 지금의 새로운 과제가 필요하다. 검찰개혁도 곧 이뤄진다. 지금 시점에 과거의 영광 얘기하는 것은 의미가 없다. 지금 시점에 필요한 과제를 위해서 노력하고 성과를 내야 한다. 이를 실현함에 있어서 어떤 역할과 쓰임을 할 건지 증명해야 한다는 점에서 새로운 출발점에 있다.\n\n\n\n\n\n"}, {"id": 190, "filename": "2025.08.25 조국 혁신정책연구원장 경남도민일보 인터뷰.txt", "title": "조국 혁신정책연구원장 경남도민일보 인터뷰", "date": "2025-08-25", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "지방선거", "합당", "윤석열"], "preview": "2025.08.25 조국 혁신정책연구원장 경남도민일보 인터뷰 '정치인 조국' 싫은 이들에게 '조국의 정치' 보여줄 것  - 법무부 장관에 임명되기 전에는 미움받는 삶은 거리가 멀었을 것이다. \"그렇다. 개인으로 보면 순탄한 삶을 살았다. 법무부 장관 임명 이후에 삶 자체가 송두리째 무너졌고 가족의 삶도 무너졌다. 외형상으로 조국이라는 사람은 그대로지만 이 안에 있는 마음, 정신이 크게 바뀌는 경험을 한 것 같다. 이전에는 정치인은 아니지만 정치...", "content": "2025.08.25 조국 혁신정책연구원장 경남도민일보 인터뷰\n'정치인 조국' 싫은 이들에게 '조국의 정치' 보여줄 것\n\n- 법무부 장관에 임명되기 전에는 미움받는 삶은 거리가 멀었을 것이다.\n\"그렇다. 개인으로 보면 순탄한 삶을 살았다. 법무부 장관 임명 이후에 삶 자체가 송두리째 무너졌고 가족의 삶도 무너졌다. 외형상으로 조국이라는 사람은 그대로지만 이 안에 있는 마음, 정신이 크게 바뀌는 경험을 한 것 같다. 이전에는 정치인은 아니지만 정치에 관여하는 활동을 했다. 사회 비판 활동을 하고 시민사회 운동을 했다. 나의 뿌리, 정체성을 학자로 전제하고 움직였는데 그게 뽑혀버렸다. 이제 정치인으로서 어떻게 세상에 변화를 일으킬 것인가를 고민하고 있다. 열렬하게 지지하는 분도 국민이고 강하게 반대하는 분도 국민이다. 개인이라면 증오하는 분들과 싸울 수도 있겠지만 지금은 나를 싫어하는 사람의 뜻도 읽으면서 할 일이 무엇인지 고민해야 한다고 생각한다.\"\n\n \n\n- 누구보다 사과를 많이 한 정치인이다. 12.3 내란에 책임 있는 사람들을 모두 합쳐도 조국만큼 사과하지 않았다. 그런데 사과로 부족하고 진정성까지 요구받는다. 제대로 된 사과가 맞느냐는 말도 나온다.\n\"사과 요구가 있으면 또 할 것이다. 사과 요구가 없어도 먼저 사과했다. 사과에 진정성이 없으니 다시 하라고 하면 또 사과하겠다. 이와 별개로 지금 내란 극우 세력은 대부분 그 형식적인 사과조차 하지 않는다. 내란을 방조하고 비호한 국민의힘이 사과를 했는가. 지금도 윤석열 재입당을 말하고 계엄을 계몽령이라고 말한다. 이런 점도 한 번 봐주면 좋겠다. 물론 아무리 사과해도 사과를 받아들이지 않는 분도 있다. 진정성이 없다는 그 마음까지도 읽어야 한다.\"\n\n \n\n- 3년은 너무 길다는 구호가 인상적이었다. 지방선거에 맞춘 다음 구호가 있나. \n\"내년 지방선거, 2028년 총선 구호도 준비했다. 물론 지금 밝힐 수는 없다. 거창하게 이야기하면 3년은 너무 길다는 구호로 총선을 치렀다고 한다. 국민에게 공명을 일으켰고 조국혁신당 표로 왔다. 8개월 동안 갇혀 있으면서 어떻게 6월을 맞이할 것인가. 국민에게 조국혁신당 메시지를 어떻게 압축·요약할 것인가 여러 고민을 담아 슬로건을 짰고 그즈음에 발표할 생각이다.\"\n\n \n\n- '조국 1인 정당'이라는 평가는 어떻게 보나. \n\"내가 창당 주역이기에 주목도가 높다는 것은 사실이다. 그렇다고 1인 정당으로 보는 것은 과도하다. 조국혁신당 국회의원 12명이 각각 역할을 하고 있다. 당 주요 간부들도 역할을 하고 있다. 그런 모든 활동들이 다 압축돼서 저로 표출되는 것이라고 본다. 어쨌든 '1인 정당'이라는 비판 때문에 활동이나 영향력을 줄일 생각이 전혀 없다. 더 적극적으로 크게 활동할 것이다. 다른 국회의원과 앞으로 출마할 후보자들이 저만큼 영향력을 키워야 한다. 다른 분들과 맞추는 게 아니라 최대한 앞서 나가고 다른 분들이 저를 따라잡고 다시 앞서나가는 게 맞다.\"\n\n \n\n- 조국혁신당 창당 당시 경남 유권자에게 눈길을 끌었다. 경남도당 출발도 좋았고 지금도 규모가 작지 않다. 하지만 분위기가 꺾인 것도 사실이다.\n\"당 대표로 출마해서 당선되기 전까지 당을 재활성화하고 당 조직을 확대할 생각이다. 이 과정이 없으면 내년 6월 지방선거에서도 잘 안 될 것이다. 경남도당 포함해서 전국 어디든 찾아다니면서 당원을 만나야 한다. 당원 기운도 살리고 당 활기도 살리고 후보자도 발굴하는 역할을 해야 한다. 그러려고 지금 경남에 온 것이고 창원에 온 것이다.\n\n\n- 윤석열 탄핵 이후 조국혁신당이 효용성을 다했다는 평가에 대해서는?\n\"윤석열 탄핵을 가장 먼저 외친 정당이어서 윤석열 정권을 깨고 검찰 독재를 깨는 쇄빙선 역할에 대해 많은 평가가 있는 것 같다. 수사·기소 분리 법안은 곧 통과될 것이고, 윤석열은 이미 감옥에 있어서 이제 조국혁신당이 다 된 것 아니냐는 이야기가 자연스럽게 나온다. 하지만 조국혁신당은 검찰 독재 종식 말고 다른 과제도 꾸준히 제기했다. 1년 동안 부각되지 않았을 뿐이다. 이제 윤석열 이후를 얘기할 때가 됐다\"\n\n \n\n- 더불어민주당과 국민의힘 양당을 제외한 3당, 특히 진보 정당은 국민의힘은 가장 나쁘다, 민주당은 다를 게 없다, 그래서 우리다. 이런 포지션이다. 조국혁신당은 국민의힘은 사라져야 한다, 민주당은 잘돼야 한다, 민주당이 놓치는 진보 의제는 우리가 선점한다. 이 점에서 포지션이 다르다. 민주당은 불편하고 진보 정당이 보기에는 거슬린다. 조국혁신당 정체성과 지속성을 어떻게 규정하겠나.\n\"이재명 대통령도 후보 시절에 말했듯 민주당은 중도 보수 정당으로 한 칸 갔다. 그러면 왼쪽이 비었다. 우리는 중도 진보를 지향한다. 조국혁신당은 민주당과 세 가지 차이점이 있다. 정치개혁에서 차이가 난다. 우리는 투표의 비례성을 강화해야 한다고 본다. 투표 비례성을 강화하면 조국혁신당만이 아니라 소수 정당 의
