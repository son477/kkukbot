 위한 지원책 대책 마련에 전력을 다하겠습니다.\n\n이 끔찍한 범죄를 종식시키는 데 앞장서겠습니다."}, {"id": 253, "filename": "2기 제23차 최고.txt", "title": "2기 제23차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["최고위", "윤석열", "의료"], "preview": "- 24. 9. 12(목) 10:00 부산 금정구청장 류제성 후보 선거사무소      ■ 조국 대표  추석 한가위가 코 앞입니다.  좋은 날 앞두고 좋은 말씀 드려야 하는데, 그러지 못하게 됐습니다.  지금 나라가 걱정입니다. 국민은 힘들다고 아우성입니다.  더 문제는 희망이 보이지 않는다는 것입니다.    그런데 딴 세상에 사는 부부가 있습니다.  윤석열 대통령과 배우자 김건희 씨입니다.  8월24일 군 골프장에서 부부 동반 골프를 쳤다는 주...", "content": "- 24. 9. 12(목) 10:00 부산 금정구청장 류제성 후보 선거사무소\n\n\n\n\n\n■ 조국 대표\n\n추석 한가위가 코 앞입니다.\n\n좋은 날 앞두고 좋은 말씀 드려야 하는데, 그러지 못하게 됐습니다.\n\n지금 나라가 걱정입니다. 국민은 힘들다고 아우성입니다.\n\n더 문제는 희망이 보이지 않는다는 것입니다.\n\n\n\n그런데 딴 세상에 사는 부부가 있습니다.\n\n윤석열 대통령과 배우자 김건희 씨입니다.\n\n8월24일 군 골프장에서 부부 동반 골프를 쳤다는 주장이\n\n제기됐습니다.\n\n대통령실은 공개적으로 긍정도, 부정도 하지 않고 않습니다.\n\n\n\n물론 대통령 부부는 골프를 칠 수 있습니다.\n\n그런데 이날이 어떤 날인 줄 아십니까?\n\n경기 부천 호텔 화재 희생자분들 장례식 기간이었습니다.\n\n유가족과 지인들이 피눈물을 흘린 날입니다.\n\n\n\n그 뿐인가요?\n\n의료대란으로 응급 환자들은 응급실 뺑뺑이를 돌고 있습니다.\n\n격무에 지친 간호사들은 총파업을 하겠다고 합니다.\n\n그리고 정부는 의료 공백을 메운다고 건강보험 재정 2조억을 끌어들였습니다.\n\n가계빚과 나랏빚을 합쳐 3000조 원이라는 통계가 나왔습니다.\n\n모두 대통령실이라면 먼저 보고받았을 것입니다.\n\n\n\n이런 일은 중국 역사서에나 나오는 줄 알았습니다.\n\n백성은 도탄지경인데, 황제 부부는 주지육림에 빠진다는 설정입니다.\n\n요즘으로 치면, 대통령이 등장하는 드라마인데,\n\n이렇게 쓰면 ‘개연성이 없는 막장’이라고 욕먹을 것입니다.\n\n\n\n이유가 있을 것입니다.\n\n‘의료대란은 의사 탓이고,\n\n가계, 나랏빚 폭증은 전 정권 탓이고,\n\n명품백 논란은 준 사람 탓이다’ 이렇게 생각하고 있는 것 같습니다.\n\n이런 사고체계를 갖지 않고는\n\n지금 이 상황에서 부부가 골프 칠 생각도 못할 것입니다.\n\n\n\n김건희 씨는 자신이 대통령으로 아는 듯합니다.\n\n여당 대표는 물론 의원들에게 감 놔라 배 놔라 합니다.\n\n엊그제는 마포대교와 한강경찰대를 ‘현지 지도’했습니다.\n\n김건희 씨는 “현장에 와보니 미흡한 점이 많다”라고 지적했습니다.\n\n검찰이 다 털어주니 다시 무대로 복귀한 것입니다.\n\n국민 눈에는 배우자가 ‘대통령 놀이’를 하는 것으로 비칩니다.\n\n이러니 국민이 이들을 신뢰할 수 있겠습니까.\n\n\n\n얼마 전에 시사잡지 시사인 조사에서 윤석열 대통령 신뢰도는\n\n10점 만점에 2.82점이었습니다.\n\n역대 현직 대통령으로 최저치입니다.\n\n특히 응답자 중 44.6%가 0점을 주었습니다.\n\n국민이 ‘심리적 탄핵을 했다’라는 말이 괜히 나오는 것이 아닙니다.\n\n\n\n그런데 추석이 끝나면 재보궐 선거에 들어가게 됩니다.\n\n조국혁신당이 바로 오늘 여기, 저희가 긴급 최고위원회, 현장 최고위원회를 하는 금정구에서 승리해야 하는 이유가 있습니다.\n\n\n\n윤석열 정권이 가장 싫어하는 정당이 어디일까요?\n\n감히 자부하건대, 우리 조국혁신당일 것입니다.\n\n가장 앞에서 가장 신랄하고 아프게 공격하고\n\n전혀 타협의 여지를 전혀 두지 않기 때문입니다.\n\n\n\n부울경 메가 시티의 중심이 될 금정 선거에서 혁신당이 승리한다는 것은\n\n윤석열 정권에게 가장 아픈 일격이 될 것입니다.\n\n터무니없는 아집과 나태를 깨는\n\n묵직한 첫 일격이 시작되는 것입니다.\n\n조국혁신당에 힘을 모아주십시오.\n\n\n\n혁신당은 아무 인물이나 내놓고 도와달라고 하지 않습니다.\n\n여기 류제성 후보는 야권의 필승 카드입니다.\n\n그는 거리와 법정에서 인권과 민주주의를 지키기 위해 싸웠습니다.\n\n행정 경험도 풍부합니다.\n\n부산시 감사위원회 위원장으로서 산하 기관과 구?군 감사를 했습니다.\n\n저는 류제성 후보가 야권이 낼 수 있는 최선의 후보라고 확신합니다.\n\n\n\n조국혁신당의 선거전략은 ‘1대1 구도’입니다.\n\n민주진보진영과 국민의힘이 맞서는 모양을 만들어야 합니다.\n\n그래서 지난 총선에서 조국혁신당은 전국의 모든 지역구에서 후보를 내지 않았습니다. \n\n\n\n이번 재보선에서도 마찬가지입니다.\n\n조국혁신당과 민주당이 1대1 구도인 호남에서는 경쟁합니다.\n\n인천 강화에서는 후보를 내지 않고 양보했습니다.\n\n이곳 금정에서는 민주당에게 양보를 요구한 게 아니라,\n\n단일화하자고 제안했습니다.\n\n저희가 바보여서가 아닙니다. 그래야 1대1 구도가 가능합니다.\n\n\n\n민주당은 김경지 후보님을 전략 공천했습니다.\n\n매우 죄송한 말씀이지만, 김 후보님은 전에도 두 번 도전했다가\n\n결실을 거두지 못했습니다.\n\n또 죄송한 말씀이지만 그런 점에서 이번에도 승리를 가져오기 힘든 후보라고 봅니다.\n\n\n\n기존 야당 소속 도전자가 아닌 새롭고 신선한 야당 소속 도전자가\n\n1대1 승부를 벌일 때, 판이 뒤집어질수 있습니다.\n\n\n\n그럼에도 우리는 단일화를 하자고 제안합니다.\n\n그 방식은 단순 여론조사 방식이 아닙니다.\n\n민주적 대표성이 없고 후보의 실력을 검증할 수 없기 때문입니다.\n\n\n\n대신 후보간 공개 토론을 통해\n\n시민들이 판단할 수 있는 기회를 제공한 후,\n\n실력 있는 후보를 뽑을 수 있는 방식으로 단일화해야 합니다.\n\n주민들의 관심을 부를 수 있고,\n\n후보 주목도를 높일 수 있습니다.\n\n\n\n추석 연휴 동안 양당간 실무단위를 구성해서 논의할 것을 제안합니다.\n\n중앙당이나 시당, 어느 쪽이든 무방합니다.\n\n\n\n이렇게 복잡하게 할 이유가 있느냐?\n\n있습니다.\n\n아까 밝힐 것처럼 그냥 한 명의 구청장을 뽑는 선거가 아니라,\n\n민주주의 회복의 발판이 되어야 하기 때문입니다.\n\n\n\n조국혁신당 기호 3번입니다.\n\n3번을 선택해주시면 세 배 나은 부산의 미래,\n\n세 배 나은 대한민국의 미래를 만들겠습니다.\n\n감사합니다. \n\n한가위 잘 쇠시길 기원하겠습니다.  "}, {"id": 254, "filename": "2기 제24차 최고.txt", "title": "2기 제24차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["최고위", "윤석열"], "preview": "- 24. 9. 19(목) 10:00 영광군수 장현 후보 선거사무소    ■ 조국 대표  안녕하십니까, 조국혁신당 대표 조국입니다.  어젯밤에 영광으로 와서 제가 한 달 살이 숙소에서 쉬고,   오늘 아침에 현장 최고위원회 나왔습니다.    정말 덥습니다. 이렇게 무더운 추석이 있었나 싶습니다.  그런데 이 무더위보다 더 국민을 힘들게 하는 게 있습니다.  바로 윤석열 정권입니다.    저는 추석 연휴를 반납하고 이곳 전남 영광군과 곡성군,  ...", "content": "- 24. 9. 19(목) 10:00 영광군수 장현 후보 선거사무소\n\n\n\n■ 조국 대표\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n\n어젯밤에 영광으로 와서 제가 한 달 살이 숙소에서 쉬고, \n\n오늘 아침에 현장 최고위원회 나왔습니다.\n\n\n\n정말 덥습니다. 이렇게 무더운 추석이 있었나 싶습니다.\n\n그런데 이 무더위보다 더 국민을 힘들게 하는 게 있습니다.\n\n바로 윤석열 정권입니다.\n\n\n\n저는 추석 연휴를 반납하고 이곳 전남 영광군과 곡성군,\n\n그리고 부산 금정구를 다녀왔습니다.\n\n윤석열 정권에 대한 민심은 불볕더위와 달리\n\n아주 차갑게 식어 있었습니다.\n\n\n\n부산의 한 택시기사는 제게 이렇게 말씀하셨습니다.\n\n“나라가 잘 되게 하려고 온 국민이 다 노력을 해도 될까 말까인데,\n\n나라를 망치는 건 깡패 같은 대통령 한 명이면 되더라.”\n\n“이렇게 무더운 것도 윤석열 대통령 탓이다.”라는 말까지 하셨습니다.\n\n\n\n윤 대통령 배우자 김건희씨에 대해서도 국민은 울분을 토하셨습니다.\n\n‘대통령 놀음’을 한다는 것입니다.\n\n“지난 대선에서 여성 대통령이 뽑혔었나 하는 착각이 들 지경이다.”라고 말씀하셨습니다.\n\n\n\n게다가 명절 연휴가 끝나자마자 매우 불쾌한 내용의 언론 보도가 나왔습니다.\n\n다들 보셨겠습니다만, 뉴스토마토의 특종 보도입니다.\n\n뉴스토마토는 지난 5일에도 특종 보도를 한 바 있습니다.\n\n김건희 씨가 김영선 전 의원에게 지역구를 창원의창에서 김해갑으로\n\n옮겨 출마하라고 텔레그램을 통해 요청했다는 것입니다.\n\n\n\n그런데 오늘 뉴스토마토는 ‘명태균 게이트’라는 제목으로 후속 보도를 했습니다. 그런데 ‘명태균 게이트’라는 이 문을 열면, 누가 서 있습니까? \n\n윤석열, 김건희 두 사람이 서 있습니다. \n\n‘명태균 게이트’에 등장하는 명태균이란 사람이 윤석열 대통령, 김건희 씨와 통화하면서 2022년 6월 1일 재보궐선거 공천에 개입했다는 것입니다.\n\n명 씨가 앞서 5월 9일 윤 대통령, 김건희 씨와 통화해서\n\n김영선 전 의원을 창원의창 공천을 약속받았다고 합니다.\n\n이 매체는 이를 뒷받침하는 통화 파일이 있다고 썼습니다.\n\n\n\n대통령실은 보름 전 보도에서 통화나 텔레그램 연락 사실에는\n\n긍정도 부정도 하지 않았습니다.\n\n‘김 전 의원은 공천되지 않았다’라고만 했습니다.\n\n창원의창에서는 공천되어 당선되었는데, 뭐라고 답할 것입니까? \n\n\n\n대통령은 공천 개입하면 안 됩니다. 범죄입니다.\n\n박근혜 전 대통령은 공천 개입 사실이 확인되어\n\n징역 2년형에 처해졌습니다.\n\n당시 윤석열, 한동훈 두 사람이 수사와 기소를 지휘했죠.\n\n대통령 배우자의 공천 개입은 두말할 나위 없습니다.\n\n\n\n윤 대통령과 김건희 씨의 공천 개입 사실이 확인되면,\n\n탄핵의 ‘스모킹 건’이 될 것입니다.\n\n그런데 윤석열 정권의 위성정당에 불과한 검찰이 수사할 리가 없습니다.\n\n결국 특검만이 답입니다.\n\n이제 국민의힘 의원들도 김건희 특검법안에 찬성해야 할 것입니다.\n\n\n\n저희가 이곳 영광에서 최고위원회의를 여는 이유가 있습니다.\n\n여의도가 아닌 민심의 바다에서\n\n직접 국민의 목소리를 청취하기 위함입니다.\n\n\n\n그런데 어떤 분들은 이렇게 여쭙습니다.\n\n“꼭 호남에서 민주당과 싸워야 하느냐?”\n\n저는 이렇게 말씀드리고 있습니다.\n\n\n\n“집 주방에 프라이팬, 여럿 갖고 계시죠.\n\n이번에 열전도율이 매우 좋은 프라이팬이 새로 나왔습니다.\n\n코팅이 잘 돼 있어서 눌어붙지 않습니다.\n\n어떤 요리든 척척 해낼 수 있습니다.\n\n최신형 프라이팬 새로 하나 장만해 보십시오.”\n\n이렇게 말씀드립니다.\n\n\n\n조국혁신당은 어떤 당 못지않게 민심을 잘 전달하고,\n\n정치와 행정에 반영할 자신이 있습니다.\n\n\n\n저희가 뛰어 경쟁을 일으키면 관심이 급격히 오릅니다.\n\n역대 호남의 군수 재선거가 이렇게 국민적 관심사가 된 적이 있습니까?\n\n영광과 곡성 군수 재선거, 금정구청장 보궐선거\n\n지상파와 종합일간지에서 이렇게 크게 기사가 난 적이 있었습니까?\n\n제 기억에는 없습니다.\n\n\n\n저희가 경쟁에 뛰어들어 더 좋은 인물, 더 좋은 정책으로\n\n더 좋은 경쟁을 하니까 이렇게 되는 것입니다.\n\n이건 그 누구도 부인하지 못할 것입니다.\n\n\n\n우리 장현 후보가 군수가 되면 영광군은 큰 이익을 얻을 것입니다.\n\n왜냐고요? 조국혁신당 의원 12명은 명예 영광 군수가 될 것입니다.\n\n영광 발전을 위해 장현 군수와 함께 호흡을 맞출 것입니다.\n\n\n\n영광에서 일을 추진하다 막히면,\n\n12명의 의원이 제 일처럼 나설 것입니다.\n\n여차하면 달려올 것입니다.\n\n오늘처럼 말입니다.\n\n\n\n장현 후보의 승리는 윤석열 정권에 가장 아픈 일격이 될 것입니다.\n\n윤석열 정권 조기 퇴진을 가장 앞장서서 \n\n가장 크게 외치는 정당이 누구입니까?\n\n바로 조국혁신당입니다.\n\n저희는 윤석열 정권과 전혀 타협하지 않을 것입니다.\n\n그러니 저희가 승리하면 국민이 저희의 윤 정권 퇴진 주장에\n\n동의하고 있음이 확인되는 셈입니다.\n\n\n\n조국혁신당을 적극 지지해 주십시오.\n\n장현 후보를 적극 지지해 주십시오.\n\n감사합니다. "}, {"id": 255, "filename": "2기 제25차 최고.txt", "title": "2기 제25차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["지방선거", "윤석열"], "preview": "-2024.09.23.(월) 09:30. 본관 224호     ■ 조국 당대표  안녕하십니까 조국혁신당 대표 조국입니다.  10·16 재보궐 선거에 대한 관심이 뜨겁습니다.  지역을 다니면서 주민들을 직접 만나 뵈니 피부로 느껴집니다.  골목 골목까지 찾아온 것을 진심으로 반겨주십니다.  정말 감사드립니다.     민주당의 관심도 높아지는 것 같습니다.  그런데 몇몇 민주당 의원님들은 비방을 하시네요.  “혁신당은 호남에 나서지 말라”라시며, ...", "content": "-2024.09.23.(월) 09:30. 본관 224호\n\n \n\n■ 조국 당대표\n\n안녕하십니까 조국혁신당 대표 조국입니다.\n\n10·16 재보궐 선거에 대한 관심이 뜨겁습니다.\n\n지역을 다니면서 주민들을 직접 만나 뵈니 피부로 느껴집니다.\n\n골목 골목까지 찾아온 것을 진심으로 반겨주십니다.\n\n정말 감사드립니다.\n\n \n\n민주당의 관심도 높아지는 것 같습니다.\n\n그런데 몇몇 민주당 의원님들은 비방을 하시네요.\n\n“혁신당은 호남에 나서지 말라”라시며, 험한 말씀까지 하십니다.\n\n \n\n그러지 말았으면 좋겠습니다.\n\n네 가지 이유가 있습니다.\n\n \n\n첫째, 조국혁신당에 대해서‘상하기 시작한 물이다.’라고 비방하는 분이 있는데,\n\n과하다고 생각합니다.\n\n오히려 경쟁해야 상하지 않습니다.\n\n \n\n호남에서 민주당은 사실상 집권당입니다.\n\n그런데 호남에서 정치 혁신, 새로운 선택지를 희망하는 분들이 매우 많습니다.\n\n이 열망에 부응하는 것이 어찌 ‘상하기 시작하는 것’이겠습니까?\n\n열망을 외면하고 경쟁을 억압하는 것이 바로 ‘상하기 시작하는 길’입니다.\n\n \n\n민주당은 조국혁신당으로서는 상상도 못 할,\n\n엄청난 규모의 선거대책위원회를 꾸렸습니다.\n\n그게 경쟁의 효과, ‘조국혁신당 효과’ 아니겠습니까?\n\n \n\n두 번째, 조국혁신당과 민주당은 ‘우당’입니다.\n\n누가 국민을 더 잘 섬길지 경쟁을 벌이는 상대입니다.\n\n죽기 살기로 전쟁을 벌이는 적이나, 멸절(滅絕)의 대상이 아닙니다.\n\n \n\n우리 조국혁신당은 영광의 장현 후보, 곡성의 박웅두 후보가 당선되도록\n\n정정당당하게 최선을 다하겠습니다.\n\n민주당도 최선을 다하시리라 믿습니다.\n\n호남 유권자들은\n\n각 후보의 능력, 정책, 도덕성, 전과 여부 등을\n\n면밀히 검토하고 판단하실 것입니다.\n\n이 선택권을 박탈할 권한은 누구에게도 없습니다.\n\n \n\n세 번째, 이번 재보궐 선거에서도 협력이 필요합니다.\n\n인천 강화에서는 조국혁신당이 민주당 후보에게 힘을 몰아줄 것입니다.\n\n부산 금정에서는 공개토론 후 후보 단일화를 하자고\n\n여러 번 제안했습니다.\n\n그런데 이 순간까지 아무 답이 없습니다.\n\n이것이 맞습니까?\n\n \n\n금정에서 여덟 번 선거에서 여권 후보가 일곱 번 당선되었습니다.\n\n단일화하지 않으면 필패입니다.\n\n시간이 얼마 남지 않았습니다.\n\n조국혁신당 비난보다는 어떻게 협력할지 더 고민합시다.\n\n조국혁신당과 민주당이 공동선대위원회를 꾸려\n\n단일후보를 위해 같이 뛰는 모습을 국민들께 보여드립시다.\n\n \n\n네 번째, 조국혁신당과 민주당이 난투극을 벌이면 누가 좋아할까요?\n\n답이 뻔합니다.\n\n경쟁은 하더라도\n\n서로의 마음에 상처를 주는 언동, 하지 맙시다.\n\n각 당의 지지층을 서로 싸우도록 부추기는 언동, 하지 맙시다.\n\n \n\n각 당의 지지자들, 그리고 관망하는 국민들은 실망하실 것입니다.\n\n저부터 성찰하고 조심하겠습니다.\n\n \n\n조국혁신당과 민주당 모두, 크게 봅시다.\n\n분노의 화살은 서로를 향해서가 아니라,\n\n윤석열·김건희 공동 정권으로 돌립시다.\n\n \n\n지방선거에서 정정당당한 경쟁,\n\n정권교체라는 최종 목적을 달성하기 위한 협력,\n\n그 길이 바로 민주진보진영의 승리로 가는 첩경입니다.\n\n "}, {"id": 256, "filename": "2기 제26차 최고.txt", "title": "2기 제26차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["민생", "윤석열", "의료"], "preview": "- 24.09.26.(목) 09:30 국회 본관 224호        ■ 조국 당대표     안녕하십니까. 조국혁신당 대표 조국입니다.     엊그제 윤석열 대통령과 한동훈 국민의힘 대표를 비롯해  대통령실과 여당 고위급 인사들이 총출동해서 만찬을 했습니다.     1시간 반 동안 계속된 이 중요한 행사에서  국정 운영과 관련된 내용은 거의 논의되지 않았습니다.  윤석열 대통령이 대화를 독점하다시피 했답니다.  대부분 체코의 원전 수출 자화자찬...", "content": "- 24.09.26.(목) 09:30 국회 본관 224호\n\n \n\n \n\n■ 조국 당대표\n\n \n\n안녕하십니까. 조국혁신당 대표 조국입니다.\n\n \n\n엊그제 윤석열 대통령과 한동훈 국민의힘 대표를 비롯해\n\n대통령실과 여당 고위급 인사들이 총출동해서 만찬을 했습니다.\n\n \n\n1시간 반 동안 계속된 이 중요한 행사에서\n\n국정 운영과 관련된 내용은 거의 논의되지 않았습니다.\n\n윤석열 대통령이 대화를 독점하다시피 했답니다.\n\n대부분 체코의 원전 수출 자화자찬이었다고 합니다.\n\n \n\n흘러나온 내용을 들어보면 실소를 금할 수 없습니다.\n\n집권여당 대표에게 인사말 할 기회도 주지 않았다고 합니다.\n\n독대해달라고 떼를 쓰듯 언론에 이야기하고는,\n\n윤석열 대통령 면전에서 한마디도 못 했던\n\n한동훈 대표도 한심하기는 마찬가지입니다.\n\n \n\n만찬은 언론에 공개도 안 됐고, 달랑 사진만 제공했습니다.\n\n기자들에게 알려진 내용은\n\n돼지고기와 소고기를 냈느니, 술 대신 오미자차를 대접했느니,\n\n윤 대통령은 아이스 카페라테를 주문했다느니 이런 내용만 제공되었습니다.\n\n‘소통’은 없고 ‘밥통’만 비운 셈입니다.\n\n \n\n이 만찬 회동은 윤석열 대통령이 얼마나 지독한 불통 인사인지\n\n생생하게 보여준 증거입니다.\n\n대한민국 역대 대통령 중 이런 불통 대통령을 본 적이 없습니다.\n\n임기 반환점이 목전에 있습니다.\n\n야당 대표와 딱 1번 만났습니다. 그 뒤 감감무소식입니다.\n\n \n\n여당 대표는 선출된 지 두 달 만에 초청해서 밥만 먹었습니다.\n\n \n\n이럴 때입니까?\n\n의료 대란으로 온 나라가 아우성입니다.\n\n김건희 씨를 둘러싼 국정농단 의혹은\n\n하루가 멀다 하고 터져 나옵니다.\n\n장바구니 물가는 무서울 정도로 치솟습니다.\n\n배추 한 포기에 1만원, 큰 마트에는 2만원 짜리도 있습니다.\n\n시금치 한 단은 만원 가까이 합니다.\n\n윤 대통령은 이 정도 가격이면 ‘합리적’이라고 생각하고 있겠지요.\n\n \n\n공공요금은 줄줄이 인상되고 있습니다.\n\n주택용 도시가스 요금은 지난달 6.8% 올랐습니다.\n\n서울 지하철 요금도 150원 오르고, 버스 요금도 오를 참입니다.\n\n상하수도 요금도 5~9% 오른답니다.\n\n \n\n택시 타기 부담되어, 버스와 지하철을 여러 번 갈아타는 소시민,\n\n난방비가 아까워 겨울철에 싸늘한 방에서 살아야 하는\n\n서민에게 큰 타격이 예상됩니다.\n\n \n\n이 지경이니, 윤석열 정권을 극렬 옹호했던\n\n보수 언론도 발을 빼기 시작했습니다.\n\n보수인사인 조갑제씨는 얼마 전 윤석열 대통령을 직격하는\n\n‘못 살겠다, 갈아보자’란 쇼츠를 올렸습니다.\n\n \n\n대표적인 친윤 언론 조선일보의 최근 칼럼을 보셨는지요?\n\n‘윤 대통령은 보수인가?’, ‘신문은 정권을 편든 적 없다’,\n\n‘마포대교에 나타난 김 여사’ 등\n\n윤 대통령의 무능과 무도, 소통 부족을 질타했습니다.\n\n손절하는 듯한 글을 써대기 시작했습니다.\n\n \n\n중앙일보도 막스 베버를 인용해서\n\n‘균형적 판단의 지속적 오작동이 두드러진다’고 썼습니다.\n\n제가 윤 대통령을 “술 취한 선장”이라고 비유했었는데\n\n보수 언론들도 제 말에 동조하기 시작한 것입니다.\n\n \n\n정말 윤석열 대통령, 한심합니다.\n\n대한민국 국민, 불쌍합니다.\n\n \n\n그래서 이번 10월 재보궐 선거가 중요합니다.\n\n지난 총선 참패에도 정신 못 차리는 윤석열 정권에\n\n다시 민심의 무서움을 보여야 합니다.\n\n회초리가 아니라 몽둥이, 촛불이 아니라 횃불을 들어야 할 때입니다.\n\n \n\n반드시 야당이 승리해야 합니다.\n\n호남에는 새로운 효자, 부산 금정에서는 진짜 강자를 뽑읍시다.\n\n \n\n호남에서는 군민들께 누가 더 효도를 잘할지 야당끼리 경쟁합시다.\n\n효도할 자식이 한 명만 있는 것 보다,\n\n두 명이 있는 것이 부모님께 낫지 않겠습니까.\n\n \n\n부산 금정에서는 누가 국민의힘을 이길 수 있는지 겨룹시다.\n\n그렇게 진짜 강자를 뽑아 야당 단일 후보로 승리를 쟁취합시다.\n\n \n\n조국혁신당 간부의 글 중 민주당에 불편한 점이 있었다고 합니다.\n\n당사자가 이미 사과했습니다. 또 요구하신다면 또 사과하겠습니다.\n\n그러니 윤석열 정권 심판을 앞당기는, 더욱 큰 일에 함께 손잡고 매진합시다.\n\n \n\n조국혁신당과 민주당, 10월 16일 이후 서로 안 볼 것입니까.\n\n정권교체를 위해 힘을 합치지 않을 것입니까.\n\n \n\n감사합니다."}, {"id": 257, "filename": "2기 제27차 최고.txt", "title": "2기 제27차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["교육", "민생", "윤석열"], "preview": "-24.09.30.(월) 09:30 국회 본관 224호        ■ 조국 당대표  정치에도 성적표가 있습니다.  첫 번째 과목은 선거입니다. 두 번째는 지지율입니다.  집권 세력에는 과목이 하나 더 있습니다. 나라 살림입니다.     윤석열 정권이 총선에서 대패했음은 잘 아실 것입니다.  국정 지지율은 20% 초반, 레임덕 상태입니다.  조만간 10%대로 떨어질 것입니다.  두 과목은 낙제점입니다.  가장 중요한 나라 살림마저 거덜 내는 중...", "content": "-24.09.30.(월) 09:30 국회 본관 224호\n\n \n\n \n\n■ 조국 당대표\n\n정치에도 성적표가 있습니다.\n\n첫 번째 과목은 선거입니다. 두 번째는 지지율입니다.\n\n집권 세력에는 과목이 하나 더 있습니다. 나라 살림입니다.\n\n \n\n윤석열 정권이 총선에서 대패했음은 잘 아실 것입니다.\n\n국정 지지율은 20% 초반, 레임덕 상태입니다.\n\n조만간 10%대로 떨어질 것입니다.\n\n두 과목은 낙제점입니다.\n\n가장 중요한 나라 살림마저 거덜 내는 중입니다.\n\n \n\n정부가 ‘2024년 세수 재추계 결과 및 대응 방향’을 내놓았습니다.\n\n올해 국세 수입이 자그마치 29조 6천억 원 부족합니다.\n\n \n\n제일 많이 거두지 못한 게 법인세, 즉 큰 기업이 내는 세금입니다.\n\n전체 부족분의 절반 가까이입니다.\n\n삼성전자 등 대기업은 올해 법인세를 한 푼도 내지 않았습니다.\n\n \n\n그런데 매우 이상한 점이 발견됩니다.\n\n예산안은 7월 말 기준으로 짜서 12월 국회를 통과합니다.\n\n이미 지난해 상반기 기업 실적은 전년도 반토막 수준이었습니다.\n\n정부는 ‘상저하고(上低下高)’ 운운하면서 낙관하고 손을 놓고 있었습니다.\n\n \n\n예산안이 통과될 때쯤 정부는 기업 실적을 알았을 겁니다.\n\n그런데도 역시 별다른 조치를 하지 않았습니다.\n\n그러니 펑크가 날 수 밖에요\n\n \n\n세수 추계를 잘못한 게 이번이 처음은 아닙니다.\n\n2021, 22년에는 너무 많이 걷었습니다.\n\n지난해에는 자그마치 56조 원 펑크가 났습니다.\n\n올해까지 2년간 세수 펑크가 86조 원 규모입니다.\n\n최상목 경제부총리는 “송구스럽게 생각한다”라고 사과했습니다.\n\n‘엘리트’를 자처하는 공무원이 모여 있다는 기재부가 계속 틀립니다.\n\n \n\n정부가 돈이 없으니, 쓰지 못합니다.\n\n경기는 나빠집니다.\n\n장바구니 물가는 올라가고, 국민 지갑은 얇아집니다.\n\n \n\n올 최저임금은 9,860원입니다.\n\n한 시간 동안 땀 흘리며 일해봐야, 배추 한 포기 사지 못합니다.\n\n시금치 한 단 사면 남는 게 없습니다.\n\n대한민국이 어쩌다 이 지경이 됐습니까?\n\n \n\n세금이 부족하면 가장 큰 타격을 입는 국민은\n\n나라의 도움을 받는 독거노인 등 취약계층과 서민들입니다.\n\n그리고 지방입니다.\n\n내국세의 40%는 지방교부금, 지방교육재정교부금으로 내려갑니다.\n\n세수 부족으로 앞으로 12조 원 가량 지방으로 못 내려갑니다.\n\n \n\n지난해 정부는 교부금을 임의로 삭감했습니다.\n\n올해도 그럴 겁니까?\n\n \n\n사정이 이런데도 윤석열 정부는 추경은 생각도 하지 않겠다 합니다.\n\n법인세, 종부세, 상속세 등 부자 감세는 계속하겠다 합니다.\n\n대책을 내놓지 않는 것인지, 내놓지 못하는 것인지 알 수가 없습니다.\n\n \n\n이대로는 큰일납니다.\n\n조국혁신당은 ‘지역살리기 오법(五法)’을 개정할 것입니다.\n\n지방교부세법, 지방기금법, 지방분권균형발전법, 지방세법,\n\n부가가치세법 5개 법률을 고쳐 지역에 활기를 불어넣겠습니다.\n\n \n\n부자감세를 막아 서민과 나라 전체를 살리겠습니다.\n\n무엇보다 이번 재보궐 선거에서 여당을 강력히 심판하겠습니다.\n\n \n\n \n\n최근 국회 의원회관에서 ‘탄핵의 밤’ 행사가 열렸습니다.\n\n시민단체 촛불승리전환행동이 민주당 의원 주선으로 모였습니다.\n\n그러자 국민의힘이 발끈하더군요.\n\n \n\n“민주당 의원이 저급한 반헌법적 행사에 길을 터주었다.\n\n민주당은 의원을 제명하고, 탄핵연대도 해체해야 한다.”\n\n이렇게 말했습니다.\n\n \n\n탄핵 추진을 ‘반헌법적’이라고 부르는 여당 인식이 매우 놀랍습니다.\n\n헌법 65조 1항 일부를 인용하겠습니다.\n\n“대통령, 국무총리, 국무위원 등 법률이 정한 공무원이\n\n직무집행에 있어서 헌법이나 법률을 위배한 때에는\n\n국회는 탄핵의 소추를 의결할 수 있다.”\n\n탄핵 추진을 반헌법적이라고 생각하는 것이 바로 반헌법적입니다.\n\n \n\n국민의힘 전신 한나라당은 노무현 대통령 탄핵을 추진한 바 있습니다.\n\n자신이 하면 합헌적이고, 상대가 하면 반헌법적입니까?\n\n \n\n조국혁신당은 7월 25일 ‘3년은 너무 길다 특별위원회’,\n\n즉 탄핵추진위원회를 발족한 바 있습니다.\n\n그 누구보다 먼저 나서,\n\n탄핵의 증거를 수집하고 논리를 점검하고 있습니다.\n\n \n\n시민은 이미 대통령을 심리적으로 탄핵했습니다.\n\n탄핵의 민심이 거리를 넘어 국회 안으로 들어 오고 있습니다.\n\n특히 최근 선출되지 않은 권력 김건희 씨의 국정 농단과\n\n공천개입 의혹이 수면 위로 떠오르면서\n\n법적 탄핵으로 가는 길이 열렸습니다.\n\n \n\n재1야당인 더불어민주당도 ‘탄핵할 결심’을 해주십시오.\n\n야당 전체가 결심하고 같이 행동하면 탄핵을 예인할 수 있습니다.\n\n얼마 남지 않았습니다."}, {"id": 258, "filename": "2기 제28차 최고.txt", "title": "2기 제28차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["지방선거", "윤석열"], "preview": "-24.10.04(금) 국회 본관 224호     ■ 조국 대표  안녕하십니까?  조국혁신당 대표 조국입니다.     내년 1월 금융투자소득세, 즉 ‘금투세’ 시행을 앞두고  정치권에서 유예 또는 폐지 주장이 나오고 있습니다.     저희 입장을 밝히겠습니다.  몇 가지 보완이 필요하지만,  금투세를 시행하는 것이 옳다라고 봅니다.     정치는 약속입니다.  여야정이 동의해서 2020년 12월 법안을 통과시켰습니다.  그럼, 약속을 지켜야 합...", "content": "-24.10.04(금) 국회 본관 224호\n\n \n\n■ 조국 대표\n\n안녕하십니까?\n\n조국혁신당 대표 조국입니다.\n\n \n\n내년 1월 금융투자소득세, 즉 ‘금투세’ 시행을 앞두고\n\n정치권에서 유예 또는 폐지 주장이 나오고 있습니다.\n\n \n\n저희 입장을 밝히겠습니다.\n\n몇 가지 보완이 필요하지만,\n\n금투세를 시행하는 것이 옳다라고 봅니다.\n\n \n\n정치는 약속입니다.\n\n여야정이 동의해서 2020년 12월 법안을 통과시켰습니다.\n\n그럼, 약속을 지켜야 합니다.\n\n \n\n법 통과 이후 달라진 점은 하나입니다.\n\n여야가 뒤바뀌었다는 점입니다.\n\n그게 이 법을 없애거나 시행을 미룰 이유가 되지 않습니다.\n\n \n\n이 법은 애초 금융시장을 왜곡하는 과세 체계를 정비하고,\n\n선진화하기 위해 마련되었습니다.\n\n \n\n현재 주식, 채권, 파생상품 등 양도차익에 대해 비과세가 많습니다.\n\n비슷한 이익이 나는 금융투자상품에도 세금을 달리 매깁니다.\n\n한 상품에서 이익을 보면 전체 금융투자 상품에서 손실이 나도\n\n세금을 내는 경우가 있습니다.\n\n이런 문제를 해결하자는 취지로 만든 법입니다.\n\n \n\n이 법에는 소액 투자자 보호장치가 있습니다.\n\n1년 금융투자소득 5천만원까지는 세금을 안 물립니다.\n\n이에 이 세금은 사실상 투자자중 1% 정도에게만 물립니다.\n\n시장에 미치는 영향을 최소화하기 위한\n\n의제취득가액 제도도 있습니다.\n\n \n\n시행이 한번 유예돼 내년 1월 시행을 앞두고 있습니다.\n\n그런데 난데없이 윤석열 대통령이 끼어들었습니다.\n\n그가 대선 후보 때인 2022년 1월,\n\n그리고 총선을 앞둔 올 2월 금투세 폐지를 언급했습니다.\n\n \n\n폐지하자는 이들은 투자자들의 국내시장 탈출을 우려합니다.\n\n국내 시장을 빠져나갈 정도로 많은 세금을 낼 사람 중에\n\n총수 일가처럼 주식을 팔 수 없는 사람도 적지 않습니다.\n\n \n\n또 금투세가 도입되면 국내주식과 해외주식에 대해\n\n세율은 같지만, 공제금액이 다릅니다.\n\n해외주식으로 돈을 벌면 국내주식보다\n\n1천만원 가까이 세금을 더 내야 합니다.\n\n \n\n물론 세금을 내라니 불만과 불안감이 있을 것입니다.\n\n보완하면 됩니다.\n\n적게 버는 투자자들 세율을 낮춰줄 수 있습니다.\n\n장기 보유자에게 혜택을 주고,\n\n혹시라도 있을 증시 충격에 대응할 안정 펀드를 운영하면 됩니다.\n\n \n\n금투세마저 깎아주면 폐지되는 증권거래세와 합쳐\n\n해마다 세금 6조에서 7조 원이 빕니다.\n\n그렇지 않아도 세수 펑크가 계속되는데,\n\n이 재원은 어떻게 마련할 것입니까?\n\n결국 서민과 월급쟁이 쥐어짜는 것 아니겠습니까?\n\n \n\n정치는 약속이지만, 생물이기도 합니다.\n\n상황이 변했다면 제대로 설명하고 대책을 마련하면 됩니다.\n\n더욱이 현재 여당 원내대표인 추경호 의원은 야당 의원 시절\n\n소득세법 개정안과 증권거래세법 폐지 법안을 발의해\n\n금투세 도입을 주도했습니다.\n\n당시 공제금액은 1천만원으로,\n\n현행 법보다 훨씬 많은 투자자에게 세금을 걷게 하였습니다.\n\n \n\n그런데 이제 와서 없애자고 합니다.\n\n어느 장단에 춤을 추라는 얘기입니까?\n\n민주당은 이 흐름에 편승해서는 안 됩니다.\n\n \n\n유예해서도 안 됩니다.\n\n1년을 미루면 지방선거, 그 다음 해에는 대선이 있습니다.\n\n더욱 시행하기 힘들어집니다.\n\n \n\n투자자들의 우려를 불식할 수 있는 조치를 취하더라도\n\n금투세는 예정대로 시행해야 합니다.\n\n조국혁신당은 이를 당론으로 채택해 추진할 생각입니다.\n\n \n\n조국혁신당이 주창해 온 부산 금정구청장 선거의\n\n후보 단일화 논의에 마침내 시동이 걸렸습니다.\n\n \n\n저는 8월 26일 재보궐 선거 전략으로\n\n호남에서 경쟁, 영남에서 협력을 촉구해왔습니다.\n\n금정에서 후보 단일화를 한달 넘게 수차례 요구했습니다.\n\n조국혁신당 류제성 후보도 여러 차례 후보 단일화 협상을 위해\n\n후보자끼리 만나자고 제안했습니다.\n\n \n\n이유는 간단합니다. 필승전략이기 때문입니다.\n\n \n\n어제, 민주당 이재명 대표님이 부산 후보 단일화 의지를 밝혔습니다.\n\n크게 환영합니다.\n\n \n\n후보 단일화는 이기는 단일화여야 합니다.\n\n진 쪽이 뒤로 물러서는 ‘뺄셈의 단일화’여서는 안 됩니다.\n\n후보와 지지자를 단단히 묶는 ‘덧셈의 단일화’여야 합니다.\n\n이는 국민의 정권 심판 의지를 드높이고\n\n민주진보진영의 활력을 제고시킬 ‘곱셈의 단일화’가 될 것입니다.\n\n \n\n후보자 간의 치열하고 진지한 토론이 이루어져야 합니다.\n\n두 후보간 토론을 국민과 금정구민들께서 지켜보시고\n\n누가 강한 후보인지,\n\n누가 윤석열 정권이 내세운 후보를 꺾을지 결정하실 것입니다.\n\n \n\n현시점에 세세한 협상이 마무리되지는 않았습니다.\n\n그러나 양측 협상단에게 대승적 차원에서\n\n담대한 타결을 해주실 것을 요청합니다.\n\n \n\n그렇게 해서 단일화된 후보를 저는 무조건 지지할 것입니다.\n\n상상해보십시오.\n\n민주진보진영의 단일 후보를 저 조국과 이재명 대표가\n\n함께 다니며 지지를 호소하는 장면 말입니다.\n\n \n\n금정 승리는 단지 구청장 선출에 그치지 않을 것입니다.\n\n우리가 승리하면 용산은 난리가 날 것입니다.\n\n윤석열 정권이 흔들리는 결정적 계기가 될 것입니다.\n\n대한민국을 부활시킬 출발 신호가 될 것입니다.\n\n감사합니다."}, {"id": 259, "filename": "2기 제29차 최고.txt", "title": "2기 제29차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["윤석열"], "preview": "- 24.10.07(월)09:00  국회 본관 224호     ■ 조국 대표  안녕하십니까? 조국혁신당 대표 조국입니다.     어제 부산 금정에서는 작아 보이지만,  큰 의미가 있는 사건이 있었습니다.     민주진보진영의 금정구청장 단일 후보 경선에서  더불어민주당 김경지 후보께서 선택되셨습니다.  이 자리를 빌어 축하 말씀 전합니다.  잘 해내시리라 믿습니다.     그리고 조국혁신당 우리 류제성 후보님께도  감사와 축하 말씀을 드립니다....", "content": "- 24.10.07(월)09:00  국회 본관 224호\n\n \n\n■ 조국 대표\n\n안녕하십니까? 조국혁신당 대표 조국입니다.\n\n \n\n어제 부산 금정에서는 작아 보이지만,\n\n큰 의미가 있는 사건이 있었습니다.\n\n \n\n민주진보진영의 금정구청장 단일 후보 경선에서\n\n더불어민주당 김경지 후보께서 선택되셨습니다.\n\n이 자리를 빌어 축하 말씀 전합니다.\n\n잘 해내시리라 믿습니다.\n\n \n\n그리고 조국혁신당 우리 류제성 후보님께도\n\n감사와 축하 말씀을 드립니다.\n\n왜 위로가 아니라 축하냐?\n\n \n\n류제성 변호사가 정치에 뛰어든 게 불과 47일 전입니다.\n\n그런데 그가 보궐선거 후보로 나서면서\n\n부산 금정구를 대한민국 정치 태풍의 눈으로 만들었습니다.\n\n그 중심에 자신이 우뚝 섰습니다.\n\n \n\n류 변호사의 결단과 헌신이 없었다면 불가능했을 것입니다.\n\n조국혁신당은 금정구청장 후보직을 잃었지만,\n\n전도양양한 정치 인재를 얻었습니다.\n\n그러니 위로보다 축하가 더 걸맞은 일입니다.\n\n \n\n류 변호사 배우자 김선화 님께도 감사 인사 드립니다.\n\n경선 때 “지금이 제 인생 최고의 날이다.” 라고 말하면서 진지하게 임하던 모습은 금정구를 넘어 전국에 각인되었습니다.\n\n \n\n이로써 조국혁신당은 대중정당으로 한 발 더 나갔습니다.\n\n지지해주신 분들께도 당 대표로서 감사드립니다.\n\n조국혁신당은 앞으로도 지역 정치 혁신을 위한 도전을\n\n멈추지 않을 것입니다.\n\n \n\n저는 지난 40일 동안 지역 민심을 청취했습니다.\n\n차로 1만 킬로미터 넘게 달렸습니다.\n\n서울-부산을 열서너 번 왕복할 거리입니다.\n\n국민의 요구는 오로지 하나,\n\n무능, 무도, 무책임한 윤석열 정권을 빨리 끝내 달라는 것입니다.\n\n \n\n그래서 금정구청장 후보 단일화는 자못 의미가 큽니다.\n\n윤석열 정권의 조기 종식에 뜻을 모은 국민은\n\n민주진보진영 후보 단일화를 첫 번째 명령으로 내렸습니다.\n\n조국혁신당과 민주당은 그 국민의 명령을 이행했습니다.\n\n \n\n이는 앞으로 윤석열 정권을 끌어 내리는 데 있어\n\n민주진보진영의 경쟁과 연대의 시금석이 될 것입니다.\n\n우여곡절이야 있겠지만,\n\n‘종국에는 분열하지 않는다.’라는 점을 국민들께 확신시켜 드렸습니다.\n\n저는 다른 무엇보다 이 점이 기쁩니다.\n\n \n\n그런데 조국혁신당의 10월 재보궐 선거 참여 이후,\n\n민주진보진영 일각에서 도를 넘는 비난과 견제가 일고 있습니다.\n\n조국혁신당은 만들어진 지 1년도 되지 않은 작은 정당입니다.\n\n그러나 분명히 말씀드리겠습니다.\n\n조국혁신당은 조국혁신당입니다.\n\n \n\n조국혁신당은 창당 때부터 천명한 원칙대로 임하고 있습니다.\n\n독자의 비전과 정책은 포기하지 않습니다.\n\n \n\n그러나 선거에서는 민주진보진영과 윤석열 정권의\n\n1대1 구도를 반드시 만듭니다.\n\n이것이 전제되지 않는 경쟁은 파괴적이지만,\n\n이것을 기초로 하는 경쟁은 생산적입니다.\n\n \n\n자기 당의 이익은 소중합니다.\n\n그렇더라도 타당과 타당 후보를\n\n할퀴거나 짓이기는 일은 옳지 않습니다.\n\n이는 우리 조국혁신당 당원들에게도 마찬가지입니다.\n\n우리는 정권교체와 4기 민주정부 수립을 위해\n\n힘을 합쳐야 될 동지 아닙니까?\n\n \n\n조국혁신당과 민주당이 서로 헐뜯으면,\n\n저 조국과 이재명 대표가 싸우면, 누가 좋아하겠습니까?\n\n윤석열·김건희 부부, 용산 대통령실과 국민의힘,\n\n친윤 언론과 정치 검찰입니다.\n\n \n\n민주진보진영의 성공적 후보 단일화에 대해\n\n국민의힘 한동훈 대표는 “정치적 야합을 위한 단일화 쇼, 잔기술”\n\n이라고 비방했습니다.\n\n \n\n날아가던 까마귀도 웃을 일입니다.\n\n민주진보진영이 후보 단일화하면서\n\n밀실에서 만나 밥과 술 먹으면서 결정했습니까?\n\n아니면 무당이 점지한 사람을 골랐습니까?\n\n국민의 지엄한 명령을 받아\n\n정당한 방법으로 공개적이고 투명하게 치러냈습니다.\n\n어디에 부정한 점이 있습니까?\n\n \n\n진짜 야합이 뭔지 아십니까?\n\n선출되지 않은 권력, 김건희 씨 방탄을 하려고\n\n대통령실과 검찰이 짬짜미하는 것이 야합입니다.\n\n그 뒤를 따르며 자잘한 법 기술을 부리는\n\n국민의힘이야말로 야합의 졸개 아닙니까?\n\n참, 비루합니다."}, {"id": 260, "filename": "2기 제3차 최고.txt", "title": "2기 제3차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["윤석열"], "preview": "2024. 7. 24(수) 09:30 국회 본관 316호    ■ 조국 당대표     두 군데서 벌어지는 정치 싸움이 가관입니다.  여당 전당대회와 검찰 내 힘겨루기입니다.    여당 전대에서 범죄 고백, 폭로 쇼가 이어졌습니다.  조금 더 해주길 바랐는데, 끝나니 아쉬운 감정이 좀 듭니다.  그 정도로도 충분합니다. 잘 봤습니다.    검찰에서 벌어지는 일은 더 가관입니다.  김건희 씨 조사 이후 시중에는 검찰을 배달앱에 깔자는 말이 돕니다....", "content": "2024. 7. 24(수) 09:30 국회 본관 316호\n\n\n\n■ 조국 당대표 \n\n\n\n두 군데서 벌어지는 정치 싸움이 가관입니다.\n\n여당 전당대회와 검찰 내 힘겨루기입니다.\n\n\n\n여당 전대에서 범죄 고백, 폭로 쇼가 이어졌습니다.\n\n조금 더 해주길 바랐는데, 끝나니 아쉬운 감정이 좀 듭니다.\n\n그 정도로도 충분합니다. 잘 봤습니다.\n\n\n\n검찰에서 벌어지는 일은 더 가관입니다.\n\n김건희 씨 조사 이후 시중에는 검찰을 배달앱에 깔자는 말이 돕니다. 그리고 검찰은 내분에 휩싸였습니다.\n\n윤석열 대통령 배우자 김건희씨 조사를 놓고 내분이 일어나고 있습니다.\n\n고려시대 무신정권 내부 권력투쟁 같은 싸움이 전개됐습니다.\n\n\n\n검사들을 총지휘한다는 검찰총장이\n\n가장 중요한 수사 보고를 제때 못 받았습니다.\n\n화가 난 검찰총장은 국민께 사과하면서\n\n수사를 담당하는 서울중앙지검장을 불러 혼을 냈습니다.\n\n그 지검장은 대통령이 내리꽂은 인물이지요.\n\n대검찰청과 서울중앙지검이 각각 언론사를 골라\n\n소식을 흘리면서 유리한 여론을 만들어내고 있습니다.\n\n\n\n국민의힘도 나섰습니다. \n\n권양숙 여사도 부산지검에서 ‘출장 조사’를 받았으니 \n\n문제가 이런 황당한 주장을 합니다. \n\n이것이 ‘출장조사’라면 김건희 여사는 대통령실 경호처가 아니라\n\n용산에서 가까운 ‘서울서부지검’에서 조사를 받았어야 합니다. \n\n이 뿐이 아닙니다. \n\n국민의힘에서 난데없이 저의 검찰조사도 \n\n거론하며 변호에 나섰습니다. \n\n저는 서울중앙지검과 동부지검에 출석하여 조사를 받았습니다.\n\n제가 언제 검찰의 출장을 요청한 적이 있습니까?\n\n황당합니다. \n\n\n\n세금으로 월급 줘가며 범죄자 잡고 기소 잘 하라고 지시했는데\n\n자기들끼리 패를 갈라 싸우고 언론 플레이를 하고 있습니다.\n\n\n\n김건희 씨 변호인들이 시키는 대로 출장 조사를 했던 검사는\n\n진상 조사 지시에 반발해서 사표를 내는 쇼를 벌입니다.\n\n스마트폰까지 대통령실에 제출하며 머리를 조아린\n\n검사가 무슨 체면이 남아서 반발하는지, 이해가 안 됩니다.\n\n무혐의로 이미 가닥 잡았놓았으니, 사표 내도 된다고 생각한 듯 합니다.\n\n대통령 훈포장은 따놓은 셈인가요?\n\n\n\n더 웃긴 곳은 대통령실입니다.\n\n이원석 검찰총장은 “대통령 부인 조사 과정에서\n\n원칙이 지켜지지 않았다”라고 말했습니다. 맞는 말입니다.\n\n그러자 대통령실 관계자는 \n\n“이해되지 않는다. 정치적 행위라고 본다”라고 검찰총장을 공격했습니다.\n\n‘검찰 입틀막’이입니다.\n\n\n\n조선 시대로치면 사헌부(司憲府)에서 문제를 제기하자,\n\n승정원(承政院)이 ‘정치질’이라고 비난하는 셈입니다.\n\n궁중 암투의 끝판을 보여줍니다.\n\n\n\n문재인 정부 시절 청와대가 이런 메시지를 내보냈다면\n\n어떤 일이 벌어졌을까요?\n\n“우리 검찰총장님을 지키자!”\n\n“청와대를 규탄한다” 등의 글을 검찰게시판에 도배가 되었겠지요.\n\n그러나 지금은 쥐죽은 듯 조용합니다.\n\n“왕 검찰총장” 윤석열 대통령의 눈치를 보고 납작 엎드려 있는 겁니다.\n\n\n\n검찰을 정치화한 장본인이 누구입니까? 윤석열 검찰총장입니다.\n\n검찰권을 사용하며 정치질을 하다가 성공해서\n\n측근과 후배 검사들에게 헛된 꿈을 심어준 사람이 바로 윤석열 대통령입니다.\n\n\n\n현 검찰총장이 김건희 씨 수사 의지를 내비치자,\n\n서울중앙지검장 등을 자기 입맛에 맞는 인물로 교체한 사람이\n\n윤 대통령입니다. \n\n요컨대, 검사 정치질의 교본을 몸을 보여준 사람이\n\n바로 윤석열대통령입니다.\n\n\n\n카카오 창업주 김범수씨는 SM엔터테인먼트\n\n시세 조종 혐의로 구속됐습니다.\n\n검찰은 카카오 부속 청사를 방문해서 김 씨를 조사하지 않습니다.\n\n김 씨를 무혐의로 빼주지 않았습니다.\n\n김범수 씨 배우자가 대통령이 아니라서 그런 것입니까?\n\n\n\n그러고 보니 윤석열 정부가 잘한 게 딱 하나 있습니다.\n\n정치검찰의 시커먼 속마음과 악취를 세상에 드러내\n\n혁신 대상이라는 점을 국민께 확인시켜 준 것입니다.\n\n또 ‘김건희 종합 특검’이 왜 필요한지도 보여줬습니다.\n\n\n\n이원석 총장은 더 망신당하기 전에 진실을 국민께 밝히고\n\n사퇴하십시오.\n\n당신은 국민을 위해 복무하는 공무원이지,\n\n특정한 사람에게 충성하는 검사가 아니지 않습니까.\n\n부끄러운지 아십시오.\n\n\n\n국민의힘 전당대회에서 한동훈 씨가 당 대표가 됐습니다.\n\n축하합니다. 이제는 얼굴 한번 보겠습니다.\n\n참, 곧 ‘한동훈 특검법’이 국회 본회의에 제출될 것인데,\n\n찬성하리라 믿습니다.\n\n“살아있는 권력”은 더욱 엄정하게 수사되어야 한다는\n\n소신을 가진 분이시고,\n\n자신은 무결하다고 믿는 분이시니까요.\n\n법 통과에 동의하고 당당히 수사받길 바랍니다.\n\n무운을 빕니다.     \n\n\n\n"}, {"id": 261, "filename": "2기 제30차 최고.txt", "title": "2기 제30차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["교육", "윤석열", "의료"], "preview": "- 24.10.10(목). 국회 본관 224호     ■ 조국 대표  요즘 신문, 방송, 유튜브는  온통 김건희, 윤석열 대통령 부부 이야기로 범벅이 돼 있습니다.  그런데 그 행태를 보면 지금이 21세기인지, 구한말인지,  서기 1,000년인지, 2,000년 전인지 모르겠습니다.     국정감사장에는 김건희 씨 의혹이 넘쳐납니다.  관저 증축, 디올백 수수, 낙하산 인사 개입, 주가 조작,  양평 고속도로 특혜, 석박사 논문 표절, KTV 황...", "content": "- 24.10.10(목). 국회 본관 224호\n\n \n\n■ 조국 대표\n\n요즘 신문, 방송, 유튜브는\n\n온통 김건희, 윤석열 대통령 부부 이야기로 범벅이 돼 있습니다.\n\n그런데 그 행태를 보면 지금이 21세기인지, 구한말인지,\n\n서기 1,000년인지, 2,000년 전인지 모르겠습니다.\n\n \n\n국정감사장에는 김건희 씨 의혹이 넘쳐납니다.\n\n관저 증축, 디올백 수수, 낙하산 인사 개입, 주가 조작,\n\n양평 고속도로 특혜, 석박사 논문 표절, KTV 황제관람 등\n\n다 읽자니 숨이 찰 지경입니다.\n\n이런 일을 혼자 다 했다면,\n\n당나라 때 측천무후에 뒤지지 않을 것 같습니다.\n\n \n\n후한(後漢) 말 부패한 환관 집단 십상시(十常侍)까지 거론됩니다.\n\n대통령실 행정관 출신, 김대남 전SGI서울보증 감사위원은\n\n“용산에 십상시 같은 몇 사람이 있다. 여사가 자기보다\n\n어린 애들을 갖고 쥐었다 폈다 하며 시켜 먹는다”라고 합니다.\n\n \n\n윤 대통령은 공화국 대통령이 아니라 왕처럼 굽니다.\n\n손바닥에 임금 왕(王)자를 썼던 것은 애교 수준입니다.\n\n좋아하는 사람만 불러 주연을 베풀고, 왕비가 하자는 대로 합니다.\n\n걸핏하면 격노하고, 쓴소리하는 사람 내치고, 간신만 주위에 둡니다.\n\n역사에서 이런 임금을 혼군(昏君), 암군(暗君)이라고 했습니다.\n\n \n\n이들 부부 곁에는 꼭 무당 이야기가 나옵니다.\n\n스승이네, 예언가네 하지만, 그래봤자 무당입니다.\n\n꼭 고종 때 진령군이라는 무당 비슷합니다.\n\n진령군은 고종 부부의 사랑을 받아 온갖 인사에 개입했습니다.\n\n진령군 집 앞에 청탁 선물을 갖다 바치려는 이들이 줄을 섰습니다.\n\n조선이 어떻게 되었는지는 다 아실 것입니다.\n\n \n\n요즘 명태균 씨가 화제의 중심입니다.\n\n윤 대통령을 자신이 만들어냈다고 합니다.\n\n김건희 씨와 문자를 꽤나 주고받았다고 합니다.\n\n윤석열 대통령 부부 집에도 들락거렸다고 합니다.\n\n“내가 입을 열면 한 달 안에 대통령이 탄핵될 텐데, 감당되겠나?”\n\n라고 했습니다.\n\n일개 정치 브로커가 대통령을 대놓고 겁박합니다.\n\n \n\n이 지경인데 대통령실은 대응을 제대로 하지도 못합니다.\n\n“별로 친분은 없다.”라는 하품 같은 변명만 합니다.\n\n \n\n한덕수 총리는 어떤가요?\n\n실세라는 김태효 안보실 제1차장에 대한 질타가 국회에서 쏟아지자\n\n한덕수 총리는 이렇게 말합니다.\n\n“그분은 그런 분이 아닙니다.”\n\n일국의 총리가 차관급 인사 이름을 제대로 부르지 못합니다.\n\n \n\n한 총리는 친윤 신문과 인터뷰에서 윤 대통령에 대해\n\n“대인이시다. 제일 개혁적인 대통령이고”라고 합니다.\n\n \n\n이 정도는 약과입니다. 다음과 같은 칭송 들어보셨는지요?\n\n“대한민국 역사상 최초로 진정한 노동 개혁을 이룬 분,\n\n27년간 단 한 번도 뚫린 적이 없이 꽉 막혀 있었던\n\n의료 개혁을 마침내 이뤄낸 분,\n\n망가져 가는 원전 사업을 다시 일으켜 세운 분,\n\n제2의 중동 붐을 일으킨 분,\n\n저출생이던 대한민국을\n\n집집마다 아이들의 울음소리로 가득 채우신 분.”\n\n극우 유튜버 출신으로 국가공무원인재개발원장이 된 김채환 씨의 발언입니다.\n\n개발원 공식 유튜브 채널에서 한 말입니다.\n\n듣고 있자니 제삼자인 제 얼굴이 화끈거릴 정도입니다.\n\n \n\n왜 이 지경이 되었을까요?\n\n더 말할 것도 없습니다.\n\n국감에서 드러나고 언론에서 보도된 의혹들은\n\n빠짐없이 사실을 규명해야 합니다.\n\n \n\n김건희·윤석열 부부의 방탄 공무원단인 검찰은 할 수 없습니다.\n\n수사를 하더라도 변죽만 울리다가\n\n대통령 부부는 무혐의라고 결론 지을 것입니다.\n\n특별검사가 수사해야 합니다.\n\n민주당이 추진 중인 상설특검을 이런 점에서 찬성합니다.\n\n대한민국의 침몰을 보고만 있을 수는 없지 않습니까?\n\n \n\n16일 재보궐 선거를 앞두고 사전 투표가 진행됩니다.\n\n11일, 12일 인천 강화, 전남 영광과 곡성, 부산 금정구에서 지정되어있는 관내 사전 투표소에서 미리 한 표를 행사하실 수 있습니다.\n\n오전 6시부터 오후 6시까지 가능하며, 신분증을 가져가셔야 합니다.\n\n \n\n16일 재보궐선거일은 평일이어서 시간 내기 쉽지 않을 수 있습니다.\n\n11, 12일 이틀중 편한 시간에 사전 투표를 하시는 게 편합니다.\n\n \n\n사전 투표는 민주시민들의 기세를 보여주는 행위입니다.\n\n사전 투표율이 높으면 대체로 민주진보진영에 도움이 많이 됐습니다.\n\n많이 참여하셔서 투표해주시길 바랍니다.\n\n \n\n이번 선거는 지방정부의 일꾼, 목민관을 뽑는 선거입니다.\n\n이들이야말로 주민 삶에 가장 밀착된 행정을 합니다.\n\n잘 뽑아야 하는 것은 물론입니다.\n\n \n\n또 윤석열 정권에 대한 심판 성격이 강합니다.\n\n4월 총선에 참패하고도 정신 못 차리는 윤석열 정권을\n\n이번 재보궐 선거에서 다시 혼쭐을 내줘야 하지 않겠습니까?\n\n \n\n유권자분들뿐만 아니라 선거가 치러지지 않는 곳의\n\n국민께서도 관심을 가져주십사 요청 드립니다.\n\n \n\n재보궐 선거 지역이 고향이신 분들, 그곳에 지인이 있는 분들은\n\n꼭 전화, 문자, 카톡을 33번씩 해주시길 바랍니다.\n\n이렇게 하시면 선거 결과를 바꿀 수 있습니다.\n\n \n\n중요한 선거가 하나 더 있습니다.\n\n서울시교육감 보궐선거입니다.\n\n이 선거는 서울의 교육, 더 나아가 대한민국 교육이\n\n어떤 방향으로 갈지 결정하게 됩니다.\n\n \n\n어떤 후보는 혁신 교육을 하겠다고 하고,\n\n어떤 후보는 뉴라이트 색채의 교과서가 문제 없다고 합니다.\n\n \n\n자칫하면 우리 후배들, 우리 아이들에게\n\n일제 강점기가 한국 근대화에 도움이 된 것처럼 기술되거나\n\n위안부 강제성을 삭제하고, 친일 부역을 ‘협력’으로 쓴\n\n교과서가 퍼질지도 모릅니다.\n\n생각만 해도 끔찍합니다.\n\n \n\n서울시민께서는 경각심을 가지셔야 합니다.\n\n뉴라이트, 실제로는 친일 밀정 같은 이들은\n\n시민의 무관심 속에서 교육감 선거가 끝나기만을 기다립니다.\n\n악은 무관심을 먹고 번성합니다."}, {"id": 262, "filename": "2기 제31차 최고.txt", "title": "2기 제31차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["교육", "5.18", "윤석열"], "preview": "-24.10.14(월). 조국혁신당 부산시당(부산 연제구 월드컵대로 149, 9층)     ■ 조국 대표  안녕하십니까.  조국혁신당 대표, 조국입니다.  한강 작가가 노벨 문학상을 받게 되었습니다.  다시 한번 축하드립니다.     그런데 일부 인사들이 역사 왜곡의 정당화 운운하면서 어깃장을 놓습니다.  반지성주의, 무지와 혐오의 소치일 뿐입니다.  과거 김대중 대통령이 노벨평화상을 수상하셨을 때,  축하하기는커녕 온갖 비방을 일삼던 자들이 ...", "content": "-24.10.14(월). 조국혁신당 부산시당(부산 연제구 월드컵대로 149, 9층)\n\n \n\n■ 조국 대표\n\n안녕하십니까.\n\n조국혁신당 대표, 조국입니다.\n\n한강 작가가 노벨 문학상을 받게 되었습니다.\n\n다시 한번 축하드립니다.\n\n \n\n그런데 일부 인사들이 역사 왜곡의 정당화 운운하면서 어깃장을 놓습니다.\n\n반지성주의, 무지와 혐오의 소치일 뿐입니다.\n\n과거 김대중 대통령이 노벨평화상을 수상하셨을 때,\n\n축하하기는커녕 온갖 비방을 일삼던 자들이 다시 출연한 것입니다.\n\n \n\n국민들이 비웃을 것입니다.\n\n국민들이 용납하지 않을 것입니다.\n\n더 문제는, 공적 영역에서 일하는 사람들입니다.\n\n박근혜 정권 때 블랙리스트에 한강 작가 이름이 포함됐습니다.\n\n \n\n그때 청와대에서 만든 블랙리스트를 문화체육부에 내려보낸 사람이 누구인지 아십니까?\n\n놀랍게도, 지금 문화체육관광부 차관으로 일하고 있습니다.\n\n윤석열 대통령이 7월, 그를 승진 임명했습니다.\n\n그런 윤석열 대통령이 한강 작가에게 노벨상 수상 축하 메시지를 보냈습니다.\n\n \n\n어느 쪽이 윤 대통령의 진심입니까?\n\n블랙리스트 관여자를 차관으로 승진시킨 쪽입니까?\n\n아니면 한강 작가 축하 인사 쪽입니까?\n\n \n\n10일, 국회 행정안전위원회의 국정감사장에서\n\n진실화해를위한과거사정리위원회 김광동 위원장,\n\n“북한군이 개입했을 가능성은 없고,\n\n북한이 개입했을 가능성이 있다.”라는 말장난으로\n\n5·18 광주민주화운동을 모욕했습니다.\n\n \n\n김문수 고용노동부 장관은 후보자 시절 국회 인사청문회에서\n\n“4·3은 좌익을 중심으로 한 폭동”이라고 했습니다.\n\n국민의힘 김재원 최고위원도 입만 열면 5?18과 4?3을 능멸합니다.\n\n \n\n이런 사람들, 여권 인사, 지지자 중에서\n\n어렵지 않게 찾아볼 수 있습니다.\n\n \n\n윤석열 정권 인사들은 역사적 상처를 직시하지 못합니다.\n\n역사적 진실을 바라보기 두려워합니다.\n\n그래놓고, 한강 작가 노벨상 축하 대열에 무임승차합니다.\n\n이렇게 얼굴 두꺼운 사람들, 다른 데서 보셨습니까?\n\n이 무도한 세력, 심판해야 하지 않겠습니까?\n\n바로 이곳, 부산 금정구청장 보궐선거부터 심판해야 합니다.\n\n \n\n이곳 금정에서 윤석열 정권의 가장 아픈 ‘일격’을 가하기 위해\n\n조국혁신당은 일관되게 단일화를 주장했고,\n\n마침내 후보 단일화를 이뤄냈습니다.\n\n \n\n그렇게 완성된 단일 후보로 우리는 승리할 것입니다.\n\n역사를 우습게 아는 자들을 역사에서 지울 것입니다.\n\n \n\n존경하는 조국혁신당 당원 동지 여러분.\n\n부산 금정에서의 후보 단일화를 놓고 가슴이 아프실 것입니다.\n\n \n\n그러나 아쉬움과 섭섭함은 뒤로 돌려야 합니다.\n\n지금 우리가 할 일은 저 무도하고 무책임한 윤석열 정권에게,\n\n가장 무섭고 아픈 일격을 가하는 것입니다.\n\n \n\n이곳 금정에서 단일화가 필수였습니다.\n\n불가능할 것이라는 비아냥을 뚫고, 우리는 성사시켰습니다.\n\n그 자랑스러움이 우선입니다.\n\n \n\n섭섭함을 접고,\n\n윤석열, 김건희 공동정권에게 가장 아픈 펀치를 날립시다.\n\n제가 오늘 이곳에 온 이유입니다.\n\n \n\n우리는 약속했습니다.\n\n누가 후보가 돼도 전폭적으로 지지할 것이라고.\n\n \n\n저는 그 약속을 지키기 위해\n\n오늘 공동유세 현장에 가서,\n\n민주당 김경지 후보 지지를 목청껏 호소할 것입니다!\n\n \n\n당원 동지 여러분께서도 제 곁에 서주십시오.\n\n그게 우리 조국혁신당이 지나온 길이고, 앞으로 갈 길입니다.\n\n \n\n한편, 한강 작가 소설 ‘채식주의자’는 경기교육청이 문제 삼았습니다.\n\n보수단체 민원 때문이라고 합니다.\n\n \n\n10월 16일, 서울시 교육감 보궐선거가 있습니다.\n\n아차하면, 한강의 소설을 문제 삼을 수 있는 사람이나\n\n뉴라이트 교과서를 찬양하는 사람이 후보로 당선될 판입니다.\n\n \n\n이런 사람이 교육감이 되면\n\n교사에 대한 사상 검증을 실시할 것입니다.\n\n \n\n자기 마음에 안 드는 교과서는 채택하지 못하게 할 것입니다.\n\n한강 작가의 작품에 전교조식 소설이라고 딱지를 붙일지도 모릅니다.\n\n상상이 아니라 코앞에 다가온 사실입니다.\n\n이런 자들이 공직을 맡으면 제2의 한강, 제3의 한강은 없을 것입니다.\n\n서울시 교육감 선거, 제대로 해 주시길 부탁드립니다.\n\n감사합니다."}, {"id": 263, "filename": "2기 제32차 최고.txt", "title": "2기 제32차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["윤석열"], "preview": "-24.10.17(목). 09:00. 본관 224호.      ■조국 대표  안녕하십니까, 조국혁신당 대표 조국입니다.  어제 재보궐 선거에서 저희는 당선자를 내지 못했습니다.  겸허하게 결과를 받아들입니다.     이번 선거에서  지역 정치와 행정의 혁신을 기치로 내걸었습니다.  3월 3일 창당하고, 7개월 만의 첫 지역 선거였습니다.  처음으로 직접 지역 후보를 내고,  거대 정당과 겨뤘습니다.     전국의 열성 당원들은 먼길을 달려와 제...", "content": "-24.10.17(목). 09:00. 본관 224호.\n\n\n\n\n\n■조국 대표\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n\n어제 재보궐 선거에서 저희는 당선자를 내지 못했습니다.\n\n겸허하게 결과를 받아들입니다.\n\n \n\n이번 선거에서\n\n지역 정치와 행정의 혁신을 기치로 내걸었습니다.\n\n3월 3일 창당하고, 7개월 만의 첫 지역 선거였습니다.\n\n처음으로 직접 지역 후보를 내고,\n\n거대 정당과 겨뤘습니다.\n\n \n\n전국의 열성 당원들은 먼길을 달려와 제 돈을 쓰며 뛰셨습니다.\n\n당 대 당 혁신 경쟁, 후보 단일화, 선택과 집중 등\n\n창당 때부터 일관되게 주창한 협력과 경쟁의 원칙을\n\n실제 적용했습니다.\n\n \n\n이번 경험은 돈 주고도 사지 못할 자산입니다.\n\n첫 술에 배부르겠습니까.\n\n모두 전국정당, 대중정당으로 발돋움하는 발판이 될 것입니다.\n\n \n\n무엇보다, 지지해주신 유권자들께 정말 감사드립니다.\n\n수고하신 당원 동지들과 후보들께 위로와 치하를 드립니다.\n\n \n\n다시 신발 끈을 묶읍시다.\n\n다음 도전은 더 옹골차고, 더 힘찰 것입니다.\n\n \n\n요즘 \"오빠\"가 대한민국 최고의 화제 단어입니다.\n\n명태균 씨가 김건희 씨와 주고받은 문자 메시지 때문입니다.\n\n \n\n김건희 씨는 \"철없이 떠드는 우리 오빠 용서해 달라.\"\n\n\"무식하면 원래 그렇다.\"라고 합니다.\n\n \n\n대통령실은 그 '오빠'를 윤석열 대통령이 아니라,\n\n'김건희 씨 친오빠'라고 해명합니다.\n\n또 '선거 전 사적 대화'라고 합니다.\n\n \n\n이걸 해명이랍시고 합니다.\n\n \n\n그러자 명태균 씨는 '오빠가 대통령이냐?'라는 기자 질문에\n\n\"어, 맞어. 스토리도 봐라. 대통령이잖아, 대통령\"이라고 합니다.\n\n \n\n명태균 씨는\n\n\"아직 멀었다. 대화 이미지 캡처 본이 2,000장이다.\n\n200장만 까도 충분하다\"라고 합니다.\n\n\"앞으로 공적 대화도 공개하겠다.\"라고 경고했습니다.\n\n \n\n단계별로 하나씩 요구하면서\n\n이익을 극대화하는 '살라미 전술'.\n\n명태균 씨는 이 술수로 여권을 쥐락펴락하고 있습니다.\n\n \n\n특히, 명태균 씨가 국책사업 정보를\n\n사전에 입수한 정황이 드러났습니다.\n\n \n\n지난해 3월 15일, 윤석열 대통령은\n\n국가 첨단 산업단지 조성 계획을 발표했습니다.\n\n그런데, 전날과 당일 명태균 씨는\n\n김영선 전 의원 회계책임자인 강혜경 씨와 통화하며\n\n조성계획에 대한 현수막과 보도자료 내용을 논의했습니다.\n\n \n\n민간인 신분인 명 씨가\n\n대통령 발표 사항을 어떻게 미리 알았을까요?\n\n \n\n대통령실이 아무리 변명해도 명백한 게 있습니다.\n\n'명태균'이라는 비선의 존재 사실입니다.\n\n민간인이 공적(공직) 인사에 개입하고,\n\n국책사업 정보를 미리 빼냈다면\n\n국정 농단입니다.\n\n바로 비선이고, '남자 최순실'입니다.\n\n \n\n공천, 인사, 국정 개입 의혹의 진위를 확인해야 합니다.\n\n특히, 대통령 취임 후 윤석열-김건희 두 부부와\n\n명태균 씨의 관계가 핵심입니다.\n\n \n\n이를 바라보는 국민은 어처구니가 없습니다.\n\n탄핵 여론은 점점 올라갑니다.\n\n \n\n<스트레이트뉴스> 여론조사를 보면 응답자의 62.6%가\n\n\"윤석열 대통령을 탄핵해야 한다.\"는 의견에 공감했습니다.\n\n윤 대통령 지지세가 압도하던 70대 이상에서도\n\n찬반이 비슷합니다.\n\n이 조사에서 대구·경북 지역 민심도 탄핵으로 돌아섰습니다.\n\n \n\n이런 상황인데도 검찰은 도이치모터스 주가조작 사건에서\n\n검찰 내 레드 팀을 꾸려가면서까지 무혐의 결론을 내린다고 합니다.\n\n그게 반대편 역을 하는 레드팀입니까?\n\n짜고 치는 고스톱 상대지요.\n\n \n\n이러니 김건희 씨를 두고 처(妻)통령, 검찰처(妻)장,\n\n처(妻)외법권, 처(妻)종보스 등 패러디가 난무합니다.\n\n \n\n시간이 갈수록 스모킹 건을 넘어\n\n스모킹 미사일급의 정황과 증거가 나오고 있습니다.\n\n국민의 심리적 탄핵을 넘어,\n\n법적 탄핵의 시간이 오고 있습니다.\n\n이제 언론의 시간이고, 국회의 시간입니다.\n\n \n\n특검 필요성은 점점 더 강하게 대두됩니다.\n\n특검 수사에서 구체적인 사실들이 나오면\n\n윤석열-김건희 공동정권은 무너질 것입니다.\n\n \n\n조국혁신당은 \"3년은 너무 길다\"라고 하면서\n\n누구보다 먼저 탄핵의 깃발을 내걸었습니다.\n\n국회에서도 어느 당보다 강하게 외치고 있습니다.\n\n \n\n저희는 멈추지 않겠습니다.\n\n김건희 씨가 윤 대통령을 오빠, 아저씨, 여보 뭐라고 부르든\n\n실체는 달라지지 않습니다.\n\n심판의 시간이 멀지 않았습니다.\n\n감사합니다.\n\n \n\n지금 제가 방금 확인했는데요.\n\n검찰에서 김건희 씨 도이치 모터스 사건을 불기소 처분을 했습니다.\n\n어이상실입니다.\n\n \n\n검찰, 문 닫는 시간이 다가오고 있습니다.\n\n화를 자초하고 있습니다.\n\n10월 16일 재보궐선거 끝나자마자,\n\n바로 김건희 씨에게 완벽한 면죄부를 주었습니다.\n\n이제, 특검의 필요성은 더욱 더 강해집니다.\n\n이상입니다."}, {"id": 264, "filename": "2기 제34차 최고.txt", "title": "2기 제34차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["윤석열"], "preview": "-24.10.24(목). 09:00. 국회 본관 당회의실(224호)    ■ 조국 대표  안녕하십니까. 조국혁신당 대표 조국입니다.    우리 사회에는 넘어서는 안 되는 선이 있었습니다.  해방 이후 산업화와 민주화를 거쳐오며,  국민적 합의로 축적해온 가치와 규범입니다.  그런데, 이 정부는 그 선을 서슴없이 넘습니다.  한두 군데가 아니라 거의 전면적인 양상입니다.    대통령이라도 가족이 연루된 수사를 방해하지 않았습니다.  군 출신 독재...", "content": "-24.10.24(목). 09:00. 국회 본관 당회의실(224호)\n\n\n\n■ 조국 대표\n\n안녕하십니까. 조국혁신당 대표 조국입니다.\n\n\n\n우리 사회에는 넘어서는 안 되는 선이 있었습니다.\n\n해방 이후 산업화와 민주화를 거쳐오며,\n\n국민적 합의로 축적해온 가치와 규범입니다.\n\n그런데, 이 정부는 그 선을 서슴없이 넘습니다.\n\n한두 군데가 아니라 거의 전면적인 양상입니다.\n\n\n\n대통령이라도 가족이 연루된 수사를 방해하지 않았습니다.\n\n군 출신 독재자인 전두환 전 대통령은 물론이고, 김영삼, 김대중, 노무현 대통령도 마찬가지였습니다.\n\n그래서 실제 처벌이 됐습니다.\n\n\n\n윤석열 대통령은 배우자 김건희 씨 특검법에\n\n위헌 운운하며, 거부권을 행사했습니다.\n\n가족 관련 거부권 행사는 대한민국 헌정사상 처음 있는 일입니다.\n\n\n\n친일적인 이명박근혜 정권 때에도\n\n독립기념관이나 역사 관련 기관장으로\n\n독립투사, 유공자, 그 후손,\n\n아니면 학계에서 인정받는 학자를 앉혔습니다.\n\n\n\n윤석열 대통령은 어디서 골랐는지\n\n일제 강점이 한국 근대화를 도왔다고 주장하는\n\n친일적인 뉴라이트 인사들만 잘도 모아놓았습니다.\n\n\n\n군사정권에서도 사회적 재해로 국민이 불안해하면,\n\n장관을 교체했습니다. 전면 개각도 했습니다.\n\n독재자들이 바보여서가 아니었습니다.\n\n국민 여론에 귀 기울이고 있음을 알린 것입니다.\n\n\n\n윤석열 정권은 어떤가요?\n\n이태원 참사가 29일로 2주기입니다.\n\n윤석열 대통령의 고교?대학 후배이자 주무장관인\n\n이상민 행안부 장관은 여전히 자리를 지키고 있습니다.\n\n\n\n채 해병이 살아있었더라면 전역한 지 한 달이 됐을 것입니다.\n\n그가 숨진 지 15개월이 지났지만, 책임지는 사람은 없습니다.\n\n외압에 관여한 사람들은 진급, 영전하고 공천도 받았습니다.\n\n\n\n대통령 비서실 공직자가 음주 운전하다 적발됐을 때,\n\n문재인 대통령은 사표 수리를 넘어 해임 조치했습니다.\n\n윤석열 대통령의 ‘간신’ 중 한 명으로 지목된 행정관이\n\n음주 운전하다가 걸렸는데, 지금도 대통령실 소속입니다.\n\n\n\n예전 방송통신위원장들은 내심이 어떤지는 몰라도,\n\n“방송통신 정책에서 공정성과 형평성을 지키겠다.”라고 했습니다.\n\n그런데 윤석열 정부의 이동관, 이진숙 방통위원장은 \n\n대놓고 방송을 편향되게, ‘땡윤 뉴스’로 도배시키려고 합니다.\n\n그러니 ‘파우치 박’이라고 불리는 찐윤 앵커가\n\nKBS 사장 후보가 되지 않았습니까?\n\n\n\n현장 순시에 나서 관계자에게 직접 지시를 내리는\n\n영부인을 보는 것도 처음입니다.\n\n이전 영부인들은 몰라서 안 한 게 아닙니다.\n\n그 일은 대통령 업무여서, 선을 넘지 않은 것입니다.\n\n\n\n오죽했으면 정권 동향에 가장 정통하다는 조선일보가\n\n언론으로서는 선을 넘는 칼럼을 다 썼겠습니까?\n\n그곳 주필은 지난달에 \n\n“대통령에게 가장 영향력이 큰 사람은 김 여사일 것이다. 김 여사가 대통령을 위해 두 사람과의 관계 회복을 고언했으면 한다.”라고 썼습니다.\n\n\n\n엊그제 논설위원은 “마지막 해법은 김 여사를 포함해\n\n대통령과 한 대표의 3자 회동밖에 없다는 말까지\n\n여의도에서 나오기 시작했다.”라고 했습니다.\n\n요컨대, 김건희씨가 윤석열 대통령보다 위에 있다고 보는 것입니다.\n\n\n\n국정 모든 면에서 선을 넘는 책임은\n\n대통령 부부에게만 있는 게 아닙니다.\n\n여당, 특히 한동훈 대표에게도 있습니다.\n\n\n\n한 대표는 채상병 특검법, 김건희 특검법에 대해\n\n할 말을 할 것처럼 큰소리치다가\n\n윤 대통령 기세에 눌려 항상 흐지부지했습니다.\n\n늘 용두사미였습니다.\n\n\n\n용산 회동 이후, \n\n한 대표가 모욕을 느끼고 뭔가 결심을 한 듯합니다.\n\n이번이 국민이 준 마지막 기회입니다.\n\n윤석열 정권 출범에 기여한 죗값을 조금이나마 씻을 기회입니다.\n\n\n\n저 선을 넘는 무리의 공범, 혹은 부역자가 되느냐,\n\n아니면 본인 말대로 “국민과 나라를 생각하는 정치인”이 되느냐,\n\n갈림길에 서 있습니다.\n\n\n\n한동훈 대표는 어느 편에 설지 택하십시오.\n\n‘형과 형수냐, 아니면 국민이냐?’\n\n\n\n국민의 편에 서겠다면, 윤?김 부부와 단호히 결별하십시오.\n\n윤석열?김건희 두 사람은 보수의 수치입니다.\n\n부디 좋은 선택을 하기를 조국혁신당이 응원하겠습니다.\n\n한동훈 파이팅!\n\n"}, {"id": 265, "filename": "2기 제35차 최고.txt", "title": "2기 제35차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["윤석열"], "preview": "-24.10.28(월). 09:30. 국회 본관 당회의실(224호)    ■ 조국 대표  안녕하십니까. 조국혁신당 대표 조국입니다.  그제 조국혁신당은 서울 서초동 대검찰청 앞에서  윤석열 탄핵과 정치검찰 해체를 촉구하는 집회를 열었습니다.  원내 정당으로는 첫 공식 탄핵 촉구 집회입니다.    당원?동지 여러분과 국민 여러분, 3,000여 분이 함께 해주셨습니다.  유튜브 등을 통해 마음을 보태주신 분들도 있습니다.  모두 \"윤석열 탄핵, 김...", "content": "-24.10.28(월). 09:30. 국회 본관 당회의실(224호)\n\n\n\n■ 조국 대표\n\n안녕하십니까. 조국혁신당 대표 조국입니다.\n\n그제 조국혁신당은 서울 서초동 대검찰청 앞에서\n\n윤석열 탄핵과 정치검찰 해체를 촉구하는 집회를 열었습니다.\n\n원내 정당으로는 첫 공식 탄핵 촉구 집회입니다.\n\n\n\n당원?동지 여러분과 국민 여러분, 3,000여 분이 함께 해주셨습니다.\n\n유튜브 등을 통해 마음을 보태주신 분들도 있습니다.\n\n모두 \"윤석열 탄핵, 김건희 구속, 정치검찰 해체\"를 외쳤습니다.\n\n\n\n생업으로 바쁘셨을 텐데, 주말 휴식을 반납한 채\n\n집회에 참여해 열정을 보태주셨습니다.\n\n고개 숙여 감사드립니다.\n\n\n\n첫 집회 참가인원은 3,000명이지만,\n\n가장 앞서가는 쇄빙선 역할을 한 것입니다.\n\n강고해 보이지만, 알고 보면 별것 아닌\n\n윤석열-김건희 공동정권이 세운 벽에 균열을 낼 것입니다.\n\n '명태균 게이트'로 탄핵 요건은 완성돼 가고 있습니다.\n\n\n\n앞으로 시민들은 더 모이실 것입니다.\n\n3만, 30만, 300만, 나아가 3,000만 명이\n\n우리와 함께 해주실 것으로 확신합니다.\n\n그러면 이 지긋지긋한 정권, 보수마저 창피해하는\n\n윤석열-김건희 공동정권은 버티지 못할 것입니다.\n\n\n\n저희는 다음 달 16일, 서초동 탄핵집회를 또 개최합니다.\n\n11월부터는 전국 곳곳으로 국민을 직접 찾아가는 \n\n '탄핵 다방'을 열고 민심을 모읍니다.\n\n첫 '탄핵다방'은 11월 2일 오후 1시 \n\n대구 현대백화점 앞에서 열립니다.\n\n많은 호응과 참여 부탁드립니다. \n\n\n\n◎ 요즘 경제 관련 수치를 보면 가슴이 철렁합니다.\n\n지난 정부 시절, 허구한 날 '경제 파탄' 운운하던 이들이 누구입니까?\n\n그런데 정권을 잡고 나서 경제를 진짜 파탄 내고 있습니다.\n\n\n\n한국은행이 발표한 올 3분기 실질 국내총생산,\n\n즉 GDP 성장률은 전분기 대비 0.1%에 그쳤습니다.\n\n한국은행의 올 GDP 성장률 전망치 2.4%도 낮춰야 할 판입니다.\n\n정부 전망치인 연간 2.6% 달성 가능성은 희박합니다.\n\n\n\n수출은 7분기 만에 다시 마이너스가 됐습니다.\n\n3분기 수출은 전 분기 대비 0.4% 줄었습니다.\n\n2022년 4분기 3.7% 줄어든 뒤, 1년 9개월 만의 뒷걸음질입니다. \n\n\n\n가계 부채는 늘고 있습니다.\n\nKB국민은행, 신한, 하나 등 5대 시중은행의\n\n지난달 가계대출 잔액은 731조 원으로 집계되었습니다.\n\n9월보다 7,000억 원이 늘었습니다.\n\n은행들은 큰 흑자를 낼 것이라고 합니다.\n\n반면 집에서는 쓸 돈이 없어 쩔쩔맬 것입니다.\n\n이는 내수부진으로 이어지기 마련입니다.\n\n\n\n자영업자들은 한숨을 쉬다 못해 포기하는 지경입니다.\n\n국세청에 따르면 지난해 자영업 폐업률은 10.8%로 나타났습니다.\n\n폐업 신고가 100만 건에 육박했습니다.\n\n코로나 시기보다 높고, 통계 작성 이래 최대치입니다.\n\n\n\n한국 코스닥 지수는 글로벌 주요 증시 중 수익률 꼴찌입니다.\n\n올해 3분기까지 미국 나스닥, 대만 자취안 지수 등은\n\n20% 이상 올랐습니다.\n\n큰 나라 대부분은 플러스였습니다.\n\n반면 코스닥지수는 -13.08%였습니다.\n\n전쟁 중인 러시아 RTSI지수 -10.02%보다 못했습니다.\n\n\n\n나라 살림은 형편없습니다.\n\n지난해 세수 결손 56조원에 이어 올해도 30조원 결손이 예상됩니다.\n\n\n\n더 문제가 뭔지 아십니까?\n\n정부는 해법을 내놓지 않고 있습니다.\n\n\n\n부자감세 해주느라 세수가 부족합니다.\n\n정부가 쓸 돈이 없으니 경기 부양도 못합니다.\n\n추경은 한사코 하지 않겠다 합니다.\n\n그래놓고 내년에는 사상 처음으로 적자 보전 국채를\n\n200조 원 발행한다고 합니다.\n\n아니, 올해 하면 될 일을 내년으로 미룹니까?\n\n그저 국민 눈속임을 하는 것입니다.\n\n그 사이 국민들은 어렵게 살아가야 합니다.\n\n\n\n이 모양이니, 기업들도 기대를 접고 있습니다.\n\n경제심리지수, 즉 ESI는 10월에 92.5%였습니다.\n\n9월보다 1.2 포인트 하락했습니다.\n\n지수가 100 미만이면 나빠질 것으로 본다는 의미입니다.\n\n2022년 7월 이후 100을 넘은 적이 없습니다.\n\n\n\n내년에는 더 힘들 것으로 보입니다.\n\n국회예산정책처는 내년 경제성장률을 2.2%로 전망했습니다.\n\n\n\n배우자 방탄에 혈안이 된 윤석열 대통령에게\n\n기대를 접은 지는 오래입니다.\n\n그럼 정부라도 나서야 하는 것 아닙니까?\n\n그런데 최상목 경제부총리는 \"강도 높은 지출 구조 조정을 통해\n\n국가채무 증가를 최소화하는 정책을\n\n지속 추진한다\"고 말했습니다.\n\n자식들은 쫄쫄 굶고 집안은 망해가는데,\n\n빚을 안 지겠다고 버티는 셈입니다.\n\n\n\n실력이 없으면, 남의 말에 귀라도 기울여야 합니다.\n\n경제 말아먹은 정부로 기록되기 싫으면\n\n쓸데없는 고집 부리지 마십시오.\n\n부자 감세 포기하고 세수를 더 확보해야 합니다.\n\n정부가 돈을 풀어야 합니다.\n\n추경 문제도 이른 시일 내 국회와 의논해야 합니다.\n\n경제 경고등 켜진 지 오래입니다. \n\n\n\n감사합니다."}, {"id": 266, "filename": "2기 제36차 최고.txt", "title": "2기 제36차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "외교·안보"], "tags": ["트럼프", "지방선거", "윤석열"], "preview": "-24.10.31(목). 09:30. 국회 본관 당회의실(224호)     ■ 조국 대표  안녕하십니까.  조국혁신당 대표 조국입니다.     요즘 전쟁 관련 소식이 부쩍 늘었습니다.  대통령실과 국가정보원, 국방부 발 뉴스들입니다.  하루에도 몇 차례 우크라이나 속보가 쏟아집니다.  국민 사이에서는 “이러다가 한반도에 전쟁이 나는 것 아니냐”라는  우려가 나오고 있습니다.     윤석열 대통령은 우크라이나 젤렌스키 대통령과 통화하며,  북한군...", "content": "-24.10.31(목). 09:30. 국회 본관 당회의실(224호)\n\n \n\n■ 조국 대표\n\n안녕하십니까.\n\n조국혁신당 대표 조국입니다.\n\n \n\n요즘 전쟁 관련 소식이 부쩍 늘었습니다.\n\n대통령실과 국가정보원, 국방부 발 뉴스들입니다.\n\n하루에도 몇 차례 우크라이나 속보가 쏟아집니다.\n\n국민 사이에서는 “이러다가 한반도에 전쟁이 나는 것 아니냐”라는\n\n우려가 나오고 있습니다.\n\n \n\n윤석열 대통령은 우크라이나 젤렌스키 대통령과 통화하며,\n\n북한군 개입을 논의했다고 합니다.\n\n그러면 윤 대통령에게 묻겠습니다.\n\n윤 대통령은 ‘한국의 젤렌스키’가 되고자 하십니까?\n\n \n\n러시아의 우크라이나 침공은 대단히 잘못된 일입니다.\n\n그러나 동시에 젤렌스키도 자신의 정치적 이익을 위해\n\n전쟁을 이용하고 있다는 비판을 받습니다.\n\n \n\n윤 대통령도 한국을 안보 위기 속으로 몰아 넣으려고 합니다.\n\n적대하지 않겠다고 밝힌 러시아와 척 지려고 작정한 듯합니다.\n\n한국이 제공한 무기로 러시아군을 공격했을 때,\n\n뒷감당할 능력이 있습니까?\n\n \n\n최근에는 ‘북풍’이라는 고약한 공작 냄새가 풍깁니다.\n\n보수 정권이 궁지에 몰리면 ‘북풍’ 몰이를 한 것을\n\n국민 모두 생생하게 기억하고 있습니다.\n\n \n\n1987년 대선 전에 대한항공 여객기 폭파사건이 벌어졌습니다.\n\n폭파범 김현희가 하필 대선 하루 전날 12월 15일,\n\n국내로 압송되었습니다.\n\n1997년 대선을 앞두고는 청와대 행정관 등 3명이,\n\n중국 베이징에서 북한 인사를 만나\n\n휴전선에서 무력시위를 해달라고 요청했습니다.\n\n \n\n2010년 6월 지방선거 때에도 마찬가지였습니다.\n\n천안함 희생에 대한 국민 애도를 북풍 소재로 이용했습니다.\n\n이명박 대통령은 ‘대북 봉쇄’ 대국민 담화문을 발표하면서,\n\n사실상 한반도에 ‘준전시상태’를 선포했습니다.\n\n \n\n박근혜 정권에서도 그랬습니다.\n\n2016년 3월 총선에서 심판론에 직면한 박근혜 대통령은\n\n군에 “북한 도발에 대응할 준비를 하라”라고 지시를 하고,\n\n국민을 향해서 “비상한 상황에 각별히 유의해달라”라고 말했습니다.\n\n20대 총선 후보 등록 첫날이었습니다.\n\n \n\n윤석열 정부는 우크라이나 소식에 고무된 표정입니다.\n\n이런 윤석열 정권의 내심은 생생하게 국민에게 폭로됩니다.\n\n지난 24일 국회 국방위 국정감사장에서 국민의힘 한기호 의원이\n\n신원식 대통령실 국가안보실장에게 텔레그램 메시지를 보냈습니다.\n\n“우크라이나와 협조가 된다면 북괴군 부대를 폭격,\n\n미사일 타격을 가해서 피해가 발생하도록 하고\n\n이 피해를 북한에 심리전으로 써먹었으면 좋겠다.”\n\n신 실장은 “잘 챙기겠다”고 답했습니다.\n\n \n\n논란이 일자 한 의원은 “개인의 텔레그램 대화”라고 합니다.\n\n여당 4선 의원과 안보실장간의 전쟁 이야기가 개인 대화입니까?\n\n어이가 없습니다.\n\n명품 샤넬백을 ‘작은 파우치’라고 깎아내린 꼴입니다.\n\n \n\n국민은 최근 벌어지는 일이 ‘북풍 몰이’라는 것을 잘 압니다.\n\n그런데 왜 이전보다 더 걱정을 할까요?\n\n이 정권의 무모함과 선을 넘는 행동 때문입니다.\n\n탄핵 위기에 몰린 윤석열 정권이\n\n무슨 짓을 벌일지 모른다고 걱정하는 것입니다.\n\n \n\n국정 개입 의혹 핵심 인물인 명태균 씨는 인터뷰에서\n\n윤 대통령에 대해 “다섯 살짜리 꼬마가 지금 총을 들고 있는 격이다.\n\n자기도 죽일 수 있고, 부모도 죽일 수 있고,\n\n다른 사람도 죽일 수 있다”라고 경고했습니다.\n\n \n\n대표적 보수 논객 김대중 조선일보 주필은 이런 글을 썼습니다.\n\n“윤석열 대통령이 한국의 ‘살상 무기’를 지원할 수 있다는\n\n취지로 말한 것으로 보도됐다. 바람직하지 않다.\n\n자칫 유럽 땅에서 코리안끼리 대리전쟁을 하는 것처럼 비치거나,\n\n본질을 벗어나 남북한끼리 적대적 대립 의식을 발산하는\n\n분출의 시연장으로 변모할 가능성마저 있다.\n\n트럼프 대통령이 복귀하면 러시아 승리로 귀결될 공산이 크다.\n\n우리가 섣불리 살상 무기 지원 운운은 타이밍 상으로도 적절치 않다.”\n\n \n\n제가 윤석열 대통령에게 금주하고, 극우 유튜버 방송 좀 그만 보고,\n\n‘친윤 언론’인 조선일보라도 읽으라고 한 바 있습니다.\n\n이번에도 마찬가지입니다.\n\n \n\n김태효 안보실 차장 등 뉴라이트 극단주의자와,\n\n전쟁이 나도 어쩔 수 없다는 모험적 호전주의자,\n\n군과 국정원 출신 강경파 말만 들어서는 안 됩니다.\n\n유튜브 그만 보시고, 조선일보 읽으십시오.\n\n \n\n북풍은 이제 먹히지 않습니다.\n\n그저 궁지에 몰렸음을 자백하는 것밖에 안 됩니다.\n\n정치적 이익을 위해 한반도에 위기를 불러오는 것은\n\n탄핵 사유 하나를 더 보태는 것입니다.\n\n \n\n아직은 대통령이니, 경고합니다.\n\n통수권자로서의 결정은 산처럼 무겁고 신중해야 합니다.\n\n다시는 한반도에서 전쟁은 안 됩니다.\n\n \n\n오늘 민주당에서 명태균 씨와 윤석열 대통령 사이의 통화 내용을 공개하는 것으로 알고 있습니다.\n\n \n\n명 씨가 윤 대통령이나 김건희 씨와의 직접 통화한 내용을 공개하는 것은 이번이 처음입니다.\n\n내용도 충격적인 게, 2022년 재보궐선거를 앞두고 김영선 전 의원 경선 문제를 다룬다고 합니다.\n\n대통령이 당 공천에 ‘직접 개입했음’을 자백한 셈입니다. 특히 의혹으로만 남았던 당무개입이 확인되는 것입니다.\n\n \n\n다들 아시겠지만, 박근혜 대통령은 친박들을 공천하려고 하였고, 그것을 이유로 기소되었고, 처벌되었고 탄핵되었습니다.\n\n \n\n명 씨 사건을 맡은 검찰이 제대로 수사할 수 있을까요? 난망합니다. 특검 외에는 길이 없습니다. 직접 피해자인 국민의힘이 결단을 내려, 특검 법안을 직접 내거나 야당 특검안에 찬성 해주시길 촉구합니다.\n\n \n\n감사합니다."}, {"id": 267, "filename": "2기 제37차 최고.txt", "title": "2기 제37차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "외교·안보"], "tags": ["개헌", "윤석열"], "preview": "-24.11.4(월). 09:30. 국회 본관 당회의실(224호)    ■ 조국 대표  안녕하십니까.  조국혁신당 대표 조국입니다.    요즘에 하루에도 몇 번씩 기가 막히는 소식이 들립니다.  그 중심에는 김건희 씨와 ‘영적 대화’를 한다는 명태균 씨가 있습니다.    이처럼 엉터리 같은 상황, 어디서 많이 본 것 같지 않습니까?  8년 전과 똑같습니다.  그때나 지금이나 탄핵의 격랑이 몰아치고 있습니다.    지난 주말 서울에서는 민주당의 ...", "content": "-24.11.4(월). 09:30. 국회 본관 당회의실(224호)\n\n\n\n■ 조국 대표\n\n안녕하십니까.\n\n조국혁신당 대표 조국입니다.\n\n\n\n요즘에 하루에도 몇 번씩 기가 막히는 소식이 들립니다.\n\n그 중심에는 김건희 씨와 ‘영적 대화’를 한다는 명태균 씨가 있습니다.\n\n\n\n이처럼 엉터리 같은 상황, 어디서 많이 본 것 같지 않습니까?\n\n8년 전과 똑같습니다.\n\n그때나 지금이나 탄핵의 격랑이 몰아치고 있습니다.\n\n\n\n지난 주말 서울에서는 민주당의 국정농단 규탄 및 특검 촉구 집회가,\n\n대구에서는 조국혁신당의 탄핵다방이 열렸습니다.\n\n대구 탄핵다방 일정이 먼저 잡혀 \n\n서울 집회에는 참석하지 못했지만,\n\n뜨거운 열기를 확인하고 기뻤습니다.\n\n\n\n대구 열기도 그에 못지않았습니다.\n\n‘탄핵 아메리카노’를 나눠드리는데,\n\n대구 시민들께서 “대바 대바”라고 외치셨습니다.\n\n“대구가 바뀌면 대한민국이 바뀐다”라는 뜻입니다.\n\n\n\n대구는 대한민국에서 보수 세가 가장 강한 곳이라고 합니다.\n\n그런데도 윤석열 대통령을 더는 두고 볼 수 없다고 하셨습니다.\n\n보수의 근본은 ‘애국과 품격’입니다.\n\n‘친일 굴종 외교’를 고수하는 윤석열 대통령은 애국과 거리가 멉니다.\n\n윤석열, 김건희 부부의 말과 행동에서\n\n품격은 눈에 씻고도 찾아볼 수 없다고 개탄하셨습니다.\n\n\n\n명태균 씨와의 대화 내용이 공개되면서 \n\n바로 확인된 것이 있었습니다.\n\n윤석열 대통령은 거짓말쟁이라는 것입니다.\n\n\n\n지금까지 대통령실에서 한 해명은 싹 다 거짓말이었습니다.\n\n경선 이후 명태균 씨와 연락 안 했다고요?\n\n김영선 전 의원 공천 논의는 단순한 인사라고요?\n\n이제 대한민국에서 이 거짓말을 믿는 사람은 없습니다.\n\n\n\n거짓말은 이것만이 아니었습니다.\n\n대선 후보 당시에 윤석열 대통령은(후보는) \n\n새빨간 거짓말을 일삼았음이 확인되었습니다.\n\n몇 가지 예를 봅시다. \n\n“대통령 측근도 범죄를 저지르면 반드시 감옥에 보내는 것을\n\n국민이 보셔야 한다.”\n\n맞습니다.\n\n\n\n“제가 가졌던 일관된 원칙과 잣대,\n\n그건 저와 제 가족, 제 주변에 대해서도 똑같이 적용돼야 한다.”\n\n맞습니다.\n\n\n\n그런데 윤석열 대통령은 이 말 지키고 있습니까?\n\n이중 하나 지켜진 것이 없습니다.\n\n\n\n윤석열 대통령 육성이 공개되자 대통령실은\n\n“당시 대통령이 아니라 당선자 신분이라 문제가 없다”라고 합니다.\n\n차라리 손바닥에 ‘왕(王)’자 다시 그리고, \n\n그 ‘왕(王)’자 그린 손바닥으로 하늘을 가리십시오.\n\n\n\n이명박 전 대통령이 이팔성 전 우리금융지주 회장에게서\n\n돈을 받아 뇌물 혐의로 재판에 부쳐진 바 있습니다.\n\n뇌물은 공무원에게만 적용되는 법입니다.\n\n\n\n2심 재판부는 대선 이전, 당 경선을 통과한 이후부터\n\n‘공무원이 될 자’ 지위에 있었다고 판단했습니다.\n\n법리상 ‘공무원이 될 자’는 가능성이 확실하지 않더라도\n\n어느 정도 개연성을 갖추면 된다는 취지입니다.\n\n\n\n경선 전부터 ‘공무원이 될 자’가 적용되는데,\n\n윤석열 대통령은 그 다음, 다음 단계인 당선인 신분이었습니다.\n\n또 공천 발표는 대통령 취임일에 났기에 사건의 연속성이 있습니다.\n\n\n\n공직선거법도 봅시다. \n\n공직선거법 9조에 따르게 되면 대통령 당선인은 당연히 기타 정치 중립을 지켜야 하는 자에 해당됩니다. \n\n\n\n또 한 말씀 더 드리겠습니다. \n\n대통령실은 그 발언이 대통령 취임하기 전이라고 항변했습니다. \n\n\n\n그런데 어쩝니까?\n\n(오늘) 한겨레신문 보도를 보면,\n\n명태균 씨는 2022년 6월, 용산의 지시를 받아 \n\n‘비선 여의도연구원’을 구상했다고 합니다.\n\n\n\n이전에 이미 보도되었지만, 명태균 씨는 2023년 3월 15일, \n\n대통령실이 창원 국가산업단지 후보지를 발표하기 전에 미리 알았다고 합니다. \n\n이 두 건 모두 윤석열 대통령 취임 이후 일 아닙니까.\n\n이 두 건에 대해서는 왜 답을 하지 않는지요.\n\n\n\n이런 대통령을 어떻게 해야 할까요.\n\n대선 후보 시절 윤석열 대통령이 올바른 방침을 주신 바 있습니다. 즉, 조선시대 같으면 곤장 좀 맞고 쫓겨났을 것이다. 되먹지 못한 머슴은 갈아치워야 한다. 맞습니다. 동의합니다. \n\n\n\n윤석열 대통령은 오늘 열리는 국회 시정연설에 불참합니다. \n\n앞서 국회 개원식에도 오지 않았습니다.\n\n국민의 대표자를 만날 용기조차 없는 쫄보입니다. \n\n\n\n한동훈 국민의힘 대표는 그간 제대로 된 입장조차 내지 못했습니다.\n\n김건희 특검법을 받을 용기는 전혀 없습니다.\n\n간만 보는 간동훈이 된 것입니다.\n\n\n\n이제 보수진영과 국민의힘도 택일해야 합니다.\n\n탄핵이냐 방탄이냐, 그것이 문제입니다.\n\n김건희?윤석열 정권을 지키려다가는 같이 몰락할 것입니다.\n\n\n\n‘지리산 도사’를 자처한 명태균 씨는 2021년 7월쯤, \n\n윤석열 당시 대선 후보에게\n\n“취임하면 2024년 총선에 개헌하고 물러나라”라고 말했답니다.\n\n그 이유로,\n\n“5년을 버틸 내공이 없기 때문”이라고 평가를 했다고 합니다.\n\n\n\n주술을 신봉하는 윤석열-김건희 두 사람은\n\n이 ‘도사’의 말을 이제 들으시길 바랍니다.\n\n그 자리에서 당장 내려오십시오.\n\n‘내공’이 없는 당신들이 있을 자리가 아닙니다.\n\n\n\n조국혁신당의 탄핵 쇄빙선은 좌고우면하지 않고 직진할 것입니다.\n\n다음 달까지 17개 시도에서 탄핵 당위성을 알리는 탄핵다방을 엽니다.\n\n7일 목포, 13일 여의도, 22일 전주, 29일 제주에서 개최합니다.\n\n또 매달 ‘검찰해체, 윤석열 탄핵’ 서초동 집회를 열 것입니다.\n\n\n\n탄핵 소추안 초안을 이달 안에 발표하겠습니다.\n\n이 초안은 추후 국민께서 직접 문구를 보태고 수정하는\n\n‘국민참여형, 신문고형’ 탄핵 소추문이 될 것입니다.\n\n\n\n탄핵 사유가 되느냐, 혐의가 분명한가 등은 법률적 검토를 할 것입니다. 그러나 더 중요한 것은 국민의 의지입니다.\n\n\n\n시민사회와 모든 정당은 단결해야 합니다.\n\n때가 되면 바다로 흐르듯 광장에 다 모이실 것입니다.\n\n8년 전 11월, 100만 명이 모인 것처럼 말입니다.      \n\n\n\n감사합니다."}, {"id": 268, "filename": "2기 제38차 최고.txt", "title": "2기 제38차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "외교·안보"], "tags": ["트럼프", "기자회견", "윤석열", "한미동맹"], "preview": "-24.11.07(목) 09:30 본관 당 회의실     ■ 조국 당대표  ◎ 안녕하십니까? 조국혁신당 대표 조국입니다.  제47대 미국 대통령 선거에서  도널드 트럼프 전 대통령이 당선되었습니다.  축하드립니다.     트럼프 당선자가 대한민국 국민에게 심어준 강한 인상이 있습니다.  트럼프 당선자는 북미회담을 앞두고  첩첩이 쌓여있던 장애물을 뛰어넘어  현직 미국 대통령으로 사상 처음이자, 유일하게  북한 최고 지도자를 만났습니다.     ...", "content": "-24.11.07(목) 09:30 본관 당 회의실\n\n \n\n■ 조국 당대표\n\n◎ 안녕하십니까? 조국혁신당 대표 조국입니다.\n\n제47대 미국 대통령 선거에서\n\n도널드 트럼프 전 대통령이 당선되었습니다.\n\n축하드립니다.\n\n \n\n트럼프 당선자가 대한민국 국민에게 심어준 강한 인상이 있습니다.\n\n트럼프 당선자는 북미회담을 앞두고\n\n첩첩이 쌓여있던 장애물을 뛰어넘어\n\n현직 미국 대통령으로 사상 처음이자, 유일하게\n\n북한 최고 지도자를 만났습니다.\n\n \n\n우리는 두 정상이 손을 잡던 그 역사적 순간들을\n\n생생하게 기억하고 있습니다.\n\n \n\n트럼프 2기에 기대해봅니다.\n\n무엇보다 한반도 평화 프로세스가 복원되길 기대합니다.\n\n종전 선언, 상호 안전보장, 공동 번영의 정신이\n\n다시 꽃피기를 기대합니다.\n\n이는 동북아는 물론 세계 평화를 안착하는 업적으로 이어질 것입니다.\n\n \n\n우리 정부도 만반의 준비를 해야 합니다.\n\n1기 트럼프 행정부의 정책을 면밀하게 살펴봐야 합니다.\n\n무엇보다 반도체, 자동차 등 한국의 주요 수출품에 대한\n\n미국 정부의 정책이 어땠는지가 중요합니다.\n\n물론 그사이 변화도 많습니다.\n\n트럼프 행정부에 새로 들어갈 사람을 파악하고,\n\n대응책과 대안을 촘촘하게 준비해야 합니다.\n\n \n\n트럼프 당선자는 주한미군 방위비 분담금 문제를 거론한 바 있습니다.\n\n이 또한 한미동맹을 더욱 탄탄하게 다지고\n\n양측에 최상의 이익을 도모하는 방법이 무엇인지\n\n잘 살펴 준비해야 할 것입니다.\n\n \n\n미 행정부 전환을\n\n꽉 막힌 대북 문제의 물꼬를 트는 계기로 활용해야 합니다.\n\n북미 간에 새로운 대화 분위기가 형성될 때\n\n남측이 북측에 적대적 자세만을 고집하는 것만큼\n\n어리석은 일은 없을 것입니다.\n\n \n\n이 정부가 친일 매국적 외교 외에는 하는 일이 없기에\n\n걱정되어 조언하는 것입니다.\n\n \n\n◎ 잠시 뒤 윤석열 대통령이 대국민담화를 하고\n\n기자회견을 합니다.\n\n \n\n어제 저는 윤 대통령이 세 가지를 해야 한다고 말씀드렸습니다.\n\n진솔한 대국민 사과가 첫 번째이고,\n\n국정농단, 위헌, 불법행위에 대한 자백이 두 번째입니다.\n\n마지막은 김건희 특검, 채 해병 특검 수용과\n\n‘명태균 게이트’ 특별수사본부 가동을 약속하라고 했습니다.\n\n \n\n솔직히 기대는 하지 않습니다.\n\n“국정 방향은 옳았는데 소통이 모자랐다” 라는 식의 정신승리 발언,\n\n“법적 잘못은 없지만 유감이다” 식의 책임회피 발언\n\n등을 반복할 가능성이 높습니다.\n\n \n\n조국혁신당은 국민의 눈높이에서\n\n윤 대통령의 담화와 기자회견을 지켜보고,\n\n그에 맞춰 응당한 조치를 하겠습니다."}, {"id": 269, "filename": "2기 제39차 최고.txt", "title": "2기 제39차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["개헌", "기자회견", "윤석열"], "preview": "-24.11.11(월) 09:30 본관 당 회의실    ■ 조국 당대표  안녕하십니까. 조국혁신당 대표 조국입니다.  윤석열-김건희 부부 정권에서 벌어지고 있는 해괴한 일은  8년 전 박근혜 정권 때와 참 닮았습니다.  두 정권의 대처법도 복사판입니다.    2016년 가을, 박근혜 대통령은 세 차례 대국민 메시지를 발표합니다.  최순실 씨(최서원 개명 전) 국정개입 사실이 폭로된 뒤였습니다.    박 대통령은 10월 25일 첫 번째 사과 당시...", "content": "-24.11.11(월) 09:30 본관 당 회의실\n\n\n\n■ 조국 당대표\n\n안녕하십니까. 조국혁신당 대표 조국입니다.\n\n윤석열-김건희 부부 정권에서 벌어지고 있는 해괴한 일은\n\n8년 전 박근혜 정권 때와 참 닮았습니다.\n\n두 정권의 대처법도 복사판입니다.\n\n\n\n2016년 가을, 박근혜 대통령은 세 차례 대국민 메시지를 발표합니다.\n\n최순실 씨(최서원 개명 전) 국정개입 사실이 폭로된 뒤였습니다.\n\n\n\n박 대통령은 10월 25일 첫 번째 사과 당시 발뺌을 합니다.\n\n이렇게 말했습니다.\n\n“선거 때 다양한 사람들 의견을 듣는다.\n\n최순실 씨는 과거 어려움을 겪을 때 도와준 인연으로\n\n대선 때 연설, 홍보 등이 국민에게 어떻게 전달됐는지\n\n의견이나 소감을 전달해주는 역할을 했다.\n\n취임 후 의견을 물은 적이 있다.\n\n저로서는 꼼꼼하게 챙겨보고자 하는 순수한 마음으로 한 일이다.”\n\n라고 했습니다.\n\n\n\n지지율이 폭락하자, 11월 4일 이렇게 대국민 담화를 했습니다.\n\n“개인적 인연을 믿고 제대로 살피지 못한 나머지\n\n주변 사람들에게 엄격하지 못한 결과가 되고 말았다.\n\n제가 사이비종교에 빠졌다거나, 청와대에서 굿을 했다는 이야기까지\n\n나오는데 결코 사실이 아니다”라고 말했습니다.\n\n그러면서 “국민들께서 맡겨주신 책임에 공백이 생기지 않도록\n\n자주 소통하며 국회 요구를 무겁게 받아들이겠다.”라고 퇴진 의사가 없음을 명백히 밝혔습니다.\n\n\n\n이상을 지난 7일 윤석열 대통령의 대국민담화, 기자회견과\n\n비교해보면 어떻습니까?\n\n기본 태도가 정말 유사하지 않습니까?\n\n\n\n2016년 국정농단의 실체가 드러나자,\n\n모든 국민이 거리로 나와 박근혜 정권 퇴진을 외쳤습니다.\n\n헌법 1조를 노래 불렀습니다.\n\n박근혜 정권으로부터 헌법을 지키고자 한 것입니다.\n\n이제 헌법을 유린하는 윤석열-김건희 공동정권으로부터 \n\n다시 헌법을 지키기 위해 행동해야 할 시간이 왔습니다.\n\n당당한 분노와 담대한 행동이 필요합니다.\n\n\n\n민주당 이재명 대표께서는 지난 9일 집회에서\n\n“제가 ‘두 글자’로 된 말을 차마 말할 수가 없어서 이렇게 말한다.\n\n국민이 위임된 권력을 남용하는 그들에게 책임을 물을 때가 됐다”\n\n라고 하셨습니다.\n\n제가 그 ‘두 글자’를 크게 말씀드리겠습니다.\n\n바로 “탄핵”입니다.\n\n탄핵은 헌법을 지키기 위해 헌법이 보장하는 장치입니다.\n\n\n\n윤석열 대통령 탄핵을 가장 먼저 외쳤던 정당의 대표로서\n\n다시 한번 말씀드립니다.\n\n“윤석열 대통령을 탄핵해야 합니다.”\n\n“김건희 씨를 구속해야 합니다.”\n\n“검찰을 해체해야 합니다.”\n\n어떤 분들은 대통령 ‘하야’를 요구하고, 누구는 ‘퇴진’을 말하고,\n\n또 ‘임기 단축 개헌’을 말씀하시는 분도 있습니다.\n\n그 어느 것도 윤석열-김건희 두 사람이 순순히 받아들일 리 없습니다.\n\n그것을 모르는 사람은 아무도 없습니다.\n\n또한 ‘탄핵’이나 ‘개헌’은 모두 국회 200석 동의가 필요합니다.\n\n그렇기 때문에 지금 제일 중요한 것은\n\n국민의 정당한 분노를 모으는 것입니다.\n\n그 힘이 충분히 모여야 탄핵도 개헌도 가능합니다.\n\n조국혁신당은 대통령 탄핵을 위해 우선 노력하되,\n\n개헌·퇴진·하야 등의 가능성에 모두 문을 열어둘 것입니다.\n\n\n\n모든 정당, 모든 언론, 그리고 시민사회에게 정중히 묻습니다.\n\n윤석열-김건희 공동정권에게 개선 가능성이 있습니까?\n\n윤석열-김건희 공동정권이 2년 반 더 지속되도록 놔둘 것입니까?\n\n그렇지 않다면 \n\n어떤 방식이 조금이라도 빨리 퇴진시킬 수 있는 방식입니까? \n\n\n\n아까 박근혜 대통령이 세 차례 대국민 메시지를 냈다고 했습니다.\n\n2016년 11월 29일 담화문은 이랬습니다.\n\n“대통령직 임기 단축을 포함한 진퇴 문제를\n\n국회 결정에 맡기겠습니다.\n\n정치권이 논의하여 국정의 혼란과 공백을 최소화하고,\n\n안정되게 정권을 이양할 수 있는 방안을 만들어 주시면\n\n그 일정과 법 절차에 따라 대통령직에서 물러나겠습니다.”\n\n그런데 여기서 알 수 있듯이,\n\n박근혜 대통령은 스스로 결단해야 할 임기단축을 국회에 넘겼습니다.\n\n그래서 이 담화 발표 102일 뒤, 헌법재판소는 박근혜 대통령을 파면했습니다. 탄핵되었던 것입니다.\n\n이제 우리에게도 그 시간이 다가오고 있습니다.   \n\n\n\n감사합니다."}, {"id": 270, "filename": "2기 제4차 최고.txt", "title": "2기 제4차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["민생", "윤석열"], "preview": "2024. 7. 26 9:30 본청316    ■ 조국 당대표    윤석열 정부가 하는 일은 하나같이 해괴합니다.   경제나 민생은 무지하고 무능하여 그런다고 치고,  왜 그렇게 친일을 못 해서 안달인지 모르겠습니다.    윤석열 정권이 들어선 후, 외교안보 라인은  죄다 친일파가 발탁되고 있습니다.  일본의 요구는 고분고분 다 들어줍니다.  강제징용 배상도 일본 방식대로 해주려고 합니다.    후쿠시마 핵 폐수 해양 투기를 방조하고,  정부 ...", "content": "2024. 7. 26 9:30 본청316\n\n\n\n■ 조국 당대표\n\n\n\n윤석열 정부가 하는 일은 하나같이 해괴합니다. \n\n경제나 민생은 무지하고 무능하여 그런다고 치고,\n\n왜 그렇게 친일을 못 해서 안달인지 모르겠습니다.\n\n\n\n윤석열 정권이 들어선 후, 외교안보 라인은\n\n죄다 친일파가 발탁되고 있습니다.\n\n일본의 요구는 고분고분 다 들어줍니다.\n\n강제징용 배상도 일본 방식대로 해주려고 합니다.\n\n\n\n후쿠시마 핵 폐수 해양 투기를 방조하고,\n\n정부 돈을 들여 해가 없다고 홍보했습니다.\n\n\n\n방송통신위원장 후보로 지명된 이진숙씨는\n\n후쿠시마 핵 오염수를 일본 정부 용어인\n\n‘처리수’라고 불렀습니다.\n\n‘지록위마’, 즉 사슴을 말이라고 강변하는 행태입니다.\n\n\n\n최근 새로 부각되는 친일 장관이 있습니다.\n\n신원식 국방부 장관입니다.\n\n나라를 지키라고 그 자리에 앉혀놨더니,\n\n무슨 말을 하는지 아십니까?\n\n\n\n신 장관은 일본 보수 신문 요미우리신문과 인터뷰했습니다.\n\n그는 “한·미·일 간 불가역적 안보 협력을 위해\n\n대략적인 문서를 합의했다”라고 말했습니다.\n\n\n\n이 소식을 듣고 저는 깜짝 놀랐습니다. \n\n\n\n헌법 60조 1항에 따라 조약 체결·비준 동의권은 국회에 있습니다.\n\n한·미·일 간 불가역적 안보협력은 정부 맘대로 해서는 안 됩니다.\n\n국회의 권능을 침해하는 위헌적 행위입니다.\n\n장관 탄핵 사유입니다.\n\n\n\n신원식 장관은 한발 더 나아갑니다.\n\n“중단됐던 한국군과 일본 자위대 간 교류를 재개하겠다.”\n\n그러고는 곧 일본에서 열리는 한·미·일 국방장관 회의에 참석한답니다.\n\n2009년 이후 15년 만에 한국 국방 수장의 방일인데,\n\n이러다 일본과 군사동맹이라도 맺을 태세입니다.\n\n여차하면 독도 앞에 욱일기를 단 자위대 함정이 뜰 판입니다.\n\n\n\n그래서는 안 됩니다. 잘 아시겠지만,\n\n일본은 틈만 나면 “독도는 일본 땅”이라고 우깁니다.\n\n일본 제국주의 범죄를 전면 부인하는 것입니다.\n\n과거 침탈했던 영토를 다시 빼앗겠다는 말입니다.\n\n\n\n이렇게 일본에는 아양이라도 떨던 신원식 장관이\n\n북한에는 전쟁을 불사 할 것처럼 대합니다.\n\n\n\n신 장관은 요미우리에 “남측 대북 전단 살포용 풍선 격추나\n\n풍선을 날리는 거점에 대해 북측이 총격이나 포격을 행할 가능성”을 언급합니다.\n\n합참 관계자는 북의 쓰레기 풍선 부양 원점을 타격하는 방안에\n\n대해선 “여러 가지 옵션을 갖고 있다”라고 말합니다.\n\n전쟁을 막아야 할 국방부가 전쟁이 나도 어쩔 수 없다는 식입니다.\n\n\n\n조국 혁신당 대표로서 국회 국방위원으로서 경고합니다.\n\n윤석열 정권은 한·미·일 유사 동맹 추진 기조를 재검토 하십시오.\n\n‘불가역적 안보협력을 위한 문서’는 폐기하십시오.\n\n\n\n오물 풍선의 발단이 된 대북 전단도 막아야 합니다.\n\n제가 발의한 2호 법안이 이런 내용을 담은\n\n‘남북관계 발전에 관한 법률’ 일부 개정안입니다.\n\n이는 평화를 만드는 법안입니다.\n\n\n\n윤석열 대통령에게 촉구합니다.\n\n정부 내 친일 프락치 같은 인사들, 종일(從日), 숭일(崇日), 부일(附日)하는 \n\n모리배·매국노를 모두 치우십시오.\n\n조국혁신당은 윤석열 정부의 친일 매국적 행위와\n\n전쟁 불사 폭주를 막아내겠습니다."}, {"id": 271, "filename": "2기 제40차 최고.txt", "title": "2기 제40차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["지방선거", "민생", "윤석열"], "preview": "-24.11.14(목) 10:00 본관 224호    ■ 조국 당대표  안녕하십니까. 조국혁신당 대표 조국입니다.    “자고 나면 하나씩 터진다.”  요즘 윤석열-김건희 부부 비리, 명태균 게이트 이야기입니다.  하도 많이 쏟아져 나오니, 국민들은 어지러울 지경입니다.    이 와중에 대통령실 행태가 매우 수상합니다.  대통령과 관련해서 자그마한 사안도 발끈하던 대통령실 아닙니까?  요즘에는 입을 꾹 닫고 있습니다.  잘못 해명했다가 나중에 ...", "content": "-24.11.14(목) 10:00 본관 224호\n\n\n\n■ 조국 당대표\n\n안녕하십니까. 조국혁신당 대표 조국입니다.\n\n\n\n“자고 나면 하나씩 터진다.”\n\n요즘 윤석열-김건희 부부 비리, 명태균 게이트 이야기입니다.\n\n하도 많이 쏟아져 나오니, 국민들은 어지러울 지경입니다.\n\n\n\n이 와중에 대통령실 행태가 매우 수상합니다.\n\n대통령과 관련해서 자그마한 사안도 발끈하던 대통령실 아닙니까?\n\n요즘에는 입을 꾹 닫고 있습니다.\n\n잘못 해명했다가 나중에 수사에 활용될까 봐 걱정하는 것 아닙니까?\n\n\n\n국민은 사실을 알 권리가 있습니다.\n\n대통령실은 답해야 할 의무가 있습니다.\n\n제가 국민을 대신해서 열 가지 묻겠습니다.\n\n\n\n첫 번째, 대통령 부부는 휴대폰을 바꾸겠다고 했습니다.\n\n예전에 쓰던 휴대폰은 어떻게 했습니까?\n\n많은 의혹의 핵심 증거가 대통령 부부의 휴대폰입니다.\n\n그걸 없애면 증거인멸입니다.\n\n\n\n두 번째, 취임 후 김건희 씨는 대통령 휴대폰에 손을 댔습니까?\n\n2022년 7월, 권성동 의원에게 ‘체리 따봉’ 이모티콘을 보낸 사람은\n\n김건희 씨입니까, 대통령입니까?\n\n\n\n세 번째, 김건희 씨가 명태균 씨에게 500만원을 줬다는데,\n\n언제, 어디서, 그리고 무슨 명목으로 준 돈입니까?\n\n국정 개입의 대가입니까? 아니면 입막음용입니까?\n\n\n\n네 번째, 2022년 6월 13일 김건희 씨가 봉하마을에 갔을 때\n\n명태균 씨가 KTX 대통령 특별열차에 올라탔다고 합니다.\n\n김영선 전 의원도 함께 있었답니다.\n\n여기서 무슨 이야기가 오갔습니까?\n\n대통령 특별열차는 움직이는 대통령 집무실입니다.\n\n민간인이 탑승하려면 경호처가 점검해야 하는데, 했습니까?\n\n아니면 과거 최순실 씨가 청와대를 제 마음대로 드나든 것처럼\n\n몰래 들어갔습니까?\n\n\n\n다섯 번째, 명태균 씨는 창원 국가산단 추진 사실을 미리 알았습니다.\n\n발표 5개월 전인 2022년 10월, 창원시 공무원들로부터\n\n대외비 문서를 보고받았습니다.\n\n명 씨는 이런 중요하고도 내밀한 정보를 누구로부터,\n\n어떤 방식으로 얻었습니까?\n\n\n\n여섯 번째, 명 씨가 2022년 7월(중순) 대우조선해양,\n\n현재 한화오션 거제 옥포조선소 대우조선하청지회 파업 현장을 찾아가 사측 브리핑을 받은 후, 윤 대통령에게\n\n사태 심각성을 보고했다는 주장이 나왔습니다.\n\n명 씨가 조선소를 다녀간 뒤, 윤 대통령은 불법 파업 엄단 등\n\n강경한 지시를 내렸습니다.\n\n명 씨에게 조선소를 시찰하라고 지시한 사람은 누구입니까?\n\n명 씨는 방문 결과를 누구에게 보고했습니까?\n\n\n\n일곱 번째, 원전 사업을 주력으로 하는 두산에너빌리티에 \n\n2022년 6월 22일, 윤석열 대통령이 방문할 것을\n\n명 씨가 이틀 전에 알았습니다.\n\n대통령 현장 방문은 기밀인데, 누가 알려주었습니까?\n\n명 씨는 주식을 사라고 정보공유까지 했다는데,\n\n이는 매우 심각한 범죄입니다.\n\n\n\n여덟 번째, 2022년 6·1 지방선거 당시 명태균 씨는\n\n경남 의령군수 공천 과정에도 여론조사를 통해\n\n영향력을 행사하려 했다는 의혹이 제기되었는데,\n\n이 내용, 대통령 부부에게 보고하고 논의했습니까? \n\n\n\n아홉 번째, 명태균 씨는 11월 9일 창원지검에 출두하면서\n\n“이 사건은 정치자금법 위반 아니냐.\n\n정치자금법 위반에 대해서 조사를 받아야지,\n\n허위 보도 가짜뉴스에 대해 조사를 받아야 하느냐”라고\n\n기자들에게 큰소리를 쳤습니다.\n\n그런 가이드 라인은 누가 준 것입니까?\n\n대통령과 명 씨가 직접 통화한 내용을 전 국민이 다 들었는데,\n\n공천개입 등은 수사를 안 받는다고 하던가요?\n\n\n\n열 번째, 윤석열 대통령이 대선 때 선거관리위원회에\n\n신고하지 않은 비밀 선거사무소를 운영했다고 합니다.\n\n공직선거법 위반입니다.\n\n임차료는 누가 냈습니까?\n\n건물 소유주 중 한 명을 대통령 비서실에 채용했다는데,\n\n사무실을 빌려준 대가 아닙니까?\n\n\n\n대통령실은 쌓여가는 의혹을 제대로 해명해야 합니다.\n\n검찰은 명태균 씨와 김영선 전 의원 기소로\n\n꼬리 자르기를 해서는 안 됩니다.\n\n제기되는 의혹을 남김없이 수사해야 합니다.\n\n우선 윤석열?김건희 휴대폰부터 확보하십시오.\n\n\n\n검찰에만 맡겨 둘 수는 없습니다. \n\n솔직히 믿기지 않습니다.\n\n오늘 본회의에 상정될 ‘김건희 특검법’이 통과되어야 합니다.\n\n국민의힘 한동훈 대표와 의원들은 국민 요구에 부응해야 합니다.\n\n더욱이 이번에 올라온 법안은 한동훈 대표가 주장해온\n\n제3자 추천 특검안입니다.\n\n이걸 통과시키는 게 한동훈 대표가 입에 달고 다니는\n\n‘국민의 눈높이’입니다.\n\n\n\n조국혁신당은 국회에서 특검법 통과를 도모하는 한편,\n\n시민사회와 함께 ‘윤석열 거부집회’에 결합합니다.\n\n한국진보연대, 전국민중행동, 시민사회단체연대회의, 전국비상시국회의 등이 참여한 ‘거부권을 거부한다 전국비상행동’은 16일 오후 5시 30분, 서울 광화문 앞에서 집회를 엽니다.\n\n\n\n조국혁신당은 다른 야당과 함께 집회에 역량을 집중할 것입니다.\n\n시민 여러분의 많은 참여 부탁드립니다.\n\n\n\n지금 대학수학능력시험이 치러지고 있습니다.\n\n수험생 여러분은 그간 갈고닦은 실력을\n\n시험에서 마음껏 풀어내시길 기원합니다.\n\n부모님들도 그간 뒷바라지 하시느라 고생 많으셨습니다.\n\n수능 시험을 보지 않는 청년들에게도 응원을 보냅니다.\n\n수험생 여러분, 파이팅! "}, {"id": 272, "filename": "2기 제41차 최고.txt", "title": "2기 제41차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["검찰개혁", "윤석열"], "preview": "-24.11.18(월) 09:30 본관 224호    ■ 조국 당대표  안녕하십니까. 조국혁신당 대표 조국입니다.    이번 국회 회기에   조국혁신당이 제출한 검찰개혁 4법 통과를 촉구합니다.    한국 검찰은 수사권과 기소권 모두 갖고 있습니다.  선진국으로 불리는 나라 중,  이렇게 검찰에 막강한 권력을 몰아주는 국가는 없습니다.  견제와 균형의 원리 때문입니다.    이러한 ‘절대반지’를 가진 검찰은  권한을 오남용해왔습니다.    야당...", "content": "-24.11.18(월) 09:30 본관 224호\n\n\n\n■ 조국 당대표\n\n안녕하십니까. 조국혁신당 대표 조국입니다.\n\n\n\n이번 국회 회기에 \n\n조국혁신당이 제출한 검찰개혁 4법 통과를 촉구합니다.\n\n\n\n한국 검찰은 수사권과 기소권 모두 갖고 있습니다.\n\n선진국으로 불리는 나라 중,\n\n이렇게 검찰에 막강한 권력을 몰아주는 국가는 없습니다.\n\n견제와 균형의 원리 때문입니다.\n\n\n\n이러한 ‘절대반지’를 가진 검찰은\n\n권한을 오남용해왔습니다.\n\n\n\n야당 대표 부인은 식사비 10만 얼마 카드 결제하는 것을\n\n말리지 않았다고 검찰이 기소해 벌금형을 받게 만들었습니다.\n\n현직 대통령 부인은 300만 원짜리 명품 백을 받았는데,\n\n기소는커녕 검찰이 나서서 변호를 해줍니다.\n\n또 주가 조작으로 공범이 모두 처벌을 받았지만,\n\n아예 불기소처분을 내립니다.\n\n“지리산 도사”와 협의하여 여당 공천에 개입한 방증이\n\n속속 나오는데 수사는 꿈도 꾸지 않습니다.\n\n\n\n대선 패배 정치인에 대해서는 발언 하나하나를 정밀 분석하여,\n\n먼지 털듯 수사하고 기소해 1심에서 징역형 선고를 받아냈습니다.\n\n검찰총장 출신 대통령 후보는 부인의 도이치모터스 주가 조작에 대해\n\n“손실을 봐서 돈을 빼고 절연했다”라고 말했습니다.\n\n장모에 대해서는, \n\n“장모가 사기를 당한 적이 있어도\n\n누구한테 10원 한 장 피해준 적 없다”라고 했습니다.\n\n그러나 수사는커녕 관심도 없습니다. \n\n\n\n버스 기사는 몇백 원만 횡령해도 기소합니다.\n\n검사들은 특수활동비로 소고기를 몇백만 원어치 사 먹어도\n\n보안 사항이라고 문제 삼지 않습니다.\n\n\n\n자기편 잘못이면 어떤 비난 가능성도 모르는 체 합니다.\n\n검찰에 불리한 일을 하는 사람이면 어떻게든 엮어서 기소합니다.\n\n\n\n야당, 특히 민주당에 묻습니다.\n\n이러한 검찰을 그냥 놔두면 되겠습니까. \n\n특검법은 대통령이 거부할 것을 감수하면서도 본회의에 올립니다.\n\n그런데 수사와 기소 분리법안은 왜 올리지 않는 것입니까?\n\n\n\n수사·기소 분리는 민주진보진영의 일관되고 주된 공약입니다.\n\n이재명 대선 후보도 같은 내용의 검찰개혁을 천명했습니다.\n\n민주당의 지난 총선 공약에 수사?기소 분리,\n\n검사의 기소 불기소 재량권 남용에 대한 사법 통제 실질화 등 \n\n검찰개혁 추진이 들어있습니다.\n\n\n\n조국혁신당이 이미 제출한 검찰개혁 4법은 \n\n수사권을 ‘중대범죄수사청’으로 이관하고,\n\n검찰청을 폐지하되, ‘공소청’을 설치하는 것이 골자입니다.\n\n이렇게 되면 검사는 ‘기소와 공소 유지만’ 전담합니다.\n\n\n\n민주당과 모든 야당에 촉구합니다.\n\n검찰에게 과도하게 집중된 권한을 나누어 정상화해야 합니다.\n\n대한민국 헌정사상 처음으로 수사·기소 분리법안을 통과시킵시다.\n\n그로써 우리는 새로운 헌정사를 쓰게 될 것입니다.\n\n\n\n◎ 어제 한 뉴스를 접하고 쓴웃음이 났습니다. \n\n윤석열·김건희 부부가 주요 고비마다 역술에 의존해왔다는 보도입니다.\n\n“지리산 도사”라고 불리는 명태균 씨만으로 부족했던 모양입니다. \n\n\n\n역술인 류모 씨는 윤석열 검찰총장 이후 정치적 고비가 있을 때마다\n\n김건희 씨에게 대여섯 차례 상담해 줬다고 합니다.\n\n명품백 수수 문제가 불거진 뒤인 2023년 12월,\n\n김건희 씨는 “저 감옥 가나요”라고 물었다고 합니다.\n\n게다가 류 씨는 김건희 씨가 조언을 구하는 명리학자나 무속인이\n\n분야별로 7~8명 더 있다”라고 말했습니다.\n\n\n\n이쯤 되면 김건희 씨는 ‘무속 중독’ 아닙니까?\n\n그리고 윤 대통령은 이런 김건희 씨의 지시를 받고\n\n대통령 일을 하고 있는 것 아닙니까?\n\n\n\n이뿐만이 아닙니다. \n\n서대원 선생이라는 주역 학자가 있습니다.\n\n유명 출판사에서 책을 내신 분입니다. \n\n서 선생도 윤 대통령을 서울중앙지검장 시절 만났답니다.\n\n윤 대통령이 검찰총장이 된 뒤, 김건희 씨가 서 선생과 통화했습니다.\n\n그런데 수화기 너머로 윤석열 당시 검찰총장이\n\n“조국이 대통령 될 것인가 물어봐”라고 물었다고 합니다.\n\n\n\n이 이야기를 듣고 너무 황당했습니다.\n\n아니, 자기들 앞날이야 물어보는 것은 자기들 마음이지만,\n\n왜 저의 미래를 두 부부는 물어보았던 것입니까.\n\n\n\n상당수 국민이 심심풀이로 또는 불안해서 사주나 타로점을 봅니다.\n\n또 무속인을 찾기도 합니다.\n\n그 선택을 비하하지 않을 것입니다.\n\n\n\n그러나 대통령 부부는 다릅니다.\n\n윤석열·김건희 부부는 사주나 무속, 풍수 등에 기대서\n\n주요 결정을 하고,\n\n대통령이 되기 전은 물론, 되고 나서도 계속 그랬다는\n\n합리적 의심을 가지지 않을 수 없습니다.\n\n대통령실 전격 이전, \n\n영국 엘리자베스 여왕 장례식 때 불참과 지각,\n\n캄보디아 순방 때 앙코르와트 방문 전격 취소 등\n\n도저히 이해할 수 없는 일들이 여럿 있었습니다.\n\n\n\n이제 왜 그런지 알게 됐습니다.\n\n정말 참담합니다.\n\n‘무속통치’는 주권자 국민에 대한 모욕입니다.\n\n하루라도 빨리 ‘무속통치’를 끝내야 합니다. \n\n\n\n마지막으로 김건희 씨에게 충고합니다.\n\n감옥에 갈까 불안한 이유는 \n\n감옥에 갈 일을 많이 했음을 스스로 인식하고 있기 때문이겠지요.\n\n\n\n그 불안은 역술인이나 무당을 찾는다고 해소되지 않습니다.\n\n남편에게 지시하여 김건희 특검법을 통과시키십시오.\n\n본인의 죗값을 치러야 불안이 사라질 것입니다.  \n\n\n\n감사합니다."}, {"id": 273, "filename": "2기 제42차 최고.txt", "title": "2기 제42차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["의료", "윤석열", "부동산"], "preview": "-24.11.21(목) 09:30 본관 당회의실(224호)    ■ 조국 당대표  안녕하십니까? 조국혁신당 대표 조국입니다.    ‘윤석열 정부는 없다. 문재인 정부만 있다.’  지금 사정 기관의 행태가 딱 이 꼴입니다.    윤석열 정권 임기가 반환점을 돌았습니다.  그런데 이 정부의 검찰과 경찰, 감사원 등은  이전 정부 일만 탈탈 털고 있습니다.    최근 감사원이 감사결과를 내놓았습니다.  사드, 즉 고고도 미사일 방어 체계 관련입니다....", "content": "-24.11.21(목) 09:30 본관 당회의실(224호)\n\n\n\n■ 조국 당대표\n\n안녕하십니까? 조국혁신당 대표 조국입니다.\n\n\n\n‘윤석열 정부는 없다. 문재인 정부만 있다.’\n\n지금 사정 기관의 행태가 딱 이 꼴입니다.\n\n\n\n윤석열 정권 임기가 반환점을 돌았습니다.\n\n그런데 이 정부의 검찰과 경찰, 감사원 등은\n\n이전 정부 일만 탈탈 털고 있습니다.\n\n\n\n최근 감사원이 감사결과를 내놓았습니다.\n\n사드, 즉 고고도 미사일 방어 체계 관련입니다.\n\n문재인 정부가 일부러 사드 배치를 지연시켰답니다.\n\n\n\n정의용 전 국가안보실장 등을 검찰에 수사요청했습니다.\n\n일흔여덟의 정의용 전 실장은 이미 ‘북한 어부 북송’ 사건으로\n\n수사 받고 기소까지 되었습니다.\n\n\n\n사드 문제는 외교와 국방, 통일 부문을 고루 감안해 이뤄진\n\n고도의 정책적 결정입니다.\n\n국민으로부터 권한을 위임받은 정부가 판단한 것입니다.\n\n그런데 현 시점에서 현 정권의 시각으로 들여다 봅니다.\n\n그리고 잘못했다고 단죄하려고 합니다.\n\n\n\n다음 정권에서 윤석열 정권의 연금, 의료, 노동 개혁 등을\n\n똑같은 기준으로 감사하고 수사해도 할 말이 없게 되었습니다.\n\n\n\n절차적 문제도 있습니다.\n\n최고의사결정기구인 감사위원회를 거치지 않고 수사요청을 했습니다.\n\n이런 일은 도주나 증거인멸 우려가 있을 때나 합니다.\n\n\n\n감사원은 대통령 직속 기구이자, 독립 기구입니다.\n\n지휘·감독을 받지 않아야 합니다.\n\n대통령 보고 여부도 감사원이 정합니다.\n\n\n\n그런데 이 정부 들어, 감사원은 완전히 망가졌습니다.\n\n‘정권의 하수인’이 되어 회복 불능 상태가 되었습니다.\n\n\n\n최재해 감사원장이 2022년 7월 국회에서,\n\n“감사원은 대통령 국정 운영을 지원하는 기관”이라고 했을 때\n\n이미 알아보았습니다.\n\n유병호 감사위원은 감사원 사무총장 때 ‘돌격대장’으로 불렸습니다.\n\n문재인 정부 표적 감사를 밀어붙여서 붙은 별명입니다.\n\n\n\n감사원은 비무장지대 감시초소 철수 사업도 들여다보고 있다 합니다.\n\n\n\n검찰은 더합니다.\n\n가히 전방위적인 먼지떨이 식 수사를 계속 전개하고 있습니다.\n\n문재인 대통령을 겨냥해 전 사위 채용 관련 수사가 진행 중입니다.\n\n문 대통령 딸 다혜 씨와 전 사위 재정지원도 수사 대상입니다.\n\n\n\n김정숙 여사의 옷 구매 비용 문제, 샤넬 재킷 미 반납 문제,\n\n인도 타지마할 단독 출장도 캐고 있습니다.\n\n\n\n청와대 국가안보실에 대해서는 \n\n앞서 사드 문제와\n\n서해 해수부 소속 어업지도원 피살 사건,\n\n동해 동료 16명 살해한 북한 어부 2명 북송 사건,\n\n2018년 방북 전세기 특혜 논란 등이 검찰 칼끝에 올라 있습니다.\n\n\n\n청와대 정책실도 부동산 및 가계소득 통계 조작,\n\n(이중 가계소득 건은 무혐의로 결론났습니다만,)\n\n추-윤 갈등 이후 윤석열 당시 검찰총장이 드라이브를 건\n\n탈원전 수사 등이 진행 중입니다.\n\n\n\n백운규 전 산업통상자원부 장관은\n\n세계 상위 1%에 들어가는 저명한 연구자입니다.\n\n그런 그가 4년째 탈원전 문제로 법정을 오가며 고통받고 있습니다.\n\n\n\n청와대 비서실도 탈탈 털리고 있습니다.\n\n과기, 산자, 중기부 인사에서 직권남용 여부가 문제입니다.\n\n김학의 차관 출금 수사와 이를 둘러싼 기획 사정 여부,\n\n울산시장 선거 개입 의혹 등도 수사와 재판이 진행 중입니다.\n\n\n\n대한민국에서 민주화가 이뤄진 이래,\n\n이렇게 뻔뻔스럽게\n\n그리고 편향적으로 벌어진\n\n사정 작업은 처음 보았습니다.\n\n검찰은 살아있는 권력 수사, 즉 ‘살권수’를 자랑해왔습니다.\n\n\n\n그런데 알고 보니 ‘과권수’, 과거 권력만 수사하는 쫄보들입니다.\n\n\n\n문제는 여기서 그치지 않습니다.\n\n검사들은 \n\n정치와 정책을 수사와 사법 문제로만 들여다봅니다.\n\n\n\n민주적 정당성을 가진, \n\n선출된 권력이\n\n국민과 전문가 의견을 듣고 판단한 정책에 대해\n\n절차상 하자를 파헤치고,\n\n반대파들의 비난을 받아들여\n\n수사 선상에 놓고 재판정으로 끌고 갑니다.\n\n\n\n대한민국은 이제 정책판단 이전에\n\n검찰에게 보고하고 결재를 받아야 하는 나라가 돼 가고 있습니다.\n\n도대체 이게 옳습니까?\n\n\n\n연설 한 대목을 들려드리겠습니다.\n\n“내부의 적과 외부의 적이 들끓고 있는 지금\n\n우리나라에는 법과 질서가 필요합니다.\n\n법과 질서가 없다면 우리나라는 살 수가 없습니다.”\n\n\n\n누가 한 말인 줄 아십니까?\n\n아돌프 히틀러가 1932년에 한 연설입니다.\n\n법과 질서만 내세우는 자들은\n\n그것 말고는 국민을 설득할 방법을 갖지 못합니다.\n\n그리고 그들은 법과 질서에 의해 단죄될 것입니다.\n\n바로 탄핵입니다."}, {"id": 274, "filename": "2기 제43차 최고.txt", "title": "2기 제43차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["윤석열"], "preview": "-24.11.25(월) 09:30 본관 당회의실(224호)    ■ 조국 당대표    안녕하십니까.  조국혁신당 대표 조국입니다.    “나는 매일 말의 타락을 보고 있다.  군림하는 말은 한없이 무례하며,  자기를 변명하는 말은 오히려 국어사전을 바꾸자고 고집을 부린다.  나는 더 이상 강의실에서 한 번 더 고민하여 정확하고 신뢰할 수 있는  말을 건네고, 서로의 말에 경청하자고 말하지 못한다.”    경희대, 경희사이버대 교수 연구자들의 시...", "content": "-24.11.25(월) 09:30 본관 당회의실(224호)\n\n\n\n■ 조국 당대표\n\n\n\n안녕하십니까.\n\n조국혁신당 대표 조국입니다.\n\n\n\n“나는 매일 말의 타락을 보고 있다.\n\n군림하는 말은 한없이 무례하며,\n\n자기를 변명하는 말은 오히려 국어사전을 바꾸자고 고집을 부린다.\n\n나는 더 이상 강의실에서 한 번 더 고민하여 정확하고 신뢰할 수 있는\n\n말을 건네고, 서로의 말에 경청하자고 말하지 못한다.”\n\n\n\n경희대, 경희사이버대 교수 연구자들의 시국선언문입니다.\n\n윤석열 정권 치하에서 벌어지는\n\n재난에 가까운 처참한 현실을 담고 있습니다.\n\n선언문은 이렇게 끝납니다.\n\n“대통령으로서 국민의 생명과 안전에 무관심하며,\n\n거짓으로 진실을 가리고,\n\n무지와 무책임으로 제멋대로 돌진하는 윤석열은 즉각 퇴진하라!”\n\n\n\n전국 곳곳의 대학에서 시국선언문이 쏟아지고 있습니다.\n\n가히 3?1 만세운동에 필적합니다.\n\n시국선언에 참여한 교수, 연구자가 50여 대학 3,000명을 넘겼습니다.\n\n\n\n진실이 거짓을 덮고, 악화가 양화를 구축하며,\n\n꼬리가 몸통을 흔들고, 혐오가 사랑을 덮으며,\n\n사익이 공익을 압도하고, \n\n무속이 과학을 이기는 현실을 고발하고 있습니다.\n\n\n\n안동대 교수들은 “윤석열 대통령은 대통령이 아닌\n\n김건희 여사의 머슴인가”라고 물었고, \n\n인천대 교수들은 “출범 전부터 부부가 합동으로 \n\n온 국민과 나라를 힘들게 한 특이한 정권”으로 규정했습니다.\n\n\n\n동국대 교수들은 “국정기조를 바꾸라니까\n\n고작 휴대폰을 바꾸겠다고 응대했다.”라고 했고,\n\n\n\n국민대 교수들은 “대통령이 그냥 아무 것도 하지 말았으면 좋겠다는\n\n말까지 나오는 지경”이라고 말했습니다.\n\n\n\n충남대 교수들은 “지금 절대다수 국민은, 대통령 때문에 극심한 수치심과 자괴감으로 고통받고 있다.”라고 한탄했습니다.\n\n\n\n연세대 교수들의 ‘당신은 더 이상 우리의 대통령이 아니다’라는\n\n제목의 시국선언문은,\n\n김건희 씨가 다 외운다는 구약성서 구절로 시작합니다.\n\n“망할 것들! 권력이나 쥐었다고 자리에 들면 못된 일만 꾸몄다가,\n\n아침 밝기 무섭게 해치우고 마는 이 악당들아,\n\n나 야훼가 선언한다. 나 이제 이런 자들에게 재앙을 내리리라.\n\n거기에서 빠져나갈 생각을 말라.\n\n머리를 들고 다니지도 못하리라.\n\n재앙이 내릴 때가 가까웠다.”\n\n\n\n전남대 교수들은 “이태원 참사, 숱한 거부권 행사, 전쟁 무기 지원, 국정농단 등의 만행 때문에 \n\n대한민국의 국격이 땅바닥으로 떨어지고 있다”며, \n\n7년 전 차디찬 아스팔트 도로 위에서 함께 들어 올린 촛불로 \n\n윤 대통령을 탄핵할 것이다.”라고 했습니다.\n\n\n\n경북대 교수들은 “말을 듣지도, 물러나지도 않는다면 우리가 끌어내릴 것이다. 윤석열 대통령은 해고다.”라고 선언했습니다.\n\n\n\n교수들 목소리가 국민의 목소리입니다.\n\n주말마다 열리는 집회 현장에 가면 똑같은 소리가 들려옵니다.\n\n대통령실과 관저에서 \n\n음주, 극우 유튜브 청취, \n\n무속인이나 역술인 상담 등에 빠져 있는 대통령을 \n\n더 이상 놔둘 수 없습니다.\n\n\n\n조국혁신당은 국민의 기운과 마음을 모으겠습니다.\n\n저희는 탄핵소추문을 공개해 시민 의견을 모으고 있고,\n\n전국을 돌며 탄핵다방을 열고 있습니다.\n\n국민 의견을 더 모으고, 집회도 더 잘 조직해 나가겠습니다.\n\n\n\n◎ 12월 12일 저의 대법원 선고일이 발표되었기에\n\n간략히 입장을 밝힙니다.\n\n\n\n저는 2019년 이후, \n\n지금까지 항상 칼날 위에 서서 살았습니다.\n\n칼날 위에서 고민했고, \n\n칼날 위에서 결단했고, \n\n칼날 위에서 행동했습니다.\n\n국민들께서도 이를 다 아시면서, 조국혁신당에 표를 주셨습니다.\n\n재판은 재판이고, 정치는 정치입니다.\n\n\n\n12월 12일 이전에도,\n\n12월 12일 이후에도,\n\n조국혁신당의 활동은 변함이 없을 것입니다.\n\n저는 \n\n“피고인이 의지할 수 있는 최후의 보루는 법원”이라는 말을 되새기며, 묵묵히 판결을 기다릴 것입니다. \n\n\n\n논어(論語)에 ‘여조삭비(如鳥數飛)’라는 말이 나옵니다.\n\n새가 날려면 수없이 날갯짓해야 하듯,\n\n배움도 쉬지 않고 노력해야 한다는 뜻입니다.\n\n\n\n저는 ‘여조삭비’하듯 쉼 없이 할 일을 해나가겠습니다.\n\n\n\n감사합니다."}, {"id": 275, "filename": "2기 제44차 최고.txt", "title": "2기 제44차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["관세", "트럼프", "민생", "윤석열"], "preview": "-24.11.28(목) 09:30 본관 당회의실(224호)     ■ 조국 당대표     안녕하십니까? 조국혁신당 대표 조국입니다.     윤석열 대통령은 대선 후보 시절인 2022년 3월 7일 선거유세에서  “경제라는 건 대통령이 살리는 게 아니다.  지금은 대통령이나 정부가 멍청한 짓 안 하고 정직하면 된다”  이렇게 말했습니다.     그래서일까요?  윤석열 정권은 경제를 살리지 못하고 있습니다.  게다가 멍청한 짓만 골라서 하고, 정직하...", "content": "-24.11.28(목) 09:30 본관 당회의실(224호)\n\n \n\n■ 조국 당대표\n\n \n\n안녕하십니까? 조국혁신당 대표 조국입니다.\n\n \n\n윤석열 대통령은 대선 후보 시절인 2022년 3월 7일 선거유세에서\n\n“경제라는 건 대통령이 살리는 게 아니다.\n\n지금은 대통령이나 정부가 멍청한 짓 안 하고 정직하면 된다”\n\n이렇게 말했습니다.\n\n \n\n그래서일까요?\n\n윤석열 정권은 경제를 살리지 못하고 있습니다.\n\n게다가 멍청한 짓만 골라서 하고, 정직하지도 않습니다.\n\n \n\n대한민국은 가난해지고 있습니다.\n\n경제는 활력을 잃었고, 민생은 어려워졌습니다.\n\n내년 경제 성장률이 1%대로 떨어질 것이라는 전망이 늘었습니다.\n\n윤석열 대통령이 입에 달고 사는 ‘반국가세력’ 주장이 아닙니다.\n\n골드만삭스, 바클레이즈, 씨티 등 글로벌 투자은행들입니다.\n\n코로나 사태나 금융위기가 아닌데도 이 지경입니다.\n\n \n\n원 달러 환율은 1,400원을 오르내립니다.\n\n지난해와 올해 세수 펑크가 86조원입니다.\n\n서민들의 ‘급전 창구’인 카드론 잔액은 42조 2,000억원을 넘었습니다.\n\n역대 최고 기록을 갈아치웠습니다.\n\n \n\n그런데 윤석열 대통령은 “수출이 살아나면서\n\n경제도 활력을 찾게 됐습니다”라고 했습니다.\n\n한덕수 총리는 “경제는 위험한 위기 지점을 지났다”라고 합니다.\n\n김민전 국민의힘 최고위원은 한술 더 뜹니다.\n\n“경제 분야에서 90점 이상 업적을 냈다. 슈퍼스타다”라고 말했습니다.\n\n여당, 정부, 대통령실 모두 헛것을 보는 게 아닌가 싶습니다.\n\n \n\n이유는 둘 중에 하나입니다.\n\n객관적 인지 능력이 극히 떨어지거나,\n\n거짓 보고서를 받기 때문입니다.\n\n \n\n떠오르는 사태가 있습니다.\n\n지난해 11월, 부산세계박람회 유치 소동입니다.\n\n외교부는 ‘1차 투표에서 경쟁국 사우디아라비아와 접전 예상,\n\n2차 투표에선 한국이 과반 득표로 유치 성공’\n\n이라는 판세 분석 보고서를 만들었습니다.\n\n실제로는 119대 29로 망신을 당했습니다.\n\n \n\n대한민국 외교부가 어쩌다 이렇게 됐습니까?\n\n일본이 해달라는 것을 퍼주다시피하고, 뒤통수만 맞고 있습니다.\n\n조태열 장관이 문제의 핵심입니다.\n\n그는 외교부 2차관으로 근무하던 2015년,\n\n일본 군함도의 세계문화유산 등재에 동의해줬습니다.\n\n일본은 한국인 강제노역 사실을 축소·부정했습니다.\n\n \n\n이번에는 사도광산 추도식에서 일본, 한국이 행사를 따로 치렀습니다.\n\n일본은 강제노역은 도외시하고 세계문화유산등재 축하만 했습니다.\n\n조 장관은 “일본으로부터 많은 것을 챙겼다”라고 주장해왔습니다.\n\n뭘 챙겨왔는지 내놓아보십시오.\n\n \n\n박진 전 외교장관은 “우리가 물잔을 먼저 채우면,\n\n일본이 나머지 반 잔을 채워줄 것”이라고 했습니다.\n\n우리는 물 반 잔을 채웠지만, 모욕과 뒤통수치기만 돌아왔습니다.\n\n그 결과 친일 뉴라이트들은 살판났지만,\n\n대한민국 국민은 화풀이와 살풀이를 해야 할 판입니다.\n\n \n\n트럼프 2기 정부발 리스크도 몰려오고 있습니다.\n\n관세를 왕창 올린다고 합니다.\n\n수출로 먹고 사는 대한민국에는 큰 문제입니다.\n\n무슨 대비를 하고 있을까요?\n\n \n\n우크라이나 참전 문제는 더 심각합니다.\n\n트럼프 당선인의 차기 국가안보보좌관으로 지명된\n\n마이클 왈츠 하원의원이 “한국도 우크라이나 개입을 고려한다.\n\n트럼프 당선인은 이 분쟁을 끝내야 할 필요성에 대해\n\n매우 명확하게 말해 왔다”라고 콕 집어 한국 정부에 경고를 했습니다.\n\n \n\n그런데도 윤석열 대통령은 우크라이나 특사단을 만나\n\n무슨 약속을 해준 것입니까?\n\n국방부 장차관은 러시아를 압박만 하는데,\n\n트럼프 대통령 취임 이후를 준비는 하는 것입니까?\n\n \n\n이들도 인지 부조화인지, 거짓 보고를 받는 것인지 알 수가 없습니다.\n\n하기야, 정부와 대통령실 관심은 오로지 두 가지에만 몰려있습니다.\n\n하나는 윤석열?김건희 부부 방탄입니다.\n\n다른 하나는 야당과 전정부를 대상으로 하는 사정(司正)입니다.\n\n그러니 국민의 어려운 사정에 눈길이야 주겠습니까?\n\n \n\n문득 궁금한 게 있습니다.\n\n이런 보고서는 대통령에게만 올립니까?\n\n아니면 언론 보도처럼 한 부 더 만들어 김건희 씨에게도 올립니까?\n\n기왕 두 부를 만들고 있다면 실질적 일인자인 김건희 씨에게는\n\n제대로 된 보고서를 올려주십시오.\n\n그래야 대한민국 후퇴 속도를 줄일 수 있지 않을까요?\n\n이런 이야기까지 해야 하다니, 참담합니다.\n\n \n\n집권 여당 국민의힘은 태평성대인 것 같습니다.\n\n최대 관심사가 당원 게시판 문제입니다.\n\n한동훈 대표와 가족이 윤석열 대통령과 김건희 씨를 비난하는\n\n댓글을 올렸느냐를 놓고 옥신각신합니다.\n\n국민보기에, 지지자들 보기에 부끄럽지 않을까요?\n\n \n\n국민의힘 앞에는 두 가지 선택이 있습니다.\n\n과거 여당들은 이 정도 되면 대통령 탈당을 요구하고\n\n거국내각을 하도록 촉구했습니다.\n\n당내 쇄신 요구가 분출했습니다.\n\n다음 선거에는 패배하겠지만, 그 이후를 도모했습니다.\n\n \n\n물론 박근혜 대통령 탄핵 트라우마에 시달리겠지만,\n\n국민의힘이 제대로된 보수당으로 살아남으려면\n\n탄핵의 강을 넘어야 할 것입니다.\n\n \n\n아니면 윤석열?김건희 공동정권, 검찰독재정권과 함께\n\n몰락할 것입니다.\n\n그렇게 되면 대한민국 보수를 괴멸시킨 정당으로\n\n역사에 각인될 것입니다.\n\n \n\n감사합니다."}, {"id": 276, "filename": "2기 제45차 최고.txt", "title": "2기 제45차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["윤석열", "부동산"], "preview": "-24.12.2(월) 09:30 본관 당회의실(224호)    ■ 조국 당대표  안녕하십니까.  조국혁신당 대표 조국입니다.    최근 국회에서 상설특검 ‘규칙’ 개정안이 본회의를 통과했습니다.  대통령 또는 그 가족이 연루된 수사의 경우,  상설특검 후보 추천위 구성 때 여당 몫을 빼는 내용입니다.  규칙만 고친 것이라, 대통령 거부권 행사 대상이 아닙니다.    상설특검 후보 추천위가 두 사람을 추천하면,  대통령은 이 중에 한 사람을 임명...", "content": "-24.12.2(월) 09:30 본관 당회의실(224호)\n\n\n\n■ 조국 당대표\n\n안녕하십니까.\n\n조국혁신당 대표 조국입니다.\n\n\n\n최근 국회에서 상설특검 ‘규칙’ 개정안이 본회의를 통과했습니다.\n\n대통령 또는 그 가족이 연루된 수사의 경우,\n\n상설특검 후보 추천위 구성 때 여당 몫을 빼는 내용입니다.\n\n규칙만 고친 것이라, 대통령 거부권 행사 대상이 아닙니다.\n\n\n\n상설특검 후보 추천위가 두 사람을 추천하면,\n\n대통령은 이 중에 한 사람을 임명해야 합니다.\n\n\n\n국민의힘은 시간을 끌기 위해\n\n헌법소원이나 권한쟁의심판을 청구할 것으로 예상합니다.\n\n그런데 \n\n헌법재판소 결정례에 따르면 ‘규칙’ 개정은 입법 사안입니다.\n\n\n\n내년 봄에는 \n\n윤석열 대통령이 \n\n상설특검을 반드시 임명해야 할 것입니다.\n\n만일 대통령이 특검 임명을 거부한다면 어떻게 될까요?\n\n묻고 따질 것도 없이 바로 법률 위반이 됩니다.\n\n즉, 탄핵 사유입니다.\n\n\n\n물론 조국혁신당을 포함한 야당은\n\n이미 제출한 ‘종합특검’이 통과되도록 노력할 것입니다. \n\n\n\n윤석열 대통령은 이를 결사적으로 막겠죠.\n\n그래서 상설특검을 추진하게 된 것입니다.\n\n윤석열·김건희 부부와 기생하는 자들은 꼭 수사를 받아야 합니다.\n\n\n\n상설특검은 규모가 적습니다. \n\n검사는 최대 5명입니다.\n\n수사 기간도 짧습니다. \n\n60일쯤 됩니다.\n\n여러 특검을 동시다발적으로 발의해 \n\n통과시킬 준비를 해야 합니다.\n\n\n\n마침 조국혁신당이 공개한 탄핵소추안 초안이 있습니다.\n\n15가지 탄핵 사유를 담았습니다.\n\n다수의 상설 특검으로 철저하게 수사해야 합니다.\n\n\n\n‘꼭 이렇게까지 해야 하느냐?’\n\n네, 그렇습니다. \n\n반드시 해야 합니다.\n\n\n\n이 정권은 이미 많은 죄를 지었습니다.\n\n고쳐 쓸 수가 없습니다.\n\n무지(無知), 무능(無能), 무도(無道)한 \n\n삼무(三無) 정권,\n\n불법(不法), 불의(不義), 불통(不通)하는 \n\n삼불(三不) 정권입니다.\n\n\n\n무엇보다 국민을 내 편과 네 편으로 쪼개는 편 가르기,\n\n‘자신과 검찰만’ 옳다는 편들기,\n\n친일 뉴라이트, 극우, 무당까지 데려다 쓰는 편먹기 등\n\n삼편(三偏) 정권입니다.\n\n\n\n개선의 여지는 기대하기 어렵습니다.\n\n차라리 구운 밤에서 싹이 트길 바라는 게 나을 것입니다.\n\n\n\n상설특검 몇 군데서 범죄혐의가 드러나기만 해도 큰 소득입니다.\n\n그 사실에 근거해 종합 특검이 국민 지지를 더 모을 것입니다.\n\n그렇기에 야당들은 상설특검을 속도감 있게,\n\n그러면서도 세밀하게 추진해야 합니다.\n\n\n\n이렇게 팩트가 하나둘 확인되면,\n\n내년 봄에는 실제 탄핵 소추안이 모습을 드러낼 것입니다.\n\n\n\n◎ \n\n거대 양당이 최근 부자 감세에 몰두하고 있습니다.\n\n그래서는 안 된다고 강력하게 경고합니다.\n\n\n\n국민의힘에 이어 민주당도 \n\n가상자산 과세 2년 유예에 동의했다고 합니다.\n\n매우 유감입니다.\n\n\n\n민주당은 그동안 가상자산 투자는 투기적 요소가 짙은 만큼,\n\n과세를 미룰 명분이 없다고 했습니다.\n\n그런데 갑작스럽게 \n\n“추가 정비가 필요하다”고 입장을 바꿨습니다.\n\n\n\n금융투자소득세에 대해서도 올해 들어\n\n유예를 넘어 폐지하는 소득세법 개정안에 찬성했습니다. \n\n투자활성화를 이유로 들었습니다.\n\n여야 모두 금투세를 도입하지 않는다고 했는데도,\n\n우리 주식시장은 급상승은커녕 고전하고 있습니다.\n\n\n\n양당은 대기업 투자세액공제율도 올려주기로 했습니다.\n\n\n\n앞서 민주당은 \n\n기업인 배임죄 폐지, 배당소득 분리과세 등\n\n부자 감세 이슈를 계속 내놓고 있습니다.\n\n국민의힘과 부자들, 보수들이 주장해온 부자감세에\n\n민주당이 적극 호응하고 있는 것입니다.\n\n\n\n잘못입니다.\n\n부자 감세하면, 세 부담은 그만큼 서민과 중산층에 전가됩니다.\n\n금투세처럼 효과도 확인된 바 없이, \n\n부자에게만 혜택이 돌아갑니다.\n\n소득있는 곳에 세금이 있다는 원칙도 무너집니다.\n\n\n\n이렇게 부자에게 다 퍼주면 소는 누가 키울 것입니까?\n\n내년 성장률이 1%대로 내려앉을 판인데,\n\n세금도 없이 \n\n어떻게 해서 재정 운용을 하여 나라 살림을 할 것입니까?\n\n\n\n민주당은 중산층과 서민의 정당을 표방해왔습니다.\n\n김대중, 노무현 대통령이 하신 말씀이라고 늘 자랑해왔습니다.\n\n이제 그 정신과 지향은 버리자는 것입니까?\n\n\n\n조국혁신당의 ‘윤석열 탄핵열차’에 \n\n민주당은 탈지 말지 고민하면서,\n\n왜 \n\n윤석열 정권의 ‘초부자 감세 열차’에는 \n\n몸을 실으려 하는 것입니까?\n\n\n\n지금은 부인하지만 상속세, 법인세, 종합부동산세 등도 \n\n언젠가 깎아줄 것입니까?\n\n대한민국호 꼬리 칸에 탄 국민은 누굴 의지해야 하는 것입니까?\n\n\n\n조국혁신당은 비교섭단체라서 협상장에 앉지 못합니다.\n\n대신 이렇게 바깥에서라도 소리치겠습니다.\n\n\n\n“국민의힘과 민주당, 그래서는 정말 안 됩니다.”\n\n\n\n감사합니다. \n\n"}, {"id": 277, "filename": "2기 제46차 최고.txt", "title": "2기 제46차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "윤석열"], "preview": "-24.12.5.(목) 09:30 본관 당회의실(224호)    ■ 조국 당대표  조국혁신당 대표 조국입니다.    국민 여러분, 그저께 얼마나 놀라셨습니까?  저 또한 놀라고 어이가 없었습니다.    정치적 민주주의가 안착되었다고 평가받던  대한민국에 비상계엄이 선포됐습니다.   \"자고 나니 선진국\"이라고 자부한 시간이 어제 같은데,  하루아침에 후진국으로 전락했습니다.    6시간 천하였지만, 자칫 유혈사태라도 벌어졌다면 어땠을까요?  소름...", "content": "-24.12.5.(목) 09:30 본관 당회의실(224호)\n\n\n\n■ 조국 당대표\n\n조국혁신당 대표 조국입니다.\n\n\n\n국민 여러분, 그저께 얼마나 놀라셨습니까?\n\n저 또한 놀라고 어이가 없었습니다.\n\n\n\n정치적 민주주의가 안착되었다고 평가받던\n\n대한민국에 비상계엄이 선포됐습니다.\n\n \"자고 나니 선진국\"이라고 자부한 시간이 어제 같은데,\n\n하루아침에 후진국으로 전락했습니다.\n\n\n\n6시간 천하였지만, 자칫 유혈사태라도 벌어졌다면 어땠을까요?\n\n소름 끼치는 일입니다.\n\n\n\n그런데 윤석열 대통령은 \n\n어제 자신의 죄를 태연하게 자백했습니다.\n\n보도에 따르면 \"민주당 폭주가 심각함을 국민들께 알리려고,\n\n민주당에 경고하려고, 비상계엄을 선포했다\"라고 말했습니다.\n\n\n\n헌법과 계엄법에 '전시, 사변 또는 이에 준하는 국가비상사태'를\n\n계엄 선포의 전제 조건으로 달았습니다.\n\n비상계엄은 국민 모두가 공포에 떨며 뜬눈으로 밤을 지샐 만큼\n\n무시무시한 조치입니다.\n\n윤 대통령은 '야당 경고, 국민 홍보용'으로\n\n계엄을 선포했다고 말했습니다.\n\n이 정도면 국가 원수가 아니라 국민의 원수 아닙니까?\n\n\n\n그의 인지 능력이 정상인지 극히 의심이 듭니다.\n\n된장과 간장을 구분하지 못하는 지경에 이른 게 아닌가 싶습니다.\n\n이런 사람에게 행정부를 통할하는 권한은 물론\n\n국군통수권까지 맡겨야 한다니, 모골이 송연합니다.\n\n이러다가 '반국가세력의 폭주를 국민에게 홍보하고, 경고하려고'\n\n전쟁을 불사할 사람입니다.\n\n\n\n계엄사령부 포고령 1호 내용도 문제입니다.\n\n계엄법 허용 범위를 넘어 불법적 내용을 담고 있습니다.\n\n반의 반나절 계엄사령관이었던 박안수 육군참모총장은\n\n이런 포고령을 발표했습니다.\n\n \"국회와 지방의회, 정당의 활동과 정치적 결사, 집회, 시위 등\n\n일체의 정치 활동을 금한다.\"\n\n\n\n이게 무슨 말이냐하면, \n\n여당이든 야당이든 아무것도 하지 말라,\n\n국회에 모이지 말라는 말입니다.\n\n헌법상 \n\n대통령 계엄권을 견제할 수 있는 유일한 곳이 국회입니다.\n\n그런데 국회 권능의 무력화를 시도했습니다.\n\n특수부대를 동원해 국회 침탈을 시도했습니다.\n\n\n\n이번 비상계엄 선포, 즉 '12.3 사태'는\n\n본질적으로 전두환 씨 등이 1980년 5월 17일 기존 계엄을\n\n전국으로 확대한 것과 다름없습니다.\n\n대법원은 전두환 군부 조치를 '폭동'으로 판단했습니다.\n\n그리고 전 씨에게 내란죄, 군사반란죄 등으로 사형을 선고했습니다. \n\n\n\n이번 '12.3 사태' 때 국민이 국회를 둘러싸 보호하지 않았다면,\n\n국회 보좌진과 당직자들이 몸을 던져 계엄군을 막지 않았다면\n\n무슨 일이 벌어졌을까요?\n\n의원들을 붙잡아 가서 정족수를 채우지 못하는 바람에\n\n계엄 해제 결의안을 의결하지 못했을 수도 있습니다.\n\n\n\n어디서 많이 본 이야기 아닙니까?\n\n2017년 3월 만들어졌던 '전시 계엄 및 합수업무 수행 방안'과\n\n똑 닮았습니다.\n\n이 방안은 박근혜 탄핵 심판 즈음 \n\n국군기무사령부가 만들었습니다.\n\n계엄 해제 표결을 막기 위해 국회의원들을 현행범으로 체포해,\n\n정족수를 미달시키는 계획 등을 담고 있습니다.\n\n\n\n헌법을 우습게 보는 이런 자들에게\n\n무력이 집중된 부처인 국방부를 맡겨놓았다니 끔찍합니다.\n\n이 포고령을 계획하고 실행한 자들, \n\n이를 막지 않은 자들도, \n\n싹 잡아 벌해야 합니다.\n\n\n\n국회가 재빨리 계엄 해제를 의결하지 않았다면,\n\n폭군이 다스리는 무법 통치 시대로 돌아갈 뻔했습니다.\n\n\n\n지금 국무위원 사퇴쇼나 하고 있을 때가 아닙니다.\n\n쇼는 그만하고, 사퇴서를 공개하고, 아예 귀가하십시오.\n\n한덕수 총리, 당신이 가장 먼저 사퇴해야합니다.\n\n\n\n윤석열 대통령은 \n\n아무 일도 하지 말고, 탄핵 소추를 기다리십시오.\n\n그게 그나마 국민께 죄를 덜 짓는 일입니다.\n\n\n\n국민의힘에도 경고합니다.\n\n대통령 탄핵소추 반대를 당론으로 채택했다고 들었습니다.\n\n귀하들, \n\n윤석열 대통령의 내란과 군사반란에 동조를 넘어\n\n공범이 되는 것을 결정한 것입니다. \n\n\n\n감사합니다.\n\n"}, {"id": 278, "filename": "2기 제47차 최고.txt", "title": "2기 제47차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["내란", "5.18", "민생", "윤석열"], "preview": "-24.12.9.(월) 09:30 본관 당회의실(224호)     ■ 조국 당대표     안녕하십니까. 조국혁신당 대표 조국입니다.  내란 및 군사반란죄 피의자 윤석열 씨와 그 일당이  정치 생명 연장을 꾀하고 있습니다.  권한 이행이라니, 조기 퇴진이라니  잔꾀를 내고 있지만, 불가능합니다.     세 가지 이유 때문입니다.  첫 번째, 윤석열은 국민 신뢰를 잃었습니다.  정상적인 인지, 사고 능력을 잃었다고 보입니다.  윤 씨는 모든 일을 ...", "content": "-24.12.9.(월) 09:30 본관 당회의실(224호)\n\n \n\n■ 조국 당대표\n\n \n\n안녕하십니까. 조국혁신당 대표 조국입니다.\n\n내란 및 군사반란죄 피의자 윤석열 씨와 그 일당이\n\n정치 생명 연장을 꾀하고 있습니다.\n\n권한 이행이라니, 조기 퇴진이라니\n\n잔꾀를 내고 있지만, 불가능합니다.\n\n \n\n세 가지 이유 때문입니다.\n\n첫 번째, 윤석열은 국민 신뢰를 잃었습니다.\n\n정상적인 인지, 사고 능력을 잃었다고 보입니다.\n\n윤 씨는 모든 일을 당에 일임하겠다고 해놓고,\n\n인사 결재는 하고 있습니다.\n\n \n\n전쟁 개시, 계엄을 결정할 권한도 여전히 갖고 있습니다.\n\n매우 위험한 자입니다.\n\n이런 사람과 협의해봤자, 제대로 된 결론이 나올 리가 없습니다.\n\n윤석열이, 자신이 했다는 약속을 지킬지도 알 수 없습니다.\n\n국민의 신뢰를 잃은 윤석열의 국정 지지율은 6-7일 한국갤럽 여론조사에서 11%로 나왔습니다. 조만간 한 자릿수로 떨어질 것입니다.\n\n \n\n두 번째, 야당의 의지는 더 강해지고, 결속도 단단해지고 있습니다. 야당은 토요일마다 국회에서 탄핵 소추안 처리를 시도할 것입니다. 윤석열을 끌어내리기 위한 야당의 협력은 톱니바퀴처럼 잘 돌고 있습니다.\n\n \n\n반면 여당은 지리멸렬, 분열하고 있습니다.\n\n어제 한동훈·한덕수의 2차 친위 쿠데타 시도가 있었습니다.\n\n둘이서 대통령 권한을 대신 휘두르겠다는 것입니다.\n\n이에 여당 내에서도 별의별 주장이 나왔습니다.\n\n“무슨 권리로 나서느냐? 대통령 놀음이다, 권력 찬탈이다.”\n\n이런 반응이 나왔습니다.\n\n \n\n첫 탄핵 소추안 처리에는 여당 의원 세 분이 동참했습니다.\n\n횟수가 거듭할수록 동참하는 의원들은 늘 것입니다.\n\n \n\n세 번째, 제일 중요합니다.\n\n깨어있는 시민이 조직되고 있습니다.\n\n어제 정치권이 관여하지 않은 시위가 국회 앞에서 열렸습니다.\n\n노조나 정당원이 아닌 시민들이 삼삼오오 참여했습니다.\n\n윤석열이 노상 욕하는 반국가 세력이 아닙니다.\n\n20-30대 발랄한 청춘, 유모차를 미는 젊은 부부,\n\n자제들 손을 잡은 부모님 등 다양했습니다.\n\n \n\n아이돌 응원봉을 들고 즐겁게 축제하듯 시위했습니다.\n\n로제의 노래 ‘아파트’ 등 K팝에 맞춰 율동했습니다.\n\n캐럴 가사를 바꾼 ‘탄핵이 답이다’를 불렀습니다.\n\n“윤석열 탄핵해야 메리 크리스마스”\n\n“김건희 벌 받아야 메리 크리스마스”\n\n라고 노래했습니다.\n\n \n\n5월 광주가 재현되었습니다.\n\n44년 전 우리 어머니들은 주먹밥과 물을 나눠주셨습니다.\n\n올해 시민들은 국회 인근 카페와 밥집에서 선결제를 해놓으셨습니다. 시위 참여자 누구든 목마르거나 배곯지 않도록 하고 계십니다.\n\n \n\n무료 위생용품과 핫팩이 쌓여 있는 \n\n지하철 국회의사당역 여성 화장실 사진이 돌고 있습니다.\n\n‘누구든 가져가시라, 반드시 이기자’라는\n\n시민들의 결기가 느껴졌습니다.\n\n \n\n마냥 축제 분위기만도 아니었습니다.\n\n무대에 오른 국민은 자유발언에서 사자후를 토해냈습니다.\n\n19살 시민은 이렇게 말했습니다.\n\n“사랑하는 사람이 있는 사람들이 이곳에 온 것 같다,\n\n사랑하는 사람을 지키기 위해 윤석열을 탄핵해야 한다.”\n\n우리 국민은 이미 이겼습니다.\n\n \n\n그런데도, 국민의힘은 내란과 군사반란죄 동조자 역할을 수행하고 있습니다. 건국의 아버지로 떠받들던 이승만의 뒤를 따라가는 중입니다.\n\n \n\n질서있는 퇴진, 국가 신인도 유지, 경제 민생 챙기기,\n\n튼튼한 안보와 외교 등\n\n당신들이 주장하는 헌정질서 유지의 조건은 \n\n딱 하나로 수렴됩니다.\n\n그것은 바로 윤석열 탄핵입니다.\n\n윤석열이 탄핵되면 모든 리스크는 없어집니다.\n\n \n\n한강 작가는 스웨덴 한림원에서 노벨상 수상 강연을 했습니다.\n\n그중 한 내용을 소개합니다.\n\n“인간은 어떻게 이토록 폭력적인가?\n\n동시에 인간은 어떻게 그토록 \n\n압도적인 폭력의 반대편에 설 수 있는가?”\n\n \n\n쿠데타 세력과, 그에 맞서는 국민의 모습입니다.\n\n이제 국민의힘도 폭력의 반대편에 서야 합니다.\n\n내란 및 군사반란죄 피의자 윤석열 탄핵에 동참하십시오.\n\n그것이 보수가 사는 길입니다.  \n\n \n\n감사합니다."}, {"id": 279, "filename": "2기 제5차 최고.txt", "title": "2기 제5차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["민생", "윤석열", "부동산"], "preview": "-2024. 7. 29.(월)  국회 본관 316호     ■ 조국 당대표    윤석열 대통령은 국정에 관심이 없을 테니,  한덕수 총리, 최상목 기획재정부 장관에게 묻습니다.  요즘 밤에 잠이 옵니까?     민생과 경제가 엉망입니다.  국민의 한숨은 깊어가는데, 대책은 없습니다.     얼마 전 한국은행 발표가 있었습니다.  올해 2분기 실질 국내총생산 성장률이  그 전 분기보다 마이너스 0.2%였습니다.  분기 성장률이 마이너스인 것은  ...", "content": "-2024. 7. 29.(월)  국회 본관 316호\n\n \n\n■ 조국 당대표\n\n\n\n윤석열 대통령은 국정에 관심이 없을 테니,\n\n한덕수 총리, 최상목 기획재정부 장관에게 묻습니다.\n\n요즘 밤에 잠이 옵니까?\n\n \n\n민생과 경제가 엉망입니다.\n\n국민의 한숨은 깊어가는데, 대책은 없습니다.\n\n \n\n얼마 전 한국은행 발표가 있었습니다.\n\n올해 2분기 실질 국내총생산 성장률이\n\n그 전 분기보다 마이너스 0.2%였습니다.\n\n분기 성장률이 마이너스인 것은\n\n코로나19 영향을 받던 2022년 4분기 이후 처음입니다.\n\n \n\n나라 살림살이는 더 심각합니다.\n\n적자투성입니다.\n\n지난 5월까지 정부의 실질적 재정 상태를 나타내는\n\n‘관리재정수지’가 74조 4천억 적자를 기록했습니다.\n\n \n\n5월 기준으로, 코로나19가 발생한 2020년 이후 최대치입니다.\n\n \n\n지난해 56조 원이라는\n\n역대 최대 세수 펑크가 났는데,\n\n올해에는 어떨지 걱정이 앞섭니다.\n\n \n\n이렇게 나빠질 이유가 뭡니까?\n\n달라진 것은 딱 한 가지, 윤석열 정권이 들어선 겁니다.\n\n윤석열 정권은 대한민국에 코로나보다\n\n더 큰 해를 끼치고 있습니다.\n\n이런데도 윤석열 정권은\n\n부자 세금 깎아주기에 혈안이 돼 있습니다.\n\n \n\n지난 3월 19일 윤 대통령은 이런 말을 했습니다.\n\n“왜 부자들에게 면세해주느냐?\n\n그 이익은 어려운 사람들이 다 보게 돼 있다”.\n\n \n\n‘무지한 사람이 신념을 가질 때 제일 문제’라는\n\n말이 떠오릅니다.\n\n \n\n며칠 전 정부가 세법 개정안을 발표했습니다.\n\n중산층의 상속세 부담을 줄인다는 명분을 댔습니다.\n\n \n\n상속세는 지금까지\n\n과세표준이 30억 원 넘으면 50%가 최고세율입니다.\n\n정부는 이 구간을 없앱니다.\n\n대신 과세표준 10억 원 초과 시\n\n최고세율 40%를 적용토록 했습니다.\n\n \n\n결과적으로 최고세율을 50%에서 40%로 내린 것입니다.\n\n \n\n최저세율 적용 구간은 2억원 이하로 올리고,\n\n자녀공제 금액은 5천만원에서 5억원으로\n\n10배나 확대됩니다.\n\n \n\n이 혜택은 전 국민이 아니라, 극소수가 봅니다.\n\n지난해 최고세율이 적용된 피상속인은 2,172명입니다.\n\n전체 피상속인의 0.1%입니다.\n\n인구의 0.004% 아니면 0.005%입니다.\n\n말 그대로 ‘초부자를 위한 감세’입니다.\n\n이래 놓고 중산층을 위한 감세라고\n\n대국민 사기를 칩니다.\n\n \n\n두 자녀를 둔 부모가 17억짜리 아파트를 물려줬을 때\n\n상속세는 얼마일까요? ‘0원’입니다.\n\n \n\n자녀 1인당 각 5억씩 공제 10억,\n\n배우자 공제 5억,\n\n기본공제 2억으로\n\n총 17억을 공제받게 됩니다.\n\n17억 짜리 아파트를 물려받고 내야 하는 상속세는 없습니다.\n\n \n\n세후 연봉 5천만원인 두 젊은이가\n\n17년 동안 한 푼도 쓰지 않고 벌어야 할 금액을\n\n땀 한 방울 흘리지 않고도 벌게 해주는,\n\n그야말로 부의 대물림을 더 쉽게 해준 것입니다.\n\n \n\n상속세는 애초부터 부자가 내는 세금입니다.\n\n지난해 상속세 과세 대상은 1만 9,944명입니다.\n\n상속받은 모든 사람 중 6.5%에 불과합니다.\n\n \n\n윤석열 정권은 이런 부자들 세금은 악착같이 깎아줍니다.\n\n그로 인해 줄어드는 세수를 메꿀 방안은 내놓지 않습니다.\n\n결국, 일해서 돈 번 사람들을 쥐어짤 수밖에 없습니다.\n\n지난해 전체 세수에서\n\n직장인이 내는 근로소득세 비중을 아십니까?\n\n17.2%로, 2013년 이후 가장 높았습니다.\n\n \n\n‘작은 정부’를 추구한다고요?\n\n서민 약탈, 국민 착취, 가렴주구 정부입니다.\n\n \n\n윤석열·김건희 부부가\n\n대통령직을 얼마나 알뜰하게 써먹는지 알 수 있습니다.\n\n대통령이 돼서 상속세를 확 깎아줍니다.\n\n \n\n추후 장모 유산을 김건희 씨가 상속받을 때\n\n세금이 대폭 줄겠지요.\n\n장모는 부동산 자산만 수백 억원대를 갖고 있다죠.\n\n세금 정책은 다름 아닌\n\n윤석열·김건희 부부의 이익을 위해\n\n설정되고 있는 것입니다.\n\n \n\n조국혁신당은 국회에서\n\n이번 세금 개편안 문제점을 파헤치겠습니다.\n\n \n\n김건희·윤석열 공동정권이,\n\n나라 곳간을 비우면서\n\n자기 부부와 부자 배만 불리지 못하도록 막겠습니다.\n\n \n\n다른 야당의 관심과 동참을 촉구합니다."}, {"id": 280, "filename": "2기 제6차 최고.txt", "title": "2기 제6차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["민생", "윤석열", "부동산"], "preview": "2024. 7. 31 9:30 본청316    ■ 조국 당대표  지금 대한민국이 ‘지역 소멸’ 위기에 처해 있음은   모두가 인정하고 있습니다.  사람과 자본을 수도권이 모두 빨아들이면서   지역은 비어가고 있습니다.  감사하게 지역을 지키며 열심히 사시는 분들의 삶은   팍팍해지고 있습니다.    그런데 윤석열 정부는   다양한 방식으로 지역을 죽이고 있습니다.  도와주기는커녕 빼앗으려고만 합니다.  있는 사람도 내쫓을 판입니다.   가히 ‘...", "content": "2024. 7. 31 9:30 본청316\n\n\n\n■ 조국 당대표\n\n지금 대한민국이 ‘지역 소멸’ 위기에 처해 있음은 \n\n모두가 인정하고 있습니다.\n\n사람과 자본을 수도권이 모두 빨아들이면서 \n\n지역은 비어가고 있습니다.\n\n감사하게 지역을 지키며 열심히 사시는 분들의 삶은 \n\n팍팍해지고 있습니다.\n\n\n\n그런데 윤석열 정부는 \n\n다양한 방식으로 지역을 죽이고 있습니다.\n\n도와주기는커녕 빼앗으려고만 합니다.\n\n있는 사람도 내쫓을 판입니다. \n\n가히 ‘지역 파괴왕’입니다.\n\n\n\n대표적인 게 ‘종합부동산세’입니다.\n\n이 세금은 모두 ‘부동산 교부세’라는 이름으로 지역에 갑니다.\n\n이게 줄거나 끊기면, 지역 살림은 대단히 힘들어집니다.\n\n\n\n그런데 이 정부는 어떻게든 종부세를 없애려고 안간힘을 씁니다.\n\n정부와 보수언론은 종부세 때문에 \n\n중산층 허리가 휜다고 합니다.\n\n\n\n새빨간 거짓말입니다. \n\n종부세 내는 사람은 극소수입니다.\n\n\n\n주택의 경우 2022년 여야 합의로, \n\n종부세 공제액을 일반 6억 원에서 9억 원으로,\n\n1가구 1주택은 11억 원에서 12억 원으로 올렸습니다.\n\n이게 ‘실거래가’가 아니라 ‘공시가격’입니다.\n\n\n\n공시가격, 세율, 공정시장가액 비율을 대폭 낮춰\n\n부담을 지는 사람 수가 줄었습니다.\n\n2022년에는 119만 5천 명이 종부세를 냈지만,\n\n지난해 40만 8천 명에 그쳤습니다.\n\n전 국민의 상위 0.8%, \n\n주택 보유자 중 2.7%에 불과합니다.\n\n\n\n이들이 수백만, 수천만 원씩 세금을 냈을까요?\n\n아닙니다.
