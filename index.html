해 유도되고\n\n조작된 사건일 가능성도 배제할 수 없다”라고 말했다고 합니다.\n\n \n\n이 사실을 공개한 김진표 전 국회의장에 대해 “왜곡했다”라고 하는데,\n\n자신 있으면 검찰이 좋아하는 양자 대질을 하면 어떨까요.\n\n \n\n이명박 정부에서 보건복지부 장관을 지낸 진수희 전 의원은\n\n이렇게 말했습니다.\n\n‘이태원 참사 뒤 국민의힘 정책연구소인 여의도연구원이\n\n이상민 행안부 장관 경질을 건의하는 보고서를 대통령실에 올렸으나,\n\n대통령이 “어떤 엑스엑스가 이걸 올렸어”라고 격노하고,\n\n그 직후 여의도연구원장이 잘렸다.’\n\n국민 여러분, 김진표 전 국회의장, 진수희 전 장관 두 사람의 말과 대통령실 해명 중, 어느 쪽이 더 믿깁니까?\n\n \n\n대통령실이 제대로 설명하지 못한 일이 한두 가지가 아니지만,\n\n이 사건에서는 특히 위험한 징표가 드러났습니다.\n\n‘국정농단’이 진행되고 있다는 징후입니다.\n\n \n\n박근혜 정권 당시 해괴한 비공식 라인이\n\n엉뚱한 정보와 조언을 주면서,\n\n국정 운영에 개입하는 바람에 국정이 엉망이 되지 않았습니까.\n\n그게 국정 농단의 시작이었습니다.\n\n \n\n현재 이 나라를 운영하는 근본이 ‘헌법’이 아니라,\n\n‘술법’(術法)과 ‘술판’이라는 말이 돌고 있습니다.\n\n현재 대통령에게 정체불명 비선의 비공식 보고서가 올라가고 있고,\n\n대통령이 극우 유튜버들과 직간접적으로 접촉하거나\n\n이들의 주장에 의존하고 있다면\n\n중대하고 심각한 사안입니다.\n\n \n\n윤석열 대통령은 더는 참모 뒤에서 숨지 말고 직접 나서십시오.\n\n누가 어떤 정보를 줬기에 ‘특정 세력’ 운운하며\n\n음모론을 이야기했는지 국민 앞에서 밝히십시오.\n\n \n\n◎ 국회 홈페이지에는 ‘국민동의청원’이라는 게시판이 있습니다.\n\n국민이 바라는 바를 이곳에 올릴 수 있습니다.\n\n5만 명이 동의하면 해당 청원은 해당 상임위로 회부됩니다.\n\n \n\n과거 청와대에 국민청원 게시판이 민심의 광장 역할을 했습니다.\n\n이곳을 통해 많은 국민적 의제가 각광을 받고,\n\n법과 제도에 반영된 바 있습니다.\n\n \n\n윤석열 정부 들어 이 게시판은 폐쇄되었고,\n\n대통령실은 문턱을 한참 높인 청원 게시판을 운영합니다.\n\n어떤 의제를 놓고 토론할지도 사실상 대통령실이 정합니다.\n\n \n\n한순간에 ‘디지털 신문고’를 빼앗긴 국민은 대안을 찾아 나섰고,\n\n국회 국민동의청원 게시판이 그 역할을 하고 있습니다.\n\n \n\n최근 이 게시판에 접속자가 폭주해 들어가기도 쉽지 않다고 합니다.\n\n해당 게시판을 보려면 몇 십 분을 기다려야 할 정도입니다.\n\n윤석열 대통령과 관련된 청원 때문일 것입니다.\n\n \n\n청원은 상임위 회부 요건인 5만 명 동의를 이미 넘겨\n\n법사위원회로 넘어갔습니다.\n\n청원은 공개 이후 30일 이내에는 계속 동의할 수 있는데,\n\n조금전 현재 동의 수가 거의 팔십만 명을 육박했습니다.\n\n동의하는 국민은 지금도 늘고 있습니다. 이게 민심입니다.\n\n \n\n1986년 DJ와 YS, 양김이 이끄는 신한민주당이 주도했던\n\n‘대통령 직선제 개헌을 위한 1천만명 서명 운동’이 떠오릅니다.\n\n이 운동은 군사독재정권 종식의 시발점이었습니다.\n\n \n\n혁신당은 이 상황을 예의주시하면서 민심의 흐름을 살피고\n\n모든 정치적, 법적 준비를 하고 있습니다.\n"}, {"id": 220, "filename": "제17차 최고.txt", "title": "제17차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["최고위", "민생", "윤석열"], "preview": "- 2024. 7. 3.(수) 09:30 본관 316호    ■조국 당대표     ⌾ 윤석열 정권 집권 이후 방송통신위원회에 새로운 전통이 생겼습니다. 바로 ‘탄핵 도주’입니다. 이동관 씨에 이어 김홍일 씨도 어제 ‘탄핵 도주’를 했습니다.     지난 총선 때 이종섭 전 국방부 장관이 몰래 호주대사로 가면서 ‘도주 대사’라는 말을 들었는데, 이제는 ‘탄핵 도주’라는 신조어가 생길 판입니다.     윤석열 대통령은 “언론 장악 방법을 안다”라고...", "content": "- 2024. 7. 3.(수) 09:30 본관 316호\n\n\n\n■조국 당대표\n\n \n\n⌾ 윤석열 정권 집권 이후 방송통신위원회에 새로운 전통이 생겼습니다. 바로 ‘탄핵 도주’입니다. 이동관 씨에 이어 김홍일 씨도 어제 ‘탄핵 도주’를 했습니다.\n\n \n\n지난 총선 때 이종섭 전 국방부 장관이 몰래 호주대사로 가면서 ‘도주 대사’라는 말을 들었는데, 이제는 ‘탄핵 도주’라는 신조어가 생길 판입니다.\n\n \n\n윤석열 대통령은 “언론 장악 방법을 안다”라고 말했었는데, 김홍일 씨가 바로 그 집행자였습니다.\n\n \n\n그는 방통위원장 자리를 이용해 온갖 위법행위로 언론 장악을 시도해왔습니다. YTN, KBS에 이어 MBC를 장악하기 위한 공영방송 이사진 선임 계획을 심의 의결하고\n\n사퇴했습니다.\n\n \n\n자신에 대한 탄핵소추안 국회 본회의 보고를 불과 몇 시간 앞두고 황급히 퇴임했습니다. 윤석열 대통령은 면직안을 기다렸다는 듯 재가했습니다.\n\n국회에 부여된 헌법적 권리인 탄핵 절차를 방해하고 공영방송 장악 시도를 지속하기 위한 ‘꼼수’입니다. 그렇게 검사 출신 선후배가 손을 잡고 법을 피해 ‘탄핵 도주’를 시행했습니다.\n\n \n\n앞서 방통위원장이 되었던 이동관 씨도 KBS 사장에 박민 씨를 앉히고 탄핵안이 통과되려고 하자 취임 98일 만에 도주하듯 사퇴했습니다.\n\n \n\n앞으로 윤석열 대통령이 이동관 씨나 김홍일 씨와 같은 언론장악 기술자를 방통위원장에 앉힌다면 또 탄핵안이 국회에 제출될 것이라는 점을 분명히 경고합니다.\n\n \n\n탄핵 발의 후 사임이나 해임을 금지하는 국회법 개정을 이뤄낼 것입니다.\n\n \n\n김홍일 씨처럼 도주도 못하고 탄핵 여론에 시달리는 사람이 있습니다. 윤석열 대통령입니다. 그는 국회 국민동의청원 게시판에 국민들이 직접 청원한 탄핵안에 갇혀 있습니다. 청원에 동의한 국민 수가 99만 5천명입니다. 100만 명에 육박했습니다. 동의 마감 때인 7월 20일까지 얼마나 더 많은 분들이 동의할지 모르겠습니다.\n\n \n\n7년 전 박근혜 정권 탄핵 정국은 광장의 촛불로 시작됐습니다. 지금 촛불집회 때보다 빠르게 온라인에 민심이 쌓여가는 형국입니다. 시중의 국민들이 ‘탄핵’이라는 단어를 아무 거리낌 없이 사용하고 있습니다.\n\n \n\n이를 두고 저를 비롯한 우리 혁신당에 언론 질문이 쇄도합니다. “100만명 넘으면 어떻게 할 것이냐, 탄핵 추진을 선도할 예정이냐”라고 묻습니다. 저는 이 질문을 받을 사람은 따로 있다고 봅니다. 바로 청원 대상자인 윤석열 대통령입니다.\n\n \n\n기자 여러분께 요청합니다. 윤석열 대통령을 취재해주십시오. “대통령 탄핵안에 동의하는 국민이 100만 명이 넘었다. 계속 늘고 있다. 윤 대통령 당신은 어떻게 할 것인가?” 이렇게 물어주십시오.\n\n \n\n그리고 답변을 받아 생생하게 국민께 전해주시길 바랍니다. 3년도, 석 달도, 3일도 길다는 국민이 먼저 시작한 청원입니다. 그러니 국민의 뜻을 받아 본인에게 물어봐야 하지 않겠습니까?\n\n \n\n윤 대통령에게 권고합니다. 자꾸 국민 입을 틀어막지 말고, 본인 입을 닫고 귀를 여십시오. 그리고 국정 난맥과 무능력에 대해 진솔하게 사과하십시오. 국정 기조를 바꾸겠다고 답하십시오. 국민이 듣고 싶어하는 말은 그것입니다. ‘소귀에 경 읽기’겠지만, 다시 한번 권해봅니다.\n\n \n\n⌾ 지금 정국은 꽉 막혀 있습니다. 어제 국회 대정부 질문 장면이 상징적입니다. 야당 의원 질의 한 대목 때문에 국회가 갑자기 멈춰 섰습니다. 두 원내교섭단체는 서로를 향해 적대감만 표시하며 기 싸움을 벌이고 있습니다.\n\n어느 한쪽도 물러서려고 하지 않습니다.\n\n \n\n호시절이라면 누가 뭐라고 하겠습니까. 그러나 지금 대한민국호는 풍랑 속에 길을 잃고 헤매고 있습니다. 경제는 횡보하고 민생은 더욱 힘들어지고 있습니다. 행정부와 입법부가 풀어야 할 숙제는 산적해 있지만, 대치 상태만 계속 됩니다.\n\n \n\n채 해병 특검법을 놓고도 대통령실은 아예 “거부권 행사를 건의하겠다”라고 공표했습니다. 이래서는 안 됩니다. 여야 극한의 대치를 풀어야 합니다. 조국혁신당이 물꼬를 트겠습니다.\n\n \n\n조국혁신당은 채 해병 특별검사 추천권을 양보하겠습니다. 제가 당 대표로서 밝히는데, 굳이 조국혁신당이 특검을 추천하지 않아도 좋습니다.\n\n \n\n현재 국회에 제출된 채 해병 특검법안에는 특별검사 추천권을 대통령이 소속되지 않은 교섭단체에서 1인, 비교섭단체에서 1인을 추천하도록 되어 있습니다.\n\n \n\n정부와 여당은 “야당만의 추천으로 이뤄지는 특검 임명 절차는 권력 분립 원칙에 어긋난다. 위헌 사항”이라고 주장합니다. 이를 거부권의 명분으로 삼습니다.\n\n \n\n과거 윤석열 검사가 국정농단 특검 수사에 합류했을 때에도 야당 추천으로 특검이 임명됐습니다. 거부권을 쓰려고 들이대는 트집에 불과합니다. 그렇지만 저희는 이렇게 특검 추천권을 양보하겠습니다.\n\n \n\n부디 채 해병 특검법안이 국회를 무사히 통과하고 대통령도 이를 재가해 특검이 임명되기를 간절하게 빕니다. 채 해병 특검법을 빨리 통과시키는 게 민심을 받드는 일입니다.\n\n \n\n무엇보다 채 해병 1주기인 19일 전까지 특검법이 통과돼야 합니다. 그게 국가를 위해 복무하다 숨진 채 해병 영전에 바치는 위로의 첫걸음일 것입니다.\n\n \n\n⌾ 오늘은 제가 당 대표로 주재하는 마지막 최고위원회의입니다. 저는 조국혁신당의 차기 당 대표직에 도전하기 위해 대표 자리에서 물러납니다.\n\n \n\n지난 3월 창당 대회에서 대표로 추대돼 숨 가쁘게 달려왔습니다. 국민만 바라보고 뛴 4개월이었습니다. 국민 여러분께 감사드립니다.\n\n \n\n취재하느라 수고하신 언론인 여러분께도 고맙다는 인사 말씀 드립니다. 다시 돌아오겠습니다. 감사합니다.\n\n "}, {"id": 221, "filename": "제2차 비대위.txt", "title": "제2차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["사법개혁", "윤석열", "내란", "교육", "검찰개혁", "비대위"], "preview": "2025. 9. 18. 09:30 -조국 조국혁신당 비상대책위원장 모두발언  “진심으로 진심을 얻겠습니다.”  조국혁신당은 정확한 사실관계 파악과  가해자에 대한 엄정한 징계만큼 중요한 것이  피해자의 상황과 고통에 대한  깊은 이해와 존중이라는 점을 직시하며,  문제를 풀어나가고 있습니다.  부족했던 점들에 대하여 피해자분들께 다시 한번 사과드립니다.   조국혁신당의 혁신방안을 말씀드리겠습니다.  윤리감찰단과 윤리심판원을 설치하겠습니다.  내...", "content": "2025. 9. 18. 09:30\n-조국 조국혁신당 비상대책위원장 모두발언\n\n“진심으로 진심을 얻겠습니다.”\n\n조국혁신당은 정확한 사실관계 파악과 \n가해자에 대한 엄정한 징계만큼 중요한 것이 \n피해자의 상황과 고통에 대한 \n깊은 이해와 존중이라는 점을 직시하며, \n문제를 풀어나가고 있습니다. \n부족했던 점들에 대하여 피해자분들께 다시 한번 사과드립니다. \n\n조국혁신당의 혁신방안을 말씀드리겠습니다. \n윤리감찰단과 윤리심판원을 설치하겠습니다. \n내부의 잘못을 드러내고 바로잡는 \n시스템을 갖추는 것이 신뢰 회복의 바탕입니다.\n\n윤리감찰단은 당내 공수처가 될 것입니다.\n폭넓은 사전 예방과 엄정한 사후 조치를 실행하는 감찰기구로 활동할 것입니다. \n당 내부의‘인지, 감시, 점검의 사각지대’를 없애겠습니다. \n그리고 윤리위원회를 윤리심판원으로 격상해서 \n독립성과 집행력을 강화하겠습니다. \n\n이와 함께 고충상담센터와 고충심의위원회를 설치해서 \n피해자 안전망을 촘촘하고 두텁게 구축하겠습니다.\n\n조국혁신당은 비대위 출범 첫날 발표한 대책들을 하나하나 실천하고 있습니다. \n오늘은 당직자 간담회와 서울시당 당원 간담회를 진행합니다. \n다른 지역 당원 간담회도 준비중입니다.\n내일은 저를 비롯해 비대위원들과 \n당 소속 국회의원, 당직자 전원을 대상으로 \n직장 내 괴롭힘 및 성희롱·성폭행 예방 교육을 실시합니다. \n‘피해 예방, 인권 존중, 평등 문화, 신뢰 회복’의 네 기둥을 튼튼히 세우는 일입니다. \n\n새로운 당헌 당규 개정안도 곧 마련될 예정입니다. \n이번 사태에서 배운 뼈아픈 교훈을 제도화하는 것입니다. \n\n저와 비대위는 조국혁신당을 \n주춧돌부터 기둥, 서까래, 지붕까지 확실히 고쳐나가겠습니다.\n\n한편, 조희대 대법원장을 다시 언급하지 않을 수 없습니다. \n어제 오후, 묵묵부답이던 조희대 대법원장이 입장을 밝히겠다고 예고했습니다. \n그러나 기자들의 질문에 답하지 않았습니다. \n대법원 공보를 통해 문서 한 장을 흘리고는 퇴근했습니다. \n무너진 사법부 신뢰를 회복하는 길보다 퇴근길이 더 중요했던 모양입니다.\n국민의 법의식과 동떨어진 엘리트의 오만을 재확인했습니다.\n\n다시 묻습니다. \n사법부의 수장으로 \n왜 윤석열의 내란에 침묵했습니까.\n왜 이런 행위는 헌정파괴범죄라고 꾸짖지 않았습니까.\n윤석열의 내란이 성공할 것을 기대했던 것은 아닙니까.\n왜 급작스러운 전원합의체 판결로 대선에 개입하려 했습니까.\n이재명 후보의 당선을 막기 위한 것 외 어떤 이유가 있습니까.\n말해야 할 때는 침묵했습니다.\n개입하지 말아야 할 때는 개입했습니다.\n\n검찰개혁은 사법개혁으로 이어져야 합니다.\n법조 엘리트의 사법 지배를 보장하는 것이 사법부 독립은 아닙니다.\n조국혁신당은 검찰개혁의 쇄빙선 역할을 한 것처럼, \n사법개혁의 망치선이 되겠습니다.\n내란에 침묵하고, 내란 수괴를 풀어주고, 대선에 개입했던, \n그 희대의 사법부의 진상을 철저하게 파헤치겠습니다. \n그리고 국민이 원하는 전면적인 개혁에 나서겠습니다.  /끝/"}, {"id": 222, "filename": "제3차 비대위.txt", "title": "제3차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["사법개혁", "민생", "내란", "개헌", "비대위"], "preview": "2025.9.22.09:30 비대위 모두발언 조국혁신당 비상대책위원장 조국  극우본당 국민의힘이 민생 위기 속에 대구에서 극우 부흥회를 열었습니다.  ‘스탑 더 스틸’과 ‘윤어게인’ 깃발이 펄럭였습니다.   ‘이재명 독재’, ‘인민 독재’ 운운하는 극단적 발언이 가득했습니다.   민주주의 사회에서 볼 수 있는 정상적인 정당 집회가 아니었습니다.  국민의힘은 더 이상 정상적 보수가 아닙니다. 국민의힘의 실질적 주인은 따로 있습니다.  무속신앙, ...", "content": "2025.9.22.09:30 비대위 모두발언\n조국혁신당 비상대책위원장 조국\n\n극우본당 국민의힘이 민생 위기 속에 대구에서 극우 부흥회를 열었습니다. \n‘스탑 더 스틸’과 ‘윤어게인’ 깃발이 펄럭였습니다.  \n‘이재명 독재’, ‘인민 독재’ 운운하는 극단적 발언이 가득했습니다.  \n민주주의 사회에서 볼 수 있는 정상적인 정당 집회가 아니었습니다.\n\n국민의힘은 더 이상 정상적 보수가 아닙니다.\n국민의힘의 실질적 주인은 따로 있습니다. \n무속신앙, 신천지, 통일교, 극우 개신교 등은 교리도 다르고 상호 배타적 집단들입니다. \n그런데 이들이 국민의힘의 극우 깃발 아래 하나로 뭉쳤습니다.\n기괴하고 위험합니다. \n\n국민의힘이 이런 장외집회를 대구에서 연 것은\n대구 시민에 대한 모독입니다.\n대구는 극우의 소굴이 될 수 없습니다. \n분노한 대구 시민들이 독하게 마음먹고 전례 없는 심판에 나설 것입니다. \n대구 시민들이 거대한 정치 변화의 기점이 될 것으로 확신합니다. \n\n국민의힘과 극우세력은 앞으로 민주주의를 집어삼키는 일을 서슴지 않을 것입니다. \n조국혁신당은 내란 세력 제로, 극우 제로, 불평등 제로라는 \n‘쓰리 제로’ 전략을 일관되게 추진할 것입니다.\n\n이에 저는 개혁 5당에 ‘내란 청산과 극우 소멸을 위한 국회 3대 특위’를 제안합니다.\n\n첫째, 개헌특위를 출발시켜야 합니다. \n내란 종식 이후 새로운 대한민국을 위한 헌법이 필요합니다. \n민주와 민생의 가치를 더 확고히하는 헌법이 필요합니다.\n둘째, 사법개혁특위도 미룰 수 없습니다. \n조희대 대법원장과 지귀연 판사 같은 법관이 판결을 쥐락펴락해서는 안 됩니다. \n‘희대의 사법부’ 개혁해야 합니다.\n셋째, 정치개혁특위를 통해 선거제도를 개혁해야 합니다.\n그래서 국민의힘을 정치의 주변으로 몰아내고, \n국민의 다양한 목소리를 정치에 반영시켜야 합니다.\n\n국회 3대 특위가 가능하면 빠른 시간에 만들어지길 희망합니다.\n민주주의 방벽을 탄탄하게 구축하고, \n이재명 대통령의 국정운영을 뒷받침하는 중대 과제입니다. \n특위 구성은 국회의원 의석 비율을 반영해서 \n조국혁신당을 비롯한 개혁 야당들이 함께 참여해야 합니다. \n내란 청산과 극우 소멸을 위해 개혁 5당의 힘을 결집해 나가겠습니다. \n\n최근 현안 관련하여 기자분들에게 당부 드리고 싶은 것이 있습니다.  \n사실과 다른 허위 보도, 흥미 위주의 가십 보도로 \n최근 사건 피해자분들에 대한 2차 가해를 증폭시키지 마십시오. \n언론이 쏘는 독화살이 어떤 것인지 누구보다 잘 아는, \n개인 조국으로서도 간절히 호소합니다.\n\n가짜뉴스, 즉 허위조작정보로 경제적 이득을 취하는 유튜버들에게도 경고합니다.\n일부 유튜브 채널이 허위조작정보를 무차별적으로 생산하고 있습니다. \n또한 이를 정략적 목적으로 유통하고 재생산하는 채널들도 발견됩니다.\n피해자들의 고통을 심화함은 물론,\n조국혁신당 공동체의 회복을 가로막고 있습니다.\n그냥 넘어가지 않겠습니다. \n팩트체크로 사실을 바로 잡는 동시에 강력한 법적 조치에 나설 것입니다.  "}, {"id": 223, "filename": "제4차 비대위.txt", "title": "제4차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "사법개혁", "비대위", "윤석열"], "preview": "제4차 비상대책위원회 모두발언 - 2025.09.25.조국 비상대책위원장  ◎ 전국의 법관들에게 묻습니다.  ‘법복을 입은 시민’인 귀하들은, 내란을 막고 민주주의를 지키기 어떤 행동을 했습니까?   내란의 밤에 모든 시민은 민주시민으로서 역할을 다했습니다. ‘군복을 입은 시민’은 불법적 명령에 소극적으로 임하며 저항했습니다. ‘은박지를 두른 시민’은 추위를 견디며 밤을 새웠습니다.  ‘작업복을 입은 시민’은 일을 마치고 광장으로 달려왔습니다....", "content": "제4차 비상대책위원회 모두발언\n- 2025.09.25.조국 비상대책위원장\n\n◎ 전국의 법관들에게 묻습니다. \n‘법복을 입은 시민’인 귀하들은, 내란을 막고 민주주의를 지키기 어떤 행동을 했습니까? \n\n내란의 밤에 모든 시민은 민주시민으로서 역할을 다했습니다.\n‘군복을 입은 시민’은 불법적 명령에 소극적으로 임하며 저항했습니다.\n‘은박지를 두른 시민’은 추위를 견디며 밤을 새웠습니다. \n‘작업복을 입은 시민’은 일을 마치고 광장으로 달려왔습니다.\n‘넥타이를 맨 시민’은 선결제로 모두를 응원했습니다. \n\n그러나 내란의 밤에 ‘법복 입은 시민’만 침묵했습니다.\n12.3 계엄이 불법이라고 규탄한 법관은 아무도 없었습니다.\n법원 역사에 지울 수 없는 오점으로 남을 것입니다.\n\n오늘 전국법관대표회의가 대법관 증원 등 제도 개선 토론회를 개최합니다. \n최근 열린 전국법원장 회의에서는 사법부 독립을 내세우며, \n사법개혁 반대입장을 표명해 국민적 공분을 불러일으켰습니다.\n\n하지만 법관 대표들의 모임인 전국법관회의는 달라야 합니다. \n조희대 없는 대법원, 지귀연 없는 재판부를 만들겠다는 의지와 \n강력한 쇄신 방안을 국민 앞에 제시하십시오. \n\n지금이라도 사법개혁에 동참하십시오.  \n이것은 부탁이 아닙니다. \n주권자의 엄중한 명령입니다. \n사법부에 주어진 마지막 기회라는 점을 인식하기를 바랍니다. \n\n◎ 어제 김건희 씨가 피고인석에 앉았습니다. \n헌정사 최초로 전직 대통령 부부가 모두 형사재판을 받고 있습니다.\n권력을 사유화하며 국민을 배반한 죄값입니다.\n\n윤석열 김건희 부부의 피고인석 옆자리는 \n검찰권으로 두 부부의 죄를 덮어준 정치 검사들로 채워져야 합니다.\n\n만약 정치검찰의 검찰권 오남용이 없었다면, \n윤건희 공동정권도, 대한민국의 퇴행도, 12.3 내란도, 일어나지 않았을 것입니다.\n따라서 검찰권 오남용에 대한 철저한 진상조사가 필요합니다. \n이것이 진정한 검찰독재 종식과 내란 청산의 핵심 열쇠입니다.\n\n검찰권을 오남용해서 죄는 덮어주고, 없는 죄는 만들어 낸 범죄행위에 대해서 \n마땅한 책임을 묻는, 전면적인 인적 청산에 착수해야 합니다. \n동시에 공소취소 등으로 허위 조작 기소로 인한 피해 회복에 나서야 합니다. \n\n민주당에 제안합니다. \n우선 조국혁신당과 민주당이 검찰권 오남용 진상조사 및 피해 회복 TF를 구성합시다. \n민주당은 누구보다 검찰권 오남용의 피해를 뼈아프게 경험했습니다. \n가장 큰 피해자가 이재명 대통령입니다. 적극적인 응답을 기대합니다.  \n\n◎ 마지막으로 당의 공동체 회복 조치를 말씀드립니다. \n\n저는 오늘 비상대책위원장으로 성희롱, 성추행, 직장 내 괴롭힘 등 \n당내 인권 침해 사항에 대한 실태조사를 지시했습니다.\n\n중앙당, 시도당의 모든 당직자와 국회 보좌진이 대상입니다. \n성평등 및 인권 보호의 사각지대를 피하지 않고,  \n우리 스스로 발견해서 부족한 점을 개선하려는 노력입니다.\n\n특히 전수조사 결과를 토대로 ‘평등 문화 가이드라인’을 제정하려고 합니다. \n조국혁신당 조직문화에 성평등·상호존중·차별금지 원칙을 확고하게 심겠습니다.\n정당들 가운데 가장 모범적이고 선도적인 평등한 내용으로 준비하겠습니다. \n\n조국혁신당의 변화를 지켜봐 주시길 부탁드립니다. 감사합니다.   /끝/"}, {"id": 224, "filename": "제4차 최고.txt", "title": "제4차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["개헌", "최고위", "민생", "윤석열"], "preview": "- 6월 3일(월) 09:30 / 국회 본관 로텐더홀  ■ 조국 당대표     오늘 조국혁신당의 첫 공식 최고위원회의입니다.  참으로 많은 생각이 듭니다.  국민 여러분과 당원동지 여러분께 다시 한번 감사드립니다.     조국혁신당이 창당의 기치를 내세운 게 불과 석달 전입니다.  당원 16만 명이 생겼습니다. 우리 모두 다 같은 가족입니다.  12석을 획득해 제3당이 됐습니다.     국민은, 특히 유권자 690만 명은 왜 혁신당을 지지했을까...", "content": "- 6월 3일(월) 09:30 / 국회 본관 로텐더홀\n\n■ 조국 당대표\n\n \n\n오늘 조국혁신당의 첫 공식 최고위원회의입니다.\n\n참으로 많은 생각이 듭니다.\n\n국민 여러분과 당원동지 여러분께 다시 한번 감사드립니다.\n\n \n\n조국혁신당이 창당의 기치를 내세운 게 불과 석달 전입니다.\n\n당원 16만 명이 생겼습니다. 우리 모두 다 같은 가족입니다.\n\n12석을 획득해 제3당이 됐습니다.\n\n \n\n국민은, 특히 유권자 690만 명은 왜 혁신당을 지지했을까요?\n\n우리 당은 이 물음을 출발지 삼아야 합니다.\n\n기항지(寄港地)에서도 늘 가슴에 품어야 합니다.\n\n마침내 답안지가 완성되면 도착지에서 국민께 제출해야 합니다.\n\n \n\n그러려면 우리가 했던 약속에서 벗어나서는 안 됩니다.\n\n‘국민의 막힌 가슴, 정체된 정국을 뚫는 쇄빙선,\n\n대한민국을 사회권 선진국, 제7공화국으로 끌고 갈 예인선,\n\n쇄빙선과 예인선이 되겠다’,\n\n그게 바로 조국혁신당의 약속이었습니다.\n\n \n\n우리 뜻에 공감하는 정당들과 공고하게 연대할 것입니다.\n\n그렇지만 거대한 선단의 항로를 추종하지만은 않을 것입니다.\n\n우리는 지금도 쇄빙선이고, 예인선이며\n\n앞으로도 쇄빙선이고, 예인선일 것입니다.\n\n우리는 자강(自强)할 것이고, 불식(不息)할 것입니다.\n\n \n\n왜 그래야 할까요?\n\n대단히 엄중한 시국이어서입니다. 구체적으로 윤석열 정권 때문입니다.\n\n이 정권은 극도로 무능하고, 치명적으로 부도덕합니다.\n\n국민의 삶을 지킬 의사와 능력이 없습니다.\n\n \n\n원래 문제가 생기면 원인을 캐고 방지책을 만들어야 합니다.\n\n그러나 이 정부는 그걸 방해합니다.\n\n대통령과 측근들은 국민을 지킬 생각은 않고\n\n오로지 자신들 방탄만 신경 씁니다.\n\n해병 특검법과 전세사기 피해 특별법처럼\n\n국민의 삶을 담은 법안에도 마구 거부권을 휘두릅니다.\n\n \n\n게다가 이 정권은 무능한데 더하여 뻔뻔하기까지 합니다.\n\n일본은 독도 등 영토는 물론,\n\n한국이 만든 기업 ‘라인’도 빼앗으려고 합니다.\n\n그런데 대한민국 대통령과 정부가 이에 맞서 싸우기는 커녕\n\n일본 편을 듭니다.\n\n \n\n그 결과 대한민국은 선진국을 목전에 두고 역주행하고 있습니다.\n\n결국 우리가 나서 싸워야 합니다.\n\n우리가 국민을 지켜야 합니다.\n\n \n\n비상한 시국입니다.\n\n원내외 투쟁에서 흐트러짐이 있어서 안 됩니다.\n\n국회 안에서 3국조와 3특검을 틀림없이 추진할 것입니다.\n\n윤석열 정권에게 뭔가를 기대하는 것은\n\n나무 위에서 물고기를 찾는 것과 같습니다.\n\n민생과 경제 활력의 마중물이 될 법안도 차질 없이 준비해주십시오.\n\n \n\n장외에서 정권을 상대로 벌이는 싸움에서도\n\n적극적으로 참여해야 합니다.\n\n우리 혁신당 전북특별자치도당은\n\n‘해병대원 특검 재발의 촉구 서명운동’을 벌이고 있습니다.\n\n그것에 더해 시민사회, 다른 야당과 대오를 맞춥시다.\n\n \n\n분명한 것은, 심판의 시간이 다가오고 있다는 점입니다.\n\n현 정권은 선거를 통해 심판을 받고도 아랑곳하지 않습니다.\n\n국정 기조 변화는 없이,\n\n맥주를 돌리고 고기를 굽습니다. 어퍼컷을 날립니다.\n\n \n\n국민의 인내는 한계치를 넘어서고 있습니다.\n\n국민으로부터 거부당할 일만 남았습니다.\n\n \n\n경고합니다.\n\n윤석열 대통령은 혹독한 겨울을 준비해야 할 것입니다. <끝>"}, {"id": 225, "filename": "제5차 최고.txt", "title": "제5차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "조국혁신당", "민생·경제", "외교·안보"], "tags": ["윤석열"], "preview": "-2024년 6월 5일(수) 국회 본관 로텐더홀  ■ 조국 당대표     그제 윤석열 대통령의 첫 국정 브리핑을 했습니다.  ‘무슨 이야기를 하나’ 하고 주의를 기울였습니다.  그런데, 얼토당토않은 브리핑을 합니다.  난데없이 ‘영일만 석유 매장 가능성’을 말합니다.     48년 전인 1976년 1월 15일 박정희 대통령이 “포항에서  양질의 석유가 발견됐다”라고 발표하던 그 장면이 떠올랐습니다.     당시 중앙정보부가 영일만에서 검은 기름...", "content": "-2024년 6월 5일(수) 국회 본관 로텐더홀\n\n■ 조국 당대표\n\n \n\n그제 윤석열 대통령의 첫 국정 브리핑을 했습니다.\n\n‘무슨 이야기를 하나’ 하고 주의를 기울였습니다.\n\n그런데, 얼토당토않은 브리핑을 합니다.\n\n난데없이 ‘영일만 석유 매장 가능성’을 말합니다.\n\n \n\n48년 전인 1976년 1월 15일 박정희 대통령이 “포항에서\n\n양질의 석유가 발견됐다”라고 발표하던 그 장면이 떠올랐습니다.\n\n \n\n당시 중앙정보부가 영일만에서 검은 기름이 나왔다고 보고합니다.\n\n검증도 안 된 내용을 박정희 대통령은 덜컥 발표합니다.\n\n누가 봐도 국면전환용이었습니다.\n\n알고 보니 당시 발견된 기름은 원유가 아닌 정유였습니다.\n\n결과적으로 대통령 주연의 대국민 사기극으로 끝났습니다.\n\n \n\n이명박 정부 때에도 조 단위의 수익이 난다고\n\n‘자원 외교’를 주장했지만, 결과는 처참한 수준입니다.\n\n2009년 석유공사가 인수한 캐나다 업체 하베스트에는\n\n7조 원 넘게 투자했으나 회수한 금액은 500억 원도 안 됩니다.\n\n \n\n윤석열 대통령이 이번에 브리핑한 석유 매장 가능성이\n\n높은지, 낮은지 아직 알 수 없습니다.\n\n대한민국 국민으로서 석유와 가스가 많이 매장되어 있기를 바랍니다.\n\n \n\n그러나 분명히 짚고 넘어가야 할 점이 있습니다.\n\n대통령의 직무 수행, 즉 브리핑 내용과 과정의 문제점입니다.\n\n \n\n‘매장이 확인돼 채굴한다, 몇 년 치 사용량이다, 경제성이 있다’는\n\n확정된 내용이 아니라 ‘가능성이 있다’는 것입니다.\n\n이 또한 대한민국 정부가 최종적으로 확인한 내용이 아니라,\n\n미국의 한 평가 업체가 내놓은 것입니다.\n\n석유 탐사 성공률은 20% 안팎입니다.\n\n \n\n대통령은 국정의 최고 책임자입니다.\n\n윤석열 대통령이 국정을 마지막까지 책임져야 합니다.\n\n \n\n그런데, 대한민국에 대한 책임감이라고는 있을 리가 없는\n\n외국 사기업 보고서를 믿고 대통령이 직접 발표를 했습니다.\n\n대한민국 정부와 전문가, 관련 기업은 다 어디 갔습니까?\n\n \n\n주무 부처인 산업부는 장관이 배석한 사실을\n\n브리핑 1시간 전에나 알았을 정도로 주먹구구식 브리핑입니다.\n\n문제 보고서에 대한 산업부 차원의 점검이 있었는지 의문스럽습니다.\n\n문제 보고서의 신뢰성은 추후 국회에서 따질 것입니다.\n\n \n\n이제 대통령이 발표해버렸으니,\n\n정부는 꼼짝없이 시추를 위해 돈을 쏟아부어야 합니다.\n\n자그마치 오천억 원이랍니다.\n\n국정을 이렇게 대충대충 운에 맡겨도 되는 것입니까?\n\n \n\n대통령실은 브리핑 시작 8분 전 언론에 일정을 공지했습니다.\n\n윤 대통령은 고작 4분 발표한 뒤 질문도 안 받고 떠납니다.\n\n \n\n저도 청와대 수석과 장관으로 일해보았지만,\n\n이런 엉터리 대통령비서실과 ‘아니면 말고’ 식 정부는 처음 봅니다.\n\n \n\n윤 대통령이야 늘 그런다고 칩시다. 별로 달라질 게 없어 보입니다.\n\n그런데 대통령실과 정부에서 연봉 1억 원 안팎을 받는\n\n고위공직자들은 도대체 무엇을 하고 있습니까?\n\n발표해놓고 잘 안되면, 또 없던 일로 할 것입니까?\n\n아니면 시추 작업을 정권 지지율 상승의 도구로 이용하려고\n\n일단 질러놓은 것입니까?\n\n \n\n워낙 황당하게 국정을 운영하니까 국민 신뢰는 바닥을 깁니다.\n\n오죽하면 대통령이 중요 발표를 할 때마다 네티즌들은\n\n‘천공’이라는 해괴한 자가 비슷한 말을 했는지 찾아보는 것 아닙니까.\n\n \n\n누가 봐도 아니면 말고 식 국정 전환 쇼를 할 게 아니라\n\n국민이 지금 진짜로 필요로 하는 게 뭔지 찾아 시행하십시오.\n\n만약 못 찾겠으면, 저에게 물어보십시오. 아주 소상히 가르쳐 드리겠습니다."}, {"id": 226, "filename": "제6차 비대위.txt", "title": "제6차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["트럼프", "관세", "윤석열", "한미동맹", "비대위"], "preview": "2025. 9. 29 09:30 제6차 비상대책위원회 - 조국 비상대책위원장 모두발언  <1> 우리 경제가 총체적 위기에 직면했습니다.  지난 7월 한미 양국은 큰 틀에서 무역 협상을 타결했습니다.  “바이오와 반도체는 최혜국 대우”를 받기로 합의했습니다.  그런데 미국 정부가 후속 조치를 협상하는 과정임에도  바이오와 반도체에 대한 100% 관세 폭탄 카드로 우리를 압박하고 있습니다.    이런 상황에서 트럼프 대통령은  “한국이 미국에 투자...", "content": "2025. 9. 29 09:30\n제6차 비상대책위원회\n- 조국 비상대책위원장 모두발언\n\n<1> 우리 경제가 총체적 위기에 직면했습니다. \n지난 7월 한미 양국은 큰 틀에서 무역 협상을 타결했습니다. \n“바이오와 반도체는 최혜국 대우”를 받기로 합의했습니다. \n그런데 미국 정부가 후속 조치를 협상하는 과정임에도 \n바이오와 반도체에 대한 100% 관세 폭탄 카드로 우리를 압박하고 있습니다.  \n\n이런 상황에서 트럼프 대통령은 \n“한국이 미국에 투자할 3,500억 달러는 \n선불(up front)”이라고 못까지 박았습니다. \n우리 돈으로 무려 약 500조 원입니다. \n\n3,500억 달러를 단기간에 미국에 보낼 경우 \n국내 외환시장에서 원/달러 환율 급등 사태가 발생할 것입니다. \n한국의 외환보유고도 바닥을 보이게 될 것입니다. \n\n국가 간의 투자는 상호호혜적이어야 합니다. \n자본과 기술을 투자하고, 이익을 공유하며, \n성장과 번영의 기회를 함께 만드는 것이 투자협정의 본질입니다. \n\n관세 폭탄과 3,500억 달러 선불 압박은, \n투자협정의 외피를 두른 ‘불평등조약’입니다. \n수탈과 예속을 강요하는 것입니다.\n한미 양국이 70여 년 동안 다져온 신뢰 기반을 뒤흔드는 행위입니다. \n\n지금 첩첩산중입니다. 그래도 어떻게든 돌파구를 찾아야 합니다. \n국회가 강력한 행동에 나설 때입니다. \n대한민국의 경제주권이 달린 문제입니다. \n국회가 정신 바짝 차리고 이재명 대통령에게 힘을 모아주어야 합니다.\n이 문제만큼은 여야가 따로 있을 수 없습니다. \n\n국민과 국익을 대표하는 국회가 \n‘대한민국에 대한 일방적 대미 투자 요구 즉각 철회’를 결의해야 합니다.\n또 대한민국 노동자들을 쇠사슬로 감은 야만적 조치에 대한  \n미국 정부의 공식 사과와 보완 대책도 요구해야 합니다. \n\n최근 개혁 5당이 이러한 요구를 담은 결의안을 국회에 제출했습니다. \n당장 본회의를 열어서 결의안을 통과시킵시다. \n그리고 그 결의안을 트럼프 대통령과 미국 정부에 보냅시다. \n이재명 대통령이 국회를 지렛대 삼아 \n당당하게 협상할 수 있도록 힘을 모아야 합니다.\n\n우려스러운 건, 국민의힘의 태도입니다. \n국민의힘 국회의원들은 결의안에 단 한 명도 서명하지 않았습니다. \n심지어 우리 국익을 파괴하려는 트럼프 대통령에게는 한 마디도 못하면서 \n국익을 지키기 위해 사력을 다하는 이재명 대통령만 비판하고 있습니다. \n정신 차리십시오. 귀하들은 대한민국의 국회의원입니다. \n\n<2> 주말에 국가정보자원관리원 화재가 발생했습니다.\n나라의 디지털 심장부가 마비되는 초유의 재난 사태입니다. \n국가 안보 측면에서도 치명적인 약점을 드러낸 심각한 상황입니다.\n밖으로는 한미 관세 후속 협의가 위기에 처해 있습니다. \n재난, 경제, 안보 앞에서는 초당적으로 협력해야 마땅합니다.\n \n그런데 국민의힘은 이 상황에서 장관 사퇴부터 주장하고 나섰습니다. \n2023년에 비슷한 사태가 발생했을 때, \n당시 윤석열 정부의 무능했던 대처를 국민 모두가 기억합니다. \n\n현 정부는 다릅니다. 이재명 대통령이 직접 나섰습니다. \n즉각적으로 대국민 사과까지 한 상황입니다.\n\n굳이 지난 이상민 장관 시절을 언급하지 않겠습니다. \n그 시기에 디지털 정부의 기초 체력이 모두 무너졌다는 점도 꺼내지 않겠습니다. \n지금은 네 탓이 아니라 문제해결이 먼저이기 때문입니다.\n\n이번 사태는 현 정부만의 문제가 아니라는 것을 직시해야 합니다. \n역대 정부의 안일함과 실책이 누적된 총체적 결과입니다. \n이제라도 소 잃고 외양간을 고치는 수준을 넘어, \n잃은 소도 되찾는 대혁신의 전환점으로 만들어야 합니다. \n\n조국혁신당은 실효적이고 종합적인 대책을 마련하도록 노력하겠습니다. \n클라우드 이중화 조치가 이뤄지지 않은 경위는 철저히 규명하겠습니다.\n곧 추석 명절입니다. 국민들이 불편함이 없도록 최선을 다하겠습니다.  /끝/"}, {"id": 227, "filename": "제6차 최고.txt", "title": "제6차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["민생", "윤석열", "부동산"], "preview": "- 2024. 6. 7.(금) 9:30 국회 본관 로텐더홀  ■ 조국 당대표  물가 오름세가 무섭습니다.  1만원 한 장으로 비빔밥 한 그릇도 못 사먹습니다.  4월 서울 지역 비빔밥 평균 가격은  만칠백육십구(10,769)원이라고 합니다.  냉면은 만구백원을(10,900)원이 넘었습니다.  칼국수, 김치찌개, 설렁탕을 만원으로  사먹을 수 있는 곳이 많지 않습니다.  떡볶이, 김밥도 사 오천원은 줘야 합니다.  윤 대통령이 좋아하는 소주 한 ...", "content": "- 2024. 6. 7.(금) 9:30 국회 본관 로텐더홀\n\n■ 조국 당대표\n\n물가 오름세가 무섭습니다.\n\n1만원 한 장으로 비빔밥 한 그릇도 못 사먹습니다.\n\n4월 서울 지역 비빔밥 평균 가격은\n\n만칠백육십구(10,769)원이라고 합니다.\n\n냉면은 만구백원을(10,900)원이 넘었습니다.\n\n칼국수, 김치찌개, 설렁탕을 만원으로\n\n사먹을 수 있는 곳이 많지 않습니다.\n\n떡볶이, 김밥도 사 오천원은 줘야 합니다.\n\n윤 대통령이 좋아하는 소주 한 병은 식당에서 오륙천원 입니다.\n\n지난달 외식 물가 상승률은 이쩜팔 퍼센트(2.8%)였습니다.\n\n소비자 물가 상승률 평균치 이쩜칠 퍼센트(2.7%)보다 높습니다.\n\n2분기 들어 가공식품과 외식 메뉴 가격이 줄줄이 올라\n\n먹거리 물가 상승 폭은 더 커질 수 있다고 합니다.\n\n지난 총선 기간 대파 가격 파동 기억나실 겁니다.\n\n그뒤 김, 사과, 배 가격이 폭등해 서민들 주름을 깊게 만들었습니다.\n\n대한민국에서 오르지 않는 건\n\n“내 월급과 윤석열 대통령 지지율”이라는 말까지 나옵니다.\n\n소득은 늘지 않는데 이렇게 서민의 삶과 밀접한 물가가 오릅니다.\n\n서민들 호주머니는 가벼워지고 지갑은 얇아진다,\n\n즉 살림살이가 나빠진다는 뜻입니다.\n\n올해 최저임금은 구천 팔백육십(9,860)원입니다.\n\n1시간 꼬박 구슬땀을 흘려 번 돈으로 비빔밥 한 그릇 못 사먹습니다.\n\n김밥 한 줄에 커피 한잔 마시면 남는 게 없습니다.\n\n윤석열 정부는 지금 뭘 하는지 모르겠습니다.\n\n“외식 못 하겠으면 집에서 해 먹어라,\n\n빵이 없으면 케이크를 먹으라”고 말할까 봐 걱정됩니다.\n\n종합부동산세, 법인세 등 가진 자들 세금만 깎아주려고 합니다.\n\n물가는 잡는 시늉만 합니다.\n\n윤석열 대통령은 민생은 도외시하고\n\n오로지 자기 가족, 측근만 챙기려고 합니다.\n\n높은 담장 안 잔디밭에서 기자들과 파티를 엽니다.\n\n김치찌개, 계란말이, 한우, 돼지갈비, 오겹살, 닭꼬치가 등장했습니다.\n\n여당 의원들에게 맥주잔을 돌리며, 어퍼컷 세러머니를 합니다.\n\n그것도 모자라\n\n남북 간 전쟁 공포를 부추겨 국민을 불안하게 만듭니다.\n\n근거가 불확실한데 유전이 발견되었다고 떠듭니다.\n\n대통령 말 한마디로 오천억원이 투여되기 직전입니다.\n\n군화 신은 독재정권이 떨어지는 지지율을 떠받치려고 벌였던\n\n전형적인 선전입니다.\n\n그런다고 1970, 80년대처럼 국민이 혹하지 않습니다.\n\n지금은 2024년입니다.\n\n예전 군사정권의 최후가 어땠는지\n\n더 이상 말하지 않아도 잘 아실 것입니다.\n\n제발, 민생 좀 돌보십시오.\n\n술 마시며 유튜브만 보지 마시기 바랍니다."}, {"id": 228, "filename": "제7차 비대위.txt", "title": "제7차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["부동산", "민생", "내란", "검찰개혁", "비대위"], "preview": "조국혁신당 비상대책위원회 10.01. - 조국 비상대책위원장 모두발언  <1> 조국혁신당은 검찰개혁의 완성을 위해 끝까지 가겠습니다.  어제 이재명 대통령은 국무회의에서 “검사들이 (죄가) 되지도 않는 것을 기소하거나,  무죄가 나오면 면책하려고 항소·상고해서 국민에게 고통을 준다”며  개선책을 주문했습니다.  대통령의 문제의식에 100% 동의합니다.  검찰권 오남용의 폐해를 바로잡겠다는 의지로 이해합니다.   검찰 역사 자체가 검찰권 오남용의...", "content": "조국혁신당 비상대책위원회 10.01.\n- 조국 비상대책위원장 모두발언\n\n<1> 조국혁신당은 검찰개혁의 완성을 위해 끝까지 가겠습니다.\n\n어제 이재명 대통령은 국무회의에서\n“검사들이 (죄가) 되지도 않는 것을 기소하거나, \n무죄가 나오면 면책하려고 항소·상고해서 국민에게 고통을 준다”며 \n개선책을 주문했습니다.\n\n대통령의 문제의식에 100% 동의합니다. \n검찰권 오남용의 폐해를 바로잡겠다는 의지로 이해합니다. \n\n검찰 역사 자체가 검찰권 오남용의 역사입니다. \n결국 국민은 검찰이 고쳐 쓸 집단이 아니라며 검찰청을 폐지했고,\n수사와 기소를 분리해서 독점적 권력을 해체했습니다.\n\n하지만 끝나지 않았습니다.\n허위 조작 기소에 앞장선 검사들을 심판대에 세우고, \n억울한 재판에 끌려간 국민들은 짐을 내려놓게 해야 합니다.\n잘못된 기소는 취소하고, 잘못 기소한 자는 책임져야 합니다.\n\n국회는 하루빨리 이재명 대통령이 강조한 \n허위 조작 기소와 항소·상고 남용에 대한 대책 마련에 돌입해야 합니다.\n가장 먼저 해야 할 일은 조국혁신당이 발의한 \n‘검찰권 오남용 진상조사 및 피해 회복 특별법’을 통과시키는 일입니다. \n\n적법절차 위배와 증언·증거 조작 등이 총동원된 허위 조작에 의한 기소, \n그에 따른 재판은 정당성을 가질 수 없고, 너무나 많은 국민들이 고통받고 있습니다.\n검찰권 오남용에 대한 공소 취소와 공소 기각 조치가 필요합니다.\n\n조국혁신당이 검찰개혁의 마무리 투수 역할을 맡겠습니다. \n검찰개혁의 완성을 위해 끝까지 가겠습니다. \n\n<2> 김건희 특검에 파견된 검사 40명 전원이 \"검찰로 복귀시켜 달라”고 나섰습니다.\n이것은 특검을 볼모로 내란 청산을 바라는 국민을 겁박한 것입니다. \n검찰개혁에 반대하니 특검에서 일하지 않겠다는 조직 이기주의에 분노를 느낍니다.\n\n검사들은 자중하십시오. 검찰청은 이미 폐업 신고를 마쳤습니다.\n미련을 버리십시오. 검찰청 문패를 다시 다는 날은 오지 않습니다. \n국민께 사죄하십시오. \n국민의 공복인 공직자가 일할 곳을 선택하겠다는 것은 용서받을 수 없는 일입니다. \n\n법무부 장관은 재차 항명이 일어난다면, 주저 없이 징계 절차에 착수해야 합니다. \n그리고 특검에 있기 싫다는 검사가 있다면, 남기지 말고 당장 교체하십시오. \n\n<3> 부동산값이 심상치 않습니다. \n서울 한강 벨트를 중심으로 평균 아파트값이 처음으로 18억 원을 돌파했습니다. \n실수요인 전세가격이 자극받고 있는 것이 문제입니다. \n수도권의 전세가격은 26개월째 상승 중입니다. \n이는 월세를 상승시키고 결국 서민만 높은 삶의 비용만 떠안게 됩니다.\n\n정책은 타이밍입니다. 특히 부동산은 활활 타오르기 전에 불씨를 꺼야 합니다. \n타이밍을 놓친다면, 경제 안보의 위기 속에 민생경제의 판이 흔들릴 수 있습니다. \n때를 실기하지 않기를 바랍니다.\n\n무엇보다 고품질 공공임대와 중저가 주택 공급에 대한 \n구체적 로드맵이 나와야 서민의 불안심리를 해소할 수 있습니다. \n동시에 소수의 투기심리를 방치해서는 안 됩니다. \n고가의 아파트에 대한 보유세 인상을 미뤄서는 안 됩니다. \n\n정부와 국회가 근본적인 대책 논의에 들어가야 합니다. \n주택 공급 체계와 부동산 세제, 임대차 방식 등에 대한 \n근본적인 재설계에 나서야 할 때입니다. \n조국혁신당은 토지공개념을 실현하는 방안까지 준비해 나갈 것입니다.  /끝/"}, {"id": 229, "filename": "제7차 최고.txt", "title": "제7차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "조국혁신당", "민생·경제", "외교·안보"], "tags": ["민생", "윤석열"], "preview": "-2024년 6월 10일(월) 오전9시 국회 본관 로텐더홀  ■ 조국 당대표  윤석열 정권이 들어선 후 경제가 엉망진창입니다.  고환율, 고금리, 고유가로  ‘기업하기 좋은 나라’가 아니라 ‘기업하기 나쁜 나라’가 됐습니다.  수출이 잘 안 되니, 기업들이 적자 늪에서 헤맵니다.  국민의 통장 잔액은 나날이 줄어갑니다.  모두 빚을 내는 수밖에 없습니다.  세수가 펑크난 중앙 정부는 물론,  지방교부세가 감소한 지자체와 공공기관도  부채 돌려막...", "content": "-2024년 6월 10일(월) 오전9시 국회 본관 로텐더홀\n\n■ 조국 당대표\n\n윤석열 정권이 들어선 후 경제가 엉망진창입니다.\n\n고환율, 고금리, 고유가로\n\n‘기업하기 좋은 나라’가 아니라 ‘기업하기 나쁜 나라’가 됐습니다.\n\n수출이 잘 안 되니, 기업들이 적자 늪에서 헤맵니다.\n\n국민의 통장 잔액은 나날이 줄어갑니다.\n\n모두 빚을 내는 수밖에 없습니다.\n\n세수가 펑크난 중앙 정부는 물론,\n\n지방교부세가 감소한 지자체와 공공기관도\n\n부채 돌려막기를 해야 할 판입니다.\n\n지난해 56조 원에 달하는 세수 결손,\n\n87조 원의 재정적자를 기록했습니다.\n\n윤석열 정권은 쓸 돈이 부족하자 올해 1분기에만\n\n한국은행에서 45조 원이 넘는 돈을 빌렸습니다.결국 마이너스 통장으로 돌려막은 셈입니다.\n\n가계 빚도 마찬가지입니다.\n\n지난해 가계 빚은 1886조 원으로 역대 최고치입니다.\n\n국내총생산, 즉 GDP 대비 가계 부채 비율이\n\n세계 주요 34개국 중에서 1위입니다.\n\n정부부터 기업, 개인까지 온통 빚 돌려막기로 버티고 있습니다.\n\n대한민국이 무슨 풍차의 나라라도 됩니까?\n\n우리 경제적 능력은 현 정권 집권 2년 만에 한심한 수준이 됐습니다.\n\n작년 경제성장률이 미국, 일본보다 낮은 1.4%였습니다.\n\n작년 한국 무역수지는 세계 172위였습니다.\n\n앞서 상반기 200위에서 나아진 게 그 정도입니다.\n\n이전 정부에서는 세계 5위에서 18위를 오갔습니다.\n\n오늘 윤석열 대통령은 해외 순방길에 올랐습니다.\n\n한국과 중앙아시아의 경제협력 관계를 기대해달라고 말합니다.\n\n덕담하고 아이디어를 나누는 비즈니스 포럼에 참석한답니다.\n\n‘K실크로드’ 협력구상으로 포장했습니다만, 한가해 보입니다.\n\n지금 집에 불이 나 대들보와 서까래에 불이 붙었고\n\n외양간 어미 소는 도망을 갔고 송아지는 다쳤습니다.\n\n식구 모두 불 끄려고 이리 뛰고 저리 뛰고 있는데,\n\n빚쟁이 가장은 친구 사귀겠다고 소주잔 부딪치러 가는 꼴입니다.\n\n한동안 숨어 지내던 배우자 김건희씨도 동행했습니다.\n\n연예인들도 사회적으로 물의를 일으키면\n\n프로그램에서 하차하고 자숙합니다.\n\n김건희씨 윤리 의식과 염치는 그보다 못합니까?\n\n아니면 6개월간 ‘자숙’으로 충분했으니,\n\n이제 본격적으로 나서도 된다고 생각하시는 겁니까?\n\n윤 대통령을 통해 서울중앙지검장과 자신의 사건을 담당한 차장들을 교체하고 나니, 자신만만해지신 겁니까?\n\n지금 윤 대통령과 장관 등 공식 수행원들이 있어야 할 곳은\n\n실크로드로 가는 비행기가 아니라, 비상 경제대책 회의장입니다.\n\n김건희씨가 있을 곳은 해외 정상 배우자와 마주 앉는\n\n화려한 사교장이 아니라, 서울중앙지검 조사실이어야 합니다.\n\n도대체 대한민국을 어디까지 추락시킬 작정입니까?\n\n지난 총선 때 그렇게 아프게 심판받고도 아직 정신을 못차리셨습니까?\n\n한심합니다.\n\n이제 국회가 즉각 행동해야 합니다.\n\n전 상임위, 민생과 경제 관련 상임위를 열고\n\n경제 위기를 진단하고 책임을 추궁하고 대책을 제시해야 합니다."}, {"id": 230, "filename": "제8차 최고.txt", "title": "제8차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": [], "preview": "-2024. 6. 12. 09:30 국회 본관 로텐더홀  ■ 조국 당대표     어제 국회 국방위원 자격으로 박정훈 대령 재판을 방청했습니다.  제가 “고생 많으십니다”라고 하자,  박 대령은 “견딜만합니다”라고 말했습니다.  악수하며 박 대령 눈을 가만히 들여다보는데 너무도 어이없는 상황에 기가 막혔습니다.     직분에 충실했던 군인은 재판받고 핍박받습니다.  채 해병 죽음에 책임이 있고, 사건을 은폐·축소하려고 했던  사람들은 승진하고 총...", "content": "-2024. 6. 12. 09:30 국회 본관 로텐더홀\n\n■ 조국 당대표\n\n \n\n어제 국회 국방위원 자격으로 박정훈 대령 재판을 방청했습니다.\n\n제가 “고생 많으십니다”라고 하자,\n\n박 대령은 “견딜만합니다”라고 말했습니다.\n\n악수하며 박 대령 눈을 가만히 들여다보는데 너무도 어이없는 상황에 기가 막혔습니다.\n\n \n\n직분에 충실했던 군인은 재판받고 핍박받습니다.\n\n채 해병 죽음에 책임이 있고, 사건을 은폐·축소하려고 했던\n\n사람들은 승진하고 총선 공천을 받습니다.\n\n국민께 여쭙겠습니다. 이게 도대체 말이 됩니까?\n\n저는 받아들일 수 없습니다.\n\n \n\n저는 국방위원으로서 박 대령을 외롭게 하지 않겠습니다.\n\n박 대령 재판과 별도로, 국회 국방위원회를 빨리 열어야 합니다.\n\n국방부, 대통령실의 판단 과정, 그리고 수사 의뢰하고 이첩하고\n\n연락을 주고받은 전 과정을 들여다보겠습니다.\n\n진실을 묻으려고 했던 자들,\n\n저는 절대 가만 놔두지 않겠습니다.\n\n \n\n순직 해병 특검법 재결의와 수사, 모두 시간이 없습니다.\n\n핵심 증거인 통화기록 보존 연한이 채 두 달도 안 남았습니다.\n\n \n\n그런데 국민의힘은 22대 국회에서 새로운 기록을 계속 쓰고 있습니다.\n\n헌정 사상 처음으로 개원 본회의 참석을 거부했습니다.\n\n어제 우원식 국회의장의 사퇴 촉구 결의안을 제출했습니다.\n\n의장 선출 6일 만의 일입니다.\n\n모두 국민의힘이 세운 신기록입니다.\n\n역사에 불명예스러운 당으로 기록되기로 작정한 듯 합니다.\n\n같은 정치인으로서, 22대 국회의원으로서 창피합니다.\n\n제가 대신 국민께 사과드리고 싶은 심정입니다.\n\n \n\n결의안이 본회의를 통과하고, 우원식 의장이 사퇴하겠습니까?\n\n썩은 고목에 꽃이 필 확률보다 적습니다.\n\n안될 것을 뻔히 알면서 고집부리는 걸 ‘떼쓴다’고 합니다.\n\n국민의힘은 철부지처럼 떼를 쓰고 있습니다.\n\n안타깝다 못해 한심합니다.\n\n \n\n국민의힘이 저러는 이유가 ‘용산 방탄 국회’를 하려는 것입니다.\n\n대통령과 가족, 측근에 대한 특검 법안을 다룰 법사위,\n\n대통령실 난맥상을 짚어볼 운영위,\n\n언론 탄압 문제를 파헤칠 과학기술정보방송통신위,\n\n이들 상임위 위원장 자리를 달라고 합니다.\n\n상임위원장이 되면 회의 자체를 파행시킬 속셈이겠죠.\n\n국민의힘이 뭘 원하는지 뻔해서 얕은 개울 바닥처럼 들여다보입니다.\n\n \n\n국민의힘 의원 전체 명의로 상임위원 사임 요청서를 제출했고,\n\n모든 상임위 참여 거부도 검토 중이라고 합니다.\n\n자신들 마음에 안 들면 국회 문이라도 닫을 기세입니다.\n\n국민의힘은 법 위에 서 있는 초법적 집단입니까?\n\n그런다고 국회가 닫힙니까? 직무유기일 뿐입니다.\n\n \n\n국회가 해야 할 일이 쌓여가고 있습니다.\n\n조국혁신당은 일하고 싶습니다. <끝>"}, {"id": 231, "filename": "제9차 비대위.txt", "title": "제9차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["트럼프", "관세", "부동산", "민생", "비대위"], "preview": "조국혁신당 제9차 비상대책위원회 조국 비상대책위원장 모두발언 2025.10.13.  지금 대한민국 국민을 비롯한 동맹국 국민들이 트럼프 행정부의 횡포 앞에 말하고 있습니다.   “트럼프의 3년은 너무 길다”  다수 미국 국민의 마음도 다르지 않을 것입니다.  관세가 부메랑이 되어 미국 국민의 부담으로 돌아오고 있기 때문입니다.  실제 일부 관세 품목에서 소비자 물가가 상승했습니다.  트럼프 2기 행정부가 출범한 지 9개월밖에 되지 않았습니다. ...", "content": "조국혁신당 제9차 비상대책위원회\n조국 비상대책위원장 모두발언 2025.10.13.\n\n지금 대한민국 국민을 비롯한 동맹국 국민들이 트럼프 행정부의 횡포 앞에 말하고 있습니다. \n\n“트럼프의 3년은 너무 길다”\n\n다수 미국 국민의 마음도 다르지 않을 것입니다. \n관세가 부메랑이 되어 미국 국민의 부담으로 돌아오고 있기 때문입니다. \n실제 일부 관세 품목에서 소비자 물가가 상승했습니다.\n\n트럼프 2기 행정부가 출범한 지 9개월밖에 되지 않았습니다. \n트럼프 대통령은 “9개월 만에 8개 전쟁을 끝낸 사람으로서 \n노벨 평화상을 받을 자격이 있다”고 주장했지만, \n세계는 9개월 만에 90여 개국에 관세전쟁을 일으킨 지도자로 기억할 것입니다. \n\n트럼프 대통령이 경주 APEC에서 예정된 미·중 정상회담 취소를 시사하고, \n100% 추가 관세를 예고하자 미국 증시는 시총 2조 달러(2,872조 원)가 증발했습니다. \n비트코인 등 디지털자산이 직격탄을 맞았고, \n불확실성을 피하려는 움직임에 금값은 급등세를 보였습니다. \n\n사상 처음으로 3,500선을 돌파한 코스피가 영향을 받을 가능성이 큽니다. \n환율 충격도 대비해야 하는 상황입니다. \n이렇게 트럼프 대통령의 말 한마디에 각 나라의 금융시장이 출렁이는 것은 \n결코 바람직한 국제질서가 아닙니다. \n\n트럼프 대통령과 행정부는 동맹국 국민들의 울분을 직시하길 촉구합니다. \n국제사회의 리더로서 세계 경제와 국제질서를 안정시키는 \n책임을 다할 것을 재차 촉구합니다.\n현재 대한민국과 미국의 관세 협상이 이어지고 있습니다. \n저는 10월 9일 미 대사관 앞에서 촉구했던 기존 제안에 더하여,\n두 가지를 추가로 제안하고자 합니다.\n\n첫째, 정부는 미국이 부과하는 관세에 대해 세계무역기구인 WTO 제소를 준비해야 합니다. \n\n미국 연방대법원이 ‘국제비상경제권한법’(IEEPA)을 근거로 한 관세 부과에 대해서 정당성 여부를 검토하고 있습니다. 자국법의 근거도 없이, 그리고 WTO 협정상 예외 사유 없음에도 관세를 부과하는 것은 WTO 위반 소지가 큽니다. 인도와 브라질은 이미 미국을 WTO에 제소한 바 있습니다. 법무부는 즉각 이 준비에 착수해야 합니다.\n \n둘째, 비상한 경각심을 갖고 관세 피해 사각지대를 지원해야 합니다.\n\n국회가 K-스틸법을 발의했지만, 동일하게 관세 50%가 부과된 알루미늄과 구리 산업 등에 대해서는 국회의 관심이 적습니다. 유독 중견, 중소기업이 이끄는 산업들이 사각지대로 존재합니다. 국회는 입법으로, 정부는 재정으로, 이 기업들을 위한 지원 정책 수립에 전속력을 내야 합니다. \n\n서울 한강 벨트를 중심으로 집값이 정점을 갈아치우고 있습니다. \n코스피가 정점을 돌파하는 건 국민경제에 이롭지만, 집값은 국민경제의 발목을 잡습니다.\n\n특히 수도권과 지방의 아파트 가격 차이가 17년 만에 역대 최대치를 기록했습니다. \n수도권과 지방의 경제력이 역대 최대 차이로 벌어졌다는 뜻입니다.\n청년들의 지방 탈출 현상이 더욱 심화됐다는 의미입니다. \n국가균형발전의 틀이 무너졌다는 경고입니다. \n\n이런 심각한 상황에서 오세훈 시장은 ‘서울시장’이 아닌 ‘강남시장’을 자처하고 있습니다. \n서울시가 추진하는 한강 벨트 중심의 규제 완화와 재건축 활성화 정책 등은 \n오히려 집값을 부추길 우려가 큽니다. \n서울 시민들은 오 시장이 토지거래허가제를 해제해서 \n강남 집값을 폭등 수준으로 끌어올린 사태를 기억하고 있습니다. \n부동산 정책은 중앙정부와 철저하게 보조를 맞춰야 하는 일입니다. \n독선에 빠져 ‘제2의 토허제 사태’를 일으키지 말고, 가만히 있기를 바랍니다.\n\n서울 등 수도권뿐만 아니라 전국에 ‘전세대란' 경고등이 켜졌습니다. \n전세수급지수가 ‘대란' 위험 단계에 들어섰습니다. \n서울의 월세 지수는 통계 작성 이후 사상 최고치입니다. \n청년들이 매물을 구하지 못해 어쩔 수 없이 월세로 내몰리고, \n주거비를 감당하느라 소비 여력이 줄면서, 자산 형성의 기회를 잃고 있습니다. \n청년에게 서울은 “출근지는 될 수 있어도, 삶의 터전은 될 수 없는 도시”가 되었습니다.\n\n정부는 시장이 더 뜨거워지기 전에 종합 대책을 내놔야 합니다. \n주택 시장은 역대 정부의 대책에 내성이 쌓일 대로 쌓였습니다. \n그래서 시장과 투기 세력의 예상을 뛰어넘는 파격적 대책이 필요합니다.\n\n이번 기회에 전반적인 주택 공급 체계부터 부동산 세제, 공공주택 비율, 청년임대주택 비율 등 \n국가적 차원의 종합적인 청사진을 제시하기를 바랍니다. \n조국혁신당도 획기적 대안을 준비하고 있습니다.  /끝/"}, {"id": 232, "filename": "제9차 최고.txt", "title": "제9차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["민생", "윤석열"], "preview": "- 2024. 6. 14. 9:30 국회 본관 로텐더홀     ■조국 당대표     내일은 6.15 남북공동선언 24주년입니다.  50년 만에 처음 만난 남북의 지도자가 포옹을 하던  감격스러운 그 장면을 지금도 잊을 수 없습니다.  6·15 남북공동선언은 한반도 평화와 협력의 가장 튼튼한 발판입니다.  분단국가인 우리에게 6·15 남북공동선언은  지난 역사가 아닌 현재 진행형입니다.     그런데 지금 어떻습니까.  남북 간에는 대화가 사라지...", "content": "- 2024. 6. 14. 9:30 국회 본관 로텐더홀\n\n \n\n■조국 당대표\n\n \n\n내일은 6.15 남북공동선언 24주년입니다.\n\n50년 만에 처음 만난 남북의 지도자가 포옹을 하던\n\n감격스러운 그 장면을 지금도 잊을 수 없습니다.\n\n6·15 남북공동선언은 한반도 평화와 협력의 가장 튼튼한 발판입니다.\n\n분단국가인 우리에게 6·15 남북공동선언은\n\n지난 역사가 아닌 현재 진행형입니다.\n\n \n\n그런데 지금 어떻습니까.\n\n남북 간에는 대화가 사라지고 오직 대결과 공포만 증폭되고 있습니다.\n\n윤석열 정부의 대북 기조는 오로지 ‘즉·강·끝’,\n\n즉시, 강력히, 끝까지 응징하겠다는 말 뿐입니다.\n\n오직 파멸과 대결 뿐입니다.\n\n \n\n남북한의 오물풍선도, 확성기 방송도 당장 멈춰야 합니다.\n\n표현의 자유라고 주장하지만 얼토당토 않습니다.\n\n칼날에 욕을 새겨 던지는 행위를 ‘표현의 자유’라고 할 수 없습니다.\n\n헌법재판소의 '대북전단살포금지법[남북관계 발전에 관한 법률 제24조 제1항 제3호(전단등 살포) 및 이에 대한 벌칙(제25조)]' 위헌 판결은\n\n법을 동원해 민간의 전단 살포를 전면적으로 금지하는 게 과도하다는, 처벌의 과잉을 지적한 것입니다.\n\n대북 전단 살포 정당성을 인정한 것이 아닙니다.\n\n \n\n24년 전 어렵게 약속한 한반도 평화와 완전한 비핵화,\n\n한민족의 공동번영을 위한 맹세를 양측 모두 잊어서는 안됩니다.\n\n사소한 오해가 돌이킬 수 없는 사태로 번지지 않도록\n\n남북한은 즉각 대화 채널을 가동해야 합니다.\n\n정부는 ‘언론에 알리는 것이 북한에 알리는 것’이라는\n\n어림 반 푼 어치 없는 소리 이제 그만 하십시오.\n\n \n\n국회도 당장 관련 상임위를 열어 더 이상\n\n남북 간 갈등이 커지지 않도록 해야 합니다.\n\n \n\n시급한 것은 남북문제 만이 아닙니다.\n\n민생은 파탄지경이고, 예고된 집단휴진에 치료를 받아야 할 환자들이 시위에 나섰습니다. 국민들은 불안에 떨고 있습니다.\n\n이런 상황인데 대통령은 명분 없는 해외 순방을 갔습니다.\n\n37건의 MOU를 체결했다고 자랑할 때가 아닙니다.\n\n \n\n게다가 이번 해외 순방의 주인공은 ‘영업사원 1호’가 아닙니다.\n\n‘디올백’ 대신 ‘에코백’이 주인공이 되었습니다.\n\n김건희 씨 ‘명품가방 수수의혹’을 반년 가까이 조사한 권익위원회가 위반사항이 없다는 결론을 순방 당일 기습적으로 발표했습니다.\n\n이와 같은 결정을 내린 유철환 위원장은 윤 대통령의 법대 동기,\n\n정승윤 부위원장은 대선캠프와 대통령 인수위 출신입니다.\n\n권력의 시녀로 전락한 권익위원회에 대해서는\n\n더 이상 긴 말 하지 않겠습니다.\n\n검찰과 여당 국회의원들도 모자라 이제 공직자의 부패를 막아\n\n국민의 권익을 지키는 공공기관까지 용산의 호위무사를 자처했습니다.\n\n \n\n‘에코백’으로 ‘디올백’을 덮을 수 없습니다.\n\n‘바이바이 플라스틱백’이라고요?\n\n국민은 ‘바이바이 대통령’이라고 하고 싶습니다.\n\n정말, 3년은 너무 깁니다."}, {"id": 233, "filename": "조국혁신당 뉴파티 비전 발표.txt", "title": "조국혁신당 뉴파티 비전 발표", "date": "", "category": "정책발표", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "최고위", "비대위"], "preview": "조국혁신당 뉴파티 비전 발표 - 조국 비상대책위원장 2025.11.03.  오늘은 조국혁신당이 한국 정치시장에 신제품을 출시하는 뜻깊은 날입니다.   2024년 12월 3일은,  시민들의 실시간 참여가 만든 한국 현대사의 변곡점이었습니다.  시민들은 플랫폼을 통해 서로가 연결되며 순식간에 내란 세력을 압도했습니다.  특히 뉴 민주주의 세대의 출연과 그들이 만든 다양한 정치 문화는  우리 민주주의를 더욱 강하고 탄탄하게 만들었습니다.   조국혁신...", "content": "조국혁신당 뉴파티 비전 발표\n- 조국 비상대책위원장 2025.11.03.\n\n오늘은 조국혁신당이 한국 정치시장에 신제품을 출시하는 뜻깊은 날입니다. \n\n2024년 12월 3일은, \n시민들의 실시간 참여가 만든 한국 현대사의 변곡점이었습니다. \n시민들은 플랫폼을 통해 서로가 연결되며 순식간에 내란 세력을 압도했습니다. \n특히 뉴 민주주의 세대의 출연과 그들이 만든 다양한 정치 문화는 \n우리 민주주의를 더욱 강하고 탄탄하게 만들었습니다. \n\n조국혁신당은 빛의 민주주의를 뉴파티 비전으로 구현해 나가겠습니다.\n뉴파티 비전을 당의 시스템과 엔진으로 장착하겠습니다. \n\n뉴파티 비전의 키워드는 개방, 다양성, 연결입니다. \n당원과 국민이 로그인하면 정치가 작동하는 참여 플랫폼 민주주의를 지향합니다.\n\n현재 조국혁신당은 추첨제 대의원제를 시행 중입니다. \n과거 거대 양당은 중앙당과 국회의원이 \n사실상 대의원을 독점하며 영향력을 행사했습니다. \n반면 조국혁신당은 대의원의 50%를 추첨제 방식으로 선출해서 \n선도적으로 정치권의 줄 세우기 문화를 타파하기 위해 노력했습니다. \n조국혁신당은 거대 양당이 시도하지 못하는 혁신을 끊임없이 과감하게 도전하겠습니다. \n\n오늘 발표하는 내용은 정당 민주주의의 혁신입니다. \n첫째,‘당원 시민의회’를 도입하겠습니다. \n의제별로 시민의회를 다르게 구성해서 더 많은 당원이 참여하고, \n더 다양한 국민의 뜻이 반영되는 구조를 만들겠습니다. \n\n둘째,‘혁신 인재 추천제’를 시작합니다. \n당원과 국민이 생활 속의 혁신가를 직접 추천하고, 검증하고, \n함께 성장시키는 참여형 인재 플랫폼입니다. \n\n조국혁신당은 당원 시민의회와 혁신 인재 추천제를 \n당헌·당규에 명시하고 실천하는 첫 원내 정당이 될 것입니다. \n \n셋째, 당의 레드팀,‘직설위원회’의 구성입니다.\n조국혁신당은 당심과 민심의 쓴소리와 회초리를 거침없이 경청하겠습니다. \n다양한 계층으로 구성된 직설위원회의 날카로운 직설을 거치며 검증받을 것입니다. \n\n넷째, 제2의 최고위원회, ‘전국 시도당위원장 연석회의’ 개최입니다. \n지역의 목소리가 당의 당론이 되는 구조를 만들겠습니다. \n당의 지방분권 비전, 지방선거 공약 등이 연석회의를 통해 논의될 것입니다. \n아울러 조국혁신당은 지역정당과의 연대와 협력에 적극적으로 나설 계획입니다. \n\n뉴피티 비전의 상세한 설명은 비대위원들께서 맡아주시겠습니다.\n\n참고로 오늘을 시작으로 매주 월요일과 목요일, \n뉴파티 비전을 시리즈로 발표해 나갈 예정입니다. "}, {"id": 234, "filename": "조국혁신당 당대표 출마선언문.txt", "title": "조국혁신당 당대표 출마선언문", "date": "", "category": "연설·기념사", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["합당", "사법개혁", "윤석열", "지방선거", "민생", "내란", "개헌", "검찰개혁"], "preview": "<조국, 조국혁신당 당대표 출마선언문> 25.11.10  “과감한 혁신으로 국민의 신뢰를 회복하고 당의 위기를 돌파하겠습니다.”   “혁신의 대항해 시대를 열겠습니다.”   “지방선거에서 한국 정치의 물줄기를 완전히 바꾸겠습니다.”  존경하는 조국혁신당  당원 동지 여러분,   주권당원 조국입니다.   저는 지난 총선을 불과  두 달여 앞두고 창당을 선언했습니다.  모두가 무모한 도전이라고 말했습니다.  조롱과 비난도 있었습니다.  그러나 국민...", "content": "<조국, 조국혁신당 당대표 출마선언문> 25.11.10\n\n“과감한 혁신으로 국민의 신뢰를 회복하고 당의 위기를 돌파하겠습니다.” \n\n“혁신의 대항해 시대를 열겠습니다.” \n\n“지방선거에서 한국 정치의 물줄기를 완전히 바꾸겠습니다.”\n\n존경하는 조국혁신당 \n당원 동지 여러분, \n\n주권당원 조국입니다. \n\n저는 지난 총선을 불과 \n두 달여 앞두고 창당을 선언했습니다. \n모두가 무모한 도전이라고 말했습니다. \n조롱과 비난도 있었습니다. \n그러나 국민의 생각은 달랐습니다. \n우리에게 길 없는 길을 열어주셨습니다. \n\n그 길 위에서 \n조국혁신당은 멈추지 않았습니다. \n용감하게 전속력으로 직진했습니다. \n거대 양당이 만든 위성정당의 견제에도 \n원내 3당의 기적을 만들었고, \n“3년은 너무 길다”를 외치며 \n윤석열-김건희 정권을 무너뜨렸습니다. \n정치검찰의 간판도 내렸습니다. \n쇄빙선 조국혁신당은 \n내란 세력이 쌓아 올린 \n불의의 빙벽을 깨부쉈습니다. \n당원 여러분의 \n자랑스러운 발자취입니다. \n\n자랑스러운 당원 동지 여러분, \n\n우리는 창당 때 국민이 부여한 \n시대적 과제를 완수했습니다. \n\n이제 국민은, 우리에게 \n변화를 명령하고 있습니다. \n조국혁신당의 ‘제1막’은 끝났습니다. \n새 비전과 새 가치로 혁신해서 \n‘제2막’의 출발선에 서야 합니다.\n\n저는 지금까지의 조국을 \n과거의 조국으로 남기겠습니다. \n‘다른 조국’, ‘새로운 조국’으로 \n국민과 다시 시작하겠습니다. \n과거가 아닌 미래로 평가받겠습니다. \n바닥을 다지고, \n하나하나 쌓아나겠습니다.\n\n우리의 최우선 과제는, \n국민의 신뢰 회복입니다.\n지금 조국혁신당은 창당 이후 \n가장 어려운 시기를 \n통과하고 있습니다. \n국민의 질책을 \n겸허히 받아들여야 합니다. \n국민은 다시 마음을 \n주실 준비가 되어 있습니다.\n시련은 극복하라고 \n존재하는 것입니다.\n진심으로 혁신하고,\n혁신으로 전진해야 합니다. \n\n돌이켜보면, 창당 때부터 지금까지, \n당원 여러분은 멈추지 않았습니다.\n제가 정치검찰의 화살을 맞고 \n올가미에 걸려 갇혀 있었을 때도, \n여러분은 지치지 않고 행동했습니다. \n불법 계엄을 막아냈고, \n윤석열을 탄핵했고, \n야권 원탁회의를 주도했으며, \n강력한 선거연대를 이뤄 \n정권교체를 이뤄냈습니다.\n\n특히 대선후보 없는 정당이라는 \n내부의 비판과 \n외부의 비아냥이 있었지만, \n그럼에도 시대적 대의를 중시하여 \n민주당 이재명 후보를 \n민주 진보 진영의 \n단일 후보로 만들고, \n내란 청산과 헌법 수호라는 \n시대적 소명을 완수했습니다. \n그렇게 여러분은 \n조국혁신당을 지켜냈습니다.\n\n저는 앞으로 한순간도 \n멈추지 않겠습니다. \n언제나 당원 여러분의 \n곁에 있겠습니다. \n아무리 거센 공격이 와도 \n맨 앞에서 막아서며, \n쓰러지지 않겠습니다. \n창당 때의 첫 마음으로 \n거침없이 직진하겠습니다. \n\n사랑하는 당원 동지 여러분, \n\n제가 조국혁신당의 \n당 대표로 나서겠습니다. \n\n1. 과감한 혁신으로 \n국민의 신뢰를 회복하고 \n당의 위기를 돌파하겠습니다. \n\n설익고 무례한 흡수합당론에 흔들리지 않도록 \n강철처럼 단단한 정당을 만들겠습니다. \n조국혁신당을 개혁에 강하고, \n민생에 강하고, 선거에 강한 \n‘이기는 강소정당’으로 만들겠습니다.\n\n그리하여 총선에서 국민이 주셨던 \n마음을 되찾겠습니다. \n다시 국민이 조국혁신당 때문에 \n가슴이 뛰고, 흥이 나시도록 하겠습니다. \n\n2. 혁신의 대항해 시대를 열겠습니다. \n\n항구에 닻을 내리고 머물러 있으면 \n그 배는 잠시 안전할 수 있습니다. \n하지만 떠나지 않는 배에는 \n어느 국민도 타지 않습니다. \n항구를 떠나야 \n새로운 대륙을 발견할 수 있습니다.\n\n지금부터 조국혁신호에 \n평등, 기회, 사람의 가치를 싣고 \n거대 양당이 가지 않는 항로를 \n국민과 함께 헤쳐 나가겠습니다. \n\n거대 양당의 독점정치를 종식하고, \n민주주의 다수 연합 시대를 여는 \n정치개혁의 항해입니다 !\n\n청년과 여성, 서민과 중산층을 \n불평등으로부터 지키는 \n민생개혁의 항해입니다 ! \n\n“모두를 위한 성장”을 가능하게 하는 \n경제개혁의 항해입니다!\n\n검찰개혁, 사법개혁 등의 사회개혁과 \n차별금지법 도입 등 인권개혁의 항해입니다 ! \n\n조국혁신호가 국민과 함께 \n이 모든 항해를 마치고, \n주거와 돌봄에 대한 \n걱정이 없는 나라, \n‘자유권’에 이어 \n‘사회권’까지 보장되는 선진국, \n그래서 모두의 출발선이 같고 \n행복이 권리로 보장되는 나라,\n그 ‘제7공화국’의 항구에 \n반드시 도착할 수 있도록 \n끝까지 배를 지키고 \n지휘하는 선장이 되겠습니다. \n  \n3. 지방선거에서 한국 정치의 \n물줄기를 완전히 바꾸겠습니다.\n\n내년 6.3 지방선거에서 \n내란 세력, 극우 세력, \n국민의힘을 심판해야 합니다. \n내란옹호 극우본당 국민의힘을, \n정치적 파산정당으로 퇴출하겠습니다. \n지방선거에서 국민의힘 소속 \n광역단체장 제로를 만들고, \n기초단체장들을 반토막 내서 \n내란세력의 뿌리를 뽑겠습니다. \n지방선거에서 민주 진보는 직진하고, \n내란 극우는 후퇴할 것입니다. \n\n양당 독점 지역에 \n‘창조적 파괴’를 일으키겠습니다. \n시장경제에서 독점은 경쟁을 막고, \n혁신의 싹을 죽입니다. \n지금 특정 지역에서 특정 정당이 \n지방 행정부와 지방 의회를 장악하면서 \n풀뿌리 민주주의는 시들었습니다. \n갑질과 부정부패가 끊이지 않습니다. \n\n지난 2022년 지방선거에서 \n무투표 당선자가 \n508명으로 역대 최다였습니다.\n유권자의 선택권이 박탈된 지역이 \n전국에 320곳이 넘습니다.\n양당 독점이 낳은 \n‘정치의 사막화’입니다. \n국민의 목소리는 메마르고, \n경쟁 없는 권력만 활개를 칩니다.\n\n조국혁신당이 이 퇴행적 구조를 깨뜨리겠습니다. \n양당 독점이 깨져야 정치가 새로워지고, \n지역이 살고, 국민의 삶이 바뀝니다.\n조국혁신당은 ‘정치적 메기’가 되어 \n양당의 나눠 먹기 정치시장에 \n혁신과 경쟁의 바람을 불어넣겠습니다. \n\n조국혁신당은 4.13 총선에서 \n국회 교두보를 마련했듯이 \n내년 6.3 지방선거에서 \n지방정치의 교두보를 만들겠습니다. \n\n존경하는 조국혁신당 당원 동지 여러분! \n\n우리는 같은 꿈을 꾸는 동지입니다.\n어느 정당보다 강하고 질기고 \n끈끈한 결속력이 있습니다. \n우리가 함께라면 못 갈 곳은 없습니다. \n우리가 함께라면 못 이룰 꿈도 없습니다. \n혁신으로 뭉치고, 혁신으로 승리합시다.\n\n조국혁신당이 도약해야 \n한국 정치가 바뀝니다. \n조국혁신당이 성공해야 \n지방선거도, 총선도, 대선도, \n민주 진보 진영이 승리할 수 있습니다. \n\n다시, 힘차게 일어나 주십시오. \n다시, 뜨겁게 함께해 주십시오. \n조국혁신호의 돛을 함께 올려주십시오. \n조국혁신호의 노를 함께 저어주십시오.\n\n조국혁신당은 결코, 멈추지 않습니다. \n조국도 결코, 멈추지 않습니다.\n\n감사합니다. \n\n2025. 11. 10 \n조국혁신당 당 대표 후보자 조국"}, {"id": 235, "filename": "조국혁신당 제2차 뉴파티비전 선언 기자회견.txt", "title": "조국혁신당 제2차 뉴파티비전 선언 기자회견", "date": "", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "인권·사회", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["기자회견", "비대위"], "preview": "조국혁신당 제2차 뉴파티비전 선언 기자회견 - 조국 비상대책위원장 25.11.06.  조국혁신당 비대위원장 조국입니다.   먼저 조란 맘다니 뉴욕시장의 등장이 반갑습니다.  맘다니 시장이 보여준 다양성의 가치와 사회권 중심의 비전이  조국혁신당이 추구하는 방향과 결이 같습니다.  특히 주거권 보장, 조세 정의를 비롯한 불평등 정책에 주목합니다.  그리고 정치적 메기가 되어 기득권 정치를 쓰러뜨린 모습이 인상적입니다.  조국혁신당은 맘다니처럼 국...", "content": "조국혁신당 제2차 뉴파티비전 선언 기자회견\n- 조국 비상대책위원장 25.11.06.\n\n조국혁신당 비대위원장 조국입니다. \n\n먼저 조란 맘다니 뉴욕시장의 등장이 반갑습니다. \n맘다니 시장이 보여준 다양성의 가치와 사회권 중심의 비전이 \n조국혁신당이 추구하는 방향과 결이 같습니다. \n특히 주거권 보장, 조세 정의를 비롯한 불평등 정책에 주목합니다. \n그리고 정치적 메기가 되어 기득권 정치를 쓰러뜨린 모습이 인상적입니다. \n조국혁신당은 맘다니처럼 국민의 고통에 귀 기울이는 정치를 하겠습니다. \n정치적 메기로서 개혁 과제를 견인하고, 양당 독점 정치를 타파하고,\n그래서 국민의 삶을 바꾸는 매력적인 정당이 되도록 혁신하겠습니다. \n\n조국혁신당의 제2차 뉴파티 비전을 보고드리겠습니다. \n1차 뉴파티 비전은 ‘개방, 다양성, 연결’을 키워드로 제시하며, \n우리나라 정당들이 시도하지 못했던 과감한 혁신 방안을 발표했습니다. \n\n특히 정당 최초로 당헌·당규에 근거 조항을 마련해서 추진하는, \n‘당원 시민의회’와 ‘혁신 인재 추천제’를 시민사회가 기대하고 있습니다. \n이 혁신적인 도전이 성공한다면, \n우리 민주주의가 더 다양하고 더 많은 민주주의로 성장해 나갈 수 있습니다. \n조국혁신당이 사명감을 갖고, 착실하게 실천해 나가겠습니다. \n국민의 참여로 성장하고, 국민의 신뢰로 운영되는, \n혁신적인 정당의 길을 반드시 열어가겠습니다. \n\n2차 뉴파티 비전의 키워드는, ‘당원주권’과 ‘정책 강소정당’입니다. \n그 실천 방안으로 선출직 공직자 평가제를 비롯해서 \n지역당원대표제, 현장최고위 정례화, \n혁신 아이디어 뱅크와 정책 서밋 개최를 담았습니다. \n\n그동안 비상대책위원회는 당원과 국민의 의견을 폭넓게 경청했습니다. \n추첨제 대의원들의 혁신 방안을 수렴했고, \n국민과 지지층을 대상으로 다양한 여론조사를 실시했습니다. \n전국 시도당을 순회하며 13번의 당원간담회를 개최했습니다. \n그 과정에서 가장 많은 요구가 바로, 선출직 공직자 평가제였습니다.\n \n정치인은 언제나 당원과 국민의 평가를 받아야 합니다. \n선출직 공직자는 더 엄격한 기준으로 평가받습니다.\n그것이 정당정치이고, 책임정치입니다. \n제가 2015년 민주당(당시 새정치민주연합) 혁신위원회에 참여했을 때, \n선출직 평가제도를 제안해서 거센 비판과 저항을 받았습니다. \n그러나 그 제도는 결국 정치권의 혁신으로 자리 잡았다는 말씀을 드립니다.\n\n 자세한 뉴파티 비전은 비대위원님들께서 발표해 주시겠습니다.\n"}, {"id": 236, "filename": "조국혁신당 추석민심 기자간담회.txt", "title": "조국혁신당 추석민심 기자간담회", "date": "", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["트럼프", "기자회견", "관세", "사법개혁", "윤석열", "민생", "한미동맹", "검찰개혁"], "preview": "조국혁신당 추석민심 기자간담회 - 조국 비상대책위원장 모두발언 25.10.09  국민 여러분, 언론인 여러분,  민족 대명절 추석 연휴의 마지막 날입니다.  사랑하는 분들과 따뜻한 시간을 보내셨기를 바랍니다.  추석 연휴는 국민의 목소리를 생생하게 듣는 소중한 기회였습니다.  국민의 요구는 분명했습니다.  특히 조국혁신당이 위기 극복에 앞장서라는 말씀을 많이 들었습니다.  윤석열 정권 조기 종식과 검찰개혁을 주도했듯이,  대한민국의 경제주권을 ...", "content": "조국혁신당 추석민심 기자간담회\n- 조국 비상대책위원장 모두발언 25.10.09\n\n국민 여러분, 언론인 여러분, \n민족 대명절 추석 연휴의 마지막 날입니다. \n사랑하는 분들과 따뜻한 시간을 보내셨기를 바랍니다.\n\n추석 연휴는 국민의 목소리를 생생하게 듣는 소중한 기회였습니다. \n국민의 요구는 분명했습니다. \n특히 조국혁신당이 위기 극복에 앞장서라는 말씀을 많이 들었습니다. \n윤석열 정권 조기 종식과 검찰개혁을 주도했듯이, \n대한민국의 경제주권을 지키는 일에 가장 맨 앞에서 싸우라는 명령이었습니다.\n조국혁신당은 추석 민심을 실천해 나가겠습니다.\n\n첫째, ‘관세 팬데믹’에 대응하기 위한 ‘여야 비상경제안보회의’를 제안합니다.\n\n모든 여야 대표들이 참여하는 초당적 회의체를 구성합시다. \n영남과 호남의 국민 85%는 미국 트럼프 대통령의 요구가 부당하다고 말하고 있습니다. \n이미 국민은 지역, 계층, 세대, 이념을 넘어 ‘국익’으로 통합했습니다. \n지금은 국익이 최상의 가치입니다. \n여야는 국익으로 하나가 돼서 국민과 함께해야 합니다. \n\n다시 한번 촉구합니다. \n미국 트럼프 행정부에 강력한 항의를 표시하는 국회 결의안을 만들고 통과시킵시다. \n\n미국의 태도는 ‘협상’이 아니라 ‘협박’입니다. \n일방적이고 부당한 관세 철회와 선불 요구 거부를 명확히 하고, \n평등한 한미 동맹을 벗어나는 어떤 행위도 수용할 수 없음을 경고합시다. \n\n‘동맹’이 아니라 ‘예속’을 강요한다면, \n국회는 미국 제조업의 재건을 돕는 법과 예산을 추진할 수 없습니다. \n국회가 나서서 우리 제조업을 협상의 지렛대로 활용해야 합니다. \n\n인도와 브라질이 미국으로부터 관세 50%를 부과받은 후 제3의 길을 걷고 있습니다. \n미국은 가장 가까운 동맹국인 대한민국을 존중해야 합니다. \n그러한 단호한 뜻을 결의안에 똑똑이 담아야 합니다. \n\n지방 산업도시를 살리는 입법에도 나서겠습니다. \n포항 등 많은 산업도시는 관세 팬데믹이 덮치면 일자리 붕괴를 막을 수 없습니다. \n고향을 찾은 국민들께서 텅 빈 공장과 거리를 보며 많이 불안해하셨을 겁니다. \n더 늦기 전에 국회에 계류된 ‘K-스틸법’ 등 \n지역산업 보호와 지원 법안들을 통과시켜야 합니다. \n\n둘째, 검찰을 개혁한 것처럼 법원도 반드시 개혁하라는 명령을 실천하겠습니다.\n\n조국혁신당은 희대의 대선개입 판결을 주도한 \n조희대 대법원장에 대한 탄핵소추안을 마련했다고 밝힌 바 있습니다.\n하지만 꺼내지 않았습니다. 법원에 자기 개혁의 시간을 준 것입니다. \n그러나 조희대 대법원장은 침묵했고, 지귀연 판사와 음주 소동 판사를 보호했습니다. \n\n대법원의 정치개입을 막을 방안을 내놓지 않습니다.\n대부분의 OECD 국가에서 실시하는 \n전면적 시민참여재판을 실시할 생각이 없습니다. \n룸살롱 접대를 받은 판사, \n의혹이 제기되는 시점마다 휴대전화를 교체하는 판사를 규제할 생각도 없습니다.\n\n이제 국정감사의 시간입니다.\n국회 법사위에 일반 증인으로 채택된 조희대 대법원장은 \n국정감사에 충실히 임해야 할 것입니다.\n국회가 대법원장의 답변을 듣는 것은 국회의 권한입니다. \n대법원장이 국정감사를 거부하는 것이 삼권분립 훼손입니다. \n\n만약 조희대 대법원장이 국정감사에 불출석하거나 증인 선서를 거부하고,\n사법개혁의 계획을 내놓지 않는다면, \n조국혁신당은 더 이상 인내하지 않겠습니다.\n \n셋째, 조국혁신당이 성찰하고 혁신하라는 추석 민심을 겸허하게 받들겠습니다. \n\n조국혁신당은 당원을 제외하고 모든 것을 바꾼다는 각오로 쇄신 작업에 돌입했습니다. \n비대위의 결정에 따라 성평등을 실현하기 위한 20여 개의 조치가 이뤄지고 있고, \n부족한 부분을 채우기 위한 다양한 노력을 진행하고 있습니다. \n\n‘뉴파티 비전’도 준비하고 있습니다. \n당원 주권을 강화하고, 당의 체질, 조직, 문화를 바꾸는 내부 개혁은 물론,\n정치개혁 방안까지 담을 계획입니다. \n조국혁신당의 변화가 한국 정치의 변화까지 이어질 수 있도록 솔선수범하겠습니다.\n\n당의 비전과 정책도 혁신하겠습니다. \n직장인들의 연결되지 않을 권리, 소외된 문화예술인들의 창작할 권리, \n라이더들의 안전할 권리, 청년들이 지옥고에서 벗어날 주거 권리 등 \n국민들의 사회권을 보장하는 구체적 방안도 보고드리도록 하겠습니다. \n\n조국혁신당은 우왕좌왕하지 않고 차근차근 변화를 만들어 낼 것입니다. \n지켜봐 주십시오.\n\n준비된 기자회견문을 마쳤습니다. 언론인 여러분의 질문을 받도록 하겠습니다."}, {"id": 237, "filename": "조란 맘다니 뉴욕 시장 당선 축하글.txt", "title": "조란 맘다니 뉴욕 시장 당선 축하글", "date": "", "category": "기타", "topics": ["인권·사회", "조국혁신당", "개헌·민주주의", "민생·경제"], "tags": ["민생"], "preview": "<<뉴욕 콘크리트 정글에 핀 사회권의 꽃, '주거권'을 헌법적 권리로 만들어야합니다.>>  조란 맘다니 뉴욕 시장의 당선을 축하합니다.  맘다니 시장의 당선은 우리는 물론 많은 나라들이 '다양성'과 '사회권'이라는 가치에 주목하는 전환점이 될 것입니다.  맘다니 시장의 성공은 평범한 시민의 삶을 바꾸겠다는 ‘용기'의 결과입니다. 뉴욕의 극심한 불평등과 소득의 절반 이상을 월세로 지출해야 하는 살인적인 주거비는 뉴욕을 가장 비싼 도시로 만들었습니...", "content": "<<뉴욕 콘크리트 정글에 핀 사회권의 꽃, '주거권'을 헌법적 권리로 만들어야합니다.>>\n\n조란 맘다니 뉴욕 시장의 당선을 축하합니다.\n\n맘다니 시장의 당선은 우리는 물론 많은 나라들이 '다양성'과 '사회권'이라는 가치에 주목하는 전환점이 될 것입니다.\n\n맘다니 시장의 성공은 평범한 시민의 삶을 바꾸겠다는 ‘용기'의 결과입니다. 뉴욕의 극심한 불평등과 소득의 절반 이상을 월세로 지출해야 하는 살인적인 주거비는 뉴욕을 가장 비싼 도시로 만들었습니다. 뉴욕의 세입자들은 소득의 55%에서 68.5%를 임대료로 지출하며, 삶의 기본인 주거가 생존마저 위협하는 수준에 이르렀습니다. \n\n\"다시 뉴욕시를 쪼들리지 않고 살 수 있는 도시로\" (A City We Can Afford / Make New York Affordable Again) 만들겠다는 구호는 생존을 위한 시민의 간절한 요구였습니다. 임대료 동결, 공공주택 20만 호 건설, 공공주택 예산 증액 등의 담대한 공약을 뉴욕 시민이 선택한 이유입니다.\n\n서울은 번영과 성장의 상징이 되었지만, 시민들의 삶은 지쳐가고 있습니다. 서울은 '삶터'가 아닌 '일터'로만 자리잡았고, 부자는 더욱 부유해지며 집값은 폭등하고 있습니다. 서울 청년 세입자들이 겪는 고통은 이미 뉴욕의 지나간 모습을 닮아 있습니다. 뉴욕의 현재는 곧 다가올 서울의 불편한 미래일 수 있습니다. \n\n조국혁신당이 제안하는 주거권 보장은 결코 공허한 얘기가 아닙니다. 우리가 가야할 길입니다.\n\n주거는 '상품'이 아니라 '권리'이며, 공공이 적극 개입하고 국가가 책임져야 한다는 사회권의 원칙을 확립해야 합니다.\n\n조란 맘다니 시장이 보여준 사회권 중심의 시정 비전은 조국혁신당이 지향하는 방향과 같은 결을 가졌습니다. 그 공약이 사람다운 삶이 꽃피는 뉴욕의 변화를 이끌어낼 수 있기를 희망합니다.\n\n'불평등'의 콘크리트 정글 위에 '사회권'의 꽃을 피워낸, 맘다니 시장의 승리가 반갑습니다."}, {"id": 238, "filename": "조희대 대법원장 탄핵소추안 및 사법개혁 방안 공개.txt", "title": "조희대 대법원장 탄핵소추안 및 사법개혁 방안 공개", "date": "", "category": "기타", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["사법개혁", "끝까지간다", "민생", "내란", "검찰개혁", "비대위"], "preview": "[조국혁신당 비상대책위원회-끝까지간다특별위원회 연석회의] 조희대 대법원장 탄핵소추안 및 사법개혁 방안 공개 - 조국 비상대책위원장 모두발언 25.10.17.  오늘은 조국혁신당이 ‘조희대 탄핵소추안’과 ‘사법개혁 방안’을  국민께 보고드리는 중요한 시간입니다.  그래서 ‘비상대책위원회’와 ‘끝까지간다 특별위원회’가 함께 보고드리겠습니다.   <조희대 탄핵소추안>   먼저 조희대 탄핵소추안을 보고드립니다.   지금 사법부를 향한 국민적 분노의 본...", "content": "[조국혁신당 비상대책위원회-끝까지간다특별위원회 연석회의]\n조희대 대법원장 탄핵소추안 및 사법개혁 방안 공개\n- 조국 비상대책위원장 모두발언 25.10.17.\n\n오늘은 조국혁신당이 ‘조희대 탄핵소추안’과 ‘사법개혁 방안’을 \n국민께 보고드리는 중요한 시간입니다. \n그래서 ‘비상대책위원회’와 ‘끝까지간다 특별위원회’가 함께 보고드리겠습니다. \n\n<조희대 탄핵소추안> \n\n먼저 조희대 탄핵소추안을 보고드립니다. \n\n지금 사법부를 향한 국민적 분노의 본질은, \n‘조희대 사법부’에 대한 총체적 불신입니다. \n사법부가 제대로 내란을 단죄할 수 있을지를, 믿지 못하는 상황까지 왔습니다. \n삼권분립의 한 축인 사법부의 신뢰가 완전히 무너졌습니다. \n사법부의 위기는 곧 대한민국 민주주의의 위기입니다.\n\n대법원이 자초한 이 위기는, 조희대 대법원장의 대선 개입에서 비롯됐습니다. \n이 문제를 최고법원이라는 이유로 어물쩍 넘어간다면, \n사법부의 신뢰 회복은 불가능하고, 사회적 갈등은 증폭될 것입니다. \n이제, 소모적 상황을 끝내야 합니다. \n국민이 원하는 ‘사법개혁의 시간’으로 전환해야 합니다. \n\n대법원은 이재명 후보의 사건을 검토하기도 전에 \n이미‘파기 환송할 결심’을 한 상태였습니다. \n대통령 당선이 유력한 대선후보의 자격 박탈을 시도했고, \n나아가 대선후보 등록일을 넘겨서 내란 청산을 주도할 민주 진보 진영이, \n대선 후보를 등록할 수 없는 지경으로 몰아넣으려 했습니다. \n이는 5월 1일 이재명 후보에 대한 파기환송 결정과 2일 한덕수 대선 출마 선언, \n10일에 발생한 국민의힘의 대선후보 교체 사태와 맞물립니다. \n\n조국혁신당은 대법원이 ‘내란 연장 세력’과 결탁한 ‘사실’에 대해서 \n반드시 진상을 밝히고, 응당한 책임을 묻겠습니다. \n\n그러나 국회가 본질적 해결책인 ‘조희대 탄핵’을 미루고 있습니다. \n조국혁신당이 나서겠습니다. 오늘 최후의 수단인 탄핵소추안을 공개하고, \n개혁 야당들과 ‘사법개혁 연대’를 추진하겠습니다.\n\n피소추자 조희대는 대선 개입 판결로 국민주권주의와 대의민주주의, \n실질적 법치국가 원칙 등 헌법 질서를 심대하게 훼손했고, 남용하였습니다.\n피소추자의 중대한 헌법위반은, \n국민이 부여한 신임에 대한 배신으로 탄핵에 의한 파면은 정당합니다.\n조국혁신당은 조희대 대법원장을 파면하고,\n사법부가 독립성과 국민 신뢰를 회복하는 결정적 계기를 만들겠습니다.\n\n구체적 탄핵소추 사유는 서왕진 원내대표가 보고드리겠습니다.\n\n\n<사법개혁 방안> \n\n다음으로 사법개혁 방안을 말씀드리겠습니다. \n조국혁신당은 대한민국 사법부를, \n조희대 없는 대법원, 지귀연 없는 재판부로 개혁하겠습니다. \n국민 위의 오만한 엘리트 권력을, \n국민 아래의 겸손한 봉사자로 되돌리겠습니다.\n\n조국혁신당의 사법개혁 원칙은, 국민 인권 보호와 민생중심 개혁입니다.\n\n첫째, 국회 사법개혁특별위원회 즉각 구성을 재차 제안합니다. \n개혁의 때가 있습니다. 검찰개혁과 속도를 맞춰야 합니다. 바로 지금이 적기입니다. \n올해 연말로 시간을 못 박고, 주요 사법개혁부터 매듭지어야 합니다.\n\n둘째, 대법원장의 지휘를 받지 않는 독립된 감찰기구의 설치입니다.\n\n지귀연 판사를 보호하는 폐단을 원천 봉쇄하겠습니다. \n죄를 지은 판사가 징계받는 상식적인 재판부를 만들겠습니다. \n\n셋째, 법원행정처를 폐지하고, 사법행정위원회를 신설하겠습니다.\n\n법원 정치화의 원인은 제왕적 대법원장제입니다. \n국정감사를 통해 많은 국민이 생중계로 확인한 부분입니다. \n대법원장의 오른팔 역할을 하는 법원행정처를 폐지하고, \n사법행정위원회에 대법원장의 사법행정권을 이관하겠습니다.\n독선적이고 폐쇄적인 ‘밀실 재판’을 영구 추방하겠습니다.\n그래서 판사들이 본연의 업무인 \n공정한 재판에만 집중하는 시스템을 안착시키겠습니다.\n\n넷째, 소비자법원과 노동법원을 신설해서 경제민주화를 이루겠습니다.\n\n법과 판결은 사회적 약자의 편에서 작동해야 합니다.\n평범한 국민이 대기업의 갑질로 쓰러져서는 안 됩니다.\n소비자법원과 노동법원을 통해 \n특권과 기득권에 기울어진 ‘민생 운동장’을 바로 세우겠습니다. \n\n조국혁신당은 이외에도 재판소원 제도 도입, 대법관 증원과 판결문 완전 공개, \nAI 시대에 맞는 투명하고 효율적인 법률 서비스 등 \n국민의 눈높이와 시대에 맞는 사법개혁 방안을 마련했습니다. \n\n자세한 내용은, 끝까지간다 특위 법원개혁 소위원장이신 \n이해민 의원께서 보고드리겠습니다.\n\n이제, 사법개혁의 시간입니다. \n조국혁신당은 사법개혁의 망치질을 멈추지 않고 끝까지 하겠습니다. 감사합니다. /끝/\n\n\n"}, {"id": 239, "filename": "조희대 대법원장의 탄핵 사유와 법원행정처 폐지의 당위성.txt", "title": "조희대 대법원장의 탄핵 사유와 법원행정처 폐지의 당위성", "date": "", "category": "기타", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "사법개혁", "페이스북"], "preview": "<조희대 대법원장의 탄핵 사유와 법원행정처 폐지의 당위성이 더 분명해졌습니다>  2025.10.24 페이스북 메시지  군인권센터가 내란 특검에 조희대 대법원장과 천대엽 법원행정처장을 고발했습니다. 12·3 내란 직후 열린 대법원 간부회의를 정조준했습니다.   작년 12월 4일 새벽 00시 46분 조선일보는 대법원 관계자의 발언을 인용해 다음과 같이 보도했습니다. “비상계엄에 따라 사법권의 지휘와 감독은 계엄사령관에게 옮겨간다”, “계엄사령관의 ...", "content": "<조희대 대법원장의 탄핵 사유와 법원행정처 폐지의 당위성이 더 분명해졌습니다> \n2025.10.24 페이스북 메시지\n\n군인권센터가 내란 특검에 조희대 대법원장과 천대엽 법원행정처장을 고발했습니다. 12·3 내란 직후 열린 대법원 간부회의를 정조준했습니다. \n\n작년 12월 4일 새벽 00시 46분 조선일보는 대법원 관계자의 발언을 인용해 다음과 같이 보도했습니다. “비상계엄에 따라 사법권의 지휘와 감독은 계엄사령관에게 옮겨간다”, “계엄사령관의 지시와 비상계엄 메뉴얼에 따라 향후 대응을 마련할 것”이다. 당시 대법원은 내란 성공을 전제로 계엄사령관의 지시에 순순히 따르려고 했습니다. 국회의 계엄 해제가 이뤄지기 전까지의 급박한 상황들로 인해 대법원의 이 회의는 부각되지 못했지만, 조선일보 보도는 중요한 단서를 제공합니다. \n\n<계엄법> 제10조는 비상계엄 시 군사법원이 재판권을 갖는다고 규정하고 있습니다. 이는 1심, 2심 재판권까지입니다. 헌법 제110조 제2항은 “군사법원의 상고심은 대법원이 관할한다”고 명확히 규정하고 있기 때문입니다. 즉, 계엄이 성공하고 군사재판이 진행되더라도 대법원이 최종 재판권을 갖습니다. \n\n계엄이 성공했다면, 대법원은 내란 세력의 법적 정당성을 최종 승인하는 특별재판소가 되었을 것입니다. 노상원 수첩에 등장한 “특별재판소”, “법체계를 이용해”, “사형·무기징역” 등의 구상은 이러한 점과 연결되어 있습니다. 노상원은 군사법원이 1, 2심을 담당하고, 대법원이 그 결정을 추인하는 구조를 상정했을 것입니다. \n\n먼저 대법원은 12월 4일 열린 대법원 법원행정처 긴급회의의 참석자와 발언 내용을 공개해야 합니다. 이 회의는 판결과 무관한 것이므로 비밀이 보장되는 것이 아닙니다.\n\n‘조희대 대법원’은 이에 응하지 않는다면, 내란 특검이 신속하게 수사해서 대법원이 내란 중요 임무 종사자였는지 여부를 밝혀야 합니다. \n\n군인권센터의 노력으로 조희대 대법원장의 탄핵 사유와 법원행정처 폐지의 당위성이 더 분명해졌습니다. 대법원에 대한 수사는 수사대로, 대법원장의 탄핵은 탄핵대로, 법원행정처 폐지를 비롯한 사법개혁은 사법개혁대로 흔들림없이 추진되어야 할 것입니다. \n\n조국혁신당은 조희대 탄핵소추안을 공개했고, 법원행정처 폐지를 핵심으로 하는 사법개혁 방안도 유일하게 발표했습니다. 내란 청산과 사법개혁을 위해 흔들림없이 나아가겠습니다."}, {"id": 240, "filename": "추석 당원 문자.txt", "title": "추석 당원 문자", "date": "", "category": "기타 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["사법개혁", "윤석열", "민생", "내란", "검찰개혁", "비대위"], "preview": "사랑하는 당원 동지 여러분,  비상대책위원장 조국입니다.  먼저 피해자분들께  다시 한번 깊이 사과드립니다.  피해자분들을 중심으로  모두가 함께 회복할 수 있도록  끝까지 노력하겠습니다.  공동체 회복의 길을  진심을 다해서 걷겠습니다. 당원 동지 여러분,  간곡하게 호소합니다. 현재 당면한 문제 앞에서  서로에게 상처를 주는  말과 행동도 삼가주십시오.  추가적 갈등은 문제해결을 가로막습니다. 팩트체크가 필요한 순간도 있습니다.  그러나 정...", "content": "사랑하는 당원 동지 여러분, \n비상대책위원장 조국입니다. \n먼저 피해자분들께 \n다시 한번 깊이 사과드립니다. \n피해자분들을 중심으로 \n모두가 함께 회복할 수 있도록 \n끝까지 노력하겠습니다. \n공동체 회복의 길을 \n진심을 다해서 걷겠습니다.\n당원 동지 여러분, \n간곡하게 호소합니다.\n현재 당면한 문제 앞에서 \n서로에게 상처를 주는 \n말과 행동도 삼가주십시오. \n추가적 갈등은 문제해결을 가로막습니다.\n팩트체크가 필요한 순간도 있습니다. \n그러나 정당은 법원이 아닙니다. \n세밀한 시시비비를 따지는데 매몰되면, \n정작 가야 할 길을 잃습니다.\n또한 당면 과제를 놓고 \n치열하게 토론하더라도 \n국민이 조국혁신당에 부여한 \n시대적 과제를 한시도 \n잊어서는 안 됩니다. \n내란 청산은 끝나지 않았습니다. \n극우세력은 여전합니다. \n우리가 시작한 검찰개혁을 \n우리가 책임지고 매듭지어야 합니다. \n사법개혁과 정치개혁, \n민생개혁과 인권개혁도 해내야 합니다. \n이제 윤석열 정권을 \n조기 종식한 쇄빙선 역할에 이어 \n극우세력과 불평등을 부수는 \n망치선 역할을 해야 합니다. \n야권의 연대와 통합도 견인해야 합니다. \n조국혁신당은 해온 일보다 \n해야 할 일이 훨씬 많습니다.\n당원 동지 여러분, \n지금 이 순간에도 \n조국혁신당의 위기에 \n박수를 치는 세력이 있습니다. \n우리가 사분오열되고, 지리멸렬해지기를 \n바라는 자들이 존재합니다. \n우리는 그들이 원하는 길로 갈 수 없습니다. \n우리는 국민이라는 나침반만 바라보며, \n새로운 대한민국으로 가는 큰길을 \n뚜벅뚜벅 걸어가야 합니다. \n꺾이지 않는 화살 다발이 돼서 \n시대적 과제를 향해 \n힘차고 빠르게 날아가야 합니다.\n당원 동지 여러분, \n조국혁신당의 주인은 여러분입니다.\n당의 위기 극복과 도약의 책임을 \n함께 나눠주십시오.\n평론가가 아니라 선수가 되어주십시오. \n관중석이 아니라 운동장에서 뛰어주십시오.\n주권당원 각자가 당의 지지율을 \n0.01%씩 올리겠다는 각오로 \n말하고 행동해 주십시오.\n그리고 비대위에 마음을 모아주십시오. \n부족하지만, 저를 비롯한 \n비대위원 모두가 하나가 돼서 \n작은 변화를 쌓고 있습니다. \n약속드리겠습니다. \n여러분께서 다시 자긍심을 갖도록 \n당을 완전히 새롭게 바꾸겠습니다.\n여의도에 갇히지 않겠습니다. \n더 넓고 더 다양한 \n당원 민주주의로 나아가겠습니다. \n당의 체질, 문화, 정책, 조직에 이르기까지   \n근본적인 변화를 만들어 내겠습니다. \n국민의 뜻이 당원 주권으로 발현되는 \n과감하고 획기적인 시스템을 도입하겠습니다. \n젊고 유능한 인재들이 들어올 수 있도록 \n당의 담장을 허물겠습니다. \n그러한 내용을 담은  \n조국혁신당의 뉴파티 비전을 \n준비해서 보고드리겠습니다. \n사랑하는 당원 동지 여러분, \n우리 민족 최대명절인 추석입니다. \n여러분들의 마음에 \n가장 밝은 보름달이 뜨기를 바라겠습니다. \n모두가 똑같이 행복한 \n한가위가 되기를 기도합니다.\n감사합니다.\n조국혁신당 비상대책위원장 조국 올림"}, {"id": 241, "filename": "10.4 선언 관련 메시지.txt", "title": "10.4 선언 관련 메시지", "date": "", "category": "연설·기념사", "topics": ["정치·선거개혁", "내란·윤석열", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["윤석열"], "preview": "2007년 가을, 노무현 대통령님은 걸어서 군사분계선을 넘었습니다.  6·15 공동선언이 평화의 밭을 일구었다면, 10·4 선언으로 그 밭에 평화와 번영의 씨앗을 뿌렸습니다. 결국 그 씨앗이 대화와 협력의 나무로 자라나 4·27 판문점선언과 9·19 평양공동선언의 열매를 맺었습니다. 그러나 윤석열 정부는 민주진보 정부가 국민과 함께 일군 평화의 밭을 이념과 적대로 황폐화시켰습니다. 급기야 ‘성공한 쿠데타’를 위해 전쟁을 유도하는 범죄를 도모했습...", "content": "2007년 가을, 노무현 대통령님은 걸어서 군사분계선을 넘었습니다. \n6·15 공동선언이 평화의 밭을 일구었다면, 10·4 선언으로 그 밭에 평화와 번영의 씨앗을 뿌렸습니다. 결국 그 씨앗이 대화와 협력의 나무로 자라나 4·27 판문점선언과 9·19 평양공동선언의 열매를 맺었습니다.\n그러나 윤석열 정부는 민주진보 정부가 국민과 함께 일군 평화의 밭을 이념과 적대로 황폐화시켰습니다. 급기야 ‘성공한 쿠데타’를 위해 전쟁을 유도하는 범죄를 도모했습니다. 그 사이 평화의 안전핀인 9·19 군사합의는 파기되었습니다. 역사의 후퇴입니다.\n오늘 10·4 선언 18주년을 맞아 노무현 대통령님의 그 한 걸음을 되새깁니다. 우리는 다시 한발 한발 평화의 길을 걸어나가야 합니다. \n1. 이재명 대통령이 유엔 연설에서 제시한 한반도 평화 END 이니셔티브를 뒷받침해야 합니다.  \n남북관계 개선과 북핵 문제를 동시에 해결해야 하는 난제 앞에 이 대통령의 고심을 이해하고 있습니다. 북한이 거부하는 남북 교류를 시작하기 위한 창조적 방안 마련에 적극적으로 함께 할 것입니다.\n2. 한반도 평화를 위해서도 정치개혁이 필요함을 절감합니다. \n평화가 진전될 때 대한민국 경제는 안정적 번영을 누렸습니다. 극우화된 국민의힘은 이러한 역사적 교훈을 망각한 채 한반도 문제를 극우적 해법으로 접근하고 있습니다. 평화도, 경제도, 정치도 망치는 정당입니다. 국민의힘을 반드시 반토막 이하로 줄여서 주변화하는 것이 한반도 평화의 걸림돌을 없애는 일입니다.\n3. 다시 한반도 신경제지도를 펼쳐야 합니다. 그 지도는 역대 모든 정부의 노력이 축적된 대한민국의 원대한 희망입니다. 이재명 정부에서 남과 북을 잇는, 해양과 대륙이 만나는, 과거를 딛고 미래를 여는 신경제지도 시대가 펼쳐지기를 간절히 바랍니다.\n4. 마지막으로 지금 순간에도 서로를 그리워하며 눈물 짓는 이산가족분들이 안타깝습니다. 등록된 이산가족 13만 명 가운데 80살 이상 어르신이 대부분입니다. 더 늦기 전에, 한 분이라도 평화와 상봉할 수 있는 길이 열리기를 소망합니다. \n10.4 선언 18주년을 맞이하여 조국혁신당은 한반도 평화를 위한 각오를 다집니다."}, {"id": 242, "filename": "2기 제11차 최고.txt", "title": "2기 제11차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["교육", "5.18", "윤석열", "한미동맹"], "preview": "- 2024.08.12.(월) 09:30. 본관 316호     ■ 조국 당대표 대한민국에 친일주구(親日走狗)가  다시 활개를 치고 있습니다.  하나, 둘 ‘밀정’(密偵) 또는 ‘일본 간첩’ 같은 자들이  주요 공직과 학계에 낙하산처럼 내려앉고 있습니다.     전조가 있었습니다. 작년 4월 인터뷰입니다.  “100년 전 일을 가지고 무조건 무릎 꿇어야 한다는 건,  저는 받아들일 수 없다.”  일본에 대해 윤석열 대통령이 한 말입니다.    ...", "content": "- 2024.08.12.(월) 09:30. 본관 316호\n\n \n\n■ 조국 당대표\n대한민국에 친일주구(親日走狗)가\n\n다시 활개를 치고 있습니다.\n\n하나, 둘 ‘밀정’(密偵) 또는 ‘일본 간첩’ 같은 자들이\n\n주요 공직과 학계에 낙하산처럼 내려앉고 있습니다.\n\n \n\n전조가 있었습니다. 작년 4월 인터뷰입니다.\n\n“100년 전 일을 가지고 무조건 무릎 꿇어야 한다는 건,\n\n저는 받아들일 수 없다.”\n\n일본에 대해 윤석열 대통령이 한 말입니다.\n\n \n\n윤 대통령 외교안보 책사로,\n\n‘나카소네 야스히로 상’ 수상자인\n\n김태효 국가안보실 1차장은 이럽니다.\n\n \n\n“일본이 한반도 유사 사태시 개입이 기정 사실화되는 것은\n\n평상시 대북 억지력을 증대시키는 효과를 가져올 것이다”,\n\n“자위대가 주권 국가로서 교전권을 사용하지 못하는 상태에\n\n영원히 있어야 한다는 논리는 대단히 편협하다.”\n\n \n\n김태효 차장은 대통령실이 아니라\n\n일본 총리실에 가야 하는 것 아닙니까?\n\n \n\n이런 발언은 차고 넘칩니다.\n\n“우리나라는 친일 청산할 것이 없다”라는 김광동 진실화해위원장,\n\n“일제 때 쌀 수탈이 아니라 수출”이라는 김낙년 한국학중앙연구원장,\n\n“준비 없이 근대화 흐름에 따라 밀려왔기에 실패했다”라는\n\n이배용 국가교육위원장,\n\n급기야 “1945년 8월 15일은 광복절이 아니다”\n\n라며, 광복을 부정하는 김형석씨는 독립기념관장이 됐습니다.\n\n \n\n이 모두 5·18 광주민주화운동기념관장에 전두환을 임명하는 꼴입니다.\n\n \n\n이런 의문이 듭니다.\n\n용산 대통령실이 점검하는 <공직 예비 후보자 사전 질문서>에\n\n“일본 식민 지배로 조선이 근대화되었다고 생각하느냐?”\n\n류이 질문이 있고, ‘그렇다’고 답해야\n\n후보자가 될 수 있는 것이 아닌지 의문이 들 지경입니다.\n\n \n\n친일 성향이 있었던 이승만·박정희·이명박·박근혜 정권도 이러지 않았습니다.\n\n역대 어느 대통령도 공개적으로 친일 발언을 하는 후보자를\n\n중용하지 않았습니다.\n\n친일 논란이 벌어지면 “오해”라고 해명하는 시늉이라도 했습니다.\n\n \n\n이 정권에서는 “그게 뭐가 문제냐”라면서 당당히 반박하고 나섭니다.\n\n‘검찰 쿠데타’로 정권 잡더니, ‘역사 쿠데타’를 획책하는 겁니까?\n\n'밀정'을 국가 요직에 임명하는 자가 '왕초 밀정'입니다\n\n \n\n외교부는 일본이 사도 광산에서 강제노역 역사를 지우는 것에도\n\n방치합니다. 그래서 무엇을 얻었습니까?\n\n청록파 조지훈 시인 아들인 조태열 외교부 장관님, 답해보십시오.\n\n \n\n“대한제국이 존속했다고 일제보다 더 행복했겠냐”는\n\n신원식 씨가 국방부 장관이 되었습니다.\n\n최근 조약에 준하는 한미일 군사 협약을 맺습니다.\n\n머지않아 독도 앞에 욱일기를 단 일본 전투함이 출현하고,\n\n한반도에 일본 자위대 파견대가 들어오는\n\n끔찍한 상황을 상상하지 않을 수 없습니다.\n\n \n\n‘윤석열 친일파’가 가장 나쁜 부류에 속하는 이유가 있습니다.\n\n잔혹한 식민정책의 강제성을 교묘하게 부인하는 것입니다.\n\n위안부, 징용, 수탈도 강제가 아니라 합법적이었다는 식입니다.\n\n일제의 한반도 식민지화를 긍정하는 매국적 발상입니다.\n\n \n\n앞으로 이들 목소리가 대한민국에 퍼지면,\n\n“백범 김구는 테러리스트”라거나\n\n“이완용 결정은 민족을 위한 결단”이라거나\n\n“대한민국 건국일은 1948년 8월 15일”이라는\n\n이런 주장이 득세하게 됩니다.\n\n헌법에 담긴 3·1운동과 임시정부의 의미는 뒤로 밀려납니다.\n\n \n\n역사를 잊은 민족에게 미래는 없습니다.\n\n빼앗긴 것은 도로 찾아올 수 있지만,\n\n내어준 것은 찾아올 수 없습니다.\n\n \n\n더는 안 됩니다.\n\n저희는 사흘 뒤 정부의 8·15기념식에 불참합니다.\n\n독립투사와 순국선열, 유족과 후손, 국민께 용서를 빕니다.\n\n그러나 친일파와 밀정이 가득한\n\n권력의 단상(壇上)을 도저히 바라볼 수 없습니다.\n\n \n\n조국혁신당은 ‘친일 밀정 정권’을 축출하는데 앞장 서겠습니다.\n\n수권 정당을 향해 나아가는 과정에서\n\n친일파 밀정을 한 명 한 명 색출해 국민께 고하겠습니다.\n\n \n\n일제 한반도 수탈이 합법적이었다는 자들,\n\n일제하 우리 조상은 일본 신민이었다는 자들,\n\n조선 근대화가 일제 덕분이라는 자들,\n\n평생 그렇게 떠드십시오.\n\n단, 일본으로 귀화하길 강력히 권합니다.\n\n \n\n대한민국 공직, 학계 주요 보직에는 얼씬도 못 하게 하겠습니다.\n\n저희가 막아내겠습니다.\n\n피와 땀으로 지켜낸 이 나라를 지키기 위해 끝까지 싸우겠습니다.\n\n"}, {"id": 243, "filename": "2기 제12차 최고.txt", "title": "2기 제12차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["윤석열"], "preview": "-2024.08.14.(수) 09:00 의원회관 제8간담회실    ■ 조국 당대표    최근 독립기념관 주최로 열린 국제학술행사 때 일입니다.  광복절을 부인했던 김형석 독립기념관장이 인사말을 시작했습니다.  발표자와 토론자들이 등을 돌려 앉으며 항의를 표시했습니다.     불현듯 제가 대학을 졸업하던 1986년 2월이 떠오릅니다.  전두환 독재정권의 국가보위입법회의 의원 출신  박봉식 서울대 총장이 식사를 낭독하려는 순간이었습니다.  저를 포...", "content": "-2024.08.14.(수) 09:00 의원회관 제8간담회실\n\n\n\n■ 조국 당대표\n\n\n\n최근 독립기념관 주최로 열린 국제학술행사 때 일입니다.\n\n광복절을 부인했던 김형석 독립기념관장이 인사말을 시작했습니다.\n\n발표자와 토론자들이 등을 돌려 앉으며 항의를 표시했습니다.\n\n \n\n불현듯 제가 대학을 졸업하던 1986년 2월이 떠오릅니다.\n\n전두환 독재정권의 국가보위입법회의 의원 출신\n\n박봉식 서울대 총장이 식사를 낭독하려는 순간이었습니다.\n\n저를 포함한 졸업생들은 야유와 함께 등을 돌리고 앉았습니다.\n\n그리고 집단 퇴장했습니다. 독재정권에 대한 항거였습니다.\n\n \n\n1년 뒤 1987년 2월에도 박 총장의 졸업식사 낭독 때\n\n졸업생들은 등을 돌리고 야유하다가 퇴장했습니다.\n\n그리고 다들 아시듯 4개월 뒤 6.10민주항쟁이 일어났고,\n\n전두환 정권은 몰락했습니다. 나중에 단죄를 받았습니다.\n\n \n\n지금 검찰 독재정권은 역사에서 하나도 배우지 않은 것 같습니다.\n\n30년 전 군부 독재 정권과\n\n어쩌면 그렇게 똑같은 짓을 하는지 모르겠습니다.\n\n \n\n정통성이 없던 군사정권은 ‘육법당(陸法黨)’을 만들었습니다.\n\n육사 출신 군인들과 법 전문가인 율사들로 당을 꾸리고\n\n독재정권을 운영했습니다.\n\n군 출신을 ‘유신 사무관’으로 임명해 정부 곳곳에 심었습니다.\n\n당시 법률가들은 정권의 시녀, 군의 하위 파트너였습니다.\n\n \n\n이제는 검사들이 우위에 섰습니다.\n\n과거 ‘육법당’이 이제 ‘검육당(檢陸黨)’이 된 것입니다.\n\n \n\n이들도 인사를 통해 권력기관을 장악해갑니다.\n\n검사 출신 윤석열 대통령은 후배 한동훈 법무부 장관을 시켜\n\n자기 쪽 사람들을 검찰 주요 보직에 앉힙니다.\n\n이후 김주현 민정수석을 시켜 체제를 공고화합니다.\n\n \n\n그 사이 김용현 대통령실 경호처장이 군 인사를 좌지우지합니다.\n\n김 처장은 윤석열 대통령의 충암고 1년 선배입니다.\n\n첩보부대 쓰리세븐(777) 사령부 지휘관도 충암고 출신이 됐습니다.\n\n그는 곧 국방정보본부장이 될 것이라고 떠들고 다닌다고 합니다.\n\n국군 방첩 사령관도 충암고 출신입니다.\n\n군 정보를 다루는 보직은 다 충암고로 채우려는 겁니까?\n\n충암고는 전두환 시절 ‘하나회’라도 되는 것입니까?\n\n \n\n윤 대통령은 김용현 경호처장을 국방부 장관 후보자로 내정했습니다.\n\n김 처장을 전면에 내세워 10월 장성 인사 때\n\n‘친윤’ 군인들로 채우려는 것이겠죠.\n\n \n\n경호처장 출신 국방부 장관이라뇨. 어이가 없습니다.\n\n군 출신 대통령인 박정희·전두환·노태우 정권시절에도 없었던 일입니다.\n\n \n\n윤석열 정권은 검찰과 군만 믿는\n\n군사정권 전철을 그대로 밟고 있습니다.\n\n \n\n광복절을 앞두고 윤석열 정부는 노골적인 친일파들을\n\n정부 요직에 내리꽂았습니다.\n\n윤석열 대통령은 ‘신 유신 독재정권’ 수장에다,\n\n조선총독부 10대 총독 자리까지 함께 꿰찰 생각입니까?\n\n \n\n우리는 똑똑히 기억하고 있습니다.\n\n친일 부역자의 말로가 어땠는지,\n\n군사정권의 최후가 어땠는지 말입니다.\n\n \n\n저는 벌써 그 징후를 보았습니다.\n\n앞서 말씀드린 독립기념관장 앞에 등돌린 지식인들 말입니다.\n\n국민은 이미 윤석열 대통령과 그 일당에게 마음의 등을 돌렸습니다.\n\n이제는 그들 앞에서 실제로 등을 돌려 앉을 것입니다.\n\n3년이 지나기 전에 말입니다.\n\n \n\n국민을 겁박하고 친일을 찬양하는 자들을 요직에 앉히는 인사,\n\n위헌적 행위이자, 국정농단과 다를 게 뭐가 있습니까?\n\n탄핵 마일리지가 계속 쌓이고 있습니다."}, {"id": 244, "filename": "2기 제13차 최고.txt", "title": "2기 제13차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["민생", "윤석열"], "preview": "-2024. 8. 19.(월) 본관 316호     ■ 조국 당대표  안녕하십니까? 조국혁신당 대표 조국입니다.     더불어민주당 전국당원대회에서 이재명 대표께서 선출됐습니다.  조국혁신당 모두의 기쁨을 모아 축하드립니다.  김민석·전현희·한준호·김병주·이언주 최고위원께도 축하를 보냅니다.  이 대표는 압도적 지지로 당 대표로 다시 선출되신 만큼  앞으로 해결해야 할 과제를 잘 풀어나가시리라 믿습니다.     이 대표와 저는 누군가 따따부따에...", "content": "-2024. 8. 19.(월) 본관 316호\n\n \n\n■ 조국 당대표\n\n안녕하십니까? 조국혁신당 대표 조국입니다.\n\n \n\n더불어민주당 전국당원대회에서 이재명 대표께서 선출됐습니다.\n\n조국혁신당 모두의 기쁨을 모아 축하드립니다.\n\n김민석·전현희·한준호·김병주·이언주 최고위원께도 축하를 보냅니다.\n\n이 대표는 압도적 지지로 당 대표로 다시 선출되신 만큼\n\n앞으로 해결해야 할 과제를 잘 풀어나가시리라 믿습니다.\n\n \n\n이 대표와 저는 누군가 따따부따에도 흔들리지 않는 신뢰가 있습니다.\n\n서로 힘들 때 격려하며 마음을 나누는 사이입니다.\n\n \n\n우리를 이간질하려는 이들이 있는 것 같습니다.\n\n이 대표와 저, 혁신당과 민주당이 사생결단하고 싸우면\n\n누가 웃을까요? 답은 뻔합니다.\n\n \n\n이 대표의 ‘기본사회’, 저의 ‘사회권 민생 선진국’,\n\n크게 보아 지향점이 같습니다.\n\n조국혁신당과 민주당은 검찰독재, 친일밀정 정권을 몰아낼\n\n우군이고 동지입니다.\n\n조국혁신당과 민주당은 ‘협력적 경쟁 관계’라고\n\n여러 번 말씀드렸습니다.\n\n민주주의를 회복하고 민생을 되살리기 위해\n\n양당은 물샐틈없는 밀착 공조를 할 것입니다.\n\n \n\n그러면서 조국혁신당과 민주당은 ‘선의의 경쟁’을 벌일 것입니다.\n\n지난 총선에서 증명된 바 있습니다.\n\n조국혁신당과 민주당의 경쟁으로\n\n진보·애국·민주진영은 활성화되었고 넓어졌습니다.\n\n \n\n앞으로도 혁신당은 민주당과 더 좋은 경쟁을 할 것입니다.\n\n이 경쟁은 유권자들에게 인물과 정책에서\n\n선택의 폭을 넓혀줄 것입니다.\n\n더 좋은 인물과 더 좋은 정책이 어느 쪽인가를 둘러싼\n\n뜨거운 경쟁으로 주목도는 더 올라갈 것입니다.\n\n \n\n민주진보진영 지지자와 애국시민의 결집력은 강해질 것입니다.\n\n이는 민주진보 진영 전체를 확대시킬 것입니다.\n\n그 결과 더 좋은 정권교체를 이룰 것이고,\n\n더 좋은 정부, 더 좋은 국정을 열어나갈 것이라고 확신합니다.\n\n \n\n마지막으로 한 말씀 추가합니다.\n\n민주당 의원님들은 과거 여러 차례에 걸쳐 교섭단체 기준을 완화하는 법안을 제출한 바 있습니다.\n\n22대 국회는 이 정치 개혁 과제를 실현할 절호의 기회입니다.\n\n \n\n제3의 교섭단체가 만들어지면, 개혁 과제 실현이 더 용이해집니다.\n\n이재명 대표가 민주당의 대표만이 아니라\n\n민주 진보 진영 전체의 대표 주자가 되려면,\n\n그리고 정권교체의 가능성을 더 높이려면\n\n제3의 교섭단체가 꼭 필요합니다.\n\n \n\n \n\n올 8월은 해방 이후 가장 혼란스러운 때로 기억될 것입니다.\n\n광복절이 있는 8월, 대한민국이 이처럼 쪼개졌던 때가 없었습니다.\n\n왜 그렇습니까? 윤석열 정권 때문입니다.\n\n윤석열 정권은 보수를 자칭하지만, 그렇지 않습니다.\n\n애국애족은 버린 지 오랩니다. 일본 앞잡이 같은 자들만 중용합니다.\n\n윤석열 정권은 ‘보수참칭 극우친일’ 정권에 불과합니다.\n\n \n\n일제 지배 사과에 대해 김태효 국가안보실 1차장은\n\n“중요한 것은 일본의 마음”이라고 말했고,\n\n대통령실 고위 관계자는 “일본이 수십 차례 사과해\n\n피로감이 많이 쌓여있다”라고 말했습니다.\n\n \n\n묻겠습니다. 일본 사과에 피로감을 느끼는 이들이 누구입니까?\n\n대한민국 국민입니까? 일본 우익입니까?\n\n우리 국민 중 일본 사과에 피로감을 느끼는 이가 많습니까?\n\n아니면, “독도는 일본 땅”이라는 억지에\n\n피로감을 느끼는 사람이 많습니까?\n\n귀하들의 국적은 도대체 어디입니까?\n\n \n\n윤석열 대통령의 술 취한 듯한 갈지(之)자 행보가 더 문제입니다.\n\n2023년 8월 국민의힘 연찬회에서 윤석열 대통령은\n\n“제일 중요한 게 이념”이라고 말했습니다.\n\n최근 건국절 논란에 “민생과 동떨어진 불필요한 이념 논쟁이다.\n\n먹고살기 힘든 국민들에게 무슨 도움이 되겠느냐”라고 말했습니다.\n\n그리곤 8·15 경축사는 ‘자유, 대북 강경 메시지’로 채웁니다.\n\n극우 단체장 같은 이념만 내세우고, 민생 이야기는 한 줄도 없습니다.\n\n도대체 윤석열 정권이 하고 싶은 일은 무엇입니까?\n\n \n\n저희는 보수다운 보수와 경쟁하고 싶습니다.\n\n친일 밀정 정권, 검찰 독재 정권 말고 말입니다.\n\n호소합니다. 집 나간 진짜 보수를 찾습니다."}, {"id": 245, "filename": "2기 제14차 최고.txt", "title": "2기 제14차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["교육", "윤석열", "한미동맹"], "preview": "-2024. 8. 21.(수) 본관 316호        ■조국 당대표  대통령은 국민을 통합하기 위한 노력을 멈추면 안 됩니다.  그러나 윤석열 대통령은 정반대의 길을 갑니다.  국민을 통합하기는커녕 끊임없이 갈라치고 분열시키려고 합니다.     윤 대통령에게 5천만 국민은 안중에도 없고,  내 편과 적만 보이는 것 같습니다.  검사만 해봤기 때문일까요?  마주한 사람이 피의자냐, 아니냐만 따질 것입니다.     그제 한미 연합군사훈련인 ‘을...", "content": "-2024. 8. 21.(수) 본관 316호\n\n \n\n \n\n■조국 당대표\n\n대통령은 국민을 통합하기 위한 노력을 멈추면 안 됩니다.\n\n그러나 윤석열 대통령은 정반대의 길을 갑니다.\n\n국민을 통합하기는커녕 끊임없이 갈라치고 분열시키려고 합니다.\n\n \n\n윤 대통령에게 5천만 국민은 안중에도 없고,\n\n내 편과 적만 보이는 것 같습니다.\n\n검사만 해봤기 때문일까요?\n\n마주한 사람이 피의자냐, 아니냐만 따질 것입니다.\n\n \n\n그제 한미 연합군사훈련인 ‘을지 자유의 방패’가 시작됐을 때\n\n윤 대통령은 국무회의에서 “자유민주주의 체제를 위협하는\n\n반국가세력들이 곳곳에서 암약하고 있다”고 말했습니다.\n\n \n\n앞서 8?15 경축사에서는 느닷없이\n\n“사이비 지식인들은 가짜 뉴스를 유통시키며,\n\n기득권 이익집단을 형성하고 있다”고 말했습니다.\n\n‘반자유 세력, 반통일 세력, 검은 선동 세력’이라고 말했습니다.\n\n \n\n지난해에도 갈라치기 발언은 이어졌습니다.\n\n4?19혁명 기념사에서\n\n“거짓과 선동, 날조로 민주주의를 위협하는 세력들은\n\n독재와 전체주의 편을 들면서도\n\n겉으론 민주주의 운동가, 인권 운동가 행세를 한다”고 말했습니다.\n\n \n\n광복절 경축사에선 “공산 전체주의를 맹종하며 여론을 왜곡하고\n\n사회를 교란하는 반국가 세력들이 활개치고 있다”라고 했습니다.\n\n이렇게 21세기 대한민국에서 대통령이란 사람이\n\n이승만, 박정희, 전두환 등 독재자가 했던 말을 반복하고 있습니다.\n\n \n\n자신의 일을 반대하는 이들에게는 ‘카르텔’이라는 딱지를 붙입니다.\n\n \n\n의대 정원 증원을 반대하는 의대 교수에게\n\n“반지성적, 반민주적 세력, 의사 직역 카르텔”이라고 규정했습니다.\n\n과학계, 사교육 시장, 노조, 시민단체에도 ‘카르텔’이라고\n\n낙인을 찍어 공격합니다.\n\n \n\n윤석열 대통령에게 묻겠습니다.\n\n도대체 반국가세력, 사기꾼, 검은 세력은 누구입니까?\n\n윤석열 정권을 비판하는 야당이 반국가세력입니까?\n\n친일 매국적 행태를 비판하는 학자와 지식인이 사기꾼입니까?\n\n아니면 대통령을 지지하지 않는 국민 60%가 검은 세력입니까?\n\n가히 ‘통합 파괴왕, 국민 분열왕’이라 부를만 합니다.\n\n \n\n윤 대통령은 2022년 대선에서 0.73%포인트 차로 당선됐습니다.\n\n그 선거 결과에 대해 윤 대통령 자신이 뭐라고 했는지 기억하십니까?\n\n이렇게 말했습니다.\n\n“국민을 편 가르지 말고 통합의 정치를 하라는 국민의 간절한 호소다.\n\n이러한 국민의 뜻을 결코 잊지 않겠다”라고 말했습니다.\n\n \n\n그래놓고 국민 갈라치기에 바로 돌입합니다.\n\n윤 대통령은 취임사에서 비판 세력, 야당에 대해\n\n“다수의 힘으로 상대의 의견을 억압하는 반지성주의”라고 비난했습니다.\n\n참으로 황당합니다.\n\n \n\n총선 민의가 반영된 국회 다수결정을 깡그리 무시하고\n\n반대세력을 억압하고 자기 마음대로 국정을 운영하는 것이\n\n바로 반지성주의 아닙니까.\n\n \n\n야당과 협치는 생각조차 하지 않습니다.\n\n내내 적으로 삼고 끊임없이 입틀막을 시도합니다.\n\n이게 검찰독재 정권의 본질입니다.\n\n \n\n스웨덴 예테보리 대학 민주주의 다양성 연구소가 지난 3월\n\n연례 보고서 ‘민주주의 리포트’를 냈습니다.\n\n한국은 179개 나라 중 47위를 기록했습니다.\n\n2019년 18위, 2020년/2021년 17위에서\n\n2022년 28위로 내려앉았습니다.\n\n연구소는 한국을 ‘독재화가 진행 중’인 42개국 중 하나로 꼽았습니다.\n\n \n\n자, 우리 국민은 어떻게 해야 할까요?\n\n마침 윤석열 대통령은 취임사에서 말한 구절을 들려드리고 싶습니다.\n\n“자유는 결코 승자독식이 아니다.\n\n어떤 사람의 자유가 유린되거나\n\n자유 시민이 되는데 필요한 조건을 충족하지 못한다면\n\n모든 자유 시민은 연대해서 도와야 합니다.”\n\n \n\n맞습니다.\n\n자유는 윤석열 정권의 전유물이 아닙니다.\n\n우리 자유 시민은 연대해서 서로 도와야 합니다.\n\n그것이 바로 검찰 독재정권에 맞서는 길입니다.\n\n감사합니다."}, {"id": 246, "filename": "2기 제15차 최고.txt", "title": "2기 제15차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["교육", "민생", "윤석열", "부동산"], "preview": "-2024. 8. 23.(금) 국회 본관 조국혁신당 회의실(224호)     ■ 조국 당대표  최근 한국은행에서 내놓는 통계를 보면 암울합니다.  올 실질 국내총생산 GDP 성장률 전망치를  2.5%에서 2.4%로 하향 조정했습니다.     가계 빚은 계속 늘어 역대 최고치를 기록 중입니다.  올 4월부터 6월까지 2분기 가계신용 잔액은  1,896조 2,000억원을 기록했습니다.  가계신용 잔액은 금융권 전체 가계 대출과  카드사, 백화점 등...", "content": "-2024. 8. 23.(금) 국회 본관 조국혁신당 회의실(224호)\n\n\n\n\n■ 조국 당대표\n\n최근 한국은행에서 내놓는 통계를 보면 암울합니다.\n\n올 실질 국내총생산 GDP 성장률 전망치를\n\n2.5%에서 2.4%로 하향 조정했습니다.\n\n \n\n가계 빚은 계속 늘어 역대 최고치를 기록 중입니다.\n\n올 4월부터 6월까지 2분기 가계신용 잔액은\n\n1,896조 2,000억원을 기록했습니다.\n\n가계신용 잔액은 금융권 전체 가계 대출과\n\n카드사, 백화점 등 판매 신용을 더한 액수입니다.\n\n \n\n통계를 잡기 시작한 2002년 4분기 이래 가장 큰 규모입니다.\n\n1분기 말 대비 13조 8,000억원 늘었습니다.\n\n \n\n가계 빚은 지난해 2분기 이후 계속 늘다가 올 1분기에\n\n3조 1,000억원 줄었습니다.\n\n그러다 한 분기 만에 다시 늘었습니다.\n\n \n\n걱정입니다. 가계 빚 시한폭탄의 초침이 째깍거리고 있습니다.\n\n \n\n집을 사기 위해 빚을 많이 냈기 때문입니다.\n\n주택담보대출 잔액이 전분기보다 16조 원이나 늘었습니다.\n\n900조 원대이던 주택담보대출액은 윤석열 정부 출범 후\n\n2022년 2분기 1,002조 원이 됐습니다.\n\n그 뒤에 꾸준히 늘어 올 1분기 1,076조 7,000억 원,\n\n2분기 1,092조 7000억 원이 됐습니다.\n\n \n\n빚을 져서라도 집을 사는 이유가 있습니다.\n\n윤석열 정부는 출범 이후부터 부동산 정책을\n\n부동산 경기 부양에 맞췄습니다.\n\n \n\n시중 금리를 낮추도록 은행을 압박했습니다.\n\n정책자금도 대거 공급했습니다.\n\n특례보금자리 대출, 신생아 특례대출 등입니다.\n\n종합부동산세를 없애겠다고 노래를 불렀습니다.\n\n총부채 원리금 상환비율, 즉 DSR 산정 때 가산금리를 부과해\n\n대출 한도를 줄이는 스트레스 DSR 금리 규제를 두 달 연기했습니다.\n\n \n\n정부가 집 사라고 국민 등을 떠미는 꼴입니다.\n\n그 결과 집 값은 오르고, 거래량은 늘었습니다.\n\n \n\n내수 부진 등을 이유로 금리 인하 요인이 있습니다.\n\n그런데 한국은행은 기준금리를 연 3.50%로 동결했습니다.\n\n한은 설립 이래 가장 긴, 13차례 연속 동결 기록입니다.\n\n집값 급등, 가계대출 증가세, 불안한 물가 등이 그이유입니다.\n\n \n\n오죽하면 이창용 한국은행 총재가 “그간 경기가 나빠지면\n\n부동산을 좋게 해서 경기를 부양하는 모습을 반복됐는데,\n\n금통위원들은 그런 고리를 끊어낼 때가 됐다는 의견을 냈다”\n\n라고 말했습니다.\n\n \n\n빚은 늘고 금리가 높으면 누가 고생합니까?\n\n집 사고 생활하는 데 빚을 낸 서민과 중산층만 힘들어집니다.\n\n \n\n이 판국에도 윤석열 정권은 부자 감세만 눈독 들입니다.\n\n틈만 나면 종합부동산세를 줄여주려고 합니다.\n\n내년 시행할 금융투자 소득세는 없애자고 합니다.\n\n상속세와 증여세를 대폭 줄여주겠다 합니다.\n\n상위 1%의 국민에게만 혜택을 주겠다는 것입니다.\n\n \n\n정부가 돌봐야 할 국민은 자손들에게 큰 돈을 물려줄 부자,\n\n주머니가 넉넉하다 못해 넘쳐나는 사람들이 아닙니다.\n\n \n\n뼈 빠지게 일해서 받은 월급에서 대출금을 갚으면\n\n외식은커녕 자녀 학원비를 걱정해야 하는 서민들입니다.\n\n월급 주고 월세 내면 몇 푼 안 남는 소상공인들입니다.\n\n \n\n요즘 서민들은 코로나 시국보다 어렵다고 아우성입니다.\n\n국가는 국민에게 손을 내밀어야 합니다.\n\n국민에게 필요한 지원금을 드려야 할 필요가 커졌습니다.\n\n단지 현금을 살포하는 게 아니라,\n\n민생을 살리고 소비를 진작시킬 마중물입니다.\n\n우리 경제에 선한 작용을 할 것입니다.\n\n \n\n \n\n요즘 기쁜 소식이 별로 없는데 기쁜 소식이 하나 있습니다.\n\n일본 전국고교야구선수권대회, 즉 고시엔은 꿈의 무대로 불립니다.\n\n재일 한국계 민족학교인 교토국제고가 그곳 결승전에 진출했습니다.\n\n이미 역대 최고 성적을 기록했습니다.\n\n \n\n오늘 결승전이 열립니다.\n\n마침 100주년을 맞이한 고시엔 구장에\n\n승리의 기쁨을 담은 한국어 교가가 다시 한번\n\n우렁차게 울려 퍼지기를 응원하고 또 응원하겠습니다.\n\n고시엔의 결승에서 다시 한 번  교토국제고가 우승하길 바랍니다.  교토국제고 화이팅!"}, {"id": 247, "filename": "2기 제16차 최고.txt", "title": "2기 제16차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["지방선거", "윤석열"], "preview": "-24.08.26.(월) 09:30 본관 224호     ■조국 대표  안녕하십니까? 조국혁신당 조국 대표입니다.  저는 파리 올림픽 때 우리 양궁팀을 유심히 봤습니다.  이번에도 한국 양궁이 세계를 지배했습니다.  우리 양궁팀은 왜 강할까요?  비결은 두 가지입니다. 경쟁과 협력입니다.     양궁 국가대표 선발전에서 선수들은 치열하게 실력으로 경쟁합니다.  학연, 지연, 파벌은 끼어들지 못합니다.  따라서 선수들은 끊임없이 자기를 계발하고 ...", "content": "-24.08.26.(월) 09:30 본관 224호\n\n \n\n■조국 대표\n\n안녕하십니까? 조국혁신당 조국 대표입니다.\n\n저는 파리 올림픽 때 우리 양궁팀을 유심히 봤습니다.\n\n이번에도 한국 양궁이 세계를 지배했습니다.\n\n우리 양궁팀은 왜 강할까요?\n\n비결은 두 가지입니다. 경쟁과 협력입니다.\n\n \n\n양궁 국가대표 선발전에서 선수들은 치열하게 실력으로 경쟁합니다.\n\n학연, 지연, 파벌은 끼어들지 못합니다.\n\n따라서 선수들은 끊임없이 자기를 계발하고\n\n혁신하는 노력을 멈추지 않습니다.\n\n \n\n그러나 국가대표가 되면 ‘원팀’으로 거듭납니다.\n\n서로 의지하며 밀고 끌어줍니다.\n\n개인전에서는 철저한 경쟁자로, 단체전에서는 든든한 원팀으로 뜁니다.\n\n‘경쟁과 협력’, 바로 조국혁신당이 추구하는 선거 전략입니다.\n\n \n\n저희가 재보궐선거에 뛰어든다니까, 우려하는 목소리가 나옵니다.\n\n예컨대, “민주당에 도움이 안 된다, 민주진보진영에 해가 될 것이다” 등의 주장이 나옵니다.\n\n지난 2월 조국혁신당 창당 때도 똑같은 주장이 나왔습니다.\n\n4월 총선 결과는 어땠습니까?\n\n정반대였습니다. 민주진보진영이 압승했습니다.\n\n조국혁신당이 없었다면 민주당과 야당 의석수가\n\n지금 민주당과 조국혁신당을 합친 숫자와 비슷했을까요?\n\n저는 훨씬 적었을 것이라고 생각합니다.\n\n \n\n조국혁신당은 10월 재보궐선거에서 후보를 내고\n\n야당들, 특히 민주당과 경쟁하며 협력하겠습니다.\n\n \n\n호남에서 치열하게 경쟁하겠습니다. 세 가지 이점(利點)이 있습니다.\n\n \n\n첫째, 호남 정치가 활성화됩니다.\n\n호남은 사실상 민주당 일당 독점 상태입니다.\n\n고인 물은 썩습니다. 흐르게 해야 합니다.\n\n앞으로 조국혁신당은 누가 더 좋은 사람과 정책을\n\n내놓느냐로 경쟁할 것입니다.\n\n기존 네트워크가 아닌 새로운 통로가 생기고,\n\n제2, 제3의 ‘김대중, 노무현’이 발굴될 것입니다.\n\n \n\n둘째, 조국혁신당이 단체장을 배출하거나 지방의회에 들어가면\n\n지방정치가 혁신됩니다.\n\n지방정부와 지방의회 사이에 생산적 긴장이 만들어집니다.\n\n지방의회는 지방정부에 대해서 더 좋은 견제를 할 수 있습니다.\n\n지방의회 내에서의 ‘짬짜미’ 가능성도 사라집니다.\n\n이러한 변화는 모두 유권자들의 이익이 됩니다.\n\n \n\n셋째, 유권자 선택의 폭이 넓어집니다.\n\n지금까지 민주당 후보나, 민주당 성향 무소속 후보를 찍어야 했습니다.\n\n앞으로 참신한 혁신당 후보가 3번 기표 칸에 자리하게 됩니다.\n\n주민들은 더 많은 후보 중 더 좋은 후보를 택할 수 있게 됩니다.\n\n \n\n국민의힘 독점으로 질식 상태인 영남 정치에도 숨구멍을 내겠습니다.\n\n민주당 후보보다 더 좋은 지역 후보를 내겠습니다.\n\n최근 영입한 류제성 변호사는 어느 후보보다 훌륭하다고 자부합니다.\n\n민주당이 후보를 내지 못하는 지역에도 과감히 후보를 내겠습니다.\n\n이곳에서도 독점을 깨고, 견제하며, 선택의 폭을 넓힐 것입니다.\n\n영남 지역에서 민주당과 경쟁하되, 당선을 위해 연대할 수도 있을 것입니다.\n\n \n\n겸허한 마음으로, 지난 총선에서 조국혁신당에 한 표를 주셨던\n\n690만 명의 국민께 여쭙겠습니다.\n\n \n\n혁신당 후보가 지역에서 당선되면 윤석열 정권에 좋은 일일까요?\n\n혁신당이 커지면 윤석열 정권에 고개를 숙이고 타협할까요?\n\n“천만의 말씀, 만만의 콩떡”입니다.\n\n“3년은 너무 길다”라며 친일 밀정 검찰독재 정권 축출의 깃발을\n\n가장 높이 든 혁신당이 세를 넓혀갈수록, 탄핵의 힘은 커집니다.\n\n정권교체의 가능성은 높아집니다.\n\n \n\n오는 10월 재보궐 선거에서 몇 명이 당선되든, 결과가 어떻든,\n\n저희는 계속 도전할 것입니다.\n\n내년 4월 재보선, 2026년 지방선거 선거 등 모든 선거에서\n\n후보를 내겠습니다.\n\n그러면서 경쟁과 협력을 계속해나갈 것입니다.\n\n올해 총선에서 대승한 것처럼 앞으로도\n\n이 승리 공식은 성공적으로 작동할 것입니다.\n\n \n\n애국 시민과 민주진보진영이 싸우고 물리쳐야 할 대상은 명확합니다.\n\n기득권, 짬짜미, 연고주의입니다.\n\n그리고 이를 모두를 합친 것보다 더 나쁜 것은 윤석열 정권입니다.\n\n \n\n조국혁신당과 민주당의 최종 목표는 같습니다.\n\n윤석열 정권의 조기 종식, 국민의힘 재집권 저지입니다.\n\n그 목표를 달성할 현실적 방법은 오로지 경쟁과 협력입니다. 감사합니다."}, {"id": 248, "filename": "2기 제17차 최고.txt", "title": "2기 제17차 최고", "date": "", "category": "최고위원회", "topics": ["인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["교육", "윤석열", "의료"], "preview": "- 2024.08.28.(수) 본관 224호     ■ 조국 당대표     윤석열 정권은 희한한 사람들로 가득 차 있습니다.     윤석열 검사는 박근혜 대통령을 뇌물죄로 잡아넣었습니다.  그런데 그 윤석열 대통령이 노동부 장관 후보로 지명한 인사는  “박근혜는 뇌물 안 받았다”라고 강변합니다.  원칙도 기준도 없는 대동단결입니까?  그 후보자는 경술국치 이후 한국인은 일본인이었다고 합니다.  이런 인사(人事)가 정상입니까?     온 나라가 ...", "content": "- 2024.08.28.(수) 본관 224호\n\n \n\n■ 조국 당대표\n\n \n\n윤석열 정권은 희한한 사람들로 가득 차 있습니다.\n\n \n\n윤석열 검사는 박근혜 대통령을 뇌물죄로 잡아넣었습니다.\n\n그런데 그 윤석열 대통령이 노동부 장관 후보로 지명한 인사는\n\n“박근혜는 뇌물 안 받았다”라고 강변합니다.\n\n원칙도 기준도 없는 대동단결입니까?\n\n그 후보자는 경술국치 이후 한국인은 일본인이었다고 합니다.\n\n이런 인사(人事)가 정상입니까?\n\n \n\n온 나라가 ‘딥 페이크’ 사태로 들끓고 있습니다.\n\n주무 부서여야 할 여성가족부 장관 자리는 반년째 비어 있습니다.\n\n여성가족부 장관 후보자들은 모두 제 부처를 없애겠다고만 했습니다.\n\n대통령이 ‘자해 자폭’을 할 장관을 부처에 보낸 것입니다.\n\n이게 정상입니까?\n\n \n\n의료체계가 무너져갑니다. 환자는 길거리를 전전합니다.\n\n지친 간호사들은 파업할 참입니다.\n\n그런데 복지부 장관과 교육부 장관은 용산 눈치나 보고 있습니다.\n\n \n\n농가 부채는 한 가구당 4천만 원이 넘고\n\n쌀값은 폭락하고 있음에도 빨간약 바르듯 찔끔찔끔 처방하는 농림부 장관,\n\n오락가락 금융정책과 세수 펑크로 국가?가계 부채가\n\n3,000조 원을 넘게 만든 기재부 장관,\n\n일본이 식민지 불법성을 부정해도 입 닫고\n\n용산 눈치만 보는 외교부 장관,\n\n이들이 정상입니까?\n\n \n\n“제가 법을 만들어야 하느냐”라면서 대통령 배우자를 감싸는\n\n법무부 장관, 가히 김건희 씨 개인 변호인 같습니다.\n\n“살아있는 권력” 수사는 포기한 지 오래입니다.\n\n \n\n방송통신위원장은 공영방송 이사 후보를 뽑는답시며\n\n95분 동안 83명의 서류 검토를 끝냈습니다.\n\n한 명당 1분 9초씩 점검한 것인데,\n\n‘관심법’으로 뽑았습니까?\n\n법원에서는 이러한 임명을 멈추라고 제동을 걸었습니다.\n\n \n\n오죽하면 ‘1919년 임시정부 수립’이라는 당연한 사실을 인정한\n\n문화체육관광부 장관이 야당의 칭찬을 받겠습니까?\n\n \n\n넉 달 전에 사퇴하겠다던 국무총리,\n\n작년에는 ‘간호법’ 제정안에 대해 대통령 거부권을 건의하더니,\n\n이제는 이름만 살짝 바꾼 ‘간호사법’을 통과시켜 달라고 합니다.\n\n \n\n군사 정권도 일이 잘못되면 민심의 눈치를 봤습니다.\n\n박정희 정권은 1973년 김대중 납치사건 때 전면 개각했습니다.\n\n전두환, 노태우 정권도 국면전환을 위해 개각했습니다.\n\n \n\n윤석열 정권이 지침서로 삼는 이명박 정부 때는 어땠을까요?\n\n미국산 소고기 파동 때 총리와 장관들은 사표를 제출했습니다.\n\n박근혜 정부 때는 세월호 참사 때 총리가 사직했습니다.\n\n \n\n윤석열 정권 사람들은 어떻습니까?\n\n끼리끼리 자기들 배만 불리며, 힘없는 서민 호주머니를 텁니다.\n\n항의하면 귀를 닫고, 용산 눈치만 봅니다.\n\n집권 3년 차에도 전 정부를 탓하며\n\n국정이 왜 이 모양인지 설명도 못 합니다.\n\n \n\n국민의 분노는 임계점으로 치닫고 있습니다.\n\n집값은 월급보다 빠르게 오르고,\n\n가난할수록 더 가난해집니다.\n\n다쳐서 병원에 가도 의사 얼굴을 못 봅니다.\n\n \n\n이제 국민은 더 버틸 여력이 없습니다.\n\n서울대 보건대학원 유명순 교수팀 조사에 따르면\n\n국민 절반가량이 장기적인 울분 상태라고 합니다.\n\n10명 중 1명은 울분 상태가 심각한 수준이고,\n\n30대가 특히 높은 수준의 울분을 호소한답니다.\n\n \n\n국민의 이름으로 요구합니다. 책임지십시오.\n\n한덕수 총리는 즉각 사임하십시오.\n\n윤석열 정부 내각은 당장 총사퇴하십시오.\n\n대통령실도 모두 사표를 내십시오.\n\n \n\n검찰 출신이 아닌 사람으로,\n\n친일?매국이 아닌 사람으로 교체하십시오.\n\n정부에 들어가겠다는 사람이 정 없으면\n\n부처 차관과 차관보들을 장관으로 임명해서\n\n통상적인 일만이라도 하게 하십시오.\n\n \n\n나라를 더 이상 망치지 말고\n\n나라의 기본 틀만이라도 보존해서 다음 정권에 넘기길 바랍니다."}, {"id": 249, "filename": "2기 제19차 최고.txt", "title": "2기 제19차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["지방선거", "교육", "윤석열", "의료"], "preview": "-2024.09.02.(월) 09:30. 본관 224호     ■ 조국 당대표     ◎ 윤석열 대통령이 4대 개혁 국정 브리핑 때  “의료현장을 가 보시라. 비상 진료 체계가 원활히 가동된다”고 말했습니다. 귀를 의심했습니다.     대한민국 의료현장은 지금 아수라장입니다.  “열사병으로 쓰러진 기초 수급자, 응급실 뺑뺑이 돌다 사망”  “환자 뺑뺑이 응급실 위기, 눈 가리기 대책 탓에 악화”  “이틀간 뺑뺑이 3건, 사망 2건을 봤다…숨넘어...", "content": "-2024.09.02.(월) 09:30. 본관 224호\n\n \n\n■ 조국 당대표\n\n \n\n◎ 윤석열 대통령이 4대 개혁 국정 브리핑 때\n\n“의료현장을 가 보시라. 비상 진료 체계가 원활히 가동된다”고 말했습니다. 귀를 의심했습니다.\n\n \n\n대한민국 의료현장은 지금 아수라장입니다.\n\n“열사병으로 쓰러진 기초 수급자, 응급실 뺑뺑이 돌다 사망”\n\n“환자 뺑뺑이 응급실 위기, 눈 가리기 대책 탓에 악화”\n\n“이틀간 뺑뺑이 3건, 사망 2건을 봤다…숨넘어가는 응급실 체험기”\n\n진보 매체가 아닌, 친윤 신문 조선일보 기사입니다.\n\n윤 대통령이 조선일보도 보지 않고,\n\n정부 찬양 극우유튜브만 본다는 말을 믿지 않을 수 없습니다.\n\n \n\n올해 상반기 119 재이송 건수는 2,600건을 넘었습니다.\n\n40%는 의사가 없었기 때문입니다.\n\n대학병원 전문의들은 사직해서 돌아오지 않고 있고,\n\n응급실 의료진은 반년째 당직근무 중입니다.\n\n간호사들은 밥 먹을 시간이 없어 김밥 한 줄로 버티고 있습니다.\n\n곧 올 추석에는 상황이 더 심각해질 것입니다.\n\n \n\n대한민국 의료체계는 세계가 부러워했습니다.\n\n그런데 반 년만에 아프면 안 되는 나라,\n\n다치면 안 되는 나라가 되어버렸습니다.\n\n \n\n우리 국민은 똑똑히 기억하고 있습니다.\n\n지난 총선에서 대파 가격 폭등 때 윤석열 대통령이 뭐라고 했습니까.\n\n마트에 가서 “875원이면 합리적”이라고 말했지요\n\n윤석열 대통령이 얼마나 국민 삶을 등한시하는지,\n\n현실에서 동떨어져 사는지 여실히 보여줬습니다.\n\n \n\n그 대통령에 그 장관들입니다.\n\n이주호 교육부 장관은 국민의힘 연찬회에서\n\n“6개월만 버티면 우리가 이긴다”라고 말했습니다.\n\n조규홍 복지부 장관은 그 연찬회에서\n\n“과장된 것이 많다”라고 말했습니다.\n\n윤석열 정권 사람들에게 현재가 태평성대(太平聖代)입니다.\n\n \n\n윤석열 대통령에게 경고합니다.\n\n새로 설치한 관저 사우나룸에서 몸을 풀 시간에\n\n의료현장을 가보십시오.\n\n능력이 없으면 손을 떼고, 국회에 넘기십시오.\n\n \n\n대한민국은 아프고, 3년은 너무 깁니다.\n\n \n\n \n\n◎ 곧 추석입니다. 그리고 10월 16일 재보궐 선거가 치러집니다.\n\n저는 추석 연휴에도 선거가 치러지는 곳을 찾아\n\n민심을 청취하고 선거 상황을 챙겨볼 생각입니다.\n\n \n\n지난 2월 13일 조국혁신당 창당선언에서부터 지금까지\n\n저는 조국혁신당 대표로서\n\n윤석열 정권 심판과 확실한 정권교체를 위해\n\n지역구에서 1대1 구도를 만들겠다고 약속했고,\n\n그렇게 해서 총선 대승을 견인했습니다.\n\n \n\n이번 재보궐선거에서도 저희는 윤석열 정권 심판과\n\n확실한 정권교체를 위한 길을 택하겠습니다.\n\n \n\n첫 번째, 부산 금정구청장 보궐선거에서\n\n1 대 1 구도를 만들어 국민의힘에 맞설 것입니다.\n\n이곳은 역대 여덟 번 선거에서 국민의힘이 일곱 번 이긴 험지입니다.\n\n그러나 저희는 1대1 구도를 만들어\n\n국민의힘을 꺾는 파란을 일으키겠습니다.\n\n조국혁신당 류제성 후보가 모든 면에서\n\n‘승리할 수 있는 야권 단일후보’라고 확신합니다.\n\n \n\n두 번째 강화군수 보궐선거에서 조국혁신당은 후보를 내지 않을 것입니다.\n\n대신 민주당에 힘을 보태겠습니다. 그래서 승리 가능성을 키우겠습니다.\n\n \n\n세 번째 서울시 교육감 보궐선거도 열립니다.\n\n물론 법상 정당은 후보를 내지 못합니다.\n\n그렇지만 조희연 교육감께서 만들어두신\n\n혁신 교육정책이 계승 발전될 수 있도록,\n\n마음과 뜻을 모을 것입니다.\n\n \n\n네 번째 호남에서는 민주당과 치열하게 경쟁하겠습니다.\n\n호남에서는 조국혁신당과 민주당 어느 후보가 당선되더라도\n\n윤석열 정권이나 국민의힘의 힘이 강해지는 일은 없습니다.\n\n영광과 곡성, 곡성과 영광에서 민주당과 정정당당히 겨루겠습니다.\n\n \n\n호남에서 조국혁신당과 민주당이 경쟁하면 좋은 점만 있습니다.\n\n지역 정치가 활기를 띠고, 지방 정치가 혁신되며,\n\n유권자들의 선택 폭이 넓어집니다.\n\n어떤 분들은 “대선 승리를 위해 혁신당은 지방선거 후보를\n\n내지 말아야 한다”라고 말합니다.\n\n이치에 맞지 않습니다.\n\n \n\n공식적으로 23대 대통령 법정 선거일은 900일 이상 남았습니다.\n\n우리 당은 이 시간을 당기기 위해 전력투구하고 있습니다.\n\n언제일지 모르지만, 이 대선을 위해\n\n조국혁신당이 한 달 뒤 재보궐 선거를 포기해야 한다는 말인가요?\n\n현재 민주당 후보들 사이에 벌어지고 있는 치열한 경쟁은 좋은 일이고,\n\n조국혁신당과 민주당 간의 경쟁은 나쁜 일인가요?\n\n이렇게 되묻고 싶습니다.\n\n \n\n정권교체를 위한 결기와 열망은\n\n조국혁신당이 그 어느 정당보다 앞섭니다.\n\n조국혁신당이 승리하면, 현 정권을 퇴출하기 위한 힘은 더 강해집니다.\n\n \n\n윤석열 정권과 단호히 싸우고, 제4기 민주정부를 수립하기 위해\n\n조국혁신당은 민주당과 철두철미하게 협력할 것입니다.\n\n대신 더 좋은 지방정치, 더 좋은 지역발전 정책,\n\n새로운 지역인재 발굴을 놓고는 민주당과 경쟁을 벌일 것입니다.\n\n설사 이번 재보궐선거에서 조국혁신당이 지더라도 말씀드렸던 세가지를 놓고선 계속 도전하고 민주당과 경쟁할 것입니다.\n\n \n\n확실한 대선 승리를 위해서 경쟁해야 합니다.\n\n경쟁 없이 승리 없습니다.\n\n경영학에서 모두 인정하는 성공전략으로 인정되고 있는 용어를 쓰면,\n\n‘코피티션’(Co-petition) 그것이 바로 승리의 길입니다.\n\n그래야 민주진보진영이 더 넓어지고, 더 탄탄해질 수 있습니다.\n\n이는 더 좋은 정치혁신, 더 좋은 정권교체,\n\n더 탄탄하고 확장된 지지기반 확보로 이어질 것입니다. 감사합니다."}, {"id": 250, "filename": "2기 제2차 최고.txt", "title": "2기 제2차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["민생", "윤석열"], "preview": "2024. 7. 22. 9:30 본청 316호     ■ 조국 당대표  반갑습니다. 조국입니다.  당 대표로 뽑아주신 당원동지들께 감사드립니다.     대표에서 물러나 주위를 둘러볼 짬이 생겼습니다.  지금 이 나라가 어디로 가는지 살펴봤습니다.  뭐 하나 제대로 돌아가는 게 없습니다.  정치, 경제, 민생, 외교, 통일, 사회 다 살펴봤는데  잘하는 것, 칭찬할만한 것, 하나도 없습니다. 그냥 캄캄합니다.     윤석열 대통령과 김건희 씨는 ...", "content": "2024. 7. 22. 9:30 본청 316호\n\n \n\n■ 조국 당대표\n\n반갑습니다. 조국입니다.\n\n당 대표로 뽑아주신 당원동지들께 감사드립니다.\n\n \n\n대표에서 물러나 주위를 둘러볼 짬이 생겼습니다.\n\n지금 이 나라가 어디로 가는지 살펴봤습니다.\n\n뭐 하나 제대로 돌아가는 게 없습니다.\n\n정치, 경제, 민생, 외교, 통일, 사회 다 살펴봤는데\n\n잘하는 것, 칭찬할만한 것, 하나도 없습니다. 그냥 캄캄합니다.\n\n \n\n윤석열 대통령과 김건희 씨는 국정의 모든 면에서 선을 넘습니다.\n\n정부 부처도 두 사람의 심기와 안위를 보호하는데 여념이 없습니다.\n\n \n\n검찰이 김건희 씨 조사를 12시간가량 했다는데,\n\n정부 보안청사라는 곳으로 불렀답니다.\n\n이명박, 박근혜, 노무현 대통령을 검찰청사에 출두시켰던 검찰입니다.\n\n검찰청사는 경호와 안전이 보장 안 되는 곳입니까?\n\n좀 말 같은 해명이라도 했으면 좋겠습니다.\n\n \n\n조사 장소를 놓고 시비가 일자 검찰은 청와대 사랑채 인근\n\n대통령 경호처 부속청사라고 언론에 슬그머니 흘립니다.\n\n이 장소를 김건희 씨 측이 정했다는 보도도 나옵니다.\n\n대통령실 안방을 찾아가 조사한 것과 하등 다를 바 없습니다.\n\n대한민국 검찰이 언제부터 피의자 말을 이렇게 고분고분 따랐습니까?\n\n \n\n이 소식을 들으니 이 나라의 진정한 VIP가 누군지 감이 왔습니다.\n\n이 정도면 ‘중전마마 조사’를 넘어, ‘여제(女帝) 조사’ 아닙니까?\n\n김건희 씨가 ‘한국판 측천무후’입니까?\n\n \n\n김건희 씨의 변명을 받아쓰는데 시간을 다 보낸 것 아닙니까?\n\n과거 이명박 대통령 때 다스-BBK 수사 때처럼,\n\n무혐의 처분 결론을 내리고 나중에 훈장을 받을 생각으로\n\n김건희 씨 앞에서 아양만 떤 것은 아닙니까?\n\n \n\n이런 막무가내 정권은 처음 봅니다.\n\n여당 전대에서 ‘윤석열 정신을 이어 나가겠다’\n\n이렇게 말하는 후보가 단 한 명이라도 있습니까?\n\n오히려 언제 손절할 지 시점을 보고 있는 것 아닙니까?\n\n \n\n그러니 국민들 사이에서 탄핵 이야기가 자연스럽게 나옵니다.\n\n지금 국민은 법적 절차니, 역풍이니 이런 걸 따지지 않습니다.\n\n헌정 중단 비용 보다 독재 정권 조기 종식 이익이\n\n훨씬 크다고 보시는 겁니다.\n\n국민들께는 ‘심리적 탄핵’ 상태입니다.\n\n \n\n그런 국민의 마음, 분노에 주파수를 맞추는 것이\n\n야당 대표로서 제가 할 첫 번째 책무입니다.\n\n전당대회에서 약속드린 것처럼,\n\n‘윤석열과 김건희의 강’을 건너기 위해\n\n조국혁신당은 법적·정치적 준비에 만전을 기하겠습니다.\n\n \n\n그 일환으로 우리 당은 오늘 한동훈씨를 경찰청에 고발할 예정입니다.\n\n장예찬 전 최고위원이 언론 등에서 폭로한 내용이 있습니다.\n\n한동훈 씨가 법무장관 시절 댓글 혹은 여론조성팀을 운영했다면\n\n직권남용 권리행사방해죄 등에 해당됩니다.\n\n앞으로 사법당국에 국정농단 수사를 촉구하고\n\n민주당 등 야당들과 탄탄한 공조 체제를 도모하겠습니다.\n\n \n\n저희 혼자, 조국혁신당만으로 할 수 있는 일이 아닙니다.\n\n국민, 언론, 공무원 모두 함께 해야 가능합니다.\n\n우리는 8년 전 이미 경험한 바 있습니다.\n\n중요한 것은 꺾이지 않는 마음입니다.\n\n모두 함께 해주십시오.\n\n \n\n저희 당과 관련해서 몇 말씀 드리겠습니다.\n\n전당대회에서 우리 당의 근육을 키우겠다고 약속한 바 있습니다.\n\n조만간 재보궐선거기획단을 꾸리고,\n\n인재영입위원회를 구성할 예정입니다.\n\n오늘 최고위에서 의결했습니다. 빠른 시간 내에 가동될 것입니다.\n\n \n\n재보궐 선거에 ‘삼각 필승 전략’을 세우겠습니다.\n\n해당 시도당과 중앙당, 그리고 제가\n\n삼각 편대를 이뤄 재보선에 응하겠습니다.\n\n \n\n우리 당의 가치와 목표를 기준으로,\n\n가용한 역량과 자원을 모두 동원하며,\n\n지역 상황을 반영한 우리만의 방책을 세우겠습니다.\n\n세 요소를 종합해 최적의 전략을 수립할 것입니다.\n\n \n\n후보‧정책‧가치의 삼위일체 메뉴를 내놓겠습니다.\n\n \n\n인재영입위원장으로서 역할에도 힘을 기울이겠습니다.\n\n우선은 재보궐선거 인재 발굴을 하겠습니다.\n\n호남에서 ‘차세대 DJ’, 영남에서 ‘새로운 노무현’을\n\n영입할 수 있도록 최선을 다할 것입니다.\n\n \n\n그게 우리의 현재와 미래를 빛나게 할 수 있는 일입니다.\n\n또 대표가 해야할 의무입니다.\n\n많은 관심 부탁드립니다. /끝/"}, {"id": 251, "filename": "2기 제20차 최고.txt", "title": "2기 제20차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["윤석열"], "preview": "-2024. 9. 5.(목) 9:30. 본관 224호     ■ 조국 당대표     “한일 관계를 12년 만에 정상화시켰고,  정부 출범 이후 11차례의 정상회담을 했다”,  이렇게 외교성과를 거침없이 자랑한 사람, 바로 윤석열 대통령입니다.  그러나 윤석열 대통령의 일본 편중 외교의 결과는 무엇입니까.  종일·부일·숭일입니다.     그것도 모자랐는지 급기야 오는 27일 퇴임을 앞둔  기시다 총리가 방한합니다.  윤석열 대통령에게 받기만 한 ...", "content": "-2024. 9. 5.(목) 9:30. 본관 224호\n\n \n\n■ 조국 당대표\n\n \n\n“한일 관계를 12년 만에 정상화시켰고,\n\n정부 출범 이후 11차례의 정상회담을 했다”,\n\n이렇게 외교성과를 거침없이 자랑한 사람, 바로 윤석열 대통령입니다.\n\n그러나 윤석열 대통령의 일본 편중 외교의 결과는 무엇입니까.\n\n종일·부일·숭일입니다.\n\n \n\n그것도 모자랐는지 급기야 오는 27일 퇴임을 앞둔\n\n기시다 총리가 방한합니다.\n\n윤석열 대통령에게 받기만 한 기시다 총리가\n\n드디어 ‘반 잔의 물컵’을 채워주기 위해 오는 걸까요?\n\n \n\n일본 언론에서는 기시다 총리의 방한 목적에 대해,\n\n일본 내 여론이 최악인 기시다 총리가\n\n자신의 대표적 성과라는 한국과의 외교 성과를 다시 한번 강조해\n\n‘실패한 총리’라는 오명을 벗기 위해 방한한다고 알려졌습니다.\n\n \n\n기시다 총리는 9월 말 열리는 자민당 총재 선거 출마를 포기했습니다.\n\n일본 국민과 자민당에서 버림받고 정계를 떠나는 정치인입니다.\n\n윤석열 대통령과 기시다 총리 두 사람 다 20%의 낮은 지지율을 받고 있으니, 동병상련이겠지죠.\n\n윤석열 대통령님, 이번 회담에서 기시다 총리 ‘퇴임 만찬’만 즐기십시오.\n\n종일·부일·숭일의 선물로 ‘반 잔의 물컵’을 또 채우지는 마십시오.\n\n윤석열 정권이 어떤 종일·부일·숭일 선물을 안겨줄지 정말 걱정됩니다.\n\n \n\n\n\n“신이 인간을 창조했다면 우리나라 출생률 걱정하지 말고 진흙을 어떻게 잘 공급할지 문제만 해결하면 되겠다.”\n\n안창호 국가인권위원장 후보 국회 인사청문회를 본\n\n국가인권위원회 직원들이 내부 자유게시판에 올린 글입니다.\n\n \n\n‘동성애가 질병이냐’라는 질문에 ‘논란이 많다’라고 답한 것,\n\n진화론과 창조론이 모두 믿음의 대상이라고 말한 것,\n\n신체 노출이 성범죄를 증가시킨다는 게\n\n왜 성범죄를 두둔하는 주장인지 반문한 것,\n\n동성애가 공산혁명의 핵심 수단이라고 말한 것 등등\n\n인권위원장 후보가 아니라도 상식을 갖은 이라면\n\n상상할 수 없는 해괴한 궤변이 줄줄이 나왔습니다.\n\n \n\n유엔 인권협약을 받아들일 생각 없이\n\n‘권고는 권고일 뿐’이라는 사람이 국가인권위원장을 맡게 생겼습니다.\n\n인권위원회는 위원장이 가지고 있는 철학과 규범과 가치가\n\n매우 중요합니다.\n\n우리 사회가 그동안 극복하느라 애를 썼던 사회적 기준들을\n\n모두 후퇴시킬 것을 증명한 청문회였습니다.\n\n \n\n이진숙 방송위원장, 김문수 고용노동부 장관, 김용현 국방부 장관,\n\n심우정 검찰총장, 안창호 국가인권위원장까지\n\n윤석열 대통령의 인사에는 공통점이 존재합니다.\n\n해당 부처에 가장 부적합한 인사를 후보로 세운다는 점입니다.\n\n윤석열 정권의 인재풀이 바닥 났음을 보여줍니다.\n\n윤석열 정권이 기댈 곳은 오직 극우 수구 세력일 뿐임을 보여줍니다.\n\n \n\n\n\n나라가 어지럽지만, 저 멀리 파리에서 매일 기적이 일어납니다.\n\n제17회 패럴림픽에서 우리 선수들의 땀과 열정이\n\n대한민국을 감동시키고 위로하고 있습니다.\n\n우리가 얻는 것은 승패와 기록이 아닌\n\n바로 희망입니다. 감사합니다.\n\n끝까지 힘껏 응원하겠습니다."}, {"id": 252, "filename": "2기 제22차 최고.txt", "title": "2기 제22차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["비대위", "윤석열"], "preview": "-2024.09.09.(월) 09:30. 본관 224호     ■ 조국 당대표  ◎ 김건희씨가 지난 총선 당시 여당 공천에 관여했다는  언론 보도, 증거와 증인이 나왔습니다.  김건희 씨가 국민의힘 5선 중진이던 김영선 의원에게  지역구를 옮겨 출마할 것을 요청했고,  윤 대통령과 함께 맞춤형 지역 공약을 마련해주겠다는 제안까지  했다고 합니다.     대통령실은 사실무근, 허위라고 부인하고 있지만,  김건희 씨와 김영선 의원이 주고받은 텔레그...", "content": "-2024.09.09.(월) 09:30. 본관 224호\n\n \n\n■ 조국 당대표\n\n◎ 김건희씨가 지난 총선 당시 여당 공천에 관여했다는\n\n언론 보도, 증거와 증인이 나왔습니다.\n\n김건희 씨가 국민의힘 5선 중진이던 김영선 의원에게\n\n지역구를 옮겨 출마할 것을 요청했고,\n\n윤 대통령과 함께 맞춤형 지역 공약을 마련해주겠다는 제안까지\n\n했다고 합니다.\n\n \n\n대통령실은 사실무근, 허위라고 부인하고 있지만,\n\n김건희 씨와 김영선 의원이 주고받은 텔레그램 메시지를 본\n\n국회의원과 여당 당직자들이 여러 명이라고 합니다.\n\n김영선 의원은 공천을 받지 못했지만,\n\n김웅 전 국민의힘 의원은 당시에 “여사한테 텔레그램 받았다”라고\n\n자랑하고 다니는 사람이 있었고, 실제 공천을 받았다고 말했습니다.\n\n이 말은 김영선 의원 외에 또 있다는 것입니다.\n\n \n\n공천개입은 대통령이 해도 불법입니다.\n\n박근혜 씨는 20대 총선 당시, 이른바 ‘친박’ 정치인 당선을 위해\n\n공천관리위원회에 자료를 제공했다가 징역 2년이 확정됐습니다.\n\n당시 윤석열, 한동훈 두 검사가 이 수사와 기소를 지휘했습니다.\n\n대통령도 공천개입하면 처벌되는데, ‘영부인’이 개입을 했다?\n\n성공 여부는 문제가 아닙니다.\n\n개입 그 자체가 범죄입니다.\n\n하지만 제대로 된 검찰 수사가 이루어질 가능성은 1도 없습니다.\n\n특검만이 답입니다.\n\n조국혁신당은 이 의혹을 수사 대상에 추가하여\n\n지난 5일 ‘김건희 특검법’을 다시 발의했습니다.\n\n공천개입, 선거 개입이 사실이라면\n\n법치 파괴에 이은 민주주의 파괴입니다.\n\n명품백 수수 의혹으로 두문불출했던 김건희 씨가\n\n뒤에서는 여당의 공천과 선거에 깊숙이 개입했던 것입니다.\n\n민주주의 절차를 지키는 정당이라면\n\n국민의힘이 진실을 밝히는 데 앞장서야 하는 것 아닙니까?\n\n국민의힘 비상대책위원장을 맡아 선거를 진두지휘했던\n\n한동훈 대표가 가장 분개해야 할 일 아닙니까?\n\n \n\n특검 필요합니다.\n\n윤석열 대통령은 또 거부권 행사로 ‘아내 사랑’을 실천하겠지요.\n\n김건희 씨에게 가져다 바친 면죄부가 영원할 것이라고\n\n착각하지 마십시오.\n\n국민이 지켜보고 있습니다.\n\n \n\n◎ “세상이 무너졌다, 죽고 싶다”\n\n“사람들이 다 나만 쳐다보는 것 같다, 죽고 싶다”\n\n‘딥페이크’ 피해자들은 ‘죽고 싶다’고 호소합니다.\n\n그런데 경찰은 “증거를 가져오라”고 합니다.\n\n피해자는 계속 늘어나는데, 가해자는 없습니다.\n\n \n\n윤석열 대통령이 국무회의에서\n\n딥페이크 성범죄에 대해 강력한 대응을 주문했습니다.\n\nTF를 구성해 대응책 마련에 나섰지만, 실효성은 알 수 없습니다.\n\n중심적 역할을 해야 할 주무 부서, 여성가족부는 장관이 공석이고\n\n권한, 기능, 예산은 현 정권에 들어서서 모두 축소되었습니다.\n\n체계적이고 민첩한 정부차원의 대응과 대책이 어려운 상태입니다.\n\n \n\n2022년 3,752건이던 딥페이크 성착취물은\n\n2023년 2만 1,019건으로 무려 464% 증가했습니다.\n\n더 충격은 세계적으로 딥페이크 성착취물 1위가 우리나라, 한국입니다.\n\n \n\n미국의 보안서비스 업체인 시큐리티 히어로는\n\n'2023년 딥페이크 현황' 보고서에서 한국이 딥페이크 성착취물에\n\n가장 취약한 국가라는 충격적인 자료를 공개했습니다.\n\n딥페이크 성착취물에 등장한 인물 중 53%가 한국인입니다.\n\n2위 미국은 20%, 3위 일본이 10%, 격차도 매우 큽니다.\n\n다름아니라 우리 국민이 지금 범죄의 주요 표적이 되고 있습니다.\n\n \n\n국가가 나서야 합니다. 국가가 보호해야 합니다.\n\n국가가 앞장서서 플랫폼 기업들과 협력하고,\n\n강력한 법적 제재를 가해야 합니다.\n\n \n\n오늘 조국혁신당은 박은정 의원이 준비한 ‘딥페이크 차단 6법’을 당론 법안으로 발의합니다.\n\n딥페이크 합성 제작뿐 아니라 소지, 시청 행위도 처벌할 수 있도록 ,딥페이크 범죄에 대한 강력한 처벌을 통해 억제력을 높일 수 있도록 법적 제도를 강화하겠습니다.\n\n \n\n조국혁신당은 이 문제를 해결하기 위해 끝까지 최선을 다할 것입니다.\n\n딥페이크 범죄 예방을 위한 법안을 추진하고,\n\n범죄 피해자들을
