께.\n설 연휴가 시작됩니다. 윤석열 일당의 내란을 이겨내고 맞이하는 첫 설 연휴입니다. \n우리는 윤석열 일당과 정치검찰에 맞서 어깨걸고 함께 싸웠습니다. 대선 시기 이재명 후보 당선을 위해서, 그리고 이재명 정부 출범 이후 각종 개혁을 추진하기 위해서 힘을 모았습니다.\n그런데 민주당 정청래 대표의 ’합당 제안‘ 이후 민주당 내부에서 큰 분란이 생겼음은 물론, 양당 사이에도 균열이 생겼습니다. 연대와 단결의 언어가 사라지고, 분열과 적대의 언어가 기승을 부립니다.\n과거 문재인만 옹호하고 이재명을 악마화했던 ’문파‘는 결국 윤석열을 지지하는 ’뮨파‘가 되었습니다. 당시 제가 “이낙연은 경선 결과에 승복해야 한다”는 글을 올리자, 이들은 제 책 화형식을 벌이며 인증샷 릴레이를 벌였습니다. 한편, 문재인을 극한으로 공격하며 이재명만을 지지했던 ‘손가혁’은 폐해가 심하여 이재명의 권유로 해산했습니다.\n합당 논란은 종결되었지만, 논쟁 국면에서 ’뮨파‘와 ’손가혁‘류의 비방과 공격이 되살아났습니다. 합당을 지지하는 발언을 했다고 유시민도 ’반명‘이 되더군요. 조국혁신당의 ‘토지공개념’ 추진도 좌파 사회주의 정책이 되더군요. 이런 행태 뒤에는 반드시 정치적 목적과 이익이 있습니다. 그러나 이재명 대통령에게는 아무런 득이 되지 않습니다.\n정중히 부탁드립니다. 민주진보진영의 사람 소중한 줄 압시다. 비판을 하더라도 할퀴고 후비지는 맙시다. 누구 좋으라고 진영 내부를 갈라치는 것입니까. 언제나 연대와 단결의 원칙을 지킵시다.\n연휴 동안 재충전 많이 하시길 빕니다. 감사합니다.\n조국 올림."}, {"id": 39, "filename": "2026.2.13 조국 대표 설명절 메시지.txt", "title": "조국 대표 설명절 메시지", "date": "2026-02-13", "category": "기타 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["내란"], "preview": "2026.2.13 조국 대표 설명절 메시지  내란의 위기를 이겨내고  맞이한 첫 설날입니다.  그 어느 해보다  복 많이 받으시길 기원합니다. 정치는 국민을  행복하게 해야 합니다.  자산과 상속이 없이도  누구나 인간다운  삶의 출발선을 갖는 사회, 평범한 일상에서  행복을 권리로 누리는 나라, 모든 국민이 행복한  사회권 선진국을 향해  뚜벅뚜벅 나아가겠습니다.  저와 조국혁신당은 어떤 길에서도  비전과 가치를 견지하고  연대와 단결의 원칙...", "content": "2026.2.13 조국 대표 설명절 메시지\n\n내란의 위기를 이겨내고 \n맞이한 첫 설날입니다. \n그 어느 해보다 \n복 많이 받으시길 기원합니다.\n정치는 국민을 \n행복하게 해야 합니다. \n자산과 상속이 없이도 \n누구나 인간다운 \n삶의 출발선을 갖는 사회,\n평범한 일상에서 \n행복을 권리로 누리는 나라,\n모든 국민이 행복한 \n사회권 선진국을 향해 \n뚜벅뚜벅 나아가겠습니다. \n저와 조국혁신당은 어떤 길에서도 \n비전과 가치를 견지하고 \n연대와 단결의 원칙을 지키며, \n당당하게 정치하겠습니다.\n6월 선거에서 조국혁신당의 정치로 \n가장 조국혁신당답게 승리하겠습니다.\n없는 길을 만들어 가는 우리의 발걸음이 \n정치를 바꾸고, 지역을 바꾸고, \n시대를 바꿀 것이라고 확신합니다. \n새해 복 많이 받으십시오! \n2026. 02. 13 조국혁신당 대표 조국"}, {"id": 40, "filename": "2026.2.12 제28차 최고위원회의 모두발언.txt", "title": "제28차 최고위원회의 모두발언", "date": "2026-02-12", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["최고위", "윤석열", "지방선거", "민생", "내란"], "preview": "2026. 02. 12. 제28차 최고위원회의 모두발언  조국혁신당 대표 조국입니다. 설 명절이 다가옵니다. 지난해 우리 국민 모두 고생하셨습니다. 그리고 잘 이겨내셨습니다. 병오년(丙午年) 새해에는 좋은 일만 있기를 기원합니다.  ◎ 모두 즐거워야 할 설이지만, 수심 가득한 분들도 계십니다. 중소기업, 소상공인, 자영업자 등 서민들입니다. 중소기업중앙회가 819개 중소기업을 대상으로 ‘설 자금 수요조사’를 했습니다. 자금 사정이 ‘곤란하다’고...", "content": "2026. 02. 12. 제28차 최고위원회의 모두발언\n\n조국혁신당 대표 조국입니다.\n설 명절이 다가옵니다. 지난해 우리 국민 모두 고생하셨습니다.\n그리고 잘 이겨내셨습니다.\n병오년(丙午年) 새해에는 좋은 일만 있기를 기원합니다.\n\n◎ 모두 즐거워야 할 설이지만, 수심 가득한 분들도 계십니다.\n중소기업, 소상공인, 자영업자 등 서민들입니다.\n중소기업중앙회가 819개 중소기업을 대상으로 ‘설 자금 수요조사’를 했습니다.\n자금 사정이 ‘곤란하다’고 응답한 기업은 29.8%나 됐습니다.\n‘보통’은 50.3%, ‘원활하다’ 19.9%였습니다.\n설 상여금을 준다는 기업은 46.8%에 불과했습니다.\n\n기댈 곳 없는 자영업자들은 더 어렵습니다.\n지난해 12월 말 기준 5대 은행 사업자 대출 평균 연체율은 0.5%였습니다.\n코로나로 자영업 위기가 고조된 2021년 12월 말 0.15%의 3배가 넘습니다.\n\n정부의 소상공인 채무조정 프로그램 ‘새출발기금' 신청액도 늘었습니다.\n지난해 접수된 신청액은 11조 22억원입니다.\n그 전년도 9조 3,188억원보다 18% 늘었습니다.\n특히 프로그램 전체 신청액의 40%에 해당하는 금액이 지난해 집중됐습니다.\n골목상권은 여전히 불황입니다.\n\n정부가 ‘민생물가 특별관리 TF'를 가동한 것은 시의적절합니다.\n서울시와 경기도 등 크고 작은 지자체도 민생 대책을 내놓았습니다.\n금융기관들도 돈줄이 마르지 않도록 지원책을 선보이고 있습니다.\n\n그런데, 국민 불만은 가시지 않습니다.\n‘수조 원이 풀린다는데, 왜 내 손에는 안 들어오느냐?’는 것입니다.\n\n장·차관, 기관장, 은행장부터 팔을 걷어붙여야 합니다.\n실제 집행되는지, 어디서 막히는지, 누가 문턱에서 눈물을 쏟고 돌아서는지\n끝까지 챙겨야 합니다.\n\n임금 체불은 없는지, 대금은 제때 지급되는지,\n어음만 뿌리고 갑질하는지도 신고만 받아서는 안 됩니다.\n취약 지역을 찾아가 두 눈으로 확인해야 합니다.\n그래서 무엇을 발표했는지가 아니라, 무엇을 집행했는지 증명해야 합니다.\n\n빨리 현장으로 달려가 국민 숨통을 틔워주십시오.\n필요한 게 있으면, 조국혁신당에 얼마든 요청하십시오.\n\n◎ 최근 국민의힘에서 묘한 말들이 오갑니다.\n지도부와 전한길 씨 등 외곽 지원 세력 간에 핑퐁 게임 양상입니다.\n\n극우 유튜버 전한길 씨는 \"‘윤어게인, 윤배신자 축출, 부정선거 척결' 주장 때문에\n장동혁 후보를 당 대표로 지지했다. 공식 입장을 3일 안에 답하라”고 했습니다.\n그런데 당지도부는 굽신거리면서 아리송한 말을 합니다. \n장동혁 대표와 김민수 최고위원은\n이러한 윤 어게인 내란 세력과 연을 끊는다는 말을 하지 못하고 있습니다.\n\n정작 전한길 씨는 “김민수가 ‘형님, 조금만 기다려 달라’고 하더라”고\n저간의 사정을 털어놓았습니다.\n6월 지방선거에서 괴멸적 패배가 예상되자, 당장 설 민심에 대비하려고\n기술과 꼼수를 부리고 있음을 고백한 것입니다.\n오죽하면 같은 당의 안상훈 의원이 “정치적 위장 이혼”이라고 했겠습니까?\n\n국민의힘이 설을 맞아 해야 할 일은 분명합니다.\n내란에 대한 처절한 반성과 진정한 사과,\n윤석열 등 내란 무리와의 절연, 김민수·전한길·고성국 등 내란 동조파 척결.\n신천지·통일교·전광훈 목사 교회 등 반헌법적 정교 유착 범죄를 고백해야 합니다.\n\n그렇지 못하면\n조국혁신당이 앞장 서서 국민의힘을 정치에서 몰아내겠습니다. /끝"}, {"id": 41, "filename": "2026.2.11 합당 관련 긴급 최고위원회의 모두발언.txt", "title": "합당 관련 긴급 최고위원회의 모두발언", "date": "2026-02-11", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["내란", "지방선거", "합당", "최고위"], "preview": "2026.2.11 합당 관련 긴급 최고위원회의 모두발언  존경하는 국민 여러분, 사랑하는 조국혁신당 당원 동지 여러분!  어젯밤 정청래 민주당 대표님으로부터  연대와 통합에 대한 민주당의 최종 입장을 전달받았습니다.  조국혁신당은 민주당이 제안한  ‘연대 및 통합을 위한 추진 준비위원회' 구성에 동의합니다.  이번 주 안으로 당무위원회를 열어 오늘 결정을 추인받을 것입니다.  향후 양당의 ‘연대와 통합’을 위한 준비는  ‘내란 세력의 완전한 심...", "content": "2026.2.11 합당 관련 긴급 최고위원회의 모두발언\n\n존경하는 국민 여러분, 사랑하는 조국혁신당 당원 동지 여러분!\n\n어젯밤 정청래 민주당 대표님으로부터 \n연대와 통합에 대한 민주당의 최종 입장을 전달받았습니다.\n\n조국혁신당은 민주당이 제안한 \n‘연대 및 통합을 위한 추진 준비위원회' 구성에 동의합니다. \n이번 주 안으로 당무위원회를 열어 오늘 결정을 추인받을 것입니다.\n\n향후 양당의 ‘연대와 통합’을 위한 준비는 \n‘내란 세력의 완전한 심판, 지방정치 혁신 등 정치개혁, 국민주권정부의 성공’이라는 \n확고한 목표를 달성하는 방향으로 이루어져야 합니다. \n단지 숫자의 결합과 확대가 아니라 \n비전과 가치의 결합과 확대가 되어야 합니다. \n그래야만 국민들의 박수를 받을 수 있을 것입니다.\n\n조국혁신당은 합당 논의 국면 이전까지 \n일관되게 ‘국힘 제로, 부패 제로’를 위한 ‘지방선거 연대’를 주장해 왔습니다. \n\n양당 간 회동이 이루어지면, \n먼저 민주당이 제안한 ‘연대’가 ‘지방선거 선거연대’인지, \n아니면 추상적 구호로서의 연대인지 확인해야 합니다. \n‘지방선거 연대’가 맞다면, \n추진 준비위원회에서 ‘지방선거 선거연대’의 원칙과 방법을 정할 것입니다. \n지방선거 후에는 ‘통합’의 의미가 무엇인지 확인하고, \n그 내용과 방식에 대한 논의를 책임감 있게 이어가야 할 것입니다. \n\n이 모든 과정에서 양당은 진심을 가지고 \n상호 신뢰와 존중을 강화하는 방향으로 진행해야 합니다. \n그렇지 않고 특정 정치인 개인과 계파의 이익의 관점에서 사안을 접근하면, \n반드시 역효과가 납니다. \n결과를 내지 못하고 논쟁만 하다가는 \n국민과 양당의 당원께 또다시 실망을 드리고 말 것입니다.\n\n마지막으로 정 대표께서 조국혁신당 당원에게 표명한 사과를 받아들입니다. \n조국혁신당 당원은 당으로 향해지는 비방과 모욕에 큰 상처를 입었습니다.\n향후 다시는 이런 일이 없어야 합니다. \n비가 온 후 땅이 굳어지듯, \n향후 양당 간의 연대와 단결이 강화되길 희망합니다.\n\n조국혁신당은 어떤 풍파 속에서도 \n대의 중심 큰 정치의 길을 꿋꿋이 걸어가겠습니다.\n감사합니다.\n\n2026. 2. 11. 조국혁신당 대표 조국"}, {"id": 42, "filename": "2026.2.9. 제25차 최고위원회의 모두발언.txt", "title": "제25차 최고위원회의 모두발언", "date": "2026-02-09", "category": "최고위원회", "topics": ["조국혁신당", "인권·사회", "민생·경제"], "tags": ["최고위"], "preview": "2026.2.9. 제25차 최고위원회의 모두발언    조국혁신당 대표 조국입니다.  우리 경제를 생각하면, ‘코스피 5000’이 떠오릅니다. 국민 주권 정부의 대표적 성과입니다. 자산시장이 뜨겁습니다. AI, 로봇, 반도체나 이차전지 등에 자금이 몰리고 성과급이 넘칩니다.  그런데 그 온기가 제조업 전반과 중소기업에는 퍼지지 못하고 있습니다. 높아지는 수치와 우상향 그래프에 시선을 빼앗긴 사이 공장은 문을 닫고, 노동자들은 장갑을 벗고 있습니다...", "content": "2026.2.9. 제25차 최고위원회의 모두발언 \n\n\n조국혁신당 대표 조국입니다.\n\n우리 경제를 생각하면, ‘코스피 5000’이 떠오릅니다.\n국민 주권 정부의 대표적 성과입니다.\n자산시장이 뜨겁습니다.\nAI, 로봇, 반도체나 이차전지 등에 자금이 몰리고 성과급이 넘칩니다.\n\n그런데 그 온기가 제조업 전반과 중소기업에는 퍼지지 못하고 있습니다.\n높아지는 수치와 우상향 그래프에 시선을 빼앗긴 사이\n공장은 문을 닫고, 노동자들은 장갑을 벗고 있습니다.\n\n심각한 상황입니다. 숫자가 말해줍니다.\n한국경제인협회(한경협)가 매출액 기준 600대 기업을 조사한\n2026년 2월 기업경기실사지수(BSI)의 전망치는 93.9입니다.\n100미만이면 기업은 경기 악화를 예상한다는 뜻입니다.\n2022년 4월부터 47개월째 100을 밑돌고 있습니다.\n\n제조업 BSI는 더 심각해, 88.1에 불과했습니다.\n전달보다 3.7포인트 떨어져, 80대가 됐습니다. \n비제조업도 99.5로, 전월 98.9보다는 0.6포인트 올랐지만, 100 아래입니다.\n내수·수출·투자 모두 100을 밑돌고 있습니다.\n우리 경제가 힘을 잃고 있다는 뜻입니다.\n\n가장 직격탄을 맞은 곳은 부산·울산·경남 제조업입니다. \n한국산업단지공단의 2013년부터 23년까지 10년간 가동률 자료를 보면\n부산 녹산은 78.2%에서 72.1%로, 울산 온산은 88.2%에서 87.8%로, \n창원은 83.9%에서 80.8%로 떨어졌습니다.\n\n공장이 활력을 잃으면 협력사와 도급업체가 제일 먼저 흔들립니다.\n지역 식당과 마트도 어려워집니다.\n쌓아둔 돈 없이 오로지 노동에 기대 사는 서민은\n생존을 위한 처절한 버티기에 내몰립니다.\n이는 몇몇 가정의 위기에 그치지 않고, \n대한민국 공동체 근간을 흔듭니다.\n\n이대로 놔두면, 불평등 양극화가 심해집니다.\n고질이 될 것입니다.\n따뜻한 아랫목에만 안주해서는 안 되고, 차가운 윗목을 더 살펴야 합니다.\n조국혁신당은 ‘윗목 제로’를 위해 네 가지 방안을 제시합니다. \n\n첫째, 자산시장 호황이 투자와 고용으로 더 많이 이어지도록 \n정책 기조를 전환해야 합니다. \n기업의 배당과 주주환원을 존중하되, \n국가 정책의 무게중심을 실물 투자와 고용에 두어야 합니다.\n단순히 배당만 늘리는 기업보다\n설비투자, R&D, 인력훈련, 협력사 동반성장에 앞서는 기업에 \nR&D 예산지원 등 더 매력적인 인센티브를 제공해야 합니다.\n그래야 자본의 열기가 공장과 일자리로 흐릅니다.\n\n둘째, 가용할 수 있는 정부 지원금과 대출 프로그램을 대폭 확대해야 합니다.\n중소기업에 버거운 금리·환율·에너지 등 3대 비용을 정부가 도와야 합니다.\n부울경처럼 제조업 비중이 큰 지역에 도움이 먼저 도달해야 합니다.\n재정 여력이 없다는 한가한 소리를 할 때가 아닙니다.\n그 돈은 말 그대로 생명줄입니다.\n\n셋째, 불공정 거래 관행을 이번에 뿌리 뽑아야 합니다.\n원청의 납품단가 후려치기, 대금 지연, 기술 탈취 등이 계속되는 한 \n성장의 과실은 위에만 머무릅니다.\n납품단가 연동의 실효성을 높이고,\n기술 탈취에는 징벌적 책임을 물어 패가망신하도록 해야 합니다.\n\n넷째, 자본시장 정상화만큼이나, 산업 구조재편에 박차를 가해야 합니다.\n어려울 때가 구조조정의 적기입니다.\n석유화학이나 석탄발전 등 무너지는 부문을 지켜볼 수는 없습니다.\n좀비기업을 지탱하는데 소중한 재원이 낭비되는지 살펴야 합니다.\nAI, 반도체뿐만 아니라 로봇과 에너지, 전지 등 미래 먹거리에서도\n초격차를 가진 기업이 나오도록 정부와 기업이 머리를 맞대야 합니다.\n물론 이 과정에서 개편되는 부문 노동자들이 일방적으로 희생되지 않도록\n정부가 대응책을 강구해야 합니다.\n\n코스피 5000의 과실이 국민 대다수에 닿지 못한다면,\n이는 정치의 실패입니다.\n조국혁신당은 숫자만이 아니라 국민의 하루하루가 좋아지는\n정책과 제도를 내놓겠습니다.\n조국혁신당은 비록 집권당이 아니지만,\n대한민국 경제와 국민의 하루를 걱정하는 마음은 집권당 못지않습니다.\n이재명 정부가 조국혁신당의 지적에 귀 기울이고 대책을 마련해주길 바랍니다.\n감사합니다.    /끝/"}, {"id": 43, "filename": "2026. 2. 8. 합당 관련 기자간담회 모두발언.txt", "title": "합당 관련 기자간담회 모두발언", "date": "2026-02-08", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "인권·사회", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["합당", "사법개혁", "부동산", "지방선거", "민생", "내란", "개헌", "검찰개혁"], "preview": "2026. 2. 8. 합당 관련 기자간담회 모두발언  존경하는 국민 여러분,  조국혁신당과 민주당 당원 동지 여러분,  조국혁신당 대표 조국입니다.   오늘 저는 무거운 마음으로 이 자리에 나왔습니다.  민주당 정청래 대표님께서 제안한  ‘합당’이라는 화두 앞에서,  저는 정치가 가야 할 길과 국민이 명령하신 시대적 과제를 다시 한번 깊이 되새겼습니다.  조국혁신당은 지금까지 독자적 행보를 걸으며  선거연대를 주장해 왔습니다. 집권 여당 대표의...", "content": "2026. 2. 8. 합당 관련 기자간담회 모두발언\n\n존경하는 국민 여러분, \n조국혁신당과 민주당 당원 동지 여러분, \n조국혁신당 대표 조국입니다. \n\n오늘 저는 무거운 마음으로\n이 자리에 나왔습니다. \n민주당 정청래 대표님께서 제안한\n ‘합당’이라는 화두 앞에서, \n저는 정치가 가야 할 길과\n국민이 명령하신 시대적 과제를\n다시 한번 깊이 되새겼습니다.\n\n조국혁신당은 지금까지\n독자적 행보를 걸으며 \n선거연대를 주장해 왔습니다.\n집권 여당 대표의 공식적 제안을 받은 후에는 \n당내 민주적 토론과 \n공적 절차라는 정도(正道)를 밟으며, \n차분하고 질서 있게 \n합당 논의에 대응해 왔습니다.\n\n1. 무릇 정치는 ‘비전’과‘가치’가 \n중심이 되어야 합니다.\n\n조국혁신당은 민주당의 제안을 받고 \n세 가지를 자문(自問)했습니다.\n\n“이재명 정부의 성공을 위한 길인지”, \n“양당의 주권 당원들이 원하는 길인지”, \n그리고 “조국혁신당의 비전과 \n가치가 실현되는 길인지”를 \n치열하게 숙의했습니다. \n\n조국혁신당 당원들과 \n국민들은 기대했습니다.\n집권 여당인 민주당이 개방적 태도로  \n사회권 선진국 비전, \n정치개혁과 연합정치,\n제7공화국을 위한 개헌, \n토지공개념과 부동산 개혁 등\n조국혁신당이 추진하는 \n핵심 의제들에 대해서 \n진지하게 논의할 것으로 믿었습니다. \n\n그러나 정작 합당을 제안한 민주당은\n이런 논의에 들어가기보다는  \n권력투쟁에 들어갔습니다.\n\n2. 민주당에 묻습니다. \n\n지금 민주당 내부에서 벌어지는 상황이 \n비전과 정책에 대한 생산적 논쟁입니까, \n아니면 내부 권력투쟁입니까? \n\n국민들이 실망하고 계십니다.\n새 정부가 출범한 지 \n1년도 지나지 않은 시점에서 \n총선 공천권을 가진 \n당권과 차기 대권을 염두에 두고   \n격렬한 권력투쟁을 벌인 \n집권 여당이 있었습니까? \n\n게다가 그 권력투쟁을 이기기 위해 \n합당 제안을 받은 우당인\n조국혁신당과 대표인 저에 대하여 \n허위 비방을 퍼부었습니다.\n터무니없는‘지분 밀약설’, \n‘조국 대권론’을 유포했습니다. \n\n심지어 ‘색깔론’까지 동원했습니다.\n국민의힘 출신 인사는 \n과거를 묻지 않고 환대하면서, \n국민의힘에 가장 앞장서서 \n싸워온 동지를  공격하는 행태를 \n어떻게 이해해야 하겠습니까? \n지금 조국혁신당을 공격하는 사람 중에는\n과거 문재인, 이해찬 등 \n민주 진보 진영의 지도자들을 \n비방하고 모욕한 이들도 있습니다.\n\n통합은 문재인, 이재명 두 분 대통령과 \n이해찬 전 총리 등 \n민주 진보 지도자들의 지론입니다. \n그 뜻을 잘 알기에 \n인내하고 또 인내했습니다. \n\n조국혁신당이 인내한 것은 \n이재명 정부의 성공과 \n민주 진보 진영의 더 큰 성공이라는 \n목표가 있었기 때문입니다. \n지난 대선에서 \n이재명 후보의 당선을 위해 \n후보를 내지 않은 \n조국혁신당에 대한 모욕과 비방은 \n통합 논의의 심각한 장애물이라는 점을 \n분명히 합니다. \n\n3. 이에 다시 한번 확실히 밝힙니다. \n\n국민들과 양당의 당원들 앞에서 \n다시 한번 단호히 말씀드립니다. \n어떠한 밀약도 없었습니다. \n어떠한 지분 논의도 없었습니다.\n \n존재하지도 않은 밀약을 전제로 \n추궁하고 공격을 퍼붓는 정치적 이유, \n가히 짐작이 갑니다.\n거론되지도 않았던 지분 논의를 들먹이며 \n‘줄 지분이 없다'고 비난하는 행태, \n모욕적입니다. \n\n저는 정치에 투신한 후 언제나 \n민주 진보 진영의 승리에 복무했습니다. \n경고합니다. 저와 조국혁신당을 \n내부 권력투쟁에 이용하지 마십시오. \n우당(友黨)에 대한 기본적 예의를 지켜주십시오.\n\n4. ‘대의 중심의 큰 정치’가 답입니다.\n\n합당은 ‘지분 챙기기의 결과’가 아니라\n‘비전 확장의 결과’이어야 합니다.\n그러기 위해서는 대의를 중심에 놓는    \n혁신이 있어야 합니다. \n\n저는 2012년 총선과 대선을 앞두고, \n당시 이해찬 ‘시민주권 ’상임대표님과 함께 \n야권통합 추진기구인 \n‘혁신과 통합’을 결성해서 \n‘민주통합당’의 출범에 기여한 경험이 있습니다. \n\n당시 이해찬 상임대표께서는, \n“진보적, 개혁적 정치세력들은 \n당파적 이익에 집착하기보다는 \n국민들에게 희망이 될 수 있는 \n통합적 질서를 구축해야 한다”고 일갈하셨습니다.\n그렇게 하여 시민사회와 한국노총 등이 참여하는 \n‘더 큰 민주당’이 만들어질 수 있었습니다. \n\n또한 저는 2015년 문재인 대표 시절\n‘새정치민주연합’의 혁신위원으로 활동했습니다. \n당시 정치인 개인과 계파 이익을 지키기 위해\n혁신위에 대한 전면적 공격이 이루어졌지만,\n저와 혁신위는 흔들리지 않고 \n끝내 혁신안을 당헌·당규에 반영시켰습니다. \n\n선출직에 대한 하위 20% 평가 제도, \n안심번호를 통한 국민 공천 경선, \n경선 시 결선투표제 도입과 \n정치 신인, 여성, 장애인, 청년에게 \n가산점을 주는 등의 혁신을 제도화했습니다. \n이러한 혁신으로 현재 민주당의 \n당원 주권의 골격이 만들어졌습니다.\n\n혁신과 통합은 이렇게 가야 합니다.  \n저는 선거연대의 길이든, 합당의 길이든, \n아니면 독자의 길이든, 어느 길이든 간에, \n‘대의 중심의 큰 정치’라는 \n원칙을 지켜 나갈 것입니다.\n\n5. 민주당에 요구합니다. \n\n이재명 정부 출범 후 \n조국혁신당은 지금까지 \n말이 아닌 실천으로 \n이재명 정부를 뒷받침해왔습니다.\n \n내란전담재판부법과 정보통신망법의 \n위헌성을 사전에 제거하여 \n법률의 완성도를 높였고, \n검찰개혁의 핵심인 수사·기소 분리의 \n대원칙이 실현되도록 앞장 섰습니다. \n사법개혁 방안도 선도적으로 제시했습니다.\n개혁법안 저지를 위한 국민의힘의 \n필리버스터를 종결시키는 데\n항상 협조했습니다. \n\n조국혁신당은 이번 주부터 \n지방선거 후보들에 대한 공천 심사 등 \n본격적으로 지방선거 준비에 돌입합니다. \n합당 논의에 영향받지 않고, \n'국힘 제로', '부패 제로', \n'지방정치 혁신'이라는 목표에 따라 \n준비한 시간표대로 \n뚜벅뚜벅 걸어갈 것입니다. \n\n이에 민주당에 다음을 요구합니다. \n\n첫째, 설 연휴가 시작되는 2월 13일 전까지 \n민주당의 공식 입장을 결정해 주십시오.\n\n국민들의 실망이 크고, \n양당 당원들의 상처가 깊습니다. \n현 상황이 계속되어서는 안 됩니다. \n2월 13일까지 공식적이고 \n공개적인 답변이 없으면, \n조국혁신당은 합당은 없는 것으로 하겠습니다. \n\n둘째, 가야 할 길을 명확히 선택해 주십시오. \n\n‘합당을 하지 않고 \n별도 정당으로 선거연대를 이룰 것인지, \n아니면 선거연대도 하지 않을 것인지,\n또는 하나의 정당 안에서 \n가치와 비전 경쟁을 할 것인지’, \n명확하게 선택해 주십시오. \n\n셋째, 조국혁신당의 비전과 가치에 대한 \n태도를 밝혀주십시오.\n\n‘사회권 선진국’의 비전을 \n수용할지 거부할지 밝혀주십시오.\n\n총선 시기 한동훈 씨 등 국민의힘 인사들은\n ‘빨갱이 비전’이라고 비방했는데,\n유사한 생각을 하고 있지 않는지 밝혀주십시오.\n\n대선 전 합의했던 정치개혁을 \n실천할지 말지, 실천한다면 \n어떻게 실천할 것인지 밝혀주십시오.\n2018년 이재명 성남시장님의 \n기초선거구제 개혁 제안을\n실천할 것인지 밝혀주십시오.\n\n제7공화국을 위한 개헌을 \n할 것인지 말 것인지 밝혀주십시오.\n\n토지공개념이 ‘좌파 사회주의 정책’이므로 \n폐기해야 한다고 인식하고 있는지를 밝혀주십시오.\n\n조국혁신당은 언제든지 \n토론할 준비가 되어 있습니다.\n\n마지막으로, \n정청래 대표님과의 회동을 제안합니다. \n\n제가 요구한 사항에 대하여 \n민주당이 공식적으로 결정하면, \n대표 간의 만남이 있어야 합니다.  \n그 만남에서 다음 단계를 \n논의할 수 있을 것입니다. \n\n존경하는 국민 여러분!\n조국혁신당 그리고 민주당 당원 동지 여러분!\n\n민주 진보 진영은 어떤 비바람 속에서도 \n연대하고 단결해야 합니다. \n내란 청산은 끝나지 않았습니다. \n지방선거에서 내란 극우 세력을 \n정치적으로 심판하고 청산해야 합니다. \n그리고 ‘내란 이후의 세상’을 \n본격적으로 열어야 합니다.\n이 시대적 과제는 \n연대와 단결로 성과를 낼 수 있고, \n그것이야 말로 이재명 정부의 성공을 \n확실하게 뒷받침하는 길입니다. \n저는 어떤 상황에서도 \n민주 진보 진영의 \n‘연대와 단결의 광장’을 지키고 넓히겠습니다. \n \n참고로, 엄중한 국면 속에서, \n민주당의 많은 국회의원과 정치인들이 \n진심 어린 의견을 전해왔습니다. \n‘합당을 지선 전에 꼭 해야 한다’는 의견, \n‘지선은 선거연대로 치르고 \n지선 후에 합당하자'는 의견,\n‘원내 교섭단체 요건을 완화 시킨 후 \n연합정치를 하자’는 의견 등 다양했습니다.\n\n특히 ‘민주당 내부의 일로 조국혁신당에 \n피해와 상처를 준 것에 대해 \n미안하다’는 분들도 있습니다. \n저는 진솔한 의견을 주신 모든 분들이 \n민주 진보 진영의 소중한 자산이자, \n지도자들이라고 생각합니다. \n\n또한 조국혁신당은 \n민주당 의원들과 당원들의 \n집단지성을 믿고 신뢰합니다.\n\n마지막으로,\n다시 한번 강조합니다. \n‘지분’이 아니라 ‘대의’를 중심에 놓고 \n‘큰 정치’를 합시다.\n\n민주당의 답변을 기다리겠습니다. \n\n감사합니다. /끝/"}, {"id": 44, "filename": "2026.2.8 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-08", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["합당", "페이스북"], "preview": "2026.2.8 조국 대표 페이스북 메시지  정청래 대표의 합당 제안 후, 온라인에 나에 대한 허위 비방이 대대적으로 올라오고 있다. 확인해보니 일부 기자, 정치 유튜버, 정치 평론가들이 비밀을 알고 있는 것처럼 슬쩍 흘렸다. 그 중 대표적인 두 개를 적고 답한다. 1. \"조국이 민정수석 시절 이재명에 대한 검찰수사에 관여했다.\" 어떠한 관여도 없었다. 만약 그랬더라면 검찰이 벌써 직권남용으로 수사하고 기소했을 것이다. 2. \"조국이 민정수석 ...", "content": "2026.2.8 조국 대표 페이스북 메시지\n\n정청래 대표의 합당 제안 후, 온라인에 나에 대한 허위 비방이 대대적으로 올라오고 있다. 확인해보니 일부 기자, 정치 유튜버, 정치 평론가들이 비밀을 알고 있는 것처럼 슬쩍 흘렸다. 그 중 대표적인 두 개를 적고 답한다.\n1. \"조국이 민정수석 시절 이재명에 대한 검찰수사에 관여했다.\"\n어떠한 관여도 없었다. 만약 그랬더라면 검찰이 벌써 직권남용으로 수사하고 기소했을 것이다.\n2. \"조국이 민정수석 시절 대통령 방북팀에 이재명이 포함되는 것을 막았다.\"\n조국은 대통령 방북 관련 논의에 참여 자체를 한 적이 없다. 방북은 애초에 민정수석의 업무가 아니다.\n이런 허위사실을 유포하는 의도, 가히 짐작이 간다. 내가 이재명 시장/지사/대통령에 대하여 비난한 것을 찾을 수 없으니, 악의적으로 거짓사실을 만들어 나를 '반이재명' 인사로 낙인찍으려 하는 것이다. 연대와 단결이 아니라 분열과 갈라치기를 위한 작태, 중단할 것을 경고한다."}, {"id": 45, "filename": "2026.2.7 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-07", "category": "페이스북 메시지", "topics": ["검찰·사법개혁"], "tags": ["페이스북"], "preview": "2026.2.7 조국 대표 페이스북 메시지  곽상도 아들 50억 원 퇴직금 무죄판결을 접하니, 2016년 진경준 검사장이 김정주 넥슨 회장으로부터 받은 ‘공짜 주식’에 대한 무죄판결이 떠올랐다.  진 검사장은 법부부 검찰국 소속 검사 시절, 친구인 김 회장으로부터 넥슨의 비상주식을 매입할 ‘주식 종자돈’용으로 4억 2500만원을 받아 넥슨 주식 1만 주를 샀고, 다음 해 넥슨 재팬 주식으로 바꾸어 126억원대의 차익을 챙겼다. 그런데 1심 법원...", "content": "2026.2.7 조국 대표 페이스북 메시지\n\n곽상도 아들 50억 원 퇴직금 무죄판결을 접하니, 2016년 진경준 검사장이 김정주 넥슨 회장으로부터 받은 ‘공짜 주식’에 대한 무죄판결이 떠올랐다. \n진 검사장은 법부부 검찰국 소속 검사 시절, 친구인 김 회장으로부터 넥슨의 비상주식을 매입할 ‘주식 종자돈’용으로 4억 2500만원을 받아 넥슨 주식 1만 주를 샀고, 다음 해 넥슨 재팬 주식으로 바꾸어 126억원대의 차익을 챙겼다.\n그런데 1심 법원은 직무관련성이 없는 ”오랜 친구지간에 베푼 호의와 배려“라고 보고 무죄를 선고했고, 이는 2심에서도 유지되었고, 여러 과정을 거쳐 대법원에서 확정되었다.\n만약 내가 민정수석 또는 법무부장관 시절 유사한 행위를 하고 비슷한 차익을 얻었다면, 어떻게 되었을지 생각해본다."}, {"id": 46, "filename": "2026.2.7 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-02-07", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북"], "preview": "2026.2.7 조국 대표 페이스북 메시지2  파안대소하는 행복한 곽상도의 얼굴을 보니, 다시 분노가 치민다. “내가 피해자, 그만 좀 괴롭혀라.” 곽상도의 1990년생 아들은 화천대유에서 6년간 일한 후 퇴직금으로 50억원을 받았지만, 무죄판결을 받았다. 그 이전에 화천대유에 취업한 딸을 통해 11억원을 받은 혐의로 기소된 박영수 특검도 무죄판결을 받았다. 그런데 법원은 800원을 횡령했다는 이유로 한 버스기사 해고가 정당하다고 판결했다. 2...", "content": "2026.2.7 조국 대표 페이스북 메시지2\n\n파안대소하는 행복한 곽상도의 얼굴을 보니, 다시 분노가 치민다. “내가 피해자, 그만 좀 괴롭혀라.”\n곽상도의 1990년생 아들은 화천대유에서 6년간 일한 후 퇴직금으로 50억원을 받았지만, 무죄판결을 받았다. 그 이전에 화천대유에 취업한 딸을 통해 11억원을 받은 혐의로 기소된 박영수 특검도 무죄판결을 받았다.\n그런데 법원은 800원을 횡령했다는 이유로 한 버스기사 해고가 정당하다고 판결했다. 2만원짜리 화장품 세트 3개 총 6만원 어치 선물을 받은 공무원에게 뇌물죄 유죄판결(징역 6개월 집행유예 1년)을 내렸다. 그리고 아버지의 부탁없이 이루어진 딸의 장학금 3회 총 600만 원 수령을 이유로 아버지에게 청탁금지법 유죄판결을 내렸다. 아시다시피 이 판결은 나의 유죄판결로, 그 전에도 그 후에도 자식 장학금으로 부모를 처벌한 경우는 없었다.\n사실 판단, 조문 해석, 법리 적용, 양형 등에서 도무지 이해할 수도 납득할 수도 없는 판결이 많다. 그러면서 판결을 비판하면 사법부 독립을 침해한다고 반박한다. 노무현 정부 시절 시도했다가 극히 일부만 이루어진 '국민의 사법참여'만이 해결책이다. 영미식 배심제(陪審制)건 독일식 참심제(參審制)건 시민의 참여가 없는 사법부 독립은 법관의 자의(恣意)와 독단을 막지 못한다."}, {"id": 47, "filename": "2026.2.7 조국 대표 페이스북 메시지3.txt", "title": "조국 대표 페이스북 메시지3", "date": "2026-02-07", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["내란", "합당", "페이스북"], "preview": "2026.2.7 조국 대표 페이스북 메시지3  정청래 대표의 합당 제안 후 민주당 안팎의 일부 극렬 합당반대론자들(정치유튜버 포함)의 행태가 우려스럽다. 합당 반대할 수 있다. 조국혁신당 안에도 합당반대 의견이 분명히 있다. 문제는 찬반이 아니다. 일부 극렬 합당반대론자들은 합당찬성론자들을 ‘적’으로 규정하고 죽일 듯 달려든다. 이들은 정청래는 물론, 합당 찬성을 밝힌 유시민도 김어준도 공격한다. 동시에 합당 제안을 받기 전 어떠한 밀약도 없었...", "content": "2026.2.7 조국 대표 페이스북 메시지3\n\n정청래 대표의 합당 제안 후 민주당 안팎의 일부 극렬 합당반대론자들(정치유튜버 포함)의 행태가 우려스럽다. 합당 반대할 수 있다. 조국혁신당 안에도 합당반대 의견이 분명히 있다. 문제는 찬반이 아니다.\n일부 극렬 합당반대론자들은 합당찬성론자들을 ‘적’으로 규정하고 죽일 듯 달려든다. 이들은 정청래는 물론, 합당 찬성을 밝힌 유시민도 김어준도 공격한다. 동시에 합당 제안을 받기 전 어떠한 밀약도 없었고 그후 어떠한 공식 협의도 진행되지 않고 있음에도, 이들은 조국혁신당과 나를 조롱하고 비방하고 허위사실을 유포한다. 여러번 허위임을 밝혔지만 아랑곳하지 않는다. 이들에게는 자신들만의 정치적 목적과 재정적 이익이 있다. 과거에도 유사한 행태를 보이다가 몰락한 집단이 있었다.\n많은 이들이 잊고 있는 사실이 있다. 내란 직후 치러진 대선에서 이재명+권영국 득표율과 김문수+이준석 득표율 차이는 겨우 0.91%였다. 서울, 대전, 충남, 충북의 경우 이재명 득표율은 김문수+이준석 득표율 보다 낮았다. 이재명 대통령이 잘 하고 있음은 보수층도 인정한다. 현재 대통령과 민주당 지지율에 취해 향후 지선, 총선, 대선을 낙승할 것이라고 생각하는 것은 큰 착각이다.\n합당에 반대하거나 찬성할 수 있다. 그러나 현재의 상황은 매우 잘못되었다. 민주당 내부의 의견이 다른 파를 쳐내고, 조국혁신당을 짓밟으면  지선, 총선, 대선에 도움이 되는지 생각해보라. 의견이 달라도, 소속 정당이 달라도 연대와 단결의 대의를 잊으면 안된다."}, {"id": 48, "filename": "2026.2.7 조국혁신당 성비위 사건 관련 공식 입장.txt", "title": "조국혁신당 성비위 사건 관련 공식 입장", "date": "2026-02-07", "category": "성명·입장·논평", "topics": ["정치·선거개혁", "조국혁신당"], "tags": ["합당", "기자회견"], "preview": "2026.2.7 조국혁신당 성비위 사건 관련 공식 입장  [조국혁신당 성비위사건-직장내괴롭힘 사건의 처리 경과에 대한 알림] 정청래 민주당 대표의 합당 제안 이후, 일부 유튜브 방송과 온라인 게시판에서 사실과 다른 내용이 대대적으로 유포되고 있습니다. 이에 아래와 같이 그간의 관련 사건 처리 경과에 대한 사실관계를 안내 드립니다.  2건의 성비위 사건(그중 1건의 피해자가 강미정님), 1건의 직장내 괴롭힘 사건이 발생하자, 조국혁신당은 성비위사...", "content": "2026.2.7 조국혁신당 성비위 사건 관련 공식 입장\n\n[조국혁신당 성비위사건-직장내괴롭힘 사건의 처리 경과에 대한 알림]\n정청래 민주당 대표의 합당 제안 이후, 일부 유튜브 방송과 온라인 게시판에서 사실과 다른 내용이 대대적으로 유포되고 있습니다. 이에 아래와 같이 그간의 관련 사건 처리 경과에 대한 사실관계를 안내 드립니다. \n2건의 성비위 사건(그중 1건의 피해자가 강미정님), 1건의 직장내 괴롭힘 사건이 발생하자, 조국혁신당은 성비위사건 가해자들에 대해 제명 및 당원권정지의 중징계 처분을 내렸습니다. 외부조사기관의 객관적 조사를 거쳐 25. 6. 25. 징계하였습니다. 당원권정지를 받은 당사자는 곧바로 탈당하여 당을 떠났습니다. 직장내괴롭힘 사건의 경우 25. 7. 8. 징계되었습니다. \n 그 후 강미정님의 2025. 9. 4. 기자회견으로 피해자들에 대한 지원대책 미비 등이 쟁점이 되자, 성비위사건 피해자 1인, 직장내괴롭힘 피해자 1인에 대하여 조국 대표가 직접 만나 사과와 위로를 전하고 심리치료지원이 이루어 졌습니다. 다만 강미정님은 심리치료지원 등을 거절하여 이루어지지 못했습니다. 강미정님이 제기한 2차 가해 건은 당의 절차에 따라 사실관계를 확인 중에 있습니다. \n또한, 조국혁신당 당직자가 강미정님을 고소했다는 주장이 있으나, 해당 당직자는 허위사실을 공표한 유튜버와 이 사람에게 허위사실을 전한 성명불상자를 고소하였지 강미정님을 특정하여 고소한 적이 없다고 확인되었음을 알립니다."}, {"id": 49, "filename": "2026.2.6 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-06", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2026.2.6 조국 대표 페이스북 메시지  김영삼 전 대통령 아들, 김현철 씨가 “국민의힘이 수구 집단으로 변질됐다”며 국민의힘에 걸려있는 김 전 대통령의 영정을 내리라고 말했다. 국민의힘을 지지했던 건강한 보수층, 다수의 국민도 같은 생각일 것이다. 나는 이미 지난 해 11월 22일 국민의힘을 향해 “최소한의 양심이 있다면 당장 김영삼 전 대통령의 영정을 내리는 것이 마땅하다”고 말한 바 있다.  민주주의를 위해 평생을 투쟁하고 ‘하나회 척...", "content": "2026.2.6 조국 대표 페이스북 메시지\n\n김영삼 전 대통령 아들, 김현철 씨가 “국민의힘이 수구 집단으로 변질됐다”며 국민의힘에 걸려있는 김 전 대통령의 영정을 내리라고 말했다. 국민의힘을 지지했던 건강한 보수층, 다수의 국민도 같은 생각일 것이다.\n나는 이미 지난 해 11월 22일 국민의힘을 향해 “최소한의 양심이 있다면 당장 김영삼 전 대통령의 영정을 내리는 것이 마땅하다”고 말한 바 있다. \n민주주의를 위해 평생을 투쟁하고 ‘하나회 척결’로 군부 독재의 뿌리를 뽑았던 김영삼의 정신이, 어찌 ‘전두환의 후예’를 자처하고 ‘독재 회귀’를 꿈꾸는 이들과 한 공간에 머물 수 있겠는가.\n전두환의 후예, 윤 어게인을 자처하는 내란 극우 정당의 사무실에는 전두환과 윤석열의 사진이 어울린다. 전두환, 윤석열, 전한길, 전광훈 등의 광기가 뒤섞인 ‘극우 잡탕 정당’으로 전락한 국민의힘의 정체성에 맞는 사진을 투명하게 내걸기를 바란다.\n위기 때마다 반복되는 ‘당명 교체’ 역시 국민을 기만하는 구태의연한 카드다. 선거 패배와 탄핵 위기 등 국면 전환이 필요할 때마다 간판을 바꿔 달았지만, 그 안의 썩은 뿌리는 변하지 않았다. 껍데기만 바꾼다고 해서 내란 극우 집단의 본질이 가려지지는 않는다. 이제 위선의 가면을 벗고 김영삼 전 대통령의 이름을 놓아주라. 그것이 당신들이 할 수 있는 최소한의 양심이다."}, {"id": 50, "filename": "2026.02.05. 부산 현장 최고위원회의.txt", "title": "부산 현장 최고위원회의", "date": "2026-02-05", "category": "최고위원회", "topics": ["정치·선거개혁", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["합당", "5.18", "최고위", "지방선거", "민생"], "preview": "26.02.05. 부산 현장 최고위원회의  부산 시민 여러분, 울산·경남 시도민 여러분, 조국혁신당 대표 조국입니다.  오랜만에 고향에 내려와서 시민 여러분을 뵙습니다. 어제 조국혁신당에 귀한 분을 모셨습니다. 바로 이곳 부산 출신 박능후 전 보건복지부 장관이십니다. 중앙당 공직선거후보자추천관리위원회 위원장직을 맡기로 하셨습니다. 박 장관님은 코로나 상황에서 대한민국을 세계적 방역 선도 국가로 이끄셨습니다. 사회권 선진국에 대해 이해가 깊으시고...", "content": "26.02.05. 부산 현장 최고위원회의\n\n부산 시민 여러분, 울산·경남 시도민 여러분,\n조국혁신당 대표 조국입니다.\n\n오랜만에 고향에 내려와서 시민 여러분을 뵙습니다.\n어제 조국혁신당에 귀한 분을 모셨습니다.\n바로 이곳 부산 출신 박능후 전 보건복지부 장관이십니다.\n중앙당 공직선거후보자추천관리위원회 위원장직을 맡기로 하셨습니다.\n박 장관님은 코로나 상황에서 대한민국을 세계적 방역 선도 국가로 이끄셨습니다.\n사회권 선진국에 대해 이해가 깊으시고,\n정책적 전문성은 단연 탁월하십니다.\n지방선거에서 당의 선거 경쟁력을 높일 적임자여서, 기대가 큽니다.\n\n오늘 반가운 분들을 많이 뵙습니다.\n그런데 이곳 상황을 마주하니 무거운 마음이 앞섭니다.\n다른 지역은 통합을 통한 생존 전략을 마련하려고 몸부림치고 있는데,\n부울경은 이제 와서, 뒤늦게 꼬리잡기에 나섰습니다.\n\n부울경은 어느 곳보다 힘차게 비상할 기회가 있었습니다.\n산업·해양·물류의 핵심축으로서, 수도권 1극에 맞설 수 있는\n유일한 통합 경제 권역이 될 수 있었습니다.\n부울경은 2018년부터 머리를 맞대고\n‘메가시티'라는 담대한 구상을 세웠습니다.\n2022년 4월 문재인 정부의 전폭적인 지원 속에\n한국 최초의 특별지방자치단체인 ‘부울경 특별연합’이 출범했습니다.\n2040년 인구 천만 명, 경제 규모 490조 원의 거대 도시를 꿈꿨습니다.\n\n그런데 뜻밖의 암초를 만났습니다.\n부울경 지방자치단체장이 국민의힘 소속으로 모두 물갈이된 것입니다.\n이들은 2022년 10월 특별연합 무산을 선언했습니다.\n전임자의 흔적을 지우겠다는 심보가 100년 대계를 가로막은 것입니다.\n\n메가시티 대안으로 행정 통합, 경제동맹을 하겠다고 호언장담했지요.\n그러나 실천은 없었습니다. \n그 사이 골든타임은 지나갔습니다. \n그리고 지역민들은 고향을 등졌습니다.\n통계청은 지난해 9월 <최근 20년간 수도권 인구이동 결과>를 발표했습니다.\n2024년까지 부산 시민 23만 7천 명, 경남 도민 16만 5천 명,\n울산 시민 5만 4천 명이 수도권으로 떠났습니다.\n오죽하면 부산에서 이런 말이 돕니다. \n부산에는 ‘노인’과 ‘바다’만 남았다, 그래서 부산은 ‘노인과 바다’의 도시다.\n정말 자조 가득한 말 아니겠습니까?\n\n검찰독재 정권이 끝나고 국민주권 정부가 들어섰습니다.\n이재명 정부가 5극3특 국가균형발전 전략을 본격화했습니다.\n대전·충남, 광주·전남 통합 논의가 구체화되어 진척되고 있습니다.\n그제서야 부울경은 허겁지겁 ‘통합 공동 입장문’을 내놓았습니다.\n들여다보았더니, 준비 없는 행정 통합과 실속 없는 수사만 내놓았습니다.\n목전의 지방선거를 겨냥한 면피용 쇼, 전형적 뒷북 행정입니다.\n\n더 암울한 것은 지자체장 소속인 국민의힘 행보입니다.\n새 강령, 당헌·당규에 ‘산업화, 반공' 을 넣겠다고 합니다. \n극우와 과거만 바라보는 국민의힘 후보가 또 부울경을 장악하면\n부울경의 미래는 없습니다.\n\n존경하는 부산 시민 여러분, 울산·경남 시도민 여러분,\n무능·무지·무책임한 이들을 언제까지 짝사랑하실 것입니까?\n더는 안 됩니다. \n오는 지방선거에서 ‘국힘 제로’를 만들어야 합니다.\n그것이 부울경이 생존을 넘어 번영하는 길입니다.\n민주개혁진보 후보가 부울경 정치에 진출해야 달라집니다.\n국민주권 정부와 함께 미래로 뻗어나가야 합니다. \n파격적인 재정 지원과 권한이양을 받게 될 것입니다. \n거대 단일 경제권에서 청년이 선망하는 양질의 일자리를 창출해내야 합니다. \n\n그리고 최근 정국의 소용돌이를 일으키고 있는 합당론에 대하여 한 말씀 드리겠습니다.\n정청래 대표님의 공개 제안 후 조국혁신당은 \n차분하고 질서 있게 내부를 정리하고 다음을 준비하고 있습니다. \n그런데 제안을 한 민주당 내부의 파열음이 격렬합니다. \n노선과 정책을 둘러싼 생산적 논쟁이 아닙니다.\n\n게다가 그 내부 논쟁 과정에서 \n조국혁신당과 저에 대한 비난과 조롱이 이루어지고 있습니다.\n우당에 대한 예의는 찾아볼 수가 없습니다.\n상상에 상상을 더한 음모론을 펼치고 있습니다.\n\n당이 작다고 자존심까지 없는 것은 아닙니다.\n신속히 내부를 정리해주시길 바랍니다.\n저는 민주당원들의 집단지성을 믿습니다\n\n감사합니다.   /끝"}, {"id": 51, "filename": "2026.2.5 조국혁신당 허위사실 관련 공식 입장.txt", "title": "조국혁신당 허위사실 관련 공식 입장", "date": "2026-02-05", "category": "성명·입장·논평", "topics": ["정치·선거개혁", "조국혁신당"], "tags": [], "preview": "2026.2.5 조국혁신당 허위사실 관련 공식 입장  [조국 대표 및 조국혁신당 관련 허위사실 유포와 관련된 공지] 최근 유튜브를 통해 조국혁신당과 조국 대표에 관해 사실 확인이 되지 않은 주장과 평가가 반복적으로 유포되고 있다는 점에 대해 깊은 유감을 표합니다. 한 매체에서는, 문재인 정부 시절 이재명 지사가 방북팀에 포함되지 않은 것에 조국 민정수석의 작용이 있었다는 취지의 주장까지 제기되기도 했습니다. 완전한 허위사실입니다. 이 외에도 여...", "content": "2026.2.5 조국혁신당 허위사실 관련 공식 입장\n\n[조국 대표 및 조국혁신당 관련 허위사실 유포와 관련된 공지]\n최근 유튜브를 통해 조국혁신당과 조국 대표에 관해 사실 확인이 되지 않은 주장과 평가가 반복적으로 유포되고 있다는 점에 대해 깊은 유감을 표합니다.\n한 매체에서는, 문재인 정부 시절 이재명 지사가 방북팀에 포함되지 않은 것에 조국 민정수석의 작용이 있었다는 취지의 주장까지 제기되기도 했습니다. 완전한 허위사실입니다.\n이 외에도 여러 허위사실들이 주장에 섞여 확산되고 있습니다.\n정치적 비판과 의견 제시는 언론인의 당연한 권리이며, 누구도 이를 부정하지 않습니다.\n그러나 비판에는 최소한의 사실 확인과 근거 제시가 전제되어야 합니다.\n확인되지 않은 인상비평과 추정에 기초한 발언은 공론장을 풍부하게 만들기는커녕, 불필요한 오해와 갈등만을 증폭시킬 뿐입니다.\n특히 정당과 정치인에 대한 발언은 개인적 감정이나 뇌피셜이 아니라 사실과 맥락, 그리고 검증 가능한 자료에 기반해야 합니다.\n그렇지 않다면 이는 비판이 아니라 왜곡이며, 언론의 역할이 아니라 책임의 방기에 가깝습니다.\n조국혁신당은 건설적인 비판에는 언제든 열려 있습니다. 다만 아무런 근거 없이 말을 던지고, 그 여파로 불필요한 정치적 갈등을 유발하는 행위에 대해서는 분명히 문제를 제기할 수밖에 없다는 점을 분명히 밝힙니다.\n2026년 2월 5일\n조국혁신당 대변인실"}, {"id": 52, "filename": "2026.2.4. 제22차 끝까지 간다 특별위원회 모두발언.txt", "title": "제22차 끝까지 간다 특별위원회 모두발언", "date": "2026-02-04", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["기자회견", "윤석열", "끝까지간다", "내란", "검찰개혁"], "preview": "2026.2.4. 제22차 끝까지 간다 특별위원회 모두발언  조국혁신당 끝까지간다 특별위원회 위원장 조국 대표입니다.  내일 민주당은 의총을 열어 중대범죄수사청·공소청 법안을 논의합니다. 12일 입법 예고된 두 법안에 대해 조국혁신당은 물론, 민변, 참여연대, 민주법연 등 시민단체들도 매섭게 비판했습니다. 민주당 안에서도 문제 제기가 이어졌습니다. 이재명 대통령께서 “당의 의견을 수렴하라”고 지시했습니다.  이에 따라 열리는 민주당 의총은 정부...", "content": "2026.2.4. 제22차 끝까지 간다 특별위원회 모두발언\n\n조국혁신당 끝까지간다 특별위원회 위원장 조국 대표입니다.\n\n내일 민주당은 의총을 열어 중대범죄수사청·공소청 법안을 논의합니다.\n12일 입법 예고된 두 법안에 대해 조국혁신당은 물론,\n민변, 참여연대, 민주법연 등 시민단체들도 매섭게 비판했습니다.\n민주당 안에서도 문제 제기가 이어졌습니다.\n이재명 대통령께서 “당의 의견을 수렴하라”고 지시했습니다. \n이에 따라 열리는 민주당 의총은 정부 안에 큰 영향을 줄 것으로 봅니다.\n\n조국혁신당은 이미 두 법안의 문제점을 분석하고,\n대안까지도 국민께 알려드렸습니다.\n공소청법안은 기존 검찰청법을 고스란히 복사해 놓았습니다.\n‘검사 재취업 알선법, 검찰 간판 바꾸기법’에 다름 아닙니다.\n특히 형사소송법 제196조 폐지는 논의 테이블에 올리지도 않았습니다.\n정부는 공소청법안에서 종전 검찰청법상 검사 직무 중\n‘범죄수사’라는 용어를 삭제해 수사·기소 분리를 완료한 듯 선전합니다.\n그러나 형소법 196조가 남아 있는 한 이는 거짓입니다.\n공소청법 제4조 제9호 “그밖에 법령에 따라 그 권한에 속하는 사항”이라는\n조항에 따라 형사소송법 제196조의 수사권은 검사의 권한이 됩니다.\n\n중대범죄수사청법안 역시 심각합니다. \n중수청이 9대 중대범죄를 수사하면\n경찰청 국가수사본부는 2급 수사기관으로 전락합니다.\n부패·경제·방위사업 범죄와 내란·외환 등 중대범죄만 수사해야 합니다.\n수사사법관이라는 해괴한 용어를 동원한 이원적 조직 구조도 혁파돼야 합니다.\n\n이재명 대통령은 신년 기자회견에서도 검찰개혁 의지를 분명히 했습니다.\n“수사와 기소 분리해야 한다. 대원칙이다”라고 했습니다.\n검찰개혁 최종 목표를 “국민의 권리 구제”라고 못 박았습니다.\n또 “요만큼만 여지가 생기면 악용해서 나쁜 짓을 하니까 봉쇄해야 한다”\n라고도 했습니다.\n민주당은 대통령 의지에 충실한 입법안을 도출해 내야 합니다.\n\n검찰개혁의 성패가 민주당 정책 의총에 달려 있다고 해도 과언이 아닙니다.\n윤석열 검찰 독재 치하에서 절치부심하던 검찰개혁의 초심을 되새겨야 합니다.\n그렇게 당했으면서도 지긋지긋하지 않습니까?\n수사와 기소 분리, 검사 수사권 삭제, 전건 송치주의 폐지 유지 등을\n국민과 함께 외쳐오지 않았습니까?\n\n권력을 위한 검찰, 검찰을 위한 권력이 아니라\n‘국민을 위한 검찰의 정상화’만을 판단 기준으로 삼아야 합니다.\n“검찰개혁을 하면 국민 인권 보호가 안 된다는, 무슨 그런 이야기가 있느냐”는\n유시민 작가의 질타를 곱씹어주길 바랍니다.\n\n병오년 설이 코앞입니다.\n제대로 된 검찰 개혁안을 만들어,\n전국 민심이 섞이는 설에 차릴 밥상머리에\n국민 주권 정부의 성과로 제시해야 합니다.\n\n조국혁신당 등 민주개혁 정당들과 시민사회, 응원봉 국민은\n한마음으로 내일 민주당 정책 의총을 예의주시할 것입니다.\n민주당이 또다시 흐지부지한다면 국민께 개혁 의지의 퇴행,\n무관심의 증거로 받아들여질 것입니다.\n민주당의 분발과 분명한 성과 도출을 촉구합니다.   /끝"}, {"id": 53, "filename": "2026.2.2 제23차 최고위원회 모두발언.txt", "title": "제23차 최고위원회 모두발언", "date": "2026-02-02", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "합당", "최고위", "부동산"], "preview": "2026.2.2 제23차 최고위원회의 모두 발언  조국혁신당 대표 조국입니다.  ◎ 부동산 문제는 대한민국 불평등의 원인이자, 결과입니다. 국민주권 정부는 이를 해결하고자 고군분투 중입니다.  그런데 터무니없는 공격이 터져 나옵니다. 국민의힘과 일부 언론은 1.29 부동산 정책이 망가질 것이라고 저주하고 있습니다. 예정돼 있던 양도세 중과세를 집중적으로 공격합니다.   이재명 대통령은 “망국적 부동산 정상화” 의지를 밝혔습니다. “중과세 감면 ...", "content": "\n2026.2.2 제23차 최고위원회의 모두 발언\n\n조국혁신당 대표 조국입니다.\n\n◎ 부동산 문제는 대한민국 불평등의 원인이자, 결과입니다.\n국민주권 정부는 이를 해결하고자 고군분투 중입니다.\n\n그런데 터무니없는 공격이 터져 나옵니다.\n국민의힘과 일부 언론은 1.29 부동산 정책이 망가질 것이라고 저주하고 있습니다.\n예정돼 있던 양도세 중과세를 집중적으로 공격합니다.\n \n이재명 대통령은 “망국적 부동산 정상화” 의지를 밝혔습니다.\n“중과세 감면 기회를 100일 남았으니 잘 활용하시라”라고 권고했습니다.\n“집값 안정은 무슨 수를 써서라도 성공시킬 것”이라고 밝혔습니다.\n전적으로 지지하며, 응원의 박수를 보냅니다.\n\n저도 부동산으로 인한 불평등을 해결하고자 노력하고 있습니다.\n그런데 제가“위헌 소지를 제거한 토지공개념법을 재추진하겠다”고 하자,\n‘자본주의 체제 부정하는 사회주의적 체제 전환’이라는 비난이 나옵니다.\n민주당과 조국혁신당의 합당에 반대하는 이유라면서 말입니다. \n\n황당무계한 색깔론입니다.\n토지공개념은 이미 현행 헌법에 자리 잡고 있고, \n1999년 헌법재판소도 토지공개념 자체는 위헌이 아님을 분명히 한 바 있습니다.\n이런 색깔론 공세가 민주당 의원들한테서 나온다는 것이 개탄스럽습니다.\n이러한 색깔론 비난은 ‘중도 보수’가 아니라 국민의힘에서나 나올 비난입니다. \n민주당 의원님들께 상기시켜 드립니다.\n2018년 이해찬 민주당 대표와 이재명 경기도지사 두 분은\n토지공개념의 현실화가 필요하다고 역설하셨습니다.\n합당에 반대할 수 있습니다.\n그래도 할 말이 있고, 하지 말아야 할 말이 있습니다.\n\n굽히지 않겠습니다.\n조국혁신당은 잠시 후 오전 10시 30분 ‘신토지공개념 입법추진단’을 발족합니다.\n실현할 수 있는 구체적 부동산 정책과 법안을 내놓을 것입니다.\n앞으로 입법추진단의 행보를 지켜봐 주십시오. \n\n◎ 한 말씀 더 드리겠습니다.\n최근 민주당 정청래 대표님의 합당 제안 후 \n민주당 내부 논쟁이 격렬합니다.\n비전과 정책을 놓고 벌어지는 생산적 논쟁은 아닌 것으로 보입니다.\n\n그런데 이 과정에서 저와 조국혁신당을 향해 온갖 공격이 전개되고 있습니다.\n가짜뉴스, 욕설과 비난, 인신공격이 난무합니다.\n누가, 어떤 목적으로 그러는지  \n눈 밝은 국민이라면, 아실 것입니다.\n저는 인내하고, 또 인내하고 있습니다.\n\n합당에 대한 의견 다를 수 있습니다.\n제안을 한 민주당 안에서 결론을 내주십시오.\n저는 높은 정치의식과 오랜 정치경험이 있는 민주당원분들의 집단지성을 믿습니다.\n\n민주당의 내부 이견이 해소될 때까지 \n조국혁신당은 기다릴 것입니다.\n그러나 그 과정에서 \n내란을 함께 극복한 동지이자, 같이 이재명 정부를 세운 우당(友黨)인 \n조국혁신당을 제멋대로 활용하지는 말아 주십시오.\n조국혁신당을 공격한다고 해서 민주당 내부 문제가 해결되지는 않습니다.\n\n여러 차례 말씀드렸지만, 다시 한번 명확하게 밝힙니다.\n‘밀약’ 따위 없습니다.\n합당 논의는 지금 백지 한 장을 펼쳐놓은 단계입니다.\n무엇을 언제 어떻게 그릴지는 앞으로 두 당이 합의해야 합니다. \n저는 조국혁신당원의 집단지성과 민주당원의 집단지성이 \n생산적이고 상호보완적인 방향으로 작동하리라 믿습니다.\n /끝/"}, {"id": 54, "filename": "2026.2.2 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-02", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당"], "tags": ["페이스북"], "preview": "2026.2.2 조국 대표 페이스북 메시지  ‘토지공개념’ 강조한 이재명 경기도지사. 또한 '토지공개념'은 민주당의 강령에도 들어가 있다. 그럼에도 조국혁신당의 ‘토지공개념’ 재입법추진을 비난하는 일부 민주당 의원들이 있다. 개탄스럽다! 묻고 싶다. 귀하들은 어느 당 소속인가?", "content": "2026.2.2 조국 대표 페이스북 메시지\n\n‘토지공개념’ 강조한 이재명 경기도지사. 또한 '토지공개념'은 민주당의 강령에도 들어가 있다. 그럼에도 조국혁신당의 ‘토지공개념’ 재입법추진을 비난하는 일부 민주당 의원들이 있다. 개탄스럽다! 묻고 싶다. 귀하들은 어느 당 소속인가?"}, {"id": 55, "filename": "2026.2.2 조국혁신당 新토지공개념 입법추진단.txt", "title": "조국혁신당 新토지공개념 입법추진단", "date": "2026-02-02", "category": "기타", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["기자회견", "부동산", "민생", "내란", "교육", "개헌"], "preview": "2026.2.2 조국혁신당 新토지공개념 입법추진단  조국혁신당 新토지공개념 입법추진단 출범식 및 토론회_비전 발표   『 부동산 개혁과 새로운 공급 비전』   ▪️조국 新토지공개념 입법추진단 단장   국민이 원하는 내란 이후의 세상, 그 시작은 제7공화국입니다.  제7공화국은 행복이 권리가 되는 나라, 사회권 선진국입니다.   하지만 부동산 시장의 근본적인 개혁 없이는  국민의 삶은 제 자리를 맴돌 것입니다.   부동산이 투기의 수단으로 남는 ...", "content": "2026.2.2 조국혁신당 新토지공개념 입법추진단\n\n조국혁신당 新토지공개념 입법추진단 출범식 및 토론회_비전 발표\n\n 『 부동산 개혁과 새로운 공급 비전』\n\n ▪️조국 新토지공개념 입법추진단 단장 \n\n국민이 원하는 내란 이후의 세상, 그 시작은 제7공화국입니다.  제7공화국은 행복이 권리가 되는 나라, 사회권 선진국입니다. \n\n하지만 부동산 시장의 근본적인 개혁 없이는  국민의 삶은 제 자리를 맴돌 것입니다. \n\n부동산이 투기의 수단으로 남는 한,  행복은 누군가의 희생을 전제로 한 ‘제로섬 게임’에 머물 뿐입니다.\n\n부동산을 개혁해야 평등과 기회의 토양이 다져집니다. 부동산을 개혁해야 주거권을 중심으로  국민의 건강권, 돌봄권, 교육권, 문화권 등의 사회권도 보장될 수 있습니다. \n\n그래서 ‘부동산 공화국 해체’는 제7공화국을 위한 전제 조건입니다.  조국혁신당은 부동산 투기의 뿌리를 반드시 뽑겠습니다. \n\n\n첫째, 토지공개념을 제도화하겠습니다.\n\n저는 지속적으로 토지공개념 도입을 주장해 왔습니다.  민주당도 2018년 당시 이해찬 민주당 대표님과 이재명 경기도지사께서 \n\n한목소리로 부동산 문제의 근본적 해법으로 토지공개념을 강조했습니다. \n\n누가 뭐래도, 토지공개념은 ‘부동산 공화국’을 해체하는 근본적 처방입니다. \n\n토지는 기본적으로 공공재입니다. 토지 가격의 상승은 개인의 노력보다는  정부와 지방자치단체의 개발 투자로 일어납니다. \n\n그런데 그 이득은 토지 소유자가 독점합니다.  그러다 보니 토지는 자산 증식의 대표적인 수단이 되었고, 투기의 대상이 되었습니다. \n\n우리나라는 1948년 농지개혁으로 농지 소유의 집중 문제를 해결했습니다. \n\n고도의 경제성장의 배경은 농지개혁이었습니다.  그러나 지금은 땅을 소유한 상위 10%가 전체 약 78%를 소유하고 있을 정도로 부동산이 잠재성장률과 정의로운 분배를 가로막는 심각한 상황입니다. \n\n새로운 헌법에 시장친화적 토지공개념을 명시하고,  新토지공개념 3법을 입법화하겠습니다. \n\n부동산 보유세의 정상화에도 나서겠습니다.  보유세는 공공재인 토지에서 생겨나는 지대의 일부를 세금으로 환수하는 것입니다.  국가가 제공하는 공공 인프라 등의 편익의 대가를 정당하게 돌려받는 것입니다. \n\n조세 정의 차원에서도 해야 할 일이고, 불로소득을 차단하는 방법입니다. \n\n보유세를 강화하면서 거래세를 낮추는 조치가 즉각 이뤄져야 합니다. \n\n둘째, 공급의 패러다임을 바꾸겠습니다.\n\n저는 쾌적한 고품질의 100% 공공임대주택에 공공 인프라까지 갖춰서 주거권을 중심으로 건강권, 돌봄권, 교육권, 문화권 등이 보장받는,  ‘사회권 선진국형’ 부동산 정책을 추구합니다. \n\n(1) 공급 패러다임 전환의 핵심은 강남과 용산 등 입지가 가장 좋은 곳에  100% 공공임대주택을 짓는 것입니다. \n\n최근 대통령은 업무보고에서 ‘공공임대가 싸구려로 인식’되는 상황을 질타하며, ‘역세권에 공급하라’고 지시한 바 있었습니다. 저의 일관된 주장과 일치합니다. \n\n저와 조국혁신당은 ‘공공’에 대한 사회적 편견을 완전히 뒤집어 놓겠습니다.  ‘싸구려 공공’을 ‘고품질 공공’으로 바꾸는 것이 목표입니다. \n\n공공이 민간과 경쟁하는 최고의 품질을 내놓을 때, 삶의 격차는 줄어들고, 국민의 삶의 질은 높아질 수 있습니다. \n\n강남의 역세권 한복판에 민간 브랜드보다 더 고급화되고 쾌적한 30층 이상의 공공임대주택이 즐비하다면,  그리고 그곳에 고품질 공공병원, 공공도서관, 공동돌봄센터 등 매력적인 공공 인프라까지 제공된다면, \n\n서민과 중산층이 굳이 큰 빚을 내서 ‘비싼 내 집’을 사기 위해 분투하며  그 고통을 감내하지 않아도 될 것입니다.\n\n(2) 또 다른 패러다임의 전환은  20년 이상 장기공공임대주택 비중을 획기적으로 높이는 것입니다. \n\n우리나라의 20년 이상 비율은 전체 주택의 6.0%에 불과합니다.  이 비율을 최소한 프랑스의 14%, 장기적으로 34%인 네덜란드나 24%인 오스트리아 수준까지는 가야 합니다. \n\n국민들이 이사 걱정 없이 한 지역에 오래 정착하면서 자녀들의 교육 환경을 보호할 수 있고,  장기간 가처분 소득을 충분히 저축하면,  예측이 가능한 미래를 설계할 수 있습니다. \n\n장기 거주하는 공공임대주택이 늘어나면, 민간 아파트의 수요는 떨어지고 가격의 안정화도 꾀할 수 있습니다.\n\n(3) 마지막으로 공급의 다양성을 통한 패러다임의 전환입니다. \n\n장기 임대주택을 기반으로 사회주택, 협동 조합형 주택 등 다양한 공급 방식을 혼합해서 제공하겠습니다. \n\n지분 공유형, 지분적립형과 같은 공공분양 방식도 조합할 수 있습니다.  생애주기별 다양한 평수도 중요합니다. \n\n셋째, 조국혁신당의 새로운 공급 비전을 공개합니다.\n\n먼저 정부가 발표한 1.29 공급 대책은 국민의 기대를 채우지 못했습니다.  제가 신년 기자회견에서 제시한 태릉골프장 방안을 수용한 것은 환영합니다. \n\n그러나 정부는 육군사관학교를 제외하면서 6800호 규모만 발표했습니다. \n\n그리고 기존의 공급 방안을 답습한 점이 아쉽습니다.  용산공원과 서초동 법조타운, 감사원과 헌법재판소 등 최상의 입지에 대한 공급을 피했습니다. \n\n장기 공공임대주택으로 짓겠다는 파격도 포기했습니다. 공급만이 답이 아닙니다. 어떤 공급을 하느냐가 중요합니다. \n\n앞에 자료화면(판넬)을 보시겠습니다. \n\n저는 고품질 공공임대주택 12만 호를 제시했습니다. 오늘은 용산, 법조타운, 태릉, 서울공항의 조감도를 공개합니다. \n\n먼저 ‘용산공원’을 보시겠습니다. 용산공원 전체 면적의 20%, 그 둘레 부지를 활용해 약 1만 호의 주택을 공급하겠습니다.\n\n조감도를 보시면 중앙 하단의 ‘사우스포스트 서쪽’을 시작으로 시계 반대 방향을 따라 ‘캠프 킴’과 ‘캠프 코이너’, 그리고 우측의 ‘사우스포스트 동쪽’까지 이어지는 라인입니다. \n\n위치의 특성에 맞춰 초고층과 중소형을 조화롭게 배치하고, 청년 세대를 중심으로 전 세대가 입주할 수 있도록 구상했습니다. \n\n사회주택과 협동조합을 소셜 믹스하면서 최고 수준의 커뮤니티 문화시설을 특화하고, 고품질 돌봄센터를 제공합니다. \n\n여기서 짚고 넘어가야 할 질문이 있습니다. “용산공원은 누구를 위한 공간입니까?” \n\n저는 단호히 말씀드립니다. 용산공원을 소수 특권층과 기성세대가 독점해서는 안 됩니다.  청년의 주거 현실을 외면한 채 더 가진 계층의 ‘공원 뷰’와 쾌적함을 추구하는 것은 공정하지 않습니다. \n\n저와 조국혁신당은 용산공원을 최대의 공원이 아니라  대한민국 ‘최고의 청년 주택단지’로 재탄생시키겠습니다.\n\n다음은 서초동 법조타운입니다. 법조타운을 지방으로 이전하고, 그 자리에 약 8,000호의 대규모 단지를 공급할 수 있습니다. \n\n이는 인근의 소위 명품 단지들을 압도하는 ‘고품질 공공임대주택 단지’가 될 것입니다.\n\n대법원과 대검찰청이 있던 서쪽 부지에는  청년들을 위한 초고층 주거 단지를 조성하겠습니다.  저층부에는 청년 창업과 활동을 지원하는  임대 공간을 배치해 활력을 불어넣겠습니다. \n\n중앙 부지에는 대규모 커뮤니티 센터를 세우겠습니다.\n\n서울중앙지검 등이 위치한 동쪽 부지는 가족 세대 중심의 주거 공간으로 설계했습니다.  인근 성모병원과 연계한 ‘공공 의료 특화 프로그램’을 도입해서  간병과 건강 돌봄 문제로 고통받는 국민들에게 주거와 의료가 결합된 미래형 돌봄 주택을 제공하겠습니다.\n\n다음은 태릉골프장과 육군사관학교 부지입니다. 이곳은 약 3만 호를 지을 수 있습니다. 단일 단지로 국내 최대인 올림픽 파크 포레온의 3배에 달하는 규모입니다.\n\n중앙 호수 서편에 ‘동북권 핵심 업무지구’를 구축하겠습니다. 서초동의 서울연구원 등 공공기관과 민간 기업을 유치한다면, 지역의 활력을 높이고, 강·남북 격차 해소에도 기여할 것입니다. \n\n마지막으로 최대 공급지인 서울공항입니다. 최소 약 6만 호를 공급해서 강남 주거 수요를 실질적으로 대체할 수 있습니다.\n\n1970년대와 2026년의 안보 상황과 환경은 크게 달라졌습니다.  비대해진 동남권의 경제 규모와 인구 밀도를 고려할 때,  이제 서울공항의 기능을 분산하는 용기를 내야 합니다. \n\n이곳을 활용하면, 강남-송파-판교 벨트와 위례-성남 벨트의 두 축과 연결되는, 대한민국에서 가장 스마트한 주택단지와 공공 인프라가 조성됩니다.\n\n특히 판교와 강남권에 일자리가 있지만, 비싼 집 값으로 직장과 먼 거리에서 출퇴근하는 청년 세대에게 꼭 필요한 공급 방안입니다. 고품질 주택과 함께 R&D 센터와 공유 오피스, 고품질 공공병원 등을 설립하겠습니다.\n\n정치가 부동산 문제를 풀지 못하면, 국민의 삶은 달라지지 않습니다.  대한민국의 미래도 청년들의 절망 속에 갇혀버리고 말 것입니다. 꿈에 아파트 가격표가 붙는 시대를 끝내야 더 나은 시대로 나아갈 수 있습니다. \n\n국가는 나라 國에 집 家라는 글자로 이루어졌습니다. 즉 국가는 아주 큰 집입니다.  국가가 아이들을 키우고, 청년들을 돌보고, 주거를 책임져야 합니다. \n\n이것이 저와 조국혁신당이 말씀드리는 사회권 선진국입니다. 오늘 저와 조국혁신당이 제안한 \n\n혁신적인 공급 대책을 정부가 수용할 것을 촉구합니다. /끝/\n\n1인 가구를 위한 평수부터 32평인 국민 평형까지 마련하겠습니다."}, {"id": 56, "filename": "2026.2.1 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-01", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당", "개헌·민주주의"], "tags": ["페이스북"], "preview": "2026.2.1 조국 대표 페이스북 메시지  고 이해찬 총리의 장례가 끝나자 마자 이언주, 채현일 등 민주당 의원들이 헌법재판소 결정의 취지를 왜곡하고 ’색깔론‘까지 동원하며 ‘토지공개념’을 맹비난하고 나섰다. ‘토지공개념’은 이해찬 총리의 지론이었다. 이재명 경기지사도 전적으로 공감한 바 있다.  민주당의 중도보수 확장 전략, 현명하다고 생각한다. 그렇다고 ‘토지공개념’까지 왜곡하고 비난하지 말라! 고 이해찬 총리가 굽어보고 계신다.", "content": "2026.2.1 조국 대표 페이스북 메시지\n\n고 이해찬 총리의 장례가 끝나자 마자 이언주, 채현일 등 민주당 의원들이 헌법재판소 결정의 취지를 왜곡하고 ’색깔론‘까지 동원하며 ‘토지공개념’을 맹비난하고 나섰다. ‘토지공개념’은 이해찬 총리의 지론이었다. 이재명 경기지사도 전적으로 공감한 바 있다.\n\n민주당의 중도보수 확장 전략, 현명하다고 생각한다. 그렇다고 ‘토지공개념’까지 왜곡하고 비난하지 말라! 고 이해찬 총리가 굽어보고 계신다."}, {"id": 57, "filename": "2026.2.1 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-02-01", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당", "개헌·민주주의"], "tags": ["페이스북"], "preview": "2026.2.1 조국 대표 페이스북 메시지2  민주당 이언주 최고위원이 조국혁신당의 '신(新)토지공개념' 추진에 대하여 비판하면서, \"사유재산권을 명시적으로 보장한 헌법 정신과 정면으로 충돌\", \"자본주의 체제를 부정하는 사회주의적 체제 전환, 즉, 혁명적 접근으로 받아들여질 위험\" 등등 비판을 하였다. 어이가 없다. 1999년 헌법재판소도 토지공개념 자체는 합헌이라고 분명히 판시한 바 있다. 그럼에도 토지공개념에 대하여 국민의힘이 아니라 민주...", "content": "2026.2.1 조국 대표 페이스북 메시지2\n\n민주당 이언주 최고위원이 조국혁신당의 '신(新)토지공개념' 추진에 대하여 비판하면서, \"사유재산권을 명시적으로 보장한 헌법 정신과 정면으로 충돌\", \"자본주의 체제를 부정하는 사회주의적 체제 전환, 즉, 혁명적 접근으로 받아들여질 위험\" 등등 비판을 하였다.\n어이가 없다. 1999년 헌법재판소도 토지공개념 자체는 합헌이라고 분명히 판시한 바 있다. 그럼에도 토지공개념에 대하여 국민의힘이 아니라 민주당에서 색깔론 공세를 전개하다니, 믿어지지 않는다.\n상세한 비판은 내일 2026.2.2.(월) '신토지공개념 입법추진단' 출범식 및 토론회에서 할 것이다. 조국혁신당은 1989년 헌재가 지목한 위헌 요소를 제거한 토지공개념 입법을 추진하고 있다."}, {"id": 58, "filename": "2026.1.31 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-31", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당"], "tags": ["합당", "페이스북"], "preview": "2026.1.31 조국 대표 페이스북 메시지  최근 민주당 정청래 대표의 합당 제안 이후 온라인상에서 “조국혁신당 부채가 400억 원이다”는 허위사실이 대대적으로 유포되고 있습니다.  분명히 말합니다. 조국혁신당 부채 0원 입니다. 조국혁신당은 무차입(無借入)정당입니다.  자신들의 정파적 목적을 위하여 혁신당을 음해하는 자들에게 경고합니다. 당장 허위선동 글을 내리십시오.", "content": "2026.1.31 조국 대표 페이스북 메시지\n\n최근 민주당 정청래 대표의 합당 제안 이후 온라인상에서 “조국혁신당 부채가 400억 원이다”는 허위사실이 대대적으로 유포되고 있습니다. \n분명히 말합니다. 조국혁신당 부채 0원 입니다. 조국혁신당은 무차입(無借入)정당입니다. \n자신들의 정파적 목적을 위하여 혁신당을 음해하는 자들에게 경고합니다. 당장 허위선동 글을 내리십시오."}, {"id": 59, "filename": "2026.1.30 서왕진 원내대표 페이스북 메시지.txt", "title": "서왕진 원내대표 페이스북 메시지", "date": "2026-01-30", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당"], "tags": ["합당", "페이스북"], "preview": "2026.1.30 서왕진 원내대표 페이스북 메시지  어제 더불어민주당 모 의원과 국무위원간 텔레그램 대화 내용이 보도되었습니다. 다시 한번 분명히 말씀드립니다. 조국 대표를 비롯한 당의 구성원 그 누구도 민주당과 합당에 관한 실무 논의를 진행한 바 없습니다.  그럼에도 불구하고, 여권 인사들이 사적 대화에서조차 근거 없는 밀약설을 제기하며 타격 소재를 궁리하는 모습에 강한 유감을 표합니다. 정중히 요청합니다. 당 내부의 복잡한 셈법과 분란에 조...", "content": "2026.1.30 서왕진 원내대표 페이스북 메시지\n\n어제 더불어민주당 모 의원과 국무위원간 텔레그램 대화 내용이 보도되었습니다.\n다시 한번 분명히 말씀드립니다. 조국 대표를 비롯한 당의 구성원 그 누구도 민주당과 합당에 관한 실무 논의를 진행한 바 없습니다. \n그럼에도 불구하고, 여권 인사들이 사적 대화에서조차 근거 없는 밀약설을 제기하며 타격 소재를 궁리하는 모습에 강한 유감을 표합니다.\n정중히 요청합니다. 당 내부의 복잡한 셈법과 분란에 조국혁신당을 끌어들이지 마십시오. 근거 없는 밀약설로 우당(友黨)의 대표를 모욕하지 마십시오.\n우당을 정치공학적으로 활용하지 말고, 최소한의 예의를 갖춰 주십시오. 동지를 향한 예의 없는 상상력은 단합이 아니라 분열의 씨앗이 될 뿐입니다.\n밀실의 계산이 아니라 광장의 원칙을 따르겠습니다."}, {"id": 60, "filename": "2026.1.30 조국 대표 페이스북 메시지 헌재 비례의석 관련 위헌 판결 입장.txt", "title": "조국 대표 페이스북 메시지 헌재 비례의석 관련 위헌 판결 입장", "date": "2026-01-30", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당", "개헌·민주주의"], "tags": ["페이스북"], "preview": "2026.1.30 조국 대표 페이스북 메시지 <헌재 비례의석 관련 위헌 판결 입장>  학자 시절부터 주장해온 것인데, 헌법재판소가 드디어 위헌 결정을 했다. 이는 진보보수의 문제가 아니라 표의 비례성을 강화하는 민주주의의 문제다. 이 사안 외에도 소수의 목소리가 정치에 반영되도록 하는 정치개혁은 우리 시대의 과제다. 집권당이 책임지고 추진하는 것이 옳다.", "content": "2026.1.30 조국 대표 페이스북 메시지 <헌재 비례의석 관련 위헌 판결 입장>\n\n학자 시절부터 주장해온 것인데, 헌법재판소가 드디어 위헌 결정을 했다. 이는 진보보수의 문제가 아니라 표의 비례성을 강화하는 민주주의의 문제다. 이 사안 외에도 소수의 목소리가 정치에 반영되도록 하는 정치개혁은 우리 시대의 과제다. 집권당이 책임지고 추진하는 것이 옳다."}, {"id": 61, "filename": "2026.1.29 제22차 최고위원회의.txt", "title": "제22차 최고위원회의", "date": "2026-01-29", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["교육", "최고위"], "preview": "제22차 최고위원회의 모두 발언  2026.1.29. 조국혁신당 제22차 최고위원회의 모두발언   조국혁신당 대표 조국입니다. 표현의 자유를 최대한 허용하는 것이 민주주의임은 주지의 사실입니다. 그렇지만 표현의 자유에도 지켜야 할 선은 있습니다. 최근 표현의 자유를 악용한 혐오와 세몰이, 돈벌이가 기승을 부리고 있습니다.  이해찬 전 총리가 운명하시면서 국민적 추모 물결이 이어지고 있습니다. 그런데, 일부 유튜버들은 입에 담을 수 없는 비난과 ...", "content": "\n제22차 최고위원회의 모두 발언\n\n2026.1.29. 조국혁신당 제22차 최고위원회의 모두발언 \n\n조국혁신당 대표 조국입니다.\n표현의 자유를 최대한 허용하는 것이 민주주의임은 주지의 사실입니다.\n그렇지만 표현의 자유에도 지켜야 할 선은 있습니다.\n최근 표현의 자유를 악용한 혐오와 세몰이, 돈벌이가 기승을 부리고 있습니다.\n\n이해찬 전 총리가 운명하시면서 국민적 추모 물결이 이어지고 있습니다.\n그런데, 일부 유튜버들은 입에 담을 수 없는 비난과 음모론을 제기합니다.\n한 유튜버는 이 전 총리의 베트남 출장을 문제 삼습니다.\n차기 후계자를 논의하러 간 것이랍니다.\n“부정선거 관련 제1의 비밀 보유자는 이해찬”이라는 헛소리도 하고 있습니다.\n평생 그를 괴롭힌 색깔론을 들이대며 “종북주의자”라고 욕합니다.\n\n증거나 논리는 손톱만큼도 없습니다.\n이들에게 사실은 중요하지 않고, 자극적 소재와 발언만 내세웁니다.\n이런 유튜버들은 대중이 외면해야 하는데, 돈을 많이 벌고 유명해지고 있습니다.\n\n오프라인에서는 현수막이 문제입니다.\n국회 앞에만 해도 제정신인가 싶은 현수막이 걸려 있습니다.\n이재명 대통령을 “한국의 마두로, 시진핑”이라고 지칭한 현수막이 걸려 있습니다.\n“계엄 위증 배후는 민주당 모 의원”이라는 주장은 점잖은 편입니다.\n‘내일로미래로’라는 정당의 탈을 쓴 극우 단체가 내걸었더군요.\n이 단체는 후원금을 모아 전국에 현수막을 내거는 것이 유일한 활동입니다.\n옮겨 담기 민망한 말로 혐중 정서와 부정선거 음모론을 퍼뜨리고 있습니다.\n\n학교 인근에 이재명 대통령, 김현지 제1부속실장 얼굴과 함께\n‘무슨 관계냐'라고 묻는 현수막도 걸려 있습니다.\n\n이들은 혐오와 허위를 무기로 돈벌이하고 광신적 추종자를 모으고 있습니다.\n이러한 명백한 허위사실 유포를 보장하는 것이 표현의 자유는 아닙니다.\n\n더는 안 됩니다. 절제된, 그러면서도 단호한 조치가 필요합니다.\n방송미디어통신위원회와 방송미디어통신심의위원회 구성을 서둘러야 합니다.\n두 위원회는 표현의 자유를 보장하면서도 \n수술날처럼 예리하게 문제점만 도려낼 조치를 강구해야 합니다.\n\n현행 옥외광고물법도 고쳐야 합니다.\n정당 현수막이더라도 문제가 되면 수정 또는 철거토록 해야 합니다.\n물론 소수 정당의 표현의 자유가 제약되어서는 안됩니다. \n수정·철거 여부를 지자체가 아닌 선거관리위원회가 판단하면 됩니다.\n\n다시 한번 말씀드리지만, 표현의 자유는 소중합니다.\n그러나 악의와 허위로 가득찬\n선전·선동물을 방치해서는 안 됩니다.  /끝/"}, {"id": 62, "filename": "2026.1.29. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-29", "category": "페이스북 메시지", "topics": ["검찰·사법개혁", "인권·사회"], "tags": ["페이스북"], "preview": "2026.1.29. 조국 대표 페이스북 메시지  우인성 재판장, 판결문에서 법언(法諺) “in dubio pro reo”(의심스러울 때는 피고인의 이익으로)를 거론했다. 이는 형사법의 대원칙을 압축한 것이다.  문제는 이 원칙의 적용이 자의적이라는 데 있다. 어떤 사건은 피고인의 모든 항변을 일거에 날리고 중형을 선고하면서, 어떤 사건은 이 원칙을 적용하여 다 풀어준다. 형사법 원칙인 ’자유심증주의’가 아니라 ‘자의(恣意)심증주의‘가 되어버린 ...", "content": "2026.1.29. 조국 대표 페이스북 메시지\n\n우인성 재판장, 판결문에서 법언(法諺) “in dubio pro reo”(의심스러울 때는 피고인의 이익으로)를 거론했다. 이는 형사법의 대원칙을 압축한 것이다. \n문제는 이 원칙의 적용이 자의적이라는 데 있다. 어떤 사건은 피고인의 모든 항변을 일거에 날리고 중형을 선고하면서, 어떤 사건은 이 원칙을 적용하여 다 풀어준다. 형사법 원칙인 ’자유심증주의’가 아니라 ‘자의(恣意)심증주의‘가 되어버린 것이 아닌가.\n다음으로 우 재판장의 판단이 모두 맞다고 하더라도 문제가 남는다. 그의 판단대로라도 ‘방조범’은 성립한다. 왜 검사에게 ‘공소장변경’을 요청하지 않았는지 이해하기 어렵다. \n판결문 문구에서 드러나듯, 우 재판장은 “권력을 잃은 자“ 김건희가 ”차별”받지 않아야 한다는 생각을 갖고 있었고, 이러한 관점에서 주가조작 혐의에 무죄판결이라는 선물을 주려고 작정했던 것이다."}, {"id": 63, "filename": "2026.1.28. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-28", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["검찰개혁", "사법개혁", "윤석열", "페이스북"], "preview": "2026.1.28. 조국 대표 페이스북 메시지  “목걸이만 뺏고 끝났다” 선출되지 않은 권력 김건희는 매관매직을 일삼고, 공천에 개입하고, 정치검찰을 하수인으로 부리는 등 윤석열과 권력을 함께 권력을 행사했다.  그러나 재판부는 달리 판단했다. 주가조작이 있었음을 인지하고 있었고 주가조작으로 큰 이익을 얻었지만, 주가조작 가담이 없어 공동정범으로 보기는 어렵기에 무죄라고 판단했다. 김건희가 받아 챙긴 것들에 대해서는 ‘선의’, ‘홍보 목적’, ...", "content": "2026.1.28. 조국 대표 페이스북 메시지\n\n“목걸이만 뺏고 끝났다”\n선출되지 않은 권력 김건희는 매관매직을 일삼고, 공천에 개입하고, 정치검찰을 하수인으로 부리는 등 윤석열과 권력을 함께 권력을 행사했다. \n그러나 재판부는 달리 판단했다. 주가조작이 있었음을 인지하고 있었고 주가조작으로 큰 이익을 얻었지만, 주가조작 가담이 없어 공동정범으로 보기는 어렵기에 무죄라고 판단했다. 김건희가 받아 챙긴 것들에 대해서는 ‘선의’, ‘홍보 목적’, ‘호의의 결과’로 판단했다. 여론조사 후불의 대가로 김영선 공천이 이루어졌지만, 계약서가 없는 등 명태균씨가 김건희로부터 여론조사 실시를 지시받거나 의뢰받았다는 직접적인 증거가 부족하다고 보아 무죄 판단했다. 이 모두 김건희에게만 적용되는 엄격해석이다. \n징역 1년 8개월 징역 선고를 들은 김건희는 법정에서 만세를 부르고 싶었을 것이다. 감옥으로 돌아가 환호했을 것이다. 그러나 국민은 허탈해지고 맥이 빠지고 분노가 치밀었을 것이다.\n법 앞의 평등? 아직 멀었다. 김건희의 비위에 반의 반에도 미치는 못하는 행위임에도 두 배, 세 배의 중형이 내려진 사례를 쉽게 찾을 수 있다. 항소심에서 뒤집어야 한다. 이와 함께 검찰개혁과 사법개혁을 주창해온 정당의 대표로서 다시 한번 결전(決戰)의 의지를 다진다."}, {"id": 64, "filename": "2026.01.26 제20차 최고위원회의 모두발언.txt", "title": "제20차 최고위원회의 모두발언", "date": "2026-01-26", "category": "최고위원회", "topics": ["인권·사회", "조국혁신당", "개헌·민주주의", "민생·경제"], "tags": ["최고위", "민생", "부동산"], "preview": "2026.01.26 제20차 최고위원회의 모두발언  조국혁신당 대표 조국입니다.  ◎ 먼저, 어제 별세하신 이해찬 전 국무총리님의 명복을 빕니다. 이 총리님은 용맹한 민주투사였고, 경륜과 혜안의 정치인이었습니다. 민주주의를 향한 굳은 신념, 좋은 나라를 만들기 위한 실천적 노력을 이어받겠습니다. 삼가 명복을 빕니다.  ◎ 지금 대한민국 부동산 상황은 위험한 지경입니다. ‘K-부동산 현상’으로 불릴 만큼 격차가 심화되고 있습니다. 이미 가진 사람...", "content": "2026.01.26 제20차 최고위원회의 모두발언\n\n조국혁신당 대표 조국입니다.\n\n◎ 먼저, 어제 별세하신 이해찬 전 국무총리님의 명복을 빕니다.\n이 총리님은 용맹한 민주투사였고, 경륜과 혜안의 정치인이었습니다.\n민주주의를 향한 굳은 신념, 좋은 나라를 만들기 위한 실천적 노력을 이어받겠습니다.\n삼가 명복을 빕니다.\n\n◎ 지금 대한민국 부동산 상황은 위험한 지경입니다.\n‘K-부동산 현상’으로 불릴 만큼 격차가 심화되고 있습니다.\n이미 가진 사람들은 일하지 않고도 지나친 이익을 거둡니다.\n성실하게 땀 흘려 일하는 국민, 특히 청년의 노력은 뒤쫓아 가지 못합니다.\n\n서울 강남·서초 등 집값은 해가 갈수록 치솟습니다.\n앉아서 남들이 100년을 모아도 못 벌 돈을 몇 년 만에 챙깁니다.\n불로소득 구조가 커질수록, 불법과 편법의 유혹은 함께 자랍니다.\n\n지방의 경우 거래가 멈춰 섰습니다. \n집을 내놔도 나가지 않고, 오히려 빈집이 늘어납니다. \n지방 축소를 넘어 지방 소멸의 위기를 상징합니다.\n\n무주택자의 처지는 더 힘듭니다.\n성실히 저축하며 전·월세로 사는 서민과 청년은 좀처럼 희망을 찾지 못합니다.\n과거 부모 세대만큼 많이 벌더라도 주거비 부담 때문에 쓸 돈은 부족하고,\n주거 불안에 떨어야 합니다.\n심지어 부모가 부동산 부자가 아닌 청년들은 ‘고소득 저자산 세대’가 됩니다.\n\n부동산 격차가 신분의 격차가 되는 \n‘21세기 골품제'가 청년의 비상을 가로막습니다.\n부모 부동산이 자녀의 신분이 되는\n‘부동산 계급사회’가 되어버린 것입니다.\n실제 순자산 불평등을 보여주는 순자산 지니계수는 \n2017년 0.584에서 2025년 0.625로 뛰어 역대 최고였습니다.\n\n이재명 대통령께서 “5월 9일 다주택 양도세 중과 유예를\n예정대로 종료하겠다”라는 말씀은 그래서 반갑습니다.\n이 대통령님은 특히 “‘잃어버린 30년’을 향해 치닫는\n‘부동산 불로소득 공화국’을 탈출하는 데에도 고통과 저항은 많겠지만\n필요하고 유용한 일이라면 피하지 말아야 한다”라고도 하셨습니다.\n전적으로 공감하고, 동의합니다.\n\n그렇지만 이것만으로는 부족합니다.\n이 혼돈을 시장의 문제, 과도기 상황으로 봐서는 안 됩니다. \n방향을 근본적으로 바꿔야 합니다.\n바로 주거권을 국가가 책임지는 사회권 선진국으로 가는 것입니다.\n\n토지는 사유재이면서도 공공재입니다.\n주택은 투기의 대상이 아니라 삶의 둥지여야 합니다.\n주거권이라는 헌법상 기본권이 시장의 탐욕에만 휘둘려서는 안 됩니다.\n그것이 국가의 책무입니다.\n\n“공급 확대, 시장 활성화” 천명으로는 부족합니다.\n실질적인 주거 사다리를 놓아야 합니다. \n공공부지는 공공을 위해 쓰는 게 너무도 당연합니다. \n용산공원 등과 같은 서울과 수도권 핵심 공공부지가 대상입니다.\n청년 공공주택, 고품질 공공주택을 확대 공급해야 합니다. \n\n토지공개념이 법전에나 있는 선언에 그쳐서는 안 됩니다.\n조국혁신당은 토지공개념 3법, 즉 택지소유상한제·토지초과이득세·개발이익환수제\n관련 법안을 오늘날 대한민국에 맞게 제·개정하겠습니다. \n택지는 소수가 독식하지 못하게 하고, \n개발이익·초과이익을 환수해 공공주택과 주거 안전망 확충에 써야 합니다. \n\n조국혁신당이 그리는 세상은 명료합니다.\n땅 부자가 사회적 특수계급이 돼서는 안 됩니다.\n노력의 가치를 비웃는 부동산 신화는 깨야 합니다.\n이를 위해 성실하게 일하는 사람이 안심하고 주거할 수 있는\n사회권 선진국을 만들겠습니다.      /끝"}, {"id": 65, "filename": "2026.1.26 조국 대표 이해찬 총리 서거 관련 메시지 모음.txt", "title": "조국 대표 이해찬 총리 서거 관련 메시지 모음", "date": "2026-01-26", "category": "기타 메시지", "topics": ["정치·선거개혁", "조국혁신당", "개헌·민주주의", "민생·경제"], "tags": ["민생"], "preview": "2026.1.26 조국 대표 이해찬 총리 서거 관련 메시지 모음  1. 이해찬 전 총리님이 베트남에서 심정지로 쓰러시셨습니다. 반독재 민주화운동의 전략가셨고, 노무현, 문재인 정부 시절 핵심적 역할을 하셨습니다. 2012년 세종시 초대 국회의원 선거에 뛰어드셨을 때 감히 제가 후원회장을 맡았고, 이후 많은 지도편달을 해주셨습니다. 이해찬 총리님, 아직 하실 일이 많습니다. 반드시 쾌차하셔서 돌아오시길 빌겠습니다.  2. 이해찬 총리님은 평생 대...", "content": "2026.1.26 조국 대표 이해찬 총리 서거 관련 메시지 모음\n\n1.\n이해찬 전 총리님이 베트남에서 심정지로 쓰러시셨습니다. 반독재 민주화운동의 전략가셨고, 노무현, 문재인 정부 시절 핵심적 역할을 하셨습니다. 2012년 세종시 초대 국회의원 선거에 뛰어드셨을 때 감히 제가 후원회장을 맡았고, 이후 많은 지도편달을 해주셨습니다.\n이해찬 총리님, 아직 하실 일이 많습니다. 반드시 쾌차하셔서 돌아오시길 빌겠습니다.\n\n2.\n이해찬 총리님은 평생 대한민국의 민주주의를 회복하고 지키기 위해 헌신하셨습니다. \n감히 후원회장을 맡기도 하였지만, 늘 여쭙고 배웠습니다. 2019년 제가 독화살을 맞던 시간, 당신께서는 단호한 어조로 사태의 본질을 말씀하시며 흔들리지 말고 마음 굳게 먹으라고 당부하셨습니다. 꽉 잡아주시던 그 손을 잊지 못합니다.\n이해찬 총리님, 이제 무거운 짐 내려놓고 평온히 쉬십시오. 가르쳐주신 대로, 남겨주신 발자국을 기억하며 살겠습니다. 당신의 치열함과 치밀함을 늘 새기겠습니다. \n감사합니다. 존경합니다.\n\n3.\n이해찬 총리님은 1978년 26세 청년으로 서울 신림동에 사회과학전문서점인 ‘광장서점’을 열었다. ’민주화를 위한 청년연합‘ 기관지인 <민주화의 길> 등 팜플렛을 사러 갔다가 뵌 것이 첫 만남이었다. 서점 주인과 대학생의 만남. 두꺼운 안경테 안의 눈빛이 강렬한 분이셨다. 한참 뒤 나이 들어 술자리에서 즐겁게 옛날 얘기를 나누었다. 다시 한번 고인의 명복을 빈다."}, {"id": 66, "filename": "2026.1.26 조국혁신당 당무위원회 입장문.txt", "title": "조국혁신당 당무위원회 입장문", "date": "2026-01-26", "category": "성명·입장·논평", "topics": ["정치·선거개혁", "조국혁신당"], "tags": ["합당"], "preview": "2026.1.26. 조국혁신당 당무위원회 입장문  [조국혁신당 당무위원회 입장문] 조국혁신당 제24차 당무위원회에서는  민주당의 합당 제안에 대하여  진지하고 격렬한 찬반 논의를 하였습니다. 그 결과 다음과 같이 의결하였습니다 첫째, 조국혁신당의 독자적인 비전, 가치, 정책에 기초하여 당원의 총의에 따라 합당 여부를 판단한다. 둘째, 민주당의 제안과 관련된 협의 등의 전권은  당 대표에게 위임한다.  2026년 1월 26일 조국혁신당 당무위원회", "content": "2026.1.26. 조국혁신당 당무위원회 입장문\n\n[조국혁신당 당무위원회 입장문]\n조국혁신당 제24차 당무위원회에서는 \n민주당의 합당 제안에 대하여 \n진지하고 격렬한 찬반 논의를 하였습니다.\n그 결과 다음과 같이 의결하였습니다\n첫째, 조국혁신당의 독자적인 비전, 가치, 정책에 기초하여\n당원의 총의에 따라 합당 여부를 판단한다.\n둘째, 민주당의 제안과 관련된 협의 등의 전권은 \n당 대표에게 위임한다.\n\n2026년 1월 26일\n조국혁신당 당무위원회"}, {"id": 67, "filename": "2026.1.23. 광주시민단체협의회 간담회 조국 대표 모두발언.txt", "title": "광주시민단체협의회 간담회 조국 대표 모두발언", "date": "2026-01-23", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "기자회견", "5.18"], "preview": "2026.1.23. 광주시민단체협의회 간담회 조국 대표 모두발언  안녕하십니까, 조국혁신당 대표 조국입니다. 광주·전남에서 빛과 소금 역할을 해오신 여러분들을 만나 뵈어서 너무 반갑습니다. 이곳은 대한민국 민주주의의 최전선이자 최후 보루다라고 생각해왔습니다. 저는 고향이 부산이지만, 광주에만 오면 고향에 온 듯합니다. 저 스스로 광주 세대라고 생각하고 성장했고, 자랐고, 그를 믿으며 살아왔습니다. 제 삶의 고비 고비에 광주가 있었습니다.  저는...", "content": "2026.1.23. 광주시민단체협의회 간담회 조국 대표 모두발언\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n광주·전남에서 빛과 소금 역할을 해오신 여러분들을 만나 뵈어서 너무 반갑습니다.\n이곳은 대한민국 민주주의의 최전선이자 최후 보루다라고 생각해왔습니다.\n저는 고향이 부산이지만, 광주에만 오면 고향에 온 듯합니다.\n저 스스로 광주 세대라고 생각하고 성장했고, 자랐고, 그를 믿으며 살아왔습니다.\n제 삶의 고비 고비에 광주가 있었습니다.\n\n저는 오늘 세 가지를 말씀드리려고 합니다.\n‘내란 극복, 광주·전남 통합’, 그리고 ‘호남 정치’ 세 가지입니다.\n\n다들 아시다시피 얼마 전에 한덕수 전 국무총리에 대한 1심 판결이 나왔습니다.\n이진관 재판부는 12·3 비상계엄을 ‘12·3 내란’으로 규정했습니다.\n제가 법률가이지만,\n그 판결문을 직접 들으면서 속이 뻥 뚫리는 듯 했습니다.\n내란 세력에 대한 사법적 심판은 속속 진행될 것이고, \n내란 일당에 대한 중형은 필연적이다 생각합니다.\n\n그렇지만 정치적 단죄는 아직 이뤄지지 않았습니다.\n국민의힘은 반성은커녕 ‘윤어게인 세력’을 모으고 있습니다. \n어제 제가 정말 황당한 장면을 TV에서 보았습니다.\n국정농단으로 대통령직에서 쫓겨난 박근혜 씨가 \n장동혁 국민의힘 대표를 만나 이렇게 말을 했습니다.\n“훗날 더 큰 싸움을 하자.”\n도대체 무슨 싸움을 하겠다는 것입니까?\n기가 막혔습니다.\n대한민국의 현재와 미래를 위해서 이들을 정치적으로 단죄해야 한다고 생각합니다.\n그래서 6월 지방선거가 중요합니다.\n‘국힘 제로’만들겠습니다.\n광주·전남 시민사회에서도 더 큰 목소리 내주시면 감사하겠습니다.\n\n두 번째는 이곳의 현안인 광주·전남, 전남·광주 통합입니다.\n조국혁신당은 오래 전부터 ‘5극 3특’ 국가균형발전 전략 차원에 대해서 찬성해 왔습니다.\n광주·전남은 이를 통해 \n민주주의의 심장에서 대한민국 미래산업의 심장으로 도약할 것입니다.\n\n다만, 중차대한 과제를 추진해야할 때 살펴야 할 것이 있다고 봅니다.\n첫째, 장기적 재정 분권을 보장하는 법적·제도적 토대를 마련해야 합니다.\n광주·전남은 재정자립도가 낮습니다.\n한시적으로 보면, 4년 후 재정절벽에 직면할 수밖에 없습니다.\n장기적이고, 안정적인 재정 분권을 보장해야 한다고 생각합니다.\n통합특별시에 대한 지방교부세율을 상향하고, 국세의 지방세 이양을 해야 합니다.\n\n둘째, 통 큰 권한이양(移讓)이 필요합니다.\n중앙정부가 자치단체 핵심 사업에 대해 여전히 통제권을 행사합니다.\n손발 묶고 뛰라는 것입니다.\n통합특별시에는 지방 재정권과 자치권이 보장되어야 하고,\n인·허가권 이양 범위도 확대해야 한다고 생각합니다.\n\n셋째, 통합특별시에서 농촌지역 소외가 발생하지 않도록 해야 합니다.\n벌써 통합특별시가 되면 \n농촌지역에서 광주로 돈과 사람이 몰리는 것이 아닌가 하는 우려가 들려옵니다.\n소외되는 곳이 없는지, 어떻게 해소할 것인지 세심한 대비가 필요하다고 봅니다.\n\n넷째, 주민과 소통하고 의견을 수렴하는 데 노력해야 합니다.\n자칫 위로부터의 통합에 그치면 갈등과 불협화음이 나올 수 있습니다.\n통합할 때는 소통이 중요하다고 봅니다.\n저희는 정당과 시민이 함께하는\n‘광주·전남 행정통합 초당적 협의체’ 구성을 제안한 바 있습니다.\n위의 내용을 담은 행정통합 법안이 마련될 수 있도록 노력하겠습니다.\n\n마지막으로 세 번째로 드릴 말씀은 호남 정치입니다.\n과거 대한민국을 이끌던 호남 정치는 지금 어디에 있습니까?\n호남 정치는 미래를 이끌고 있습니까.\n이런 질문 던지고 싶습니다.\n실력과 비전으로 경쟁하는 것이 아니라, \n공천권자 눈에만 들려고 하는 정치가 해결되었는지 의문입니다.\n호남 유권자와 지역이 아니라, 여의도만 바라보지 않는지 의문입니다.\n\n저는 여기 모이신 광주시민단체 협의회분들께서 정치개혁을 위해서 뛰어오신 것 잘 알고 있습니다. 많은 성명서, 기자회견문 다 읽어보았고 그 내용 전적으로 동의하고 있습니다.\n\n조국혁신당은 정치개혁을 위해 뛸 것입니다.\n침체한 호수에 뛰어든 메기처럼 물을 뒤집겠습니다.\n그리하여 호남 정치를 펄떡펄떡 뛰게 만들겠습니다.\n감사합니다.     /끝/"}, {"id": 68, "filename": "2026.1.22. 민주당 합당 제안에 대한 조국 대표 입장 발표.txt", "title": "민주당 합당 제안에 대한 조국 대표 입장 발표", "date": "2026-01-22", "category": "성명·입장·논평", "topics": ["정치·선거개혁", "조국혁신당", "개헌·민주주의"], "tags": ["합당", "개헌"], "preview": "2026.1.22. 민주당 합당 제안에 대한 조국 대표 입장 발표  어제 늦은 오후 정청래 대표님을 만나 오늘의 발표 내용을 전달받았습니다.  갑작스럽지만 제안의 무게가 결코 가볍지 않기에 최고위원들과 함께 숙고했습니다.  조국혁신당은 정 대표님이 언급한 ‘이재명 정부의 성공’과  ‘정권 재창출’이라는 목표에 전적으로 동의합니다.  우리 당과 민주당은 일관되게 그 길을 함께 걷고 있습니다.  지난 대선에서 조국혁신당의 대선 후보는 이재명 후보였...", "content": "2026.1.22. 민주당 합당 제안에 대한 조국 대표 입장 발표\n\n어제 늦은 오후 정청래 대표님을 만나 오늘의 발표 내용을 전달받았습니다. \n갑작스럽지만 제안의 무게가 결코 가볍지 않기에 최고위원들과 함께 숙고했습니다. \n조국혁신당은 정 대표님이 언급한 ‘이재명 정부의 성공’과 \n‘정권 재창출’이라는 목표에 전적으로 동의합니다. \n우리 당과 민주당은 일관되게 그 길을 함께 걷고 있습니다. \n지난 대선에서 조국혁신당의 대선 후보는 이재명 후보였습니다. \n동시에 조국혁신당은 ‘정치개혁과 개헌’, \n‘사회권 선진국 실현’과 ‘토지공개념 입법화’ 등 \n민주당이 말하지 않는 진보적 미래 과제들을 독자적으로 추구하고 있습니다. \n이 두 시대적 과제를 모두 실현할 수 있는 ‘최선의 길’이 무엇인지, \n국민과 당원의 목소리를 경청하겠습니다. \n이를 위해 의원총회와 당무위원회의 조속한 개최를 지시했습니다.\n조국혁신당은 국민의 마음과 뜻이 가리키는 방향을 따라 논의하고 결정할 것이며, \n그 결과가 나오는 대로 국민께 보고 올리겠습니다. \n저는 이 모든 과정에서 당대표로서의 책임을 다하겠습니다.\n2026.1.22. 조국혁신당 대표 조국."}, {"id": 69, "filename": "2026.1.22. 전북도당 현장 최고위원회의 모두발언.txt", "title": "전북도당 현장 최고위원회의 모두발언", "date": "2026-01-22", "category": "최고위원회", "topics": ["정치·선거개혁", "조국혁신당", "개헌·민주주의", "민생·경제"], "tags": ["지방선거", "개헌", "최고위", "민생"], "preview": "2026.1.22. 전북도당 현장 최고위원회의 모두발언  존경하는 전북도민 여러분, 전주 시민 여러분, 사랑하는 당원 동지 여러분! 반갑습니다. 조국혁신당 대표 조국입니다. 4주 만에 다시 전북을 찾았습니다. 환대해 주셔서 감사드립니다.  6월 지방 선거까지 130일 남았습니다. 지방자치가 시작된 지 한 세대가 흘렀지만, 안타깝게도 수도권 집중은 여전합니다. 지역 정책도 은전 베풀 듯 중앙에서 내려옵니다.  더는 안 됩니다. 이제 우리 국민이 ...", "content": "2026.1.22. 전북도당 현장 최고위원회의 모두발언\n\n존경하는 전북도민 여러분, 전주 시민 여러분, 사랑하는 당원 동지 여러분!\n반갑습니다. 조국혁신당 대표 조국입니다.\n4주 만에 다시 전북을 찾았습니다. 환대해 주셔서 감사드립니다.\n\n6월 지방 선거까지 130일 남았습니다.\n지방자치가 시작된 지 한 세대가 흘렀지만,\n안타깝게도 수도권 집중은 여전합니다.\n지역 정책도 은전 베풀 듯 중앙에서 내려옵니다.\n\n더는 안 됩니다. 이제 우리 국민이 진정한 지방자치를 누릴 때가 됐습니다. \n이를 위해 조국혁신당은 전북 주민께 네 가지 약속을 드립니다.\n첫째, ‘원 포인트 개헌’을 추진하겠습니다.\n헌법 제1조에 “대한민국은 지방분권 공화국이다”라고 못 박아야 합니다. \n진정한 지방자치는 지방분권, 즉 권한이 있어야 가능합니다.\n\n지금은 내려주는 예산을 제한된 범위에서만 쓸 수 있습니다. \n법령을 벗어나지 않는 틀에서만 조례를 만들 수 있습니다.\n여러 종목 운동선수들에게 한 사이즈 단체복을 입힌 꼴입니다.\n\n지방분권 강화에 여야 이견이 없습니다.\n이번 지방선거에서 ‘지방분권 개헌 국민투표’를 동시에 실시합시다.\n행정 비용을 아끼고 민주적 정당성을 높이는 가장 효율적인 결단입니다.\n\n두 번째, 지방 선거를 계기로 전북에서 혁신 경쟁을 하겠습니다.\n대한민국은 명실상부한 선진국입니다.\n그렇지만 정치, 특히 지역 정치에서 아쉬운 대목이 있습니다.\n특정 정당이 특정 지역을 장악하다시피 하고 있습니다.\n공천권이 권력이 되고, 그 틈으로 구태와 부패가 파고듭니다.\n\n대한민국 양궁이 세계대회에서 석권을 하는 이유는,\n실력만으로 국가대표를 선발하기 때문입니다.\n좋은 정당이 실력으로 좋은 경쟁을 하면 정치는 좋아질 수 밖에 없습니다.\n그 혜택은 고스란히 주민에게 돌아갑니다.\n조국혁신당은 전북에서 치열한 혁신 경쟁을 벌이겠습니다. \n\n세 번째, 헌법재판소를 전북 전주로 이전하는 것을 추진하겠습니다.\n이는 지난 4월 10일 총선 기간 중 말씀드렸던 것을 실천하고자 함입니다. \n상세한 사항은 법안을 발의하신 전북의 딸, 강경숙 의원님께서 설명하셨습니다. \n대한민국 주요 기관은 수도권, 정확히는 서울에 모여 있습니다.\n수도권 집중, 중앙 집권의 결과이자, 원인입니다.\n\n주요 기관을 분산시키는 것이 국가균형발전의 전제 조건입니다.\n무엇보다 이재명 대통령의 5극3특 체제 완성을 위해 필요한 일입니다.\n지역에 몇 개의 일자리를 창출하는 정도를 훌쩍 뛰어넘는 효과를 낳을 것입니다.\n사람이 오고, 예산이 오고, 권한이 옵니다. 청년들에게는 미래가 열릴 것입니다.\n\n네 번째, 국가사업은 국가가, 지역 사업은 지역이 해야 합니다.\n국가사업인 새만금 사업은 국가가 책임져야 합니다.\n새만금 기본계획은 전면적으로 다시 짜야 합니다.\n재생에너지 기반의 RE100(알이백) 산업 생태계를 중심에 두고, \n기업과 양질의 일자리가 들어오게 만들어야 합니다. \n\n대신 전북만이 가진 정체성을 사업으로 구현하려면\n사업 추진 권한과 예산이 있어야 합니다.\n이를 뒷받침할 ‘전북특별자치도법’ 개정을 추진하겠습니다.\n재생에너지와 농생명산업, 농어업 등 전북 핵심 전략을 \n스스로 결정하고 집행할 자치권을 보장해야합니다.\n이름만 특별한 특별자치가 아니라\n예산과 권한이 오도록 만들어내겠습니다.\n\n조국혁신당은 비록 규모가 작은 벤처정당이지만, 약속을 모두 지켜왔습니다.\n앞으로 항상 나라 전체를 생각하며 걸어가겠습니다.\n우리의 비전과 원칙을 지키며, 힘을 키우겠습니다.\n급변하는 정치 상황에 유연하고 능동적으로 대처해나가겠습니다\n전북 주민께서 함께해주시기만 하면 됩니다.\n저희는 비상할 준비가 되어 있습니다. 감사합니다.  /끝"}, {"id": 70, "filename": "2026.1.21. 조국 대표 경향신문 인터뷰.txt", "title": "조국 대표 경향신문 인터뷰", "date": "2026-01-21", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["윤석열", "부동산", "교육", "개헌", "검찰개혁"], "preview": "2026.1.21. 조국 대표 경향신문 인터뷰  - ‘꼬붕’(한동훈 전 국민의힘 대표를 지칭하며) 등 요즘 사용하는 언어가 상당히 거칠어졌습니다.  “당연한 겁니다. 정치인은 지식인의 언어가 아닌, 국민 마음에 직접 닿는 언어를 사용해야 한다는 게 제 신념입니다. ‘검찰 독재 정권 조기 종식’ 대신 ‘3년은 너무 길다’란 표현을 제가 만든 것도 그래서입니다.”  - 2024년 3월3일 조국혁신당 창당과 함께 직업정치인의 삶을 시작했어요. 교수 ...", "content": "2026.1.21. 조국 대표 경향신문 인터뷰\n\n- ‘꼬붕’(한동훈 전 국민의힘 대표를 지칭하며) 등 요즘 사용하는 언어가 상당히 거칠어졌습니다.\n\n“당연한 겁니다. 정치인은 지식인의 언어가 아닌, 국민 마음에 직접 닿는 언어를 사용해야 한다는 게 제 신념입니다. ‘검찰 독재 정권 조기 종식’ 대신 ‘3년은 너무 길다’란 표현을 제가 만든 것도 그래서입니다.”\n\n- 2024년 3월3일 조국혁신당 창당과 함께 직업정치인의 삶을 시작했어요. 교수 시절에도 정치참여를 했지만 밖에서 보던 것과 직접 뛰어들어 경험한 정치는 어떤 차이가 있습니까.\n\n“바깥에서 참여할 때는 제3자적 입장에서 여러 가지 조언과 요구, 비판을 했다면 직업정치인이 된 지금은 반대로 그것을 받는 입장이죠. 그래서 정치는 말의 영역이기도 하지만 자신의 이름과 책임으로 작은 성과라도 반드시 내고 그 결과에 대해 무한책임을 지는 자리입니다. 법률적 용어로 결과 책임을 지는 영역이죠.”\n\n- 안철수 의원은 2021년 인터뷰에서 “사업을 하면서 세상 밑바닥을 봤다고 생각했는데 정치는 지하 10층까지 있더라”며 “자기 욕망을 여과 없이 표출하는 동물의 세계”라고 했습니다.\n\n“바깥에서 정치를 봤을 때 지저분하다, 욕망의 덩어리다 이야기하는 게 일면은 맞다고 봅니다. 하지만 안 의원의 비유는 적절하지 않아요. 정도 차이는 있을지언정 기업, 언론, 학교 등 사람이 모인 어느 영역에서든 욕망과 의지가 충돌하고 타협하는 것은 똑같으니까요. 다만 정치는 정치권력에 대한 욕망들이 부딪치는 곳일 뿐이죠. 저는 도덕주의자가 아니기 때문에 욕망과 욕망이 부딪치는 것을 도덕적 잣대로 평가하는 것에 반대해요.”\n\n- 정치인의 옷이 잘 맞습니까.\n\n“맞다고 봅니다. (이른바 ‘조국 사태’가 일어난) 2019년 전까지는 정치라는 옷이 제게 맞지 않는다고 생각했고 그 옷을 입을 계획도 없었습니다. 하지만 2019년 이후 약 6년간의 긴 전이(轉移) 과정을 거쳤죠. 즉 조국혁신당 창당까지 수년간의 고민과 변화 끝에 정치인이 되겠다고 작정하고 나온 것이기에 이 역할에 충실하고자 합니다.”\n\n- 직업정치인의 삶을 결심한 시점은 정확히 언제였나요.\n\n“더 이상 비정치 영역에 있을 수 없다고 판단한 형식적·결정적 계기는 1심 유죄 판결(2023년 2월·징역 2년에 추징금 600만원 선고)이었습니다. 소명할 건 소명하고 사과할 건 사과했음에도 재판부는 전혀 받아들이지 않았습니다. 더 근본적 계기는 윤석열 정권의 탄생(2022년 3월)과 이후 그의 행태였죠. 저는 공적 분노를 넘어 개인적으로 몸이 타오르는 분노를 느꼈습니다. 저 꼴은 도저히 못 보겠다는 절박한 마음이 자연스럽게 저를 정치로 이끈 것 같아요.”\n\n- 1심부터 대법원까지 일관되게 유죄 판결이 났는데 본인은 무죄라 본 건가요(2024년 12월 대법원은 조국 대표에 대해 자녀 입시비리 관련 혐의 7개 중 6개, 유재수 전 부시장 감찰 무마, 그리고 청탁금지법 위반 혐의를 유죄로 판단하고 징역 2년에 추징금 600만원을 확정판결했다).\n\n“딸이 세 차례에 걸쳐 받은 장학금 600만원을 청탁금지법 위반으로 본 것은 평생 법을 공부한 저로서도 법리적으로 이해가 안 됩니다. 팩트는 명확합니다. 저는 해당 교수님께 장학금을 청탁한 적 없고, 그분 역시 제게 뭘 부탁한 적이 없어요. 우리 사법 역사상 자식이 학교에서 장학금을 받았다는 이유로 아비가 청탁금지법 위반으로 처벌된 사례는 처음일 겁니다. 또 제가 감찰을 무마했고 이것이 직권남용에 해당한다는 것 역시 법리적으로 동의하기 어렵습니다.”\n\n- 판결에 ‘승복’한다고 여러 차례 밝힌 것과 법률가로서 ‘이해할 수 없다’는 주장은 서로 모순되는 것 아닌가요.\n\n“제가 실제로 승복했기 때문에 감옥에 간 것 아니겠습니까. 하지만 대법원 판결을 존중하는 것과, 법률학자로서 해당 판결의 법리적 타당성을 비판적으로 검토하는 것은 다른 문제입니다.”\n\n- 우리 사회에 사회주의 정책이 필요하다는 신념은 여전한가요.\n\n“그렇습니다. 자본주의사회의 모순을 해결하기 위한 가장 강력한 비전과 사상이 사회주의이기 때문이죠. 물론 이는 마르크스-레닌주의나 주체사상과는 다릅니다. 한국은 사회권 선진국으로 가는 과정에 있고, 사회권 선진국 사상은 이미 유엔 사회권 규약에 있는 개념입니다. 지금껏 우리는 주거 문제를 개인이 돈을 벌어 알아서 해결해야 하는 문제로 봤습니다. 하지만 선진국들은 이를 주거권이라는 국가가 보장해야 할 권리로 이해합니다. 국가가 세금을 투입해 대규모 공공임대주택을 짓고 평생 살 수 있게 보장하는 것, 토지 공개념을 강화하는 것 등이 바로 사회권입니다.”\n\n- ‘사회권 선진국’은 조국혁신당 창당 때부터 주창한 개헌을 통한 7공화국 체제의 개헌의 핵심 비전이지요. 현재 대한민국의 사회권 수준을 점수로 평가한다면 몇점이라 보나요.\n\n“언론의 자유를 비롯한 자유권 수준은 A- 정도로 매우 높은 수준에 와 있습니다. 하지만 사회권 보장 수준은 OECD 통계로 봐도 바닥권이죠. 학점으로 치면 B-나 C+ 정도에 불과합니다. 대한민국은 이미 선진국 대열에 들어섰지만, 사회권만큼은 여전히 미흡합니다. 이 간극을 메우고 사회권을 선진국 수준으로 끌어올리는 것이 지금의 시대적 과제죠.”\n\n- 2012년과 2017년 대선 때 문재인 당시 대통령 후보를 적극 지원했어요. 문 전 대통령과는 처음 어떻게 인연을 맺었습니까.\n\n“제 고향 부산에서 팀을 이룬 노무현·문재인 변호사는 존경받는 인권변호사셨기에 알고는 있었습니다. 그러다 노무현 정부 시절, 검찰개혁위원회에 제가 위원으로 참여하면서 소통하게 됐죠. 당시 문재인 대통령비서실장과 검경 수사권 조정 문제를 논의하며 호흡을 맞췄거든요. 관계가 깊어진 것은 노무현 전 대통령 서거 후 낙향해 법무법인 부산 대표변호사로 계셨을 때입니다. 찾아뵀더니 서류를 산더미처럼 쌓아두고 보고 계시더군요. 제가 ‘변호사님, 이제 변호사 그만하셔야 될 것 같습니다’라고 말씀드렸습니다. 기록을 검토하는 송무 변호사 일은 그만 접으시고, 대선에 나가셔야 한다는 취지였죠.”\n\n- 문재인 변호사는 뭐라 답했습니까.\n\n“그저 씩 웃기만 하셨습니다. 이후로도 저는 기회 있을 때마다 대선 출마를 설득했고, 어느 시점에 결심을 굳히신 뒤 저에게 도와달라고 하셔서 2012년 대선 때부터 아주 세게 도와드렸습니다.”\n\n- 항간에 조 대표가 초기 문재인 정부의 밑그림을 그렸고, 청와대 ‘문고리’ 역할을 했다는 이야기도 있더군요.\n\n“전혀 사실이 아닙니다. 제가 문재인 정부의 세팅을 다 했다거나 문고리 역할을 했다는 이야기는 사실과 다르다는 점을 분명히 말씀드립니다.”\n\n- 2019년 7월 윤석열 서울중앙지검장의 검창총장 임명과 관련해 서로 다른 주장들이 공존합니다. 당시 민정수석실의 검증 결과는 어땠나요.\n\n“당시 공직기강비서관실에서 윤석열 검사장을 포함한 총 4명의 후보자(윤석열·봉욱·김오수·이금로)에 대해 검증했습니다. 결과적으로 4명 모두 각기 다른 이유로 부적격 판단이 나왔습니다. 저마다 청문회 통과 등에 있어 결격 사유나 우려되는 점들이 있었던 거죠.”\n\n- 그런데 왜 윤석열 지검장이 낙점됐나요. 당시 분위기가 어땠는지 궁금합니다.\n\n“지금은 다들 윤석열을 술주정뱅이 폭군이라 비난하지만 그 시점에는 민주당 지지층과 일반 국민 다수가 그를 국정농단 수사를 이끈 국민적 영웅으로 인식했습니다. 심지어 2017년 1월 이재명 더불어민주당 대선후보조차 방송 인터뷰에서 ‘대선 공약 1호는 윤석열을 검찰총장으로 앉히는 것’이라고 말했을 정도였죠. 당·정·청 내부에서도 다수가 윤석열을 택해야 한다는 분위기였고, 실명을 밝힐 수는 없지만 당시 적극적으로 찬성했던 민주당 의원들이 많았습니다. 그런데 그분들이 이제는 자기는 반대했다고 거짓말을 하시더라고요. 참 세상이 이렇구나라고 생각합니다.”\n\n- 조 대표는 당시 민정수석으로서 검찰총장 후보자 4명을 직접 면접했지요. 당시 윤석열 후보자의 답변은 다른 후보들과 어떻게 달랐습니까.\n\n“제가 4명의 후보를 하나하나 면접하면서 문재인 정부의 핵심 과제인 수사·기소 분리와 공수처 설치 등 검찰개혁에 대한 입장을 물었습니다. 다른 세 명의 후보는 조직원들의 반발을 우려하며 ‘국회가 결정하면 따르겠지만, 조직을 이끌기가 쉽지 않을 것’이라는 현실적인 고민을 솔직히 털어놓았습니다. 그런데 똑같은 질문에 윤석열 검사장은 ‘걱정하지 마십시오. 검찰총장만 된다면 제가 조직을 다 정리해서 수사·기소 분리, 공수처 설치 다 찬성하겠습니다’라고 호언장담했습니다.”\n\n- 그래서 믿었다?\n\n“아뇨. 저는 오히려 진정성을 의심했습니다. 검찰 조직이 사활을 걸고 반대하는 사안을 본인이 총장만 되면 다 해결하겠다는 말이 믿기지 않았기 때문입니다. 오히려 솔직하게 어려움을 토로한 다른 후보자들의 말이 더 진실하게 느껴졌습니다.”\n\n- 말의 진정성이 의심됐다면 민정수석으로서 더 강하게 반대하거나 막았어야 했던 것 아닌가요.\n\n“저는 저의 그러한 의견 또는 평가와 함께 당내외의 여론, 각 후보에 대한 크로스 체킹 결과를 종합해 보고했습니다. 인사는 민정수석실뿐만 아니라 여러 조직의 점검과 정무적 판단이 모여 최종적으로 대통령이 결정하는 시스템입니다. 저는 이 과정에서 ‘나는 반대했는데 대통령이 임명했다’고 말하는 것은 비겁한 태도라고 봅니다. 제가 정무적 보좌를 제대로 하지 못해 결과적으로 그런 인사가 이뤄진 것인 만큼 저 역시 공동 책임을 지고 비난을 달게 받아야죠.”\n\n- ‘조국 사태’ 초기에 자진사퇴했다면 본인은 물론 가족이 겪은 고통이 훨씬 덜했을 겁니다. 그럼에도 끝까지 버텨 장관직을 수행한 이유가 뭔가요.\n\n“첫 번째 이유는 저를 향한 공격의 핵심이던 사모펀드 의혹이 명백한 거짓이었기 때문입니다. 당시 윤석열 총장은 박상기 장관과 김조원 민정수석에게 ‘조국이 사모펀드로 불법적 대선 자금을 마련한다’는 식의 허위 보고를 하며 대통령을 속였어요. 저는 법률가로서 제가 사모펀드 관련 범죄자라는 낙인을 반드시 깨야 한다고 생각했고, 사실이 아닌 일로 물러날 수는 없었습니다. 실제로 저는 사모펀드 건과 관련해선 기소 자체가 안 됐고 제 배우자도 거의 무죄를 받았습니다.”(대법원은 부인인 정경심 전 동양대 교수에 대해 사모펀드 관련 자본시장법(미공개정보) 위반, 금융실명제 위반,"}, {"id": 71, "filename": "2026.1.21. 조국 대표 무등일보 인터뷰.txt", "title": "조국 대표 무등일보 인터뷰", "date": "2026-01-21", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["5.18", "부동산", "지방선거", "내란", "개헌", "검찰개혁"], "preview": "2026.1.21. 조국 대표 무등일보 인터뷰  =내란전담재판부를 공개 비판하는 등 최근 들어 민주당과 각을 세우는 경우가 많다. 여권 내 레드팀으로 역할을 하고 있다는 평가다.  ▲많은 광주시민이 조국혁신당을 '집권 야당'이라고 부른다고 들었다. 제가 추진하는 정치개혁 내용을 민주당이 거부하고 있는데 사실 2018년 성남시장 시절 이재명 대통령이 주장했던 개혁안과 같은 내용이다. 합헌적 내란전담재판부 구성이나 통일교 및 신천지 합동수사본부 출...", "content": "2026.1.21. 조국 대표 무등일보 인터뷰\n\n=내란전담재판부를 공개 비판하는 등 최근 들어 민주당과 각을 세우는 경우가 많다. 여권 내 레드팀으로 역할을 하고 있다는 평가다.\n\n▲많은 광주시민이 조국혁신당을 '집권 야당'이라고 부른다고 들었다. 제가 추진하는 정치개혁 내용을 민주당이 거부하고 있는데 사실 2018년 성남시장 시절 이재명 대통령이 주장했던 개혁안과 같은 내용이다. 합헌적 내란전담재판부 구성이나 통일교 및 신천지 합동수사본부 출범, 고품질 공공임대주택 추진 등 다수의 개혁 방안도 이재명 대통령과 정확하게 일치한다. 이것은 광주시민이 원하는 방향과도 같다. 조국혁신당이 개혁에 있어서는 민주당 보다 한 발 앞서 나가면서도 더 책임감 있고 안정감 있는 모습을 보이는 것이 '집권 야당'으로 불리는 이유라고 본다.\n\n대한민국을 위해 필요한 일이지만, 민주당이 머뭇거리거나 국민과 주파수를 맞추지 못할 때 저와 조국혁신당이 레드팀 역할을 계속 해나갈 것이다. 이것이 조국혁신당의 독자적 역할이자 광주시민과 국민이 효능감을 느끼는 부분이다.\n\n=정부 검찰개혁추진단이 발표한 공소청법안·중대범죄수사청 법안이 큰 파장을 부르고 있다. 이재명 정부에서 왜 이런 문제가 발생하고 있다고 보나.\n\n▲조국혁신당이 레드팀 으로서 강력한 경고음을 켜고 정부의 검찰개혁 후퇴를 막아섰다. 다행히 이재명 대통령이 \"당에서 충분히 논의와 숙의가 이뤄지고, 정부는 그 의견을 수렴하라\"고 지시했고, 국무총리도 당과 국회가 충분히 논의하겠다고 밝혔다. 최악의 상황은 면했지만 당정청은 이 반복되는 불협화음을 뼈아프게 복기해야 한다.\n\n이번 사태의 본질은 내용도 문제지만'국정 프로세스'에 이상 신호가 나타났다는데 있다. 당정청이 사전 조율 없이 발표하고, 여론이 악화되면 대통령이 나서서 수습하는 모습이 반복됐다. 내란전담재판부 추진 때와 똑같은 실수가 벌어진 것이다. 대통령의 사후 수습이 또 발생해서는 안된다. 당정청이 결정적 사안마다 엇박자를 내는 것은 국정 프로세스에 심각한 빨간불이 켜진 것이다. 당정청은 현재 상황을 깊이 반성하고 내부 점검에 들어가야 한다.\n\n=이번 지방선거의 의미는 무엇인가.\n\n▲크게 두 가지이다. 하나는 '내란 심판 선거'이다. 국민의힘이 대구시장과 경북도지사를 제외하고 모두 패퇴했던 2018년 지방선거 결과를 뛰어넘는 것이다. 국민의힘 소속 광역단체장을 제로로 만들고, 지방행정과 지방의회에 기생하는 내란 세력을 반토막 내는 압도적인 내란 심판이 목적이다. 국민의힘의 당선 가능성이 제로인 호남을 제외하고 전국에서 민주당과 내란 극우 심판 연합을 형성해서 국민의힘을'제로'로 만들겠다.\n\n다른 하나는'지방 일당 독점 정치 심판 선거'이다. 민주당과 뚜렷하게 대비되는 부분이다. 민주당은 호남에서 매섭게 평가받아야 할 기득권이다. 거대 양당이 호남과 영남에서 벌이는 일당 독점 정치의 폐해는 임계점에 도달했다. 대구에서 국회의원, 시장, 구청장 모두 국민의힘 소속이다. 지방의회도 장악했다. 그러나 대구 지역 1인당 GRDP는 3천 137만 원으로 전국 17개 시·도 가운데 압도적인 꼴찌다. 민주당이 독점하는 광주도 마찬가지다. 3천 768만 원으로 대구와 별 차이가 없고, 전국 15위로 최하위다.\n\n다른 지역이 4차 산업혁명과 에너지 전환을 향해 달릴때 광주와 대구는'일당 독점'이라는 낡은 태엽에 갇혀 제자리를 맴돌았다. 고장난 시계를 고치는 방법은 건전지를 바꾸는 것이 아니라 내부의 낡은 부품, 즉 정치 구조를 통째로 갈아서 엎는 것 뿐이다.\n\n=특히 호남지역에서 지방선거 결과가 조국혁신당의 진로에 결정적인 역할을 할 것이라는 전망이 나온다. 호남에서의 지방선거 필승 전략을 듣고 싶다.\n\n▲조국혁신당에는 돈 공천, 줄 공천이 없다. 깨끗한 정치가 경쟁력이다. 광주와 전남, 전북에서 조국혁신당이 민주당과 경쟁하는 것 자체가 개혁이다. 광주에서 민주당은 기득권이지 않았던가. 광주 정치에는 경쟁과 혁신이 필요하다. 광주 시민에게 선택지를 넓혀야 한다.\n\n최근 민주당의 공천헌금 사태는 충격적이다. 김대중과 노무현의 정신을 계승하는 정당인지 의심스럽다. 개인의 일탈이 아니라 정당과 정치 구조의 폐단이 이제야 드러난 것이다. 민주당의 당내 예선만 통과하면 지방선거인 본선에서 광주시민의 투표는 의미가 없다. 뽑을 후보가 민주당밖에 없기 때문이다. 지난 지방선거에서 광주시의원 지역구 20명중 무려 11명이 무투표 당선 이었다. 광산구청장과 동구와 남구 시의원은 전원 무투표 당선이다. 지방자치가 광주에서 투표제가 아니라 임명제로 작동하고 있다. 주권자인 광주 시민의 표는 사표 취급을 받는다.\n\n조국혁신당이 구태정치를 끝내겠다. 시민 공천, 투명 공천으로 후보를 내세워 경쟁하겠다. 정치인들이 지역구 국회의원이 아니라 광주 시민에게 줄을 서는 정치로 바꾸겠다. 광주 시민들이 이를 충분히 알고 계시기 때문에 조국혁신당을 호남정치 부활과 정치개혁의 도구로 쓰실 것으로 확신한다. 광주를 비롯한 호남 민심은 '민주당이냐 혁신당이냐'가 아니라 '누가 더 잘하느냐'를 묻고 있다. 조국혁신당이 '정치적 메기'가 되어 호남 정치에 창조적 파괴를 일으키겠다.\n\n=호남을 비롯해 전국적으로 당 지지율이 낮다. 그 이유와 지지율을 만회하기 위해 어떤 노력을 할 것인지.\n\n▲저와 조국혁신당이 아직 부족하고, 많은 것을 채워야 한다. 호남의 눈높이에 맞는 모습을 갖추도록 최선을 다하겠다. 그리고 지금은 다수의 국민이 내란 청산을 위해 정부와 여당에 힘을 모아주자는 흐름이 있고, 무엇보다 이재명 대통령의 높은 지지율이 민주당을 뒷받침하고 있다. 지지율은 단거리 경주가 아니라 마라톤이다. 눈앞의 숫자에 흔들리지 않고 대한민국의 근본적 변화라는 목표를 향해 묵묵히 나아가겠다. 동시에 조국혁신당의 효능감을 꾸준히 보여드리겠다.\n\n민주당은 이혜훈 후보자 지명에서 보듯이 보수층까지 아우르는 중도 보수 노선으로 이동 중이다. 반면 조국혁신당은 중도 개혁층부터 진보층까지 대변하고 있다. 민주당이 외면하는 정치개혁, 토지공개념과 부동산 개혁, 조세 정의, 지방분권 개헌, 차별금지법 등 진보적 가치와 개혁 과제들을 책임지며 독자적 역할을 활성화하고 있다. 이러한 조국혁신당의 제2막이 긍정적으로 평가받을 시간이 올 것이다.\n\n=지방정치를 바꾸기 위한 정치개혁 방안 중에 가장 핵심적인 내용은 무엇인가.\n\n▲중대선거구제가 최우선 과제이고, 여기서 한 발 더 나가야 한다. 정당별 후보 제한을 법으로 규정해야 한다. 그렇지 않으면 거대 양당이 선거구 정수에 맞춰 후보를 '풀'로 공천한다. 예를 들어 4~5인 선거구를 만들고, 한 정당이 최대 2명만 후보를 내도록 한다면, 특정 정당들의 지역 싹쓸이는 사라진다. 남은 의석은 건강한 경쟁의 장이 된다. 정당 내부의 줄 세우기 경쟁에서 정당간 투명한 경쟁으로 전환되는 것이다. 그래서 민주당이 2인 선거구 확대를 검토하는 것은 명백한 퇴행이고 호남 정치에 대한 배신이다. 내란 극우 세력인 국민의힘과 나눠먹기를 시도한다면 좌시하지 않겠다.\n\n=광주전남 행정통합이 지방선거 전에 이뤄질 수 있다고 보는지.\n\n▲광주시장과 전남지사가 작년 대선에서 발표된 '5극 3특 공약'을 겨냥해서 선제적으로 움직였으면 더 많은 준비 시간을 확보했을 것이다. 아쉬운 대목이다. 지금부터 라도 광주와 전남 정치권이 전력 질주해야 한다. 이재명 대통령이 행정통합의 문을 열었고, 정부가 제도와 혜택을 준비 중이다. 무엇보다 광주시민과 전남도민이 원한다. 그렇다면 광주와 전남 정치권이 경제계, 학계, 시민사회와 원팀이 돼서 강력한 실행력을 보여줘야 한다. 광주의 AI와 전남의 재생에너지가 결합하고 정부의 대대적인 지원이 더해질 경우 광주전남은 민주주의의 심장에서 대한민국 미래산업의 심장으로 확장될 수 있다.\n\n지금 중요한 건, 정치권이 시민과 도민들에게 행정통합의 비전을 설명하고 소통하는 것이다. 특히 행정통합의 효과가 특정 지역과 계층에 쏠리지 않고, 고르게 퍼지는 비전도 제시해야 한다. 조국혁신당이 적극적으로 뒷받침해 나가겠다. 행정통합으로 서울에 준하는 지위와 조직 특례, 교부세 추가 배분과 공공기관 우선 이전 등이 지원되도록 모든 역량을 투입하겠다."}, {"id": 72, "filename": "2026.1.21. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-21", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2026.1.21. 조국 대표 페이스북 메시지  “12·3 비상계엄은 내란이다.” 재판부의 판결은 준엄했다. 재판부는 2024년 12월 3일, 윤석열이 선포한 비상계엄이 “국헌 문란을 목적으로 발령된 내란”이라고 명확히 규정했다.내란 주요임무 종사자 한덕수에게 징역 23년이 선고됐고, 법정 구속됐다.  이진관 재판부는 헌법이 살아있다는 것을 보여주었다. 이제 국민의힘 차례다. 또다시 내란을 비호·정당화한다면 ‘내란주요임무종사당’을 자임하는 것이...", "content": "2026.1.21. 조국 대표 페이스북 메시지\n\n“12·3 비상계엄은 내란이다.”\n재판부의 판결은 준엄했다. 재판부는 2024년 12월 3일, 윤석열이 선포한 비상계엄이 “국헌 문란을 목적으로 발령된 내란”이라고 명확히 규정했다.내란 주요임무 종사자 한덕수에게 징역 23년이 선고됐고, 법정 구속됐다. \n이진관 재판부는 헌법이 살아있다는 것을 보여주었다. 이제 국민의힘 차례다. 또다시 내란을 비호·정당화한다면 ‘내란주요임무종사당’을 자임하는 것이다. \n국민의힘은 이 판결이 ‘경고성 조치’니 ‘대통령의 고유권한’이니 하던 허튼 말장난에 대한 단호한 판결이라는 점을 명심해야 한다. 더는 그 어떤 궤변으로 ‘내란’을 부정해서는 안된다. 역사에 기록될 정확한 이름은 “12·3 내란“이다!\n국민의힘은 불법 비상계엄을 12.3 내란으로, 윤석열을 내란 우두머리로, 한덕수를 내란주요임무종사자로 부르고, 국민 앞에 엎드려 사죄해야 한다. 윤석열 체포 방해와 한덕수 대선 후보 옹립에 대해서도 통렬하게 반성하고 사죄해야 한다. \n이 경고를 거부한다면, 내란주요임무종사당의 미래는 정당 해산밖에 없다. \n이진관 재판장의 판결이 여전히 내란 트라우마와 스트레스로 고통받는 응원봉 국민에게 위로와 자부심이 되었으면 한다.\n“12.3내란 과정에서 사망자가 발생하지 않았고 내란행위 자체는 몇시간 만에 종료되긴 하였습니다. 그러나 이는 무엇보다도 무장한 계엄군에 맨몸으로 맞서 국회를 지킨 국민의 용기에 의한 것입니다. 이에 더하여 이러한 국민의 저항을 바탕으로 신속히 국회에 진입하여 비상계엄해제요구안을 의결한 일부 정치인들의 노력, 대한민국 역사에서 있었던 내란의 암울한 기억을 상기하면서 위법한 지시와 명령에 저항하거나 혹은 어쩔 수 없이 이를 따르더라도 소극적으로 참여한 일부 군인과 경찰공무원의 행동에 의한 것입니다. 결코 12.3내란 가담자에 의한 것이 아닙니다.”"}, {"id": 73, "filename": "2026.1.20. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-20", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["검찰개혁", "페이스북", "윤석열"], "preview": "2026.1.20. 조국 대표 페이스북 메시지  박성재 폰 비밀번호, 국과수가 풀었다. 그런데 한동훈 폰 비밀번호, 검찰은 못/안 풀었다. 검찰 채널A 수사팀은 한동훈을 무혐의처분하며 왈, “수사팀도 (24자리 비밀번호를) 휴대폰 포렌식 기법을 통해 해제하려 했으나 실패했다.“ 그리고 휴대폰을 한동훈에게 ”규정에 따라 반환“했다고 말했다. 이 휴대폰, 지금 어디에 있을까? 폰 비밀번호 해제 ‘능력’이 없었다면, 경찰보다 수사력이 없었음을 반증하...", "content": "2026.1.20. 조국 대표 페이스북 메시지\n\n박성재 폰 비밀번호, 국과수가 풀었다.\n그런데 한동훈 폰 비밀번호, 검찰은 못/안 풀었다. 검찰 채널A 수사팀은 한동훈을 무혐의처분하며 왈, “수사팀도 (24자리 비밀번호를) 휴대폰 포렌식 기법을 통해 해제하려 했으나 실패했다.“ 그리고 휴대폰을 한동훈에게 ”규정에 따라 반환“했다고 말했다. 이 휴대폰, 지금 어디에 있을까?\n폰 비밀번호 해제 ‘능력’이 없었다면, 경찰보다 수사력이 없었음을 반증하는 것이다. 비밀번호 해제 ‘의지’가 없었다면, 수사권을 가질 자격이 없음을 반증하는 것이다. 이러면서 검찰은 계속 (보완)수사권을 보유하겠다고 강변한다. 그 이전에 당시 검찰은 왜 한동훈 폰을 국과수에 넘기지 않았는지 답하라!\n한편, 경찰권의 비대화 운운하며, 검찰 수사권 계속 보유를 옹호하는 사람들이 있다. 중수청(=특정 중대범죄 전문수사청), 경찰 국가수사본부, 공수처가 갖는 각 권한과 각 기관간의 상호견제를 규정한 조국혁신당의 법안을 보고 말하라. 그리고 검사(향후 공소청 소속)는 지금처럼 ‘보완수사요구권’을 갖는다. 수사기관의 수사에 미흡한 점이 있으면, 기소와 공소유지 권한을 갖는 검사는 보완수사를 요구할 수 있고, 요구해야 한다.\n국회 의석 부족과 경찰 준비 부족이라는 조건 하에서 문재인 정부는 '1차 검찰개혁'( ='수사권조정')을 이루었다. 이재명 정부 하 이 두 가지 부족은 해결되었다. 그리고 검찰의 문제점에 대한 국민적 인식도 매우 높아졌다(문재인 정부 출범시 국정농단 수사 성과로 인하여 윤석열은 '영웅'으로 떠받들어지고 있었다). 이재명 정부는 검찰개혁을 '완성'하는 정부가 되어야 한다."}, {"id": 74, "filename": "2026.1.20. 조국혁신당 의원단 긴급기자회견.txt", "title": "조국혁신당 의원단 긴급기자회견", "date": "2026-01-20", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["내란", "기자회견", "검찰개혁"], "preview": "2026.1.20. 조국혁신당 의원단 긴급기자회견  조국혁신당 긴급 기자회견 중수청, 공소청법 민주당에게 묻는다  <검찰개혁의 완성, 더불어민주당이 결단할 시간입니다.>   검찰개혁의 골든타임이 지나가고 있습니다.    그러나 지난 12일 정부가 입법 예고한 법안들을 아무리 살펴보아도, ‘검찰개혁’이라 부를 만한 부분은 전혀 찾아볼 수 없었습니다.   이에 조국혁신당은 정부가 내놓은 법안의 전면 수정을 요구하며 구체적인 대안을 제시했습니다.  ...", "content": "2026.1.20. 조국혁신당 의원단 긴급기자회견\n\n조국혁신당 긴급 기자회견 중수청, 공소청법 민주당에게 묻는다\n\n<검찰개혁의 완성, 더불어민주당이 결단할 시간입니다.> \n\n검찰개혁의 골든타임이 지나가고 있습니다.  \n\n그러나 지난 12일 정부가 입법 예고한 법안들을 아무리 살펴보아도, ‘검찰개혁’이라 부를 만한 부분은 전혀 찾아볼 수 없었습니다. \n\n이에 조국혁신당은 정부가 내놓은 법안의 전면 수정을 요구하며 구체적인 대안을 제시했습니다. \n\n첫째, 공소청법 부칙에 검사의 수사권을 규정한 형사소송법 제196조 폐지를 명시해야 합니다. 검사의 수사권 보유 가능성을 원천 차단하기 위해서입니다.  \n\n둘째, 고등공소청 조항을 삭제하고, 공소청과 지방공소청 2단 구조로 재편해야 합니다. 공소청은 법원과 동격이 아닙니다. 예산과 인력을 낭비하면서까지 기존 검찰청의 구조를 유지할 이유가 없습니다. \n\n셋째, 공소청의 장은 검찰총장이 아니라 공소청장이어야 합니다. 검사의 정원, 보수, 징계, 휴직 등에 대한 부분도 공소청법에 포함될 필요가 없습니다. 공소청은 행정부의 외청 중 하나이고, 검사는 행정부 소속 공무원일 뿐입니다. \n\n넷째, 중대범죄수사청의 권력 비대화를 방지해야 합니다. 정부안에 담긴 9개 수사 영역을 축소해 부패·경제·방위사업·내란 및 외환 범죄로 엄격히 한정해야 합니다. \n\n그렇지 않으면 중수청은 2013년 폐지된 ‘대검 중수부’의 화려한 귀환이 될 것입니다. 1차 수사기관인 경찰 국가수사본부는 변방으로 밀려나고, ‘제2 검찰청’이 다시 득세할 것입니다.  \n\n이와 더불어, 사실상 검사인 ‘수사사법관’과 검찰 수사관인 ‘전문수사관’의 이원화를 폐지해야 합니다. 수사하는 공무원은 모두 수사관으로 통일하는 것이 맞습니다. \n\n다섯째, 중수청의 3급 이상 공무원은 공수처의 수사·기소 대상이 되어야 합니다. 중수청, 공수처, 국수본이 이중 삼중의 견제 장치를 갖추게 되는 것입니다.  \n\n마지막으로, 검경 협력과 통제를 제도화해야 합니다. 수사권 조정에 따른 여러 우려를 불식시키기 위해, 조국혁신당은 “검사와 사법경찰관리의 협력 및 사법경찰의 수사권 통제”를 내용으로 하는 별도의 입법을 추진할 것입니다. \n\n이상의 내용은 조국혁신당이 완전한 검찰개혁을 위해 고심해온 결과물의 핵심 내용으로서, 여러 차례에 걸쳐 공개적으로 제안한 바 있습니다. \n\n공은 입법부인 국회로 넘어왔습니다. 더 이상 시간이 없습니다. 논의를 위한 논의는 이제 그만해야 합니다. 조국혁신당의 제안을 비롯해 충분한 대안이 이미 준비되어 있습니다. \n\n검찰개혁 법안 수정 논의를 위한 민주당의 정책의총이 곧 시작될 예정입니다. 정부의 입법예고안은 검찰개혁의 본질과 너무 동떨어진 내용으로 일부 수정으로 완성하기 어려운 지경입니다. 조국혁신당의 대안을 바탕으로, 정부안을 전면 수정한 국회의 개혁안이 새롭게 도출되어야 합니다. 오늘 반드시 구체적인 결론을 내고, 설 명절 이전까지 입법을 완료할 수 있는 일정을 확정해 주기 바랍니다.  \n\n검찰개혁은 조국혁신당과 민주당 공동의 약속이자 국민의 지엄한 명령입니다. 오늘 민주당이 보여줄 단호한 결단을 기대합니다. 조국혁신당이 기꺼이 함께하겠습니다. \n\n2026년 1월 20일 \n조국혁신당 국회의원 일동"}, {"id": 75, "filename": "2026.01.19. 조국혁신당 최고위-의원총회-끝까지간다 연석회의.txt", "title": "조국혁신당 최고위-의원총회-끝까지간다 연석회의", "date": "2026-01-19", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["내란", "검찰개혁", "끝까지간다"], "preview": "26.01.19. 조국혁신당 최고위-의원총회-끝까지간다 연석회의 모두발언   조국혁신당 대표 조국입니다. 지난주에 이어 최고위, 의원총회, 끝까지간다 연석회의를 열게 됐습니다. 조국혁신당이 검찰개혁에 얼마나 진심인지, 살펴봐 주시길 바랍니다.  정부가 입법 예고한 검찰개혁 법안들을 샅샅이 훑어봤습니다. 정부 입법 예고안은 검찰개혁의 핵심인 ‘기소와 수사 분리’를 흉내만 낸 것입니다. 언제든 검찰로 부활할 수 있도록 나쁜 씨앗을 뿌려놓았습니다. ...", "content": "26.01.19. 조국혁신당 최고위-의원총회-끝까지간다 연석회의 모두발언 \n\n조국혁신당 대표 조국입니다.\n지난주에 이어 최고위, 의원총회, 끝까지간다 연석회의를 열게 됐습니다.\n조국혁신당이 검찰개혁에 얼마나 진심인지, 살펴봐 주시길 바랍니다.\n\n정부가 입법 예고한 검찰개혁 법안들을 샅샅이 훑어봤습니다.\n정부 입법 예고안은 검찰개혁의 핵심인\n‘기소와 수사 분리’를 흉내만 낸 것입니다.\n언제든 검찰로 부활할 수 있도록 나쁜 씨앗을 뿌려놓았습니다.\n분명히 말합니다.\n정부 법안은 전면 수정돼야 합니다.\n\n조국혁신당이 소중하게 길러온 검찰개혁의 씨앗을 소개하겠습니다.\n\n첫 번째, 조국혁신당의 공소청 법안에는 수사/기소 분리를 명확하게 규정했습니다.\n검사 수사권을 규정한 형사소송법 제196조를 폐기하도록\n공소청 법안 부칙에 명기했습니다.\n향후 “수사권 보유” 운운하는 꼼수를 쓰지 못하도록 한 것입니다.\n\n대-고등-지방 공소청의 3단 구조로 법원 시늉을 해서는 안 됩니다.\n고등공소청을 폐지해, 공소청과 지방공소청 2단 구조로 만들었습니다.\n현재 고등검찰청도 역할이 미미한데,\n고등공소청을 만드는 것은 예산과 인력 낭비입니다. \n\n“공소청의 장은 검찰총장으로 한다”는 조항도 뺐습니다.\n경찰에 대한 우월적 지위를 명시한 조항들도 없앴습니다.\n\n정부 공소청법안 중 가장 황당한 조항은 제56조 ‘검찰총장 비서관’조항입니다.\n검찰총장이 얼마나 대단하기에 법률에 5급 비서관을 두라고 새겨 놓습니까?\n마찬가지로 검사의 정원·보수·징계·휴직 등도 이 법에 넣을 이유가 없습니다.\n‘검사는 다른 공무원보다 특별하다’라고 강조하는 일일 뿐입니다.\n다 삭제하고, 공무원법이나 대통령령에 넣도록 했습니다.\n\n두 번째, 중대범죄수사청이 2013년 폐지된 ‘대검 중수부’의 부활 조직이 돼서는 안 됩니다.\n이전 검찰보다 넓혀 놓은 수사 영역을 저희 중수청법안에서는 축소했습니다.\n정부안 중 부패·경제·방위사업 범죄와 내란 및 외환 수사만 하도록 했습니다.\n조직 덩치를 키우려고 넣어놓은 공직자·대형참사·마약·사이버 범죄는 뺐습니다.\n이를 다 가져가면, 1차 수사기관인 경찰 국가수사본부는 2류로 전락하게 됩니다.\n\n사실상 검사인‘수사사법관’과\n보조 역할만 하는‘전문 수사관’의 이원화 체제를 없앴습니다.\n수사하는 이는 모두 ‘수사관’으로 통일시켰습니다.\n\n중수청 수사관들이 수사권을 남용하고도 빠져나가면 안 됩니다.\n중수청 3급 이상 공무원은 공수처의 수사·기소 대상에 넣었습니다.\n이렇게 되면 중수청을 공수처와 국수본이, 공수처를 중수청과 국수본이,\n공소청을 공수처와 중수청과 국수본이, 국수본을 중수청이 각각 수사할 수 있습니다.\n이중, 삼중의 촘촘한 상호 견제망을 펴게 됩니다.\n또 행안부의 수사 지휘 규정을 정부조직법에 규정토록 했습니다.\n\n세 번째, 검경 갈등이 커지고,\n경찰에 대한 통제가 느슨해지는 것이 아니냐는 우려가 있습니다.\n\n별도의 법을 제정해, 검경 협력 강화 방안을 마련할 것입니다.\n수사절차법에 경찰이 주요 단계마다 검사에 의무적으로 통보를 하고,\n검사는 의무적으로 경찰에 의견을 제시토록 했습니다.\n\n경찰의 부실 수사 방지책도 마련했습니다.\n기존에 검사는 경찰의 영장신청 및 송치할 때 보완 수사를 요구할 수 있습니다.\n여기에 더해 수사상 필요하다고 판단할 경우 보완 수사를 요구할 수 있도록 했습니다.\n경찰이 부당하게 따르지 않으면 징계를 요구할 수 있습니다.\n\n책임을 떠넘겨 수사가 질질 늘어지는 ‘사건 핑퐁’ 방지안도 마련하겠습니다.\n검사가 경찰에 보완 수사를 요구하면 종전 수사관서 사건 번호 및 배당,\n공소청 사건 번호 및 배당이 유지되도록 했습니다.\n보완 수사시 사건을 새로 배당해 다시 서류를 꾸리는 등 시간 끌기가 불가능해집니다.\n\n이상은 조국혁신당이 국회에 제출했거나 준비 중인 혁신안입니다.\n정부가 이 안을 수용하지 않는다면,\n조국혁신당은 정부안 대신 국회 주도 입법을 추진할 것입니다.\n\n정부의 검찰개혁추진단도 전면 재구성을 촉구합니다.\n현 추진단은 국민께 검찰개혁 의지를 보여주지 못했습니다.\n재구성하지 못한다면, 차라리 해산하는 것이 낫습니다.   /끝"}, {"id": 76, "filename": "2026.1.19. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-19", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북"], "preview": "2026.1.19. 조국 대표 페이스북 메시지  국민의힘이 ‘신천지 특검’을 그토록 반대하는 이유가 여기에 있다. ‘국민의힘’은 ‘신천지의 힘’이었다. 조국혁신당은 일관되게 통일교와 신천지 모두를 특검 수사 대상에 넣어야 하며, 통일교나 신천지의 개입이 확인되면 국민의힘은 해산되어야 함을 강조해왔다.", "content": "2026.1.19. 조국 대표 페이스북 메시지\n\n국민의힘이 ‘신천지 특검’을 그토록 반대하는 이유가 여기에 있다. ‘국민의힘’은 ‘신천지의 힘’이었다. 조국혁신당은 일관되게 통일교와 신천지 모두를 특검 수사 대상에 넣어야 하며, 통일교나 신천지의 개입이 확인되면 국민의힘은 해산되어야 함을 강조해왔다."}, {"id": 77, "filename": "2026.1.19. 조국혁신당 정부입법예고 공소청법안과 중수청법 수정 등 대안 발표.txt", "title": "조국혁신당 정부입법예고 공소청법안과 중수청법 수정 등 대안 발표", "date": "2026-01-19", "category": "정책발표", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["검찰개혁", "최고위", "끝까지간다"], "preview": "2026.1.19. 조국혁신당 정부입법예고 공소청법안과 중수청법안에 대한 수정 등 대안 발표  조국혁신당, 정부입법예고 공소청법안과 중수청법안에 대한 수정 등 대안 발표  - 형사소송법 제196조 검사 수사권 조항 폐지를 공소청법안 부칙에 명시 - 입법예고 법안 전면수정 요구, 정부 응하지 않을 경우 법안 전면 폐기 추진 - 정부 검찰개혁추진단 전면 재구성 요구, 정부 응하지 않을경우 추진단 해산 및 국회주도 입법 추진      조국혁신당은 지...", "content": "2026.1.19. 조국혁신당 정부입법예고 공소청법안과 중수청법안에 대한 수정 등 대안 발표\n\n조국혁신당, 정부입법예고 공소청법안과 중수청법안에 대한 수정 등 대안 발표\n\n- 형사소송법 제196조 검사 수사권 조항 폐지를 공소청법안 부칙에 명시\n- 입법예고 법안 전면수정 요구, 정부 응하지 않을 경우 법안 전면 폐기 추진\n- 정부 검찰개혁추진단 전면 재구성 요구, 정부 응하지 않을경우 추진단 해산 및 국회주도 입법 추진\n  \n  조국혁신당은 지난 12일(월) 정부에서 입법예고한 공소청법안과 중대범죄수사청법안에 대하여 15일(목) 최고위원회와 끝까지간다 특별위원회 긴급 연석회의를 개최하여 법안의 문제점을 분석하고, 17개 요구안을 발표한 바 있습니다. 이에 그치지 않고, 그 실효적 대안을 마련, 정부와 국민들께 발표드리고 입법화하고자 합니다.\n\n  조국혁신당이 이미 지적한 바와 같이 최근 입법예고한 공소청법안은 현행 검찰청법의 개별 장(章)과 조문까지 거의 원형 그대로 옮긴 것으로 검찰‘개혁’이라는 취지를 무색케 하였습니다. \n\n  또한 중대범죄수사청법안(이하 ‘중수청법’)은 사실상 검찰청법의 검사 조항을 그대로 가져온 ‘수사사법관’과 현행 검찰수사관을 염두에 둔 ‘전문수사관’으로 조직구성을 이원화하여 ‘제2의 대검 중수부’라는 비판을 받고 있습니다.\n\n  공소청법안의 경우 △ 기존 검찰청법의 구조와 내용에 대한 성찰적 고려 부재 △ 공소청 조직과 검사 지위에 대한 행정부 소속으로의 재조정 실패 △ 형사소송법 개정안 미공개로 검사의 수사권 존치 여부 불분명 △ 사법경찰과의 상호협력관계에 역행하는 내용의 존치 및 확대 등의 문제점이 지적되고 있는바, 이를 포함하여 조국혁신당의 대안을 제시하고자 하는 것입니다.\n\n  또한 중수청법안의 경우 △ 중수청 조직 이원화 설계로 제2의 검찰청 설립 시도, △ 검찰의 직접수사 통계를 반영하지 않은 중수청의 수사범위 확대, △ 행안부 장관 지휘권에 대한 법적 정합성 검토 결여 △ 검사에 대한 우월적 지위를 중수청 조직법에서 규정한 검경상호협력관계 이탈 등의 문제점을 지적한바 있는데, 이에 대한 실효적인 대안도 제시하고자 합니다.\n\n나아가 검사의 수사권 삭제에 따라 사법경찰관의 수사역량 및 수사통제에 관한 일각의 우려에 대하여 조국혁신당은 <검사와 사법경찰관리의 협력 및 사법경찰의 수사권 통제에 관한 법률 제정안>을 발의할 예정입니다.\n\n우리 조국혁신당은 정부가 입법예고한 법안에 대한 전면 수정을 요구하고, 만일 정부가 이에 응하지 않는 경우 입법예고한 법안 전면 폐기를 추진하겠습니다. \n또한 정부 검찰개혁추진단 전면 재구성을 요구합니다. 만일 정부가 이에 응하지 않는 경우 추진단 해산 및 국회 주도 입법을 추진하겠습니다.\n\n정부가 입법한 공소청법안과 중수청법안에 대한 대안의 자세한 내용은 아래 <붙임>을 꼭 참고하여 주시기 바랍니다.  /끝/\n"}, {"id": 78, "filename": "2026.1.15. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-15", "category": "페이스북 메시지", "topics": ["내란·윤석열", "조국혁신당", "개헌·민주주의", "인권·사회"], "tags": ["내란", "페이스북"], "preview": "2026.1.15. 조국 대표 페이스북 메시지  시대의 지성’ 신영복 선생님이 우리 곁을 떠난 지 어느덧 10년입니다.  선생님께서 남기신 사유와 문장은 시간의 강을 건너 오늘도 우리 곁에 있습니다. 선생님은 통일혁명당 사건으로 무기징역이라는 혹독한 시간을 감내하셨습니다. 20년 20일이라는 혹독한 수형의 세월, 선생님은 그 끝을 알 수 없는 어둠 속에서도 원망 대신 사유를, 분노 대신 성찰을 선택하셨습니다. 그 인고의 시간은 개인의 비극에 머...", "content": "2026.1.15. 조국 대표 페이스북 메시지\n\n시대의 지성’ 신영복 선생님이 우리 곁을 떠난 지 어느덧 10년입니다. \n선생님께서 남기신 사유와 문장은 시간의 강을 건너 오늘도 우리 곁에 있습니다.\n선생님은 통일혁명당 사건으로 무기징역이라는 혹독한 시간을 감내하셨습니다. 20년 20일이라는 혹독한 수형의 세월, 선생님은 그 끝을 알 수 없는 어둠 속에서도 원망 대신 사유를, 분노 대신 성찰을 선택하셨습니다. 그 인고의 시간은 개인의 비극에 머물지 않고, 시대를 치유하고 일깨우는 드넓은 ‘인문의 숲’으로 자라났습니다.\n선생님께 문장은 단순한 기록이 아니라 삶을 대하는 태도 그 자체였습니다. “더불어 숲이 되어 지키자”라는 문장은 각자도생의 시대를 꾸짖고, 공존과 연대의 가치를 일깨우는 죽비와도 같았습니다.\n이 가르침은 내란의 위기를 겪고 새로운 세상을 준비하는 우리에게 무거운 질문이자 숙제를 던집니다. 특히 우리 정치가 과연 내란 이전보다 더 탄탄해졌는지, 불평등의 고통이 줄어들었는지, 공동체가 서로의 아픔에 더 공감하고 있는지를 되묻게 됩니다.\n‘더불어 숲’이 되는 정치를 하겠습니다. 뿌리를 얽고 어깨를 맞댄 숲은 결코 무너지지 않습니다. 민주주의와 헌법을 수호하는 모든 이들과 손잡고 ‘새로운 다수 연합’이라는 울창한 숲을 이루겠습니다.\n선생님이 꿈꾸셨던 세상을 이어받아 뚜벅뚜벅 걸어가겠습니다. \n선생님, 여전히 당신의 숲은 푸르고 깊습니다."}, {"id": 79, "filename": "26.01.15.제17차 최고위 및 끝까지간다 연석회의 모두발언.txt", "title": ".제17차 최고위 및 끝까지간다 연석회의 모두발언", "date": "2026-01-15", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "검찰개혁", "최고위", "끝까지간다"], "preview": "26.01.15.제17차 최고위 및 끝까지간다 연석회의 모두발언    조국혁신당 대표 조국입니다. 최고위원회와 끝까지간다특위 연석회의를 열게 됐습니다.  요 며칠 검찰개혁을 열망해온 국민의 마음 속에  분노와 우려가 교차해서 일어나고 있습니다. 국민 모두 열망해 온 검찰개혁이 좌초되는 것이 아닌가 해서입니다. 정부가 입법 예고한 중수청법과 공소청법, ‘제2 검찰청 신설법'에 다름 아니었습니다.  조국혁신당은 공언해 온 대로 ‘레드팀’ 역할을 분...", "content": "26.01.15.제17차 최고위 및 끝까지간다 연석회의 모두발언  \n\n조국혁신당 대표 조국입니다.\n최고위원회와 끝까지간다특위 연석회의를 열게 됐습니다.\n\n요 며칠 검찰개혁을 열망해온 국민의 마음 속에 \n분노와 우려가 교차해서 일어나고 있습니다.\n국민 모두 열망해 온 검찰개혁이 좌초되는 것이 아닌가 해서입니다.\n정부가 입법 예고한 중수청법과 공소청법,\n‘제2 검찰청 신설법'에 다름 아니었습니다.\n\n조국혁신당은 공언해 온 대로 ‘레드팀’ 역할을 분명히 수행했습니다.\n강력한 경고음을 냈습니다.\n다행히 이재명 대통령께서 “당에서 충분히 논의와 숙의가 이뤄지고,\n정부는 그 의견을 수렴하라”고 지시하셨습니다.\n\n그런데, 이번 사태에서 두 가지 위험 징후를 발견했습니다.\n첫 번째 ‘국정 프로세스’에 이상 신호가 나타났습니다.\n당정청이 완벽한 사전 조율 없이 주요 국정 현안을 발표합니다.\n매우 중요한 사안에서 엇박자를 냅니다.\n여론이 나쁘면 대통령 또는 대통령실이 직접 개입하여 수습합니다. \n\n내란전담재판부 추진 때와 똑같은 양태입니다.\n당정청은 이런 상황의 반복 이유를 점검하고 개선해야 합니다.\n \n두 번째 검찰 카르텔이 여전히 힘을 발휘하고 있습니다. \n검찰개혁을 외친 응원봉 국민과 국민주권 정부를 기만하고 \n검찰 이익을 보전하려고 했습니다.\n\n정성호 법무부 장관은 국회에서 \"과거 검찰과 이재명 정부 검찰은\n완전히 다르다”라고 했습니다.\n정성호 장관의 인품과 도덕성을 잘 알지만, 잘못된 인식입니다.\n검찰 문제는 사람 잘못, 즉 ‘휴먼 에러’일뿐만 아니라\n‘시스템 에러’입니다.\n\n검찰은 수사권과 기소권을 한 손에 쥐고\n표적을 정하여 증거를 짜맞추고, 협박·회유했습니다.\n이재명 대통령은 대표적 피해자입니다.\n정권교체 후 검찰은 전략을 바꾸었습니다.\n“고개를 숙이지만, 부활할 불씨를 살려놓는다.”\n\n검찰개혁, 방향은 명백합니다.\n수사기관은 수사하고, 검사는 기소와 공소 유지를 하면 됩니다.\n수사기관의 수사가 부족하면, 검찰이 보완수사를 요구하면 됩니다.\n경찰의 비리가 있으면 공수처와 중수청이 수사하면 됩니다.\n\n조국혁신당은 다음과 같이 요구합니다.\n첫째, 중수청을 ‘제2 검찰청’으로 만드는 조항을 삭제하십시오.\n검사가 명찰만 ‘수사사법관'으로 바꿔 달면 안 됩니다.\n수사관 한 직종만 둬야 합니다.\n수사를 위한 법률가가 필요하면, 지휘자가 아니라 동료로 배치해야 합니다.\n\n둘째, 입법예고에 따르면 중수청 수사 범위가 지금 검찰보다 넓혀집니다.\n역주행입니다. \n이대로 가면, 오래전 여러 폐해로 2013년 폐지되었던 ‘대검 중수부’가 \n‘중수청’이름을 달고 부활합니다.  \n수사 범위를 줄여야 합니다.\n그렇지 않으면 경찰 국수본은 2급 경찰로 전락하게 될 것입니다. \n\n셋째, 공소청을 ‘도로 검찰청’으로 만들면 안 됩니다.\n대-고등-지방 공소청의 3단 구조는 검찰 구조를 이식한 것입니다.\n현재 고등검찰청도 역할이 미미한데,\n수사기능이 빠짐에도 고등공소청을 만드는 것은 예산과 인력 낭비입니다. \n\n넷째, ‘검사의 수사권’을 규정한 형사소송법 제196조를 폐지해야 합니다.\n공소청과 중수청법이 통과돼도 검사들은 형소법 196조를 들어,\n수사가 가능하다고 주장할 것이기 때문입니다.\n\n이렇게 개혁하면 검사가 중수청으로 오지 않아 나라의 수사역량이 줄어든다는 말이 나옵니다. \n그럴 일 없습니다.\n중수청 인력 채울 방안 많습니다.\n중수청은 ‘검사 재취업센터’가 되면 안됩니다.\n당정청에 부탁드립니다. 응원봉 국민의 외침을 잊지 마십시오.\n제대로 합시다.       /끝/"}, {"id": 80, "filename": "2026.1.14. 국제질서 대변동과 2026 평화 대전환의 길.txt", "title": "국제질서 대변동과 2026 평화 대전환의 길", "date": "2026-01-14", "category": "기타", "topics": ["조국혁신당", "민생·경제", "외교·안보"], "tags": ["민생", "한미동맹"], "preview": "2026.1.14. 국제질서 대변동과 2026 평화 대전환의 길 모두발언  조국혁신당 대표 조국입니다.  먼저 오늘 자리를 준비해 주신 조국혁신당 정책위 의장님이신 김준형 의원님, 양소영 정책위 부의장님 그리고 관계자 여러분께 감사드립니다. 발제를 맡아주신 이혜정, 이희옥, 남기정, 이문영, 이정철 교수님, 한반도의 미래를 위한 혜안을 나누어 주셔서 진심으로 감사드립니다.  다들 아시다시피 세계는 대변동을 맞고 있습니다. 예측 가능한 규범의 질...", "content": "2026.1.14. 국제질서 대변동과 2026 평화 대전환의 길 모두발언\n\n조국혁신당 대표 조국입니다. \n먼저 오늘 자리를 준비해 주신 조국혁신당 정책위 의장님이신 김준형 의원님, 양소영 정책위 부의장님 그리고 관계자 여러분께 감사드립니다.\n발제를 맡아주신 이혜정, 이희옥, 남기정, 이문영, 이정철 교수님, 한반도의 미래를 위한 혜안을 나누어 주셔서 진심으로 감사드립니다.\n\n다들 아시다시피 세계는 대변동을 맞고 있습니다.\n예측 가능한 규범의 질서에서 힘이 먼저 움직이는 질서로 빠르게 기울고 있습니다.\n미국의 베네수엘라 마두로 대통령 체포 사태는 국제법과 국제 질서가 규범으로서 영향력을 어떻게 이룰 수 있는지를 생생히 보여주었습니다.\n국제 정치가 거칠어지면 그 충격은 우리 안보와 경제 그리고 국민의 일상으로 번집니다.\n그렇기에 우리는 2026년 평화 전략의 전환을 준비하고 외교, 통일, 안보 정책을 냉정하게 점검하고 새로 세워야 한다고 생각합니다.\n이럴 때일수록 대한민국의 외교와 안보는 감정이나 부호에 휘둘려서는 안 될 것입니다.\n면밀하게 설계된 전략에 따라 오로지 국익을 추구해야 된다고 믿습니다.\n무엇보다도 한반도 전쟁을 막는 것이 출발점입니다.\n평화는 선언이 아니라 국민의 삶을 지키는 최소 조건입니다.\n외교가 흔들리면 수출길과 환율, 일자리 등 국가 경제 전반이 한꺼번에 흔들릴 수밖에 없습니다.\n정치는 국민의 하루를 책임지는 일입니다. \n외교 안보는 그 책임의 한복판에 있습니다.\n동맹은 대한민국 안보의 핵심 기반입니다. \n그렇지만 동맹이 신앙이 되어서는 안 됩니다.\n국익을 담보할 수 있는 수단으로 유연하게 운영돼야 할 것입니다.\n중국과의 관계 마찬가지라고 생각합니다. \n중국은 최대 교역국이며 포기할 수 없는 시장입니다.\n대중 관계의 경색은 우리 기업의 생존과 직결되며 민생 경제에 막대한 타격을 줄 수밖에 없습니다.\n한미 협력과 한중 협력이 충돌할 때 우리가 제대로 관리하지 못한다면 \n한반도는 긴장의 늪에서 빠져나올 수 없을 것입니다.\n\n북핵 문제 또한 실현할 수 있는 의제부터 하나씩 풀어나가야 합니다.\n군사적 충돌 방지 장치나 인도적 교류 같은 것이 그 예일 것입니다.\n오늘 이 자리는 정답을 선언하는 자리가 아닙니다.\n해법을 찾기 위해 제대로 묻고 의논하는 자리입니다.\n조국혁신당은 오늘 주신 소중한 제안을 정책으로 구체화하겠습니다.\n국민에게 믿음이 갈 외교 안보의 방향을 국회와 정부에 제시하겠습니다.\n부디 귀한 말씀 부탁드립니다. 감사합니다."}, {"id": 81, "filename": "2026.1.14. 조국 대표 페이스북 메시지 박종철 열사 39주기.txt", "title": "조국 대표 페이스북 메시지 박종철 열사 39주기", "date": "2026-01-14", "category": "페이스북 메시지", "topics": ["기타"], "tags": ["페이스북"], "preview": "2026.1.14. 조국 대표 페이스북 메시지 <박종철 열사 39주기>  1987.1.14. 박종철, 새파란 나이에 고문치사. 종철아, 잘 있제? 니 생각하면 부끄럽지만, 내가 해야 할 몫은 하꾸마.", "content": "2026.1.14. 조국 대표 페이스북 메시지 <박종철 열사 39주기>\n\n1987.1.14. 박종철, 새파란 나이에 고문치사. 종철아, 잘 있제? 니 생각하면 부끄럽지만, 내가 해야 할 몫은 하꾸마."}, {"id": 82, "filename": "2026.1.14. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-14", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["검찰개혁", "페이스북", "윤석열"], "preview": "2026.1.14. 조국 대표 페이스북 메시지   윤석열 검찰총장의 최측근으로 2019년 시작된 검찰쿠데타의 핵심이었고, 윤석열 정권의 초대 법무부장관으로 윤석열 정권의 황태자이자 소통령이었던 한동훈, 윤석열-김건희와의 내부 권력투쟁 속에 가족 동원하여 당원게시판에 윤-김에 대한 비방 글을 올린 건으로 국민의힘에 의해 제명된다(최고위 의결이 남음). 한동훈, 윤석열이 계엄 후 자신을 죽이려 한 것을 알고서야 탄핵에 찬성하며 결별했다. 지금은 ‘...", "content": "2026.1.14. 조국 대표 페이스북 메시지 \n\n윤석열 검찰총장의 최측근으로 2019년 시작된 검찰쿠데타의 핵심이었고, 윤석열 정권의 초대 법무부장관으로 윤석열 정권의 황태자이자 소통령이었던 한동훈, 윤석열-김건희와의 내부 권력투쟁 속에 가족 동원하여 당원게시판에 윤-김에 대한 비방 글을 올린 건으로 국민의힘에 의해 제명된다(최고위 의결이 남음).\n한동훈, 윤석열이 계엄 후 자신을 죽이려 한 것을 알고서야 탄핵에 찬성하며 결별했다. 지금은 ‘반윤석열 투사’, ‘건전보수 정치인’인냥 행세하고 있다. 가증스럽고 가소롭다. 한동훈은 2019년 검찰쿠데타와 윤석열 정권의 폭정과 관해서는 공동책임을 져야 할 자다. 특히 법무부장관으로 “등”자를 활용해 검찰개혁법률을 무력화했던 장본인이자, 문재인, 이재명 등 민주개혁진영 인사에 대한 표적수사의 최상급 지휘자였음을 잊어서는 안된다.\n국민의힘과 한동훈의 싸움, 추잡한 이전투구다. 국민은 다 보고 있고 다 알고 있다. 공도동망(共倒同亡)의 길로 접어들었다."}, {"id": 83, "filename": "2026.1.14. 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-01-14", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북"], "preview": "2026.1.14. 조국 대표 페이스북 메시지  나는 내 딸이 3학기 장학금 총 600만원을 수령했다는 이유로 청탁금지법 위반 유죄판결을 받았다(성적장학금 아님).  검찰은 부산대 의전원 등을 압수수색했고, 모친의 부조비를 모아 장학회를 만드시고 격려가 필요한 학생에게 장학금을 주신 노환중 교수님을 문자 그대로 잡아 족친 후 저와 노 교수님을 뇌물죄로 기소했다. 이 장학금 선정과 수수 관련하여 나와 노 교수님 사이에 어떠한 연락도 어떠한 청탁도...", "content": "2026.1.14. 조국 대표 페이스북 메시지\n\n나는 내 딸이 3학기 장학금 총 600만원을 수령했다는 이유로 청탁금지법 위반 유죄판결을 받았다(성적장학금 아님). \n검찰은 부산대 의전원 등을 압수수색했고, 모친의 부조비를 모아 장학회를 만드시고 격려가 필요한 학생에게 장학금을 주신 노환중 교수님을 문자 그대로 잡아 족친 후 저와 노 교수님을 뇌물죄로 기소했다. 이 장학금 선정과 수수 관련하여 나와 노 교수님 사이에 어떠한 연락도 어떠한 청탁도 없었기에 뇌물죄는 무죄가 나왔다. 법정에서 노 교수님은 수사과정에서 자살 충동을 느꼈다고 말하시면서 눈물을 흘리셨다. \n내가 아는 바로는 자식의 장학금 수령으로 아비가 청탁금지법 위반 유죄판결이 난 최초의 사례다. 할 말이 많지만, 판결 승복한다. 당시 국민의힘과 여러 언론이 이 건으로 나를 얼마나 공격하고 비난했는지 새삼 기억이 난다. 똑같은 잣대로 이혜훈 장남이 6년간 '생활비 장학금'을 수령한 건을 검증하길 바란다. 그리고 청탁금지법 적용 대상자(판사, 검사 등 공무원, 교수, 기자 등)가 속한 기관은 자식들이 받은 장학금에 대한 전수조사를 하고, 고발조치해야 한다."}, {"id": 84, "filename": "2026.01.13. 공소청·중수청법 정부 입법예고 관련 조국혁.txt", "title": "공소청·중수청법 정부 입법예고 관련 조국혁", "date": "2026-01-13", "category": "기타", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["기자회견", "윤석열", "끝까지간다", "지방선거", "내란", "검찰개혁"], "preview": "2026.01.13. 공소청·중수청법 정부 입법예고 관련 조국혁신당 기자회견  ‘제2 검찰청법’의 원점 재검토를 요청합니다 어제 정부가 입법예고한 공소청법 및 중수청법은 검찰개혁의 본질에서 벗어나 있습니다.  수사와 기소를 분리하는 시늉만 낼 뿐, 실제로는 검찰 기득권을 교묘하게 연장하려는 위장술에 불과합니다. 조국혁신당은 국민의 염원에 역행하는 이번 입법예고안의 실체를 낱낱이 밝히며, 정부의 전면 재고를 요구합니다. 첫째, ‘공소청법’은 기존...", "content": "2026.01.13. 공소청·중수청법 정부 입법예고 관련 조국
