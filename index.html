혁신당 기자회견\n\n‘제2 검찰청법’의 원점 재검토를 요청합니다\n어제 정부가 입법예고한 공소청법 및 중수청법은 검찰개혁의 본질에서 벗어나 있습니다. \n수사와 기소를 분리하는 시늉만 낼 뿐, 실제로는 검찰 기득권을 교묘하게 연장하려는 위장술에 불과합니다.\n조국혁신당은 국민의 염원에 역행하는 이번 입법예고안의 실체를 낱낱이 밝히며, 정부의 전면 재고를 요구합니다.\n첫째, ‘공소청법’은 기존 ‘검찰청법’을 이름만 바꾼 눈속임입니다.\n정부가 공개한 공소청법은 기존 검찰청법의 장과 조문을 그대로 복사해 붙여넣기한 수준입니다. \n7개 장 명칭은 거의 대부분 동일하고, 그 조문들은 대다수가 ‘검찰청’이라는 용어를 ‘공소청’으로만 바꿨을 뿐입니다. \n심지어, 공소청 수장의 명칭조차 공소청장이 아닌 검찰총장입니다.\n이 뿐만이 아닙니다. 공소청을 대공소청, 고등공소청, 지방공소청이라는 \n3단 수직 구조로, 기존 검찰처럼 설계했습니다. \n또한, 검사적격심사 제도 및 근무평정 제도를 일부 수정한 것 외에는, \n검사의 신분과 지위를 과거 그대로 유지하고 있습니다.\n검사는 법관과, 또 검찰은 법원과 동일한 지위인 것처럼 \n착시를 유도했던 것과 동일합니다.\n국민들은 권력의 주구이자 내란의 기반이 되었던 기존 검찰을 해체하고, 국민과 민주공화국을 수호하는 검사로 재탄생하기를 염원했습니다. \n검사 사무가 완전히 재구성되어야 한다고 요구했습니다. \n그러나 정부안은 간판만 갈아 끼운 검찰 신장개업을 도모하고 있습니다.\n둘째, 공소청법에서 ‘수사’를 지우고, 형사소송법에 ‘수사권’을 숨겨두었습니다.\n정부는 공소청법에서 검사의 수사 개시 규정을 삭제했으니 수사권 남용이 사라질 것이라 강변합니다.\n그러나 근원적인 검사의 수사권은 형사소송법 196조에 살아있습니다. \n이 규정을 삭제하지 않는 한, 검사는 언제든 공소청법에 명시된 바처럼 “다른 법령에 따라 그 권한에 속하는 사항”을 빌미로 수사의 칼날을 휘두를 수 있습니다.\n심지어, 정부는 “송치받은 사건에 대한 보완수사와 관련해서는 형사소송법 개정 과정에서 검토할 예정”이라며, 보완수사권을 인정하고자 하는 의지를 드러내고 있습니다.\n형사소송법 개정 없는 수사-기소 분리가 허울 뿐임을 모르지 않을 것입니다. 그럼에도 정부는 아직까지 형사소송법 개정 구상에 대한 공개와 법안 추진 일정에 대해 분명한 입장을 제시하고 않고 있습니다. \n만약 지방선거를 앞두고 시간끌기를 통해 검찰개혁을 용두사미로 만들고자 하는 집단이 있다면 국민들이 이를 결코 좌시하지 않을 것입니다.\n셋째, 중대범죄수사청법은 ‘제2의 검찰청법’입니다.\n수사사법관이라는 명칭에 담긴 ‘법관’이라는 용어부터 잘못되었습니다. 더 큰 문제는, 수사사법관과 전문수사관으로 조직을 이원화하겠다는 계획입니다. \n기존 검찰의 수사 부서를 그대로 중수청에 옮겨놓겠다는 것입니다. \n검찰의 직접수사 기능을 잠시 위탁해 두었다가, \n훗날 정치 상황에 따라 다시 공소청과 통합하는 게 아니냐는 의심은 결코 지나치지 않습니다. \n국민이 바라는 수사-기소 분리는 이런 것이 아닙니다.\n넷째, 행안부장관의 수사지휘권은 필요한 일이나, 정부조직법상 법적 정당성부터 확보해야 합니다.\n행안부장관이 중대범죄수사청에 대해 수사지휘를 하려면, \n정부조직법상 행안부장관 사무에 관한 추가 규정이 수반되어야 합니다.\n1990년 12월 27일 개정된 정부조직법(법률 제4268호)에 따라, \n당시 내무부 장관의 ‘치안사무’가 삭제되고 경찰청이 외청으로 독립하며 경찰위원회가 신설된 맥락을 상기해야 합니다.\n정부조직법에서 삭제된 행안부 장관의 ‘치안사무’를 복원하여 수사지휘의 근거를 마련하고자 한다면, 국가경찰위원회의 존폐 문제에 대해서도 정부는 명확하고 합리적인 대안을 제시해야 합니다.\n조국혁신당은 윤석열 정권의 검찰독재 종식을 위해 가장 앞장서 싸워왔습니다. 그리고 “3년은 너무 길다”는 구호를 현실로 만들었습니다.\n검찰독재가 가능했던 제도적 기반을 무너뜨리고 진정한 민주주의를 세우기 위해 이재명 정부를 함께 탄생시켰으며, 검찰개혁 방안을 끊임없이 충실하게 제시해 왔습니다. 정부의 검찰개혁 입법을 학수고대하며 지지와 성원의 마음으로 기다렸습니다.\n그러나 어제 정부가 공개한 이 법안들은 검찰개혁의 이름을 붙일 수가 없습니다. 검찰의 기득권을 보존하고 수사-기소 분리를 형식적으로 보여주는 데에 머물러 있습니다. 국민과 함께 염원했던 개혁의 모습이 아닙니다.\n행정부 공무원으로서 검사, 행정기관으로서의 공소청, 공소청과 분리 독립하여 중대범죄를 수사하는 중대범죄수사청, 온전한 수사-기소 분리가 관철되는 형사소송법. 이것이 완전한 의미의 검찰개혁입니다.\n조국혁신당은 여전히 국민주권정부의 선의를 믿고, 개혁 의지를 지지합니다. 국민의 준엄한 목소리에 귀를 기울여 법안을 원점에서 전면 재검토해주길 진심으로 요청합니다.\n조국혁신당은 국민과 함께 완전한 검찰개혁의 길을 지키겠습니다.\n2026. 1. 13.\n조국혁신당 끝까지간다위원회"}, {"id": 85, "filename": "2026.1.13. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-13", "category": "페이스북 메시지", "topics": ["내란·윤석열", "개헌·민주주의"], "tags": ["내란", "5.18", "페이스북", "윤석열"], "preview": "2026.1.13. 조국 대표 페이스북 메시지  윤석열, 대학생 시절 12.12 모의재판에서 전두환에게 사형을 구형했다. 윤석열, 대선 후보 시절 “전두환이 쿠데타와 5.18만 빼면 정치는 잘했다”라고 평가했다. 윤석열, 전두환처럼 내란을 일으켰다. 윤석열, 전두환이 사형 구형을 받았던 417호 대법정에서 전두환과 같은 혐의로 사형을 구형받았다. 윤석열, 권력을 가지면 가질수록 전두환처럼 되어갔다. 그 말로(末路)는 전두환과 똑같이 되었다. 헌...", "content": "2026.1.13. 조국 대표 페이스북 메시지\n\n윤석열, 대학생 시절 12.12 모의재판에서 전두환에게 사형을 구형했다.\n윤석열, 대선 후보 시절 “전두환이 쿠데타와 5.18만 빼면 정치는 잘했다”라고 평가했다.\n윤석열, 전두환처럼 내란을 일으켰다.\n윤석열, 전두환이 사형 구형을 받았던 417호 대법정에서 전두환과 같은 혐의로 사형을 구형받았다.\n윤석열, 권력을 가지면 가질수록 전두환처럼 되어갔다. 그 말로(末路)는 전두환과 똑같이 되었다.\n헌정파괴범죄자에 대한 엄중한 선고를 기다린다."}, {"id": 86, "filename": "2026.01.12. 제16차 최고위원회의 모두발언.txt", "title": "제16차 최고위원회의 모두발언", "date": "2026-01-12", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "검찰개혁", "최고위", "윤석열"], "preview": "2026.01.12. 제16차 최고위원회의 모두발언  조국혁신당 대표 조국입니다.  최근 분노가 치민 일이 있었습니다. 지난해 12월 11일 자 현안검토 회의 의제를 다룬 <중대범죄수사청 조직 설계 관련 문제점>이라는 문서 때문입니다.  이 안에는 봉욱 청와대 민정수석이 제시한 의견이 적시돼 있습니다.  봉욱 수석은 중수청에 법률가인 ‘수사사법관'을 둬야 한다고 했습니다. 특히 기관장 및 수사 부서장에는 ‘수사사법관’만을 보임해 비법률가인 수사...", "content": "2026.01.12. 제16차 최고위원회의 모두발언\n\n조국혁신당 대표 조국입니다.\n\n최근 분노가 치민 일이 있었습니다.\n지난해 12월 11일 자 현안검토 회의 의제를 다룬\n<중대범죄수사청 조직 설계 관련 문제점>이라는 문서 때문입니다. \n이 안에는 봉욱 청와대 민정수석이 제시한 의견이 적시돼 있습니다.\n\n봉욱 수석은 중수청에 법률가인 ‘수사사법관'을 둬야 한다고 했습니다.\n특히 기관장 및 수사 부서장에는 ‘수사사법관’만을 보임해\n비법률가인 수사관을 지휘해야 한다는 의견입니다.\n이들 수사관 직급은 현재의 검사와 동급으로 할 것을 주장했습니다.\n일반 수사관은 보조 역할만 해야 한다고 말했다고 합니다.\n\n또 중수청을 검찰구조처럼 3단계 구조로 짜고 있습니다.\n‘제2검찰청’의 외관을 부여하겠다는 것 외 다른 이유를 찾을 수가 없습니다.\n결국 검사가 ‘수사사법관’으로 명찰만 바꿔 다는 것입니다.\n\n일반 수사관은 능력이 탁월해도 ‘수사사법관’으로 승진할 수 없게 되어있습니다.\n부서장도 못 되고, 보조 역할만 해야 합니다.\n\n\n중수청에는 영장 청구권과 기소권은 없습니다.\n그러나 중수청이 ‘제2의 검찰청’이 되면,\n공소청 검사와 중수청 ‘수사사법관’ 사이에 카르텔이 형성될 것입니다.\n공소청과 중수청 사이의 견제와 균형이 달성되기 어렵습니다.\n\n응원봉 국민은 분명 수사, 기소를 분리하고 검찰을 해체하라고 명령했습니다.\n그런데 ‘제2의 검찰청’이라니, 어찌 된 일입니까?\n중수청 제도를 저렇게 짠다니, 공소청과 형사소송법 개정안도 걱정이 됩니다.\n오늘 정부가 중수청과 공소청의 구체적 역할과 인력 구성 방안을 발표하고,\n입법 예고를 할 예정입니다.\n\n대한민국은 결코 도로 검찰 공화국이 돼서는 안 됩니다.\n개혁이 아니라 퇴행시키는 제도에는 단호히 반대합니다.\n작은 여지라도 철저하게 차단해서 불가역적으로 만들어야 합니다.\n\n우선 중수청을 ‘제2검찰청’으로 만드는 시도에 단호하게 반대합니다.\n이는 수사·기소 분리를 외치며 싸워온 국민에 대한 배신입니다.\n검찰은 추후 ‘친 검찰 정권’이 들어서면\n공소청과 중수청을 합쳐서 ‘검찰청’을 부활시킬 것입니다.\n\n문재인 정부의 검찰개혁 성과를 폐기해서도 안 됩니다.\n당시 사건을 모두 검찰에 넘기는 ‘전건 송치주의’를 폐지하고,\n경찰에 ‘1차 수사종결권’을 부여했습니다.\n검사의 ‘수사지휘권’도 폐지했습니다.\n이를 되돌려서는 안 됩니다.\n\n향후 수사권을 더 갖게 되면 경찰 권력은 커집니다.\n경찰의 중립성과 독립성을 확보하고, 민주적 통제를 강화해야 합니다.\n그러기 위해서는 유명무실한 경찰위원회를 실질화해야 합니다.\n심의‧의결기구로서 역할을 할 수 있도록 심의‧의결 대상을 명확하게 해야 합니다.\n경찰 관련 법안·주요 정책을 제대로 검토할 수 있도록 해야 합니다.\n경찰위원회의 조치를 불이행했을 때 감찰·징계 요구권도 부여해야 합니다.\n물론 내란 수괴 윤석열이 임명해 놓은 경찰위원회 개편도 이루어져야 합니다.\n\n검찰개혁 방안 중 상당수가 문재인 정부에서는 미뤄졌습니다.\n당시 여당 의석수가 부족하고 경찰 준비가 미흡했기 때문입니다.\n그러나 지금은 여당 의석은 충분하고, 경찰도 착실하게 준비해왔습니다.\n검찰개혁 과제를 완수할 절호의 기회입니다.\n\n검찰개혁을 진두지휘하며 공소청 최종책임자인 정성호 법무부 장관과,\n중수청을 설계해서 운영할 윤호중 행정안전부 장관,\n정부 내 의견을 조정·조율할 윤창렬 국무조정실장은 흔들리지 마십시오.\n검찰 카르텔이 아니라, 국민의 바람에 귀 기울이십시오.\n그게 이재명 대통령을 제대로 보좌하는 길입니다.   /끝"}, {"id": 87, "filename": "2026.1.12 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-12", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["내란", "페이스북"], "preview": "2026.1.12 조국 대표 페이스북 메시지  이준석 대표가 국민의힘과 개혁신당의 연대에 조국혁신당도 합류하라고 제안하며, “우리나라와 일본이 사이가 안 좋아도 외계인이 침공하면 힘을 합해야 하지 않겠는가?”라는 고 노회찬 의원의 발언을 인용했습니다. 노회찬 의원의 후원회장 이력이 있는 정치인으로 말합니다. 현재 한국 정치에서 ‘외계인’은 내란 동조 극우 정당인 국민의힘입니다. 노 의원이 살아계셨더라도, 이준석 의원이 제안한 연대에 참여하셨을리...", "content": "2026.1.12 조국 대표 페이스북 메시지\n\n이준석 대표가 국민의힘과 개혁신당의 연대에 조국혁신당도 합류하라고 제안하며, “우리나라와 일본이 사이가 안 좋아도 외계인이 침공하면 힘을 합해야 하지 않겠는가?”라는 고 노회찬 의원의 발언을 인용했습니다.\n노회찬 의원의 후원회장 이력이 있는 정치인으로 말합니다. 현재 한국 정치에서 ‘외계인’은 내란 동조 극우 정당인 국민의힘입니다. 노 의원이 살아계셨더라도, 이준석 의원이 제안한 연대에 참여하셨을리 만무합니다.\n조국혁신당은 이미 국민의힘과 손잡는 연대에 참여하지 않는 이유를 밝혔는 바, 이준석 대표는 고 노회찬 의원의 말을 왜곡 인용하지 말길 바랍니다."}, {"id": 88, "filename": "2026.1.12. 광남일보 조국 대표 인터뷰.txt", "title": "광남일보 조국 대표 인터뷰", "date": "2026-01-12", "category": "인터뷰", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["5.18", "사법개혁", "윤석열", "부동산", "지방선거", "민생", "의료", "내란"], "preview": "2026.1.12. 광남일보 조국 대표 인터뷰  - 병오년 새해가 밝았다. 조국혁신당의 2026년 최우선 과제는 무엇인가?  대한민국이 제7공화국을 시작하는 한 해로 만드는 것이 큰 목표이다. 그러기 위해서는 내란 청산을 확실하게 매듭지으면서 ‘내란 이후의 세상’을 설계하는 일을 시작해야 한다. 즉 청산과 미래 작업은 동시에 이뤄져야 한다. 조국혁신당이 그 일을 앞장서고 있다.  - 내란 청산은 어떤 방향으로 매듭지어져야 하나?  조국혁신당이 ...", "content": "2026.1.12. 광남일보 조국 대표 인터뷰\n\n- 병오년 새해가 밝았다. 조국혁신당의 2026년 최우선 과제는 무엇인가?\n\n대한민국이 제7공화국을 시작하는 한 해로 만드는 것이 큰 목표이다. 그러기 위해서는 내란 청산을 확실하게 매듭지으면서 ‘내란 이후의 세상’을 설계하는 일을 시작해야 한다. 즉 청산과 미래 작업은 동시에 이뤄져야 한다. 조국혁신당이 그 일을 앞장서고 있다.\n\n- 내란 청산은 어떤 방향으로 매듭지어져야 하나?\n\n조국혁신당이 제시한 합헌적 방안대로 내란전담재판부법이 통과됐다. 이제 내란 단죄의 시계가 빨라질 것이다. 제가 줄기차게 강조했던 검경 합동수사본부도 이재명 대통령의 지시로 설치됐다. 검찰개혁도 중요하다. 윤석열 정치검찰은 내란의 뿌리이다. 검찰개혁을 시작했던 조국혁신당이 마무리도 확실히 책임지겠다. 검찰의 직접적 보완수사권, 전건송치주의 부활 등 검찰개혁의 후퇴 조짐이 보인다면, 용인하지 않을 것이다. 조희대 대법원도 반드시 개혁하겠다. 법원행정처 폐지와 사법행정위원회 신설, 재판소원 도입, 법왜곡죄 도입 등 사법개혁의 오랜 과제도 매듭짓겠다.\n\n-정치개혁, 내란전담재판부, 공공임대주택 확대 등 조국 대표가 오히려 민주당보다 이재명 대통령과 호흡이 잘 맞는다는 평가가 나온다.\n\n 많은 분들이 조국혁신당을 ‘집권야당’이라고 평가하는 배경인 것 같다. 제가 제시한 정치개혁 내용, 위헌 요소를 해소한 내란전담재판부 구성 방안, 좋은 땅에 고품질 공공임대주택을 지어야 한다는 제안 등이 이재명 대통령과 정확하게 일치했다. 앞으로 대한민국을 위해 필요한 일, 그러나 민주당이 머뭇거리는 일에 대해서는 주저 없이 앞장설 것이다.\n\n- 내란 이후의 세상을 어떤 방향으로 가야 하나?\n\n불평등과 차별 없는 나라이다. 서울은 집값이 폭등하고, 지방은 지역소멸이 나타난다. 서울은 부동산 개혁이 시급하고, 지방은 청년들이 떠나지 않도록 좋은 일자리를 만드는 일이 중요하다. 주거, 의료, 돌봄 등 기본적인 삶의 분야에서 격차가 발생하지 않도록 하는 것이 우리 공동체의 목표가 돼야 한다. 저는 ‘행복이 권리가 되는 나라’를 국가 비전으로 제시했다. 조국혁신당은 ‘코스피 5000 시대’의 그늘에 마음을 둘 것이다. 더 안정적인 집, 더 나은 일자리, 더 정의로운 조세제도를 만드는 데 노력하겠다.\n\n중요한 것은 불평등을 만드는 권력과 제도까지 개혁해야 한다는 점이다. 불평등을 방치하고, 특권과 기득권을 강화하는 정치를 타파해야 한다. 즉 정치를 바꾸지 않으면 불평등을 해소할 수 없다. 특히 호남과 영남처럼 특정 정당이 특정 지역의 국회의원, 지방행정, 지방의회를 싹쓸이하는 독점 정치는 국민의 삶을 바꾸지 못한다. 정치개혁이 곧 민생이다.\n\n-지방선거를 앞두고 있다. 지방정치를 위해 가장 필요한 정치개혁 과제는 무엇인가?\n\n호남에 경쟁을 일으키는 것이 최고의 정치개혁이다. 지금 기초 광역 의원을 뽑는 것은 겉으로만 투표제이다. 투표만 있고 선택은 없다. 지역구 국회의원이 사실상 낙점하는 인물이 기초 광역 의원이 된다. 사실상 ‘임명제’이다. 지방의회 의원들이 국민이 아니라 국회의원 눈치를 보는 구조이다.\n\n지방선거 ‘돈 공천’, 근절돼야 한다. 민주주의의 기초인 지방자치의 취지를 더럽히는 짓이다. 공천이 당선인 지역에서는 본선에서 경쟁이 없으니, 공천을 받기 위해 수단과 방법을 가리지 않는다. 이런 사람은 당선된 후에는 ‘본전’을 뽑으려 불법과 탈법을 저지른다. 호남과 영남에서 무투표 당선이 비일비재하다. 광주시민과 전남도민들에게 더 나은 선택권을 주는 것이 정치개혁의 시작이다.\n\n그래서 광역 및 기초의원 후보자들이 지역 주민이 아니라 국회의원 눈치를 보고 줄을 서게 만드는 현행 제도를 바꿔야 한다. 지방의회에 3인 이상 중대선거구제를 도입해야 한다. 이것은 2018년 당시 이재명 성남시장이 역설한 개혁안이다. 민주당은 이재명 대통령의 오랜 소신을 무시하고 있다.\n\n또한 광역의원 비례대표 제도를 개혁해야 한다. 비례대표 의석 비율을 현행 10%에서 20%로 현실화하고, 진입장벽인 봉쇄조항을 5%에서 3%로 낮추는 것이다. 연동형 비례대표제로 전환해서 특정 정당들의 호남과 영남 싹쓸이를 차단해야 한다. 광역단체장에 대한 결선투표제 역시 중요한 정치개혁 과제이다.\n\n그리고 진정한 내란 청산을 위해서도 정치개혁을 미룰 수 없다는 점을 인식해야 한다. 2인 선거구제를 유지하면, 내란 극우 세력인 국민의힘이 전국적으로 잔존하게 된다. 중대선거구제가 도입돼야 국민의힘의 잔존 확률을 크게 줄일 수 있다. 강조하지만, 민주당은 2018년 이재명 시장의 호소에 반하는 선택을 하지 말라.\n\n- 민주당의 공천비리 사태가 심각하다. 문제는 이것뿐이겠냐는 우려들이 나타나고 있다. 그런데 민주당 정청래 대표는 ‘휴먼 에러’라며 개인의 일탈로 대응하는 상황이다. 조국혁신당에서는 이 문제를 어떻게 바라보고 있나?\n\n 최근 쿠팡 사태로 국민적 분노가 들끓고 있다. 쿠팡은 아직도 자신들의 잘못을 인정하지 않는다. 쿠팡은 ‘시스템 에러’ 라기보다 ‘휴먼 에러’에 가깝다고 말한다. 민주당의 인식과 태도가 쿠팡을 닮았다. 과거 김대중, 노무현 두 대통령의 정신이 더럽혀졌는데, 쿠팡처럼 변명하고 빠져나가려 한다. 공천헌금 사태를 개인의 일탈로 치부한다는 건, 덮고 가겠다는 오만이고, 호남 정신에 대한 배반이다. 이 사태가 대통령의 국정운영에 부담을 주고, 자칫 개혁 엔진이 훼손될 수 있다는 점을 분명하게 깨달아야 한다.\n\n민주당은 과거 호남 정신을 실천했다. 정치개혁에 앞장섰고, 도덕적으로 국민의힘을 압도했다. 자정 능력도 갖췄었다. 그러나 지금과 같은 집단적 침묵은 매우 위험하다. 민주당은 당장 기초 광역의원 및 후보자에 대한 자체 전수조사를 실시하고 그 결과를 국민께 공개해야 한다.\n\n한편 국민의힘은 민주당을 비판할 자격이 없다. 작년 언론을 통해 국민의힘 포항 지역구 국회의원이 보통은 3~5억을 주고 표 매수를 한다는 통화 내용이 공개됐다. 국민의 정치 불신이 임계점에 도달했다. 이번 사태의 본질은 정치개혁이다. 조국혁신당은 국민이 아니라 국회의원에게 돈을 들고 줄 서는 지방정치의 구태를 모조리 찾아내서 단호하게 개혁하겠다.\n\n-돈 공천을 막을 근본적 대안은 무엇인가?\n\n조국혁신당은 돈 공천 추방을 위한 4대 입법 과제를 제시했다. 첫째, 공천을 대가로 금품을 주고받은 자는 20년간 피선거권을 박탈하는 것이다. 사실상 정치권에 다시는 발을 내딛지 못하게 하는 방안이다. 둘째, ‘징벌적 벌금형’을 부과하겠다. 돈을 준 사람도, 받아서 공천한 사람도 패가망신 당하게 만들겠다. 셋째, 정당도 책임져야 한다. 돈 공천 관련 문제 인사를 공천한 정당에는 국고보조금을 삭감하는 것이다. 연대 책임을 묻겠다. 그래야 정당이 책임 공천을 하고, 자정 능력을 갖출 수 있다. 마지막으로 돈 공천으로 재보궐 선거가 발생한 경우 해당 정당은 후보 추천 자체를 법으로 금지하는 것이다.\n\n- 광주시와 전남도의 최대 현안인 행정통합에 대해서 어떤 입장인가?\n\n광주와 전남에 기회이다. 선택이 아니라 생존과 도약을 위한 필요조건이 됐다. 광주·전남 통합 주장은 1995년부터 대두했고, 사회적 공감대가 축적된 사안이다. 게다가 이재명 대통령의 확고한 의지와 중앙정부 차원의 대대적인 지원이 전제돼 있기 때문에 행정통합은 가야 할 길이다. 행정통합을 통해 신재생 에너지를 활용할 수 있는 산업의 재배치를 중앙정부에 당당하게 요구할 수 있다.\n\n일각에서 시민과 도민들의 의견을 제대로 수렴해야 한다는 비판이 있다. 맞는 지적이다. 광주시장과 전남지사가 작년 대선에서 발표된 ‘5극 3특 공약’을 선제적으로 겨냥해서 움직여야 했다. 대전 충남보다 발 빠르게 준비하지 못한 점은 비판받아야 할 대목이다. 광주와 전남의 정치인들이 사적 계산을 버리고 지역사회와 힘을 모아서 총력을 다해야 한다.\n\n조국혁신당이 적극적으로 뒷받침해 나가겠다. 행정통합을 통해 서울에 준하는 지위와 조직 특례, 교부세 추가 배분과 공공기관 우선 이전 등이 지원되도록 모든 역량을 투입하겠다.\n\n- 광주시장과 전남지사 후보를 낼 계획인가?\n\n광주시장은 염두에 둔 인물이 있었고, 전남지사도 최적의 인물을 찾고 있었다. 그런데 광주전남 통합이 예상되므로 통합을 전제로 인물을 다시 찾아야 한다. 선거운동은 서로 연결되는 만큼 광역 후보를 중심으로 단체장, 기초 광역 후보들이 하나의 팀을 이뤄 시너지를 내야 한다. 광주시민과 전남도민이 만족하실 수 있는 신상품을 내놓겠다. 호남 민심은 ‘민주당이냐 혁신당이냐’가 아니라 ‘누가 더 잘하느냐’를 묻고 계신다. 조국혁신당이 ‘정치적 메기’가 돼 호남 정치의 판을 확 바꾸겠다.\n\n"}, {"id": 89, "filename": "2026.01.11. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-11", "category": "페이스북 메시지", "topics": ["정치·선거개혁"], "tags": ["페이스북"], "preview": "2026.01.11. 조국 대표 페이스북 메시지  이래도 ‘시스템 에러’는 없다고 할 것인가? 2인 선거구제를 폐지하고 3-5인 선거구제로 바꾸어야 한다는 2018년 이재명 성남시장의 탁견에 따라 시스템을 바꾸어야 한다.", "content": "2026.01.11. 조국 대표 페이스북 메시지\n\n이래도 ‘시스템 에러’는 없다고 할 것인가? 2인 선거구제를 폐지하고 3-5인 선거구제로 바꾸어야 한다는 2018년 이재명 성남시장의 탁견에 따라 시스템을 바꾸어야 한다."}, {"id": 90, "filename": "2026.01.11. 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-01-11", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["페이스북", "윤석열", "민생", "내란", "개헌"], "preview": "2026.01.11. 조국 대표 페이스북 메시지2  2021년 유엔무역개발회의(UNCTAD)는 한국을 '선진국'( ='그룹 B' 국가)으로 재규정했고,  2023년 이후 한국의 1인당 국내총생산(GDP)가 일본을 추월했다.  박정희-전두환 독재 시절 청년기를 보낸 사람에게 일본 경제는 '넘사벽'이었으나, 판이 바뀐 것이다. 당시 한국 청년 상당수는 J-팝과 홍콩 영화에 빠졌다. 그러나 현재 일본과 홍콩 청년 상당수가 K-문화에 빠져 있다. 미국...", "content": "2026.01.11. 조국 대표 페이스북 메시지2\n\n2021년 유엔무역개발회의(UNCTAD)는 한국을 '선진국'( ='그룹 B' 국가)으로 재규정했고,  2023년 이후 한국의 1인당 국내총생산(GDP)가 일본을 추월했다. \n박정희-전두환 독재 시절 청년기를 보낸 사람에게 일본 경제는 '넘사벽'이었으나, 판이 바뀐 것이다. 당시 한국 청년 상당수는 J-팝과 홍콩 영화에 빠졌다. 그러나 현재 일본과 홍콩 청년 상당수가 K-문화에 빠져 있다. 미국이 ‘소프트 파워’를 스스로 내팽개치며 무지막지한 ‘힘의 제국(帝國)’으로 위력을 행사하는 시대, 한국은 '소프트 파워'까지 획득하고 있다.\n민주화 운동의 성과로 1987년 헌법 체제가 만들어졌고, 그 하에서 자본주의는 더욱 발전했다.  현재 전세계에서 열풍을 일으키고 있는 K-문화의 바탕에는 독재를 거부했던 전복과 저항의 정신과 자본주의의 급속 성장을 일으킨 근면과 창조의 정신이 자리잡고 있다. 위대한 국민의 위대한 도전과 성취라 하지 않을 수 없다. \n윤석열 일당은 이러한 흐름을 거꾸로 돌리려는 시대착오적 내란을 일으켰지만, 자멸했다. 21세기 대한민국에서 일어난 내란과 격퇴는 K-민주주의의 취약점과 회복력을 동시에 보여주었다. 1인당 GDP에서 일본을 추월한 '선진국'이지만, 소득과 자산의 양극화, 일자리와 주거의 불안정은 심각하고 자살율은 세계 최고 수준이다. ‘K자 양극화‘가 심각하다! K-영화의 대표로 극찬 받은 <기생충>과 <어쩔수없다>가 그리는 비극은 단지 풍자가 아니다. 미래가 불안한 청년층 일부는 극우화되어 “윤 어게인”과 “짱깨 아웃”을 외치고 있다.\n조만간 윤석열 일당에 대해 중형이 내려질 것이다. 이제 추가 수사와 재판 진행에만 몰두해서는 안된다. 새해에는 '내란 이후 대한민국'을 만드는데 뜻과 마음을 모아야 한다. 경제와 문화 수준에 부합하는 정치가 필요하다. 내가 정치를 시작한 이후 계속 강조해온 \"새로운 다수연합\"(New Majority Coalition)을 구축하여, 정치개혁, 사회개혁, 인권개혁을 추진, 실현해야 한다. 현행 '제6공화국' 체제를 업그레이드해야 폭군의 재현(再現)과 내란의 재발(再發)을 원천 봉쇄할 수 있고, 국민의 삶의 질도 높일 수 있다. '제6공화국' 체제, 곧 40년이다. \"새로운 다수연합\"이 주체가 되어 '제7공화국' 체제를 만들어 다음 세대에게 넘겨주어야 한다."}, {"id": 91, "filename": "2026.01.11. 조국혁신당 대변인실 입장문.txt", "title": "조국혁신당 대변인실 입장문", "date": "2026-01-11", "category": "성명·입장·논평", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": [], "preview": "2026.01.11. 조국혁신당 대변인실 입장문  [이준석 대표의 야3당 대표회담 제안에 대한 입장문]  이준석 개혁신당 대표가 ‘통일교 특검’의 신속한 도입과 ’강선우-김병기 공천헌금‘사건을 다룰 특검 도입을 논의하기 위한 국민의힘-개혁신당-조국혁신당 대표회동을 제안했습니다.  이준석 대표는 ‘통일교 특검’으로 특검의 수사 범위를 좁히려는 시도를 해서는 안됩니다.  이 사안의 본질은 통일교의 일탈뿐 아니라, 정교유착 전반에 대한 수사입니다. ...", "content": "2026.01.11. 조국혁신당 대변인실 입장문\n\n[이준석 대표의 야3당 대표회담 제안에 대한 입장문]\n\n이준석 개혁신당 대표가 ‘통일교 특검’의 신속한 도입과 ’강선우-김병기 공천헌금‘사건을 다룰 특검 도입을 논의하기 위한 국민의힘-개혁신당-조국혁신당 대표회동을 제안했습니다. \n이준석 대표는 ‘통일교 특검’으로 특검의 수사 범위를 좁히려는 시도를 해서는 안됩니다. \n이 사안의 본질은 통일교의 일탈뿐 아니라, 정교유착 전반에 대한 수사입니다. \n이미 합동수사본부가 출범하여 신천지 관련 정치개입의혹까지 수사를 진행중인 마당에,  ’국민의힘 봐주기 특검‘으로 특검의 수사범위를 좁힐 하등의 이유가 없습니다. \n국민의힘은 이와 관련하여 소속 국회의원이 구속된 상황입니다. 특검의 범위를 정하는 데 관여하는 것이 부적절합니다. 왜 국민의힘이 ‘야당‘이라며 특검 출범의 범위를 정하는 권한을 부여해 주려 하십니까.\n조국혁신당이 이미 발의한 통일교 등 특검법안을 일독해 주셨으면 합니다. \n이준석 대표는 공천헌금 사태를 민주당에게만 국한시키려는 시도를 해서는 안됩니다. \n조국혁신당은 민주당의 공천헌금 사태에 대해 엄중한 수사를 촉구해 왔습니다. \n민주당만 문제가 아닙니다. 국민의힘 소속 포항 김정재 의원이 ”경선을 하게 되면 돈으로 매수를 한다, 보통은 4억 ~ 5억을 주고 캠프를 통째로 지지선언을 하게 한다“는 자백진술을 한 바 있습니다. 국민의힘 공천헌금 역시 수사 대상이어야 합니다.\n국민의힘이 ‘야당‘이라며, 국민의힘이 돈공천 문제와 관련된 수사 대상에 포함되지 않는 것처럼 언급해서는 안될것입니다. \n국민의힘에게 ‘도주로‘를 제시하려는 이준석 대표의 제안은 부적절합니다. 정치개혁에 있어서 국민의힘은 개혁의 대상이지 주체가 아닙니다. \n기존 거대 양당의 부패정치를 바꾸려는 고견은 늘 경청 하겠습니다. 감사합니다. \n2026년 1월 11일\n조국혁신당 대변인실"}, {"id": 92, "filename": "2026.01.10. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-10", "category": "페이스북 메시지", "topics": ["검찰·사법개혁"], "tags": ["페이스북"], "preview": "2026.01.10. 조국 대표 페이스북 메시지  봉욱 민정수석의 의견대로라면, ‘중수청’은 ‘제2의 검찰청’이 된다. ‘수사사법관’은 ‘제2의 검사’다.", "content": "2026.01.10. 조국 대표 페이스북 메시지\n\n봉욱 민정수석의 의견대로라면, ‘중수청’은 ‘제2의 검찰청’이 된다. ‘수사사법관’은 ‘제2의 검사’다."}, {"id": 93, "filename": "2026.01.10. 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-01-10", "category": "페이스북 메시지", "topics": ["내란·윤석열", "개헌·민주주의", "인권·사회"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2026.01.10. 조국 대표 페이스북 메시지2  김대중 정부 이후 한국은 사형집행을 하지 않습니다('실질적 사형폐지국'). 인권국가가 되었다는 징표입니다. 언론에서 오늘 심야에 이루어질 윤석열에 대한 구형이 사형이냐 무기냐를 촛점에 맞추지만, 선고가 더 중요합니다.  전두환의 경우와 똑같이 무기징역 선고가 마땅합니다. 보안사령관 전두환이 일으킨 내란과 달리, 윤석열의 내란은 국민살상(殺傷)은 없었습니다. 이는 국민의 저항때문이었음은 물론입니...", "content": "2026.01.10. 조국 대표 페이스북 메시지2\n\n김대중 정부 이후 한국은 사형집행을 하지 않습니다('실질적 사형폐지국'). 인권국가가 되었다는 징표입니다. 언론에서 오늘 심야에 이루어질 윤석열에 대한 구형이 사형이냐 무기냐를 촛점에 맞추지만, 선고가 더 중요합니다. \n전두환의 경우와 똑같이 무기징역 선고가 마땅합니다. 보안사령관 전두환이 일으킨 내란과 달리, 윤석열의 내란은 국민살상(殺傷)은 없었습니다. 이는 국민의 저항때문이었음은 물론입니다. 그러나 윤석열은 군최고통수권자인 대통령으로 내란을 일으켰고, 헌법수호책무가 있는 대통령으로 내란을 일으켰습니다. 위법과 책임이 훨씬 더 무겁다는 것입니다. 일체의 반성이 없었음은 모두가 목도하였습니다. 지귀연 재판부는 반드시 무기징역을 선고해야 합니다. 사형제가 폐지되고 '감형 없는 종신형'이 도입되었다면, 후자가 선고되어야 할 범죄자입니다."}, {"id": 94, "filename": "2026.1.9. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-09", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "개헌", "페이스북"], "preview": "2026.1.9. 조국 대표 페이스북 메시지  우원식 국회의장, 내란 1심 판결 후 개헌 논의 & 지방선거와 개헌 동시투표 제안.  크게 환영한다. 내가 전당대회 이후 일관되게 주장해온 바와 동일하다. 국회 개헌특위를 가동하여 헌법 전문 개정, 지방분권 조항 신설 등 합의가능한 사항부터 6월 지방선거에서 개헌해야 한다. 이후 추가 논의를 하여 2028년 총선에 2차 개헌을 하자.", "content": "2026.1.9. 조국 대표 페이스북 메시지\n\n우원식 국회의장, 내란 1심 판결 후 개헌 논의 & 지방선거와 개헌 동시투표 제안. \n크게 환영한다. 내가 전당대회 이후 일관되게 주장해온 바와 동일하다. 국회 개헌특위를 가동하여 헌법 전문 개정, 지방분권 조항 신설 등 합의가능한 사항부터 6월 지방선거에서 개헌해야 한다. 이후 추가 논의를 하여 2028년 총선에 2차 개헌을 하자."}, {"id": 95, "filename": "2026. 01.08. 제14차 최고위원회의-대구현장최고위 모두발언.txt", "title": "제14차 최고위원회의-대구현장최고위 모두발언", "date": "2026-01-08", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["내란", "지방선거", "최고위", "민생"], "preview": "2026. 01.08. 제14차 최고위원회의-대구현장최고위 모두발언  조국혁신당 대표 조국입니다.  조국혁신당이 대구에서 현장 최고위원회를 열었습니다. 대구시민들의 귀한 목소리를 직접 듣고, 저희의 지향과 비전을 말씀드리기 위한 자리입니다.  대구는 30년 넘게 국민의힘이 장악하고 있습니다. 지난 지방선거에서 TK 광역·기초의회 492개 의석 중 84%를, 총선거에서는 의석 전체를 싹쓸이했습니다. 대구시 의회 지역구 29명 중 후보자 20명이 ...", "content": "2026. 01.08. 제14차 최고위원회의-대구현장최고위 모두발언\n\n조국혁신당 대표 조국입니다.\n\n조국혁신당이 대구에서 현장 최고위원회를 열었습니다.\n대구시민들의 귀한 목소리를 직접 듣고,\n저희의 지향과 비전을 말씀드리기 위한 자리입니다.\n\n대구는 30년 넘게 국민의힘이 장악하고 있습니다.\n지난 지방선거에서 TK 광역·기초의회 492개 의석 중 84%를,\n총선거에서는 의석 전체를 싹쓸이했습니다.\n대구시 의회 지역구 29명 중 후보자 20명이 무투표 당선됐습니다.\n10명 중 7명꼴입니다.\n무투표로 당선된 전국 기초단체장이 6명인데, 대구에 2명입니다.\n\n그런 대구가 대한민국에서 31년 동안 꼴찌를 한 부문이 있습니다.\n1인당 GRDP(지아르디피), 즉 지역 내 총생산입니다.\n지난해 1인당 GRDP는 전국 평균 4,948만 원인데, 대구는 3,137만 원으로 꼴찌였습니다.\n\n이뿐이 아닙니다.\n실질성장률은 –0.4%로, 뒤에서 두 번째입니다.\n제조업 기반이 무너지면서 양질의 일자리가 부족합니다.\n청년이 빠져나가는 게 당연합니다.\n해마다 대구에서 1만 명 안팎이 ‘탈(脫) 대구’를 합니다.\n지난해 20대 청년만 1만 4,651명이 줄었습니다.\n\n한 세대에 걸친 대구의 국민의힘 편애에도 불구하고 이런 지경입니다.\n공천만 받으면 당선되는 곳이 되었기 때문입니다.\n정치인들은 유권자, 국민보다 공천권자 눈치만 봅니다.\n의회와 단체장이 한 몸이니, 견제보다 짬짜미가 팽배합니다.\n독점은 무능을 낳고, 부패를 키웁니다.\n\n존경하는 대구시민 여러분, 여쭙겠습니다.\n국민의힘 대구 지도자들은 그동안 무엇을 했습니까?\n대구 시민의 압도적 지지를 받으면서도\n왜 대구를 꼴찌로 만들었습니까? \n\n조국혁신당 대구시당위원장인 차규근 의원은\n대법원 등을 대구로 이전하는 법안을 냈습니다.\n대구 의원들은 수도권 집중을 말만 하지, 왜 이런 법은 내지 않습니까?\n대구는 언제까지 이런 지역 정치 카르텔을 참고 견디실 것입니까?\n\n제 답은 이렇습니다.\n좋은 경쟁을 해야, 견제와 균형을 이룰 수 있습니다. \n사회와 경제에 활력이 돌아옵니다. 그러면 청년도 돌아올 것입니다.\n조국혁신당이 정치 혁신, 지방선거 혁신을 부르짖는 이유입니다.\n\n마침, 조국혁신당의 우당인 더불어민주당 대구시당 상무위원회에서 결의문을 냈습니다.\n“대구의 지방자치는 일당 독점으로 인해 파산 상태”라고 진단했습니다. 동감합니다. \n그러면서 더불어민주당 상무위원회는\n김영배·차규근 의원이 대표 발의한 선거법 통과를 촉구했습니다.\n비례대표 의석 비율을 현행 지역구의 10%에서 20%로 늘리고,\n정당 득표율에 따라 비례대표 의석이 배분되는 연동형 방식 도입을 요구합니다.\n비례대표를 얻는 최소한 정당 득표율을 5%에서 3% 낮추자고 제안했습니다. \n\n조국혁신당은 여기에 더해 공천되면 당선되는 2인 선거구를 합쳐서\n3~5인 선거구를 늘릴 것을 제안합니다.\n또 무투표 당선 대신, 30% 투표해서 과반 득표해야 당선되도록 만들어야 합니다. \n\n제가 만나 뵈어왔던 대구 시민사회 분들, 언론사 분들 이런 제안에 모두 찬성하고 계십니다.\n우물쭈물할 이유가 없습니다.\n지방 권력을 쥔 국민의힘, 내란 정당이 기득권을 내려놓도록 만들어야 합니다. \n조국혁신당이 앞장서겠습니다. \n\n그리고 민주당은 이러한 소속 대구시당의 피눈물 섞인 호소에 귀 기울여야 합니다.\n안 그랬다가는 2028년 총선에서 민주당은 피눈물을 흘릴 것입니다. \n바로 지금이 내란 본색을 드러낸 지역 권력 카르텔을 손볼 절호의 기회입니다.\n다음은 늦습니다. 지금 당장 실천합시다.     /끝/"}, {"id": 96, "filename": "2026.01.07.  끝까지간다특별위원회 모두발언.txt", "title": "끝까지간다특별위원회 모두발언", "date": "2026-01-07", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["지방선거", "검찰개혁", "윤석열", "끝까지간다"], "preview": "2026.01.07.  끝까지간다특별위원회 모두발언  우리 국민은 윤석열 독재 정권 때 검찰의 민낯을 생생하게 봤습니다. 응원봉을 든 국민은 윤석열 정권의 조기 종식뿐만 아니라 검찰 권력의 완전한 종식을 고대했습니다. 다행히 지난해 9월 정부조직법이 개정됐습니다. 검찰청 해체와 수사·기소 분리라는 큰 틀은 확정됐습니다.  그렇지만 검찰개혁에 완전한 마침표가 찍히지는 않았습니다. 올 10월 1일 검찰을 대체한 새 조직이 제대로 출범하려면 늦어도 ...", "content": "2026.01.07.  끝까지간다특별위원회 모두발언\n\n우리 국민은 윤석열 독재 정권 때 검찰의 민낯을 생생하게 봤습니다.\n응원봉을 든 국민은 윤석열 정권의 조기 종식뿐만 아니라\n검찰 권력의 완전한 종식을 고대했습니다.\n다행히 지난해 9월 정부조직법이 개정됐습니다.\n검찰청 해체와 수사·기소 분리라는 큰 틀은 확정됐습니다.\n\n그렇지만 검찰개혁에 완전한 마침표가 찍히지는 않았습니다.\n올 10월 1일 검찰을 대체한 새 조직이 제대로 출범하려면\n늦어도 3월까지 정비가 돼야 합니다.\n후속 입법과 시행령, 조직 설계는 안갯속입니다.\n그런데 개혁 조치를 퇴행시킬 주장이 스멀스멀 흘러나오고 있습니다.\n\n“3년은 너무 길다”를 처음 외친 장본인으로서,\n독재 검찰과 가장 치열하게 싸운 정당의 대표로서\n검찰개혁의 핵심을 다시 분명히 하고자 합니다.\n\n첫째, 검사의 수사지휘권 부활은 어떤 이름으로도 용납해서는 안 됩니다.\n문재인 정부가 폐지한 수사지휘권이 되살아나는 순간,\n수사·기소 분리 원칙은 껍데기가 됩니다.\n수사와 기소를 한 손에 쥐는 순간, 그 손은 ‘사실’을 조작할 수 있습니다.\n\n표적 수사로 여론재판을 먼저 열고, 기소권으로 낙인을 찍는 일이 벌어집니다.\n기소로 협박과 보복하기, 불기소로 봐주기,\n이것이 검찰이 해방 이후 누린 절대 권력입니다.\n\n둘째, 공소청 검사가 보완 수사권을 근거로\n수사기관 행세를 하는 것을 막아야 합니다.\n그 순간 기소 기관이 아니라, 수사기관으로 되돌아가게 됩니다.\n공소청 안에 수사 인력과 수사 관행은 그대로 남을 것입니다.\n처음에는 제한적이겠지만, 점차 권한을 확대할 것입니다.\n다음 정권에서 시행령과 내부 지침 몇 줄로 직접 수사권을 살려낼 것입니다.\n\n셋째, 문재인 정부가 폐지한 전건 송치주의 부활에 반대합니다.\n전건 송치주의는 경찰이 수사한 모든 사건을\n결론과 관계없이 검찰에 넘기는 제도입니다.\n결국 사건으로 만드느냐, 묻어버리냐를 검찰만이 결정합니다.\n\n제가 문재인 정부 청와대 민정수석 때 이 문제를 다루어 보았습니다.\n그 뒤 2020년 검경 수사권 조정을 통해\n경찰에 1차 수사권과 종결권을 줬습니다.\n그런데도 검찰은 전건 송치주의 욕심을 버리지 않고 있습니다.\n\n수사와 기소, 종결권 모두 다시 가지려는 것이 검찰의 속내입니다.\n유무죄 판단을 자신들만의 권한으로 만들려는 모습입니다.\n그 같은 욕망이 낳은 ‘끝판왕’이 윤석열 아니었습니까?\n\n넷째, 국가수사위원회 설치에 반대합니다.\n국가수사위원회는 여러 수사기관 운영 방향을 정하고,\n조정·감독·불복 수용 등 ‘컨트롤타워’ 역할을 할라고 합니다. \n이는 옥상옥(屋上屋)을 넘어\n검경을 주무르는 초비대 권력기관을 만드는 일입니다.\n각 수사기관은 서로의 견제로 균형을 맞출 수 있습니다.\n\n이처럼 쟁점이 많은데, 지금 세월만 보내고 있습니다.\n지방선거에 밀리고, 또 다른 이슈에 몰려 어설프게 만들어서는 안 됩니다.\n검찰은 그 틈을 타고 반격과 부활을 시도할 것입니다.\n\n신속히 국회가 나서, 진지하고 세밀하게 논의하고 종결지어야 합니다. \n독재 검찰 해체 마침표를 찍도록 조국혁신당은 고삐를 더욱 조이겠습니다.\n검찰이 2026년 10월 간판만 바꾼 신장개업이 아니라,\n완전히 새로운 기소 기관으로 거듭나도록 감시하고 독려하겠습니다.\n감사합니다.   /끝/"}, {"id": 97, "filename": "2026.1.7. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-07", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["기자회견", "페이스북", "윤석열", "지방선거", "내란"], "preview": "2026.1.7. 조국 대표 페이스북 메시지  국민의힘 장동혁 대표가 ‘쇄신안’을 발표했습니다.  국민의힘이 해야 할 최고의 쇄신은 경제적 파산과 정당 해산입니다.  내란에 가담하고 동조한 이들이 모여 쇄신을 논하는 것 자체가 어불성설입니다. 처절한 사죄가 빠진 기자회견문은 국민의 공분만 불러일으키고 있습니다. 장동혁 대표와 국민의힘은 끝내 윤석열과의 절연은 없었습니다.  내란 인정과 사죄도 없었습니다. 특히 계엄과 탄핵의 문제를 “역사에 맡기...", "content": "2026.1.7. 조국 대표 페이스북 메시지\n\n국민의힘 장동혁 대표가 ‘쇄신안’을 발표했습니다. \n국민의힘이 해야 할 최고의 쇄신은 경제적 파산과 정당 해산입니다. \n내란에 가담하고 동조한 이들이 모여 쇄신을 논하는 것 자체가 어불성설입니다. 처절한 사죄가 빠진 기자회견문은 국민의 공분만 불러일으키고 있습니다. 장동혁 대표와 국민의힘은 끝내 윤석열과의 절연은 없었습니다. \n내란 인정과 사죄도 없었습니다. 특히 계엄과 탄핵의 문제를 “역사에 맡기겠다”고 궤변을 늘어놓았습니다.  \n내란 우두머리 윤석열이 옥중 메시지를 통해 “내 판단이 옳았는지 역사가 심판할 것”이라는 말을 반복한 것입니다. 나경원 의원도 작년 라디오 인터뷰에서 윤석열 탄핵과 내란 수사를 두고, “역사적인 평가가 있을 것”이라고 말했습니다. 전두환이 과거 재판에서 “모든 일을 역사에 맡기겠다”고 말한 것과도 판박이입니다. 과거 군부 독재 인사들의 한결같은 변명이었습니다. 일본의 우익 인사들도 전범 행위에 대해서 “역사에 맡기자”는 망언을 일삼지 않습니까. \n이 모두 역사를 자신들의 범죄와 잘못을 버리는 쓰레기통으로 여기는 몰염치한 작태입니다. \n윤석열이 일으킨 내란과 국민의힘의 가담 및 동조 행위는 이미 역사에 기록됐고, 영구히 박제될 것입니다. 국민은 절대 잊지 않을 것입니다. \n장동혁 대표의 회견은 오직 극우 노선으로 지방선거를 돌파하겠다는 헛된 망상으로 가득 차 있습니다. 전한길에 이어 고성국 같은 극우 유튜버들을 줄지어 입당시키는 모습은 국민의힘이 더 이상 공당이 아닌 ‘극우 유튜버 정당’으로 전락했음을 보여줍니다.\n결론은 명확합니다. 국민의힘은 공당의 자격을 상실했습니다. 오는 6월 지방선거에서 퇴출시키고, 윤석열의 공직선거법 위반에 따른 선거 보조금 환수로 경제적 파산을 시키고, 나아가 위헌정당 심판으로 해산시켜야 합니다."}, {"id": 98, "filename": "2026.1.7. 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-01-07", "category": "페이스북 메시지", "topics": ["조국혁신당", "인권·사회", "민생·경제"], "tags": ["5.18", "페이스북", "민생"], "preview": "2026.1.7. 조국 대표 페이스북 메시지2  <행정통합 성공해 ‘광주전남 전성시대’를 만드는데 역할을 다하겠습니다> 광주에서 만났던 어느 청년의 절규가 지금도 제 귓가에 맴돕니다.  “지방에서 태어나 대학 갈 때, 취업할 때, 결혼할 때, 고향을 탈출해 서울로 가지 못하면 영원히 기회를 박탈당한다”는 말이었습니다. 생존을 위한 탈출입니다. 부와 사람이 수도권으로만 쏠리며 지역의 심장은 어느덧 차갑게 식어버렸습니다. 불평등이라는 무게가 지역의...", "content": "2026.1.7. 조국 대표 페이스북 메시지2\n\n<행정통합 성공해 ‘광주전남 전성시대’를 만드는데 역할을 다하겠습니다>\n광주에서 만났던 어느 청년의 절규가 지금도 제 귓가에 맴돕니다. \n“지방에서 태어나 대학 갈 때, 취업할 때, 결혼할 때, 고향을 탈출해 서울로 가지 못하면 영원히 기회를 박탈당한다”는 말이었습니다.\n생존을 위한 탈출입니다. 부와 사람이 수도권으로만 쏠리며 지역의 심장은 어느덧 차갑게 식어버렸습니다. 불평등이라는 무게가 지역의 성장 박동을 짓누르고 있습니다. 이제 대한민국 곳곳에서 힘찬 심장 소리가 울려 퍼지는 ‘지방 전성시대’를 열어야 합니다.\n대한민국은 전국에 ‘수도’를 세워야 합니다. 현재 중국을 순방 중인 이재명 대통령은 베이징을 거쳐 경제수도 상해를 방문했습니다. 우리도 그래야 합니다. 대한민국을 찾는 외빈, 투자자, 관광객 등이 서울뿐만 아니라 행정수도, 문화수도, 반도체수도, 에너지수도, 해양수도 등 전국의 수도로 찾아오게 만드는 시대를 준비해야 합니다. 세계에서 가장 다양한 수도를 보유한 대한민국, 그것이 더 큰 대한민국의 비전입니다. \n지방자치를 열었던 김대중의 꿈, 국토 균형발전의 초석을 놓은 노무현의 꿈, 지역 메가시티를 설계했던 문재인의 꿈, 그리고 ‘지방 주도 성장’을 실천하는 이재명 대통령의 의지를 우리는 반드시 현실로 만들어야 합니다.\n광주가 ‘첨단지능’의 주먹이라면, 전남은 ‘무한에너지’의 주먹입니다. 이 두 주먹이 하나로 뭉칠 때, 광주·전남은 메가시티라는 강력한 체급으로 지방 전성시대의 주인공이 될 수 있습니다.\n그래서 광주·전남 행정통합은 ‘선택’이 아니라 ‘생존’의 문제입니다. 지금 광주·전남의 행정통합이 급물살을 타고 있습니다. 이 흐름을 절대 놓쳐서는 안 됩니다. 1995년부터 논의되어 온 행정통합은 30년 가까이 사회적 공감대가 축적된 숙원 사업입니다.\n광주와 전남은 행정통합을 엔진으로 삼아 에너지와 첨단산업의 양 날개로 대도약해야 합니다. 행정통합은 단순히 행정구역을 합치는 것을 넘어, 지역의 미래를 다시 설계하고 산업지도를 첨단산업 중심으로 전환하는 출발점입니다.\n광주·전남은 대한민국 에너지 전환의 핵심 지역입니다. 전력 생산과 산업 입지를 동시에 최적화할 수 있는 유일무이한 조건을 갖추고 있습니다. 행정통합을 통해 중앙정부에 신재생 에너지를 활용한 산업 재배치를 당당하게 요구할 수 있을 것입니다. 무엇보다 청년을 위한 양질의 일자리를 만들고 지역경제를 비약적으로 도약시킬 기회입니다. \n조국혁신당이 강력하게 뒷받침하겠습니다. 저와 조국혁신당은 2026년을 ‘광주·전남 대도약의 원년’으로 기록하기 위해 모든 역량을 투입하겠습니다. 광주·전남이 행정통합을 통해 서울에 준하는 위상과 조직 특례를 확보하고, 교부세 추가 배분과 공공기관 우선 이전이 실질적으로 이루어지도록 입법과 정책으로 뒷받침하겠습니다. \n광주·전남이 수도권에 버금가는 경쟁력과 생명력을 갖춘 ‘새로운 기회의 땅’이 되는 그날까지, 조국혁신당이 늘 시민 여러분 곁에서 함께하겠습니다.\n\"광주전남, 으라차차!“\n2026년 1월 7일\n조국혁신당 대표 조국"}, {"id": 99, "filename": "2026.1.7. 조국 대표 페이스북 메시지3.txt", "title": "조국 대표 페이스북 메시지3", "date": "2026-01-07", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당", "민생·경제"], "tags": ["페이스북"], "preview": "2026.1.7. 조국 대표 페이스북 메시지3  식민지역사박물관을 방문하고 민족문제연구소 운영진 등 원로 인사들의 고견을 청취하였습니다.  원로들께서는 “복지국가와 노동권 보장등 사회권 보장은 독립운동가들이 만들려던 나라의 이상이었다“면서, 조국혁신당이 표방한 ‘사회권선진국’이 바로 독립운동가들이 건국하려던 국가의 이상이었던 것을 국민들께 잘 알려달라고 당부하셨습니다. 또한 독립운동과 관련하여 정당차원에서 지원이 이루어져야 할 각종 사업에 대한...", "content": "2026.1.7. 조국 대표 페이스북 메시지3\n\n식민지역사박물관을 방문하고 민족문제연구소 운영진 등 원로 인사들의 고견을 청취하였습니다. \n원로들께서는 “복지국가와 노동권 보장등 사회권 보장은 독립운동가들이 만들려던 나라의 이상이었다“면서, 조국혁신당이 표방한 ‘사회권선진국’이 바로 독립운동가들이 건국하려던 국가의 이상이었던 것을 국민들께 잘 알려달라고 당부하셨습니다. 또한 독립운동과 관련하여 정당차원에서 지원이 이루어져야 할 각종 사업에 대한 조언을 주셨습니다."}, {"id": 100, "filename": "2026.1.6. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-01-06", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북", "윤석열"], "preview": "2026.1.6. 조국 대표 페이스북 메시지  ‘친윤 검사’로, 대통령실 법률비서관으로 폭군 윤석열을 충실히 보좌했고 윤석열 탄핵표결에 불참했던 국민의힘 주진우 의원이 ”하나의 중국 지지 선언“을 비난했다. ‘혐중반중 정서’로 먹고사는 극우세력들의 스피커답다. 1992년 노태우 정부 시절 합의 발표된 ‘한중수교공동성명’ 문장을 보자. “오직 하나의 중국만이 있고 대만이 중국의 일부분이라는 중국의 입장을 존중한다.” 이는 이후 모든 한국 정부가 ...", "content": "2026.1.6. 조국 대표 페이스북 메시지\n\n‘친윤 검사’로, 대통령실 법률비서관으로 폭군 윤석열을 충실히 보좌했고 윤석열 탄핵표결에 불참했던 국민의힘 주진우 의원이 ”하나의 중국 지지 선언“을 비난했다. ‘혐중반중 정서’로 먹고사는 극우세력들의 스피커답다.\n1992년 노태우 정부 시절 합의 발표된 ‘한중수교공동성명’ 문장을 보자. “오직 하나의 중국만이 있고 대만이 중국의 일부분이라는 중국의 입장을 존중한다.” 이는 이후 모든 한국 정부가 지켜온 일관된 공식입장이다. 주정뱅이 윤석열도 이를 파기한 적이 없다.\n주진우 의원의 이런 발언은 국민의힘 구성원들의 인식과 정신상태와 같은 선상에 있다. 예컨대, 나경원 의원은 시진핑 주석의 서울대 강연 후 만들어진 ‘시진핑 자료실’을 폐쇄해야 한다고 서울대 정문 앞에서 시위를 벌였다. “중국의 ‘샤프 파워’가 서울대까지 침투했다”는 황당한 주장을 하면서 말이다. 독재정권 시절 ‘반북’를 퍼뜨리며 독재를 정당화하던 이들이, 민주화 이후에는 ‘반중’을 외치며 자신의 존재를 인정받으려 한다. 그 때나 지금이나 나라 망치는 짓거리다."}, {"id": 101, "filename": "2026.1.5. 조국혁신당 공보국 언론공지.txt", "title": "조국혁신당 공보국 언론공지", "date": "2026-01-05", "category": "기타", "topics": ["정치·선거개혁", "조국혁신당"], "tags": [], "preview": "2026.1.5. 조국혁신당 공보국 언론공지  조국 대표·김민석 총리, ‘사회대개혁위원회’ 협력 강화 합의…  조국혁신당 위원 추천키로   조국혁신당 조국 대표와 김민석 국무총리는 오늘(5일), 국무총리 소속 자문위원회인 ‘사회대개혁위원회’의 운영 방안을 논의했습니다.   사회대개혁위원회는 지난해 5월 ‘광장대선연합정치시민연대’와 5개 정당이 발표한 공동선언에 기초하여 출범한 기구입니다. 양측은 이번 협의를 통해 ‘빛의 광장’의 열망과 의지를 ...", "content": "2026.1.5. 조국혁신당 공보국 언론공지\n\n조국 대표·김민석 총리, ‘사회대개혁위원회’ 협력 강화 합의… \n조국혁신당 위원 추천키로\n  조국혁신당 조국 대표와 김민석 국무총리는 오늘(5일), 국무총리 소속 자문위원회인 ‘사회대개혁위원회’의 운영 방안을 논의했습니다.\n  사회대개혁위원회는 지난해 5월 ‘광장대선연합정치시민연대’와 5개 정당이 발표한 공동선언에 기초하여 출범한 기구입니다. 양측은 이번 협의를 통해 ‘빛의 광장’의 열망과 의지를 담아 광장 연합정치 시대를 선언한 공동선언의 가치를 실현하고자 다음과 같이 합의했습니다.\n • 국무총리가 위원회활동에 대해 지속적으로 대통령께 보고하여 국정반영\n • 그간 유보되었던 조국혁신당 몫의 위원 추천 실행\n  조국혁신당이 조만간 위원 3인을 추천하기로 함에 따라, 위원회 구성이 마침내 완료될 예정입니다. \n  양측은 사회대개혁위원회가 국민 통합과 참여 정치 실현의 마중물이 될 수 있도록 향후 협력을 더욱 강화해 나가기로 했습니다. /끝/"}, {"id": 102, "filename": "26.01.05 제13차 최고위원회의 모두발언.txt", "title": "제13차 최고위원회의 모두발언", "date": "2026-01-05", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["내란", "지방선거", "5.18", "최고위"], "preview": "26. 01.05 제13차 최고위원회의 모두발언  조국혁신당 대표 조국입니다.  2026년 벽두에 온 국민의 관심을 끄는 일이 ‘공천 헌금 의혹’입니다. 응원봉 국민들 뵙기에 민망합니다. 말이 좋아 ‘공천 헌금’이지, ‘돈 공천, 공천 장사’ 아닙니까?  지금까지 드러난 내용만으로도 충격입니다. 민주당 서울시 의원 단독 공천에는 1억 원이 오갔답니다. 구청장, 구의원 후보나 희망자 여러 명으로부터  정치 후원금 최고액인 1년에 500만 원씩을 ...", "content": "26. 01.05 제13차 최고위원회의 모두발언\n\n조국혁신당 대표 조국입니다.\n\n2026년 벽두에 온 국민의 관심을 끄는 일이 ‘공천 헌금 의혹’입니다.\n응원봉 국민들 뵙기에 민망합니다.\n말이 좋아 ‘공천 헌금’이지, ‘돈 공천, 공천 장사’ 아닙니까?\n\n지금까지 드러난 내용만으로도 충격입니다.\n민주당 서울시 의원 단독 공천에는 1억 원이 오갔답니다.\n구청장, 구의원 후보나 희망자 여러 명으로부터 \n정치 후원금 최고액인 1년에 500만 원씩을 수 차례 받았다고 합니다.\n\n국민의힘이라고 다를 바 없습니다. \n국민의힘 강세지역인 포항에서 국회의원 공천 가격이\n3억 원에서 5억 원이라는 현역 의원 녹취록이 나왔습니다.\n이 정도면, 곳곳에서 돈 공천이 벌어졌다는 게 합리적 의심 아닐까요?\n\n자칫 국민의 정치 혐오증, 정치 무용론을 키울까 걱정입니다.\n이재명 정부 초반의 국정 동력을 훼손시킬 수도 있습니다.\n그런데도 어제 민주당은 “이번 사안을 시스템상의 문제라기보다는\n개별 인사들의 일탈로 본다”라고 밝혔습니다.\n\n잘못된 진단입니다.\n지금 벌어지고는 일은 나쁜 제도와 독점에 의한 적폐입니다.\n판단이 잘못되면, 처방도 치료도 엉뚱해지기 마련입니다.\n문제 있는 인물 몇몇 솎아내고,\n“잘 하겠다”라고 고개 숙이는 정도로 넘어가서는 안됩니다.\n\n더욱이 지방선거에서 3~5인 선거구를 쪼개 2인 선거구를 늘릴 기미가 보입니다. \n서울을 비롯해 광주와 대구 등 전국 곳곳에서 이상 징후가 포착됩니다.\n\n분명히 말씀드립니다.\n2인 선거구로 쪼개기는 거대 정당의 야합이자 짬짜미입니다.\n‘공천 = 당선’이라는 폐단을 강화하는 것입니다.\n지역 독점에 맞서 지방자치를 바로 세우려던\n김대중, 노무현 대통령 두 분 대통령의 유지(遺志)를 배반하는 일입니다.\n‘살인자도 공천되면 당선된다’며 2인 선거구를 반대한\n이재명 대통령의 소신에 등을 돌리는 일입니다.\n무엇보다 내란 정당의 연명장치가 될 것입니다.\n2028년 총선 때 후회하며 피눈물을 흘릴 수도 있습니다.\n\n해법은 간단합니다. 계산할 게 아니라, 정도로 갑시다.\n\n첫째, 근원을 철저하게 조사하고 진상을 규명해야 합니다.\n결과에 따라 국민이 납득할 정도로 책임을 물어야 합니다.\n빠르면 빠를수록, 단호하면 단호할수록 좋습니다.\n\n두 번째, ‘공천 = 당선’ 공식을 깨야 합니다.\n정당 소속이 아닌 풀뿌리 지역활동가, 조국혁신당 등 진보개혁정당 후보가 들어오는 것을 막으려고\n내란 극우정당과 한 자리씩 나눠 갖는 선택을 하는 것을\n응원봉 국민들이 이해하실까요?\n2인 선거구를 늘릴 게 아니라,\n3~5인 다인 선거구제를 늘려 경쟁토록 해야 합니다.\n종국에는 모든 선거구를 다인 선거구로 바꿔야 합니다.\n\n세 번째, ‘공천 장사를 하면 패가망신한다’는 원칙을 세워야 합니다.\n지금까지 걸리지 않으면 부와 명예를 누리고,\n걸려도 망신당하고 약간의 금전적 손해를 보는 정도입니다.\n차제에 선거법을 고쳐야 합니다.\n공천을 대가로 주고받은 돈을 몰수 추징함은 물론\n그에 비례하는 거액의 벌금을 내도록 해야 합니다.\n돈을 주고받은 사람은 정치권에서 퇴출해야 합니다.\n돈 공천에 의한 재보궐 선거에는 해당 정당이 공천을 못 하도록 해야 합니다.\n\n이랬을 때 손해 보는 사람들은 누구일까요?\n오직 매관매직하려던 사람들 뿐입니다.\n국민들은 아무런 손해도 입지 않습니다. \n대한민국에는 이익만 있을 뿐입니다.\n이제 인정사정 보지 말고 확실하게 고칩시다."}, {"id": 103, "filename": "26.01.03. 조국 대표 페이스북 메시지.txt", "title": ". 조국 대표 페이스북 메시지", "date": "2026-01-03", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["지방선거", "페이스북"], "preview": "26.01.03. 조국 대표 페이스북 메시지  민주당에서 제명된 강선우 국회의원, 서울시당 공천관리위원회에서 김경 후보자를 서울시의원으로 단독공천하자고 주장했고, 김경 후보자가 당선된 후에는 시의회 원내대표로 미는 메시지를 발송했음이 드러났다. 김경 시의원이 제공했다는 1억 원이 반환되었는지, 현재 어디에 있는지는 알 수 없다. 그렇지만 김병기-강선우 두 사람의 녹취록에 따르면, 1억 원이 강선우 의원측에 도달한 것은 사실로 보인다. 서울시의원...", "content": "26.01.03. 조국 대표 페이스북 메시지\n\n민주당에서 제명된 강선우 국회의원, 서울시당 공천관리위원회에서 김경 후보자를 서울시의원으로 단독공천하자고 주장했고, 김경 후보자가 당선된 후에는 시의회 원내대표로 미는 메시지를 발송했음이 드러났다.\n김경 시의원이 제공했다는 1억 원이 반환되었는지, 현재 어디에 있는지는 알 수 없다. 그렇지만 김병기-강선우 두 사람의 녹취록에 따르면, 1억 원이 강선우 의원측에 도달한 것은 사실로 보인다. 서울시의원 단독공천 대가가 1억 원이었던 것이다.\n오래 전부터 특정 정당이 유리하여 공천이 바로 당선인 특정 지역의 경우, 기초의원 공천대가가 그 지역 국회의원에게 제공된다는 것이 비밀 아닌 비밀로 돌고 있었다. 광역의원은 얼마, 기초의원은 얼마, 이런 식으로 정가(定價)가 매겨져 있었다. 설마설마했는데, 이번 사건으로 확인되었다.\n지방선거 '돈공천', 근절되어야 한다. 민주주의의 기초인 지방자치의 취지를 더럽히는 짓이다. 공천이 당선인 지역에서는 본선에서 경쟁이 없으니, 공천을 받기 위해 수단과 방법을 가리지 않는다. 이런 사람은 당선된 후에는 '본전'을 뽑으려 불법과 탈법을 저지른다. 13일간의 단식으로 지방자치를 도입하게 만든 고 김대중 대통령이 곡을 할 일이다. 이번 사건을 계기로 여야를 막론하고 '돈공천'은 철저히 수사되고 처벌되어야 한다. 수사기관의 분발을 촉구한다.\n한편, 광역 및 기초의원 후보자들이 지역 주민이 아니라 국회의원 눈치를 보고 줄을 서게 만드는 현행 제도 바뀌어야 한다. 2018년 이재명 성남시장이 역설했듯이, 그 시작은 2인 선거구제 폐지와 3인 이상 중대선거구제 확대다. 현재 일부 지역에서 민주당과 국민의힘은 정반대로 중대선거구를 쪼개 2인 선거를 늘리려는 담합을 시도하고 있다. 다시 한번 촉구한다. 민주당은 2018년 이재명 시장의 호소에 반하는 선택을 하지 말라."}, {"id": 104, "filename": "2026.1.2 조국 대표 조국혁신당 신년인사회 현장발언.txt", "title": "조국 대표 조국혁신당 신년인사회 현장발언", "date": "2026-01-02", "category": "현장발언", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["사법개혁", "윤석열", "지방선거", "내란", "검찰개혁"], "preview": "2026.1.2 조국 대표 조국혁신당 신년인사회 현장발언  안녕하십니까, 조국혁신당 대표 조국입니다.  이렇게 여러분들 앞에서 대표 인사를 하게 되어서 감개무량합니다. 작년은 대한민국에게 또 조국혁신당에게, 사적으로는 저 개인에게 큰 의미가 있는 시간이었습니다. 많은 시련이 있었고 많은 어려움이 있었습니다. 여기 계신 우리 당의 핵심 기둥이신 분들의 노력, 헌신 덕분에 여기까지 왔다고 생각합니다.  조국혁신당이 만들어지고 난 뒤에 3년 너무 길...", "content": "2026.1.2 조국 대표 조국혁신당 신년인사회 현장발언\n\n안녕하십니까, 조국혁신당 대표 조국입니다. \n이렇게 여러분들 앞에서 대표 인사를 하게 되어서 감개무량합니다.\n작년은 대한민국에게 또 조국혁신당에게, 사적으로는 저 개인에게 큰 의미가 있는 시간이었습니다.\n많은 시련이 있었고 많은 어려움이 있었습니다.\n여기 계신 우리 당의 핵심 기둥이신 분들의 노력, 헌신 덕분에 여기까지 왔다고 생각합니다.\n\n조국혁신당이 만들어지고 난 뒤에 3년 너무 길다를 외치면서 내란 척결, 윤석열 탄핵, 검찰 개혁 등등에 있어서 선봉에 섰습니다.\n큰 성과를 냈습니다. 그렇지만 조국혁신당의 1막은 끝났습니다.\n올해는 2막이 시작되는 날입니다. \n1막 때 우리가 잘했다는 말 하는 것, 아무런 의미가 없다고 생각합니다.\n2막에서 저희가 잘 해야 된다라는 마음입니다.\n \n조국혁신당은 창당 시기부터, 초기부터 강조했다시피 이재명 정부의 성공, 그리고 민주 진보 진영의 정권 재창출을 위한 레드 팀이 될 것입니다.\n내란 청산, 검찰 개혁, 사법 개혁 등등에 있어서 확고히 협력해 왔고 앞으로도 협력할 것입니다.\n그렇지만 민주당의 법안 관련해서 또는 정책 관련해서 문제점이 있다면 분명히 지적할 것입니다.\n\n내란 전담재판부법이라거나 정통망법이라거나 등등의 여러 법안에 있어서는 어느 것이 옳은지에 대해서 논의를 하고 잘못을 지적하는 것이 우리의 역할이라고 생각합니다.\n\n그리고 올해 지방선거가 있습니다. 지방선거에서 우리 조국혁신당은 민주당 등과 연합하여 확실하게 극우 세력이 광역자치단체장을 포함한 지방선거에서 되살아나는 것을 막아야 합니다.\n모두 힘을 합해서 2018년 어게인을 현실화해야 된다고 봅니다.\n이 점에 있어서 우리의 목표는 분명합니다.\n\n법률적으로는 윤석열 일당들에 대한 심판이 진행되고 있고 심판이 될 것입니다.\n정치적으로는 친윤 극우 내란 일당 세력들이 정치적으로 심판받지 못하고 있기 때문에 올해 6월에 반드시 심판해야 된다고 봅니다.\n\n동시에 조국혁신당은 지방선거에서 또 다른 역할을 해야 됩니다.\n지방 정치를 개혁해야 됩니다. 최근 사태를 보게 되면 우리의 우당인 민주당에서 돈 봉투 사건이 벌어졌습니다.\n서울시의원을 공천 받는데 1억이 왔다 갔다 했다고 합니다.\n이런 일 저희 당에는 당연히 없어야 되겠죠. 저희 당의 문제만이 아닙니다.\n\n지방선거 공천에 있어서 이런 돈이 오가는 일 절대 막아야 되는 것이고 그렇게 막는 것이 조국혁신당의 이익이 아니라 대한민국의 이익이라고 확신합니다.\n\n이런 문제를 근절하기 위해서도 조국혁신당은 지방선거에서 의미 있는 성과를 내야 할 것입니다.\n조국혁신당이 하는 만큼 지방선거에서 하는 만큼, 성과를 내는 만큼 지방선거 지방 정치는 발전할 것이라 믿습니다.\n\n존경하는 당원 동지 여러분, 조국혁신당 현재 지지율 낮다는 것 직시하고 있습니다.\n그렇지만 낮은 지지율이기 때문에 좌절하거나 절망하거나 포기하면 그 지지율은 그대로 유지될 것입니다.\n\n앞으로 남은 5개월 우리의 시간과 에너지를 투여해야 현실은 변화한다고 생각합니다.\n상황 녹록지 않은 걸 알고 있습니다. \n그렇지만 조국혁신당이 해야 될 독자적 역할이 무엇인가에 대해서 한번 공유했으면 좋겠습니다.\n\n창당 이후 윤석열 탄핵과 검찰 개혁과 내란 이후 내란 세력과의 싸움에서 선봉에 섰던 그 역할, 그리고 정치 개혁, 사회개혁, 인권 개혁 등에서 민주당이 하지 못했거나 꺼리는 역할들을 해 왔습니다.\n\n이 역할들이 필요 없다면 우리 당은 사라져야 할 것입니다.\n그때 우리 당이 사라져야 한다고 생각하면 사라져야죠.\n그 역할 정치 경제 정치의 개혁, 사회 경제적 개혁, 인권 개혁 즉 민주당이 하지 못하거나 꺼리거나 심지어 반대하는 시대적 과제에 대해서 우리가 하겠다고 선언을 한 만큼 우리는 그 개혁 과제를 성공적으로 수행하도록 자임해야 된다고 봅니다.\n\n저는 당 대표로서 항상 낙관적 상황에서만 정치를 하지 않았습니다.\n창당할 때도 그랬고 그 이후에도 마찬가지입니다.\n\n많은 분들이 새해를 맞이해서 즐거운 얘기만 드리고 듣고 싶으실지 모르겠으나 당 대표로서 우리의 엄중한 현실을 직시하고 직시함과 동시에 두려워하지 말고 힘을 모아 한번 매진해 봤으면 좋겠습니다.\n\n저 역시 창당 시기에 했던 그 각오와 결의로 불태워 보겠습니다.\n감사합니다."}, {"id": 105, "filename": "2026.1.2. 조국 대표 신년 현충원 방명록.txt", "title": "조국 대표 신년 현충원 방명록", "date": "2026-01-02", "category": "기타", "topics": ["정치·선거개혁", "개헌·민주주의"], "tags
