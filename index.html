시지가 민심을 움직였고, 조국혁신당이 윤석열 정부 조기 종식에 앞장서 주신 것에 대해 감사하다”는 마음을 전했습니다.\n또한 “조국혁신당은 정치사상 초유의 실험이었고 성공을 거두었다. 더 의미 있는 결실을 맺길 바란다\"며, \"민주정부를 거치면서 민주주의가 거듭 발전해 왔음에도 계엄·내란으로 취약성을 드러내기도 했다\"고 지적했습니다.\n이에 \"극우 내란 정당은 반성은 커녕 내란을 두둔하는 등 놀라울 지경이다\"고 비판하며, \"내란 청산은 현재 진행형이고, 올해 지방선거에서 극우 내란 세력들에 대한 정치적 심판이 매우 중요하다\"고 강조했습니다.\n이런 의미에서 \"중앙정부의 민주정부로의 교체가 지방정부의 교체로 이어져야 한다. 큰 연대의 틀을 유지하면서 민주진영의 큰 승리와 혁신당의 의미 있는 성과가 이루어지기를 바란다\"고 거듭 강조했습니다.\n아울러 민주주의를 확장하고 더 튼실하게 만드는 일이 혁신당의 임무라고 말하며, \n특히 \"민주당 정부가 생각하지 못하거나, 힘이 미치지 못한 부분에서 조국혁신당의 역할이 있을 것으로 본다\"고 당부했습니다.\n이에 대해 조국 대표는 “환대에 감사드리고, 대통령님의 말씀을 잘 새겨듣겠다\"며,\n\"‘3년은 너무 길다’라는 구호와 함께 내란을 극복했지만 민주정부 수립을 통해 조국혁신당의 1막이 끝났다\"고 설명하며. \"새로운 2막을 대통령께서도 지켜봐 주시고 응원을 부탁드린다\"고 화답했습니다.\n조 대표는 \"현재 내란 세력에 대한 법률적 심판이 진행 중이지만, 정치적 심판을 위해 지방선거 압승이 필요하다\"며, \"민주진보 진영의 힘을 합쳐 ‘2018 어게인’을 실현하기 위해 힘을 모아가겠다”고 각오를 다졌습니다.\n이어서 “이재명 정부의 성공을 위해 레드팀 역할을 할 것이며, 이러한 역할이 민주진영 전체에 도움이 될 것이다.”고 답했습니다."}, {"id": 108, "filename": "2026.1.1. 조국 대표 신년인사 전문.txt", "title": "조국 대표 신년인사 전문", "date": "2026-01-01", "category": "기타", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란"], "preview": "2026.1.1. 조국 대표 신년인사 전문  [혁신이 헷갈릴 때 조국혁신당입니다]  사랑하는 국민 여러분,  조국혁신당 대표 조국입니다.  2026년 병오년, 붉은 말의 해가 밝았습니다. 작년 국민 여러분은 내란을 저지했습니다.  국민주권 정부를 열었습니다.  여러분의 힘으로 민주주의는 전진했습니다.   올해는 붉은 말의 해입니다. 말은 어떤 난관도 뛰어넘는 도약의 힘을 상징합니다. 지금 대한민국은 경마장이 되어버렸습니다.  승자 없는 숨 막히...", "content": "2026.1.1. 조국 대표 신년인사 전문\n\n[혁신이 헷갈릴 때 조국혁신당입니다]\n\n사랑하는 국민 여러분, \n조국혁신당 대표 조국입니다.\n\n2026년 병오년, 붉은 말의 해가 밝았습니다.\n작년 국민 여러분은 내란을 저지했습니다. \n국민주권 정부를 열었습니다. \n여러분의 힘으로 민주주의는 전진했습니다. \n\n올해는 붉은 말의 해입니다.\n말은 어떤 난관도 뛰어넘는 도약의 힘을 상징합니다.\n지금 대한민국은 경마장이 되어버렸습니다. \n승자 없는 숨 막히는 경주가 계속됩니다.\n\n불평등의 벽이 높습니다. \n외로움의 벽이 견고합니다. \n기득권의 벽이 가로막습니다. \n\n조국혁신당은 불평등의 벽을 뛰어넘겠습니다.\n국민 여러분과 함께라면, 못 넘을 벽도, 못 이룰 꿈도 없습니다.\n\n저부터 견고한 기득권의 벽을 뛰어 넘겠습니다. \n살던 대로 살 수는 없습니다. \n다음 세대를 위해 해보지 않은 일,\n가보지 않은 길로 가겠습니다. \n\n국민의 하루를 책임지는 정당\n국민의 하루와 함께하는 정당\n혁신이 헷갈릴 때, 조국혁신당입니다.\n\n혁신은 흉내 낼 수 없습니다. \n혁신은 말이 아니라 실천입니다. \n혁신은 국민과 함께할 때 비로소 가능합니다.\n\n조국혁신당은 아무도 가지 않은 길을 가겠습니다. \n조국혁신당은 새로운 길을 열겠습니다. \n\n국민과 함께 미래를 향해 달려가겠습니다. \n2026년 병오년, \n붉은 말처럼 힘차게 도약하는 한 해가 되시길 바랍니다.\n건강과 행복이 가득하시길 기원합니다.\n\n새해 복 많이 받으십시오. \n\n감사합니다.\n\n2026년 1월 1일 \n조국혁신당 대표 조국\n"}, {"id": 109, "filename": "2025. 12.31. 조국 대표 끝까지간다특위 모두발언.txt", "title": "조국 대표 끝까지간다특위 모두발언", "date": "2025-12-31", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["사법개혁", "윤석열", "끝까지간다", "내란", "검찰개혁"], "preview": "2025. 12.31. 조국 대표 끝까지간다특위 모두발언  안녕하십니까. 조국혁신당 끝까지간다특위 위원장 조국 대표입니다. 2025년 마지막 날입니다. 내란을 극복해 낸 응원봉 국민께 존경과 감사 인사를 올립니다.  조국혁신당은 담대한 목표를 추구해 왔습니다. 바로 윤석열 독재 정권의 조기 종식, 검찰권 오남용을 끝내는 검찰개혁, 무너진 사법 정의를 세우는 사법개혁입니다. 끝까지간다특위의 도저한 여정은 그 목표를 하나씩 이뤄냈습니다.  2024...", "content": "2025. 12.31. 조국 대표 끝까지간다특위 모두발언\n\n안녕하십니까. 조국혁신당 끝까지간다특위 위원장 조국 대표입니다.\n2025년 마지막 날입니다.\n내란을 극복해 낸 응원봉 국민께 존경과 감사 인사를 올립니다.\n\n조국혁신당은 담대한 목표를 추구해 왔습니다.\n바로 윤석열 독재 정권의 조기 종식, 검찰권 오남용을 끝내는 검찰개혁,\n무너진 사법 정의를 세우는 사법개혁입니다.\n끝까지간다특위의 도저한 여정은 그 목표를 하나씩 이뤄냈습니다.\n\n2024년 봄 “3년은 너무 길다”를 외쳤습니다.\n조국혁신당은 말에 그치지 않습니다.\n그해 6월 26일 검찰개혁 4법을 국민 앞에 내놓았습니다.\n7월25일 ‘3년은 너무 길다 특별위원회(탄추위)’를 출범시켰습니다.\n윤석열 정권 종식을 혁신당의 책임정치 과제로 세운 것입니다.\n\n기억하시겠지만, 처음 탄핵을 이야기하자 비아냥이 들려왔습니다.\n“역풍이 불 것이다.”\n“12석으로 무슨 탄핵을 하느냐?”\n\n그러나 저희는 흔들리지 않았습니다.\n탄핵안을 처음 내놓은 곳도 탄추위였고,\n내란을 포함시킨 탄핵안 초고도 탄추위가 만들었습니다.\n\n2025년 들어 1월 8일 ‘더 탄탄한 대한민국 위원회’로 승계해\n내란 이후 국가 정상화의 밑그림을 그려갔습니다.\n윤석열이 탄핵된 후 4월 29일\n‘윤석열·김건희 공동정권 청산 특별위원회’를 발족했습니다.\n내란 청산이 조국혁신당의 제1목표가 된 것입니다.\n6월 11일 현재의 ‘끝까지 간다 특별위원회’가 출범했습니다.\n이전 특위의 자산과 부채를 이어받으면서\n개혁의 길을 완주하겠다는 국민과의 약속입니다.\n\n특위는 말만 앞세우지 않았습니다.\n결과물로 총 여섯 개 개혁법안을 발의했습니다.\n중수청법, 공소청법, 수사절차법안, 형사소송법 개정안의 검찰개혁 4법을 포함해,\n법무행정관 임용 등에 관한 법률안,\n윤석열의 검찰총장 및 대통령 재직 시 검찰권 오남용에 관한\n진상조사 및 피해자 피해회복에 관한 특별법안이 그것입니다.\n당장 통과돼도 하등의 문제가 없을 법안들입니다.\n\n혁신당의 전략적 목표인 검찰 수사·기소 분리는 예정됐습니다.\n검찰청 폐지를 골자로 한 정부조직법 개정안이 9월 통과됐기 때문입니다.\n\n그러나 끝까지간다특위의 최종 목표에는 닿지 못했습니다.\n수사·기소 분리를 놓고 시비가 진행 중입니다.\n현직 검사가 정부조직법에 대해 헌법소원 심판을 청구했습니다.\n수사와 기소권을 모두 쥐겠다는 욕심을 버리지 못한 것입니다.\n검찰 폐지 이후를 그린 검찰개혁 4법은 아직 국회 문턱을 못 넘었습니다.\n\n검찰이 남은 기간 무슨 일을 벌일지 모릅니다.\n늘 그래왔듯 권력에 기생을 시도할 것입니다.\n‘반대 세력 제거, 부패 척결 실적’ 등 달콤한 덫을 제시할 수 있습니다.\n우리는 눈 제대로 뜨고, 한 치도 놓치지 않고 지켜볼 것입니다.\n\n사법개혁은 발도 떼지 못했습니다.\n그 사이 조희대 대법원은 사법쿠데타에 가까운 일을 벌였습니다.\n또 내란 종사자들 구속영장을 기각하고,\n일부 재판은 우스꽝스럽게 진행되고 있습니다.\n사법개혁이라는 국민적 요구를 사법 독립 침해라고 강변합니다.\n이를 그대로 둘 수 없습니다.\n\n조국혁신당 ‘끝까지 간다’ 특위가 계속 전진해야 할 이유입니다.\n법과 제도로 완성될 때까지 끝까지 가겠습니다.\n윤석열의 검찰과 대통령 시절 검찰권 오남용과 피해를 파헤칠 것입니다.\n진상규명을 끝까지, 책임추궁은 끝까지, 피해 회복도 끝까지 하겠습니다.\n\n검찰과 법원이 국민 위에 군림하지 못하도록 제도화 하겠습니다.\n그때가 끝까지간다특위가 자랑스럽게 문을 닫을 시기일 것입니다.\n2026년 새해, 국민 여러분과 함께\n정의의 원년을 만들겠습니다. 감사합니다.    /끝/\n\n"}, {"id": 110, "filename": "2025.12.31 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-31", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "사법개혁", "윤석열", "페이스북"], "preview": "2025.12.31 조국 대표 페이스북 메시지  조희대 대법원이 대선 직전 이재명 후보에 대한 무죄판결을 유죄취지로 파기환송하면서 제시했던 기준으로는 윤석열은 허위사실공표죄 유죄가 나야 하고, 100만 원 이상 벌금형만 나오면 국힘의힘은 반드시 425억 원을 토해내야 한다.  국힘은 윤석열 내란 유죄 보다 윤석열 허위사실공표죄 유죄를 더 두려워하고 있다. 향후 법원이 유죄 인정하면서 90만 원 벌금형을 선고하는 기회주의적 판결을 내리지 못하도록...", "content": "2025.12.31 조국 대표 페이스북 메시지\n\n조희대 대법원이 대선 직전 이재명 후보에 대한 무죄판결을 유죄취지로 파기환송하면서 제시했던 기준으로는 윤석열은 허위사실공표죄 유죄가 나야 하고, 100만 원 이상 벌금형만 나오면 국힘의힘은 반드시 425억 원을 토해내야 한다. \n국힘은 윤석열 내란 유죄 보다 윤석열 허위사실공표죄 유죄를 더 두려워하고 있다. 향후 법원이 유죄 인정하면서 90만 원 벌금형을 선고하는 기회주의적 판결을 내리지 못하도록 주시해야 한다.\n===\n<일지>\n24.4.21.\n조국혁신당, 국가수사본부에 윤석열 공직선거법상 허위사실공표 혐의 고발\n25.7.1. \n국가수사본부, 허위사실공표 사건 김건희 특검 이송\n25.12.22 \n조국 대표, 김건희 특검에게 공직선법 위반 기소 강력 촉구\n25.12.26. \n김건희 특검 윤석열 선거법 위반 기소"}, {"id": 111, "filename": "2025.12.31 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2025-12-31", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["페이스북"], "preview": "2025.12.31 조국 대표 페이스북 메시지2  12/30 이재명 대통령, 특검 발족 전이라도 검경합동수사본부 발족 지시. 12/23 나의 주장의 문제의식과 정확히 일치한다.  12/23 내가 이 주장을 했을 때 일부 ‘친민주당 인사/유튜버’들은 “조국이 2차 특검에 반대한다”며 왜곡, 비난했다. 기존 특검수사의 흐름이 유지되기 위한 최선의 경로를 제시한 것이었는데, 왜들 이러시는지? 어느 정당, 어느 정치인에 제시했는가에 따라 찬성과 반대를...", "content": "2025.12.31 조국 대표 페이스북 메시지2\n\n12/30 이재명 대통령, 특검 발족 전이라도 검경합동수사본부 발족 지시. 12/23 나의 주장의 문제의식과 정확히 일치한다. \n12/23 내가 이 주장을 했을 때 일부 ‘친민주당 인사/유튜버’들은 “조국이 2차 특검에 반대한다”며 왜곡, 비난했다. 기존 특검수사의 흐름이 유지되기 위한 최선의 경로를 제시한 것이었는데, 왜들 이러시는지? 어느 정당, 어느 정치인에 제시했는가에 따라 찬성과 반대를 한다는 것, 잘못된 것이다. 게다가 조국혁신당과 민주당, ‘우당’ 아닌가? 새해에는 크고 넓게 갑시다."}, {"id": 112, "filename": "2025.12.30. 조국혁신당 한가선 대변인 논평.txt", "title": "조국혁신당 한가선 대변인 논평", "date": "2025-12-30", "category": "성명·입장·논평", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["내란", "지방선거"], "preview": "2025.12.30. 조국혁신당 한가선 대변인 논평  <김병기 원내대표 사퇴 만시지탄, 이를 계기로 지방선거 개혁해야> - 2인 선거구, 3~5인 중대선거구로 확대해야 경쟁 가능 더불어민주당 김병기 원내대표가 전격 사퇴했습니다. 최근 불거진 여러 의혹에 대한 입장 표명으로, 만시지탄입니다. 함께 거론된 강선우 의원도 책임있는 입장 표명이 필요합니다. 만일 강 의원이 장관이 된 뒤 이 일이 터졌으면 어땠을까 생각하면 모골이 송연합니다. 이미 드러...", "content": "2025.12.30. 조국혁신당 한가선 대변인 논평\n\n<김병기 원내대표 사퇴 만시지탄, 이를 계기로 지방선거 개혁해야>\n- 2인 선거구, 3~5인 중대선거구로 확대해야 경쟁 가능\n더불어민주당 김병기 원내대표가 전격 사퇴했습니다. 최근 불거진 여러 의혹에 대한 입장 표명으로, 만시지탄입니다.\n함께 거론된 강선우 의원도 책임있는 입장 표명이 필요합니다. 만일 강 의원이 장관이 된 뒤 이 일이 터졌으면 어땠을까 생각하면 모골이 송연합니다.\n이미 드러난 내용만 해도 충격적입니다. 보통 사람은 만져보기도 어려운 거액이 오가고, 지방의원 카드까지 썼습니다. 두 의원은 의원실 갑질 시비까지 휘말렸습니다.\n이 사안은 두 의원 비리 의혹에만 그치지 않습니다. 내란 세력에게 반격의 빌미가 될 수 있다는 점에서 더 우려스럽습니다. 가방과 시계, 목걸이, 금거북이를 뇌물로 주고 받은 저들을 비난하기 어렵게 됐습니다.\n무엇보다 대한민국 지방자치제를 크게 훼손했습니다. 독재 시대에나 있던 돈 공천이 웬말입니까? \n즉시 반환했다고 하지만, 그런 문제를 일으킨 인사를 단독 공천해 결국 배지를 달게 했습니다.\n그렇잖아도 최근 민주당 의원 2명이 지방선거 출마 예정자로부터 후원금 500만원을 받은 일이 드러난 바 있습니다.\n의원과 배우자가 지방의원을 집사처럼 부렸다는 의혹도 큰 문제입니다.\n이는 특정 정당 강세지역에서 공천만 되면 당선되는 현행 지방자치제의 한계 때문입니다. \n이런데도 거대 양당은 다인 선거구를 쪼개 2인 선거구를 늘리려고 하고 있습니다. '공천 = 당선'이라는 폐해를 공고히 하고 확산하는 꼴입니다.\n이번 사태를 계기로 지방선거에 진정한 경쟁이 도입되도록 해야 합니다. \n2인 선거구를 묶어서 3~5인 다인 선거구를 늘려야 합니다. \n더 다양한 정당들이 경쟁을 하고, 지방자치에서 견제가 균형이 이뤄져야 합니다. \n그래야 지방자치가 살고 대한민국이 삽니다.\n더불어민주당에 촉구합니다. \n이른 시일내 국회 정개특위를 열어 이 문제를 본격적으로 다뤄야 합니다. \n조국혁신당은 이미 관련 법안을 준비해놓았습니다. \n차기 민주당 원내대표의 성의있는 답변을 촉구합니다.\n2025.12.30 \n조국혁신당 대변인 한가선"}, {"id": 113, "filename": "2025. 12.29 제12차 최고위원회의 모두발언.txt", "title": "제12차 최고위원회의 모두발언", "date": "2025-12-29", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["5.18", "최고위", "윤석열", "내란", "개헌"], "preview": "2025. 12.29 제12차 최고위원회의 모두발언  조국혁신당 대표 조국입니다.  오늘은 2025년 마지막 최고위원회의입니다. 우선, 올해를 헤쳐 오신 우리 당원 동지 여러분과 국민 여러분께 위로와 감사 말씀을 드립니다.  2025년은 다사다난했다는 표현만으로 부족한 한 해였습니다. 4·19혁명, 5·16 쿠데타, 부마 민주항쟁과 12·12 군사 반란, 5·18과 6·10 민주화운동, 촛불혁명이 났던 격변의 해 못지않았습니다.  내란 반동과 ...", "content": "2025. 12.29 제12차 최고위원회의 모두발언\n\n조국혁신당 대표 조국입니다.\n\n오늘은 2025년 마지막 최고위원회의입니다.\n우선, 올해를 헤쳐 오신 우리 당원 동지 여러분과 국민 여러분께\n위로와 감사 말씀을 드립니다.\n\n2025년은 다사다난했다는 표현만으로 부족한 한 해였습니다.\n4·19혁명, 5·16 쿠데타, 부마 민주항쟁과 12·12 군사 반란,\n5·18과 6·10 민주화운동, 촛불혁명이 났던 격변의 해 못지않았습니다.\n\n내란 반동과 내란 극복이 충돌했습니다.\n우리는 모든 어려움을 이겨냈고, 전진했습니다.\n\n윤석열은 한남동 대통령 관저에서 진지전을 펼쳤습니다.\n내란 세력은 헌법재판소와 1심 법정을 \n극우 선동과 반헌법적 궤변의 무대로 만들려고 했습니다.\n국회와 소셜미디어에서 “윤 어게인”을 퍼뜨렸습니다.\n\n국민 여러분은 혹한의 광장에서 “윤석열 탄핵”과 \"내란 종식”을 외치며 싸우셨습니다.\n광화문 광장과 여의도는 물론, 광주 5·18민주광장, 전주 객사 앞, 부산 전포대로,\n대구 동성로, 대전 은하수 네거리, 청주 충북도청 앞, 춘천 거두사거리,\n제주시청 앞 등 전국 곳곳에서 응원봉을 들었습니다.\n서울 안국동 헌법재판소 앞을 지키셨습니다.\n조국혁신당은 모든 곳에서 국민 여러분과 함께 했습니다.\n\n국민 여러분의 용감한 행동으로 사필귀정이 이루어졌습니다.\n윤석열은 파면되었고, 내란은 진압됐습니다.\n대한민국의 민주주의 회복성에 대해 세계가 부러워했습니다.\n그리하여 민주정부 4기 이재명 정부가 출범했습니다.\n\n제 개인으로도 감회가 남다릅니다.\n8개월간 어쩔 수 없이 세간에 비켜서서 \n‘폐문독서’(廢門讀書)를 했습니다.\n대한민국은 어디로 가야 하는지 고민하고 공부하며 \n내공을 다지는 시간이었습니다.\n당시 위로와 격려를 해 주신 모든 분들께 다시 한번 감사드립니다.\n덕분에 광복절에 여러분 곁으로 돌아올 수 있었습니다.\n\n내년에도 조국혁신당은 내란세력을 척결하고 \n제7공화국을 열기 위해 분투하겠습니다.\n내란 일당은 물론 내란 동조세력과는 일체의 타협이 없이 싸울 것입니다.\n그러한 싸움과 함께,\n“국민의 하루를 책임지는 정치”를 하겠습니다.\n“행복이 권리가 되는 나라”를 준비하겠습니다.\n\n조국혁신당은 크기가 작습니다.\n그렇다고 포부까지 작지는 않습니다.\n작은 정당이라고 위축되지 않고\n국민들께서 저희의 역할과 효능을 아실 수 있도록\n용감하게 강소(强小) 정당의 소임을 다하겠습니다.\n\n조국혁신당은 이재명 정부의 성공과 \n민주진보진영의 정권재창출을 위하여\n‘레드팀’ 역할을 하겠습니다.\n집권당 민주당과 협력할 것은 협력하면서,\n비판할 것은 비판하고 경쟁할 것은 경쟁하겠습니다.\n다양하고 다채로운 응원봉을 든 주권자의 뜻을 받들어\n‘무지개 정치’를 하겠습니다.\n민주진보진영의 외연을 확장하고\n체질을 강화하는 ‘복덩이’가 되겠습니다. \n\n국민께서 행복한 연말과 희망찬 연시를 맞이하시길 기원하겠습니다.\n감사합니다.        /끝/"}, {"id": 114, "filename": "2025. 12. 28. 조국혁신당 박병언 대변인 논평.txt", "title": "조국혁신당 박병언 대변인 논평", "date": "2025-12-28", "category": "성명·입장·논평", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "윤석열"], "preview": "2025. 12. 28. 조국혁신당 박병언 대변인 논평  <윤석열과 결별한 겁니까? 이혜훈 지명자는 국민께 즉각 답해야 합니다>    정부가 신임 기획예산처 장관후보자로 이혜훈 전 의원을 지명하고, 이혜훈 측은 수락의 뜻을 밝혔습니다. 조국혁신당은 이혜훈 지명자에 대한 인사검증을 위해, 윤석열과의 결별여부를 확인하고자 합니다. 이혜훈 지명자는 윤석열 탄핵에 명시적으로 반대해 왔습니다.     헌법재판소의 파면결정 전까지, 탄핵에 반대한다는 집회...", "content": "2025. 12. 28. 조국혁신당 박병언 대변인 논평\n\n<윤석열과 결별한 겁니까? 이혜훈 지명자는 국민께 즉각 답해야 합니다>\n\n  정부가 신임 기획예산처 장관후보자로 이혜훈 전 의원을 지명하고, 이혜훈 측은 수락의 뜻을 밝혔습니다. 조국혁신당은 이혜훈 지명자에 대한 인사검증을 위해, 윤석열과의 결별여부를 확인하고자 합니다. 이혜훈 지명자는 윤석열 탄핵에 명시적으로 반대해 왔습니다. \n\n  헌법재판소의 파면결정 전까지, 탄핵에 반대한다는 집회를 직접 주최하고 발언까지 이어 왔습니다. “윤석열을 석방하라”고 직접 외치는가 하면, “민주당이 내란을 선동하고 있다”는 플래카드를 걸었던 사람입니다. 탄핵소추절차 자체가 불법이므로, 헌법재판소가 실체판단을 하지 말고 각하해야 한다는 주장도 해왔습니다. 모두가 국민들의 바램과 정면으로 반하는 주장이었습니다. \n\n  더구나, 이재명 정부는 국민의 삶을 뒷받침하기 위해 지출을 늘리는 확대재정정책을 기조로 하고 있는데, 이혜훈 지명자는 정부 지출을 줄여야 한다는 지론을 가지고 있어, 정책적 기조 측면에서도 해명이 필요합니다. \n\n  그러므로 이혜훈 지명자에게 묻지 않을 수 없습니다. 윤석열을 옹호하기 위해 외쳤던 그 말들, 지금은 어떤 입장인 겁니까? 정부의 확장적 재정기조에 동의하십니까? 이 질문에 대한 답을 듣지 않고, 장관 임명에 동의하기는 어려울 것 같습니다. 빠른 공개입장을 요청합니다.\n\n  더불어, 대통령실은 이상의 점을 모두 확인 한 것인지, 어떻게 확인하신 것인지도 밝힐 필요가 있습니다. 이혜훈 후보자의 능력이 얼마나 높은지 몰라도, 윤석열 탄핵을 외친 국민의 마음을 헤아리신다면 이혜훈 발탁에 대한 상세한 설명이 필요한 상황입니다. \n\n2025. 12. 28.\n조국혁신당 대변인 박병언"}, {"id": 115, "filename": "2025.12.28 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-28", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "페이스북", "민생"], "preview": "2025.12.28 조국 대표 페이스북 메시지  <故 ‘영원한 민주주의자 김근태’ 의장님의 14주기를 앞두고, 그 뜻을 되새깁니다> 내일 12월 29일, 14주기 추모행사가 모란공원에서 열립니다. 우리가 ‘김근태 정신’을 되새기고, 대한민국 민주주의의 미래를 함께 생각하는 시간이 되었으면 합니다.  반독재 민주화운동의 상징이었던 김근태 의장님이 우리 곁을 떠난 지 14년이 흘렀지만, 그가 평생을 바쳐 지키고자 했던 가치들은 우리 정치 앞에 여전...", "content": "2025.12.28 조국 대표 페이스북 메시지\n\n<故 ‘영원한 민주주의자 김근태’ 의장님의 14주기를 앞두고, 그 뜻을 되새깁니다>\n내일 12월 29일, 14주기 추모행사가 모란공원에서 열립니다. 우리가 ‘김근태 정신’을 되새기고, 대한민국 민주주의의 미래를 함께 생각하는 시간이 되었으면 합니다. \n반독재 민주화운동의 상징이었던 김근태 의장님이 우리 곁을 떠난 지 14년이 흘렀지만, 그가 평생을 바쳐 지키고자 했던 가치들은 우리 정치 앞에 여전히 무거운 질문을 던지고 있습니다. \n김근태 의장님은 민주주의란 무엇인가를 삶으로 증명해 보이신 ‘민주주의의 교과서’ 같은 분이었습니다. 야만적 고문을 견딘 초인적 용기를 기억합니다. 자신에게 고문을 가한 기술자를 용서하던 모습에서는 그의 인품의 깊이를 헤아릴 수 있습니다.\n의장님은 언제나 권력 앞에 당당했습니다. 청와대와도, 집권당 실세와도 원칙에 어긋난다면 맞섰습니다. 그가 꿈꿨던 민주주의는 단순히 투표할 권리에 그치지 않았습니다. 타인의 고통에 공감하고, 소외된 이들의 권리를 보장하기 위해 노력한 “따뜻한 민주주의자”였습니다.\n조국혁신당은 의장님의 뜻을 이어받아 민주주의의 숲을 더 다양하고 울창하게 가꾸겠습니다. 다양한 나무와 풀꽃이 어우러진 숲이 거친 비바람을 견뎌내듯, 다원 민주주의가 살아 숨 쉬는 정치야말로 그 어떤 폭력과 광기에도 흔들리지 않는 원동력이 됩니다. \n또한 청년, 여성, 농민, 노동자, 장애인 등 우리 정치에서 소외된 사람들의  꿈과 희망을 받아 안겠습니다. 조국혁신당이 지향하는 민주주의는 다양한 시민의 희망과 연대하여 완성되는 민주주의입니다. 지난겨울, 내란의 위협을 맨몸으로 막아내고 응원봉을 들었던 시민들의 염원 또한 이러한 다원 민주주의의 실현을 향하고 있습니다. \n그리고 정치의 끝은 결국 ‘사람’이어야 합니다. 의장님께서는 \"희망은 가장 세다\"며 절망의 시대를 살아가는 국민들에게 힘을 주었습니다. 조국혁신당은 정치개혁으로 가장 센 희망의 근거를 만들어 나갈 것입니다. \n김근태 14주기를 앞두고, 대한민국의 민주주의는 그때보다 더 넓어졌는지, 우리 정치는 국민의 삶을 더 고르게 보듬고 있는지를 자문합니다. 조국혁신당이 정치혁신으로 ”영원한 민주주의자 김근태 정신“을 이어가겠습니다.\n2025년 12월 28일 조국혁신당 대표 조국"}, {"id": 116, "filename": "2025.12.27 전북 고창 정책설명회.txt", "title": "전북 고창 정책설명회", "date": "2025-12-27", "category": "정책설명회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["내란", "민생", "윤석열"], "preview": "2025.12.27 전북 고창 정책설명회  한 20개월 전 일입니다. 2년도 안 되었습니다. 20개월 전에 조국혁신당이 만들어지면서 3년은 너무 길다고 외쳤습니다.  3년은 너무 길다를 외칠 때,  윤석열 탄핵을 외칠 때,  조국혁신당이 맨 처음 걸 맨 처음 그걸 외치는 거 알고 계시죠?  그때 민주당에서 같이 했습니까? 안 했습니다.  맨 처음에 조국혁신당이 3년 너무 길다 윤석열 탄핵을 외쳤을 때  너무 센 얘기하지 마라. 그게 되겠느냐 조...", "content": "2025.12.27 전북 고창 정책설명회\n\n한 20개월 전 일입니다. 2년도 안 되었습니다.\n20개월 전에 조국혁신당이 만들어지면서 3년은 너무 길다고 외쳤습니다.\n\n3년은 너무 길다를 외칠 때, \n윤석열 탄핵을 외칠 때, \n조국혁신당이 맨 처음 걸 맨 처음 그걸 외치는 거 알고 계시죠?\n\n그때 민주당에서 같이 했습니까? 안 했습니다. \n맨 처음에 조국혁신당이 3년 너무 길다 윤석열 탄핵을 외쳤을 때 \n너무 센 얘기하지 마라. 그게 되겠느냐 조심스럽다 얘기했습니다.\n3년 만에 끝났죠. 저희가 3년은 너무 길다고 외치고 싸워서 \n지금 윤석열, 김건이 감옥에 있습니다.\n그렇지 않습니까?\n\n혁신당이 잘해서가 아니라 \n여기 계신 고창 주민들과 전북 도민들의 마음을 저희가 읽고 \n그 마음을 대신해서 말했기 때문입니다.\n\n여러분께서 윤석열, 김건희 정권을 보시고 \n이거 나라가 제대로 되겠느냐 \n저 사람이 대통령 감이냐, \n저 여성이 영부인의 행태를 보이느냐 얼마나 걱정 많으셨습니까?\n\n혹시 검찰 동원해서 감사원 동원해서 때려잡을까 봐 겁나셨죠?\n아무도 말을 못했던 것입니다. \n근데 저희가 그 마음을 읽었기 때문에 용감하게 나서서 3년은 너무 길다.\n윤석열을 탄핵하자 저희가 앞서서 나와서 싸웠습니다.\n그래서 그 마음을 저희가 읽었기 때문에 \n윤석열, 김건희는 지금 감옥에 있습니다.\n\n어제 뉴스를 봤더니 윤석열이 체포 방해 혐의로 구형 10년을 받았더군요.\n그런데 내란이 남았습니다. \n내란죄 유죄가 나면 100% 무기가 구현될 것입니다.\n\n우리 모두의 승리입니다. \n고창 전북 도민만이 아니라 대한민국 모두의 승리입니다.\n윤석열이 감옥에 가고, 김건희가 감옥에 가고, \n윤석열 일당이 처벌받을 것이 불을 보듯이 뻔합니다.\n우리 모두가 힘써 싸웠던 덕분인 것이죠. \n우리 모두를 위해서 박수 한번 칩시다\n\n그랬는데 우리가 싸워서 윤석열, 김건희를 감옥에 보내고 \n우리 모두가 힘을 합쳐서 정권 교체를 했습니다.\n그래서 이재명 대통령을 조국혁신당의 후보로 밀고 싸웠습니다.\n\n민주당보다 더 열심히 대선에서 운동을 했습니다.\n이재명 대통령 당선되셨죠? 정권 교체되어서 뿌듯하시죠?\n이재명 대통령 잘하고 계시죠? 저도 자랑스럽습니다.\n정말 잘하고 계신다고 생각합니다.\n\n저도 이재명 대통령 참 잘하시고 \n내치 외치 참 잘 아십니다.\n한번 상상을 해 보십시오. \n윤석열이 탄핵이 안 됐다면 지금 대통령이 누굽니까? 윤석열입니다.\n영부인이 누굽니까? 이 지금 연말 연시 마음이 어떻겠습니까?\n끔찍하겠죠. 그래서 우리 모두 행복합니다. \n\n그렇지만 남아 있는 게 있습니다.\n두 가지 말씀드리겠습니다. \n윤석열과 김건희는 감옥에 갔습니다.\n\n그런데 지금 여기 고창 전북의 민생이 어떤지 살펴봐야 됩니다.\n지금 전북 1인당 지역 총생산이 전북 경우 17개 광역 시도 중에 17위입니다.\n\n거의 모든 경제 지표에서 최하위입니다. \n재정 자립도 23.5%로 전국 17개 시도 중에서 꼴찌입니다.\n윤석열, 김곤희 감옥에 갔고 \n이재명 대통령 되었고 \n근데 전북은 각종 지표에서 꼴찌입니다.\n\n이거 해결해야 되지 않습니까? \n오랫동안 우리 유기상 군수님이 35년 말씀하셨습니다마는 \n35년 동안 이 전북 지역을 지배했던 정당 정치 세력은 어디입니까?\n민주당입니다.\n\n전 민주당 존중하고 민주당에 존경하는 정치인들 많고 선후배 동지들 많습니다.\n35년간 전북 정치를 책임져 왔던 정당은 민주당입니다.\n조국혁신당이 아닙니다. \n35년간 민주당이 지역 정치를 책임졌는데 \n전북이 지역 총생산에서 꼴찌가 되도록 만든 책임은 어디에 있습니까?\n민주당에 있죠. \n\n저는 민주당과 앞으로 이재명 정부의 성공을 위해서 \n내란 세력을 완전히 척결하기 위해서 끝까지 연대할 것입니다.\n그렇지만 전북 발전을 위해서는 제가 어떻게 해야 되겠습니까?\n경쟁해야 합니다. \n\n조국혁신당이 윤석열 탄핵과 내란 척결을 위해서 싸웠던 결기와 의지인 만큼 \n그정도의 각오를 가지고 전북 꼴찌 17등 꼴찌를 벗어나기 위해서 \n저는 가장 앞장서서 싸울 것입니다.\n\n저와 조국혁신당이 전북을 꼴찌 17등에서 벗어나기 위해서 싸우면 \n그게 전북도민에게 나쁜 일입니까?\n저와 조국혁신당이 전북의 자립도를 꼴찌에서 벗어나기 위해 싸우면 \n그게 국민의 힘에게 윤석열에게, 김건희에게 좋은 일입니까?\n좋은 일이 아니죠. \n\n누구에게 좋은 일입니까? 전북도민에게 좋은 일이죠.\n그렇지않고 저희가 경쟁을 포기하고 \n지금까지 35년간 이 지역 정치를 책임진 \n민주당에게 알아서 하세요 하면 알아서 될 것입니까?\n아닙니다. 저희가 뛰어들어서 열심히 싸우고 경쟁을 해야 \n민주당도 정신을 차릴 것입니다.\n\n조국혁신당원 그리고 오늘 유기상 지역위원장님은 \n저희의 저희가 힘을 합쳐서 여기 고창과 전북 발전을 위해서 노력을 할 것입니다.\n그노력을 할 때 저나 유기상 위원장님이 고창에 해 되는 일을 하겠습니까?\n전북에 해가 되는 일을 하겠습니까? 김건희에게 좋은 일 하겠습니까?\n윤석열 좋은 일 하겠습니까? 그런 일은 절대 절대 없습니다.\n그렇지 않겠습니까? \n\n모든 걸 떠나서 저 개인이 윤석열 때문에 감옥 간 제가 \n윤석열, 김건희 좋은 일을 시키겠습니까?\n아니 걱정하지 마십시오. \n그건 걱정하지 마시고 저는 여기 민주당 정치인들과 협력할 것입니다.\n\n그렇지만 고창과 전북 발전을 위해서는 경쟁할 것입니다.\n그 경쟁이 있어야 발전이 있습니다. 경쟁이 있어야 혁신이 있습니다.\n\n다른 예를 한번 들어드리겠습니다. \n조국혁신당은 작은 정당입니다.\n그런데 전남 담양에서 조국혁신당 소속으로 \n최초의 군수가 탄생했습니다.\n정철원 군수입니다.\n\n올해 6월에 전남 담양에 조국혁신당 당원이 60명밖에 되지 않았습니다.\n민주당 당원 몇천 명 됐습니다. \n그런데 담양 군민들이 당원 60명밖에 되지 않은 정철호 군수를 택해서 당선이 됐습니다.\n정철원 군수가 조국혁신당 소속으로 이 전국의 유일한 단체장입니다.\n어떤 일이 벌어졌느냐 \n전남 담양 군수가 조국혁신당 후보가 되고 당선이 되고 \n조국혁신당 국회의원 12명이 전력을 다해 띄워서 예\n산 확보를 전남에서 2, 3등 만들었습니다.\n\n고창에 당 대표인 저를 포함해서 \n최고위원 사무총장, 또 강경숙 의원 등이 왜 왔겠습니까?\n고창을 바꿔 보겠다는 것입니다. \n\n전남 담양 발전을 위해서 예산을 가장 많이 확보했던 것처럼 여기도 바꿀 것입니다.\n\n두 번째 담양군수가 조국혁신당 소속으로 당선돼서 되었습니다.\n지금 이재명 정부 들어서고 난 뒤에 \n대통령 직속 농어촌특별위원회 조사 결과가 나왔습니다.\n농어촌에서 삶의 질 1위가 어디로 나왔냐? 담양이 나왔습니다.\n\n이재명 정부에서 조사한 결과입니다. \n전남 담양이 삶의 지수 1위가 되었습니다.\n조국혁신당 후보가 군수로 있는 곳입니다. \n그럼 제가 왜 고창에 왔겠습니까?\n고창의 삶의 지수와 \n전체 전북에서 1위가 돼야 되지 않습니까?\n\n저와 조국혁신당 그리고 유기상 지역 위원장께서 \n전북 전북의 삶의 지수가 1위가 되도록 노력하고 경쟁하는 것이 전북에 나쁩니까?\n절대 나쁘지 않습니다. \n\n존경하는 당원 동지 여러분 \n그리고 또 시민 여러분 조국혁신당 할 말 할 것입니다.\n할 일 할 것입니다. \n허튼 소리 하지 않겠습니다. 하겠다 하면 하겠습니다.\n윤석열 탄핵하겠다 하고 했습니다. \n검찰 개혁 하겠다 하고 했습니다.\n\n이제 새로운 도전이 있습니다. \n윤석열, 김건희 감옥에 갔지만 남아 있는 게 있습니다.\n내년 6월 지방선거가 있습니다. 지방 정치 바꿔야 됩니다.\n지방 주민의 삶, 민생 바꿔야 됩니다. \n\n저희가 해보겠습니다.\n담양에서 했던 것처럼 고창에서 하고 전북에서 하겠습니다.\n그렇지만 저희 아직 작은 정당입니다. 힘이 부족합니다.\n여기 계신 분들이 도와주셔야 할 수 있습니다. 도와주십시오."}, {"id": 117, "filename": "2025.12.27 전북 정읍 정책설명회 부안 알미장.txt", "title": "전북 정읍 정책설명회 부안 알미장", "date": "2025-12-27", "category": "정책설명회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["내란", "검찰개혁", "민생", "윤석열"], "preview": "2025.12.27 전북 정읍 정책설명회 부안 알미장  안녕하십니까? 부안 국민 여러분 조국혁신당 대표 조국입니다. 반갑습니다.  존경하는 부안 국민 여러분  지난 총선에서 부안 군민 여러분께서 조국혁신당을 밀어주셔서  저희가 원내 3당, 의석 12개를 얻었습니다.  창당 이후 지금까지 저와 조국혁신당은 부안 군민 여러분께서 저희를 믿어주시고  응원해주시고 도와주신 것을 단 한 번도 잊은 적이 없습니다. 그 마음을 잊지 않으면서 여기까지 달려왔...", "content": "2025.12.27 전북 정읍 정책설명회 부안 알미장\n\n안녕하십니까? 부안 국민 여러분 조국혁신당 대표 조국입니다.\n반갑습니다.\n\n존경하는 부안 국민 여러분 \n지난 총선에서 부안 군민 여러분께서 조국혁신당을 밀어주셔서 \n저희가 원내 3당, 의석 12개를 얻었습니다.\n\n창당 이후 지금까지 저와 조국혁신당은 부안 군민 여러분께서 저희를 믿어주시고 \n응원해주시고 도와주신 것을 단 한 번도 잊은 적이 없습니다.\n그 마음을 잊지 않으면서 여기까지 달려왔습니다.\n\n존경하는 부안 군민 여러분 \n조국혁신당이 3년은 너무 길다를 외치면서 \n윤석열 정권 조기 종식을 위해 싸워왔습니다.\n이루어졌죠. 저희가 잘나서가 아니라 \n부안 군민 여러분 마음속에 있던 이런 정권 안 되겠다는 \n그런 마음 하나하나 모여서 드디어 윤석열, 김건희 두 사람은 감옥에 갔습니다.\n\n지난 겨울 계엄과 내란 상황에서 얼마나 불안하셨습니까?\n얼마나 걱정하셨습니까? 안 그래도 장사가 안 되고 안 그래도 민생이 어려운데 \n윤석열이 계엄을 일으키고 내란을 일으켜서 얼마나 지난 겨울 더 마음이 추우셨습니까?\n그렇지만 이번 1년 지난 지금 마음 따뜻하시죠? 희망을 가지시지요?\n\n부안군민 여러분을 포함해서 \n전북 도민 여러분께서 열심히 싸워주신 덕분에 윤석열 김건희는 감옥에 갔습니다.\n정권이 교체되었습니다. \n조국혁신당은 부안 국민 여러분과 함께 힘을 합쳐서 정권을 교체하고 \n이재명 대통령을 드디어 당선시켰습니다.\n이재명 대통령 잘하고 계시죠? \n저도 이재명 대통령께서 잘 하시고 계신 거 너무 기쁘고 자랑스럽습니다.\n\n존경하는 부안 군민 여러분 하나 여쭤보겠습니다.\n윤석열, 김건희 감옥에 왔습니다. \n그리고 우리 이재명 대통령 잘하고 계십니다.\n그런데 부안 경제, 민생 많이 나아졌습니까?\n아직 멀었죠?\n\n새만금 때문에 여기 부안을 포함해서 많은 분들의 어업 손실이 \n약 10조가 넘는다고 합니다.\n그 사이에 정부의 보상은 10분의 1도 안 됩니다.\n새만금 만들어져서 지금까지 약 삼십 몇 년 동안 \n전북 경제를 일으킨다고 얘기했으나 희망 고문이었습니다.\n지금 윤석열 김건희 감옥에 갔고 \n이재명 정부가 들어서서 잘하고 있지만 부안 경제 어렵습니다.\n전북 어렵습니다. \n\n이제 이재명 정부를 세웠고 정권 교체를 했지만 이것만으로 끝나선 안 됩니다.\n부안 경제가 살고 부안의 민생이 살고 전북 민생과 경제가 살아야 합니다.\n그렇지 않습니까? 조국혁신당 저희 작은 정당입니다.\n\n여러분께서 저희를 12석으로 만들어 주셨지만 여전히 작은 정당입니다.\n그렇지만 이룬 게 많습니다.\n윤석열 탄핵 누가 제일 먼저 외쳤습니까? \n수사와 기소 분리를 포함한 검찰 개혁 누가 먼저 외쳤습니까?\n윤석열 탄핵 소추문을 누가 제일 먼저 썼습니까?\n\n그러한 결기와 각오로 조국혁신당은 앞으로 부안의 발전, \n전북의 발전을 위해서 싸울 것입니다.\n존경하는 국민 여러분 그리고 부안 군민 여러분 한 말씀드리겠습니다.\n이 부안을 포함한 전북 지역에 오랫동안 민주당이 지배를 해 왔습니다.\n훌륭한 분들 많습니다. \n\n저 민주당과 항상 연대해서 윤석열 정권 물리치고 내란 격퇴하는데 싸워왔습니다.\n그런데 부안 민생 상황 크게 나아지지 않았습니다.\n부안 국민 여러분께 호소합니다. 조국혁신당에 한번 기회를 주십시오.\n저희가 한번 잘해 보겠습니다. 더 잘해 보겠습니다.\n\n부안 발전을 위해서 전북 발전을 위해서 \n민주당과 누가 누가 잘하는지 경쟁해 보겠습니다.\n부안과 전북 발전을 위해서 경쟁하는 것이 나쁩니까?\n나쁘지 않습니다. 부안 발전에 누가 역할을 할 수 있을지, \n누가 더 헌신적으로 뛸지 경쟁을 하는 게 뭐가 나쁘겠습니까?\n저희 한번 열심히 해보겠습니다. 제가 한 말씀 예를 드리겠습니다.\n\n지난 재보궐 선거에서 전남 담양에서 \n조국혁신당의 유일한 단체장 후보가 나왔습니다.\n담양군수는 조국혁신당 후보입니다. \n담양군수가 민주당이 아니라 조국혁신당 후보로 당선이 되었습니다.\n\n그 후로 어떤 일이 있었느냐\n조국혁신당 국회의원 12명이 똘똘 뭉쳐서 \n예산을 예산을 끌어들이기 위해서 노력한 결과 \n전남 담양의 수해 지원금 등 지원금이 전남의 2위 3위를 달성했습니다.\n그리고 담양이 최근 이재명 이재명 정부가 조사한 \n살기 좋은 지수에서 1등을 달성했습니다.\n\n저희 작은 정당입니다. 그렇지만 조국혁신당이 똘똘 뭉쳐서 \n지역 발전을 위해서 뛰면 좋은 결과가 나왔습니다.\n\n감히 말씀드리겠습니다. \n저희가 부안 발전 전북 발전을 위해서 \n담양을 그렇게 만들었던 것처럼 저희가 한번 뛰어보겠습니다.\n한번 저희가 얼마나 잘 뛰는지 기회를 한번 주십시오.\n감사합니다."}, {"id": 118, "filename": "2025.12.27 전북 정읍 정책설명회 샘고을시장.txt", "title": "전북 정읍 정책설명회 샘고을시장", "date": "2025-12-27", "category": "정책설명회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["내란", "검찰개혁", "민생", "윤석열"], "preview": "2025.12.27 전북 정읍 정책설명회 샘고을시장  이렇게 따뜻하게 환영해 주셔서 감사합니다.  오늘 많이 추운 날씨인데 이렇게 추운 날씨에 불구하고 와주셔서 감사드리고요. 오늘은 조국혁신당의 정책 설명회 날입니다.  조국혁신당이 어떤 생각을 하고 있는지  정읍시민께 알려드리겠습니다.  조국혁신당이 창당할 때 3년은 너무길다를 외치며 창당했습니다. 3년 만에 이룬 것이 있죠? 저희가 잘나서가 아니라 여기 계신 정읍 시민께서 모두  3년은 너무...", "content": "2025.12.27 전북 정읍 정책설명회 샘고을시장\n\n이렇게 따뜻하게 환영해 주셔서 감사합니다. \n오늘 많이 추운 날씨인데 이렇게 추운 날씨에 불구하고 와주셔서 감사드리고요.\n오늘은 조국혁신당의 정책 설명회 날입니다. \n조국혁신당이 어떤 생각을 하고 있는지 \n정읍시민께 알려드리겠습니다.\n\n조국혁신당이 창당할 때 3년은 너무길다를 외치며 창당했습니다.\n3년 만에 이룬 것이 있죠?\n저희가 잘나서가 아니라 여기 계신 정읍 시민께서 모두 \n3년은 너무길다를 공감하시고 싸워주신 덕분에 \n윤석열 김건희 공동 정권이 끝장 나고 윤석열 김건희가 감옥을 갔습니다.\n다 여러분의 덕분입니다. 감사합니다.\n\n여러분께서 윤석열 김건희 두 사람이 하는 꼴을 보고 이래선 안 되겠다.\n도저히 말도 안 된다. 나라 꼴이 뭐냐 이런 마음을 먹으시고 \n저희의 주장에 공감해 주셨습니다.\n그래서 저희가 만들어진 지 얼마 안 된 정당이었음에도 불구하고 \n강력한 지지를 열화와 같은 성원을 보내주셔서 \n저희가 국회의원 12석을 얻게 되었습니다.\n이점 역시 다시 한 번 감사드립니다.\n\n존경하는 정읍 시민 여러분 한 말씀드리겠습니다.\n조국혁신당 역사 2년도 안 된 짧은 정당입니다. 조직도 작습니다.\n그렇지만 제가 자랑 하나 하겠습니다. \n여러분들 조국혁신당 국회의원 12명 아시죠?\n제가 존경하는 저희의 우당인 민주당 국회의원 중에서 아는 분들 몇 명 있습니까?\n\n저희 당 국회의원 12명을 여러분들이 만들어 주신 \n전북이 낳아주신 국회의원 12명, \n민주당 의원님들보다 10배 이상 열심히 일하고 있다고 생각합니다.\n\n저희가 덩치는 작지만 작게 출발했지만 똘똘 뭉쳐서 열심히 하고 있습니다.\n정읍을 바꾸고 전북을 바꾸고 대한민국을 바꾸는 데 \n12명이 똘똘 뭉쳐서 하고 있고 그 성과가 나타나고 있습니다.\n저희가 윤석열 탄핵, 가장 먼저 외쳤고 \n검찰 개혁 가장 먼저 외쳤고 \n그래서 그 결과가 다 이루어졌습니다.\n\n저희가 잘났다는 것이 아니라 \n여러분께서 원했던 그 마음, \n여러분이 원했던 것을 저희가 두려워하지 않고 \n용감하게 외쳤기 때문이라고 생각합니다.\n저희가 먼저 외쳤고 그게 결국 이루어졌습니다. \n\n그래서 윤석열 김건희는 감옥에 갔습니다.\n내란 일당도 재판 받고 있습니다. 그러나 꼭 이 말씀드리고 싶습니다.\n윤석열 김건희는 감옥에 갔는데 내란 일당은 재판 받고 있는데 \n110년이 넘는 여기 전국 4, 5대 전통시장의 하나인 이 바로 이 시장 \n샘고을시장 상황이 나아졌습니까?\n아닙니다. \n\n오랜 역사를 가진 전북 일대에 가장 전통이 있는 그런 시장인데 \n여기 계신 소상공인들 어렵습니다.\n인구 정읍을 포함해서 전북 인구 중고 있습니다. 청년들 다 떠나고 있습니다.\n윤석열 김건희는 감옥에 갔지만 \n그 윤석열 김건희 이후의 세상, 내란 이후의 세상,\n조국혁신당이 책임지겠습니다.\n\n바꾸어야 할 것이 많습니다. \n샘고을시장만이 아니라 정읍의 발전을 위해서 조국혁신당 할 일 하겠습니다.\n정읍을 포함해서 전북에서 특정 정당이 오랫동안 독점적 지위를 차지해 왔습니다.\n저는 민주당을 존경하고 항상 손잡고 일하고 있습니다.\n\n그렇지만 조국혁신당 더 잘할 수 있습니다. \n저희가 12명의 국회의원이 \n윤석열 탄핵과 검찰 개혁에 있어서 더 잘했던 것처럼 \n정읍 발전, 전북 발전을 위해서 더 잘할 수 있다고 확신합니다.\n\n저만이 아니라 저희 국회의원 12명만이 아니라 \n저희 전북도당 그리고 오늘 아까 소개하셨던 소개 받으셨던 \n김미경 위원장이 있기 때문입니다.\n\n제가 김미경 위원장 저희 경업을 책임지는 사람으로 \n전북 혁신의 혁신에 앞장설 인재입니다.\n저희 조국혁신당이 정읍을 전북이 저희를 낳아주셨습니다.\n저희가 효도하고 싶습니다.\n\n여러분들 주변 가족에서 자식이 여러 명 있는데 \n큰아들만 몰아준다고 집안 잘 되지 않습니다.\n저희 저희 둘째 아들이라고, 둘째 딸이라고 말해 주십시오.\n근데 둘째 딸, 둘째 아들을 챙겨주면\n둘째 아들, 둘째 딸도 잘할 수 있지 않습니까?\n\n저희에게도 잘 할 수 있는 기회를 주시면 \n저희 국회의원 12명이 일당백을 하고 있는 것처럼 \n정읍의 혁신을 위해서 저희가 한번 실력을 내보이겠습니다.\n\n예를 하나 들겠습니다. \n전남 담양군수가 누군지 아십니까?\n조국혁신당 유일한 단체장입니다. 지난 재보궐선거에서 정철원 군수가\n저희당 소속으로 당선이 되셨습니다. \n그때 전남 담양에 조국혁신당 당원 수가 60명 밖에 안 됐습니다.\n민주당은 몇천 명이었습니다. \n그런데 담양 국민들은 저희 당 소속 정철원 군수를 택하셨습니다.\n\n정철원 군수가 유일한 저희 당의 자치단체장인데 \n최근 국가 농어촌특별위원회에서 발표한 등수에 따르면 전남 전체에서 \n삶의 지수 1위가 어디냐 저희 당이 배출한 담양입니다.\n\n저희 당이 만든 통계가 아니고 \n이재명 정부에서 발표한 삶의 지수 전남 전남 도민 중에 \n삶의 지수 1위가 담양이라는 것입니다.\n저희 당 작습니다. 그리고 유일한 단체장이 담양입니다.\n\n짧은 시간 안에 담양의 삶의 지수를 1위로 만들었습니다.\n1위로 만들기 위해서 조국혁신당 12명 국회의원 집중해서 담양을 도왔습니다.\n그래서 담양에서 예산 따오는 것 전남에서 2위 한 것으로 알고 있습니다.\n\n제가 하나 질문을 던지겠습니다. 만약에 정읍에서 \n또 새로운 조국혁신당 단체장이 나온다면 \n또 전읍을 포함해 전북 여러 군데서 나온다면 \n거기서도 저희는 힘을 다해서 삶의 지수 1위를 만들겠습니다.\n\n조국혁신당 단체장이 전남에서 전남 전체 1위를 만들었던 것처럼 \n여러분께서 저희를 도와 선택하신다면 \n저희에게 기회를 주신다면 바로 이곳을 전북에서 삶의 지수 1위로 만들겠습니다.\n\n존경하는 정읍 시민 여러분, 전북 도민 여러분 다시 말씀드립니다.\n저희 열심히 할 각오가 되어 있습니다. 열심히 할 준비가 되어 있습니다.\n저부터 앞에서 뛸 것입니다. 부탁드립니다. 기회를 주십시오.\n기회를 주셔야 저희가 능력을 발휘할 것입니다. \n지역은 특히, 호남 지역은 경쟁이 필요합니다.\n경쟁을 해야 발전이 있고 경쟁을 해야 혁신이 있습니다.\n그냥 한 특정 당에 계속 몇십 년 몰아주었을 때 변화가 있었습니까?\n변화가 있으려면 경쟁을 해야 됩니다. 저희는 경쟁을 할 것입니다.\n저희가 경쟁을 하는 것이 정읍 시민에게 불편을 줍니까?\n정읍시 발전에 방해가 됩니까? 전혀 아닙니다. \n전남 담양에서 저희가 경쟁을 해서 담양 중심을 만들었을 때 \n담양 군민들이 너무 좋아했습니다.\n왜냐 삶의 지수가 1등이 됐으니까요.\n담양에서 조국혁신당이 경쟁을 해서 담양군수를 배출한 게 \n담양 군민들에게 좋은 일을 시켰죠.\n그게 무슨 문제가 되겠습니까?\n\n그렇다고 제가 윤석열, 김건희 좋은 일 시키겠습니까?\n꿈에도 있을 수 없는 일 아닙니까? 제가 국민의힘 좋은 일 시키겠습니까?\n제가 나경원 좋은 일 시키겠습니까? 제가 장동혁 좋은 일 시키겠습니까?\n그런 걱정은 붙들어 내십시오.\n\n전북에 계신 어떤 정치인들이 그런 얘기를 합니다.\n조국혁신당 밀어주면 내란에 방해되고 \n국민의힘 좋은 일 시키는 거 아니냐 이런 말 하곤 합니다.\n어림없는 얘기입니다. 다시 말씀드립니다. \n제가 국민의 힘 좋은 일 시키겠냐고요 그런 일은 붙들어 매십시오.\n\n저희가 왜 경쟁을 하느냐 국민의힘 좋은 일 시키려고 제가 여기 있겠습니까?\n정읍의 발전, 전북의 발전을 위해서는 \n경쟁을 해야 좋은 일이 생기죠.\n이대로 가만히 있으면 우리 샘고을시장이 더 발전하겠습니까?\n샘고을시장 오랜 전통을 가진 시장입니다.\n그동안 오랫동안 이 지역의 지배적 정당이 여기에 잘하겠다고 얘기를 했습니다.\n그런데 변화가 생겼습니까? \n\n우리에게 기회를 주십시오.\n전남 담양에서 변화를 일으켜서 \n전남 전체의 삶의 질의 1위를 만들었던 것처럼 여기서도 경쟁을 하겠습니다.\n여기서도 혁신을 일으키겠습니다.\n\n그렇게 되면 어떤 일이 생기냐 \n국민의힘은 좋은 일을 안 시키고 정읍에는 좋은 일이 일어날 것입니다."}, {"id": 119, "filename": "2025. 12.26. 전남도당 현장 최고위원회 모두발언.txt", "title": "전남도당 현장 최고위원회 모두발언", "date": "2025-12-26", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "5.18", "최고위"], "preview": "2025. 12.26. 전남도당 현장 최고위원회 모두발언  존경하는 전남도민 여러분, 그리고 사랑하는 당원 동지 여러분, 반갑습니다.  조국혁신당 대표 조국입니다.  이곳 목포는 김대중 대통령님의 숨결이 살아 있는 곳입니다. 올 때마다 DJ 정신을 다시 새깁니다.  시도지사와 군수, 지방의원을 주민이 직접 뽑는 지방자치는  김대중 대통령님께서 목숨을 건 단식 투쟁으로 쟁취하셨습니다.  한 세대가 지났습니다. 지금 지방자치의 현실은 어떻습니까? ...", "content": "2025. 12.26. 전남도당 현장 최고위원회 모두발언\n\n존경하는 전남도민 여러분, 그리고 사랑하는 당원 동지 여러분, 반갑습니다. \n조국혁신당 대표 조국입니다.\n\n이곳 목포는 김대중 대통령님의 숨결이 살아 있는 곳입니다.\n올 때마다 DJ 정신을 다시 새깁니다. \n시도지사와 군수, 지방의원을 주민이 직접 뽑는 지방자치는 \n김대중 대통령님께서 목숨을 건 단식 투쟁으로 쟁취하셨습니다.\n\n한 세대가 지났습니다. 지금 지방자치의 현실은 어떻습니까?\n김대중 대통령께서 계셨다면 몇 점을 주셨을까요?\n그다지 좋은 점수를 받지 못했을 것입니다.\n\n중앙집중 정치는 여전합니다.\n특정 정당 둘이 나눠 갖다시피 하고 있습니다.\n지난 지방선거 시군구 의회 지역구 당선자 2,601명 중\n민주당이 1,218명, 국민의힘이 1,216명이었습니다.\n\n특히 무투표 당선자가 전국에 490명이었습니다.\n역대 최다로, 직전 89명보다 5.5배나 늘었습니다.\n호남에서만 125명이 나왔습니다. \n대구 중구와 달서구 구청장, 경북 예천군수, 광주 광산구청장,\n그리고 전남 보성군·해남군의 군수도 투표 없이 당선됐습니다.\n이런 ‘묻지마 선출’은 군부독재 시절의 임명제가 부활한 느낌마저 줍니다.\n\n\n특정 정당이 절대다수인 의회가 같은 당 단체장을 견제할 수 있을까요?\n정치적 짬짜미가 이루어지고, 부패가 사라지지 않습니다.\n일부 지역에서는 형제가, 부부가 대를 이어 \n단체장을 맡는 기막힌 일까지 벌어졌습니다. \n김대중 대통령께서 이런 현실을 아셨다면 어떠셨을까요?\n\n오죽했으면 최근 광주시민단체협의회가 개혁을 촉구하는 논평을 냈겠습니까?\n이 단체는 이렇게 말했습니다.\n\"최근 민주당의 행보는 양당 체제를 유지하려는 듯 보인다.\n결선투표제 도입, 연동형 비례대표제 확대, 중대선거구제 개편 등\n정치 다양성과 표의 비례성을 높이기 위한 논의를 외면하지 말라.”\n전적으로 동의합니다.\n\n존경하는 전남도민 여러분, 그리고 사랑하는 당원 동지 여러분,\n오늘 이 자리에서 저는 세 가지 약속을 하고자 합니다.\n\n첫째, 내란동조당 국민의힘을 심판하고 제로로 만들겠습니다. \n국민의힘은 여전히 “계엄에 법률 위반이 있다고 내란죄가 되는 것은 아니다”,\n“우리가 황교안이다”등등 망언을 거침없이 내뱉고 있습니다.\n이런 내란동조당이 지방권력을 차지하도록 놔둘 수는 없습니다.\n\n민주당은 물론, 진보당, 사회민주당, 기본소득당 등과 연대하여\n국민의힘 광역단체장을 제로로 만들고,\n의석수를 반토막내겠습니다.\n\n둘째, 조국혁신당은 호남정치를 복원하겠습니다.\n호남정치는 대한민국 민주주의의 발전을 추동(推動)한 동력이었습니다.\n그렇지만 21세기 대한민국의 민주주의는 ‘민주당 독점주의’가 아닙니다.\n\n민주당 공천만 받으면 당선이 되는 구조는 \n호남정치 발전에 도움이 되지 않습니다.\n\n조국혁신당이 비록 규모가 작은 신생정당이라 부족함이 있지만, \n민주당과 용감하게 경쟁하겠습니다.\n조국혁신당을 낳아주신 호남의 발전, 그리고 호남정치의 복원을 위해\n‘효도’를 다하겠습니다.\n한 분 한 분이 ‘정치10단’인 호남 유권자들께서 \n민주당 외 조국혁신당을 키우는 것이 \n호남과 대한민국 모두에 도움이 된다고 판단하시리라 확신합니다.\n\n셋째, 조국혁신당은 3~5인 중대선거구 확대를 위해 싸우겠습니다.\n지난 지방선거에서 2인 선거구는 전체 1,030개 중 543개로 과반이었습니다.\n거대 양당이 한 명씩 내리꽂으면 거의 자동적으로 당선이 됩니다. \n지역 주민의 다양한 목소리는 지방정치에 반영되지 못합니다.\n그런데도 거대 양당을 중심으로 최근 다인 선거구를 줄이고,\n2인 선거구를 늘리려는 움직임이 감지되고 있습니다.\n지방자치를 퇴행시키는, 극히 유감스러운 일입니다.\n\n이재명 대통령께서도 성남시장 시절 똑같이 개탄한 바 있습니다.\n여기 왼편에 패널이 있으니 꼭 참조해주시기 바랍니다.\n2018년 1월 7일 이재명 성남시장은 소셜미디어에 \n기초의원 2인 선거구제는 “적폐”라고 지적하고, \n“1,2당의 공천을 받으면 살인마도 당선이고, \n공천 못받으면 공자님도 낙선한다”고 개탄했습니다.\n2018년 1월 10일 이재명 성남시장은 소셜미디어에 또 이렇게 썼습니다.\n“성남시 2인 선거구 비율이 14개 중 12개로 경기도에서 가장 높다.\n공천받으면 100% 당선, 공천 못 받으면 100% 낙선인 시의원들이 대부분이다.\n이들이 시민 편을 들까요, 공천하는 당 편을 들까요?”\n그러면서 이재명 시장은 “반시민적, 반민주적인 2인 선거구는 폐지하고\n3~4인 선거구로 바꿔야 한다”고 촉구했습니다.\n\n지방선거제의 문제점을 간파한 탁견이었습니다. \n조국혁신당은 2018년 이재명 시장의 제안에 전적으로 동의합니다.\n민주당도 이재명 대통령의 이 오랜 소신을 따라주길 희망합니다.\n\n존경하는 전남도민 여러분, 그리고 사랑하는 당원 동지 여러분,\n\nDJ가 목숨 걸고 쟁취한 지방자치입니다.\n‘김대중 정신’을 되새기며\n생산적 경쟁과 제도 개선을 통하여 \n호남 정치와 행정을 더 투명하게, 더 깨끗하게 만들겠습니다.\n감사합니다.  /끝"}, {"id": 120, "filename": "2025.12.26. 전남 곡성 정책설명회.txt", "title": "전남 곡성 정책설명회", "date": "2025-12-26", "category": "정책설명회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "최고위", "윤석열"], "preview": "2025.12.26. 전남 곡성 정책설명회 - 조국 당대표 정책설명 -2025.12.26.(금) 오후 6시 / 곡성군민회관  안녕하십니까, 조국혁신당 대표 조국입니다.  이 자리에 서니까 만감이 교차합니다.  아까 뒷 배경에 여러 사진이 있었습니다마는 제가 곡성에 한달살기 하면서 토란도 캐고 딸기도 따고 식당도 가고 목욕탕도 같이 가며 살았습니다. 여기 오기 전에 식당에서 저하고 목욕탕 같이 갔던 분하고 만나서 참 반가웠습니다.  아시다시피 제...", "content": "2025.12.26. 전남 곡성 정책설명회 - 조국 당대표 정책설명\n-2025.12.26.(금) 오후 6시 / 곡성군민회관\n\n안녕하십니까, 조국혁신당 대표 조국입니다. \n이 자리에 서니까 만감이 교차합니다.\n\n아까 뒷 배경에 여러 사진이 있었습니다마는 제가 곡성에 한달살기 하면서 토란도 캐고 딸기도 따고 식당도 가고 목욕탕도 같이 가며 살았습니다. 여기 오기 전에 식당에서 저하고 목욕탕 같이 갔던 분하고 만나서 참 반가웠습니다.\n\n아시다시피 제가 8개월간 갇혀 있었고 이렇게 돌아왔는데 따뜻하게 환영해 주셔서 너무 감사드린다는 점 다시 한 번 더 인사드리고 싶습니다.\n고맙습니다.\n\n오늘 이 자리를 함께 준비해주신 박웅두 전남도당 위원장님과 당원 동지 여러분께 너무 감사드리고 오늘 특별히 또 정철원 군수님께서 오셔가지고 축하해 주셔서 너무 기쁩니다.\n\n곡성 당원 동지 여러분과 주민들께서 기억하실지 모르겠습니다마는 제가 지난해 우리 박웅두 위원장님을 인재 영입했습니다.\n그때는 저희당이 정말 작았고 인력도 규모도 작은 상태였습니다.\n\n그때 박 위원장님 영입하면서 박웅두 위원장이 제2의 김대중이 될 것이다, 제2의 노무현이 될 것이다라고 막 치켜세웠습니다.\n그럴 자신이 있었기 때문입니다. 그런 믿음이 있었기 때문입니다.\n\n그래서 곡성 선거 때 저를 포함해서 많은 분들이 내려와서 살았죠.\n전력을 다해서 저희가 싸웠습니다. \n\n아쉽게 박웅두 위원장님이 떨어졌지만 그때 그 경험이 있었기 때문에 담양 선거에서 이겼다고 저는 생각하고 있습니다.\n맨 처음 선거는 바로 이기지 못한다고 생각합니다.\n\n저희 박웅두 후보가 부족해서가 아니라, 저희 당이 그때 부족했기 때문에 졌고 그 경험에 기초해서 담양군수 선거를 이겼다고 봅니다.\n\n이제 조국혁신당의 비전과 정책에 대해서 말슴드리겠습니다. 특히 지방선거를 앞둔 만큼 정치 개혁, 특히 지방 정치 개혁 문제를 중심으로 말씀드리고자 합니다.\n\n여기 계신 당원 동지 여러분과 곡성 군민 여러분,\n3년 너무 길다 다 기억하시죠?\n그 구호를 외치고 창당을 하고 선거를 치렀는데 3년 만에 어떤 일이 발생했습니까?\n윤석열 김건희 정권이 끝났죠 두 사람은 어디 갔습니까?\n\n제가 서울의 남부교도소라는 곳에 있었는데 \n저를 담당하는 교도관 분이 갑자기 저한테 달려와서 \n너무 신이 나서 이렇게 말을 했습니다.\n\n대표님, 김건희 여기 들어왔습니다! \n그러고 며칠 뒤에 제가 나왔습니다.\n\n저희가 3년은 너무 길다를 외치면서 창당을 했고 열심히 싸웠습니다.\n여기 계신 국민 여러분도 마찬가지였을 것입니다.\n그 노력이 쌓이고 쌓이고 모이고 모여서 윤석열 김건희 정권이 무너지고 두 사람은 감옥에 갔습니다.\n오기 직전에 뉴스를 봤더니 체포 방해죄만으로 윤석열에 대해서 10년 구형이 됐더라고요.\n\n본격적인 진짜 구형은 따로 남아 있죠? \n내란죄가 남아 있는데 체포 방해만으로 구형되었기 때문에 내란죄로 가게 되면 저는 무기 구형이 필연적이다라고 보고 있습니다.\n\n네, 저는 이 말씀을 드리고 싶습니다. \n이제 윤석열 김건희를 여전히 돌아오라고 말하는 사람들이 있습니다.\n그 사람들이 우리 사회의 주류는 되지 못합니다. \n우리의 정치를 이끌어서도 안 됩니다.\n\n그 사람들은 그렇게 하라고 놔두면 됩니다.\n윤석열 어게인을 외치는 사람 내버려 두면 좋죠. \n저는 더 중요한 건 뭐냐 하면 윤석열 김건희 이후의 세상이 어떠해야 되는가를 지금부터 고민해야 된다고 봅니다.\n윤석열 김건희 이후에 호남은 곡성은 어떠해야 되는가를 고민해야 된다 생각합니다.\n\n그래서 저는 오늘 두 가지 말씀드리고자 합니다. \n첫째는 곡성을 포함한 호남 정치의 복원, 둘째는 정치 개혁 문제입니다.\n이 두 가지는 긴밀히 결부되어 있습니다. \n다들 아시다시피 대한민국 정치사에서 호남은 민주주의의 원동력이었습니다.\n\n대한민국은 민주주의 성취에 많은 부분을 호남에 빚지고 있습니다.\n저 역시 그런 마음입니다. \n오늘 오기 전에 제가 목포에 들러서 최고위원회를 열었고 김대중 공부방을 들른 이유이기도 합니다.\n\n호남 정치는 돌이켜 보게 되면 끊임없이 혁신하려 하고 끊임없이 개혁하려고 했습니다.\n한 번도 그 자리에 머무른 적이 없었습니다. \n항상 새로운 인물을 발굴했고 새로운 길을 제시했습니다.\n\n그래서 대한민국 정치를 새로운 국면으로 그리고 저희를 새로운 장으로 인도했다고 봅니다.\n\n그런데 지금 호남 정치는 어떤가 저는 묻고 싶습니다.\n고 김대중 대통령께서 살아 돌아오신다면 A학점을 줄까요?\n아닐 것입니다. \n\n감히 말하건데 DJ께서 돌아오셨을 때 호남 정치를 보고 참 잘하고 있다 충분하다 칭찬한다라고 말씀 못하실 것 같습니다.\n\n여러 가지 이유가 있습니다. \n정치적으로 보시면 공천이 곧 당선이고 말뚝을 세워도 당선이라는 얘기가 여전히 관철되고 있습니다.\n\n이재명 대통령께서 2018년 성남시장 시절에 이런 말씀을 하신 적이 있습니다.\n기초의원 선거 2인 선거구제에서는 살인마도 공천 받으면 당선되고 공자님도 공천 못 받으면 당선 안 된다 라는 말을 이재명 당시 성남시장이 하신 바 있습니다.\n\n좀 과장된 표현이기는 하지만 지금도 여전히 유효한 말 같습니다.\n호남 정치와 관련해서, 나라 전체를 생각하기 이전에 호남의 지배적인 정당 눈치만 보고 있지 않는지 걱정이 됩니다.\n그리고 호남의 지배적인 정당이 그 정당 바깥에 있는 유능한 인재, 경륜 있는 인재를 소홀히 하고 있는지 아닌지 걱정이 됩니다.\n\n우리 정철원 담양군수님께서 조국혁신당 최초의 기초단체장이신데, 정철원 군수님 민주당 공천 받았습니까? 못 받았지 않습니까? \n그렇다고 정철원 군수님 능력이 모자라십니까?\n경륜이 모자라십니까? 그렇지 않은 분이셨습니다.\n\n무슨 이유인지 모르겠는데 제가 민주당 대표였으면 정철원 군수를 민주당 후보로 모셔왔을 것 같아요.\n그렇지 못했습니다. 지금도 그러지 못한 측면이 많이 있고 앞으로도 상당히 그럴 것 같습니다.\n\n그래서 조국혁신당이 필요한 것입니다.\n저는 정치건 사업이건 무엇이든 간에 혁신과 경쟁 없으면 고이고 정체하고 후퇴한다고 봅니다.\n\n사례를 보면 영광에서 선거구민에게 금품 제공하여 공직선거법 위반으로 단체장이 중도 하차했습니다.\n또 조금 떨어져 있는 화순 같은 경우는 형님이 단체장하다가 떨어지니까 동생이 했습니다.\n\n혁신이라고 볼 수가 없죠. 이런 상황에서 저희 조국혁신당이 등장하면서 호남에서 긴장이 발생했습니다.\n호남에서 혁신이 시작됐습니다. \n호남에서 경쟁이 시작됐습니다.\n\n지금은 비록 기초단체장 한 분 정철원 군수님이 계시지만 이분이 조국혁신당 후보로 당선되면서 어떤 변화가 일어났느냐 말씀드리겠습니다.\n\n정철원 군수께서 예산의 우선순위를 주민의 삶에 집중했습니다.\n그 결과 담양이 농어촌 삶의 지수에서 올해 전남 1위를 기록했습니다.\n\n이거는 제가 주관적으로 한 게 아니라 대통령 소속 농어업 농어촌 특별위원회가 조사한 것입니다.\n이재명 정부에서 조사한 결과 민주당 후보, 민주당 소속 군수 시장이 아니라 조국혁신당이라는 작은 정당 신생 정당 소속 정철원 군수가, 군수가 되셔서 몇 개월 안 됐지 않습니까?\n그런데 1위를 했습니다. 어떠십니까?\n\n정철원 군수 같은 분이 담양은 물론 곡성, 영광 어디든 간에 곳곳에 있다면 지금 대통령 직속 농업 농어촌 특별위원회가 발표한 농어촌 삶의 질의 지수가 다 높아지겠죠, 맞습니다.\n\n저는 민주당 존중합니다. \n민주당 소속 정치인들 존경합니다.\n저하고 사적으로 친한 분들 매우 많습니다. \n형님 아우 하는 사이 매우 많습니다.\n\n그럼에도 불구하고 저는 민주당 및 민주당 소속 정치인에게 묻고 싶습니다.\n담양 아닌 대부분 전남지역 군수의 다수는, 압도적 다수는 민주당 소속 아닙니까?\n묻고 싶은 말 하나입니다. \n그동안 뭐 하셨습니까?\n조국혁신당 후보가 군수가 돼서 1등을 1년 만에 했는데 다른 분들 뭐 하셨습니까?\n물어야 한다고 생각합니다. 그래야 그분들도 열심히 하시겠죠.\n\n민주당 소속 군수 시장 분들도 열심히 하셔야 됩니다.\n열심히 하지 말란 말이 아닙니다. 그분들 열심히 하셔야 돼요.\n우리 모두 전남의 삶의 지수를 높이기 위해서 경쟁해야죠.\n\n담양군수가 조국혁신당 소속을 가지고 당선됨으로써 드디어 메기 효과가 발생할 것이라고 봅니다.\n\n민주당 소속 군수 시장님들 긴장하실 겁니다. \n이러다간 큰일 나겠구나, 열심히 하시겠죠.\n그 지역의 삶의 질을 높이기 위해서 열심히 하시겠죠.\n\n이게 나쁜 일입니까? 곡성에 나쁜 일입니까?\n호남에 나쁜 일입니까? 대한민국에 나쁜 일입니까?\n이 경쟁 무조건 좋은 일입니다. \n\n불편해하는 분은 계실 것입니다.\n누구, 민주당 소속 정치인들이시겠죠? 어쩔 수 없습니다.\n경쟁해야죠. \n저는 그 민주당 소속 정치인분들 보고 정치하자는 말 하지 않습니다.\n정치하셔야죠, 후보로 뛰셔야죠. 그러나 경쟁해야 됩니다.\n공정하게 경쟁해야 된다고 생각합니다.\n\n저는 이번 정철원 군수 케이스를 보더라도 짧은 시간에 우리가 성과를 냈고 삶의 지수를 1위로 전남 1위로 만들었습니다.\n우리는 자랑할 수 있습니다. \n자랑해야 마땅하고 자랑할 자격이 있습니다.\n\n이걸로 저희는 승부해야 된다고 봅니다. \n이러한 경쟁이 곡성에도 이루어져야 하는 거죠.\n호남 전체에 이루어져야 하고 대한민국 전체에 이루어져야 한다고 확신합니다.\n\n많은 분들이 왜 호남에서 싸음을 벌이냐, 이런 얘기하더라고요.\n호남에서 저희가 치고 받고 무슨 깡패입니까?\n아닙니다. \n좋은 경쟁을 해서 좋은 지역을 만들고 좋은 호남을 만들고 좋은 대한민국을 만들려고 경쟁을 하는 것이지,\n우리가 주먹 치고받고 하는 깡패입니까?\n아닙니다. \n경쟁을 두려워해서는 안 됩니다. \n경쟁을 해야 혁신이 있고 혁신이 있어야 발전이 있고 발전이 있어야 삶이 좋아지는 거 아니겠습니까?\n\n조국혁신당 소속 단체장은 전국에서 딱 한 명입니다.\n단 한 명만으로 이만큼의 변화를 이루어냈습니다.\n전남 1위를 했다는 거죠. \n\n한 명이 아니라 10명이면 어떻겠습니까?\n더 좋아지지 않겠습니까? 맞습니다. \n10명이 아니라 100명이면 어떻겠습니까?\n삶의 지수가 100배 좋아지지 않겠습니까? \n\n여기 저희 당원분들도 계실 것이고 당원이 아닌 분도 계실 것입니다.\n민주당 소속 권리당원 분들도 계실 것입니다.\n한번 생각해 봐 주십시오. \n이런 경쟁이 없는 게 나은지 경쟁이 있는 게 나은지 한번 생각해 "}, {"id": 121, "filename": "2025.12.23 조국 대표 페북 메시지.txt", "title": "조국 대표 페북 메시지", "date": "2025-12-23", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["페이스북"], "preview": "2025.12.23 조국 대표 페북 메시지  민주당이 ‘통일교 특검’을 수용하기로 급선회함으로 국민의힘이 이 건으로 떠들 근거가 사라졌다. 남은 것은 수사대상과 특검 추천권이다.  수사대상은 여야 정치인 대상 금품 지원 의혹은 물론, 헌법 위배 정교유착 의혹이 포함되어야 한다. 수사대상자가 속한 민주당과 국민의힘이 특검추천권을 행사하면 공정성 시비가 발생해서 안된다. 통일교 로비와 무관한 비교섭단체 정당이 추천권을 행사해야 할 것 같다. 엄정한...", "content": "2025.12.23 조국 대표 페북 메시지\n\n민주당이 ‘통일교 특검’을 수용하기로 급선회함으로 국민의힘이 이 건으로 떠들 근거가 사라졌다. 남은 것은 수사대상과 특검 추천권이다. \n수사대상은 여야 정치인 대상 금품 지원 의혹은 물론, 헌법 위배 정교유착 의혹이 포함되어야 한다. 수사대상자가 속한 민주당과 국민의힘이 특검추천권을 행사하면 공정성 시비가 발생해서 안된다. 통일교 로비와 무관한 비교섭단체 정당이 추천권을 행사해야 할 것 같다. 엄정한 수사후 금품을 주고 받은 통일교 간부과 정치인이 처벌되어야 함은 물론이고, 통일교단도 법적 책임을 져야 한다.\n한편, 민주당은 활동기간이 종료했거나 곧 종료할 ‘3대 특검’에서 결론을 내지 못한 혐의들(예컨대, 양평 고속도로 노선 변경 의혹, 노상원 수첩 관련 의혹 등)에 대하여 ‘2차 종합특검법’을 발의했다. \n특검 운영 비용을 생각하면, ‘검경 합동수사본부’를 발족시켜 바로 수사에 들어가고 기소를 진행하는 것이 효율적일 수 있다. 미진한 수사를 담당하는 ‘2차 종합특검’이니 만큼, 활동 기간과 규모는 1차 보다 축소할 필요가 있다. 그리고 ‘2차 종합특검’이 실제 발족하기 전이라도 기존 특검 수사의 흐름을 이어가기 위해서라도 ‘검경 합동수사본부’를 즉각 구성하고 활동이 시작되어야 한다. 이후 ‘2차 종합특검’이 발족되면, 수사 성과를 넘겨야 한다."}, {"id": 122, "filename": "2025.12.23 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2025-12-23", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "사법개혁", "윤석열", "페이스북"], "preview": "2025.12.23 조국 대표 페이스북 메시지2  어제 12/22 서울고법 전체 판사회의를 열렸고, 민주당의 내란전담재판부 최종수정안을 수용하겠다고 결정했다. 법률이 통과되면, 전체 판사회의, 사무분담위 등을 거쳐 대상 사건 전담재판부 구성을 위한 절차가 진행될 것이다. 다행이다. 이로써 본회의에 상정된 내란전담재판법이 위헌이라는 주장은 힘을 잃었다. 민주당이 마련했던 내란전담재판부 1안이 그대로 상정되었다면, 위헌논쟁-위헌제청-재판중단-윤석열...", "content": "2025.12.23 조국 대표 페이스북 메시지2\n\n어제 12/22 서울고법 전체 판사회의를 열렸고, 민주당의 내란전담재판부 최종수정안을 수용하겠다고 결정했다. 법률이 통과되면, 전체 판사회의, 사무분담위 등을 거쳐 대상 사건 전담재판부 구성을 위한 절차가 진행될 것이다. 다행이다. 이로써 본회의에 상정된 내란전담재판법이 위헌이라는 주장은 힘을 잃었다.\n민주당이 마련했던 내란전담재판부 1안이 그대로 상정되었다면, 위헌논쟁-위헌제청-재판중단-윤석열 일당의 석방 등 일련의 사태가 예상되었다. 나와 조국혁신당이 내란전담재판부 필요성에 동의하면서도, 재판부 구성에 법무부가 관여하는 조항을 삭제하고 법관대표회의가 재판부 구성의 주역이 되도록 수정할 것을 강조했던 이유였다. \n이를 두고 진보층 일각에서 나와 조국혁신당에 대한 황당한 비난이 있었다. \"내란에 동조한다\", \"조희대에 동조한다\" 등등. 이제 이들은 \"민주당까지 내란 또는 조희대에 동조한다\"고 할 것인가. 어떤 과제가 필요하다고 주장하는 것과 이를 정합적(整合的) 법률로 만드는 것은 연결되어 있지만 구별되는 것이다. 광장과 의회도 연결되어 있으면서 구별되는 역할이 있다.\n수차례 반복 강조했지만, 내란전담재판부 설치는 사법개혁의 일부일 뿐이다. 조국혁신당은 사법행정처 폐지, 재판소원제도 도입, 하급심 강화를 맨 앞에서 외쳐왔다. 좌고우면하지 않고 계속 추진할 것이다."}, {"id": 123, "filename": "2025.12.23 조국 대표 한국일보 인터뷰.txt", "title": "조국 대표 한국일보 인터뷰", "date": "2025-12-23", "category": "인터뷰", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["5.18", "페이스북", "윤석열", "부동산", "지방선거", "내란", "개헌"], "preview": "2025.12.23 조국 대표 한국일보 인터뷰 조국 \"광역단체장은 민주당과 연대, 지방의원은 독자 후보로 완주\" [인터뷰]  -내년 지방선거의 최우선 목표는 무엇인가.  \"민주당과 연대해 국민의힘 광역단체장 '0석'을 만들겠다. 광역단체장 선거는 조국혁신당이 후보를 낼 수 있지만, 범민주 진영과 국민의힘 간 '1대 1' 구도를 만들 생각이다. 아슬아슬한 차이로 승부가 결정 나는 경우가 많기 때문이다. 조국혁신당이 후보를 내면 5%라도 가져갈 것...", "content": "2025.12.23 조국 대표 한국일보 인터뷰\n조국 \"광역단체장은 민주당과 연대, 지방의원은 독자 후보로 완주\" [인터뷰]\n\n-내년 지방선거의 최우선 목표는 무엇인가.\n\n\"민주당과 연대해 국민의힘 광역단체장 '0석'을 만들겠다. 광역단체장 선거는 조국혁신당이 후보를 낼 수 있지만, 범민주 진영과 국민의힘 간 '1대 1' 구도를 만들 생각이다. 아슬아슬한 차이로 승부가 결정 나는 경우가 많기 때문이다. 조국혁신당이 후보를 내면 5%라도 가져갈 것이고, 이는 범민주 진영의 표를 갉아먹는 것밖에 안 된다.\"\n\n-광역단체장 후보를 내지 않겠다는 뜻인가.\n\n\"연대하겠다는 것이다. 당 인재영입위원장으로 후보를 발굴하고 있다. 호남은 지지도가 다른 지역보다 높기 때문에 좋은 후보가 있다면 조국혁신당으로 단일화할 수도 있다. 지난 총선에서도 지역구 후보를 낼 수 있었지만, 범민주·진보 진영 승리를 위한 (비례대표 후보만 내는) 전략적 선택을 했다. 독자 노선을 걷는 대신 민주당과 연대해 국민의힘과 1대 1 구도를 만들겠다는 의미다. 매우 현실주의적 접근을 하려 한다.\"\n\n-현실정치를 하는 의미가 뭔가.\n\n\"정체성 정치를 하지 않겠다는 뜻이다. '우리가 진짜 진보야, 우리 정체성은 이거야'라는 태도는 정치가 아니다. 국민과 열 걸음 떨어져 '따라오라'고 하는 것은 종교인이나 학자, 지식인이 할 일이다. DJ(김대중 전 대통령)는 '국민보다 딱 반 걸음 앞서가라'고 했다. 우리 사회는 대중민주주의 사회이지 엘리트 사회가 아니다.\"\n\n-부동산 문제 해법으로 '토지공개념' 도입을 주장했다.\n\n\"서울 아파트 가격 상승률이 문재인 정부 수준을 넘어섰다. 정부가 금융 규제로 풀겠다지만 효과가 없다는 게 확인되고 있다. 문제가 언제 어디서 터질지 모른다. 심각한 자산불평등·양극화도 핵심은 집값이다. 토지공개념 도입과 함께 서울에 있는 대법원과 대검찰청, 헌법재판소, 감사원 등을 지방으로 옮기면 그 땅에 고품질 임대 아파트를 지을 수 있다. 지방분권 효과도 있다. 우리당 차규근 의원이 대법원을 대구로 보내는 법안을 발의했다. 대구 시민들도 좋아한다.\"\n\n-지방선거에서 개헌 국민투표를 동시에 하자는 입장이다.\n\n\"지방분권·지역균형발전을 헌법에 담으면 이재명 대통령이 하고자 하는 지방분권 정책이 가능해진다. '수도를 법률로 정한다'는 한 줄만 넣으면 행정수도, 문화수도, 해양수도 등 전국에 여러 수도를 만들 수 있다. 이번 지방선거에서 헌법에 지방분권 원칙을 명시하고, 전문에 부마 민주항쟁과 5·18민주화운동, 6·10 민주항쟁을 추가하면 된다. 이후 국회 개헌특위를 가동해 2028년 2차 개헌을 목표로 대통령 연임제, 토지공개념 등을 논의하면 된다.\"\n\n-거대 양당은 개헌에 별다른 관심이 없어 보인다.\n\n\"안타깝다. 이재명 정부는 제1호 국정과제로 제시했지만, 민주당은 입을 닫고 있다. 개헌특위도 구성되지 않았다. 지역 시민단체 및 언론사와 연대해 목소리를 내보려고 한다.\"\n\n-국회 정치개혁특별위원회가 이제 구성됐다.\n\n\"지난 4월 발표된 내란 종식 등을 위한 원탁회의 선언문에 '대선 직후 현행 20석인 원내 교섭단체 요건을 완화한다'는 내용이 담겼다. 현행 20석은 유신의 잔재다. 그 이전 10석이었다. 10석이 되면 국민의힘의 친한동훈계가 독자 정당을 만들어 4당 체제 시나리오도 가능하다. 상대적으로 합리적 보수 정당이 만들어진다면 그게 정치 발전이다. 그래야 정치 양극화도 사라지지 않겠나.\"\n\n-민주당이 정치개혁을 추진할 유인이 별로 없다.\n\n\"지난 대선은 내란 직후 치러졌음에도 범진보(이재명+권영국 후보)와 범보수(김문수+이준석 후보) 간 득표율 격차가 0.91%포인트에 불과했다. 민주당은 더 넓게 연대해야 다음 대선을 잘 준비할 수 있다.\"\n\n-내란 등과 관련한 실체적 진실이 완전히 밝혀지지 않았다.\n\n\"2차 특검으로 갈 거냐, 검경 합동수사본부로 갈 거냐 두 가지 선택길이 우리한테 있다. 2차 특검을 할 수도 있다고 생각하지만, 특검은 최후의 수단으로 써야 한다. 일단 검경 합수본으로 해서 사건을 인수 받아 바로 수사를 시작하면 된다. 법무부 장관과 행정안전부 장관이 합의해 합수본을 만들면 된다. 즉각 할 수 있고, 돈도 필요 없다. 2차 특검을 주장하는 논리는 사건을 이관 받아 수사하는 경찰 국가수사본부가 신청한 각종 영장을 검찰이 뭉갤 수 있다는 우려다. 서울중앙지검과 국수본이 합수본을 차리면 수사와 영장 문제도 해결된다.\" *해당 한국일보 인터뷰에 대한 반론 : 조국 대표는 해당 인터뷰 발표 이후 아래와 같은 메시지를 추가 발표하였다.* \n\n2025.12.23 조국 대표 페북 메시지\n\n민주당이 ‘통일교 특검’을 수용하기로 급선회함으로 국민의힘이 이 건으로 떠들 근거가 사라졌다. 남은 것은 수사대상과 특검 추천권이다. \n수사대상은 여야 정치인 대상 금품 지원 의혹은 물론, 헌법 위배 정교유착 의혹이 포함되어야 한다. 수사대상자가 속한 민주당과 국민의힘이 특검추천권을 행사하면 공정성 시비가 발생해서 안된다. 통일교 로비와 무관한 비교섭단체 정당이 추천권을 행사해야 할 것 같다. 엄정한 수사후 금품을 주고 받은 통일교 간부과 정치인이 처벌되어야 함은 물론이고, 통일교단도 법적 책임을 져야 한다.\n한편, 민주당은 활동기간이 종료했거나 곧 종료할 ‘3대 특검’에서 결론을 내지 못한 혐의들(예컨대, 양평 고속도로 노선 변경 의혹, 노상원 수첩 관련 의혹 등)에 대하여 ‘2차 종합특검법’을 발의했다. \n특검 운영 비용을 생각하면, ‘검경 합동수사본부’를 발족시켜 바로 수사에 들어가고 기소를 진행하는 것이 효율적일 수 있다. 미진한 수사를 담당하는 ‘2차 종합특검’이니 만큼, 활동 기간과 규모는 1차 보다 축소할 필요가 있다. 그리고 ‘2차 종합특검’이 실제 발족하기 전이라도 기존 특검 수사의 흐름을 이어가기 위해서라도 ‘검경 합동수사본부’를 즉각 구성하고 활동이 시작되어야 한다. 이후 ‘2차 종합특검’이 발족되면, 수사 성과를 넘겨야 한다.\n\n\n-그간 '민주당 2중대' '민주당 우군'이란 평가와 다른 모습이다.\n\n\"조국혁신당이 민주당과 함께 윤석열 탄핵, 검찰 독재 정권 종식 등 선명한 구호를 외쳐온 건 사실이다. 하지만 구호만으로 법안·정책을 만들 수는 없다. 신뢰·책임·안정성을 모두 갖춰야 한다. 조국혁신당은 합리적 대안을 제시하고 있다. 최근 민주당의 핵심 법안에 대해 우리가 보완을 요구했고 수정됐다. 선명하면서도 책임감 있는 진보 노선을 걷고 있다. 내년 6월쯤엔 국민들이 조국혁신당의 독자적 역할이 있다는 점을 알게 될 거다.\"\n\n-지방선거, 보궐선거 출마 외에 차기 대권주자로도 거론된다.\n\n\"당면 과제는 우리 당의 광역·기초단체장부터 지방의원까지 후보 진용을 짜는 것이다. 저는 감독 겸 선수다. 선수를 영입·배치하고, 훈련시키다 어느 위치에서 뛸지 마지막에 결정해야 한다. 저는 물론 가족까지 죗값을 치르면서 깨달은 게 있다. 저를 버리면 국민이 채워준다는 점이다. 총선에서도 좋은 성적을 거뒀고, 8개월 수감 생활을 마치고 복귀했는데도 차기 지도자로 거론된다. 특정 권력을 쥐려고 한 게 아니라 검찰 독재 종식, 윤석열 탄핵 등에서 앞장섰기에 국민이 도와준 결과라고 생각한다. 제7공화국을 목표로 걷다 보면 국민이 다시 채워줄 거라고 믿는다.\"\n\n-정치인 조국이 이루고 싶은 최종 목표는 무엇인가.\n\n\"제7공화국을 만드는 것이다. 정치적으로 1987년 체제, 사회·경제적으로는 1997년 체제가 합쳐진 결과물인 제6공화국은 시효를 다했다. 출발선이 같고, 모두가 사회권을 누리는 나라를 만들어야 한다. 지금 나이가 60세인데 딱 10년간 이 목표를 뛰어보려고 한다.\"\n\n\n\n\n"}, {"id": 124, "filename": "2025. 12.22 제10차 최고위원회의 모두발언.txt", "title": "제10차 최고위원회의 모두발언", "date": "2025-12-22", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "최고위", "윤석열"], "preview": "2025. 12.22 제10차 최고위원회의 모두발언  조국혁신당 대표 조국입니다.  거두절미하고, 김건희 특검에 촉구합니다. 조속히 내란 수괴 윤석열의 대선 거짓말을 공직선거법 위반으로 기소하십시오. 머뭇거릴 시간이 없습니다.  공직선거법 위반죄 공소시효는 6개월입니다.  2022년 3월 당선된 뒤 취임과 파면, 김건희 특검법 공표 등으로 윤석열에 대한 공직선거법 공소시효는 가다 서다를 반복했습니다. 오는 28일 김건희 특검이 끝나면, 공소시효...", "content": "2025. 12.22 제10차 최고위원회의 모두발언\n\n조국혁신당 대표 조국입니다.\n\n거두절미하고, 김건희 특검에 촉구합니다.\n조속히 내란 수괴 윤석열의 대선 거짓말을 공직선거법 위반으로 기소하십시오.\n머뭇거릴 시간이 없습니다.\n\n공직선거법 위반죄 공소시효는 6개월입니다. \n2022년 3월 당선된 뒤 취임과 파면, 김건희 특검법 공표 등으로\n윤석열에 대한 공직선거법 공소시효는 가다 서다를 반복했습니다.\n오는 28일 김건희 특검이 끝나면, 공소시효는 1개월 3주만 남습니다.\n2월 중순 이후 공소시효가 끝나면 처벌할 수 없습니다.\n\n윤석열은 대선 때 온갖 거짓말을 해댔습니다.\n2021년 12월 14일 관훈토론에서 도이치모터스 주가조작 의혹에 대해\n\"수천만 원의 손해를 봤다”라고 말했습니다.\n검찰 수사에 따르면, 김건희 씨와 모친은 20억 원이 넘는 차익을 얻었습니다.\n\n장모 최은순 씨 은행 잔고 증명서 위조, 김건희 씨 학력 및 경력 허위 기재,\n윤석열의 윤우진 전 세무서장 변호사 소개,\n부산저축은행 불법 대출 브로커 봐주기 수사\n등을 모두 부인했습니다.\n건진법사 전성배 씨 비선 논란에 대해서도 \"인사 정도만 한 사이”라고 했습니다.\n하도 뻔뻔하게 거짓말을 했기에 국민은 깜빡 속았습니다.\n\n20대 대선 승부는 불과 0.73% 포인트로 갈렸습니다.\n당시 윤석열의 새빨간 거짓말이 일부라도 사실로 드러났다면,\n어땠을까요?\n당시 윤석열은 기억이 없거나 말실수를 한 것이 아니었습니다.\n조국혁신당이 지난 4월 21일 윤석열을 공직선거법으로 고발한 이유입니다.\n\n윤석열이 기소되면 유죄는 확실시됩니다.\n허위를 증명할 사실 관계는 차고 넘칩니다.\n징역 또는 100만 원 이상 벌금형이 확정되면, 당선 무효가 됩니다.\n‘비상계엄은 대통령 고유 권한’ 운운하는 헛소리는 더이상 듣지 않아도 됩니다.\n\n‘윤어게인’의 내란 보루인 국민의힘에 매서운 교훈이 될 것입니다.\n20대 대선 때 보전받은 선거비 425억 원을 반환해야 되기 때문입니다.\n\n그러니, 다시 김건희 특검에 촉구합니다.\n정의를 지연시킬 이유는 단 하나도 없습니다.\n윤석열의 선거법 위반을 경찰 국가수사본부에 넘기지 말고,\n특검이 직접 기소하십시오.      /끝/"}, {"id": 125, "filename": "2025.12.22 조국 대표 페이스북 메시지 남태령 승리 1주년.txt", "title": "조국 대표 페이스북 메시지 남태령 승리 1주년", "date": "2025-12-22", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["페이스북", "민생", "윤석열"], "preview": "2025.12.22 조국 대표 페이스북 메시지 남태령 승리 1주년  <남태령 승리를 완성하는 길은 정치개혁입니다.>   ​2024년 12월 22일, 28시간의 대치 끝에 ‘남태령 민주주의’가 승리한 날입니다.  작년 남태령은 빛의 물결로 가득 찼습니다. 윤석열 구속을 촉구하며 상경한 ‘전봉준투쟁단’의 트랙터를 경찰 차벽이 가로막았기 때문입니다. 시민들은 그 길 위에서 28시간을 함께 견디며 트랙터를 지켜냈습니다.   마침내 1년 전 오늘, 차벽...", "content": "2025.12.22 조국 대표 페이스북 메시지 남태령 승리 1주년\n\n<남태령 승리를 완성하는 길은 정치개혁입니다.> \n\n​2024년 12월 22일, 28시간의 대치 끝에 ‘남태령 민주주의’가 승리한 날입니다.\n\n작년 남태령은 빛의 물결로 가득 찼습니다. 윤석열 구속을 촉구하며 상경한 ‘전봉준투쟁단’의 트랙터를 경찰 차벽이 가로막았기 때문입니다. 시민들은 그 길 위에서 28시간을 함께 견디며 트랙터를 지켜냈습니다. \n\n마침내 1년 전 오늘, 차벽을 넘어 당당히 한남동으로 진군했습니다. ​어느 농민운동가는 이를 두고 \"우금치에서 좌절됐던 전봉준의 꿈이 130년 만에 남태령을 넘어 민중이 승리한 역사적 순간\"이라 말했습니다. 그렇습니다. 국민의 승리이자 민주주의의 승리였습니다.\n\n그러나 남태령의 꿈은 아직 완성되지 않았습니다. 추운 고갯길을 지켰던 응원봉의 저항이 바랐던 세상은 정치개혁을 통한 다원 민주주의의 실현입니다. \n\n그날 무대에 올랐던 여성, 소수자, 청년, 노동자, 농민들은 저마다의 절박함을 품고 있었습니다. 그 저항이 승리의 역사를 썼지만, 지금의 정치는 어떻습니까? 윤석열은 탄핵됐지만, 낡은 정치구조는 그대로입니다. \n\n​우리는 혹한의 남태령을 지켰던 시민들에게 민주주의를 빚졌습니다. 그 빚에 '빛'으로 답하는 유일한 길은 정치개혁입니다. 빛이 다양한 색깔을 품고 있듯, 우리 민주주의 또한 그 다양성을 온전히 담아낼 때 비로소 완성될 수 있습니다.\n\n​남태령의 승리는 특정 정당이나 집단의 전유물이 아닙니다. 다양한 목소리와 세대, 계층이 함께 일궈낸 우리 모두의 역사입니다. 하지만 지금의 정치는 농민의 절규도, 청년의 외침도, 소수자의 권리도 여전히 \"나중에\"라는 말로 미루고만 있습니다.\n\n조국혁신당은 더는 정치개혁을 '촉구'하거나 '호소'하지 않겠습니다. 남태령의 차벽을 넘듯, 구태 정치의 벽을 반드시 정면 돌파하겠습니다. 조속한 시일 내에 정치개혁을 위한 원 포인트 공동 교섭단체를 추진하고, 시민사회와 지방의회 중대선거구제, 광역단체장 결선투표제 등 정치개혁 법안 통과를 위한 공동 행동에 나설 것입니다.\n\n응원봉을 들었던 시민들은 각자의 삶으로 돌아갔지만, 그 빛은 꺼지지 않았습니다. ​그 다양한 목소리가 정치개혁에 수렴되고 제도로 만들어지도록 길을 내는 것, “진보적 원내 3당”인 조국혁신당의 할 일입니다. \n\n조국혁신당이 용기를 내겠습니다. 멈추지 않겠습니다. 특권과 기득권 정치의 벽을 깨겠습니다. 극우 세력을 제로로 만들고, 불평등을 제로로 만드는, 그렇게 국민의 삶을 바꾸는 정치개혁을 해내겠습니다.\n\n2025.12.22. 조국혁신당 대표 조국."}, {"id": 126, "filename": "2025.12.22 조국 대표 페이스북 메시지 내란전담재판부 관련.txt", "title": "조국 대표 페이스북 메시지 내란전담재판부 관련", "date": "2025-12-22", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "사법개혁", "윤석열", "페이스북"], "preview": "2025.12.22 조국 대표 페이스북 메시지 내란전담재판부 입장  저와 조국혁신당이 지적해온 위헌 소지 조항이 모두 삭제되어 민주당 최종법안으로 확정되었습니다. 조국혁신당은 내란전담재판부 법관 추천에 법무부나 헌법재판소 사무처장이 개입하는 것은 위헌 소지가 있고, 이 경우 재판이 중단되고 윤석열 일당이 석방될 가능성이 상당하다는 입장을 일관되게 주장해왔습니다.  법안 통과후 신속히 '판사회의' 가 열려 영장전담법관과 전담재판부를 구성할 판사의...", "content": "2025.12.22 조국 대표 페이스북 메시지 내란전담재판부 입장\n\n저와 조국혁신당이 지적해온 위헌 소지 조항이 모두 삭제되어 민주당 최종법안으로 확정되었습니다. 조국혁신당은 내란전담재판부 법관 추천에 법무부나 헌법재판소 사무처장이 개입하는 것은 위헌 소지가 있고, 이 경우 재판이 중단되고 윤석열 일당이 석방될 가능성이 상당하다는 입장을 일관되게 주장해왔습니다. \n법안 통과후 신속히 '판사회의' 가 열려 영장전담법관과 전담재판부를 구성할 판사의 기준을 마련하고, 이에 따른 재판부 구성이 이루어져야 합니다.\n내란전담재판부 구성은 사법개혁의 일부일 뿐입니다. 조국혁신당은 대법원장이 인사를 통해 재판에 개입할 수 있는 통로인 법원행정처 폐지, 헌법에 어긋나는 법원의 판결을 통제할 수 있는 재판헌법소원 도입, 하급심 심리를 충실하게 만드는 개혁 등을 계속 추진할 것입니다."}, {"id": 127, "filename": "2025.12.21 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-21", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당", "민생·경제", "외교·안보"], "tags": ["페이스북"], "preview": "2025.12.21 조국 대표 페이스북 메시지  전자상거래법상 ‘임시중지명령’ 제도가 있다(제32조의2). 쿠팡이 계속 책임을 회피하고 피해회복조치를 미루면 단행해야 한다. 일시적으로 입점 기업, 택배 노동자에게 피해, 소비자에게 불편이 초래될 수 있으나, 우월적 지위를 즐기면서 오만방자한 태도를 보이고 있는 쿠팡에는 강한 경고가 필요하다. ‘임시중지’ 기간 동안 다른 책임감있는 전자상거래 업체가 성장할 수 있다. 만약 ‘임시중지명령’을 발동하...", "content": "2025.12.21 조국 대표 페이스북 메시지\n\n전자상거래법상 ‘임시중지명령’ 제도가 있다(제32조의2). 쿠팡이 계속 책임을 회피하고 피해회복조치를 미루면 단행해야 한다. 일시적으로 입점 기업, 택배 노동자에게 피해, 소비자에게 불편이 초래될 수 있으나, 우월적 지위를 즐기면서 오만방자한 태도를 보이고 있는 쿠팡에는 강한 경고가 필요하다. ‘임시중지’ 기간 동안 다른 책임감있는 전자상거래 업체가 성장할 수 있다.\n만약 ‘임시중지명령’을 발동하기 어렵다면, 개인정보보호법 제64조의2에 따라 전체 매출의 최대 3% 과징금을 부과해야 한다. 쿠팡의 작년 매출은 약 41조원이니 약 1조원을 부과할 수 있다.\n이상은 제도개선 전이라도 정부가 할 수 있다. '탈팡'하는 국민의 분노와 불안에 응답하길 바란다.\n그리고 대한민국 정당의 대표로 말한다. 미국인 Bom Kim(=한국명 김범석), 정신차려라! I am warning you!"}, {"id": 128, "filename": "2025.12.21 조국혁신당 대변인 박병언.txt", "title": "조국혁신당 대변인 박병언", "date": "2025-12-21", "category": "대변인 논평", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "사법개혁"], "preview": "2025.12.21 조국혁신당 대변인 박병언  [논평] 내란전담재판부법을 넘어 사법개혁으로 나아가야 합니다  대법원이 내란전담재판부 구성을 위한 예규 도입을 발표했지만, 조희대 사법부를 향한 국민의 불신과 분노는 그대로입니다. 내란재판이라는 엄중함에 걸맞는 독립적인 전담 재판부 구성은 법원 스스로 진작 했어야 할 일이었습니다.  내란 재판이 시작되기 전 전담재판부를 구성했다면, 지귀연 없는 재판부가 구성되어 엄정한 심리가 가능했을 것이며, 내란...", "content": "2025.12.21 조국혁신당 대변인 박병언\n\n[논평] 내란전담재판부법을 넘어 사법개혁으로 나아가야 합니다\n\n대법원이 내란전담재판부 구성을 위한 예규 도입을 발표했지만, 조희대 사법부를 향한 국민의 불신과 분노는 그대로입니다.\n내란재판이라는 엄중함에 걸맞는 독립적인 전담 재판부 구성은 법원 스스로 진작 했어야 할 일이었습니다. \n내란 재판이 시작되기 전 전담재판부를 구성했다면, 지귀연 없는 재판부가 구성되어 엄정한 심리가 가능했을 것이며, 내란 청산의 시계는 더욱 빨라졌을 것입니다.\n조희대 대법원장은 내란전담재판부 입법 논의가 한창일 때 침묵으로 일관했습니다. 조국혁신당이 즉각적인 내란전담재판부 구성을 위해 예규 제정을 촉구할 때도 철저히 외면했습니다. 법원장회의, 법관대표회의, 공청회 등을 열어 사법개혁 여론을 방어할 궁리에만 몰두해 왔습니다.\n조국혁신당이 지적한 위헌 소지가 제거된 법안이 국회에서 마련되자, 대법원은 갑자기 예규를 만들겠다고 나섰습니다. \n그뿐입니까? ‘12.3 내란’ 당시 ‘내란 심야 회의’에 대한 명확한 해명조차 내놓지 못하고 있습니다. 조국혁신당이 조희대 탄핵소추안을 공개했음에도 파렴치한 태도를 이어가고 있습니다.\n국민의 명령을 거부하며 기득권 지키기에 혈안이던 조희대 대법원이 내란전담재판부를 위한 국회 입법이 코앞으로 다가오자 뒤늦게 예규를 들고나온 것은, 사법개혁의 파도를 막기 위한 몸부림에 불과합니다.\n조국혁신당은 예규라는 가변적인 장치에 내란 청산의 운명을 맡기지 않습니다. 조국혁신당의 방안대로 위헌 요소가 해소된 만큼, 즉각적인 법안 통과에 박차를 가하겠습니다. 국회의 입법을 통해 내란전담재판부 설치라는 ‘불가역적인 도장’을 찍겠습니다.\n사법부의 자정 능력이 상실되었음이 거듭 증명되고 있습니다. 조국혁신당은 내란전담재판부 설치와는 별개로, 법원행정처 폐지, 법왜곡죄 도입 등 전면적인 사법개혁을 흔들림 없이 추진하여 무너진 사법 정의를 바로 세우겠습니다.\n2025년 12월 20일\n조국혁신당 대변인 박병언"}, {"id": 129, "filename": "2025.12.21 조국혁신당 법률위원장 서상범.txt", "title": "조국혁신당 법률위원장 서상범", "date": "2025-12-21", "category": "기타", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "검찰개혁", "사법개혁"], "preview": "2025.12.21 [제2의 조희대 출현을 원천 차단하는 사법개혁에 박차를 가하겠습니다]  조국혁신당은 25. 10. 17. 조희대 대법원장에 대한 탄핵소추안을 공개한 바가 있습니다. 이재명 공직선거법 위반 재판을 빌어 대선에 개입한 책임을 물어야 한다는 것이었습니다.  조희대 대법원장은 전체 사법부를 위해 사퇴함이 마땅합니다. 내란재판에 대한 불만이 누적될 경우 탄핵해야 한다는 국민의 요구가 실제로 이어지게 될 것입니다. ‘조희대 없는 대법원...", "content": "2025.12.21 [제2의 조희대 출현을 원천 차단하는 사법개혁에 박차를 가하겠습니다]\n\n조국혁신당은 25. 10. 17. 조희대 대법원장에 대한 탄핵소추안을 공개한 바가 있습니다. 이재명 공직선거법 위반 재판을 빌어 대선에 개입한 책임을 물어야 한다는 것이었습니다. \n조희대 대법원장은 전체 사법부를 위해 사퇴함이 마땅합니다. 내란재판에 대한 불만이 누적될 경우 탄핵해야 한다는 국민의 요구가 실제로 이어지게 될 것입니다. ‘조희대 없는 대법원’은 시간의 문제일 뿐입니다. \n조희대 대법원장이 사퇴나 탄핵으로 자리에서 내려오더라도, 제2 제3의 조희대가 나오지 말라는 법이 없습니다. \n조희대 대법원장 이전에는 양승태 대법원장이 있었습니다. 사람의 문제가 아니라, 제도의 변화로 국민을 위한 사법부를 만들어야 합니다. \n조희대 대법원이 재판의 형식을 빌어 대선에 개입하였다면, 그 재판은 실제로는 국민의 공정한재판을 받을 권리를 침해한 것입니다. 행정부의 헌법위반을 재판으로 취소할 수 있듯이 법원의 재판이 헌법을 위반한 경우 왜 취소할 수 없단 말입니까?\n4심제를 도입하자는 것이 아닙니다. 기본권을 침해한 재판에 대해서만, 예외적으로 헌법재판소를 통해 취소를 구할 수 있어야 한다는 것입니다. \n조희대 대법원이 권한을 남용하여 사법권을 휘두를 수 있는 장치가 법원행정처입니다. 법원행정처는 대법원장 1인에게 전체 사법부 구성 판사들의 승진, 배치, 예산에 대한 권한을 독점시키는 오른팔입니다. \n2017년 사법파동때, 판사들이 승진을 위해 국가정보원장의 대선개입이 정당했다는 판결을 쓰며 줄서는 모습을 우리는 목격한 바 있습니다.  판사들을 줄세우는 제왕적 법원행정처는 ‘사법부 내부의 독립’을 위해서라도 반드시 폐지 되어야 합니다. \n조국혁신당은 검찰개혁을 이끌었듯이 국민을 위한 사법개혁에 앞장서 실천 하겠습니다. \n2025년 12월 20일\n조국혁신당 법률위원장 서상범"}, {"id": 130, "filename": "2025.12.20 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-20", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁"], "tags": ["페이스북", "윤석열"], "preview": "2025.12.20 조국 대표 페이스북 메시지  ‘윤석열 검찰’의 행태가 이러했다. 수사권을 오남용하여 윤석열의 정적은 찌르고 베고 죽이려 했던 반면, 윤-김 부부의 범죄, 검사 자신들의 범죄 증거는 인멸하려 했다. 법과 원칙? 공정과 정의? 가소롭고 가증스럽다. 이들이야 말로 ‘디가우징’되어야 한다.", "content": "2025.12.20 조국 대표 페이스북 메시지\n\n‘윤석열 검찰’의 행태가 이러했다. 수사권을 오남용하여 윤석열의 정적은 찌르고 베고 죽이려 했던 반면, 윤-김 부부의 범죄, 검사 자신들의 범죄 증거는 인멸하려 했다. 법과 원칙? 공정과 정의? 가소롭고 가증스럽다. 이들이야 말로 ‘디가우징’되어야 한다."}, {"id": 131, "filename": "2025.12.20 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2025-12-20", "category": "페이스북 메시지", "topics": ["검찰·사법개혁"], "tags": ["페이스북"], "preview": "2025.12.20 조국 대표 페이스북 메시지2  나경원 의원이 천정궁에 갔는지는 답하지 않으면서, 생뚱맞게 내 딸을 건드린다. \"생긴 지 6개월도 안 된 화장품 회사가 신라면세점에 입점한 것에 어떤 특혜나 뒷 작업이 있던 것인지나 대답하라.\" 답한다. 어떠한 특혜도 뒷작업도 없었다. 수사기관, 공정위원회, 신라면세점 등 어디건 확인해보라. 그리고 다시 묻는다. \"나경원 의원, 천정궁에 갔니? 갔어? 갔냐고?\"", "content": "2025.12.20 조국 대표 페이스북 메시지2\n\n나경원 의원이 천정궁에 갔는지는 답하지 않으면서, 생뚱맞게 내 딸을 건드린다. \"생긴 지 6개월도 안 된 화장품 회사가 신라면세점에 입점한 것에 어떤 특혜나 뒷 작업이 있던 것인지나 대답하라.\"\n답한다. 어떠한 특혜도 뒷작업도 없었다. 수사기관, 공정위원회, 신라면세점 등 어디건 확인해보라.\n그리고 다시 묻는다. \"나경원 의원, 천정궁에 갔니? 갔어? 갔냐고?\""}, {"id": 132, "filename": "2025.12.19 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-19", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", " 대주택을 지어야 한다고 주장해왔다. 예컨대, 대법원과 대검찰청을 지방으로 이전시킨 후 빈 부지. 이 경우 윤석열, 김건희 소유 아크로비스타건 내가 소유한 아파트건 서초구의 비공공 아파트 가격이 떨어질 수 있으나 당연히 감수해야 한다."}, {"id": 135, "filename": "2025.12.19 조국 대표 페이스북 메시지_윤석열 성탄 메시지 관련.txt", "title": "조국 대표 페이스북 메시지_윤석열 성탄 메시지 관련", "date": "2025-12-19", "category": "페이스북 메시지", "topics": ["내란·윤석열", "개헌·민주주의"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2025.12.19 조국 대표 페이스북 메시지_윤석열 성탄 메시지 관련  늦게 내란 수괴 윤석열의 성탄 메시지 전문을 보았다. 무속 중독자가 “예수님의 가르침” 운운하니 가증스럽다. 자녀에게 올바른 나라를 물려줘야 한다는 절박함” 때문에 내란을 일으켰다는 부분에서는 분노가 다시 치밀었다. 나의 확고한 사형폐지론 신념이 흔들리기까지 했다.  지금은 윤석열을 손절했지만, 윤석열을 공정과 정의의 화신으로 찬양하며 대통령으로 만들었던 자들의 면면이 떠...", "content": "2025.12.19 조국 대표 페이스북 메시지_윤석열 성탄 메시지 관련\n\n늦게 내란 수괴 윤석열의 성탄 메시지 전문을 보았다. 무속 중독자가 “예수님의 가르침” 운운하니 가증스럽다. 자녀에게 올바른 나라를 물려줘야 한다는 절박함” 때문에 내란을 일으켰다는 부분에서는 분노가 다시 치밀었다. 나의 확고한 사형폐지론 신념이 흔들리기까지 했다. \n지금은 윤석열을 손절했지만, 윤석열을 공정과 정의의 화신으로 찬양하며 대통령으로 만들었던 자들의 면면이 떠오른다. 이들 중 다수가 여전히 사과하지 않고 목소리를 내고 있다는 게 K-민주주의의 취약점이다."}, {"id": 136, "filename": "2025.12.19 조국 대표 페이스북 메시지_진술거부권 관련.txt", "title": "조국 대표 페이스북 메시지_진술거부권 관련", "date": "2025-12-19", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2025.12.19 조국 대표 페이스북 메시지 <진술거부권 관련>  <<활동하고 있는 현역 정치인에게는 진술거부권이 없다>> 나경원과 한동훈, 둘 다 ‘친윤’이었다. 나경원은 윤석열의 ‘여동생’이었고, 한동훈은 윤석열의 ‘꼬붕’이었다. 두 사람 다 검찰의 소극적 태도 덕분에 자기 자식 수사와 기소를 피했다. 그러다가 두 사람은 국힘 대선 경선과 12.3 내란을 계기로 갈라섰다.  그런데 두 사람은 공통점이 있다. 법정에 선 피고인이 아닌 대중 ...", "content": "2025.12.19 조국 대표 페이스북 메시지 <진술거부권 관련>\n\n<<활동하고 있는 현역 정치인에게는 진술거부권이 없다>>\n나경원과 한동훈, 둘 다 ‘친윤’이었다. 나경원은 윤석열의 ‘여동생’이었고, 한동훈은 윤석열의 ‘꼬붕’이었다. 두 사람 다 검찰의 소극적 태도 덕분에 자기 자식 수사와 기소를 피했다. 그러다가 두 사람은 국힘 대선 경선과 12.3 내란을 계기로 갈라섰다. \n그런데 두 사람은 공통점이 있다. 법정에 선 피고인이 아닌 대중 정치인인데, 국민과 언론이 매우 궁금해 하는 매우 간단한 것에 답하지 않거나 행하지 않는다.\n-두 사람 다 윤석열 검찰총장/대통령을 찬양했던 것을 사과하지 않는다.\n-나경원은 ”통일교 천정궁 갔느냐“는 질문에 ”간 적 없다“라고 말하지 않고 ”더 말씀 안드린다 했죠“라고 답한다.\n-한동훈은 채널A 사건의 비밀이 들어 있는 자기의 휴대전화에 20여 자리 비밀번호를 걸고 풀지 않는다. 참조로 조국혁신당 박은정 의원은 검사 시절 윤석열 일당에 의해 감찰당할 때  휴대전화를 비밀번호 풀어 제출했다.\n-한동훈은 당원게시판에 익명으로 쓴 윤석열-김건희 비방 글의 주체가 누구인지를 두고 격렬한 논란이 됨에도 ”내 가족이 아니다“라고 답하지 못한다.\n심하게 캥기는 게 있음을 아는 것이다. 이러면서 이재명 대통령과 정부 비방하는데는 거품을 푼다. \n나경원에게 계속 물어야 한다. ”천정궁 갔지?“ 한동훈에게 계속 물어야 한다. ”네 가족 맞지?“ 활동하고 있는 현역 정치인에게는 진술거부권이 없다."}, {"id": 137, "filename": "2025.12.19 조국 대표 페이스북 메시지_최고 법원 이전 및 고품질공공임대주택 지어야.txt", "title": "조국 대표 페이스북 메시지_최고 법원 이전 및 고품질공공임대주택 지어야", "date": "2025-12-19", "category": "페이스북 메시지", "topics": ["검찰·사법개혁", "조국혁신당", "개헌·민주주의", "민생·경제"], "tags": ["페이스북", "부동산"], "preview": "2025.12.19 조국 대표 페이스북 메시지_최고 법원 이전 및 고품질공공임대주택 지어야  최고법원 소재지가 수도가 아닌 나라들(조국혁신당 차규근 의원실 제공).  대법원, 대검찰청, 헌법재판소, 감사원 등이 서울에 있을 필요가 없다. 여러 지역에 분산 이전하고, 그 부지에 고품질 공공임대주택을 지어야 한다.", "content": "2025.12.19 조국 대표 페이스북 메시지_최고 법원 이전 및 고품질공공임대주택 지어야\n\n최고법원 소재지가 수도가 아닌 나라들(조국혁신당 차규근 의원실 제공). \n대법원, 대검찰청, 헌법재판소, 감사원 등이 서울에 있을 필요가 없다. 여러 지역에 분산 이전하고, 그 부지에 고품질 공공임대주택을 지어야 한다."}, {"id": 138, "filename": "2025. 12.18 제9차 최고위원회의 모두발언.txt", "title": "제9차 최고위원회의 모두발언", "date": "2025-12-18", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "최고위"], "preview": "2025. 12.18 제9차 최고위원회의 모두발언   조국혁신당 대표 조국입니다.  저는 매일매일 내란 이후의 대한민국 정치는  어떠해야 하는가를 고민하고 있습니다. 응원봉을 들었던 주권자 국민은 응원봉 모양과 색깔처럼 다양하고 다채롭습니다. 그 꿈과 희망을 정치가 온전히 받아야 합니다.  이때 저는 그 누구보다, 고 노무현 대통령을 생각합니다.  노무현 대통령은 반칙과 특권을 깼고,  권위주의와 지역주의를 거부했습니다. 노무현은 죽었지만 죽지...", "content": "2025. 12.18 제9차 최고위원회의 모두발언 \n\n조국혁신당 대표 조국입니다.\n\n저는 매일매일 내란 이후의 대한민국 정치는 \n어떠해야 하는가를 고민하고 있습니다.\n응원봉을 들었던 주권자 국민은 응원봉 모양과 색깔처럼\n다양하고 다채롭습니다.\n그 꿈과 희망을 정치가 온전히 받아야 합니다.\n\n이때 저는 그 누구보다, 고 노무현 대통령을 생각합니다.\n\n노무현 대통령은 반칙과 특권을 깼고, \n권위주의와 지역주의를 거부했습니다.\n노무현은 죽었지만 죽지 않았습니다.\n‘바보 노무현’에게는 미완에 그친 꿈이 있었습니다.\n바로‘특정 정당의 지역 독점 타파’입니다.\n\n노무현은 대통령이 되기 전은 물론\n대통령이 된 후에도 지역 독점을 깨려고 몸부림쳤습니다.\n\n2003년 첫 시정연설에서 “특정 정당이 특정 지역에서\n3분의 2이상 의석을 독차지할 수 없도록\n여야가 합의해 선거법을 개정해달라”고 촉구하셨습니다.\n2005년에는 총선 소선거구제를 개편해 줄 것을 호소하셨습니다.\n자서전 <운명이다>에서 “모든 지역에서 정치적 경쟁이 이뤄지고\n소수파가 생존할 수 있는 제도적 환경을 만들어야 한다”고 역설하셨습니다.\n\n20년이 흘렀습니다.\n여전히 특정 지역에서 특정 정당이 ‘말뚝만 꽂아도’ 당선된다고 합니다.\n2022년 지방선거에서 전체 당선자의 93.6%가 두 정당 후보였습니다.\n당선자 3,860명 중 483명이 무투표 당선자였습니다.\n대체로 특정 지역에 몰려 있습니다.\n\n단체장이 무슨 일을 벌여도, 같은 당 지방의회는 눈감아줍니다.\n단체장들이 줄줄이 범죄로 낙마하지만, 비슷한 사람이 당선됩니다.\n형제가 차례로 단체장이 되고,\n부부가 이어 단체장이 되기도 합니다.\n\n지역 독점은 더 나쁜 효과를 일으킵니다.\n노무현 대통령이 <운명이다>에서 지적하셨듯이\n“정책 개발보다 다른 정당과 지도자에 대한 증오를 선동하는 것이\n훨씬 효과적인 선거운동 방법이 됩니다.”\n“대화와 타협의 정치는 발붙이기 어렵습니다.”\n\n어찌할까요? 결국 ‘정치 개혁’이 답입니다.\n노무현 대통령이 못다 푼 숙제를 우리가 마쳐야 합니다.\n\n조국혁신당은 답을 내놓은 바 있습니다.\n정춘생 의원의 국회법 개정안에 ‘교섭단체 기준 정상화’안이 있습니다.\n유신독재가 만들어놓은 속박을 끊자는 것입니다.\n선거법 개정안에 ‘중대선거구제 및 결선투표제’를 담았습니다.\n다양한 정치세력이 국회에 진출하게 하고 \n연합정치를 활성화하자는 것입니다.\n\n일부 내란 세력과 한 줌의 토호를 제외한\n대한국민 모두에게 득이 되고, 옳은 일입니다.\n현행 선거법은 내란 세력과 토호 세력에게 \n정치적 연명장치가 될 것입니다.\n정치 개혁이 이뤄지면, 좋은 나비효과가 이어질 것입니다.\n대한민국은 문화와 경제 선진국을 넘어\n정치 선진국, 더 좋은 민주공화국으로 한 단계 도약할 것입니다.\n\n이번 정기국회에서 정치 개혁을 완수해야 합니다.\n이제는 노무현의 꿈이 이뤄질 때가 되지 않았습니까.\n말로만 노무현을 말하지 않고,\n그의 뜻을 실현해야 노무현을 진정 계승하는 길입니다.\n/끝"}, {"id": 139, "filename": "2025.12.18. 조국 대표 페이스북 메시지 개인쓰레기통 제로.txt", "title": "조국 대표 페이스북 메시지 개인쓰레기통 제로", "date": "2025-12-18", "category": "페이스북 메시지", "topics": ["조국혁신당", "인권·사회"], "tags": ["페이스북"], "preview": "2025.12.18. 조국 대표 페이스북 메시지  국회환경노조원분들의 노고를 덜어들이기 위해 조국혁신당 당대표실 쓰레기 처리 체계를 바꾸었습니다. 개인별 쓰레기통을 퇴근 전 모두 비우고 분리수거해놓습니다. 그러면 노조원들이 다음 날 새벽 출근하여 분리수거 처리하시면 됩니다.", "content": "2025.12.18. 조국 대표 페이스북 메시지\n\n국회환경노조원분들의 노고를 덜어들이기 위해 조국혁신당 당대표실 쓰레기 처리 체계를 바꾸었습니다. 개인별 쓰레기통을 퇴근 전 모두 비우고 분리수거해놓습니다. 그러면 노조원들이 다음 날 새벽 출근하여 분리수거 처리하시면 됩니다."}, {"id": 140, "filename": "2025.12.17. 조국 대표 페이스북 메시지 정보사 부지 관련.txt", "title": "조국 대표 페이스북 메시지 정보사 부지 관련", "date": "2025-12-17", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당", "민생·경제"], "tags": ["페이스북", "부동산"], "preview": "2025.12.17. 조국 대표 페이스북 메시지  국민의힘 소속 서울 서초구 지역구 조은희 국회의원(서초구청장 출신)께서 내가 고품질 공공임대주택을 지을 수 있는 부지로 지목한 정보사 부지가 2019년부터 민간기업 소유이라고 지적하면서 공공임대주택 부지로 쓸 수 없음을 지적하셨다.  내가 확인하지 못했다. 지적에 감사하다. 2019년 이후 검찰 수사와 재판을 감당하느라 그 사실을 알지 못했고, 2022년 이후 관악구에 살고 있어 잊고 있었지만,...", "content": "2025.12.17. 조국 대표 페이스북 메시지\n\n국민의힘 소속 서울 서초구 지역구 조은희 국회의원(서초구청장 출신)께서 내가 고품질 공공임대주택을 지을 수 있는 부지로 지목한 정보사 부지가 2019년부터 민간기업 소유이라고 지적하면서 공공임대주택 부지로 쓸 수 없음을 지적하셨다.\n\n내가 확인하지 못했다. 지적에 감사하다. 2019년 이후 검찰 수사와 재판을 감당하느라 그 사실을 알지 못했고, 2022년 이후 관악구에 살고 있어 잊고 있었지만, 글을 올리기 전에 점검했어야 했다. \n그러나 내 제안의 취지는 변함이 없다. 서초구 정보사 부지는 국방부가 민간기업에 매각할 것이 아니라, LH 등에 넘기고 그곳에 고품질 공공임대주택 단지를 조성했어야 했다. 다시 말한다. 강남 3구, 마용성, 성남 등등의 요지에 국가 또는 지방자치단체 소유 부지가 있다. 이곳에 고품질 공공임대주택 단지를 만들어야 한다."}, {"id": 141, "filename": "2025.12.17. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-17", "category": "페이스북 메시지", "topics": ["내란·윤석열"], "tags": ["페이스북", "윤석열"], "preview": "2025.12.17. 조국 대표 페이스북 메시지  한동훈, 어디서 주워들은 이야기를 진짜처럼 “개똥 같은 소리”를 말하고, 경향신문은 이를 검증하지 않고 실었다. 이 기사를 보고 정식 항의하여 노란색 부분이 추가되었다. 윤건영 의원도 항의했나 보다. 이 인터뷰에서 한동훈은 가소롭게도 자신이 무결점 무오류의 인간인냥 말한다. 그런데 한동훈에 대한 경향의 질문은 무뎠다. 한동훈 말대로, “윤석열이 한동훈을 업어키우진 않았다”, 그러나 한동훈은 윤석...", "content": "2025.12.17. 조국 대표 페이스북 메시지\n\n한동훈, 어디서 주워들은 이야기를 진짜처럼 “개똥 같은 소리”를 말하고, 경향신문은 이를 검증하지 않고 실었다. 이 기사를 보고 정식 항의하여 노란색 부분이 추가되었다. 윤건영 의원도 항의했나 보다. 이 인터뷰에서 한동훈은 가소롭게도 자신이 무결점 무오류의 인간인냥 말한다. 그런데 한동훈에 대한 경향의 질문은 무뎠다. 한동훈 말대로, “윤석열이 한동훈을 업어키우진 않았다”, 그러나 한동훈은 윤석열의 ‘꼬붕’이었음은 명백하다."}, {"id": 142, "filename": "2025.12.17. 조국혁신당 페이스북 메시지.txt", "title": "조국혁신당 페이스북 메시지", "date": "2025-12-17", "category": "페이스북 메시지", "topics": ["내란·윤석열", "조국혁신당"], "tags": ["페이스북", "윤석열"], "preview": "2025.12.17. 조국 대표 페이스북 메시지  한동훈, 어디서 주워들은 이야기를 진짜처럼 “개똥 같은 소리”를 말하고, 경향신문은 이를 검증하지 않고 실었다. 이 기사를 보고 정식 항의하여 노란색 부분이 추가되었다. 윤건영 의원도 항의했나 보다. 이 인터뷰에서 한동훈은 가소롭게도 자신이 무결점 무오류의 인간인냥 말한다. 그런데 한동훈에 대한 경향의 질문은 무뎠다. 한동훈 말대로, “윤석열이 한동훈을 업어키우진 않았다”, 그러나 한동훈은 윤석...", "content": "2025.12.17. 조국 대표 페이스북 메시지\n\n한동훈, 어디서 주워들은 이야기를 진짜처럼 “개똥 같은 소리”를 말하고, 경향신문은 이를 검증하지 않고 실었다. 이 기사를 보고 정식 항의하여 노란색 부분이 추가되었다. 윤건영 의원도 항의했나 보다. 이 인터뷰에서 한동훈은 가소롭게도 자신이 무결점 무오류의 인간인냥 말한다. 그런데 한동훈에 대한 경향의 질문은 무뎠다. 한동훈 말대로, “윤석열이 한동훈을 업어키우진 않았다”, 그러나 한동훈은 윤석열의 ‘꼬붕’이었음은 명백하다."}, {"id": 143, "filename": "2025.12.16 김영삼사저 방문 조국 대표 현장발언.txt", "title": "김영삼사저 방문 조국 대표 현장발언", "date": "2025-12-16", "category": "현장발언", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "교육", "윤석열"], "preview": "2025.12.16 김영삼사저 방문 조국 대표 현장발언  김덕룡 이사장님께서 따뜻한 환영의 말씀해 주셔서 너무 감사드립니다.  제가 조국혁신당을 창당하고 난 직후부터  저는 김대중 대통령과 김영삼 대통령님의 정신을 잇겠다고 공언을 해 왔습니다. 두 분의 정신을 모두 이어야 한다고 생각해 왔고  최근에 이사장님들 민추협 행사에서 인사드렸습니다마는  저는 제가 아직도 기억이 나는 게 제가 대학생 시절  전두환 독재 정권 시절에 두 분의 대통령이 힘...", "content": "2025.12.16 김영삼사저 방문 조국 대표 현장발언\n\n김덕룡 이사장님께서 따뜻한 환영의 말씀해 주셔서 너무 감사드립니다.\n\n제가 조국혁신당을 창당하고 난 직후부터 \n저는 김대중 대통령과 김영삼 대통령님의 정신을 잇겠다고 공언을 해 왔습니다.\n두 분의 정신을 모두 이어야 한다고 생각해 왔고 \n최근에 이사장님들 민추협 행사에서 인사드렸습니다마는 \n저는 제가 아직도 기억이 나는 게 제가 대학생 시절 \n전두환 독재 정권 시절에 두 분의 대통령이 힘을 합치셔가지고 \n민추협 만들었을 때의 그 어떤 희망 기쁨을 아직도 기억하고 있습니다.\n그 정신이 지금까지 이어져야 한다고 생각하고 있고요.\n\n그래서 창당을 했을 때 작년 3월 31일인데 \n그 당시 많은 분들이 좀 의아해했었는데 \n제가 거제에 김영삼 대통령 생가를 방문했었습니다.\n근데 왜 갑자기 이제 진보 성향이라고 알고 있는데 \nYS 생가를 왜 가냐 이런 말도 하더라고요.\n\n저는 그때부터 DJ YS 모두를 우리가 이어야 된다라는 생각을 갖고 있었고요.\n그리고 물론 그 뒤로 또 김대중 대통령님 생가 하이도도 방문을 했었습니다.\n두 분 모두가 대한민국 민주 발전에 민주 발전을 이룬 거인이다라고 생각을 하고 있습니다.\n\n이사장님께서 말씀하셨습니다만 저희가 진보 성향인 건 맞습니다.\n그리고 김영삼 대통령께서 말씀하셨듯이 \n중도 보수 또 온건 보수의 지향을 갖는 분이라는 걸 알고 있습니다마는 \n유신 때부터 전두환 독재 시절까지 김영삼 대통령께서 \n민주주의 회복을 위해 쌓아왔던 그 결기 만큼은 \n제가 항상 배워야 된다 생각하고 있습니다.\n\n사적으로는 제가 부산 대신동에 태어나서 대신동에서 자랐습니다.\n대신동이 어떤 지역이신지 너무 잘 아실 것 같고 \n어린 시절에 김영삼 대통령님의 당시 포스터를 보고 자라다 보니까 \n경남고등학교 근처입니다.\n저희 집이 그래서 그런 어릴 때 영향도 좀 있었던 게 아닌가 싶습니다.\n\n그리고 실제 이와 별도로 김영삼 대통령님께서 대통령 되시고 난 뒤에 \n했던 주요한 결단이 있는데 그 결단이 없었더라면 \n우리나라가 어떻게 됐을까를 몇 가지 생각해 봅니다.\n\n하나는 하나회에 대한 과감한 숙청 \n그것으로서 군사 쿠데타가 근절된 거 아니겠습니까?\n그리고 금융실명제도 전격적으로 시행하셨습니다.\n이 두 가지 조치만 보더라도 그 두 가지 조치로 인해서 \n대한민국의 어떤 민주주의 회복 \n그리고 우리 사회의 투명화를 반석에 올리셨다라고 생각하고 있습니다.\n그래서 저는 그 하나회 척결 금융실명제 단행 이런 것들이 \n대한민국 헌정사의 아주 거대한 전환점이었다라고 생각합니다.\n\n특히 최근에 윤석열 내란으로 인해서 온갖 생각이 드는데 \n이 내란 윤석열 내란 일당이 아직도 지금 돌아다니고 있고 \n목소리를 높이고 있는 것 같습니다.\n\n물론 군사 쿠테타는 아니었지만 김영삼 대통령께서 살아계셨다면 \n이런 내란에 대해서 어떤 말씀을 하셨을까 하는 생각도 해보게 되고 \n또 윤석열, 김건희 이 두 부부에 의한 \n각종 부패와 전횡에 대해서도 어떤 말씀하셨을지 한번 생각해 봅니다.\n\n저는 제가 정치를 한 지 얼마 안 됐습니다마는 \n정치를 시작할 때부터 김영삼 대통령님의 \n유명한 말씀 대도무문의 정신 큰 길을 가면 걸릴 문이 없다는 것이죠.\n\n그런 큰 정치를 하겠다는 마음으로 감히 그런 마음을 먹고 시작을 했습니다.\n아직 저희가 작은 정당이긴 하나 굳이 정파적 기준으로 \n사람을 가리지 않고 또 어르신들을 가리지 않고 \n큰 정치를 해보려고 노력합니다.\n많이 가르쳐 주시면 좋겠습니다. 감사합니다."}, {"id": 144, "filename": "2025. 12. 15. 조국혁신당 청년 당원 입당식 환영사.txt", "title": "조국혁신당 청년 당원 입당식 환영사", "date": "2025-12-15", "category": "기타", "topics": ["조국혁신당", "민생·경제", "외교·안보"], "tags": ["민생"], "preview": "2025. 12. 15. 조국혁신당 청년 당원 입당식 환영사  안녕하십니까, 조국혁신당 대표 조국입니다. 청년 당원 여러분, 반갑습니다. 청년의 시간, 혁신의 시작! 조국혁신당에 오신 것을 환영합니다.  오늘 이 자리는 특별합니다. 영화감독, 회사원, 북한이탈주민, 기자, 행정사 등등 다른 길을 걸어온 청년들이 한자리에 모였습니다.  많은 사람들이 청년을 “우리의 미래”라고 말합니다. 그러나 청년은 ‘아직 오지 않은 미래’가 아니라, 지금 이 ...", "content": "2025. 12. 15. 조국혁신당 청년 당원 입당식 환영사\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n청년 당원 여러분, 반갑습니다.\n청년의 시간, 혁신의 시작! 조국혁신당에 오신 것을 환영합니다.\n\n오늘 이 자리는 특별합니다.\n영화감독, 회사원, 북한이탈주민, 기자, 행정사 등등\n다른 길을 걸어온 청년들이 한자리에 모였습니다.\n\n많은 사람들이 청년을 “우리의 미래”라고 말합니다.\n그러나 청년은 ‘아직 오지 않은 미래’가 아니라,\n지금 이 사회를 각자의 자리에서 떠받치는 현재입니다.\n그래서 저는 ‘청년은 미래’라는 말을 바꾸고 싶습니다.\n청년은 현재이어야 합니다. \n\n지금 청년이 주역으로 살기엔 너무 힘듭니다.\n주거비, 빚, 부족한 일자리와 불안정한 노동,\n수도권 집중과 지역 격차까지,\n청년의 어려움은 개인 문제가 아니라 \n사회가 만든 구조의 문제입니다.\n구조를 바꾸는 것이야말로 우리 정치가 할 일입니다.\n\n그런데 우리 정치는 어떻습니까?\n청년을 말하면서도, 청년의 실제 삶을 뒤로 유보해온 정치가\n오래 계속됐습니다.\n\n조국혁신당은 그 길을 가지 않겠습니다.\n우리는 청년 정치를 표 모으기가 아니라, \n청년이 진짜 정치를 하는 길을 열겠습니다.\n\n청년이 정책의 대상이 아니라 설계자가 되고, \n참여자가 아니라 결정자가 되도록 하겠습니다.\n오늘 이곳에 계신 여러분은 \n조국혁신당의 현재이며, 주역입니다.\n\n대표로서 저부터 여러분의 시작을 뒷받침하겠습니다.\n청년의 이야기가 회의록에만 남기지 않고,\n공약이 되고, 입법이 되고, 예산이 되고, 제도가 되도록 책임지겠습니다.\n여러분과 함께 청년이 현재를 바꾸는 정치를 시작하겠습니다.\n\n다시 한번 진심으로 환영합니다.\n감사합니다.    /끝/"}, {"id": 145, "filename": "2025. 12.15 제8차 최고위원회의 대표 모두발언.txt", "title": "제8차 최고위원회의 대표 모두발언", "date": "2025-12-15", "category": "최고위원회", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["최고위"], "preview": "2025. 12.15 제8차 최고위원회의 대표 모두발언 안녕하십니까, 조국혁신당 대표 조국입니다.  얼마 전 대장동 1심 판결 후 검찰이 항소를 포기하자 극우보수 진영에서 맹비난이 나왔습니다. 대장동 일당의 범죄 수익 환수를 포기했다는 것입니다. 엊그제 국민의힘은 국정조사 및 ‘대장동 범죄수익 환수 특별법’을 발의했습니다.  범죄 수익 환수 문제에 대해 저는 오래전부터 소신을 갖고 대안을 제시한 바 있습니다. 2019년 법무부 장관 후보 시절부...", "content": "2025. 12.15 제8차 최고위원회의 대표 모두발언\n안녕하십니까, 조국혁신당 대표 조국입니다.\n\n얼마 전 대장동 1심 판결 후 검찰이 항소를 포기하자\n극우보수 진영에서 맹비난이 나왔습니다.\n대장동 일당의 범죄 수익 환수를 포기했다는 것입니다.\n엊그제 국민의힘은 국정조사 및 ‘대장동 범죄수익 환수 특별법’을 발의했습니다.\n\n범죄 수익 환수 문제에 대해 저는 오래전부터 소신을 갖고 대안을 제시한 바 있습니다.\n2019년 법무부 장관 후보 시절부터 ‘독립몰수제’를 도입할 것을 제안했습니다.\n\n현행법으로는 범죄수익을 몰수하지 못하는 경우가 있습니다.\n피고인이 사망하거나, 해외로 도피하거나, 소재가 불분명할 때입니다.\n유죄 판결 선고 이후 드러난 범죄수익도 손을 못 대는 경우가 많습니다.\n그래서 전두환 같은 학살자가 “전 재산이 29만 원”뿐이라고 버텨도,\n가족 명의로 빼돌린 범죄수익을 환수하지 못한 것 아닙니까?\n대장동 사건의 경우 현행법에 따르면, \n피해자인 성남시가 민사소송을 통해 손해액을 환수해야 하는데, \n이 경우 소송 확정까지 오랜 시간이 걸립니다.\n\n‘독립몰수제’가 있으면 달라집니다.\n유죄 선고가 나지 않았더라도 범죄로 인해 발생한 수익임이 명백하다면,\n형사 재판과 독립해서 범죄수익 추징을 진행할 수 있습니다. \n우리나라와 같은 독일이나 스위스 등 대륙법계 국가에 이미 도입돼 있습니다.\n\n2019년 당시 제가 이를 제안하자 “이미 추진 중인 것이다”,\n이렇게 비난했던 이들이 있었습니다.\n그런데 6년이 지난 지금도 ‘독립몰수제’는 도입되지 않고 있습니다.\n세월호 사건에서 유병언 씨 사망 당시 잠깐 주목받았지만,\n그 뒤 흐지부지됐습니다.\n\n법무부 장관과 여당 대표 시절 ‘독립몰수제’ 도입에 대해서는 일언반구도 않던\n한동훈 씨는 검찰의 대장동 항소 포기를 비난하고 나섰습니다.\n무속에 심취한 부패한 사또 부부를 극진히 모시던 형방(刑房)이 자신이 팽(烹) 당하자,\n그제서야 꽹과리 치는 격입니다.\n사또 자리 차지하려고 몸값 올리기에 급급한 꼴입니다. \n\n조국혁신당은 ‘독립몰수제’ 도입에 나서겠습니다.\n범죄수익은닉규제법에 ‘독립몰수’ 규정을 신설하고,\n피고인 사망, 해외 도피, 소재 불분명, 피의자 불특정 등에 적용하면 됩니다.\n\n‘유죄 판결 선고 이후 드러난 범죄수익’,\n‘기소 또는 선고 당시 재산 범죄의 피해액을 특정하기 어려운 경우’도\n요건으로 넣겠습니다.\n이 경우 형사 재판과 별도로 대장동 일당의 범죄수익 추징이 가능해집니다.\n대장동 사건에서 검찰은 추징금 7,814억 원을 구형했지만,\n법원은 473억 원만 추징금으로 선고했습니다.\n법원은 범죄 피해가 있었다는 점은 분명하나,\n특정하기 어려워 피해액을 산정하지 못한다고 밝혔습니다.\n\n이는 여야, 진보보수의 문제가 아니었고, 지금도 아닙니다.\n부패 근절과 방지에 꼭 필요한 제도개선 사안입니다.\n정성호 법무부 장관, 박균택, 백혜련 등 민주당 의원들도\n독립몰수제 도입 필요성을 말한 바 있습니다. \n일부 국민의힘 의원들도 동의했던 것으로 기억납니다.\n속내가 뻔한 ‘대장동 환수 특별법’ 대신,\n모든 범죄에 적용하는 독립몰수제 도입에 찬성할 것을 촉구합니다.\n\n이 제도가 도입되면 캄보디아 납치 범죄단체, ‘N번방 성 착취물’ 사건 등\n이런 흉폭한 범죄인들의 수익도 몰수할 수 있게 됩니다.\n김건희 씨 집안 범죄수익의 국고 환수도 더 효율적으로 진행할 수 있습니다.\n법안 준비도 매우 간단합니다.\n이번 12월 임시국회 내에서 처리할 수도 있습니다. \n이 문제만큼은 정파적으로 접근하지 말고\n가장 효율적이고 가장 근본적인 대안을 마련하는 데 뜻을 모읍시다.           /끝/"}, {"id": 146, "filename": "2025.12.14 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-14", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["5.18", "페이스북", "윤석열", "지방선거", "내란", "개헌"], "preview": "2025.12.14 조국 대표 페이스북 메시지  12월 14일! 국회가 ‘내란 수괴 대통령 윤석열 탄핵소추안‘을 가결한 지 1년입니다.  그날의 탄핵안 통과는 응원봉 시민의 함성에 국회가 응답한 결과였습니다. 4·19부터 5·18, 6·10, 촛불혁명, 응원봉 혁명까지 광복 후 약 80년 동안 우리 민주주의는 어떤 불의도 용납하지 않았습니다. 12월 14일은 민주주의 강국 대한민국의 힘을 전 세계에 보여준 역사적인 날입니다.  그러나 1년이 지...", "content": "2025.12.14 조국 대표 페이스북 메시지\n\n12월 14일! 국회가 ‘내란 수괴 대통령 윤석열 탄핵소추안‘을 가결한 지 1년입니다. \n그날의 탄핵안 통과는 응원봉 시민의 함성에 국회가 응답한 결과였습니다. 4·19부터 5·18, 6·10, 촛불혁명, 응원봉 혁명까지 광복 후 약 80년 동안 우리 민주주의는 어떤 불의도 용납하지 않았습니다. 12월 14일은 민주주의 강국 대한민국의 힘을 전 세계에 보여준 역사적인 날입니다. \n그러나 1년이 지난 지금도 내란 수괴 윤석열은 내란의 술독에 빠져 내란의 정당성을 강변하고 있습니다. 내란 잔당 국민의힘은 내란의 숙취에 깨어나지 않고 극우본당으로 활개치고 있습니다. \n그나마 지난 12월 3일, 국민의힘 25명의 의원이 용기를 냈습니다. 불법 계엄에 사과했고, 윤석열과의 단절을 선언했습니다. \n윤석열 국회 탄핵 1주년인 오늘, 저는 25명의 국회의원에게 정중히 제안합니다.\n극우본당에서 뛰쳐나오십시오! 새로운 보수정당을 창당하십시오!\n국민에게 총을 겨눈 정당에서 도대체 어떤 정치를 하겠다는 것입니까? “당 안에서 혁신하겠다”는 말은 “국회의원직만은 유지하겠다”는 비겁한 자기변명에 불과합니다. 김상욱 의원의 건강한 보수 정치의 용기를 본받기를 바랍니다. 25명이니 원내교섭단체도 가능합니다.\n여러분 스스로 잘 알고 있을 것입니다. 국민의힘은 내란과 결별하지 못하고 있습니다. 김영삼의 뿌리를 파내고, 전두환의 나무를 심는 정당으로 변질됐습니다. 윤석열, 황교안, 전광훈의 정당으로 전락했습니다. \n대한민국 정치에 필요한 건, 헌법과 민주주의를 지키는 상식적인 보수입니다. 보수의 이름으로, 지금 당장 극우본당과 결별하십시오.\n내란 극우 세력은 \"몇 년만 지나면 국민들은 잊는다\"고 속삭일 것입니다. \"우리의 텃밭이 계엄을 지지하니 참아라\"는 지역주의의 유혹도 있을 겁니다. \n여러분이 두려워해야 할 대상은 특정 지역의 힘이 아니라, 대한민국 국민들의 힘입니다. 국민들이 나서면 ’제로‘가 되지 않는 불의는 없습니다. \n고동진 의원님, 권영진 의원님, 김건 의원님, 김성원 의원님, 김소희 의원님, 김용태 의원님, 김재섭 의원님, 김형동 의원님, 박정하 의원님, 박정훈 의원님, 배준영 의원님, 서범수 의원님, 송석준 의원님, 신성범 의원님, 안상훈 의원님, 안철수 의원님, 엄태영 의원님, 우재준 의원님, 유용원 의원님, 이상휘 의원님, 이성권 의원님, 정연욱 의원님, 조은희 의원님, 진종오 의원님, 최형두 의원님!\n탈당하십시오! 그리고 새롭게 시작하십시오! \n오늘, 전국의 조국혁신당 당원들은 13:00부터 한 시간 동안 “윤 어게인”을 외치는 국민의힘 82명 의원에 대한 항의 시위를 동시다발적으로 진행합니다. \n82개 국회의원 지역구 사무실 앞에서 피켓 시위를 벌이고, 국민의 분노가 담긴 항의 서한을 전달할 것입니다. \n조국혁신당은 묻겠습니다. 12·3 불법 비상계엄 시도가 명백한 내란 행위였음을 인정하는지, 윤석열과 극우 세력과 단절할 의사가 있는지, 지금이라도 국민 앞에 사죄할 의사가 있는지를 똑똑이 묻겠습니다.\n이마저 침묵하거나 거부한다면, 조국혁신당은 내란 정당에 걸맞은 책임을 지게 만들 것입니다. 쇄빙선이 되어 검찰독재 정권을 무너뜨렸듯이, 망치선이 되어 극우본당 국민의힘을 제로로 소멸시키겠습니다. 지방선거에서 윤석열 잔당을 뿌리 뽑겠습니다. \n국민 여러분, \n탄핵 이전과 탄핵 이후의 정치는 완전히 달라야 합니다. 내란 청산 이후의 희망을 만드는 것이 국민의 내란 트라우마를 진정으로 치유하는 길입니다. \n조국혁신당은 국민의힘을 탄핵하고, 승자독식 선거제도를 탄핵하고, 신자유주의 경제체제를 탄핵하고, 국민을 고통 속에 몰아넣는 삶의 불평등을 탄핵하는 쇄빙선이 되겠습니다.\n행복이 권리가 되는 나라, 그 제7공화국의 문을 국민들과 반드시 열겠습니다. \n2025년 12월 14일 \n조국혁신당 대표 조국"}, {"id": 147, "filename": "2025.12.12 개혁진보4당 민주당 대표 면담 인사말씀.txt", "title": "개혁진보4당 민주당 대표 면담 인사말씀", "date": "2025-12-12", "category": "기타", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란"], "preview": "2025.12.12 개혁진보4당 민주당 대표 면담 인사말씀  바쁘신 와중에 조국혁신당을 비롯한 개혁진보 4당과 만남에  응해주신 정청래 대표님께 깊이 감사 인사드립니다.   지난해 내란의 밤, 우리는 이곳 국회에서 함께 투쟁한 동지입니다. 그때 우리 민주주의가 불안하다는 사실을 생생하게 체험하며 전율했습니다. 내란은 막았지만, 내란을 불러온 낡은 정치는 여전합니다. 다시는 어둠이 민주주의를 삼키지 못하도록 정치 판을 새로 짜야 합니다. 내란 종...", "content": "2025.12.12 개혁진보4당 민주당 대표 면담 인사말씀\n\n바쁘신 와중에 조국혁신당을 비롯한 개혁진보 4당과 만남에 \n응해주신 정청래 대표님께 깊이 감사 인사드립니다. \n\n지난해 내란의 밤, 우리는 이곳 국회에서 함께 투쟁한 동지입니다.\n그때 우리 민주주의가 불안하다는 사실을 생생하게 체험하며 전율했습니다.\n내란은 막았지만, 내란을 불러온 낡은 정치는 여전합니다.\n다시는 어둠이 민주주의를 삼키지 못하도록 정치 판을 새로 짜야 합니다.\n내란 종식의 마무리는 정치개혁입니다.\n\n국회 정치개혁특별위원회가 가동을 앞두고 있습니다. 늦었지만, 환영합니다. \n다만, 정개특위 안에서 다양한 목소리가 민주당과 시너지를 낼 수 있도록,\n합리적 위원 배분을 기대합니다.\n\n그리고 지역위원회 또는 지역당 부활 등 양대 정당의 관심 사안 위주로만\n정개특위 논의가 진행될 수 있다는 걱정도 있습니다.\n폭설에 응원 봉을 들었던 \n국민들은 지역당 또는 지역위원회 부활을 요구한 적이 없습니다.\n정개특위 안에서 지역당 또는 지역위원회 부활 외에도\n민심을 정확하게 반영하고 \n민주주의의 기반을 넓히기 위한 논의가 이뤄지길 희망합니다.\n\n정청래 대표님께 정중히 부탁드립니다.\n먼저, 정개특위에서 민주당을 포함한 개혁 5당과 시민사회가 맺은 원탁회의 합의문을\n최우선으로 논의하고 실현되도록 노력해주십시오.\n지금 국회의사당 밖에서 텐트를 친 저 내란 잔당의 반대가 격할수록\n그에 반비례해서 우리 국민과 정치에 꼭 필요한 것입니다.\n이재명 정부의 성공과 민주 정부 재창출의 초석임은 분명합니다.\n조국혁신당, 그리고 진보개혁 정당들과 함께 가야 이길 수 있다고 믿습니다.   /끝"}, {"id": 148, "filename": "2025.12.12 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-12", "category": "페이스북 메시지", "topics": ["내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["내란", "교육", "페이스북", "윤석열"], "preview": "2025.12.12 조국 대표 페이스북 메시지 <육군사관학교에 김오랑 중령의 동상을 세워야 합니다>   12월 12일, 전두환 신군부가 군사 반란을 일으킨 지 46년이 지났습니다. 그날 밤, 김오랑 중령은 반란군의 회유를 거부하고 상관을 보호하다 반란군의 총탄에 전사했습니다. 아내 백영옥 씨는 노무현 의원과 장기욱 변호사 등의 도움으로 국가배상 소송을 진행하는 등 남편의 명예 회복을 위해 싸우다 생애를 마쳤습니다.  마침내 올해 8월, 김오랑 ...", "content": "2025.12.12 조국 대표 페이스북 메시지\n<육군사관학교에 김오랑 중령의 동상을 세워야 합니다> \n\n12월 12일, 전두환 신군부가 군사 반란을 일으킨 지 46년이 지났습니다.\n그날 밤, 김오랑 중령은 반란군의 회유를 거부하고 상관을 보호하다 반란군의 총탄에 전사했습니다. 아내 백영옥 씨는 노무현 의원과 장기욱 변호사 등의 도움으로 국가배상 소송을 진행하는 등 남편의 명예 회복을 위해 싸우다 생애를 마쳤습니다. \n마침내 올해 8월, 김오랑 중령의 유족에게 국가 손해배상 판결이 나왔습니다. 지연된 정의이지만, 반세기 만에 군사 쿠데타가 재연된 터라 판결의 의미는 더욱 무겁습니다. \n목숨을 걸고 저항한 김오랑 중령은 ‘제복 입은 시민’의 본보기입니다. 그 희생이 바탕이 되어 전두환 신군부의 ‘성공한 쿠데타’를 단죄했고, 윤석열의 ‘친위 쿠데타’를 막아낼 수 있었습니다.\n이제 육군사관학교에 김오랑 중령의 동상을 세워야 합니다. \n‘김오랑 기념사업회’와 유족이 동상 건립을 추진하고 있지만, 육사는 “졸업생 중 특정 인물만을 위한 동상은 형평성에 문제가 있다”며 거부하고 있습니다.\n내란에 맞서 싸우다 전사한 자랑스러운 육사 졸업생에게 ‘형평성’을 운운합니다. 육사가 그런 말을 할 자격이 있습니까? 공을 세운 졸업생은 높이고, 내란을 일으킨 졸업생은 지우는 것이 형평성입니다. \n육사는 윤석열 내란 정부 시절 홍범도 장군 흉상을 철거하려 했습니다. 독립운동의 정신을 지우려 했습니다. 아직도 육사는 12·12 내란의 우두머리 전두환·노태우, 그리고 12·3 내란범 김용현과 충암파를 배출한 오명을 스스로 씻겠다는 의지를 보여주지 못하고 있습니다. 참으로 부끄러운 일입니다.\n국민들은 질문합니다. “육사에 김오랑 동상이 있었다면, 12.3 내란 때 육사 출신들이 가담할 수 있었을까?” \n김오랑 동상은 후배 생도와 장병들이 ‘제복 입은 시민’의 정신을 계승하고, 12·3 내란의 교훈을 새기는 역사 교육의 현장이 될 것입니다. \n정부는 더 이상 이 문제를 육사에 맡겨서는 안 됩니다. 정부의 손으로 김오랑 동상을 세워야 합니다. \n최근 내란 재판에 증인으로 나온 한 중령은 내란범 김용현의 면전에서 이렇게 말했습니다. “저는 군인의 제복은 특정 권력의 사병이 될 때 입으라는 것이 아니라 국민의 방패가 되기 위해서 입어야 될 수의라고 생각합니다.” 이것이 바로 김오랑의 정신이자 육군의 뿌리인 광복군의 정신입니다. \n조국혁신당은 김오랑 중령의 동상 건립에 힘을 보태겠습니다. 김오랑 중령의 숭고한 정신을 기리며 완전한 내란 청산을 향해 끝까지 가겠습니다.\n故 김오랑 중령의 명복을 빕니다.\n2025년 12월 12일 \n조국혁신당 대표 조국"}, {"id": 149, "filename": "2025.12.11 개혁진보4당 정치개혁 연석회의-우원식 의장.txt", "title": "개혁진보4당 정치개혁 연석회의-우원식 의장", "date": "2025-12-11", "category": "기타", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란"], "preview": "2025.12.11 개혁진보4당 정치개혁 연석회의-우원식 의장 면담  조국혁신당을 비롯한 오늘 개혁진보 4당이 의장님을 뵙고 논의했고, 정리했던 공동 요구안을 말씀드리고자 왔습니다. 의장님께서 정치개혁이라는 소신을 갖고 계신 걸 잘 알고 있습니다. 어제 정개특위 합의가 이루어졌는데, 늦었지만 기쁜 마음입니다.  아시다시피 지난 대선 전에 민주당을 포함해서 개혁 5당이 시민사회와 함께 합의문을 만들었습니다. 3번에 걸친 선언문이 있었는데, 그 내...", "content": "2025.12.11 개혁진보4당 정치개혁 연석회의-우원식 의장 면담\n\n조국혁신당을 비롯한 오늘 개혁진보 4당이\n의장님을 뵙고 논의했고, 정리했던 공동 요구안을 말씀드리고자 왔습니다.\n의장님께서 정치개혁이라는 소신을 갖고 계신 걸 잘 알고 있습니다.\n어제 정개특위 합의가 이루어졌는데,\n늦었지만 기쁜 마음입니다.\n\n아시다시피 지난 대선 전에 민주당을 포함해서\n개혁 5당이 시민사회와 함께 합의문을 만들었습니다.\n3번에 걸친 선언문이 있었는데, 그 내용 익히 아실 것이라고 생각합니다.\n합의문을 실천하는 것이 내란을 격퇴하고 민주헌정을 회복했던\n응원봉 유권자들의 민의를 온전히 반영하는 것이라고 생각하고 있습니다.\n\n정개특위가 구성돼 가동될 것인데,\n만약 정개특위에서 단지 거대 정당의 요구사항, 희망사항만 관철된다면\n‘정치개혁인가’ 근본적인 의문이 있습니다.\n두 정당은 정치개혁 내용 중에 지구당 부활을 내세우고 있습니다.\n응원봉이 들었던 국민들이 지난 대선 내란·계엄 전에\n지구당 부활을 외친 적이 한 번도 없는 것 같습니다.\n양당은 정치개혁의 내용으로 지구당 부활을 많이 말씀하시는데,\n\n저는 민의에 비춰봐도 충돌한다고 생각합니다.\n지구당 부활은 충분히 논의해볼 수 있다. 그\n렇지만 그것만을 이야기하는 것은 아니다 생각합니다.\n\n민주당을 포함한 5당이 합의했던 합의문에 기초한 논의가 이루어지길 바랍니다.\n그렇게 돼야 정치개혁이 이루어지고, 내란이 완전히 청산되며,\n다양한 국민들의 의사가 여의도에 반영되고\n민주주의의 폭과 넓이가 깊어지고 더 넓어질 것이라 생각합니다.\n\n의장님께서 주도하셔서 정개특위에서 선언문의 합의사항이\n잘 반영되도록 노력해주시길 간곡히 희망합니다.\n\n/끝/"}, {"id": 150, "filename": "2025.12.11. 제7차 최고위 모두발언.txt", "title": "제7차 최고위 모두발언", "date": "2025-12-11", "category": "최고위원회", "topics": ["조국혁신당", "인권·사회", "민생·경제"], "tags": ["민생", "부동산"], "preview": "2025.12.11. 제7차 최고위 모두발언 안녕하십니까, 조국혁신당 대표 조국입니다.  최근 ‘2025년 가계금융복지조사’ 결과는 대한민국에 드리워진 불평등 위험도가 임계치에 다다랐음을 보여줍니다. 조사에서 상위 10% 가구가 전체 순자산의 44.4%를 독점했습니다. 하위 50%의 몫은 9.8%에 불과합니다.  부동산 자산 격차는 더욱 심각합니다. 하위 20% 가구의 부동산 평균 자산은 1,033만 원입니다. 보증금 1,000만 원짜리 월세방...", "content": "2025.12.11. 제7차 최고위 모두발언\n안녕하십니까, 조국혁신당 대표 조국입니다.\n\n최근 ‘2025년 가계금융복지조사’ 결과는\n대한민국에 드리워진 불평등 위험도가 임계치에 다다랐음을 보여줍니다.\n조사에서 상위 10% 가구가 전체 순자산의 44.4%를 독점했습니다.\n하위 50%의 몫은 9.8%에 불과합니다.\n\n부동산 자산 격차는 더욱 심각합니다.\n하위 20% 가구의 부동산 평균 자산은 1,033만 원입니다.\n보증금 1,000만 원짜리 월세방입니다.\n반면 상위 20%는 13억 3,828만 원으로, 130배나 됩니다.\n‘부동산 계급 사회’ 또는 ‘부동산 신분 사회’가  고착되고 있습니다.\n\n청년은 더 어렵습니다.\n지난해 기준 19~34세 청년은 한 달에 세전 266만 원을 벌어,\n생활비로만 213만 원을 씁니다.\n이들에게 “내 집 마련”은 이룰 수 없는 꿈이 되었습니다. \n\n세금과 공급 등 땜질 처방으로는 고칠 수 없는 지경입니다.\n이재명 정부와 제22대 국회는 이 문제 해결에 나서야 합니다.\n목숨을 걸고 배달하고, 악착같이 아껴도 전월세를 벗어나지 못하는,\n국민에게 답을 내놓아야 합니다.\n“집 몇 채 더 짓느냐”는 대증 요법을 넘어,\n문제의 근본을 해결하는 답을 제시하고 추진해야 합니다.\n\n첫째, 사는 곳이 계급이 돼서는 안 됩니다.\n부동산 하층계급이 된 서민과 청년은 \n일터와 인프라가 집중된 도심에서 밀려나 외곽을 전전합니다.\n\n서울 강남, 용산, 여의도, 그리고 분당 등 살기 좋은 지역에\n청년과 무주택 서민이 오랜 기간 안심하고 살 수 있는\n고품질 공공임대주택을 공급해야 합니다.\n목이 좋은 국유지에 택지를 조성할 때는\n고품질 공공임대주택을 필수적으로 짓도록 해야 합니다.\n\n둘째, 공공이 조성한 토지 이익은 공공의 이익을 위해 사용되어야 합니다.\n공공이 수용해 만든 택지를 민간 건설사에 그냥 매각해서는 안 됩니다.\n이는 결과적으로 분양 수익을 민간이 독점하는 구조가 됩니다.\n\n악순환을 끊기 위해 ‘토지 주택 은행’ 도입을 검토해야 합니다.\n공공이 토지를 민간에 팔지 않고 비축·보유한 채,\n그 위에 지어진 건물만 분양하거나 장기 임대하는 방식으로\n주거비 거품을 근본적으로 줄여야 합니다.\n\n셋째, 토지 주택 공기업의 공공성을 회복해야 합니다.\n한국토지주택공사는 물론 서울주택도시개발공사, 경기주택도시공사,\n부산도시공사 등 지자체 공기업이 문제입니다.\n이들은 지금 공공성보다 수익성을 우선하고 있습니다.\n\n국가로부터 토지수용권 등 권한을 위임받은 토지주택공사는\n건설업계 물량을 떠안는 ‘매입임대’에 치우쳐 있습니다.\n지자체 산하 공기업도 마찬가지입니다.\n저렴하고 질 좋은 공공주택 직접 건설량을 확대하도록\n공급 방식을 대전환해야 합니다.\n\n여러 번 강조했지만, 다시 역설합니다.\n‘토지공개념’을 되살리고 현실 정책으로 구현해야 합니다.\n부동산 개발이익과 불로소득을 적극 환수해야 합니다.\n이를 재원으로 국가의 도움, 공공 서비스가 필요한 국민에게\n적절하게 배분돼야 합니다.\n조국혁신당은 조만간 ‘토지공개념 3법 재추진 기획단'을 꾸릴 것입니다.\n실현 가능하고 국민 수용성이 높은 방안을 제시할 것입니다.\n\n청년과 서민을 가두는 고통의 부동산 벽을 반드시 깨부수어야 합니다.\n조국혁신당이 가장 먼저 망치를 들겠습니다.\n감사합니다.         /끝/"}, {"id": 151, "filename": "2025.12.11. 최고위원회의-시도당위원장 연석회의 모두발언.txt", "title": "최고위원회의-시도당위원장 연석회의 모두발언", "date": "2025-12-11", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "조국혁신당", "개헌·민주주의"], "tags": ["지방선거", "최고위", "비대위"], "preview": "2025.12.11. 최고위원회의-시도당위원장 연석회의 대표 모두 발언  안녕하십니까, 조국혁신당 대표 조국입니다.  오늘 조국혁신당 최고위원회·시도당위원장 연석회의를 열었습니다. 지난 비상대책위원회에서 제시한 뉴파티 비전, 그중에서도 당원주권 강화, 지역 중심 정당을 만들겠다는 약속을 실천하는 자리입니다.  여기 모이신 시도당위원장님들은 조국혁신당 풀뿌리 민주주의의 뿌리입니다. 민심을 가장 가까이에서 듣고, 혁신의 가지를 넓고 깊게 뻗어 주고...", "content": "2025.12.11. 최고위원회의-시도당위원장 연석회의 대표 모두 발언\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n\n오늘 조국혁신당 최고위원회·시도당위원장 연석회의를 열었습니다.\n지난 비상대책위원회에서 제시한 뉴파티 비전,\n그중에서도 당원주권 강화, 지역 중심 정당을 만들겠다는 약속을 실천하는 자리입니다.\n\n여기 모이신 시도당위원장님들은 조국혁신당 풀뿌리 민주주의의 뿌리입니다.\n민심을 가장 가까이에서 듣고, 혁신의 가지를 넓고 깊게 뻗어 주고 계신 분들입니다.\n\n조국혁신당 뉴파티 비전의 핵심은 분명합니다.\n당원이 주인이고, 지역이 중심이고, 소통과 참여가 일상화되는 정당을 만들겠다는 것입니다.\n시도당의 목소리가 골고루 반영되고, 공동의 결정으로 움직이는 구조를 만들겠습니다.\n오늘의 최고위원회·시도당위원장 연석회의는 그 혁신의 출발점입니다.\n\n그래서 오늘 이 자리를 ‘제2의 최고위원회’라고 부르고 싶습니다.\n중앙당 중심의 좁은 최고위원회를 넘어,\n시도당위원장 연석회의라는 더 넓은 최고 의사결정 구조를 만든 것입니다.\n\n좁은 항로는 앞만 보고 가야 되지만,\n넓은 항해는 더 다양한 목소리와 함께 나아가야 합니다. \n각 지역의 현장 경험과 민심의 결이 함께 모이도록 하곘습니다. \n\n오늘의 자리는 앞으로 정례화하겠습니다.\n분기별로 1회로 생각하고 있습니다. \n나아가 각 지역을 직접 찾아가 순차적으로 현장 연석회의를 준비하고 있습니다. \n\n저는 조국혁신당의 1막을 열며\n여러분께 혁신호의 갑판장, 기관장, 항해사가 되어 달라고 요청드린 바 있습니다.\n여러분 모두 지역의 불평등을 깨는 쇄빙선의 선장이 되어 주셨습니다.\n조국혁신당의 새로운 문화를 만들어 주셨습니다.\n\n조국혁신당은 지금 변화의 길 위에 서 있습니다.\n그것은 선택이 아니라 책임입니다.\n국민의 신뢰와 당원의 온전한 회복을 위해서는\n중앙만이 아니라 지역이, 소수가 아니라 전체 당원이,\n추상적인 비전이 아니라 생활 속 민심이 우리 당의 엔진이 되어야 한다 믿습니다. \n\n내년 지방선거는 바로 그 엔진이 실제로 작동하여\n대한민국을 바꾸는 시작이 되길 바랍니다. \n여러분의 어깨 위에 그 성패가 놓여 있습니다.\n함께 혁신하고, 함께 고민하고, 함께 결정하고, 함께 승리합시다. \n\n여러분은 우리 당의 지도부이자 방향키이며, 변화의 추진력입니다.\n저 역시 여러분과 함께 같은 책임으로 이 길을 걷겠습니다.\n\n감사합니다.   /끝/"}, {"id": 152, "filename": "25.12.10 끝까지간다 특위 모두발언.txt", "title": "끝까지간다 특위 모두발언", "date": "2025-12-10", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "사법개혁", "윤석열", "끝까지간다"], "preview": "25.12.10 끝까지간다 특위 모두발언  안녕하십니까, 조국혁신당 끝까지간다특위 위원장 조국 대표입니다.  저와 조국혁신당은 민주당이 마련한 내란전담특별재판부 설치법안에 위헌 소지가 있음을 지적하고 대안을 제시했습니다.  그러자 일부 급진성향 인사, 민주당 인사, 유튜버들이 마타도어를 전개합니다.  예컨대, ‘조국은 교수 출신이라 실제 법은 모른다’, ‘조국과 조국혁신당이 조희대 법원을 비호하고 내란 척결을 방해한다’, 또는 ‘이재명 정부 발...", "content": "25.12.10 끝까지간다 특위 모두발언\n\n안녕하십니까, 조국혁신당 끝까지간다특위 위원장 조국 대표입니다.\n\n저와 조국혁신당은 민주당이 마련한 내란전담특별재판부 설치법안에\n위헌 소지가 있음을 지적하고 대안을 제시했습니다.\n\n그러자 일부 급진성향 인사, 민주당 인사, 유튜버들이 마타도어를 전개합니다. \n예컨대, ‘조국은 교수 출신이라 실제 법은 모른다’,\n‘조국과 조국혁신당이 조희대 법원을 비호하고 내란 척결을 방해한다’,\n또는 ‘이재명 정부 발목을 잡는다’,\n‘법안에 아무 문제 없는데 정의당식 차별을 전개한다’ 등등….\n참 쉽고 편하게 말합니다.\n\n자신만의 독자적 견해를 내세우며,\n현 법안이 통과되더라도 아무 일어나지 않을 것이라고 호언하기도 합니다.\n또는 재판부가 위헌제청을 하면 그 판사를 탄핵하면 그만이라고 강변합니다.\n참 무책임합니다.\n\n이런 주장이 민주당과 이재명 정부에 진정 도움이 될까요?\n민변, 참여연대 그리고 대통령실까지 조국혁신당과 같은 의견을 제시했습니다.\n민주당 정책 의총의 다수의견도 유사하게 형성된 것으로 압니다. \n\n조희대, 지귀연의 행태에 분노하더라도,\n평균적 법관이 갖고 있는 위헌 판단기준을 무시하면 안 됩니다.\n이 기준은 법관대표자회의에서 재확인됐습니다.\n제가 수차례 강조했지만,\n위헌 제청의 주체는 국회의원이 아니라 당해 재판부입니다.\n위헌제청 판단의 장소도 국회가 아니라 법정입니다. \n\n조국혁신당의 고심에 찬 제안의 의도와 내용을\n왜곡하고 비방하는 속셈이 읽힙니다.\n조국혁신당은 민주당의 우당(友黨)입니다.\n진짜 친구는 잘못을 지적해야 합니다.\n이번에 조국혁신당이 제동을 걸지 않았다면,\n위헌 소지를 가진 법안이 그대로 본회의를 통과했을 것입니다.\n윤석열 일당의 변호인들이 위헌제청을 할 것임은 100%이고,\n재판부는 고민에 빠지게 되었을 것입니다.\n\n쌀을 제대로 씻지 않고 밥을 지으면 돌을 씹다가 이가 깨집니다.\n데시벨을 높여 소리치는 것만이 정치가 아닙니다.\n예견되는 위험을 하나하나 찬찬히 점검하고\n대안을 마련하는 것도 정치의 역할입니다.\n\n조국혁신당은 어떤 비판도 어떤 조롱도 다 감수할 것입니다.\n그러면서 정도(正道)를 걸을 것입니다.\n조국혁신당은 돌을 다 골라내고 제대로 밥을 지을 것입니다.\n이러한 입장이 한국 민주주의의 발전과\n이재명 정부의 성공에 더 큰 도움이 된다고 확신합니다.   /끝"}, {"id": 153, "filename": "2025.12.9 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2025-12-09", "category": "페이스북 메시지", "topics": ["내란·윤석열"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2025.12.9 조국 대표 페이스북 메시지  위헌 소지를 없애고 2심부터 가동되도록 하는 것이 정도(正道)입니다.  1월 9일 결심(이 경우 2월 선고)이 이루어지는 지귀연 재판부에 대한 비판이 많고 저도 그러합니다. 그런데 이 법안이 통과되고 재판부가 위헌제청을 하지 않는다고 하더라도(윤석열의 변호인들이 할 것은 100%), (i) 새 재판부로의 이송 여부 결정은 지귀연 재판부가 하고, (ii) 이송 결정 후에는 '법관회의'가 개최되어 추천...", "content": "2025.12.9 조국 대표 페이스북 메시지\n\n위헌 소지를 없애고 2심부터 가동되도록 하는 것이 정도(正道)입니다.\n\n1월 9일 결심(이 경우 2월 선고)이 이루어지는 지귀연 재판부에 대한 비판이 많고 저도 그러합니다. 그런데 이 법안이 통과되고 재판부가 위헌제청을 하지 않는다고 하더라도(윤석열의 변호인들이 할 것은 100%), (i) 새 재판부로의 이송 여부 결정은 지귀연 재판부가 하고, (ii) 이송 결정 후에는 '법관회의'가 개최되어 추천을 받아야 하고(‘법관회의’는 이 법안에 위헌소지가 있다고 발표한 바, 추천이 신속히 이루어질지 미지수), (iii) 추천이 이루어진 후 '공판갱신절차'를 거쳐야 합니다. 이상의 절차는 아무리 빨라도 1월 말 2월 초에 끝납니다. 그리고 재판이 진행됩니다. \n\n이러하기에 저는 내란재판부는 2심부터 가동되어야 한다고 계속 주장해온 것입니다. "}, {"id": 154, "filename": "2025.12.07 제6차 최고위.txt", "title": "제6차 최고위", "date": "2025-12-07", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["최고위", "윤석열", "부동산", "지방선거", "민생", "내란"], "preview": "2025. 12.07 09:30  제6차 최고위원회 모두발언   안녕하십니까, 조국혁신당 대표 조국입니다.  ‘응원봉 주권자’ 국민의 바람을 안은 이재명 정부가 출범한 지 6개월입니다. 대통령실이 자평했듯, 내란으로 무너진 일상을 회복했습니다. 성장과 도약을 위한 출발선에 대한민국을 세웠습니다. 그간의 성과에 조국혁신당은 칭찬을 아끼지 않겠습니다.  지난 대선 때 조국혁신당은 후보를 내지 않았습니다. 공동선대위를 구성해 이재명 후보를 지지했습니...", "content": "2025. 12.07 09:30\n\n제6차 최고위원회 모두발언 \n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n\n‘응원봉 주권자’ 국민의 바람을 안은 이재명 정부가\n출범한 지 6개월입니다.\n대통령실이 자평했듯, 내란으로 무너진 일상을 회복했습니다.\n성장과 도약을 위한 출발선에 대한민국을 세웠습니다.\n그간의 성과에 조국혁신당은 칭찬을 아끼지 않겠습니다.\n\n지난 대선 때 조국혁신당은 후보를 내지 않았습니다.\n공동선대위를 구성해 이재명 후보를 지지했습니다.\n이점에서 이재명 정부는 조국혁신당 정부이기도 합니다.\n이재명 정부 성과는 조국혁신당 성과이기도 합니다.\n\n그렇지만 꼭 지적할 점이 있습니다. \n먼저, 불평등 해소 방안이 눈에 잘 띄지 않습니다.\n국가데이터처(옛 통계청) 국가통계포털(KOSIS)에 따르면, \n지난해 상·하위 근로소득 격차는 약 30배에 달했습니다.\n자산 상위 20% 가구의 평균 자산은\n하위 20% 가구의 평균 자산의 68.6배에 이르렀습니다.\n관련 통계 작성을 시작한 2012년 이후 최대입니다.\n소득보다 자산 격차가 심각해진 것입니다.\n\n부동산이 핵심적 원인입니다.\n현재의 조세와 공급 계획만으로는 부족합니다.\n조국혁신당은 부동산개혁 패키지를 내놓은 바 있습니다.\n토지공개념 3법 제·개정, 보유세 정상화 및 거래세 완화가 필요합니다.\n토지주택은행 설립과 국민 리츠 시행, 고품질 공공임대주택 공급,\n다주택 매도 유도 및 추가 취득 규제도 포함돼 있습니다.\n이 패키지와 행정수도 이전 등 지방균형발전을 함께 추진해야 합니다.\n\n정치개혁은 발도 떼지 못했습니다.\n대선 전 민주당을 포함한 민주개혁 정당들은\n시민사회와 함께 선언문을 마련했습니다.\n대선 직후 교섭단체 요건 완화를 마무리하고,\n결선 투표제를 도입키로 한 바 있습니다.\n\n정치개혁을 이루지 않으면, 무슨 일이 일어날까요?\n국민의힘이 내년 지방선거에서 특정 지역을 중심으로 살아남을 것입니다.\n현행 선거제도는 내란극우 국민의 힘의 연명장치입니다.\n정치개혁은 민생·경제 등과 충돌하는 정책이 아닙니다.\n오히려 민주주의를 탄탄하게 만듭니다.\n내란 청산을 가능하게 하는 촉진제입니다.\n\n내란 종식 및 개혁입법을 둘러싸고 우려가 커졌습니다.\n현재 내란전담재판부 구성 관련법안은 분명 위헌 소지가 있습니다.\n위헌 제청이 이루어지면,\n윤석열 등 내란 일당은 석방될 가능성이 높습니다.\n이 점 강조하고 싶습니다. \n위헌 여부를 판단하여 위헌 제청을 하는 주체는 국회의원이 아닙니다. “위헌 소지가 없다”고 국회의원은 말할 수 있지만, \n위헌 제청의 주체가 아니라는 것입니다. \n이에 입법부는 꼼꼼히 법안을 점검하여 위헌소지 자체를 원천적으로 없애야 합니다. \n\n필리버스터 제한법, 옥외광고물법 개정안, 집시법 개정안,\n정보통신망법 개정안도 마찬가지입니다.\n좋은 취지로 추진한 것임은 잘 압니다.\n그러나 정치적 표현의 자유를 위축하거나\n언론의 자유를 과도하게 제약할 수 있습니다.\n\n이재명 정부는 민주당 힘만으로 세워지지 않았습니다.\n다양하고 다채로운 응원봉을 들고 나온 주권자들의 힘의 결실입니다.\n다양하고 다채로운 국민의 희망과 요구를 기꺼이 껴안아야 합니다.\n그래야 지지기반이 확대됩니다. \n이재명 정부가 성공하고, 민주 정부를 재창출할 수 있습니다.\n그것은 조국혁신당의 한결같은 바람이기도 합니다.     /끝\n\n정치개혁을 이루지 않으면, 무슨 일이 일어날까요?\n국민의힘이 내년 지방선거에서 특정 지역을 중심으로 살아남을 것입니다.\n정치개혁은 민생·경제 등과 충돌하는 정책이 아닙니다.\n오히려 민주주의를 탄탄하게 만듭니다.\n내란 청산을 가능하게 하는 촉진제입니다.\n\n내란 종식 및 개혁입법을 둘러싸고 우려가 커졌습니다.\n현재 내란전담재판부 구성 관련법안은 분명 위헌 소지가 있습니다.\n위헌 제청이 이루어지면,\n윤석열 등 내란 일당은 석방될 가능성이 높습니다.\n위헌 여부를 판단하여 위헌 제청을 하는 주체는 국회의원이 아닙니다. “위헌 소지가 없다”고 주장하는 것은 국회의원의 일이 아닙니다. \n위헌 소지를 아예 없도록 고쳐야 합니다.\n\n필리버스터 제한법, 옥외광고물법 개정안, 집시법 개정안,\n정보통신망법 개정안도 마찬가지입니다.\n좋은 취지로 추진한 것임은 잘 압니다.\n그러나 정치적 표현의 자유를 위축하거나\n언론의 자유를 과도하게 제약할 수 있습니다.\n\n
