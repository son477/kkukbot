견이 국회에 많이 반영된다. 민주당은 정치의 비례성을 강화하는 일에 그렇게 적극적이지 않다. 사회 경제 개혁에 있어서도 생각이 다르다. 우리는 지난 1년간 조세 정책에 대해 민주당과 논쟁했다. 우리는 금융 소득세를 주장하고 민주당은 조심스럽다. 세금을 확보해야 불평등이 해소된다. 세 번째는 인권 문제다. 조국혁신당은 차별금지법에 찬성하지만 민주당은 주저한다. 적극적으로 나서기가 어려울 것이다. 정치 개혁과 불평등 해소, 인권 문제에서 민주당과 우리 차이는 분명하다. 민주당 또는 범민주, 진보 진영에서 이 세 가지를 주장하는 정당이 없는 게 도움이 되느냐고 되묻고 싶다. 민주당과 합당 이야기가 많이 나온다. 우리는 민주당이 주장하지 않거나, 주장하기를 주저하는 이 세 가지 이슈를 지속적으로 이야기할 것이다.\"\n\n"}, {"id": 191, "filename": "2025.08.25 조국 혁신정책연구원장 오마이뉴스 인터뷰1.txt", "title": "조국 혁신정책연구원장 오마이뉴스 인터뷰1", "date": "2025-08-25", "category": "인터뷰", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["윤석열", "지방선거", "민생", "내란", "검찰개혁"], "preview": "2025.08.25 조국 혁신정책연구원장 오마이뉴스 인터뷰1 조국\"쇄빙선 역할 끝나, 이젠 '극우 국힘' 깨부술 망치선 될 것\"  \"윤석열 재입당 공언? 그런 정당은 대한민국에 존재할 가치 없다\"  - 부산에서 첫 일정으로 지난해 2월 창당 선언을 했던 부산민주공원에 다시 섰다. 감회가 남달랐을 것 같다.  \"정말 그랬다. 창당 선언 당시 제가 약속했던 윤석열 검찰독재정권 조기 종식, 검찰개혁 두 가지는 이제 해결됐다고 생각한다. 다만 저도 8...", "content": "2025.08.25 조국 혁신정책연구원장 오마이뉴스 인터뷰1\n조국\"쇄빙선 역할 끝나, 이젠 '극우 국힘' 깨부술 망치선 될 것\"\n\n\"윤석열 재입당 공언? 그런 정당은 대한민국에 존재할 가치 없다\"\n\n- 부산에서 첫 일정으로 지난해 2월 창당 선언을 했던 부산민주공원에 다시 섰다. 감회가 남달랐을 것 같다.\n\n\"정말 그랬다. 창당 선언 당시 제가 약속했던 윤석열 검찰독재정권 조기 종식, 검찰개혁 두 가지는 이제 해결됐다고 생각한다. 다만 저도 8개월간의 공백기를 가졌고 그동안 조국혁신당은 상황이 더 어려워졌다. 부산에 온 이유가 고향이라는 점도 있지만 이제 조국혁신당이 윤석열 이후에 어떤 새로운 과제를 가지고 나아갈 것인가, 정말 새롭게 시작해야겠다는 마음으로 왔다.\"\n\n- 혁신당은 공언한대로 '윤석열 정권 종식 쇄빙선' 역할에 성공했다. 그런데 그 역할이 끝나다 보니 앞으로 존재감을 드러내기가 쉽지 않아졌다는 평가가 나오는데 다음 목표는 뭔가.\n\n\"윤석열은 무너졌지만 국민의힘이라는 극우정당이 있다. 비유를 하자면 이순신 장군의 학익진 전술에서 나온 망치선 역할을 해나갈 것이다. 망치선은 학익진 가장 맨 앞에서 왜군의 주력 배를 망치질 해서 깨는 역할을 한다. 망치선이 먼저 깨면 다음에 본진이 와서 친다. (민주당에 앞서) 국민의힘이라는 극우 정당을 깨는 망치선이 되겠다.\"\n\n- 국민의힘을 깨부숴야 할, 협치가 불가능한 극우 정당으로 보는 이유는 뭔가.\n\n\"국민의힘이 탄핵에 찬성하는 찬탄파가 주류가 됐으면 이런 이야기를 안 했을 것이다. 윤석열 재입당을 공언한 사람이 대표가 될 가능성이 높은 정당은 대한민국에서 존재할 가치가 없다. OECD 수준의 민주주의 국가에서 저런 정당은 존재해서는 안 된다. 내란을 방조하거나 심지어 참여했다는 의심을 받는 극우정당과는 협치가 힘들다. 나치하고는 협업을 안 하지 않느냐. 주변에서는 너무 센 이야기하지 말라고 하지만 내년 지방선거에서 국민의힘 광역단체장 수를 0으로 만들고 2028년 국회의원 총선에서 (의석수를) 반토막 내야 한다.\"\n\n- 광복절 특별사면복권에 대해 비판 여론이 높은 세대가 2030이고, 2030 일부가 극우화됐다고 발언했다. 국민의힘 쪽에서는 '극우몰이'라고 공격하는데.\n\n\"저는 2030 전체가 극우화됐다고 이야기하지 않았다. 2030의 '일부'가 극우화 됐는데, '그들이 극우화되지 않았다'고 말하는 것은 거짓말이고 현실 회피다. 윤석열이 아크로비스타 나올 때 난리쳤던 일부 사람들, 윤석열 탄핵 이후 건대 인근에서 중국인 혐오 발언했던 사람들은 존재한다. 극우화 된 것을 극우화 됐다고 이야기해야 하는 거 아닌가. 그걸 가지고 2030 갈라치기라고 하는데, 남녀를 가르고 세대를 가르는 것은 이준석이 하는 정치다. 저는 그런 정치는 안 할 것이다.\n\n동시에 삶의 고통과 불안 속에서도 성실히 일상을 열심히 살아가는 2030 세대가 있다. 이들의 고통에 귀 기울이고 정치인으로서 조국의 정치를 보여줘야 한다. 그들 중 일부는 '(내게) 입시비리범 아니냐'라고 비판할 것이다. 그렇다고 제가 그들과 싸우겠나. 아니다. 비판 받으면서도 2030을 위한 정당한 정책을 낼 생각이다. 청년을 대상으로 주택 문제, 일자리 문제, 등록금 문제 등을 이야기할 것이다. 수십 번이라도 정책을 이야기하고 효능감을 말한다면 마음을 열 것이라 믿는다.\"\n\n- 2030 세대 입장에서 가장 불평등한 문제는 무엇이라고 보나.\n\n\"2030은 단군 이래 가장 좋은 스펙을 갖고 있는 집단이지만 자산과 소득 부문에서 부모보다 뒤처진 세대다. 2030은 불안정한 미래 앞에서 불안함을 안고 있다. 이 불안함을 해결하자는 게 제 생각이다. 혁신정책연구원장 자격으로 이야기하면 지금까지 수많은 정부가 청년 정책을 이야기해왔지만, 그걸로는 부족하다고 본다. 등록금, 임금, 일자리, 직장, 육아 문제에 대해서 우리가 보통 생각하는 액수를 넘어선 '예산파괴적인 지원'을 해야 한다고 본다. 훨씬 강하고 전면적인 지원말이다. 고교 졸업 후 취업을 하거나 대학에 진학하면서부터 정부가 정책과 예산 역량을 총동원해서, 퍼부어서라도 이들을 지원해야 한다. 좀 더 고민해 정책으로 답하겠다.\n\n혁신당의 목표와 관련해서 이 한 마디는 꼭 하고 싶다. 과거 나치나 현재 미국·유럽의 경험을 보면 극우는 불평등을 먹고 자란다. 필연 법칙이라고 생각한다. 불평등은 사회 극우화의 거름이다. 불평등의 문제를 정치가 적극적으로 해결하면 2030 일부의 극우화도 저지할 수 있다. 그것이 저 조국의 역할이자 혁신당의 과제다.\"\n\n- 내년 지방선거 이야기를 해보자. 앞선 언론 인터뷰에서 대구경북에 후보를 모두 내겠다고 했다. 호남에서는 경쟁하더라도 야당 우세 지역인 영남에서는 민주당과 협력해서 여야 1:1 구도를 만들겠다는 뜻인가?\n\n\"내년 6월 선거에 대해 아직 당 차원에서 본격적인 고민을 시작하지 않았다. 다만 원칙을 이야기하자면 조국혁신당이 국민의힘 당선에 도움을 줄 일은 절대 없을 것이다. 혁신당의 목표는 극우정당 국민의힘을 깨뜨리는 것이다. 국민들의 일상생활에서 영향력을 줄여야 하고 결정적으로는 선거에서 깨뜨려야 한다. 2026년 지방선거, 2028년 총선에서도 국민의힘을 깨뜨리려면 어떤 선거 전술을 가져갈 것인가는 분명하다.\"\n\n- 하지만 민주당 내에서는 호남에서 혁신당과의 경쟁을 부담스러워하는 분위기도 있는 것 같다. 특히 혁신당 후보가 당선한 담양군수 재보궐 결과가 다시 재현될까 두려움도 감지된다. 민주당과 호남에서 경쟁은 피할 수 없을 것 같다.\n\n\"담양 선거에서 저희 당 후보가 당선된 게 죄를 저지른 건 아니지 않나(웃음). 혁신당도, 민주당도 좋은 후보를 내면 된다. 그럼 호남 유권자들이 결정하시는 거다. 그런 경쟁은 필요하고 오히려 진영 전체에 도움이 된다고 생각한다.\"\n\n- 그러니까 내년 지방선거에서도 처음 창당할 때 이야기했던 호남에서의 경쟁과 이를 통한 지역 정치의 혁신과 변화는 여전히 유효한 목표라는 건가.\n\n\"그렇다. 호남 유권자의 선택을 넓히는 측면에서 호남을 위해서도 좋다. 조국혁신당이 없으면 민주당 후보가 결정되고 난 후엔 찍냐 안 찍냐의 선택밖에 안 남을 것 아닌가. 호남지역에서 민주당의 조직력이 압도적인데 담양군민들께서 당원도 몇 명 안되는 신생 정당의 후보를 군수로 당선시킨 이유와 의미에 대해 숙고해야 한다고 생각한다.\"\n\n- 지방선거는 광역단체장뿐만 아니라 기초단체장·기초의회·광역의회의원도 뽑지 않나. 혁신당이 국민의힘의 세력을 약화하려면 좋은 후보를 내보내야 할 텐데, 인재를 어떻게 준비할 생각인가.\n\n\"많은 분들이 (지방선거) 핵심을 서울시장, 부산시장, 광주시장 선거 이렇게 본다. 그런데 저희가 주력하는 선거는 광역보다는 기초단체장·의원 선거다. 풀뿌리 정치 활성화가 지방선거의 존재 이유다. 사실 서울시장 선거라고 하면 차기 대권에 가깝게 생각하지 풀뿌리 정치와는 거리가 조금 멀다. 소위 체급이 높은 사람 이야기다. 거기보다는 오히려 (체급이) 낮은 곳, 풀뿌리 정치 활성화로 가는 접근을 할 생각이다.\n\n인재는 청년, 신인, 이쪽에 집중할 생각이다. 민주당도 아니고, 혁신당도 아니었던 신인 그리고 젊은 사람들 말이다. 저는 대학생도 좋다고 보는데, 이런 사람들이 구의원으로, 시의원으로, 도의원으로 저희 당 후보로 출마해야 하지 않나 생각한다. 그래야 정치가 바뀔 것이라고 본다. 중요한 변화는 여기에서 일어난다. 그래야 2028년 총선에서 국민의힘 심판이 가능하다. 풀뿌리 정치를 강화하는 데 가능하다면 신인과 청년을 대거 모셔와 시작하고 싶다. 그런 희망을 품고 있다.\"\n\n- 올해 초 출간한 책 <조국의 함성>에서 \"용납할 수 없는 사람들에게는 무서운 정치인이 되겠다\"고 밝혔다. 구체적으로 어떻게 구현할 것인가.\n\n\"대한민국의 적에게는 무서운 정치인이 되겠다고 했다. 정확히 규정하면 (무서운 정치인이 되겠다는 대상은) 대한민국의 적, 헌법의 적이다. (그런 맥락에서) 창당 때 윤석열 탄핵을 이야기했었고, 지금도 그들이 국민의 적이라고 생각한다. 어떤 정치평론가들은 제게 '만날 국민의 적이라고 그러냐'고 한다. 그러나 저는 그런 평론은 민주주의의 기본 원칙에 어긋난다고 본다. 극우는 민주주의의 적이다. 그렇지 않은 정당과는 당연히 소통한다. 대한민국의 적, 국민의 적과는 단호하게 싸워야 한다.\"\n\n"}, {"id": 192, "filename": "2025.08.25 조국 혁신정책연구원장 오마이뉴스 인터뷰2.txt", "title": "조국 혁신정책연구원장 오마이뉴스 인터뷰2", "date": "2025-08-25", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "지방선거", "합당"], "preview": "2025.08.25 조국 혁신정책연구원장 오마이뉴스 인터뷰2 조국 \"지방선거 '험지 역할론?' 어디든 열려있다\"  \"조국 딸 장학금 600만원 유죄, 곽상도 아들 퇴직금 50억 무죄... 어떤 판결이 맞나\"  - 사면 이후 입시비리 혐의 내용도 다시 회자되고 있다. 부담은 없나.  \"언론이든 보통 시민들이 '당신 사면받았어도 재판에서 유죄 판결 난 것 아니냐'고 비판하는 건 당연하다. 다만 제가 정치인이 아니었다면 그 판결 내용에 대해 하나하나...", "content": "2025.08.25 조국 혁신정책연구원장 오마이뉴스 인터뷰2\n조국 \"지방선거 '험지 역할론?' 어디든 열려있다\"\n\n\"조국 딸 장학금 600만원 유죄, 곽상도 아들 퇴직금 50억 무죄... 어떤 판결이 맞나\"\n\n- 사면 이후 입시비리 혐의 내용도 다시 회자되고 있다. 부담은 없나.\n\n\"언론이든 보통 시민들이 '당신 사면받았어도 재판에서 유죄 판결 난 것 아니냐'고 비판하는 건 당연하다. 다만 제가 정치인이 아니었다면 그 판결 내용에 대해 하나하나 반박했을 거다. 책을 몇 권 쓸 수도 있다.\n\n예를 들어 저희 딸 장학금 600만 원을 받은 건 결국 제가 받은 거랑 같다고 해서 청탁금지법 위반이라고 (법원이)판단했는데, 곽상도 (전 국민의힘) 의원 아들이 퇴직금을 50억 원 받은 건 독립생계라는 이유로 법원에서 무죄 판결을 냈다. 어떤 판결이 맞고 어떤 판결이 틀린 건가. 이해가 잘 안 된다. 하지만 유죄 판결을 근거로 저를 비판하는 건 자유고 언론의 역할이다. 비판의 자유를 인정하고 저의 정치를 해나가겠다.\"\n\n- 특별사면 이후 대통령과 민주당의 지지율이 하락세를 보이면서 민주당 내에서는 조국 원장의 광폭 정치 행보가 부담스럽다는 반응이 조금씩 나오고 있는데 어떻게 생각하나?\n\n\"대통령께서 부담 있는 결정을 하셨는데 제가 나와서 주목을 받고 또 논란이 되면서 민주당에서 자제를 권고하는 것도 충분히 이해가 된다. 다만 대통령께서 고민 끝에 사면과 함께 복권도 결정하셨다. 그건 저의 정치활동 재개를 전제로 한 결정이라고 본다. 또 대통령께서 정치적 부담에도 불구하고 사면복권 결정을 하신 것을 제가 진 '빚'이라고 한다면 제가 나와서 집에만 머물거나 해외로 나가 정치적으로 침묵하는 게 그 빚을 갚는 방법일까. 그렇게 생각하지 않는다. 대통령께서 사면을 결단하신 것에 너무 감사하고 사면으로 국정 지지율이 떨어져서 죄송하다. 다만 이를 해결하는 방법이 침묵은 아니라고 저는 보는 거다. 앞서 이야기한 과제(망치선 역할)를 잘해 나가겠다.\"\n\n- 그래도 출소 후 재충전 시간 등 휴지 기간을 가질 것이라는 예상이 많았는데 정치 행보를 바로 시작했다. 출소 다음날부터 강행군을 시작한 특별한 이유가 있나?\n\n\"혁신당의 상황은 민주당과는 많이 다르다. 민주당은 이미 집권당이고 거대 정당이다. 우리는 신생 영세 정당이다. 제가 창당을 주도했기 때문에 당 지지율이 떨어져 있는 상황에서 나서서 당을 재건하는 게 정치인으로서 마땅한 책임이다. 혁신당의 상황이 지금보다 더 나빠지는 건 전체 민주진보 진영에 좋은 일은 아니라고 생각한다. 아직 내란이 종식되지 않은 상황에서 극우화된 국민의힘과 싸워나가는 역할을 하는 게 전체 민주진보 진영에 도움이 된다고 생각한다.\"\n\n- 국민의힘의 영향력을 줄여간다는 정치적 목표를 따라가다보면 내년 지방선거가 다가올 수록 조 원장에게 부산 출마 같은 '험지 역할론'이 제기될 수도 있다.\n\n\"지금은 판단하기 힘들 것 같다. 모든 언론이 '서울시장이냐, 부산시장이냐, 국회의원 재보궐이냐, 결국 어디로 나갈 거냐'는 질문을 하는데 지금은 답할 수 있는 상황이 아니다. 제가 나온 지 일주일도 안 됐고, 저희도 검토를 한 적이 없다. 지금은 저 개인보다 당 조직을 재건·확장하고 활성화하는 게 목표다. 연말쯤 되면 당이 좀 자리가 잡히지 않겠나. 제 거취는 연말연초 정도 구체화하지 않을까 생각한다. 그때 정해지면 확실하게 공개적으로 밝힐 생각이다.\"\n\n- 모든 가능성은 열려 있다는 말인가. 거취 결정의 판단 기준은 무엇이 있을까.\n\n\"어디든 열려 있다. (판단 기준으로는) 두 가지가 있을 것 같다. 혁신당 내에서 '어느 지역, 어느 선거에 집중할 것인가' 결정하는 게 판단 기준이 될 것이다. 또 다른 하나는 민주당과의 관계다. 민주당도 지금 이야기되고 있는 광역단체장에 후보를 낼 것 아니겠나.\"\n\n- 지방선거만 있는 게 아니고 국회의원 재보궐도 있다. 국회로 돌아오면 입법활동도 하고 정치에서 목소리를 더 낼 수 있는 게 사실이다. 광역단체장의 경우엔 행정을 맡는 것이라 일각에서는 정치적 효능감을 행정을 통해 보여줘야 하는 게 아니냐는 견해도 있다.\n\n\"국회의원과 광역단체장의 길은 완전히 다르다. 제게 개인적으로 정반대의 조언들을 한다. 어떤 분들은 여의도에 가야 한다고 하고, 어떤 분들은 행정 능력으로 효능감을 보여줘야 된다는 분들도 있다. 지금은 그 조언들을 다 경청하고 있는데, 지금 제가 판단할 수 있는 근거가 없다. 당원도 만나고 국민도 만나면서 이야기를 듣는 과정을 연말까지 진행할 것이다. 나온 지 얼마 안 된 상태에서 그냥 몇 마디 듣고 결정할 수는 없지 않겠나.\n\n지금 제일 중요한 것은 저의 존재감을 드러내기 위한 것보다도 혁신당의 틀을 갖추고 확대하고 활성화하는 일이다. 연말까지는 여기에 집중할 것이다. 그런 차원에서 이해해 주시면 좋겠다.\"\n\n- '민주진보진영의 단결'이 사면복권 후 일성 중 하나였다. 민주진보진영 단결 방법 중 민주당 일각이 얘기하는 '합당' 말고 다른 정치적 선택이 있다면 어떤게 있을까.\n\n\"민주당 내에서도 여러 목소리가 나오고 있는데 질문을 다시 던져야 한다. 정책과 비전의 차이에도 불구하고 민주당과 조국혁신당의 공동 목표가 있다고 생각한다. 그 공동의 목표를 이루기 위해서 어떤 조직을 꾸려야 좋을지 이야기한 적이 없는데 이제 시작해야 한다. 2026년과 2028년 목표를 말씀드렸는데 그 목표를 위해서 어떻게 공동의 조직을 꾸리는 게 옳은지 질문을 하자는 거다.\n\n혁신당을 만들 때 모두 창당하면 민주당에 폐를 끼칠 것이라고 했는데 결과는 다르지 않았나. 1+1이 2.5가 되면 합칠 수 있지만 1+1이 1.5가 되면 안 해야 한다. 그런 접근 없이 '닥치고 합당' '덮어두고 합당'에 대해서는 저는 동의할 수 없다.\"\n\n- 민주당과의 정책 비전의 차이가 크지는 않지만 몇 가지 사안에서는 목소리가 다른 것도 사실인데.\n\n\"조국혁신당의 의제 중 정치개혁, 사회경제적으로는 불평등 해소, 인권 측면에서는 보편적 차별금지법 제정이 민주당과 큰 차이다. 정치개혁 사안의 경우 대통령선거 결선투표는 이재명 대통령도 이야기하셨고 다 동의를 하고 있지만, 선거구제 개편, 원내교섭단체 구성 조건 완화 등 다른 사안들에 대해서는 민주당이 동의하지 않거나 탐탁지 않게 생각하고 있는 게 사실이다.\"\n\n- 차별금지법에 대한 입장 차가 가장 큰 것 아닌가.\n\n\"민주당은 차별금지법에 동의하지 않거나 지연하고 싶어하는데 혁신당은 반드시 제정해야 한다는 입장이다. 그래서 혁신당은 차이가 있는 사안을 의제화 하면서 같이 하자고 호소하고 있는 것이다. 또 이뤄지는 게 우리 사회의 발전이라고 본다.\"\n\n- 정치개혁이나 차별금지법 의제를 놓고 민주당과 갈등 양상이 전개 되면 민주당 지지자들로부터 반발을 사게 될 수도 있는데 그런 부분에 부담은 없나.\n\n\"부담이 있고 없고의 문제가 아니라고 생각한다. 정책의 영역에서는 민주당과 혁신당이 다를 수 있다. 하지만 생각이 다르다고 민주당이 혁신당을 향해 차별금지법 찬성하지 말라고 요구할 권리는 없다. 실제 민주당도 그러지 않을 것이다. 민주당과 정책적 입장은 80%는 같다. 다만 정치 개혁과 인권 문제에 대해서 조금 다른데 (민주진보 진영 내) 충분히 정책적 다양성이 있을 수 있다고 본다. 이런 과제를 함께 이루자고 외치는 사람들이 많아지는 게 (전체 민주진보 진영에) 나쁜 게 아니다.\"\n\n- 정책적 차이가 선거 협력에 부정적 영향을 줄 수 있는 것 아니냐는 우려는 기우인가.\n\n\"민주당과의 관계에서 긴장이 발생하는 때는 선거 때다. 민주당 지지자 입장에서는 혁신당 때문에 민주당이 떨어지거나 국민의힘이 어부지리를 얻는 것을 가장 걱정하지 않나. 선거는 전술의 문제다. 차별금지법에 대한 입장이 조금 다르다고, 사회경제적 불평등 해법에 대한 생각이 조금 다르다고 '우리는 국민의힘이 되든 말든 상관 없다' 이렇게 하지는 않을 것이다.\"\n\n"}, {"id": 193, "filename": "2025.08.19 조국 경향신문 인터뷰.txt", "title": "조국 경향신문 인터뷰", "date": "2025-08-19", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["합당", "지방선거", "윤석열", "의료"], "preview": "2025.08.19 조국 경향신문 인터뷰 조국 “내년 6월 선거 출마···민주당과 ‘덮어놓고 합당’은 없다”  -이재명 대통령이 사면·복권을 한 이유가 뭐라고 보나.  “언론에서도, 더불어민주당 내에서도 지지율 하락과 지방선거 유불리에 대한 무수한 이야기가 있었다. 내가 아는 이 대통령은 그런 계산으로 이 문제를 결단할 사람이 아니다. 수지타산에 맞춰 판단하지 않았을 것이다. 사면권은 당대표가 아니라 대통령 권한이다. 대통령은 특정 그룹 이익을...", "content": "2025.08.19 조국 경향신문 인터뷰\n조국 “내년 6월 선거 출마···민주당과 ‘덮어놓고 합당’은 없다”\n\n-이재명 대통령이 사면·복권을 한 이유가 뭐라고 보나.\n\n“언론에서도, 더불어민주당 내에서도 지지율 하락과 지방선거 유불리에 대한 무수한 이야기가 있었다. 내가 아는 이 대통령은 그런 계산으로 이 문제를 결단할 사람이 아니다. 수지타산에 맞춰 판단하지 않았을 것이다. 사면권은 당대표가 아니라 대통령 권한이다. 대통령은 특정 그룹 이익을 위한 포석을 두지 않는다. 이 대통령의 결단은 성공한 정부가 되기 위해 전체 판을 보고 내린 큰 행보로 봤다.”\n\n-지난 15일 출소 직후 국민의힘 심판을 말했다.\n\n“위헌정당 해산은 특검 수사에 달렸다. 정치인으로 할 일은 국민의힘을 2028년 총선에서 소수정당으로 만드는 것이다. 제가 했던 1차 과제가 윤석열 일당과 싸우는 것이었다면, 2차 과제는 국민의힘을 지역적으로는 TK(대구·경북)에 갇힌 소수정당으로 만드는 것이다.”\n\n-그런데 오늘 발표된 국민의힘 지지율이 민주당 지지율과 오차범위 내에 있다.\n\n“지금의 반등은 일시적이다. 김문수를 비롯해 등 친윤 지도부가 들어선다면 국민의힘 지지율은 구조적으로도 더 올라갈 수 없다. ‘전한길당’이 되면 중도층이 들어갈 수 없게 스스로 벽을 치는 것 아닌가.”\n\n-윤석열 전 대통령과 김건희 여사 모두 구속됐다.\n\n“윤석열·김건희·검찰이 지난 3년간 거짓말해온 게 만천하에 드러났다. 구치소 담장 하나를 사이에 두고 김건희가 구속된 바로 며칠 뒤 제가 출소했다는 건 상징적 사건이다. 특검 수사를 통해 많은 분이 2019년을 돌아보게 될 거라 생각한다. 이른바 조국 사태에 대한 평가도 다시 받을 것이다.”\n\n-조국 사태 재평가는 무슨 의미인가.\n\n“제가 판결에 승복하고 있다는 이야기는 여러 번 했다. 2019년 인사청문회 시점부터 제 자식에게 인턴의 기회가 주어진 것, 부모의 네트워크를 동원해 남들은 받지 못할 기회를 준 것에 죄송하다 말했다. 또 인턴증명서에 적힌 활동 기간이 실제보다 짧았다는 것도 인정을 다 했다. 관행이라 주장할 수 있었지만 구질구질하기 때문에 그러지 않았다. 그걸 재평가하자는 게 아니다. 일국의 검찰총장, 대통령까지 했던 사람이 특검 수사를 피하려고 속옷 차림으로 누워버렸다. 그게 윤석열의 본질이다. 그런 사람이 2019년 검찰총장 되고 벌인 각종 수사에 대한 평가가 다시 이뤄질 거라고 본다.”\n\n-대통령 지지율 하락에 사면 영향이 컸다는 분석이 나온다.\n\n“일면적이고 잘못된 해석이다. 이춘석 의원의 주식 차명거래 의혹, 상장주식 양도소득세 부과 대주주 기준 논란 같은 문제들이 해결되지 않고 있다. 이런 요인을 다 빼고 조국 사면만으로 지지율이 떨어졌다는 건 오독이다. 영향력이 있다면 n분의 1이다.”\n\n-검찰의 희생자라는 주장과 함께 사면이 무죄는 아니라는 여론도 강하다.\n\n“제가 해결할 수 없는 문제다. 저는 지금 정치인이다. 법률가로서 변호하는 게 아니니까. 여전히 비판하는 분들, 여전히 변호하는 분들이 계시지만 저는 그냥 제 길을 가는 것이다. 그 논쟁에 끼어들 생각이 없다.”\n\n-정치인으로서 조국 사태에 따른 갈등을 통합할 책임은 없나.\n\n“지금까지 13번 ‘플러스 알파’로 사과를 했다. 계속해야 한다고 하면 얼마든지 더 할 것이다. 하지만 그런다고 저를 비판하던 사람들이 지지로 돌아설까. 절대 그렇지 않을 것이다. 제 길을 가면서 저의 효용과 역할을 보여주려 한다. ‘마음에 안 들지만, 싫어하지만 이건 잘하네’ 이 정도면 충분하다고 본다. 그러면서 통합도 이뤄지는 것이다.”\n\n-내년 6월 출마를 공식화했다.\n\n“조국의 정치적 역할이 남았다는 걸 보여주려면 다른 게 없다. 선거는 절대 피할 수 없다.”\n\n-어디에 출마하려는 것인가.\n\n“지금 단계에서 말할 수 있는 것은 없다. 준비한 바도 없고 정해진 바도 없다.”\n\n-혁신당의 지방선거 목표는 무엇인가.\n\n“현재는 민주당과 국민의힘이 1대1 구도인데, 국민의힘 파이를 0.5로 낮추는 것이다. 혁신당이 국민의힘과 같은 규모의 정당으로 성장해야 한다.”\n\n-국민의힘 지지층을 끌어오겠다는 말인가.\n\n“윤석열·김건희와 절연하고자 하지만 민주당으로 넘어가지 못하는 분들을 혁신당이 끌어올 수 있다고 생각한다. 그런 의미에서 대구·경북 지역에 기초의원 후보를 다 낼 생각이다.”\n\n-여당 내에서 지방선거 전 합당을 요구하는 목소리가 있다.\n\n“혁신당은 지금 자강이 필요하다. 조직을 정비하고 비전·정책을 가다듬는 게 먼저다. 그렇지 않고 합당론을 따라가다 보면 정체성이 없어진다. 혁신당 뿐만 아니라 진영에도 좋지 않은 일이다. ‘진영의 파이가 커지려면 어떤 게 맞는 것인가’라고 질문을 다시 던져야 한다.”\n\n-혁신당 독자 노선은 무엇인가.\n\n“검찰·사법·언론개혁은 민주당과 80% 정도 의견이 일치했다. 단 한 번도 일치하지 않았던 게 금융투자소득세나 가상자산 과세 등 조세 정책이다. 주거·의료·돌봄 등 권리 수준을 올리려면 국채발행만으로는 안 된다. 중부담 중·고복지로 인식 전환을 해야 한다. 차별금지법과 같은 사회대개혁과 정치개혁에 있어서도 민주당과 생각이 다른 지점이 있다. 독자적 역할이 있는 것이다. 합당 여부만 따지는 건 맞지 않다.”\n\n-교섭단체 구성요건 완화 논의가 나아가지 못하고 있다.\n\n“그 문제는 (지난 대선 당시) 야5당이 합의한 것이고 공당으로서의 약속이다. 민주당이 답을 해야 하는 문제다.”\n\n-정치인 조국의 최종 목표는 무엇인가.\n\n“윤석열 일당을 끝내기 위해서만 정치를 결심한 게 아니다. 윤석열 이후의 세상에 대한 논의가 필요하다. 검찰·사법·언론개혁과 윤석열·김건희 처벌은 올 연말 안에 정리될 문제들이다. 나머지 4년의 성과가 있어야 정권 재창출이 가능하다. 그 성과를 내기 위해 뛸 것이다.”\n\n\n\n"}, {"id": 194, "filename": "2025.08.19 조국 혁신정책연구원장 경향신문 인터뷰.txt", "title": "조국 혁신정책연구원장 경향신문 인터뷰", "date": "2025-08-19", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["합당", "지방선거", "윤석열", "의료"], "preview": "2025.08.19 조국 혁신정책연구원장 경향신문 인터뷰 조국 “내년 6월 선거 출마···민주당과 ‘덮어놓고 합당’은 없다”  -이재명 대통령이 사면·복권을 한 이유가 뭐라고 보나.  “언론에서도, 더불어민주당 내에서도 지지율 하락과 지방선거 유불리에 대한 무수한 이야기가 있었다. 내가 아는 이 대통령은 그런 계산으로 이 문제를 결단할 사람이 아니다. 수지타산에 맞춰 판단하지 않았을 것이다. 사면권은 당대표가 아니라 대통령 권한이다. 대통령은 ...", "content": "2025.08.19 조국 혁신정책연구원장 경향신문 인터뷰\n조국 “내년 6월 선거 출마···민주당과 ‘덮어놓고 합당’은 없다”\n\n-이재명 대통령이 사면·복권을 한 이유가 뭐라고 보나.\n\n“언론에서도, 더불어민주당 내에서도 지지율 하락과 지방선거 유불리에 대한 무수한 이야기가 있었다. 내가 아는 이 대통령은 그런 계산으로 이 문제를 결단할 사람이 아니다. 수지타산에 맞춰 판단하지 않았을 것이다. 사면권은 당대표가 아니라 대통령 권한이다. 대통령은 특정 그룹 이익을 위한 포석을 두지 않는다. 이 대통령의 결단은 성공한 정부가 되기 위해 전체 판을 보고 내린 큰 행보로 봤다.”\n\n-지난 15일 출소 직후 국민의힘 심판을 말했다.\n\n“위헌정당 해산은 특검 수사에 달렸다. 정치인으로 할 일은 국민의힘을 2028년 총선에서 소수정당으로 만드는 것이다. 제가 했던 1차 과제가 윤석열 일당과 싸우는 것이었다면, 2차 과제는 국민의힘을 지역적으로는 TK(대구·경북)에 갇힌 소수정당으로 만드는 것이다.”\n\n-그런데 오늘 발표된 국민의힘 지지율이 민주당 지지율과 오차범위 내에 있다.\n\n“지금의 반등은 일시적이다. 김문수를 비롯해 등 친윤 지도부가 들어선다면 국민의힘 지지율은 구조적으로도 더 올라갈 수 없다. ‘전한길당’이 되면 중도층이 들어갈 수 없게 스스로 벽을 치는 것 아닌가.”\n\n-윤석열 전 대통령과 김건희 여사 모두 구속됐다.\n\n“윤석열·김건희·검찰이 지난 3년간 거짓말해온 게 만천하에 드러났다. 구치소 담장 하나를 사이에 두고 김건희가 구속된 바로 며칠 뒤 제가 출소했다는 건 상징적 사건이다. 특검 수사를 통해 많은 분이 2019년을 돌아보게 될 거라 생각한다. 이른바 조국 사태에 대한 평가도 다시 받을 것이다.”\n\n-조국 사태 재평가는 무슨 의미인가.\n\n“제가 판결에 승복하고 있다는 이야기는 여러 번 했다. 2019년 인사청문회 시점부터 제 자식에게 인턴의 기회가 주어진 것, 부모의 네트워크를 동원해 남들은 받지 못할 기회를 준 것에 죄송하다 말했다. 또 인턴증명서에 적힌 활동 기간이 실제보다 짧았다는 것도 인정을 다 했다. 관행이라 주장할 수 있었지만 구질구질하기 때문에 그러지 않았다. 그걸 재평가하자는 게 아니다. 일국의 검찰총장, 대통령까지 했던 사람이 특검 수사를 피하려고 속옷 차림으로 누워버렸다. 그게 윤석열의 본질이다. 그런 사람이 2019년 검찰총장 되고 벌인 각종 수사에 대한 평가가 다시 이뤄질 거라고 본다.”\n\n-대통령 지지율 하락에 사면 영향이 컸다는 분석이 나온다.\n\n“일면적이고 잘못된 해석이다. 이춘석 의원의 주식 차명거래 의혹, 상장주식 양도소득세 부과 대주주 기준 논란 같은 문제들이 해결되지 않고 있다. 이런 요인을 다 빼고 조국 사면만으로 지지율이 떨어졌다는 건 오독이다. 영향력이 있다면 n분의 1이다.”\n\n-검찰의 희생자라는 주장과 함께 사면이 무죄는 아니라는 여론도 강하다.\n\n“제가 해결할 수 없는 문제다. 저는 지금 정치인이다. 법률가로서 변호하는 게 아니니까. 여전히 비판하는 분들, 여전히 변호하는 분들이 계시지만 저는 그냥 제 길을 가는 것이다. 그 논쟁에 끼어들 생각이 없다.”\n\n-정치인으로서 조국 사태에 따른 갈등을 통합할 책임은 없나.\n\n“지금까지 13번 ‘플러스 알파’로 사과를 했다. 계속해야 한다고 하면 얼마든지 더 할 것이다. 하지만 그런다고 저를 비판하던 사람들이 지지로 돌아설까. 절대 그렇지 않을 것이다. 제 길을 가면서 저의 효용과 역할을 보여주려 한다. ‘마음에 안 들지만, 싫어하지만 이건 잘하네’ 이 정도면 충분하다고 본다. 그러면서 통합도 이뤄지는 것이다.”\n\n-내년 6월 출마를 공식화했다.\n\n“조국의 정치적 역할이 남았다는 걸 보여주려면 다른 게 없다. 선거는 절대 피할 수 없다.”\n\n-어디에 출마하려는 것인가.\n\n“지금 단계에서 말할 수 있는 것은 없다. 준비한 바도 없고 정해진 바도 없다.”\n\n-혁신당의 지방선거 목표는 무엇인가.\n\n“현재는 민주당과 국민의힘이 1대1 구도인데, 국민의힘 파이를 0.5로 낮추는 것이다. 혁신당이 국민의힘과 같은 규모의 정당으로 성장해야 한다.”\n\n-국민의힘 지지층을 끌어오겠다는 말인가.\n\n“윤석열·김건희와 절연하고자 하지만 민주당으로 넘어가지 못하는 분들을 혁신당이 끌어올 수 있다고 생각한다. 그런 의미에서 대구·경북 지역에 기초의원 후보를 다 낼 생각이다.”\n\n-여당 내에서 지방선거 전 합당을 요구하는 목소리가 있다.\n\n“혁신당은 지금 자강이 필요하다. 조직을 정비하고 비전·정책을 가다듬는 게 먼저다. 그렇지 않고 합당론을 따라가다 보면 정체성이 없어진다. 혁신당 뿐만 아니라 진영에도 좋지 않은 일이다. ‘진영의 파이가 커지려면 어떤 게 맞는 것인가’라고 질문을 다시 던져야 한다.”\n\n-혁신당 독자 노선은 무엇인가.\n\n“검찰·사법·언론개혁은 민주당과 80% 정도 의견이 일치했다. 단 한 번도 일치하지 않았던 게 금융투자소득세나 가상자산 과세 등 조세 정책이다. 주거·의료·돌봄 등 권리 수준을 올리려면 국채발행만으로는 안 된다. 중부담 중·고복지로 인식 전환을 해야 한다. 차별금지법과 같은 사회대개혁과 정치개혁에 있어서도 민주당과 생각이 다른 지점이 있다. 독자적 역할이 있는 것이다. 합당 여부만 따지는 건 맞지 않다.”\n\n-교섭단체 구성요건 완화 논의가 나아가지 못하고 있다.\n\n“그 문제는 (지난 대선 당시) 야5당이 합의한 것이고 공당으로서의 약속이다. 민주당이 답을 해야 하는 문제다.”\n\n-정치인 조국의 최종 목표는 무엇인가.\n\n“윤석열 일당을 끝내기 위해서만 정치를 결심한 게 아니다. 윤석열 이후의 세상에 대한 논의가 필요하다. 검찰·사법·언론개혁과 윤석열·김건희 처벌은 올 연말 안에 정리될 문제들이다. 나머지 4년의 성과가 있어야 정권 재창출이 가능하다. 그 성과를 내기 위해 뛸 것이다.”\n\n"}, {"id": 195, "filename": "2025.08.18 조국 한겨레 인터뷰.txt", "title": "조국 한겨레 인터뷰", "date": "2025-08-18", "category": "인터뷰", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "합당", "민생"], "preview": "2025.08.18 조국 한겨레 인터뷰 [인터뷰] 조국 “내년 선거 때 심판받겠다…사면 반대 국민께 효능 입증할 것”  ― 감옥에서 광복절 사면 대상에 포함됐다는 얘기를 전해 들었을 때 심경이 어땠습니까?  “이재명 대통령의 헌법적 결단에 감사했습니다. 여론조사로는 찬반이 팽팽했는데, 종합적인 판단에 따라 정부 출범 초기에 (사면을) 결행하기로 하셨구나 짐작했습니다.”  ― 이재명 정부 출범 두 달이 조금 더 지났습니다. 이 대통령의 국정운영을...", "content": "2025.08.18 조국 한겨레 인터뷰\n[인터뷰] 조국 “내년 선거 때 심판받겠다…사면 반대 국민께 효능 입증할 것”\n\n― 감옥에서 광복절 사면 대상에 포함됐다는 얘기를 전해 들었을 때 심경이 어땠습니까?\n\n“이재명 대통령의 헌법적 결단에 감사했습니다. 여론조사로는 찬반이 팽팽했는데, 종합적인 판단에 따라 정부 출범 초기에 (사면을) 결행하기로 하셨구나 짐작했습니다.”\n\n― 이재명 정부 출범 두 달이 조금 더 지났습니다. 이 대통령의 국정운영을 어떻게 평가합니까?\n\n“이재명 대통령 개인의 특성, 장점이기도 한 것 같은데 실무 능력이 아주 좋고, 조직 장악력이 아주 좋으신 거 같습니다. 넓은 의미에서 국정 장악력이죠, 국정 장악력이 아주 좋고, 국무위원까지 포함해서 공무원, 관료에 대한 장악력이 아주 좋은 게 확인된 거 같습니다. 성남시장과 경기도지사를 통해서 훈련되고 축적됐던 능력을 지금 보여준다고 생각합니다. 지금은 내란을 극복하고 경제 위기를 넘어야 하는 비상한 상황이니까, 그런 상황에서 대통령이 맨 앞에 직접 나서 진두지휘하는 모습을 보이니까, 그게 참 좋은 리더십이라고 생각합니다. 가령 산업재해 문제에서, 역대 어느 대통령도 그렇게 직접 챙기고 지시하고 그런 적이 없잖아요?”\n\n― 사면을 둘러싸고 논란이 컸습니다. 형기의 1/3만 복역한 상황에서 사면되는 데 대한 비판도 적지 않았구요. 이런 비판과 논란을 어떻게 생각하십니까?\n\n“민주당 안에서 조기 사면에 대해 의견이 나뉘었고, 2030세대에서는 반대 의견이 높았던 것으로 압니다. 그 우려와 비판, 이해하고 감수합니다. 향후 행동으로 답하겠습니다. 내란 척결과 민생 회복, 사회 대개혁을 이루는 데 역할을 하겠습니다.”\n\n― 출소 메시지에서 ‘저의 사면에 비판의 말씀을 해주신 분들에 대해서도 충분히 존경의 마음으로 경청하고 있다’고 말했습니다. 무슨 뜻인가요?\n\n“법률적으로만 얘기하면 사면권은 대통령의 권한이니까 그게 불법이라고 얘기하시는 분은 아마 없을 겁니다. 그 문제보다는, 이유야 뭐든 간에 조국은 유죄 판결이 나지 않았느냐, 검찰권 오남용이 있었다 하더라도 유죄 판결이 난 거 아니냐, 그리고 그것 때문에 투옥까지 된 거 아니냐, 그렇다면 대통령이, 아무리 검찰권에 의해서 피해를 받은 대통령이라고 하더라도 이런 경우엔 유죄 판결을 존중해야 하는 거 아니냐는 요구가 있을 수밖에 없다고 생각합니다. 그래서 그 비판 자체에 대해 제가 고깝다고 생각하지 않고, 그런 비판을 받아들이겠다는 뜻입니다.\n\n물론 저는 검찰 수사는 물론이고 법원의 유죄 판결에 대해서 하고 싶은 말이 많습니다. 며칠 전 대구문화방송(MBC) 보도(동양대 표창장이 허위라는 법원 판단과 배치되는 증거가 새로 나왔다는 보도)를 봤는데, 재판 과정에서 저는 그런 사실을 전혀 모르고 있었거든요. 그러나 하고 싶은 말은 많지만, 그 말을 지금 하는 건 별로 의미가 없다고 생각합니다. 그걸 따지는 건 피고인 시절의 얘기이고, 저는 이제 정치인이 됐기에 더는 얘기를 하지 않으려고 합니다. 저는 (대법원) 판결을 받아들였고, 제가 지금 국민께 말씀드리는 건 그걸 전제로 하는 겁니다.”\n\n― 조 전 대표를 지지하는 분들 중에는 꼭 재심을 청구해서 무죄를 받아내야 한다고 얘기하는 사람도 적지 않습니다. 재심을 청구할 생각입니까?\n\n“저는 과거로 다시 돌아가는 걸 원하지 않습니다. (부인인) 정경심 교수는 어떻게 할지 모르겠지만, 저로서는 재심을 하게 되면 거기에 또 힘을 쏟아야 하는데 그걸 원치는 않습니다. 저는 법원의 사실 판단과 법리에 동의하지 못하지만 판결에 승복한다는 얘기를 이미 여러 차례 했습니다. 그에 따라서 지난해 12월16일 구속돼 8개월의 형을 살았고, 오늘(15일) 사면복권을 받았습니다. 여하튼 법률적으론 끝난 문제입니다. 앞으로 할 일은 저의 사면을 비판하시는 분들, (여론조사에서 사면에 반대한) 48%의 국민께 저의 효능, 저의 역할의 필요성을 입증하는 것입니다. 사면복권을 비판하신 분들이라도 제가 정치인으로서 의미 있는 활동을 하면 받아주실 것이고, 안 그러면 못 받아주실 거라 생각하기에 저는 미래를 보고 갈 생각입니다. 저의 활동의 초점은 재심이 아닙니다.”\n\n― 좀 전에 ‘2030세대에서 사면 비판이 높았다’고 언급했는데, 왜 그렇다고 생각하십니까?\n\n“2030세대가 저에 대해 가진 불만은 이른바 ‘입시 비리’ 문제에 대한 불만일 겁니다. 자신들은 가질 수 없던 인턴십이라는 기회를 조국이라는 사람은 자식들에게 주고, 그걸 입시에 제출했다는 것 때문에 화를 내시는 게 아닐까 생각합니다. 그 점은 사건이 터졌을 때부터 여러 차례 사과했고, 지금도 여전히 죄송한 마음입니다. 그 당시 제도가 그랬다, 부모로서 그럴 수밖에 없었다는 말로 변명할 수는 없는 문제입니다. 제가 ‘죄송하다, 미안하다’고 거듭 사과한다고 해서 그분들의 마음이 풀리진 않을 거라는 걸 잘 압니다.\n\n그래도 제가 석방된 오늘부터, 앞으로의 제 행동과 실천으로 그분들의 고통을 완화하고 그분들의 꿈을 실현해주는 뭔가를 한다면, 마음이 달라지지 않을까 생각합니다. 사면에 반대했던 분들의 마음을 풀어드리는 건 앞으로 저의 실천에 달려 있다고 봅니다.”\n\n― 앞으로의 정치적 행보에 큰 관심이 쏠립니다. 지방선거 출마설, 민주당과의 합당설 등이 떠도는데, 어떤 생각을 갖고 있는지요?\n\n“이제 막 석방됐을 뿐인데 여러 추측과 예상이 난무해서 좀 조심스럽습니다. 교도소에서 방송을 보니까 정치평론가들이 수많은 전망을 하시고 시나리오를 말씀하시는데, 지금 당장 제가 무엇을 하겠다 얘기하는 건 너무 성급한 거 같습니다. 먼저 사면 탄원을 해주신 종교계와 시민사회 원로 분들을 만나 감사 인사를 드리고, 조언을 받을 것입니다. 그리고 조국혁신당 시도당이 있는 지역을 방문해서, 당원과 국민의 의견을 듣겠습니다. 다만 한 가지 분명한 것은, 저는 정치인으로 돌아왔고 내년 6월 국민으로부터 한 번 더 심판을 받겠다는 것입니다. 피할 수 없다고 생각합니다.”\n\n― 내년 6월에 열리는 지방선거 또는 국회의원 재보궐선거에 출마하실 생각이라는 거죠?\n\n“그게 지방선거가 될지 국회의원 재보선이 될지를 지금 판단하는 것은 이르지만, 정치적 심판을 받을 것이란 점은 말씀드릴 수 있습니다. 그때 상황을 보면서, 제 개인이 아니라 당에서 필요한 곳이 어딘지 결정을 해주면, 저는 거기에 따를 생각입니다.”\n\n― 민주당과의 합당 가능성을 얘기하는 분도 많습니다.\n\n“많은 분이, 예컨대 박지원 의원님은 공개적으로 민주당과 합당해야 한다는 말씀을 하셨는데, 저는 선의를 가지고 그런 제안을 하셨다고 생각합니다. 모두 단결하자는 취지라고 봅니다. 그런데 지금 제가 답을 할 수 없는 게, 조국혁신당은 공적 정당인데 내부 논의를 먼저 해야 하고, 또 합당이 최선인가도 신중하게 생각해봐야 합니다. 지난해 4월 총선 때도 조국혁신당을 만들면 민주당의 선거 승리에 방해된다는 비난이 매우 많았지만 결과는 어땠습니까? 별도의 당을 만든 게 더불어민주당과 조국혁신당 모두에 다 도움이 되지 않았나요? 내년 지방선거와 그 이후 2028년 총선까지 생각하면 어떻게 두 당의 관계를 형성하는 게 최선인가, 합당이 옳은 것인가에 대한 내부 논의를 먼저 거쳐야 합니다.\n\n물론 저는 예전의 정의당처럼 무조건 민주당과 차별화하고 선을 긋는 방식은 옳지 않다고 생각하고 그렇게 할 생각은 전혀 없습니다. 우선은 당을 재건하는 게 시급합니다. 낮은 자세로 당원들의 얘기를 듣겠습니다. 그리고 연말을 지나 내년에 들어갈 때, 어떤 게 진영 전체에 도움이 될지 열린 상태로 고민하고 당내 의견을 모아보겠습니다.”\n\n― 조국혁신당 지도부가 임기 단축을 결정했으니 조만간 전당대회를 열어 새 대표를 뽑게 됩니다. 당 대표로 복귀하시는 겁니까?\n\n“아직 전당대회 날짜는 결정이 나지 않았지만, 11월 초중순께 열릴 것으로 예상합니다. 그러면 저는 당 대표에 출마할 생각입니다.”\n\n― 감옥에서 윤석열 전 대통령의 재수감과 특검의 체포영장에 막무가내로 저항한다는 소식을 접했을 겁니다. 어떤 생각이 들었습니까?\n\n“전직 대통령 이전에 대한민국 시민의 한 사람으로서, 최소한의 품위가 없는 저급하고 몰염치한 겁쟁이임을 재확인했습니다. 국민도 ‘저런 사람이 검찰을 지휘했고 나라를 쥐락펴락했구나’ 하며 한탄하셨을 겁니다. 윤석열은 공포를 주는 ‘폭군’에서 조롱의 대상인 ‘진상’으로 전락했습니다. 저에 대한 사면 결정이 난 후 김건희씨도 구속되어 남부구치소에 입감됐습니다. 남부구치소는 제가 있던 남부교도소 바로 옆입니다. 윤석열-김건희 공동정권 두 주체의 몰락을 확인하면서 저는 옥문을 열고 나온 것이니, 정말 만감이 교차했습니다.”\n\n― 언젠가는 윤석열 전 대통령을 사면하는 게 정치적으로 필요하리라 생각하십니까? 조 전 대표는 윤석열·한동훈 두 사람을 용서할 수 있습니까?\n\n“2019년 제가 법무부 장관 후보로 지명되자, 윤석열·한동훈 두 사람은 제가 사모펀드를 활용해 정치자금을 모았다는 황당한 논리를 언론에 전파하고 청와대에도 보고했습니다. 얼마 되지 않아 자신들의 주장이 근거가 없음을 알았을 겁니다. 그러면 수사를 멈춰야 했습니다. 그러나 이들은 수사 중단은 자신들의 오류와 책임을 인정하는 것이기에 제 자식들의 인턴증명서 수사로 파고 들어갔습니다. 10년 전 학생 인턴의 상황을 분 단위로 따졌습니다. 털고 또 털었습니다. 그러면서 저와 우리 가족 전체를 짓밟았습니다.\n\n인턴증명서 기재 시간과 실제 활동시간 사이에 차이가 있음을 인정합니다. 이에 대해선 여러 차례 공개 사과를 했고, 처벌도 받았습니다. 그런 기회를 아예 가질 수 없었던 분들에겐 거듭 죄송하다는 말씀을 드립니다. 그러나 윤석열과 한동훈은 자신들의 지위 보전과 검찰개혁 저지를 위해 검찰권이라는 칼을 망나니처럼 휘둘렀습니다. 베고, 찌르고, 비틀었습니다. 더 중요하게는 윤석열은 계엄을 통해 민주헌정을 파괴하려 했고, 저를 포함한 정치인들을 ‘수거’하여 죽이려 했습니다. 솔직히 말합니다. 저는 두 사람을 용서할 수 없습니다. 단, 국민 다수가 용서하라고 말할 수 있는 조건이 형성되는 경우엔 예외입니다.”\n\n― 출소 메시지에서 국민의힘을 ‘극우정당’이라고 칭했습니다. 국민의힘 극우화를 어떻게 바라보십니까?\n\n“국민의힘 전신(前身) 정당의 경우"}, {"id": 196, "filename": "검찰권 오남용 피해회복 방안 발제문.txt", "title": "검찰권 오남용 피해회복 방안 발제문", "date": "", "category": "정책발표", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["윤석열", "끝까지간다", "내란", "검찰개혁", "비대위"], "preview": "<발제문>   검찰권 오남용 피해회복 방안   조국｜조국혁신당 비상대책위원장, 끝까지간다 특별위원회 위원장   Ⅰ. 들어가며  저는 이재명 정부가 검찰개혁을 완수하는 첫 정부가 되기를 원합니다.  검찰개혁이 국정과제인 마지막 정부가 되기를 강력하게 바라고 있습니다.  지금 국민이 원하는 검찰개혁은 마무리되고 있습니다.  우리 사회 그 누구도 이 흐름을 막을 수 없는 단계까지 왔습니다.   검사에게 수사권과 기소권을 부여한 지 70여 년이 지났고...", "content": "<발제문> \n\n검찰권 오남용 피해회복 방안 \n\n조국｜조국혁신당 비상대책위원장, 끝까지간다 특별위원회 위원장\n\n\nⅠ. 들어가며\n\n저는 이재명 정부가 검찰개혁을 완수하는 첫 정부가 되기를 원합니다. \n검찰개혁이 국정과제인 마지막 정부가 되기를 강력하게 바라고 있습니다.\n\n지금 국민이 원하는 검찰개혁은 마무리되고 있습니다. \n우리 사회 그 누구도 이 흐름을 막을 수 없는 단계까지 왔습니다. \n\n검사에게 수사권과 기소권을 부여한 지 70여 년이 지났고, 검찰개혁이 공론화된 지 30여 년입니다. 노무현 대통령님의 평검사와의 대화는 20여 년 전입니다. 그동안 검찰개혁은 큰 고통과 시련을 동반했습니다. 그 과정에서 우리가 사랑했던 대통령님을 잃었습니다.\n\n이제 검찰개혁 원칙과 방향에 동의하지 않는 국민은 없습니다. 더 이상 검찰은 고쳐 쓸 수 있는 집단이 아니라는 명제는 국민적 합의를 이뤘습니다. \n\n국회에서 검찰청 폐지 및 공소청·중수청 신설 법안이 통과됩니다. \n단순한 조직개편을 넘어 한국 형사사법 체계의 중대한 전환점이 될 것입니다. \n\n다만, 국가적 난제일수록 원칙에 충실해야 합니다. \n검찰개혁의 마지막 관건은, ‘원칙의 싸움’이 될 것입니다. 개혁을 최소화하려는 정치검찰과 내란 세력의 디테일 싸움이 끊이지 않을 것입니다. 따라서 검찰개혁이 역진, 역행될 수 없도록 ‘제도적 완성’과 ‘국민적 동의’의 두 기둥을 확고하게 세워야 합니다.\n\n제도적 완성의 핵심은, 수사 기소 분리의 대원칙을 지키는 것입니다.\n검찰의 보완수사권 폐지가 검찰개혁의 완성입니다.\n\n처음 수사를 경찰에게 맡기고 그다음에 검찰이 수사할 수 있도록 한다면, 수사·기소 분리의 의미는 없어집니다. 단지 검찰이 늦게 수사하는 것뿐입니다. 그래서 문재인정부 시절에는 그 범위를 특정했습니다. 하지만 ‘윤석열과 한동훈 검찰’이 준칙을 통해서 완전히 엎어버렸습니다. \n\n원칙적으로 형사소송법에 명시된 검찰의 수사권을 완전 폐지해야 합니다. \n경찰로부터 송치받는 사건에서 경찰이 수사한 내용을 검찰이 다시 수사하도록 보장하는 직접 보완수사권은 결코 인정되어서는 안 됩니다. 보완수사라는 명목하에 정치검찰이 수사권을 악용하는 사례는 재현될 것입니다. 그것이 정치검찰의 역사입니다. 검찰의 수사권은 기소와 공소유지를 위해 매우 제한적이고 예외적인 경우에만 인정하는 것이 타당합니다\n\n검찰개혁에 대한 국민적 동의는, 검찰권 오남용으로 인한 피해를 온전히 회복할 때 폭넓게 형성될 수 있습니다.\n\n윤석열이 저지른 검찰권 오남용을 덮어 두고 제도개혁만 이뤄진다면, 진정한 회복을 바라는 피해자와 국민들의 열망을 외면하는 것입니다. 검찰이 자행한 오남용 사례를 바로 잡는 것은, 법률적 비법률적 논의를 넘어 정의와 상식의 문제입니다. \n\n지금도 많은 국민들이 검찰의 기소권 남용으로 법정에 서 있습니다. 언론, 노동, 시민사회, 정치인, 전임 정부 관계자 등에 대한 정치 보복 수사를 모든 국민이 생생하게 지켜봤습니다. 평범한 국민은 기소되어 재판을 몇 년간 받으면 무죄를 받더라도 이미 개인과 가족의 삶은 복구될 수 없을 정도로 무너져버립니다. \n\n특히 국민의 지지를 받는 민주 진보 진영의 지도자들에 대한 무차별적 검찰권 행사는 명백한 의도가 있었습니다. 노무현 대통령을 향한 무차별적 모욕주기 수사, 문재인 대통령과 가족, 청와대, 정부 관계자에 대한 무차별 기소, 이재명 대통령을 악마화하기 위해 투입된 150명의 검사와 376회 압수수색 등의 사례는 과거 군사정권의 고문 같은 끔찍한 행태만이 없을 뿐이지 그 목적과 내용은 같았습니다.\n\n형사소송법에 공소 취소 제도가 존재합니다. 여기에 조국혁신당은 관련 내용을 확장한 특별법을 발의했습니다. 정치검찰이 정책 판단을 직권남용으로 왜곡한 사건, 먼지털이식 별건 수사를 가한 사건, 증거 없는 추정에 기초해 무분별한 기소를 남발한 사건 등을 검찰권 오남용 사례로 정의하는 것이 필요합니다. \n\n그리고 해당 사건이 1심 중에 있다면, 공소 취소를 검토해야 합니다. 허위를 만들어 조작한 기소 사건을 존중해야 할 어떤 이유도 없습니다. \n\n그런 의미에서 현직 대통령에 대한 재판 중 일부는 ‘재판 중지’가 아니라 ‘공소 취소’가 논의되어야 합니다. 적법절차 위배와 증언·증거 조작 등이 총동원된 정치 수사와 기소, 그에 따른 재판은 정당성을 가질 수 없기 때문입니다. 이것은 대통령 개인의 문제가 아닙니다. 국민 통합과 검찰개혁의 완성을 위해 극복해야 할 사회적 과제입니다.\n\n오늘 토론회가 검찰권 오남용 피해 회복을 위한 해결 방안으로 수사 기소 분리의 대원칙을 재확인하고, 공소 취소의 기준과 방안을 공론화하는 자리가 되기를 바랍니다.  \n\n\n\nⅡ. 대표적인 검찰권 오남용 사례\n\n1. 문재인 정부에 대한 검찰권 오남용 사례\n\n가. 월성 원전 조기폐쇄 사건\n먼저 월성 원전 조기폐쇄 사건이 대표적입니다. 문재인 정부의 탈원전 정책을 검찰은 경제적 손실, 직권남용으로 몰았습니다. 감사원 감사 결과를 빌미로 산업부 공무원들을 수사했고, 백운규 전 장관을 직권남용으로 기소했습니다. 국민 안전과 환경, 그리고 경제성까지 종합적으로 고려해 내린 정책적 판단을, 마치 정치적 이념에 사로잡혀 직권을 남용한 범죄로 둔갑시킨 것입니다.\n\n나. 김학의 전 차관 출국금지 사건\n김학의 전 차관 출국금지 사건도 마찬가지였습니다. 불법 출국을 막기 위한 긴급 조치를 검찰은 직권남용으로 몰았습니다. 이성윤 당시 서울고검장, 차규근 법무부 출입국본부장, 이규원 검사 등이 기소되었습니다. 그러나 사법부는 이를 직권남용으로 볼 수 없다고 판단했습니다. 1심에 이어 항소심, 대법원까지 모두 무죄가 확정되었습니다. 검찰의 무리한 수사와 기소가 뒤늦게 바로잡힌 것입니다.\n\n다. 사드 배치 관련 논란\n사드 배치 관련 환경영향평가 절차 논란 역시 검찰권 오남용의 전형이었습니다. 2017년 사드 정식 배치를 위해 일반 환경영향평가를 거치기로 했지만, 평가협의회 구성이 고의로 지연되었다는 의혹을 감사원이 제기했고, 이를 근거로 검찰이 청와대와 국방부 관계자들을 수사했습니다. 정의용 전 국가안보실장, 서주석 전 차장, 정경두 전 국방부 장관 등 전 정부 고위 관계자들이 모두 수사 대상이 되었습니다.\n\n사드 기지 자재 반입 방해 문제도 형사사건으로 둔갑시켰습니다. 지역 주민의 반발과 환경영향평가 절차에 따른 불가피한 지연을, 검찰은 의도적 방해 행위인 양 직권남용으로 몰아붙였습니다.\n\n이는 안보·국방·외교·환경 등에 대한 고도의 정책적 판단을 직권남용으로 오도한 것이었습니다.정책 결정을 범죄로 날조했을 뿐 아니라, 감사원과 검찰을 총동원해 전 정부의 외교·안보 정책을 흔든 검찰에 의한 ‘쿠데타’였습니다.\n\n라. 산업부·과기부·통일부 등 정부부처 인사권 행사 논란\n산업부·과기부·통일부 등에 대한 정당한 부처 인사권 행사 또한 ‘직권남용’으로 왜곡되었습니다. 산업부의 경우 탈원전 정책 등 새 정부 정책 추진을 위한 산하 기관장 인사를 두고, 마치 특정 인사에게 당한 특혜를 준 것처럼 검찰이 몰아붙였습니다. 과기부와 통일부 역시 정책 방향에 따른 산하 공공기관장 인사권 행사를 문제 삼아 줄줄이 소환 조사했습니다. 이는 정부정책의 변경에 따른 행정부의 고유 권한인 인사권을 행사를 범죄시한 전형적인 사례였으며 이러한 문제의식에는 여야가 모두 공감하여 현재 공공기관운영법 개정안이 논의되고 있습니다.\n\n이들 사건에는 몇 가지 공통된 특징이 있었습니다.\n첫째, 정책 판단을 직권남용으로 왜곡했습니다.\n둘째, 민생범죄 단속 대신 전 정부 탄압에 감사원과 검찰 반부패부(특수부)를 총동원했습니다.\n셋째, 무자비한 포렌식과 별건 수사로 먼지털이식 수사를 자행했습니다.\n넷째, 증거 없는 추정에 기초해 무분별한 기소를 남발했습니다.\n다섯째, 장기간의 재판과 물량 공세로 무죄가 선고되더라도 심각한 피해를 남겼습니다.\n\n정책 판단 영역만이 아니었습니다. 언론 자유마저 검찰권 남용의 희생양이 되었습니다.\n\n\n\n2. 언론에 대한 검찰권 오남용 사례\n\n언론에 대한 탄압도 이어졌습니다. 2022년 8월 법무부는 직접수사 범위를 확대하는 대통령령을 개정했고, 이를 근거로 검찰은 뉴스타파 기자들을 윤석열 명예훼손 혐의로 기소했습니다. 뉴스타파는 윤석열 당시 검사의 부산저축은행 수사 무마 의혹을 보도했을 뿐이었습니다. 그러나 검찰은 언론사를 압수수색하고 기자들을 기소했습니다. 특별수사팀까지 꾸려 무차별적이고 무자비한 통신조회를 감행했습니다. 재판부가 공소 유지에 문제를 제기했음에도 검찰은 아랑곳하지 않았습니다. 이는 검찰권을 남용해 언론의 자유와 독립성을 짓밟은 사건이었습니다.\n\n3. 문재인 전 대통령에 대한 검찰권 오남용 사례\n\n문재인 대통령 사위 사건은 정권 차원의 정치공작이었습니다. 검찰은 대통령의 사위를 겨냥해 정상적인 취업 절차를 뇌물 사건으로 둔갑시켰습니다. 무자비한 포렌식과 압수수색이 동원됐지만 혐의는 모호했습니다. 일부 혐의는 무혐의로 결론 났지만, 장기간의 수사와 재판은 대통령 가족의 명예를 훼손하고 정치적 보복의 도구로 악용되었습니다.\n\n전직 대통령을 겨냥한 표적 수사에 이어, 유력 대권주자였던 이재명 당시 민주당 대표를 향한 정치적 수사가 이어졌습니다.\n\n4. 이재명 대통령에 대한 검찰권 오남용 사례\n\n이재명 대통령 사건은 검찰권 오남용의 극단이었습니다. 검찰은 검사 150여 명과 수백 명의 인력을 투입했습니다. 2년 넘는 수사와 376차례에 달하는 압수수색이 이어졌습니다. 경기도 법카 사건, 백현동 개발 사건, 쌍방울 사건 등 모든 의혹을 총동원한 전방위 수사였습니다. 검찰 반부패부가 총동원되어 조직적·체계적 압박이 가해졌습니다. 그러나 실질적 범죄 증거는 확보되지 않았습니다. 그럼에도 불구하고 검찰은 공소를 유지하며 정치공작을 노골적으로 감행했습니다.\n\n쌍방울 대북송금 사건은 대표적 왜곡입니다. 이 사건은 원래 쌍방울 주가조작 사건으로 시작됐습니다. 김성태 쌍방울 회장이 북한 측과 결탁해 대북사업과 주가부양의 대가로 800만 달러를 환치기 등 불법적인 방식으로 북측에 전달한 것이 본질이었습니다. 이는 유엔 제재와 미국 제재를 위반한 중대한 범죄였습니다. 그러나 검찰은 이를 억지로 “이재명 대북송금 사건”으로 둔갑시켰습니다.\n\n이와 관련해 수원지검은 수사 과정에서 공범들을 모아놓고 연어·술판을 벌이"}, {"id": 197, "filename": "경기도당 당원 간담회.txt", "title": "경기도당 당원 간담회", "date": "", "category": "기자회견·간담회", "topics": ["내란·윤석열", "조국혁신당", "인권·사회"], "tags": ["비대위", "윤석열"], "preview": "2025.09.23 경기도당  경기도당 당원 여러분, 오랜만에 인사드립니다. 반가운 얼굴들이 많습니다. 함께해주셔서 진심으로 감사드립니다.  먼저 그동안 여러분이 보여주신 헌신과 열정에 깊이 감사드립니다. 제가 부재했던 동안 윤석열 파면과 국민주권정부의 출범을 이뤄내셨습니다. 모든 것이 여러분의 성과입니다. 무엇보다 조국혁신당을 굳건히 지켜주셔서 감사드립니다.  지금 이 자리가 왜 마련되었는지, 우리가 어떤 마음을 나눠야 하는지,  당원 여러분...", "content": "2025.09.23 경기도당\n\n경기도당 당원 여러분, 오랜만에 인사드립니다.\n반가운 얼굴들이 많습니다. 함께해주셔서 진심으로 감사드립니다.\n\n먼저 그동안 여러분이 보여주신 헌신과 열정에 깊이 감사드립니다.\n제가 부재했던 동안 윤석열 파면과 국민주권정부의 출범을 이뤄내셨습니다.\n모든 것이 여러분의 성과입니다.\n무엇보다 조국혁신당을 굳건히 지켜주셔서 감사드립니다.\n\n지금 이 자리가 왜 마련되었는지, 우리가 어떤 마음을 나눠야 하는지, \n당원 여러분께서 더 잘 아시리라 생각합니다.\n오늘 이 자리에 비상대책위원회 위원분들도 함께하셨습니다. \n무거운 마음이 자리 잡고 있습니다. \n동시에 우리에게 의미있는 변화의 시간이 될 수 있다는 \n희망과 기대로 갖고 있습니다. \n\n비대위의 목표는 공동체 회복입니다. 피해자분들의 회복을 중심으로 \n당원분들, 지지자분들까지 함께 회복되는 길을 찾기 위해 노력하고 있습니다. \n성평등 향상과 인권 보호를 위한 대대적인 당규 제정, 2차 가해 행위 중징계를 비롯해 고충심의위원회 및 상담센터 설치 등 다양한 피해자 보호 조치를 실천 중입니다.\n윤리감찰단과 윤리심판원도 설치할 계획입니다. \n당의 주춧돌부터 기둥, 서까래, 지붕까지 하나하나 고쳐나가고 있습니다.\n\n당원 동지 여러분, \n한 가지 당부드리고 싶은 것이 있습니다. \n현재 2차 피해를 확산시키는 허위와 조작정보, 즉 가짜뉴스가 유포되고 있습니다.\n사실이 아닌 정보에 정략적 의도를 교묘히 섞어 퍼뜨리며,\n조국혁신당이 지리멸렬하기를 바라는 세력도 있습니다.\n\n저와 조국혁신당에 대한 매서운 비판은 기꺼이 감수하겠습니다.\n그러나 선입견과 편견에 기초한 비방과 비난,\n사실을 무시한 가짜뉴스에는 단호히 대응하겠습니다.\n가짜뉴스의 목적은 단 하나입니다. \n회복하고 통합하고자 하는 우리의 의지를 꺾어버리는 것입니다. \n우리의 공동체적 회복을 방해하는 모든 시도에 단호하게 대처하겠습니다.\n\n최근 피해자 한 분을 만났습니다.\n그분이 원하신 것은 존엄한 회복과 2차 피해 방지, 그리고 ‘잊힐 권리’였습니다.\n그 뜻을 우리가 존중하고, 함께 지켜드리는 태도가 필요합니다. \n\n사랑하는 당원 여러분, \n당원 여러분의 진심이 저의 진심이고, \n우리의 진심이 국민들께 전달될 것입니다.\n\n그리고 당원 여러분이 \n조국혁신당의 비대위원이라는 점을 강조드립니다. \n오늘 저를 비롯한 모든 비대위원이 \n여러분의 목소리를 빠짐없이 담아가겠습니다.\n쓰라린 충고라도 피하지 않고 온전히 새기고 실천하겠습니다.\n\n다시 한번, 비대위원장으로서 피해자분들께 사과드립니다.\n상처받은 당원 여러분께도 진심으로 미안합니다. \n\n오늘 이 자리를 준비해주신 신장식 경기도당 위원장님,\n지역위원장님들, 실무자 여러분,\n그리고 바쁜 와중에도 함께해주신 당원 여러분께\n진심으로 감사드립니다. \n\n/끝/"}, {"id": 198, "filename": "관세 협상 관련 메시지.txt", "title": "관세 협상 관련 메시지", "date": "", "category": "기타 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["트럼프", "기자회견", "관세", "사법개혁", "윤석열", "검찰개혁", "비대위"], "preview": "지금은 ‘관세 팬데믹’ 상황입니다. 코로나 위기 때처럼 국가적 총력 대응 체계를 가동해야 하는 비상시기입니다. 이재명 대통령과 정부는 미국 트럼프 정부의 일방적인 요구에 맞서 어렵게 협상하고 있습니다. 인수위원회 없이 출범한 첫날부터 지금까지 미국의 압박을 견디며 협상을 진행하고 있습니다.  그러나 국회가 대통령과 정부를 제대로 뒷받침하지 못하고 있습니다.  우리나라 경제 성장을 이끌었던 주요 산업도시들이 미국의 관세 폭탄으로 쇠퇴를 넘어 소멸...", "content": "지금은 ‘관세 팬데믹’ 상황입니다. 코로나 위기 때처럼 국가적 총력 대응 체계를 가동해야 하는 비상시기입니다.\n이재명 대통령과 정부는 미국 트럼프 정부의 일방적인 요구에 맞서 어렵게 협상하고 있습니다. 인수위원회 없이 출범한 첫날부터 지금까지 미국의 압박을 견디며 협상을 진행하고 있습니다. \n그러나 국회가 대통령과 정부를 제대로 뒷받침하지 못하고 있습니다. \n우리나라 경제 성장을 이끌었던 주요 산업도시들이 미국의 관세 폭탄으로 쇠퇴를 넘어 소멸을 걱정하는 지경입니다. 특히 포항은 윤석열 정부에서 철강 공장들이 문을 닫기 시작하다가, 관세 폭탄이 현실화되면서 지역경제가 패닉에 빠진 상태입니다. 제가 사면으로 석방된 후 영남 지역 중 가장 먼저 포항을 방문했던 이유도 여기에 있었습니다. 여야가 초당적으로 ‘K-스틸법’ 통과에 힘을 모을 것을 공언했지만, 현실화되지 못했습니다.\n국민의힘 소속이지만, 이강덕 포항시장의 미국 백악관 앞 관세 항의 시위는 인상적입니다. 미국 월스트리트저널은 “트럼프의 관세 때문에 포항은 죽음의 문턱까지 왔다”는 이 시장의 발언을 상세히 보도했습니다.\n국회는 포항시장보다 할 수 있는 일이 훨씬 더 많습니다. 권한과 책임이 비교할 수 없을 정도로 무겁습니다. 국회가 나서야 합니다. 이재명 대통령 뒤에 국민 전체가 함께하고 있다는 것을 보여주어야 합니다. 협상 중인 이재명 정부가 할 수 없는 말을 해야 합니다.\n국민은 이미 나섰습니다. 최근 한 여론조사 기관의 조사를 보면, 국민 10명 중 8명은 미국의 3천500억 달러 선불 요구가 부당하다고 답변했습니다. 특히 대구·경북과 호남 모두에서 부당하다는 의견이 약 85%로 나타나 영호남의 의견이 일치되었습니다. 지금 국민은 정당의 당리당략에 관심이 없습니다. 오로지 국익 보호를 최우선하고 있습니다. \n작은 정당의 비상대책위원장이지만 절박하게 호소합니다.\n국민의 뜻에 국회가 응답해야 합니다. ‘관세 팬데믹’ 극복은 검찰개혁, 사법개혁 이상으로 중요합니다. 당장 여야 대표들이 모여서 초당적 대처를 시작해야 합니다. \n먼저 명절 연휴가 끝난 직후에 미국의 일방적 요구를 거부하는 국회 결의안을 통과시킵시다. 여야 대표들이 공동으로 외신 기자회견을 열어 미국의 불평등한 요구에 응할 수 없음을 강조합시다. 산업 위기 지역 지원과 수출 다변화 전략 마련도 전속력을 냅시다.\n국민의힘에 경고합니다. 지금은 극우라는 당파적 이익이 아니라 대한민국의 국익을 선택해야 할 때입니다. \n국민의힘은 국익을 위해 협상 중인 이재명 대통령을 흔들기 위해 온갖 흠집 내기와 극우 선동을 일삼고 있습니다. 대한민국의 국익이 아니라 미국 MAGA 세력의 관점에서 움직이고 있지 않은지 의심스럽습니다. 관세전쟁의 한복판에서 정부의 발목을 잡는 것은 매국 행위로 비판받을 것입니다. 국익을 지키는 데 함께 하기를 촉구합니다."}, {"id": 199, "filename": "끝까 12차 끝까지간다.txt", "title": "끝까 12차 끝까지간다", "date": "", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["5.18", "사법개혁", "윤석열", "끝까지간다", "내란", "검찰개혁", "비대위"], "preview": "2025. 9. 17. 9:30  ‘끝까지간다 특별위원회’ 위원장 조국입니다.  비상대책위원장을 맡으면서 ‘끝까지간다 특위’위원장을 겸임하게 되었습니다.  조희대 대법원장은 이미 국민으로부터 불신임을 받았습니다.  사법개혁은 검찰개혁과 함께 국민의 불가역적 과제가 되었습니다.  이것은 조희대 이하 법관 엘리트들의 자초위난(自招危難)이자 자업자득(自業自得)입니다.   대법원장을 위시한 법원 지도부는 윤석열의 내란에 대하여 어떠한 비판 입장도 표명...", "content": "2025. 9. 17. 9:30\n\n‘끝까지간다 특별위원회’ 위원장 조국입니다. \n비상대책위원장을 맡으면서 ‘끝까지간다 특위’위원장을 겸임하게 되었습니다.\n\n조희대 대법원장은 이미 국민으로부터 불신임을 받았습니다. \n사법개혁은 검찰개혁과 함께 국민의 불가역적 과제가 되었습니다. \n이것은 조희대 이하 법관 엘리트들의 자초위난(自招危難)이자 자업자득(自業自得)입니다. \n\n대법원장을 위시한 법원 지도부는 윤석열의 내란에 대하여 어떠한 비판 입장도 표명하지 않았습니다.\n지귀연 재판부는 전례 없는 계산법으로 윤석열에게 석방의 길을 열어줬습니다. \n대법원은 대선이 진행 중인 상황에서 이재명 대선 후보를 제거하기 위한 시도를 감행했습니다. \n지귀연 재판부는 윤석열의 1심 구속만기 석방을 바라는 듯 재판을 천천히 진행하고 있습니다.\n이런 이유로 사법부가 국민적 불신과 분노, 개혁 요구에 직면하게 된 것입니다.\n\n그런데 법원은 여전히 반성하지 않고 있습니다. \n오히려 지난 12일 전국 법원장들이 모여서 \n국회의 사법개혁을 “사법부 독립”을 내세우며 반대했습니다.\n\n양심이 있다면, 과거를 돌아보기 바랍니다. \n\n법원은 윤석열 검찰총장 시절, ‘판사 사찰’에 입도 뻥긋하지 않았습니다.\n전국법관대표회의에서 판사 사찰 안건을 부결시키기까지 했습니다.\n\n사법부의 독립은 법원의 과오를 숨기기 위한 가치가 아닙니다.\n곽상도 아들의 퇴직금 50억 원 수령이 무죄라고 선고해놓고 비판으로부터 자유로울 보호장치가 아닙니다.\n나경원 등의 국회 패스트트랙 방해행위 1심 재판을 6년이나 끌고도 비판받지 않을 특권을 주는 방패가 아닙니다.\n\n사법개혁은 검찰개혁과 함께 매듭지어야 합니다. \n법원을 이끄는 엘리트 집단을 민주적으로 통제하지 못한다면,\n언제든 반헌법적 판결이 되풀이될 수 있습니다. \n\n조국혁신당은 ‘조희대 없는 대법원, 지귀연 없는 재판부’를 만들겠습니다. \n\n첫째, 대선 후보를 제거하려 한 조희대 대법원 전원합의체 판결에 대한 특검이 필요합니다. 그 전이라도 공수처는 고발받은 사건을 철저히 수사해야 합니다.\n내란 이후 법원이 내란에 협조했는지 여부를 밝히는 결정적 증거가 이 판결 뒤에 숨어 있을지도 모릅니다. \n대법원의 유례없는 대선 개입을 이대로 덮고 갈 수는 없습니다.\n\n둘째, 조희대 대법원장은 지금이라도 국민 앞에 해명하고 사과해야 합니다.\n그리고 스스로 거취를 고민하는 것이 맞습니다. \n이를 거부한다면, 국회가 나설 수밖에 없습니다. \n조국혁신당은 이미 조희대 대법원장에 대한 탄핵소추안을 준비했습니다. \n\n셋째, 독립된 감찰기구의 설치입니다. \n법관들은 편파적인 재판 진행, 심리 소홀, 재판 지연 등의 행위가 있어도 \n감찰이나 징계를 받지 않습니다. \n반헌법적 반국민적 재판을 예방하기 위한 적정한 감사는 이뤄져야 합니다.\n대법원장의 지휘를 받지 않는 독립된 감찰기구를 논의해야 합니다.\n\n넷째, 법령 개정을 통한 사법 관련 기관의 지방 이전입니다. \n서울에 위치할 필요가 없는 사법기관들을 지방으로 분산시켜야 합니다.\n실효적인 지방분권 방안이자, 권력분권 방안입니다. \n예컨대, \n대법원을 전주에 보내지 않을 이유가 없고, \n헌법재판소를 광주에 안 보낼 이유가 없습니다.\n대검찰청을 대구에 보내지 않을 이유가 없고, \n감사원을 경남이나 강원도로 안 보낼 이유가 없습니다. \n\n앞으로 ‘끝까지간다 특위’를 더욱 활성화해서 망치선 역할에 앞장서겠습니다. \n조국혁신당은 검찰개혁과 사법개혁을 향한 망치질을 끝까지 해나가겠습니다. \n감사합니다.   /끝/"}, {"id": 200, "filename": "남부교도소 사면 소회.txt", "title": "남부교도소 사면 소회", "date": "", "category": "기타", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "윤석열"], "preview": "남부교도소 사면 소회  안녕하십니까? 존경하는 국민 여러분, 먼저 헌법적 결단을 내려주신 이재명 대통령님께 깊은 감사의 인사를 드립니다. 그리고 저의 사면 복권을 위해서 탄원을 해 주신 종교계 지도자분들, 시민사회 원로 분들 전직 국회의장님들 그리고 국내외 학자 교수님들께도 인사드립니다. 저의 사면에 대해 비판의 말씀을 해 주신 분들에 대해서도 충분히 존경의 마음으로 경청하고 있습니다. 오늘 저의 사면복권과 석방은 검찰권을 오남용해 온 검찰독재...", "content": "남부교도소 사면 소회\n\n안녕하십니까?\n존경하는 국민 여러분, 먼저 헌법적 결단을 내려주신 이재명 대통령님께 깊은 감사의 인사를 드립니다.\n그리고 저의 사면 복권을 위해서 탄원을 해 주신 종교계 지도자분들, 시민사회 원로 분들 전직 국회의장님들 그리고 국내외 학자 교수님들께도 인사드립니다.\n저의 사면에 대해 비판의 말씀을 해 주신 분들에 대해서도 충분히 존경의 마음으로 경청하고 있습니다.\n오늘 저의 사면복권과 석방은 검찰권을 오남용해 온 검찰독재가 종식되는 상징적 장면의 하나로 기억될 것이라고 믿습니다.\n조국혁신당은 창당 때부터 지금까지 3년은 너무 길다, 검찰독재정권 조기종식을 내걸고 윤석열 정권과 싸워왔습니다.\n윤석열 일당은 내란이라는 반헌법적 폭거를 일으켰지만 국민에 의해서 격퇴되었습니다.\n이재명 정부는 이러한 국민들의 투쟁, 저항의 산물입니다.\n국민들의 주권 행사의 산물입니다.\n이재명 정부는 반드시 성공해야 합니다.\n이재명 대통령님도 성공한 대통령이 되셔야 합니다.\n미력이나마 저는 힘을 보태겠습니다.\n현재 여전히 윤석열과 단절하지 못하고 윤석열을 비호하는 극우정당 국민의힘은 다시 한번 심판받아야 합니다.\n그리고 민주진보진영은 더욱 단결하고 더욱 연대해야 합니다.\n제가 자유를 찾은 지금부터 이 두 가지 과제를 위해서 힘을 쏟겠습니다.\n그리고 조국혁신당 당원 동지 여러분, 많이 보고 싶었습니다.\n어려운 시기 당을 이끌어주신 옆에 계신 김선민 권한대행님, 또 서왕진 원내대표를 포함해 지도부께 경의의 인사를 드립니다.\n그리고 심야시간에 이 먼 곳까지 와주신 당원 동지분들 그리고 시민 여러분께도 고맙습니다.\n지난 8개월 동안 이곳에서 깊은 성찰과 넓은 구상을 했습니다.\n복당 조치가 이루어지면 더욱 겸허한 마음으로, 더욱 낮은 자세로 국민 속으로 들어가겠습니다.\n말씀을 듣고 정치를 하겠습니다.\n저에 대한 비판, 반대, 비방 모두 다 받아 안으면서 정치를 하겠습니다.\n감사합니다."}, {"id": 201, "filename": "뉴스토마토 정책포럼 축사.txt", "title": "뉴스토마토 정책포럼 축사", "date": "", "category": "축사·포럼", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["사법개혁", "윤석열", "민생", "의료", "내란", "교육", "검찰개혁", "비대위"], "preview": "뉴스토마토 정책포럼 현장축사 말씀자료  2025. 9. 23. 10:00   안녕하십니까, 조국혁신당 비상대책위원장 조국입니다. 뜻깊은 자리에 초청해 주셔서 감사드립니다.  뉴스 토마토의 지면 창간 10주년을 축하드립니다.   저로서는 개인적 소회를 먼저 말씀드리고 싶습니다. 돌이켜보면, 윤석열의 내란의 단초가 되었던 보도는 뉴스토마토의 ‘명태균 게이트’ 특종이라고 생각합니다.  조금 씁쓸하지만 개인적 이야기를 하자면, 제가 8개월 영어생활하는...", "content": "\n뉴스토마토 정책포럼 현장축사 말씀자료\n\n2025. 9. 23. 10:00 \n\n안녕하십니까, 조국혁신당 비상대책위원장 조국입니다.\n뜻깊은 자리에 초청해 주셔서 감사드립니다. \n뉴스 토마토의 지면 창간 10주년을 축하드립니다. \n\n저로서는 개인적 소회를 먼저 말씀드리고 싶습니다.\n돌이켜보면, 윤석열의 내란의 단초가 되었던 보도는 뉴스토마토의 ‘명태균 게이트’ 특종이라고 생각합니다. \n조금 씁쓸하지만 개인적 이야기를 하자면, 제가 8개월 영어생활하는 동안 뉴스토마토 종이신문을 구독했습니다.\n매 기사 말미에 이 기사가 어떤 절차를 통해서 사실확인되었다는 표시가 있던게 다른 언론과 차이가 났습니다. 특이했고 특별했다고 생각합니다. \n그 안에서 보았던“시민영웅 1000명”이 이야기 가슴 찡했습니다.\n앞으로도 국민의 신뢰와 사랑을 받는 언론이 되기를 응원합니다.\n\n우리는 오늘 포럼의 주제처럼 ‘회복에서 성장으로’의 전환점에 서 있습니다.\n지금 국민들의 노력으로, 민생, 외교, 정치, 경제, 사법, 문화 등 \n대한민국의 모든 분야가 회복되고 있습니다.  \n\n저는 한 걸음 더 나아가야 한다고 생각합니다. \n돈 없고 힘없는 국민도 희망을 가질 수 있는, \n‘모두의 회복’이 이루어져야 합니다. \n모두가 회복될 때, 모두의 성장이 가능하다고 믿습니다. \n\n이를 위해 반드시 해야 할 일들이 있습니다. \n국민이 원하는 검찰개혁, 사법개혁, 정치개혁 완수해야 합니다. \n주거, 의료, 돌봄, 교육 등 민생 개혁도 반드시 이루어져야 합니다. \n그래서 저는 석방이후 일관되게 내란 세력 제로, 극우 제로, 불평등 제로라는, \n쓰리제로 전략을 강조해왔습니다. \n오늘의 정책포럼이 이러한 시대적 과제를 실천하는데 기여할 것이라고 확신합니다. \n\n저는 정당의 목표와 언론의 목표가 다르지 않다고 생각합니다. \n언론이 국민의 목소리를 대변할 때, 언론의 힘은 더욱 커질 것이고\n언론이 사명감을 잊지 않을 때, 우리 민주주의도 강해질 것입니다.  \n정당과 언론이 사회로부터 소외되고 배제된 ‘잊혀진 사람들’을 기억하고 대변할 때, \n대한민국은 더 나은 공동체가 되리라 믿습니다. \n정당과 언론이 각자의 책임을 다할 때 모두의 회복과 모두의 성장은 앞당겨질 것입니다. \n저 역시 제 자리에서 책임있는 정치를 하겠습니다. \n\n"}, {"id": 202, "filename": "당직자간담회.txt", "title": "당직자간담회", "date": "", "category": "기자회견·간담회", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당", "인권·사회"], "tags": [], "preview": "2025.09.18 국회의원회관 제1세미나실  작년 12월 3일 당직자 조회 이후 처음으로 한 자리에 모였습니다.  그런데 미안하다는 말을 먼저 할 수밖에 없어서 마음이 아픕니다.  창당부터 지금까지, 당직자분들의 헌신 위에 당은 존재했습니다.  조국혁신당은 여러분의 뜨거운 열정을 연료로 꾸준히 성장해 왔습니다.  그리고 탄핵과 정권교체 과정에서 놀라운 성과를 만들었습니다.    조국혁신당의 지도부, 국회의원, 당직자, 모두가 평등한 당의 일원...", "content": "2025.09.18\n국회의원회관 제1세미나실\n\n작년 12월 3일 당직자 조회 이후 처음으로 한 자리에 모였습니다. \n그런데 미안하다는 말을 먼저 할 수밖에 없어서 마음이 아픕니다.\n\n창당부터 지금까지, 당직자분들의 헌신 위에 당은 존재했습니다. \n조국혁신당은 여러분의 뜨거운 열정을 연료로 꾸준히 성장해 왔습니다. \n그리고 탄핵과 정권교체 과정에서 놀라운 성과를 만들었습니다. \n \n조국혁신당의 지도부, 국회의원, 당직자, 모두가 평등한 당의 일원입니다. \n특히 여러분은 당의 심장이자 혁신의 엔진입니다. \n어떤 상황에서도 그 자긍심을 꼭 간직해 주시길 부탁드립니다.\n\n여러분들의 상처가 깊다는 것을 잘 알고 있습니다.\n당을 대신해서 깊이 사과드립니다. \n오늘, 잘 듣겠습니다. \n그리고 돌아가서 여러분의 뜻을 실천하는 방법을 찾겠습니다.\n\n여러분들이 사랑하는 조국혁신당의 본래 모습을 되찾도록 노력하겠습니다. \n당직자의 권리와 존엄이 존중되는 조직을 만들겠습니다.\n당연한 희생이 없는 당으로 재정비하겠습니다.\n모두의 치유를 위해 힘쓰겠습니다. \n일하고 싶은, 사랑하는 공동체로 반드시 복원시키겠습니다. 감사합니다.  /끝/"}, {"id": 203, "filename": "동아일보 조국 비대위원장 인터뷰.txt", "title": "동아일보 조국 비대위원장 인터뷰", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["민생", "윤석열", "부동산"], "preview": "동아일보 조국 비대위원장 인터뷰 2025.09.29  ―내년 지선 승부처인 호남 전략은….  “호남에선 모든 선거구에서 반드시 민주당과 경쟁한다. 특정 기업이 독과점하면 소비자는 선택권을 잃고 기업은 방만해져 불량 상품을 낸다. 호남에서 단체장과 의회가 거의 다 같은 당이니 유착과 부정부패가 벌어져 수시로 감옥 가는 악순환을 깨야 한다.”  ―‘국민의힘 광역단체장 0명’ 공약대로 비호남권에선 민주당과 연대하나.  “한 선거구에서 2∼4명을 뽑는...", "content": "동아일보 조국 비대위원장 인터뷰\n2025.09.29\n\n―내년 지선 승부처인 호남 전략은….\n\n“호남에선 모든 선거구에서 반드시 민주당과 경쟁한다. 특정 기업이 독과점하면 소비자는 선택권을 잃고 기업은 방만해져 불량 상품을 낸다. 호남에서 단체장과 의회가 거의 다 같은 당이니 유착과 부정부패가 벌어져 수시로 감옥 가는 악순환을 깨야 한다.”\n\n―‘국민의힘 광역단체장 0명’ 공약대로 비호남권에선 민주당과 연대하나.\n\n“한 선거구에서 2∼4명을 뽑는 기초의원 선거엔 전국 모든 곳에 후보를 낼 거다. 청년 여성 신인 등을 적극 발굴하겠다. 다만 시도지사 선거의 경우 서울 경기 부산 등 민주당과 국민의힘이 아슬아슬한 지역에선 어떻게든 1 대 1 구도를 만들어 국민의힘으로 안 넘어가게 할 거다.”\n\n―본인도 출마 의사를 밝혔는데 나갈 곳은 정했나.\n\n“아직 점검 자체를 못 했다. 민주당 의원들도 ‘여기 가라’ ‘저기 가라’ 각자 다른 제안을 할 만큼 합의가 안 돼 있는 것 같다. 내년 초에 선거기획단을 짜고 전국 후보들의 전력이 파악되면 배치를 결정할 거라 내년 봄은 돼야 결정할 것 같다.”\n\n―조국혁신당 간판을 달고 출마할 후보군은 살펴봤나.\n\n“11월 23일 전당대회를 거쳐 당 대표가 된다면 직접 인재영입위원장을 맡아 조국혁신당의 컬러와 맞는 분을 찾을 거다. 요즘 2∼4% 안팎인 당 지지율로는 그분들도 망설일 거다. 내년 초까지 반드시 당 지지율을 10%까지 끌어올리겠다. 그럼 완전히 달라질 거다.”\n\n지난달 조 위원장 사면복권 이후 조국혁신당은 성 비위 사건을 겪으며 지지율이 2∼4%로 정체 중이다. 반면 조 위원장은 한국갤럽의 16∼18일 장래 정치지도자 선호도 조사에서 8%로 민주당 정청래 대표(4%), 김민석 국무총리(3%) 등에게 앞섰다(표본오차 95% 신뢰수준에 ±3.1%포인트, 전화면접 조사. 자세한 내용은 중앙선거여론조사심의위원회 참고).\n\n―사면 후 차기 대권주자로 주목받고 있다.\n\n“저는 상처가 깊고 낙인이 찍힌 정치인이다. 그걸 치유하는 과정이 있어야 한다. 저를 증오하는 분들의 마음을 얻기 위해 노력하는 게 먼저고, 그러려면 정치인으로서의 효능을 보여줘야 한다. 작년에 창당할 때 ‘10년 정치’를 얘기했는데, 꾸준히 앞으로 걸어가겠다는 의지는 변함없다.”\n\n―당 지지율은 정체인데 본인은 장래 지도자 1위로 꼽힌 배경은….\n\n“그 조사에서 민주당 지지층의 9%가 정 대표를 지지했는데 17%가 저를 지지한 게 특이했다. 당이 다르고 내부 상황도 안 좋은데도 민주당 지지층이 ‘조국이 쓸모가 있다’고 판단하고 있다는 걸 확인했다고 본다.”\n\n―비대위원장 임명 2주 남짓인데 성 비위 내홍은 수습됐나.\n\n“기존 지도부에서 법규에 따라 편견 없이 가해자를 엄중히 징계했다. 그럼에도 그 과정에서 피해자의 마음을 충분히 짐작하지 못하고 상처를 준 게 확인됐다. 비대위원장 임명 후 2차 가해행위 엄단 포함 20가지 조치를 진행 중이다. 전당대회 전까지 두 달 동안 진심을 다하겠다.”\n\n―78년 만의 검찰청 폐지를 바라보는 소회가 남다를 것 같다.\n\n“(검찰이) 윤석열 전 대통령의 검찰총장과 대통령 시절 검찰권을 오남용했던 죗값을 받는 거다. 윤석열과 거기에 동조했던 한동훈 책임이다. (윤석열 정부 시절 기소했던 문재인 정부의) 울산시장 선거 개입 건은 무죄가 확정됐고, 강제북송 건은 1심서 선고유예가 났다. 부동산 통계 조작도 무죄가 날 거다.”\n\n―검찰권 오남용 최대 피해자로 이재명 대통령을 꼽았는데….\n\n“이 대통령 사건은 임기 중 공소 취소해야 한다. 1심 재판이 멈춰 있으니 언제든 할 수 있다. 대통령이 나서서 말하기는 힘들 테니 법무부 장관이 해야 할 몫이다.”"}, {"id": 204, "filename": "문화권 관련 메시지.txt", "title": "문화권 관련 메시지", "date": "", "category": "기타 메시지", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "5.18", "사법개혁", "민생"], "preview": "“과거가 현재를 도울 수 있을까”  작년 겨울 우리 국민은 한강 작가가 던진 물음에 응답했습니다. 불법 계엄 앞에 1980년 오월의 광주 정신이 광장의 빛으로 되살아났습니다. 이처럼 “과거가 현재를 돕는 것”이 바로 민주주의의 작동 방식입니다. 민주주의는 한 세대, 한 정권에서 완성되는 것이 아니라 세대와 정권을 지나며 끊임없이 발전하는 부단한 과정입니다. 12·3 내란이 실패했음에도 내란 옹호 세력의 준동은 지금도 이어지고 있습니다. 내란 옹...", "content": "“과거가 현재를 도울 수 있을까” \n작년 겨울 우리 국민은 한강 작가가 던진 물음에 응답했습니다. 불법 계엄 앞에 1980년 오월의 광주 정신이 광장의 빛으로 되살아났습니다. 이처럼 “과거가 현재를 돕는 것”이 바로 민주주의의 작동 방식입니다. 민주주의는 한 세대, 한 정권에서 완성되는 것이 아니라 세대와 정권을 지나며 끊임없이 발전하는 부단한 과정입니다.\n12·3 내란이 실패했음에도 내란 옹호 세력의 준동은 지금도 이어지고 있습니다. 내란 옹호 세력이 이 땅에 발붙일 수 없도록 사법개혁과 정치개혁을 끈질기게 실천하겠습니다. 국민과 함께 더 좋은 민주주의를 향한 노력을 멈추지 않겠습니다. \n노벨상 시즌입니다. 한강 작가가 한국 역사상 최초로 노벨문학상을 수상한 지 1년이 다가옵니다.\n노벨문학상 수상을 계기로 세계는 한국문학을 바라보는 시선이 달라졌습니다. K-문학이 새로운 장르로 주목받으며 판권 수출이 이전보다 활발하게 이뤄졌습니다. 우리의 문화적 자부심은 더욱 높아졌습니다. \n하지만 문화예술계의 현실은 여전히 척박합니다. 2021년 정부의 조사에 따르면, 문학인의 70%가 문학 활동으로 월 50만 원 미만의 소득을 얻는 것으로 나타났습니다. 그래서 많은 문학인들이 생계를 위해 다른 경제활동을 병행하는 실정입니다.\n다들 ‘문화강국’을 강조합니다. 그러나 진정한 문화강국은 창작자들이 창작에만 전념할 수 있는 세상입니다. 문학인을 비롯한 문화예술인들을 위한 맞춤형 사회안전망 구축이 절실합니다. 극소수의 스타 문화예술인에 가려진 대다수의 문화예술인의 현실을 챙겨야 합니다.\n현재 문화예술인들은 프리랜서가 많고 소득이 적어 사회보험 가입률이 낮습니다. 일시적 생활 지원을 넘어 창작 활동이 지속될 수 있는 토대를 만들어야 합니다. 아울러 지역별 특성을 고려해서 다양한 형태의 창작 공간이 확충되도록 지원해야 합니다. 특히 청년 문화예술인들을 위해 디지털 기술을 접목한 창작 플랫폼도 국회와 정부가 챙겨야 할 과제입니다. 국회와 정부는 문화예술인은 가난하기 마련이라거나 가난이 창작의 힘이라거나는 말을 해서는 안됩니다.\n앞으로 창작자들을 만나며 의견을 경청하려고 합니다. 다양한 창작자 지원 정책을 함께 준비하고 실천해 나가겠습니다. 문화예술은 모든 국민이 누리는 공공재입니다. 문화예술 혜택에서 소외되는 국민이 없도록 평등한 문화 향유의 기반도 마련하겠습니다.\n조국혁신당의 정책 목표는 ‘사회권 선진국’입니다. 말씀 드린 내용은 사회권 중 하나인 ‘문화권’에 포함됩니다. 한강 작가의 노벨상 수상이 국민 모두의 문화권으로 확장될 수 있도록 노력하겠습니다.\n이하 파일은 조국혁신당 부속 연구원 ‘혁신정책연구원’(원장 조국)이 발표한 “사회권 선진국 구상”(  https://rebuildingkoreaparty.kr/data/policy/5147 ) 중의 일부입니다."}, {"id": 205, "filename": "미국 대사관 관세 철회 요구 결의문.txt", "title": "미국 대사관 관세 철회 요구 결의문", "date": "", "category": "결의문·성명", "topics": ["정치·선거개혁", "인권·사회", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["관세", "트럼프", "한미동맹"], "preview": "대한민국 국민은 평등한 한미동맹을 요구한다 ! 약탈관세 OUT ! 선불요구 NO !   조국혁신당은 대한민국 국민의 뜻을 대변하기 위해 이 자리에 섰습니다.   대한민국 국민은 분명하게 경고합니다.  평등한 한미 동맹을 무너뜨리는 행위는 결코 용납하지 않을 것입니다.   미국 트럼프 대통령과 행정부는 동맹의 이름으로  도저히 납득할 수 없는 부당한 압박을 가하고 있습니다.  한국은 반도체·배터리·조선업 등에서  미국의 미래 산업과 안보를 뒷받침...", "content": "대한민국 국민은 평등한 한미동맹을 요구한다 !\n약탈관세 OUT ! 선불요구 NO ! \n\n조국혁신당은 대한민국 국민의 뜻을 대변하기 위해 이 자리에 섰습니다. \n\n대한민국 국민은 분명하게 경고합니다. \n평등한 한미 동맹을 무너뜨리는 행위는 결코 용납하지 않을 것입니다. \n\n미국 트럼프 대통령과 행정부는 동맹의 이름으로 \n도저히 납득할 수 없는 부당한 압박을 가하고 있습니다. \n한국은 반도체·배터리·조선업 등에서 \n미국의 미래 산업과 안보를 뒷받침해 왔습니다. \n수많은 일자리와 안정적 공급망을 제공하며 협력해 왔으나, \n되돌아온 것은 존중과 협상이 아니라 굴종과 협박이었습니다.\n그 모순은 조지아 사태에서 극명히 드러났습니다. \n우리 기업들이 대규모 투자를 진행하는 핵심 지역에서 \n대한민국 국민의 존엄을 짓밟았습니다. \n동맹이 아니라 예속을 강요한다면, 조국혁신당은 국회 정당들과 연대하여 \n미국 제조업의 재건을 돕는 법과 예산을 추진하지 않을 것입니다.\n\n조국혁신당은 미국 트럼프 대통령과 행정부에 다음과 같이 요구합니다.\n\n1. 평등한 한미 동맹에 걸맞은 존중과 협력의 자세로 돌아오라. \n- 3,500억 달러 선불 요구를 즉각 철회하고, 상호호혜의 원칙에 따라 공정하게 협상하라.\n\n2. 대한민국의 핵심 산업 역량이 미국 경제 재건에 필수적이라는 현실을 직시하라. \n  \n3. 트럼프 대통령이 직접 조지아 구금 사태에 대해 공식적으로 사과하라. \n\n4. 피해 노동자들에 대한 정당한 보상은 물론 모든 투자 현장에서 \n  한국 기업과 노동자의 인권 보호와 생명 안전 방안을 확실하게 제시하라. \n- 비자 문제 등 안심하고 일할 수 있는 환경을 제도적으로 마련하라.\n\n5. 어떠한 관세 협상도 한국의 법률·행정 절차를 우회하지 말라. \n- 모든 투자 조건과 협상 약정은 한국 정부와 국회의 정당한 절차에 따라 승인되어야 한다.\n\n6. 미국은 국제사회의 리더로서 세계 경제와 국제질서를 안정시키는 책임을 다하라. \n\n조국혁신당은 국민과 함께 불평등 협상을 단호히 거부하며, \n대한민국의 주권과 국익을 끝까지 지켜낼 것입니다. \n\n(Be a Peace Maker, Not a Trust Breaker!) \n트럼프 대통령은 72년 동맹의 신뢰를 깨뜨리지 말고 \n평화를 만드는 길에 나설 것을 강력하게 요구합니다. \n\n\n2025년 10월 9일 조국혁신당 "}, {"id": 206, "filename": "서울시당 당원간담회 인사말씀.txt", "title": "서울시당 당원간담회 인사말씀", "date": "", "category": "기자회견·간담회", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["비대위", "윤석열"], "preview": "서울시당 당원간담회 인사말씀 2025.09.18 19:00 - 조국혁신당 비상대책위원장 조국  서울시당 당원 여러분 오랜만에 인사드립니다. 비상대책위원장 조국입니다.  반가운 얼굴들이 많습니다. 함께 해주셔서 감사드립니다. 지금 이 자리가 왜 마련됐는지, 우리가 어떤 마음을 나눠야 하는지  당원 여러분께서 더 잘 아시리라 생각합니다. 오늘 이른 아침부터 연이은 회의와 당직자 간담회를 거쳐 지금 이 자리까지 비상대책위원회 위원분들이 함께하고 계십...", "content": "서울시당 당원간담회 인사말씀\n2025.09.18 19:00\n- 조국혁신당 비상대책위원장 조국\n\n서울시당 당원 여러분 오랜만에 인사드립니다.\n비상대책위원장 조국입니다.\n\n반가운 얼굴들이 많습니다. 함께 해주셔서 감사드립니다.\n지금 이 자리가 왜 마련됐는지, 우리가 어떤 마음을 나눠야 하는지 \n당원 여러분께서 더 잘 아시리라 생각합니다.\n오늘 이른 아침부터 연이은 회의와 당직자 간담회를 거쳐\n지금 이 자리까지 비상대책위원회 위원분들이 함께하고 계십니다.\n그만큼 중요하고 의미 있는 시간입니다.\n\n첫 비대위 회의 때 말씀드렸던 대로\n우리 당에서 일어난 가슴 아픈 일에 대해 \n당원 여러분과 마음을 열고 소통하고자 합니다.\n그래서 더 이런 자리가 꼭 필요하다고 여겼고, \n책임 있는 실천을 위해서 당원 여러분의 뜻을 살피는 것이 \n꼭 필요하다고 생각하고 있습니다.\n\n변화는 약점과 실책을 인정하는데서 시작하고, \n새로운 출발은 위기를 함께 넘어서는 그 지점에서 \n시작할 수 있다고 생각합니다.\n그 시작은 당연히 당원 여러분의 뜻과 힘이 있어야 가능합니다.\n항상 그래왔습니다.\n먼저 제가 부재한 동안, 윤석열 파면과 국민주권 정부로의 정권교체,\n모두 여러분들의 헌신과 열정으로 이뤄낸 것입니다. \n깊이 감사드립니다. \n무엇보다도 조국혁신당을 지켜주셔서 감사드립니다.\n\n윤석열 검찰독재정권과 싸우고\n윤석열 탄핵을 추진하는데 일로 매진하는 속에\n우리 당 내부의 취약점을 돌아보지 못했습니다.\n\n안타깝게도 지금 힘든 시간을 함께 맞이하고 있지만\n잘 헤쳐나갈 것이라 믿어 의심치 않습니다.\n그래서 오늘 저를 비롯한 비대위원 모두가 빠뜨림 없이\n당원 여러분의 목소리를 담아가고자 합니다.\n회초리를 드시면 맞고, 방향을 가리켜주시면 따르겠습니다.\n\n문제해결을 위해 당이 많은 노력을 했지만, 부족함도 많았습니다.\n많은 조언과 충고 부탁드립니다. \n\n이번 사례를 계기로 당 전반을 돌아보고\n개선할 점을 고쳐나가겠습니다.\n우왕좌왕하거나 허둥거리지 않고\n정면을 향해 한걸음 한걸음 걸어가겠습니다.\n\n당원 여러분이 조국혁신당의 비대위원입니다.\n당원 여러분의 진심을 제 진심으로 삼겠습니다.\n마주하고 듣겠습니다.\n더하고 빼지 않고 담겠습니다.\n진심과 진심이 모이면 이 위기는 극복될 것입니다.\n\n다시 한 번 비대위원장으로서 피해자분들께 사과드립니다.\n당원 여러분께도 송구한 마음을 전합니다.  \n\n오늘 이 자리를 준비해주신 정춘생 서울특별시당 위원장님과\n지역위원장님, 실무자 여러분, 퇴근 후 달려오신 당원 여러분께 \n진심으로 감사드립니다.  /끝/"}, {"id": 207, "filename": "연결되지 않을 권리 관련 메시지.txt", "title": "연결되지 않을 권리 관련 메시지", "date": "", "category": "기타 메시지", "topics": ["조국혁신당", "인권·사회", "민생·경제"], "tags": ["민생"], "preview": "직장인들의 ’연결되지 않을 권리‘(Right to Disconnect) 보장에 앞장서겠습니다. 이번 추석을 ‘황금연휴’라고 부릅니다. 그런데 한 조사에 따르면 우리나라 직장인 10명 중 6명은 휴일이나 퇴근 후에도 업무 연락을 받는다고 합니다. 직장인은 늘 ‘연결 대기’ 상태입니다. 이번 추석은 달랐으면 합니다. 특히 직장을 다닌 지 얼마 안 된 청년들이 상사의 전화 한 통, 회사의 카톡 메시지 하나에 스트레스와 연결되지 않기를 바랍니다.  퇴...", "content": "직장인들의 ’연결되지 않을 권리‘(Right to Disconnect) 보장에 앞장서겠습니다.\n이번 추석을 ‘황금연휴’라고 부릅니다. 그런데 한 조사에 따르면 우리나라 직장인 10명 중 6명은 휴일이나 퇴근 후에도 업무 연락을 받는다고 합니다. 직장인은 늘 ‘연결 대기’ 상태입니다.\n이번 추석은 달랐으면 합니다. 특히 직장을 다닌 지 얼마 안 된 청년들이 상사의 전화 한 통, 회사의 카톡 메시지 하나에 스트레스와 연결되지 않기를 바랍니다. \n퇴근은 진짜 퇴근이어야 하고, 연휴는 진짜 연휴여야 합니다.\n직장인에게 업무시간 외에는 ‘연결되지 않을 권리’가 보장되어야 합니다. 노동자가 더 나은 삶을 살기 위해 필요한 사회권이자 디지털 시대의 인권입니다. 정부의 '디지털 권리장전'에는 “모든 사람은 다양한 노동 환경에서 안전·건강하게 근로하고, 디지털 연결에서 벗어나 휴식을 보장받아야 한다”는 내용이 담겨 있습니다. \n저와 조국혁신당은 이 당연한 권리 보장을 위해 앞장 서겠습니다.\n이 권리는 직장인이 퇴근 후 전자통신 수단을 통한 업무 지시에 응답하지 않아도 되는 권리입니다. 나아가 노동 시간이 끝나면 전자기기를 꺼도 되고, 연락에 응답하지 않아도 불이익을 받지 않을 권리입니다. 물론 재난 등 긴급 상황이 발생한 경우는 예외이며, 공직자나 기업임원진은 적용대상이 아닙니다.\n해외 노동 선진국은 이미 실현되고 있습니다. 일례로 프랑스는 2017년 노동법 개정을 통해 50인 이상 기업은 노동 시간 외 전자통신 차단 권리를 보장하도록 의무화했습니다. 독일, 이탈리아, 벨기에 등에서도 유사한 보장조치가 이루어지고 있습니다. 호주는 2024년부터 이 권리를 법률로 보장하는데, 이를 위반하면 직원의 경우 최대 19,000 호주 달러(한화 약 1700만원), 회사의 경우 최대 94,000 호주 달러(한화 약 8500만원)의 벌금이 부과됩니다.\n우리나라의 경우 몇 차례 ‘업무시간 외 카톡 금지법’이라는 이름으로 국회에서 법안이 발의됐으나, 무산되었습니다. 단, 한국서부발전, 국토안전관리원 등 몇몇 기업과 기관에서 자발적으로 ‘연결되지 않을 권리’를 실현하고 있으며, 부산 동래구와 서울 관악구는 이 권리를 보장하는 조례를 만들었습니다.\n우리 사회도 이제 ‘연결되지 않을 권리’ 보장을 본격화할 때가 됐습니다. 이 권리가 보장되면 노동자의 일상과 휴식이 온전히 보장되어 노동생산성이 높아집니다. 그래서 잠재성장률을 끌어올리는데 기여합니다. 사회 전체를 건강하게 만드는 투자입니다. \n우리나라가 경제 체격은 선진국이지만, 체질은 아직 부족한 분야가 많습니다. 노동 분야가 유독 그렇습니다. ‘노란봉투법’이 통과됐고, 이재명 대통령의 지시로 산재 예방을 위한 정부 차원의 노력이 진행 중입니다. 그러나 직장인들의 삶의 질 수준은 여전히 부족합니다.\n ‘연결되지 않을 권리’ 보장에 앞장서겠습니다. 머지않은 미래에 주 4일제 또는 4.5일제와 함께 추진된다면 직장인들의 삶과 우리 경제의 질이 한 단계 도약할 것입니다.\n강조하지만, 퇴근은 진짜 퇴근이어야 하고, 연휴는 진짜 연휴여야 합니다. 모든 직장인들이 자신과 가족을 위한 진짜 명절을 누리시길 바랍니다.\n물론 ‘연결되지 않을 권리’와 주4.5일 제도가 모든 노동자에게 동일한 희망으로 다가오지 않습니다. 우리나라 노동 환경은 공평하지 않습니다. 작년에 대기업 정규직과 비정규직 간 임금 격차는 역대 가장 큰 폭으로 나타났고, 대기업 정규직과 중소기업 비정규직 간의 임금 격차도 7년 만에 최대치로 벌어졌습니다. 청년들의 실질 소득은 갈수록 악화되고 있습니다.\n‘연결되지 않은 권리’가 모든 노동자의 권리로 이어지도록 노력하겠습니다.\n노동시장 이중구조를 해결하지 않고서는 불평등을 해소할 수 없습니다. 노동 불평등 해법 마련에 모든 힘을 다하겠습니다. 모두가 공평하게 누리는 노동 환경을 만들기 위한 다양한 정책을 추진해 나가겠습니다."}, {"id": 208, "filename": "제1차 비대위.txt", "title": "제1차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당", "인권·사회"], "tags": ["내란", "비대위"], "preview": "-2025.9.15.(월) 오전 10시 본관 당회의실(224호)     ■ 조국 비상대책위원장     안녕하십니까, 조국혁신당 비상대책위원장 조국입니다.  먼저 저의 소회를 말씀드리겠습니다.     제가 자유를 찾은 지 한 달도 되지 않았는데 중책을 맡게 되었습니다.  ‘독배’라며 저를 말리는 분이 많았습니다.  ‘다치지 않도록 뒤에 있으라’라는 말도 많이 들었습니다.     그러나 그것은 계산입니다.  저는 그렇게 정치하지 않겠습니다.  정치...", "content": "-2025.9.15.(월) 오전 10시 본관 당회의실(224호)\n\n \n\n■ 조국 비상대책위원장\n\n \n\n안녕하십니까, 조국혁신당 비상대책위원장 조국입니다.\n\n먼저 저의 소회를 말씀드리겠습니다.\n\n \n\n제가 자유를 찾은 지 한 달도 되지 않았는데 중책을 맡게 되었습니다.\n\n‘독배’라며 저를 말리는 분이 많았습니다.\n\n‘다치지 않도록 뒤에 있으라’라는 말도 많이 들었습니다.\n\n \n\n그러나 그것은 계산입니다.\n\n저는 그렇게 정치하지 않겠습니다.\n\n정치는 책임입니다.  \n\n제가 책임지고,\n\n피해자의 상처 치유, 온전한 보상, 재발 방지, 제도 개선을 하겠습니다.\n\n실천으로 응답하겠습니다.\n\n진심으로 진심을 얻겠습니다.\n\n \n\n모두발언을 시작하겠습니다.\n\n \n\n다시 한번 피해자분들께 깊이 사과드립니다.\n\n당이 법률적 절차와 판단에 치중하여 마음을 읽지 못했다는 비판을 겸허히 받아들입니다.\n\n저부터 통렬하게 반성하겠습니다.\n\n \n\n조국혁신당은 ‘소통, 치유, 통합’, 세 가지 원칙 위에서\n\n공동체적 해결을 위한 다양한 조치에 나서겠습니다.\n\n \n\n비대위원으로 당원과 국민의 다양한 목소리를 대변하는 분들을 어렵게 모셨습니다.\n\n조국혁신당의 조직 문화를 더 유연하고 평등하게 변화시켜 주실 것입니다.\n\n비대위는 단순히 지도부의 빈자리를 대신하는 자리가 아닙니다.\n\n무엇보다 피해자분들이 신뢰하는 비대위가 되도록 노력하겠습니다.\n\n당원분들, 당직자분들, 지지자분들도 신뢰하는 비대위가 되겠습니다.\n\n조국혁신당 공동체의 마음을 모두 담아내는 그릇이 되겠습니다.\n\n그렇게 진심을 다해서 국민의 신뢰를 회복해 나가겠습니다.\n\n \n\n비대위원장에 선출된 직후,\n\n중앙당에 2차 가해 행위에 대한 단호한 조치를 지시했습니다.\n\n이와 함께 중징계 처분을 내리는 당헌 당규 개정안을 주문했습니다.\n\n아직 해야 할 일이 여전히 많습니다.\n\n벽돌 하나하나 쌓아가듯이 관련 대책들을 실천해 나가겠습니다.\n\n \n\n첫째, 진정성 있는 피해자 지원입니다.\n\n \n\n우선 앞으로 당내에서 피해자의 실명 거론을 금지합니다.\n\n피해자가 원하는 일입니다. 그 요청을 존중해야 합니다.\n\n \n\n또 강조합니다.\n\n2차 가해는 공동체의 회복을 방해하는 행위입니다.\n\n당 차원에서 단호하게 조치할 것입니다.\n\n \n\n일부 언론과 유튜브의 악의적인 보도는 용납하지 않겠습니다.\n\n피해자분들을 악용하고, 동시에 당을 공격하는 정략적 의도가 보입니다.\n\n오늘 실무기구를 출범시키고 적극적으로 대응할 방침입니다.\n\n \n\n심리치료 등 피해자분들을 위한 지원 대책도 정성을 다해서 실행하겠습니다.\n\n \n\n둘째, 근본적인 대책 마련입니다.\n\n \n\n이 문제가 가해자 처벌만으로 끝나서는 안 됩니다.\n\n가해자가 떠난 자리에 또 다른 가해자가 들어올 수 있습니다.\n\n비대위원님들과 상의해서 인권 보호를 위한 상시 기구를 설치하겠습니다.\n\n피해자 보호 강화와 예방 시스템을 완전히 새롭게 설계하겠습니다.\n\n \n\n나아가 조국혁신당은 성차별적 의식과 문화를 바꾸는 일에 나서겠습니다.\n\n우리 사회의 성평등과 인권 향상을 위한 개혁에 책임지고 앞장서겠습니다.\n\n \n\n셋째, “모든 당원이 비대위원입니다.”\n\n \n\n저는 공동체적 해결을 제시했습니다.\n\n그러기 위해서는 당원들의 뜻이 비대위에 수평적으로 반영되어야 합니다.\n\n빠르면 이번 주부터 전국 시도당별로 당원과의 대화를 시작하겠습니다.\n\n그 목소리를 당론으로 실천하겠습니다.\n\n많은 비판과 조언 부탁드립니다.\n\n동시에 애당심과 동지애도 부탁드립니다.\n\n \n\n국민 여러분, 당원 동지 여러분,\n\n \n\n비대위는 혼신의 힘을 다해서\n\n하루빨리 당면 과제를 수습하고, 위기를 극복하겠습니다.\n\n조국혁신당은 내란 세력, 극우 세력, 불평등 등 ‘삼악’(三惡)을 제로로 만드는 시대적 과제를 흔들림이 없이 수행할 것입니다.\n\n마음을 열고 지켜봐 주시길 부탁합니다.\n\n \n\n감사합니다.  "}, {"id": 209, "filename": "제10차 최고.txt", "title": "제10차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "조국혁신당", "민생·경제"], "tags": ["교육", "윤석열", "의료"], "preview": "- 2024. 6. 17. 9:30. 본청 316호     ■ 조국 당대표     우리 경제가 밑 빠진 독이 돼버렸습니다.  나랏빚이 역대 최대 규모로 불어났습니다.  국가채무가 1,128조 9,000억입니다.  국민 1인당 짊어져야 할 빚이 2천 2백만 원입니다.  국가채무가 급격히 늘어난 지난 정부 초기 때도  국민 1인당 국가채무는 천 2백만 원 수준이었습니다.     국가의 재정 상태를 보여주는 재정적자도 역대 최대입니다.  올해 목표치...", "content": "- 2024. 6. 17. 9:30. 본청 316호\n\n \n\n■ 조국 당대표\n\n \n\n우리 경제가 밑 빠진 독이 돼버렸습니다.\n\n나랏빚이 역대 최대 규모로 불어났습니다.\n\n국가채무가 1,128조 9,000억입니다.\n\n국민 1인당 짊어져야 할 빚이 2천 2백만 원입니다.\n\n국가채무가 급격히 늘어난 지난 정부 초기 때도\n\n국민 1인당 국가채무는 천 2백만 원 수준이었습니다.\n\n \n\n국가의 재정 상태를 보여주는 재정적자도 역대 최대입니다.\n\n올해 목표치가 91조 6,000억 인데, 4월까지 적자가 64조 6,000억입니다.\n\n올해가 반도 지나지 않았는데 적자가 70%에 달합니다.\n\n \n\n윤석열 정권이 그렇게 자신만만하게 외치고 있는\n\n‘건전재정’이 알고 보니 ‘재정 파탄’입니다.\n\n역대 최고 ‘빚쟁이 정권’입니다.\n\n \n\n악화될 때로 악화된 경제를 두고\n\n윤 대통령이 지난 5월 국가재정전략회의에서 뭐라고 한 줄 아십니까.\n\n“건전재정 기조를 유지한 것은 매우 현명한 선택\"이라며\n\n“허리띠를 더 졸라매야 한다”고 자화자찬 했습니다.\n\n \n\n대체 누구 보고 허리띠를 더 졸라매란 말입니까.\n\n가계대출이 5월에만 6조가 늘었습니다.\n\n졸라매려고 해도 더 졸라맬 수가 없습니다.\n\n기업들 40%가 영업 수익으로 이자도 못 내고 있습니다.\n\n정부와 여당은 재정건전성이 무엇인지 다시 공부하십시오.\n\n나라빚에 가장 큰 원인은 ‘세수 쇼크’입니다.\n\n세수 결손이 생겨 곳간이 마를 때는 감세를 지양하는 것이 상식입니다.\n\n‘부자 감세’를 철회하십시오.\n\n나라 살림으로 편 가르기 정치하지 마십시오.\n\n크게 휘어진 양평 고속도로와 동해 유전 개발에 세금 퍼붓지 말고\n\n주거, 복지, 의료에 쓰십시오. 국민을 위하는 것이 건전재정입니다.\n\n \n\n또한 전방위적인 김건희 씨 방탄도 즉각 멈추십시오.\n\n \n\n숙명여대 차기 총장 투표에서 ‘김건희 씨 석사논문 검증 진상 파악’을 약속한 교수가 현 총장을 제치고 1위를 차지했습니다.\n\n김건희 씨 석사논문은 2022년 숙명여대 교수들과 동문회에서\n\n자체 검증 결과 표절률이 60% 가까이 됩니다.\n\n학계에서 표절률 15% 이상이면 논문으로 인정되지 않습니다.\n\n \n\n숙명여대 연구윤리진실성위원회에서는 2년 4개월째 심사 중입니다.\n\n58쪽 분량의 논문에 불과합니다.\n\n심사를 안 하는 건지, 못하는 건지, 총장에게 묻지 않을 수 없습니다.\n\n \n\n숙명여대의 ‘특별한 사정’이 없다면\n\n1위를 기록한 교수가 이사회를 거쳐 차기 총장으로 지명됩니다.\n\n \n\n표절 판명이 나면, 김건희 씨는 석박사 학위와\n\n그토록 자랑해온 ‘대학교수’ 경력이 모두 사라지게 됩니다.\n\n윤석열 정부 임기 마칠 때 비로소 그 결과를 내어놓을고 합니까?\n\n지연된 정의는 불의입니다.\n\n \n\n22대 국회에서 숙명여대와 국민대 총장을 출석시켜\n\n논문 표절 심사 전말에 대해 물어야 할 것입니다.\n\n민의를 왜곡하고 거부권을 남발한 것처럼,\n\n김건희 씨 학위 지키기에 나선다면\n\n국민이 더는 용납하지 않을 것입니다.<끝>"}, {"id": 210, "filename": "제11차 비대위.txt", "title": "제11차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["사법개혁", "부동산", "지방선거", "민생", "검찰개혁", "비대위"], "preview": "조국혁신당 제11차 비상대책위원회 -조국 비상대책위원장 모두발언 25.10.20  <부동산 대책 관련>  정부가 세 번째 부동산 대책을 발표했습니다.  부동산 문제는 국가 차원의 난제입니다.  국회와 정당들이 정부에 떠넘기지 말고, 함께 책임을 함께 나눠야 합니다.   그런데 국민의힘의 태도는 실망스럽습니다.  강남 중심의 아파트값 폭등 현상과 그 원인을 이미 지적한 바 있습니다.  국민의힘은 오세훈표 재건축 정책의 부작용을 냉정하게 직시하십시...", "content": "조국혁신당 제11차 비상대책위원회\n-조국 비상대책위원장 모두발언 25.10.20\n\n<부동산 대책 관련>\n\n정부가 세 번째 부동산 대책을 발표했습니다. \n부동산 문제는 국가 차원의 난제입니다. \n국회와 정당들이 정부에 떠넘기지 말고, 함께 책임을 함께 나눠야 합니다. \n\n그런데 국민의힘의 태도는 실망스럽습니다. \n강남 중심의 아파트값 폭등 현상과 그 원인을 이미 지적한 바 있습니다. \n국민의힘은 오세훈표 재건축 정책의 부작용을 냉정하게 직시하십시오. \n이재명 정부에 화살을 돌리는 무책임한 행태를 멈추십시오. \n부동산을 지방선거에 이용하는 태도가 문제를 더 악화시킵니다. \n\n조국혁신당은 근본적 문제해결에 집중하겠습니다. \n눈치 보지 않고 말씀드리겠습니다. \n지방선거보다 주택 시장 안정이 먼저입니다. \n주택 시장 안정에 실패하면 정권재창출은 없습니다.\n\n지금 아파트 가격은 너무 높습니다. 특히 강남 아파트 가격은 비정상입니다. \n국회의원들이 지역구 아파트 가격 상승을 방조해서는 안 됩니다. \n“똘똘한 한 채”에 주는 지나친 혜택도 줄여야 합니다. \n청년과 무주택자의 희망이었던 청약은, 로또 청약으로 변질됐습니다. \n\n\n아파트 가격을 떠받치면서 주택 문제를 해결하려는 것은 모순입니다.\n부동산 시장은 ‘사회권’ 가운데 하나인, ‘주거권’으로 접근해야 합니다. \n가격이 오르면 규제가 뒤따라가고, 내리면 완화하는 방식으로는 문제를 풀 수 없습니다. \n국민 주거권 보장이라는 뚜렷한 목표를 정하고, 새로운 주거체제를 논의해야 할 때입니다. \n\n단기적으로 세 가지 방안을 추진해야 합니다.\n\n첫째, 공공 유휴 부지에 대규모 초고층 공공임대주택을 짓는 방안입니다.\n\n이미 확보된 부지 이외에도 LH와 SH가 보유한, \n서울의 공공부지 전체를 최대한 끌어모아야 합니다. \n아파트 가격을 띄우는 민간 재건축과 재개발은 해법이 아닙니다. \n강남의 아파트 가격 하락을 유도하는 다양한 정책을 강력하게 집행해야 합니다.\n우선은 투기의 진원지인 강남권에 양질의 초고층 공공임대 아파트 단지를 조성해야 합니다. \n서초, 양재, 수서, 용산과 성남, 상암동 등에 가능한 부지가 있습니다. \n공공임대 주택을 형식적으로 배려하는 ‘소셜믹스’가 아니라, \n토지임대부 분양 방식으로 청년과 무주택자에게 \n전적으로 제공하는 방식으로 이뤄져야 합니다. \n\n둘째, 다주택자들이 집을 시장에 내놓도록 유도해야 합니다.\n\n현재 무주택 가구 수는 960만 가구입니다. \n3주택 이상 소유가구는 약 83만 가구로 나타납니다. \n이 다주택자들이 소유한 주택 수를 정확하게 파악하고, \n그 주택들을 공급시장으로 유도하는 방안이 필요합니다. \n다주택자의 주택 추가 취득을 강력하게 억제하고, \n임대사업자의 규모를 일정한 수준으로 제한하면서, \n정부와 자치단체가 매입해 공공 시장을 파격적으로 넓혀야 합니다. \n아파트 이외의 빌라 등의 주거 인프라 개선도 과제입니다.\n\n셋째, 보유세 정상화와 거래세 완화를 준비해야 합니다.\n\n높은 이득을 얻으면, 정당한 세금을 부담하는 것이 시장경제의 원리입니다. \n조세 정의의 원칙을 지켜야 투기 수요를 누를 수 있습니다. \n현재 OECD 절반 수준인 보유세의 실효세율을 높이고,\n거래세는 완화하면서 주택 시장의 순환을 유도해야 합니다. \n\n중장기적으로 두 가지 과제가 있습니다. \n\n하나는 토지공개념의 제도화입니다. 토지는 기본적으로 공공재입니다. \n택지소유상한, 토지 추가 이득 과세, 개발이익 환수 강화 등을 입법화해서, \n불로소득으로 인한 불평등과 지역 양극화를 해소할 수 있는 근본적 틀을 짜야 합니다.\n\n다른 하나는 행정수도 이전의 완성입니다. \n‘수도권 블랙홀’이 주택 시장 불안의 원인 중 하나입니다. \n감사원, 헌법재판소, 대검찰청, 감사원 등 사법기관도 지방으로 이전해야 합니다.\n그 자리에 양질의 초고층 공공임대 아파트 단지를 지읍시다.\n국토 균형발전과 지방분권을 위해서도 꼭 필요한 미래 과제입니다.\n\n조국혁신당은 국민의 주거권 보장을 최우선에 두고, \n새로운 주거체제를 준비해 나가겠습니다.\n\n<사법개혁 관련>\n\n민주당과 개혁 야당은, 조희대 대법원장 탄핵을 망설여서는 안 됩니다. \n검찰개혁과 사법개혁은 연동되는 개혁입니다. \n따라서 검찰개혁의 수준만큼 사법개혁도 속도를 내야 합니다. \n그러나 조희대 대법원장의 대선 개입 문제를 그대로 두고서, \n그리고 조희대 대법원장이 지휘하는 사법부 체제를 그대로 두고서는 안 됩니다.\n\n대법원의 파기환송 뒤 서울고법은 공판을 연기하면서, \n“대통령 후보인 피고인에게 균등한 선거운동의 기회를 보장하고, \n재판의 공정성 논란을 없애기 위해”라고 설명한 바 있습니다.\n대법원이 대선에 개입했다는 사실을 서울고법이 인정한 셈입니다. \n\n조국혁신당은 국회가 대법원의 대선 개입이라는 희대의 사건을, \n없었던 일인냥 덮고 갈 수 없다는 점을 분명하게 강조합니다. /끝/"}, {"id": 211, "filename": "제11차 최고.txt", "title": "제11차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "조국혁신당", "민생·경제", "외교·안보"], "tags": ["윤석열", "의료"], "preview": "2024. 6. 19. 9:30. 본청 316호     ■ 조국 당대표     대한의사협회의 총파업이 시작됐습니다.  저 한심한 윤석열 정부는 무능과 오기로 일관하면서,  엄포만 놓고 있습니다.     그런데 문제는 양측 다툼에 고통받는 이들은 당사자인  의사도 정부도 아닌, 국민입니다. 특히 죄 없는 환자입니다.     윤석열 정부의 정책에 대한 의사들의 분노, 충분히 이해합니다.  그러나 의사분들께 촉구합니다. 환자들 침상 곁으로 돌아가십시...", "content": "2024. 6. 19. 9:30. 본청 316호\n\n \n\n■ 조국 당대표\n\n \n\n대한의사협회의 총파업이 시작됐습니다.\n\n저 한심한 윤석열 정부는 무능과 오기로 일관하면서,\n\n엄포만 놓고 있습니다.\n\n \n\n그런데 문제는 양측 다툼에 고통받는 이들은 당사자인\n\n의사도 정부도 아닌, 국민입니다. 특히 죄 없는 환자입니다.\n\n \n\n윤석열 정부의 정책에 대한 의사들의 분노, 충분히 이해합니다.\n\n그러나 의사분들께 촉구합니다. 환자들 침상 곁으로 돌아가십시오.\n\n메스와 청진기를 다시 드십시오.\n\n \n\n우리 사회에서 '선생님'이라는 호칭이 뒤따르는 직업은 극소수입니다.\n\n판사 선생님, 장관 선생님, 사장 선생님이라고 부르지 않습니다.\n\n학생을 가르치는 교사와 교수들, 그리고 의사와 간호사를\n\n'선생님'이라고 합니다.\n\n \n\n포탄이 날아다니는 전장에서도\n\n부상병을 치료하는 군의관과 의무병은 공격하지 않습니다.\n\n흰 바탕의 빨간색 십자가를 보면 길을 걷다가도 존경의 마음을 표합니다.\n\n \n\n왜 그럴까요. 오로지 이유는 하나, 생명을 다루기 때문입니다.\n\n의사는 합법적으로 칼을 남의 몸에 댈 수 있는,\n\n숭고한 특권이자 무거운 책무를 지니고 있습니다.\n\n삶과 죽음을 선언할 수 있는 유일한 직업인입니다.\n\n \n\n의사 선생님들은 이런 선서를 했을 것입니다.\n\n‘내 환자의 건강은 나의 최대의 관심사다.’\n\n지금 여러분들은 어디에 있습니까?\n\n환자의 건강을 최대의 관심으로 놓고 있습니까?\n\n \n\n국민은 굵은 눈물을 흘리며 고개를 가로저을 것입니다.\n\n급한 수술을 받지 못해 목숨이 위협받는 이들의 심경은 헤아려봤습니까?\n\n치료를 제때 제대로 받지 못해 날로 생명이 쇠하는 환자들과\n\n그 가족들은 당신들이 돌이킬 수 없는 적이 될 것입니다.\n\n \n\n정부가 가장 무서워하는 의사는,\n\n의료 현장을 떠나 목소리를 높이는 이들이 아닙니다.\n\n국민의 한 사람인 환자 옆에서 냉철하게 병세를 살피면서,\n\n정부 정책의 문제점을 조곤조곤 밝히는 의사분들일 것입니다.\n\n \n\n생명과 건강은 유보하거나 양도할 수 없는 천부의 권리입니다.\n\n의사들이 이를 볼모로 삼는다면, 국민들이 등을 돌릴 겁니다.\n\n \n\n의사분들께 다시 한번 호소합니다. 이 순간 피눈물을 쏟고 있는\n\n환자와 그 가족 곁으로 돌아가십시오.\n\n \n\n블라디미르 푸틴 러시아 대통령이 오늘 새벽 평양을 방문했습니다.\n\n24년 만의 방문입니다.\n\n푸틴 대통령은 김정은 국무위원장과 정상회담을 열고,\n\n‘포괄적 전략 동반자’ 관계협정을 맺을 계획이라고 알려졌습니다.\n\n군사·정치·경제·문화 등에서 협력을 강화할 것으로 보입니다.\n\n \n\n러시아 외교에 대한 언급은 내정간섭이 될 수 있습니다.\n\n다만 북·러 정상 만남이 가져올 파장을 걱정하지 않을 수 없습니다.\n\n악화된 남북 관계가 더욱 경색되지 않을까 걱정입니다.\n\n푸틴 대통령 방북을 두고 많은 전문가들은\n\n남북관계의 결정적인 변곡점이 될 것이라고 전망합니다.\n\n또 우크라이나 전쟁으로 인한 세계정세의 악화도 예상됩니다.\n\n이런 와중에 대한민국 정부는 손을 놓고 있습니다.\n\n넋도 놓고 있습니다.\n\n \n\n한·러 관계는 윤석열 정부 출범 이후 최악의 상황입니다.\n\n한·러 수교 이후 최저점을 계속 갱신하고 있습니다.\n\n한국은 미국이 주도한 대러 제재에 동참했고,\n\n3차례에 걸쳐 독자 제재를 했습니다.\n\n윤 대통령과 국방부, 외교부는 러시아 비방을 서슴지 않고 않습니다.\n\n \n\n이에 더해서 현대자동차는 공장을 1만 루블\n\n한국 돈으로 14만 5천 원에 매각하고 나와야 했습니다.\n\n윤 대통령이 미국, 일본과의 가치 동맹에만 매달리다 벌어진 일입니다.\n\n \n\n여기에 남북 간의 안전핀인 9.19군사합의도 파기되었습니다.\n\n한반도는 2016년 이후 최악의 상황입니다.\n\n윤석열 정부는 극단적인 가치외교를 중단해야 합니다.\n\n한반도의 문제의 주인인 바로 우리가 운전자가 되어야 합니다.\n\n \n\n무엇보다 어떤 외교가 국익에 최선인지를 따지는 실리외교로 돌아가야 합니다.\n\n제발 정신좀 차리십시오.\n\n \n\n국회에 본격 시동이 걸렸습니다. 상임위가 돌아가기 시작했습니다.\n\n무척 다행입니다.\n\n \n\n그런데 일부 상임위에서 피감 기관장이나 국무위원들이\n\n무단으로 출석하지 않는 일이 벌어지고 있습니다.\n\n어제 열린 과학 기술 정보 방송통신위원회 전체회의 현안 질의에\n\n방송통신위원장, 방송통신심의위원장, 과학기술정보통신부 장관,\n\n원자력안전위원장이 모두 나오지 않았습니다.\n\n앞서 지난 14일 법사위에도 법무부 장관, 국방부 장관이 나오지 않았습니다\n\n \n\n윤석열 대통령이 버릇처럼 국회에 거부권을 쓰니까,\n\n국무위원과 정부위원들도 국회를 거부하는 겁니까? 기가 찰 뿐입니다.\n\n \n\n여당인 국민의힘이 위원회에 나가지 말라고 했겠죠.\n\n이는 한마디로 위헌적인 행위입니다.\n\n헌법 제62조 ②항은 이렇습니다. ‘국회나 그 위원회의 요구가 있을 때\n\n에는 국무총리·국무위원 또는 정부위원은 출석·답변하여야 하며….’\n\n \n\n‘출석·답변 할 수 있다’는 임의 규정이 아니라\n\n‘하여야 한다’라는 의무 규정입니다.\n\n \n\n그런데도 정부는 여당 눈치만 보고 있습니다.\n\n그것도 기껏 정부와 여당의 ‘당정협의업무 운영규정’을\n\n담은 총리 훈령에 기대어 국회를 무시합니다.\n\n윤석열 정부는 헌법보다 총리 훈령을 중시합니까?\n\n이점에서 윤석열 정권이 반헌법적 정부임을 보여주고 있습니다.\n\n \n\n더 말할 필요 없습니다. 국무위원과 정부위원은\n\n각 상임위 의결에 따른 출석 의무를 다하십시오.\n\n만일 이들이 헌법적 의무를 다하지 않는다면,\n\n국회 상임위원장님들은 이들을 증인으로 의결하고,\n\n이를 따르지 않으면 ‘국회 증언감정법’에 따라 처벌토록 해야 합니다.<끝>"}, {"id": 212, "filename": "제12차 비대위.txt", "title": "제12차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["사법개혁", "윤석열", "부동산", "민생", "내란", "검찰개혁", "비대위"], "preview": "제12차 조국혁신당 비상대책위원회  - 조국 비상대책위원장 모두발언 25.10.23.  <사법개혁>  조국혁신당이 검찰개혁에 이어 사법개혁을 책임지겠습니다.   지난주 조국혁신당은 국민께 사법개혁 방안을 보고드렸습니다.  뒤이어 민주당도 개혁안을 공개했습니다.  하지만 민주당이 사법개혁의 본질을 놓친 점은 아쉽습니다.   첫째, ‘법원행정처 폐지’가 없으면, ‘진짜 사법개혁’이 아닙니다.   검찰개혁의 본질이 수사 기소의 분리였듯이  사법개혁의...", "content": "제12차 조국혁신당 비상대책위원회 \n- 조국 비상대책위원장 모두발언 25.10.23.\n\n<사법개혁>\n\n조국혁신당이 검찰개혁에 이어 사법개혁을 책임지겠습니다. \n\n지난주 조국혁신당은 국민께 사법개혁 방안을 보고드렸습니다. \n뒤이어 민주당도 개혁안을 공개했습니다. \n하지만 민주당이 사법개혁의 본질을 놓친 점은 아쉽습니다. \n\n첫째, ‘법원행정처 폐지’가 없으면, ‘진짜 사법개혁’이 아닙니다. \n\n검찰개혁의 본질이 수사 기소의 분리였듯이 \n사법개혁의 성공 여부는 법원행정처 폐지에 달렸습니다. \n\n많은 국민은 ‘양승태 대법원’이 벌인 사법농단을 기억하고 있습니다. \n당시 법원행정처는 ‘박근혜 청와대’와 재판을 거래했습니다. \n사법권력과 정치권력의 결탁은 우리 사회에 큰 충격을 안겼습니다.\n\n그러나 국회는 사법농단 사태를 겪고도 법원행정처를 존치했습니다. \n그 안일한 판단 때문에 주권자 국민이 ‘대통령 선출 권한’을 빼앗길 뻔했습니다. \n국회가 통렬하게 반성해야 할 지점입니다.\n\n그런데도 법원행정처를, 또, 왜, 그대로 두자는 것입니까? \n조국혁신당은 그렇게 할 수 없습니다.\n\n\n결정적으로 법원행정처는 내란에 동조했습니다. \n작년 12월 3일 불법 계엄 직후 긴급 간부회의를 열고, \n“계엄사령관 지시와 비상계엄 매뉴얼에 따라 향후 대응을 마련”하겠다고 밝혔습니다.\n  (조선일보, 2024. 12.4 보도 “대법원, 비상계엄 관련 긴급 심야 간부회의 진행)\n\n국회가 계엄을 해제하지 못했다면, 대법원은 헌법과 법률을 내버리고, \n계엄의 당위성을 보장하는 ‘특별재판소’가 됐을 것입니다. \n그러면서도 염치없이 사법부 독립을 말하고 있습니다. 부끄러운 줄 알아야 합니다. \n조국혁신당은 법원행정처의 내란 동조 및 가담 의혹을 철저히 밝혀내고, \n그 책임을 묻겠습니다.\n\n조국혁신당의 사법개혁 방안은, ‘사법독립 설계도’입니다. \n법원행정처를 허물고, 그 터에 사법 민주주의를 세우겠습니다. \n인사권, 예산권, 행정권을 독식하며 내란에 동조하고 대선에 개입한, \n제왕적 대법원장 시대를 끝내겠습니다. 사법행정위원회를 설치해서 \n‘조희대의 대법원’을 ‘국민의 대법원’으로 확실하게 개혁하겠습니다. \n\n둘째, 재판소원 제도는 글로벌 스탠더드입니다. \n\n조희대 대법원이 파기 환송한 이재명 후보 사건이, \n서울고법을 거쳐 다시 조희대 대법원에서 최종 유죄가 대선 전 확정됐다고 가정해 봅시다. \n이 재판 결과를, 그대로 수용하는 것이 헌법 질서입니까? 국민이 거부했을 것입니다.\n\n우리 헌법재판의 모델인 독일의 경우 \n헌법재판소가 대법원의 판결에 대해서 합헌 여부를 판단하고 있습니다. \n\n윤석열 탄핵에 반대했던 매우 보수적인 헌법학자 ‘허영’ 교수는 \n자신의 저서 ‘한국헌법론’에서 이렇게 말했습니다.\n“법리적으로 볼 때 헌법의 해석을 그르쳤다거나 헌법정신에 어긋나는 \n법원의 판결이나 결정은 마땅히 헌법소원의 대상이 되어야 한다.”\n“법원의 판결이나 결정을 헌법소원의 대상으로 삼는 것은 \n헌법재판소가 또 하나의 심급기관으로 기능하게 되는 것은 아니다.”\n\n대법원 판결은 무오류라는 신화에서 벗어나야 합니다. \n재판소원은 사법부의 폭주를 막고, \n동시에 국민의 기본권 강화를 위해서 필요한 제도입니다. \n\n민주당이 재판소원을 ‘지도부 의견’이라며 소극적으로 나설 것이 아니라 \n당론으로 추인해서 전력을 다해 추진할 것을 촉구합니다.\n\n<청년 주거권>\n\n여야가 연일 부동산 대책을 언급하고 있습니다. \n그러나 청년 세입자의 고통을 대변하는 목소리는 들리지 않습니다.\n\n서울시는 신속통합기획, 이른바 ‘신통기획’으로 재개발 속도를 높여 왔습니다.\n그러나 그 속도는 청년들의 집이 아니라 초고가 아파트를 세우는 속도입니다. \n청년들의 박탈감은 초고가 초고층 아파트보다 더 높게 세워지고 있습니다.\n\n지금 우리 사회의 불평등 속도는 심각합니다. \n청년 주거권 네트워크 ‘민달팽이유니온’에 따르면 청년 가구의 약 80%는 세입자입니다.\n반면, 같은 나이대의 또 다른 청년들은 부동산으로 약 40조 원을 증여(국세청)받았습니다. \n세입자 청년과 임대인 청년의 출발선은 결코 같을 수 없습니다. \n\n정체된 세입자 지원 대책부터 제대로 시행해야 합니다. \n먼저 매입임대주택 정책의 활성화입니다. \n청년들의 주거 안정을 위해 신축 빌라나 기존 아파트 등을 매입해서 \n낮은 임대료로 제공하는 주거 사업이 후퇴하고 있습니다.\n서울시에서 이 사업이 4년 연속 감소했습니다. 의도적 축소입니다. \n정부가 직접 나서야 합니다. 서울시의 강남 불패 공급 대책도 강력하게 개입해야 합니다. \n\n그래서 민간 중심의 주택 공급 대책을 전면 재검토해야 할 때입니다. \nLH가 조성한 공공 택지는 민간에 매각해서는 안 됩니다. \n계획도, 조성도, 공급도, 공공이 책임져야 합니다. \n청년을 비롯한 세입자 중심의 초고층 공공임대 아파트 단지를 조성하고, \n서울 외곽이 아니라 강남 중심에 지어서 양질의 주거권을 보장해야 합니다. \n공공주택은 외곽과 변두리에 있다는 인식을 완전히 전환 시키겠습니다.\n\n다음으로 전세 사기 문제해결이 시급합니다. \n전세 사기 여파로 청년에게 빌라는 사라지고, 아파트는 더욱 멀어졌습니다. \n\n조국혁신당은 전세사기 특별법 개정에 힘을 모으겠습니다. \n국회가 대선 직전에 특별법을 연장(2년)하는 개정안을 통과시켰지만, \n아직도 피해 회복은 낮고, 예방은 부실한 상황입니다. 청년은 불안합니다.\n피해자 인정 기준을 완화하고, 피해 최소 보장 방안 등이 중요합니다. \n특히 피해자들의 보증금 채권을 국가가 매입하고, \n최소한의 금액 회수를 보장하는 내용으로 특별법을 개정해야 할 것입니다.\n\n불평등에는 막대한 사회경제적 이자가 붙습니다.\n우리가 그 이자를 감당할 수 없을 정도로 치닫기 전에 \n청년 주거권 보장을 위한 특단의 대책이 필요합니다. \n조국혁신당이 나서겠습니다.   /끝/"}, {"id": 213, "filename": "제12차 최고.txt", "title": "제12차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["교육", "기자회견", "윤석열"], "preview": "- 2024. 6. 21. 9:30. 본청 316호     ■ 조국 당대표     ⌾박성재 법무부장관, 신원식 국방부장관, 박정훈 전 해병대 수사단장,  김계환 해병대 사령관, 임성근 전 해병대 1사단장,  이종섭 전 국방부장관, 이시원 전 대통령비서실 공직기강 비서관,  유재은 국방부 법무관리관, 이용민 포병여단 포7대대장,  박진희 육군 56사단장, 신범철 전 국방부 차관,  임기훈 국방대학교 총장.     또 김정민, 김규현, 김경호 변호...", "content": "- 2024. 6. 21. 9:30. 본청 316호\n\n \n\n■ 조국 당대표\n\n \n\n⌾박성재 법무부장관, 신원식 국방부장관, 박정훈 전 해병대 수사단장,\n\n김계환 해병대 사령관, 임성근 전 해병대 1사단장,\n\n이종섭 전 국방부장관, 이시원 전 대통령비서실 공직기강 비서관,\n\n유재은 국방부 법무관리관, 이용민 포병여단 포7대대장,\n\n박진희 육군 56사단장, 신범철 전 국방부 차관,\n\n임기훈 국방대학교 총장.\n\n \n\n또 김정민, 김규현, 김경호 변호사.\n\n \n\n제가 이들을 호명한 이유가 있습니다.\n\n오늘 국회 법제사법위원회에서 열리는 '채해병 특검' 청문회에\n\n출석해야 하는 15명입니다.\n\n앞서 12명은 증인이고, 뒤 변호인 3명은 참고인입니다.\n\n제가 이름을 부름으로써, 국민의 뇌리에 새겨질 것으로 기대합니다.\n\n \n\n이들 증인과 참고인이 걸어갈 길은 세 갈래입니다.\n\n \n\n먼저 겁쟁이의 길입니다. 박성재 법무부 장관과 신원식 국방부 장관!\n\n당신들은 청문회에 불출석했습니다.\n\n진실을 마주하기 두려워했고, 사실 말하기를 회피했습니다.\n\n당신들은 국민을 위해 봉사하는 국무위원 자격이 없습니다.\n\n대한민국 역사, 정치사에 겁쟁이, 비겁자로 기록될 것입니다.\n\n더 이상 언급할 가치도 없습니다.\n\n그러나 당신들은 결국 특별검사 앞에 앉게 될 것입니다.\n\n \n\n두 번째 길은 거짓말쟁이의 길입니다.\n\n출석은 하되 거짓말을 늘어놓을 것입니다.\n\n작게는 자신의 죄를 모면하려고 거짓을 말할 것입니다.\n\n조직, 아니면 ‘자기 편’을 보호하려고 피노키오가 되려고 할 것입니다.\n\n적극적인 거짓말부터 ‘모른다, 기억이 안난다’라고 말 것입니다.\n\n그런 당신들은 오늘 청문회에서, 나중에 현실의 법정에서,\n\n더 뒤에는 역사의 법정에 거짓말쟁이라는 판결을 받을 것입니다.\n\n \n\n세 번째 길이 있습니다. 바로 진실한 시민의 길입니다.\n\n법률가들이 시비를 따지는 법정이 아니라,\n\n민심의 재판소인 청문회장에서 국민께 진실을 말씀드리는 것입니다.\n\n국민에게서 권한을 위임받은 국회의원들에게 진상을 밝히십시오.\n\n그 길만이 당신들이 역사 안에서 살아남는 길입니다.\n\n \n\n증인들은 대부분 목숨을 걸고 나라를 지키겠다고\n\n선서한 군인들입니다.\n\n청문회에서 거짓을 말하느냐, 진실을 말하느냐,\n\n어떤 것이 나라를 지키는 방법인지는 자명합니다.\n\n \n\n여당인 국민의힘에 요구합니다. 국회 청문회장에 나오십시오.\n\n거부해 봐야 장두노미(藏頭露尾), 즉 머리만 숨기고\n\n꼬리는 숨기지 못하는, 볼썽사나운 모습에 불과합니다.\n\n국회에 와서 옳고 그름을 따지십시오!\n\n \n\n⌾국민권익위원회의 김건희씨 명품백 수수 혐의없음 결정 이후\n\n권익위 게시판에 국민들의 문의가 쏟아지고 있습니다.\n\n \n\n“공직자 부인에게 고급 시계를 선물하고 싶은데 괜찮으냐”\n\n“공직자가 미혼이라 그러는데, 친인척 몇 촌까지 선물 가능한가”\n\n“320만원 짜리는 괜찮나? 딱 300만원에 맞춰야 하나”\n\n“박절하지 못해서 어쩔 수 없이 받는 선물은 괜찮나?”\n\n \n\n누가 봐도 풍자이며 비꼬는 말입니다.\n\n그런데 마냥 웃을 수 없는, 뼈를 때리는 질문입니다.\n\n국민권익위원회의 존재 이유를 묻고 있기 때문입니다.\n\n \n\n“300만 원어치 전통 엿을 드리고 싶은데 문제가 없나”라는 질의에\n\n권익위는 어제 “직무 관련성이 없거나,\n\n사교·의례 또는 부조의 목적일 때 가능하다”라고 답했습니다.\n\n \n\n어떤 정신 나간 사람이 직무 연관성도 없이 300만원 어치 선물을\n\n의례나 사교를 위해 줍니까? 그게 말이나 됩니까?\n\n정말 기가 막히고 코가 막힐 지경입니다.\n\n \n\n공무원, 기자, 교수, 교사 등과 그의 배우자들이\n\n고가 물품을 받으면 당연히 안 됩니다.\n\n그게 청탁금지법 시행 8년간 쌓여온 우리 사회의 규범입니다.\n\n과거 권익위는 교사들에게는 카네이션, 열쇠고리, 캔 커피,\n\n믹스 커피도 받지 말라고 답했습니다.\n\n \n\n그런데 권익위는 단 72초의 기자회견으로\n\n이 ‘당연한 가치’를 헛것으로 만들었습니다.\n\n오로지 윤석열 대통령 배우자 김건희 씨의 명품백 수수는\n\n죄가 안 된다고 강변하기 위함입니다.\n\n윤석열 대통령 대학 동기 유철환 권익위원장은 권익위가 쌓아온\n\n추상같던 잣대를 엿가락처럼 늘어뜨리고, 갈대처럼 휘어놓았습니다.\n\n국민권익위가 아니라 ‘국민건희위’라는 비아냥도 아깝습니다.\n\n \n\n게시판에 쏟아지는 문의에 권익위는 어물쩍 넘어가서는 안 됩니다.\n\n위원회를 소집해 전체 의견을 수렴한 뒤\n\n유철환 위원장이 공식 기자회견을 열고, 질의응답까지 하십시오.\n\n그 답변은 향후 국회 상임위원회에서 가장 중요한 의제가 될 것입니다.\n\n \n\n국민을 더이상 허탈하게 하지 마십시오. 지금도 차고 넘칩니다.\n\n"}, {"id": 214, "filename": "제13차 비대위.txt", "title": "제13차 비대위", "date": "", "category": "비상대책위원회", "topics": ["정치·선거개혁", "인권·사회", "검찰·사법개혁", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["검찰개혁", "비대위", "민생", "부동산"], "preview": "조국혁신당 제13차 비상대책위원회  - 조국 비상대책위원장 모두발언 25.10.27. 09:30 본관 224호  <토지주택은행 설립>  우리 경제의 잠재성장률 향상과 민생안정을 위해서는  부동산 시장의 구조개혁이 시급합니다.  그러기 위해서는 ‘토지주택은행’설립 등  공급 패러다임의 대전환을 시작해야 합니다.   ‘잠재성장률’은 그 나라의 ‘성장판’과 같습니다.  그런데 우리나라의 잠재성장률은 2000년대 초반 5% 수준에서  지금은 2% 아래...", "content": "조국혁신당 제13차 비상대책위원회 \n- 조국 비상대책위원장 모두발언 25.10.27. 09:30 본관 224호\n\n<토지주택은행 설립>\n\n우리 경제의 잠재성장률 향상과 민생안정을 위해서는 \n부동산 시장의 구조개혁이 시급합니다. \n그러기 위해서는 ‘토지주택은행’설립 등 \n공급 패러다임의 대전환을 시작해야 합니다. \n\n‘잠재성장률’은 그 나라의 ‘성장판’과 같습니다. \n그런데 우리나라의 잠재성장률은 2000년대 초반 5% 수준에서 \n지금은 2% 아래로 뒷걸음질 쳤습니다. \n경제 규모가 커질수록 점차 낮아지는 것이 일반적이지만, \n우리나라의 하락 속도는 이례적으로 가파릅니다. \n2022년부터는 우리보다 경제 규모가 큰 미국에게 잠재성장률을 역전당했습니다.\n지금, 우리 경제의 성장판이 닫히고 있습니다. \n\n잠재성장률 하락의 대표적 원인을 꼽으면, 인구 위기와 생산성의 위기입니다. \n이 위기의 배경이 바로 부동산 문제와 직결됩니다. \n\n부동산 가격 급등은 가계부채의 급등을 불러옵니다.\n가계 빚이 GDP보다 많은 나라는 한국뿐입니다.\n민간 부채의 50%인 약 1,933조 원이 부동산에 쏠려 있습니다. \n가계의 부동산 자산 비중은 64%로, 일본과 미국은 30%대 수준입니다. \n\n부동산에 기반한 부채주도 성장은, \n자산 불평등을 키우고 내수 침체를 초래합니다. \n이는 저출산과 노동 생산력 저하로 이어집니다. \n결국 부동산이 잠재성장률과 대한민국의 미래를 갉아먹고 있습니다. \n최근 한국은행 총재도 이 점을 분명하게 지적했습니다.\n\n코스피 지수가 45년 만에 4천을 달성했습니다.\n이 흐름이 우리 경제의 질적 성장으로 연결되어야 합니다. \n따라서 부동산 투기의 기대수익률을 내리고, \n주식 투자의 기대수익률은 올리는 방향으로 가야 합니다. \n이것이 조국혁신당이 부동산 시장의 구조개혁을 강력하게 주장하는 이유입니다.\n\n부동산 시장의 구조개혁을 위해서는 토지주택은행을 통해 \n공급의 패러다임을 완전히 바꿔야 합니다.\n\n그동안 LH는 토지를 조성한 뒤 민간에 매각했습니다. \n그로 인해 고분양가 등 개발이익 대부분은 민간 건설사에 돌아갔고, \n주변의 시세는 덩달아 상승했습니다. \n게다가 건설사는 최대 이익을 기준으로 분양하기 때문에 공급은 더뎠습니다. \n이 구조 속에서 가계부채는 확대되고 주거 불안은 심화했습니다. \n이 악순환을 끊어야 합니다. \n\n현재 운영되는 토지은행을 확대해서 토지주택은행을 설립하고, \n정부가 직접 나서서 공공임대 주택을 공급해야 합니다. \n정부 재정과 주택기금 등을 토지주택은행에 출자하고, \n여기에 국민이 참여하는 ‘국민 리츠’를 통해 재원을 마련할 수 있습니다. \n그 재원으로 공공개발과 공공임대를 추진하는 것입니다. \n토지주택은행이 직접 토지소유권을 소유하거나 \n리츠를 통해 간접적으로 토지 매수 후 공공임대를 공급한다면, \n고품질의 주택을 국민들에게 제공할 수 있습니다. \n거대한 공공 시장을 형성해서 부동산 시장을 구조개혁하는 것입니다.\n\n국회가 토지주택은행 설립을 시작으로 공급·세제·금융 등 정책 전 분야에서  \n불평등을 줄이고 국민 주거권을 보장하기 위한 종합대책 마련을 서둘러야 합니다. \n\n<검찰개혁>\n\n국무총리 산하 검찰개혁추진단이 자문위원회를 구성했습니다. \n자문위가 검찰개혁이 수사 기소의 완전한 분리의 대원칙에서, \n한 치도 벗어나지 않도록 제 역할을 다해야 할 것입니다. \n지난 20여 년 동안의 긴 노력 끝에 검찰청이 폐지됐습니다. \n하지만 자문위원회 구성을 보면 걱정이 생깁니다.\n\n검찰개혁은 끝난 것이 아닙니다. \n야구로 비유하면, 9회 상황입니다. 양측의 공방이 남아 있습니다.\n1년이라는 유예기간을 허투루 보내서는 안 됩니다. \n공소청과 중수청 설치 법안, 수사절차법 제정, 형사소송법 개정 등 \n관련 법률 180여 개와 하위 법령 900여 개를 정교하게 정비해야 합니다. \n\n핵심은 검찰의 직접적 보완수사권 폐지와 수사절차법 신설입니다. \n원칙적으로 검사에게 직접적 보완수사권을 남겨서는 안 됩니다. \n\n최근 현직 부장검사가 국회에서 \n상부의 불법 부당한 지휘 사실을 폭로하며 눈물을 흘렸습니다. \n‘쿠팡 일용직 노동자 퇴직금 미지급 사건’을 무혐의 처분하라고 지시했다는 내용입니다. \n실제 검찰은 이 사건을 기소하지 않고 종결시켰습니다. \n검찰의 수사 기소 독점의 폐단을 검찰 스스로 다시 한번 입증한 것입니다. \n국민은 검찰개혁이 곧 민생개혁이라는 사실도 재차 확인했습니다. \n\n다음으로 수사절차법을 신설해야 합니다.\n지금까지 검찰개혁은 조직법 중심으로 논의되어 왔습니다.\n수사와 기소의 분리가 현실화될 경우,\n허용되고 금지되는 수사의 절차와 내용을 세밀하게 법제화해야 합니다.\n이번 기회에 탈법적 수사 관행을 완전히 금지시켜야 합니다.\n\n그동안 검찰개혁을 방해하기 위한 정치검찰과 국민의힘의 방해는 집요했습니다. \n저들은 앞으로 1년의 유예기간을, \n재기의 발판으로 만들기 위한 온갖 공작을 꾸밀 것입니다. \n그러나 국민은 결단했고, 국회는 입법으로 검찰청을 폐지했습니다. \n마지막까지 검찰개혁에 빈틈이 있어서는 안 됩니다.\n\n조국혁신당이 검찰개혁의 확실한 마무리 투수가 되겠습니다. \n검찰권 오남용 진상규명과 책임자 처벌 등 \n남은 검찰개혁 과제까지 남김없이 끝내겠습니다. /끝/"}, {"id": 215, "filename": "제13차 최고.txt", "title": "제13차 최고", "date": "", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당", "민생·경제"], "tags": ["민생", "윤석열"], "preview": "-2024. 6. 24. 9:30. 본청 223호     ■ 조국 대표  지난 16일 또 한 명의 청년이, 퇴근하지 못했습니다.     전주의 한 제지공장에서 설비 점검을 하던 19살 노동자입니다.     기계를 점검한다고 혼자 설비실에 들어갔다가 숨진 채로 발견됐습니다.     지난해 현장실습을 거쳐 정직원이 된지 6개월 만에 변을 당했습니다.     삼가 애도를 표합니다. 유가족께도 위로를 보냅니다.     그의 생전 메모장이 공개됐습니다....", "content": "-2024. 6. 24. 9:30. 본청 223호\n\n \n\n■ 조국 대표\n\n지난 16일 또 한 명의 청년이, 퇴근하지 못했습니다.\n\n \n\n전주의 한 제지공장에서 설비 점검을 하던 19살 노동자입니다.\n\n \n\n기계를 점검한다고 혼자 설비실에 들어갔다가 숨진 채로 발견됐습니다.\n\n \n\n지난해 현장실습을 거쳐 정직원이 된지 6개월 만에 변을 당했습니다.\n\n \n\n삼가 애도를 표합니다. 유가족께도 위로를 보냅니다.\n\n \n\n그의 생전 메모장이 공개됐습니다.\n\n“파트에서 에이스 되기” 즉 내 부문에서 최고 되기,\n\n“구체적인 미래 목표 세우기”\n\n“내가 하고 싶은 게 무엇인지 생각해보기”\n\n“다른 언어 공부하기,” “하기 전에 겁먹지 말기”\n\n“사진, 악기 공부하기,” “친구에게 돈 아끼지 않기”\n\n“남에 대해 함부로 이야기 않기.”\n\n \n\n19살 청년이 졸린 눈을 비벼가며, 아니면 언젠가 올 찬란한 미래를 꿈꾸며 써 내려간 다짐입니다.\n\n \n\n어쩌면 몇 년 뒤 영어와 일본어에 능통하고,\n\n사진과 악기를 잘 다루며, 건강한 몸에 뛰어난 기술을 가진 청년 장인이 전주 거리를 활보했을 수도 있었을 것입니다.\n\n그러나 그의 미래는 미완성으로 멈춰 섰습니다.\n\n \n\n그래서 메모지에 연필로 꾹꾹 눌러쓴 희망찬 계획이\n\n설움이 돼 우리 뼈에 사무칩니다.\n\n \n\n유족은 그 젊은이의 따뜻한 피부와 씩씩한 숨소리가 아니라, 버석거리는 낡은 메모장을 돌려받았습니다.\n\n \n\n유족의 침통함을 감히 상상할 수도 없습니다.\n\n국가는 무엇을 했습니까? 여전히 아무것도 없습니다.\n\n \n\n2016년 5월 8일 서울지하철 구의역에서 일하던 비정규 노동자 김군, 2018년 12월 10일 충남 태안 화력발전소에서 하청 노동자 김용균 씨가 숨졌습니다. 홀로 일하다가 그렇게 되었습니다.\n\n \n\n우리는 그때마다 “미안하다, 다시 그런 일이 없도록 하겠다”라고 약속했습니다.\n\n \n\n정부는 책임자 처벌과 재발 방지책을 논의했습니다.\n\n모두 허언이 되었습니다.\n\n \n\n우리는 그들에게 다시 용서를 구해야 합니다.\n\n그리고 어떻게 할지 또 약속해야 합니다.\n\n정부는 제지공장 사건 경위와 책임 문제를 제대로 밝히길 바랍니다.\n\n \n\n방지책을 마련하고 엄격한 시행을 다짐해야 합니다.\n\n그게 정치와 정부의 역할입니다. 다시 한번 이들의 명복을 빕니다.\n\n \n\n임계점이라는 물리학 용어가 있습니다.\n\n물질 구조와 성질이 다른 상태로 바뀔 때의 온도와 압력을 말합니다.\n\n \n\n물이 부글부글 끓다가 어느 순간 기체가 되는 순간 말입니다.\n\n저는 요즘 우리 사회에\n\n어떤 임계점이 다가오지 않나 하는 생각이 듭니다.\n\n특히 지난주 국회 법제사법위원회의 채 해병 특검 청문회를 보면서 확신이 들었습니다.\n\n \n\n다들 보셨겠지만, 윤석열 대통령이 개입한 사실이 확인되고 있습니다.\n\n \n\n신범철 전 국방부 차관의 발언이 대표적입니다.\n\n그는 윤 대통령이 차관과 통화한 게 나오지 않느냐라는 물음에 “그것은 회수에 관련된 것이고 외압을 행사했다는 것은 아니다”\n\n \n\n이렇게 말했습니다.\n\n신 전 차관은 이어지는 물음에 “부적절하다고 생각이 들어서 답변드리지 않겠다”라고 주워 담았습니다.\n\n \n\n국방부 차관이 대통령 개인 휴대폰으로\n\n수사기록 회수와 관련해 통화를 했다고 실토한 것입니다.\n\n \n\n이전 정부 기준이었다면, 즉 윤석열 검찰총장 시절이었다면 직권남용으로 기소되고도 남았을 것입니다.\n\n \n\n윤 대통령이 기소되지 않은 이유는 딱 하나입니다.\n\n현직 대통령이어서 그렇습니다. 지금 그만큼 엄중한 상황입니다.\n\n \n\n청문회에서 특검이 필요하다는 점은 넘칠 만큼 확인됐습니다.\n\n증인들은 “사실 그대로 말하겠다”라는 선서를 거부했습니다.\n\n \n\n“결혼식장에서 신랑·신부가 선서를 거부하면 그게 결혼이냐” 이런 비아냥 소리가 들립니다.\n\n \n\n증인들은 거짓말과 말장난으로 시종일관했습니다.\n\n강제수사를 해서 기소할 수 있는 특검만이 해답입니다.\n\n특검법은 반드시 국회 본회의를 통과할 것입니다.\n\n \n\n윤 대통령은 거부권을 행사하겠지요\n\n그런 식으로 얼마 안 가서 이승만 대통령의\n\n45번 거부권 행사 기록을 넘어설 것입니다.\n\n \n\n저희 당은 총선에서 “3년은 너무 길다”라고 외쳤는데,\n\n요즘에 만나는 국민들은 “석달도 너무 길다”라고 하십니다.\n\n국민 인내력은 한계에 다달았습니다. 임계점에 도달하고 있습니다.\n\n \n\n국민은 그걸 다 보고 계신데,\n\n윤석열 대통령은 자기 자신과 김건희 씨 방탄 놀음에,\n\n대통령실과 국민의힘은 당권, 대권 놀이에 푹 빠져\n\n안 보이나 봅니다.\n\n \n\n어느 순간 툭 터질 것입니다. /끝/\n\n "}, {"id": 216, "filename": "제14차 최고.txt", "title": "제14차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "민생·경제", "조국혁신당", "외교·안보"], "tags": ["민생", "윤석열"], "preview": "-2024. 6. 26.(수) 09:30 본관 316호        ■ 조국 대표     ⌾ 어제 경기 화성의 리튬 배터리 화재 현장을 찾았습니다.  끔찍한 광경이었습니다.  다시 희생자분들의 명복을 빌며, 유가족들께 위로를 보냅니다.     한국에는 산업안전기본법과 중대재해처벌법이 있습니다.  그중 산업안전기본법은 위험의 외주화를 막아보자는 것입니다.  일명 ‘김용균법’입니다.  위험한 작업에는 도급을 금지하고,  도급인에 산업재해 예방조치 ...", "content": "-2024. 6. 26.(수) 09:30 본관 316호\n\n \n\n \n\n■ 조국 대표\n\n \n\n⌾ 어제 경기 화성의 리튬 배터리 화재 현장을 찾았습니다.\n\n끔찍한 광경이었습니다.\n\n다시 희생자분들의 명복을 빌며, 유가족들께 위로를 보냅니다.\n\n \n\n한국에는 산업안전기본법과 중대재해처벌법이 있습니다.\n\n그중 산업안전기본법은 위험의 외주화를 막아보자는 것입니다.\n\n일명 ‘김용균법’입니다.\n\n위험한 작업에는 도급을 금지하고,\n\n도급인에 산업재해 예방조치 의무를 확대토록 했습니다.\n\n안전조치를 위반하는 사업주의 처벌을 강화토록 했습니다.\n\n \n\n중대재해처벌법은 인명 피해를 발생하게 한 사업주,\n\n경영책임자, 공무원 및 법인 처벌 등을 규정한 법입니다.\n\n \n\n김용균법은 제 개인적 소회가 있는 법입니다.\n\n2018년 12월 자유한국당 등 야당은 김용균법 통과를 고리로\n\n청와대 민정수석이던 저의 국회 출석을 요구했습니다.\n\n저는 대통령 지시에 따라 국회에 출석했고,\n\n김용균 법은 국회 본회의를 통과했습니다.\n\n \n\n두 법의 취지는 사람 목숨을 귀하게 여기고, 지키라는 것입니다.\n\n‘하도급 직원도 똑같이 안전해야 한다,\n\n노동자가 다치거나 숨지면 사장이 책임져라’는 것입니다.\n\n \n\n그런데 윤석열 정부가 어떻게 했는지 기억나십니까?\n\n올 1월, 50인 미만에는 중대재해처벌법을 2년 유예하도록\n\n법을 고쳐달라고 국회에 요구했습니다.\n\n앞서 윤 대통령은 2022년 6월 22일 원전 산업 간담회에서는\n\n“지금 원전업계는 전시다. 전시엔 안전을 중시하는\n\n관료적인 사고를 버려야 한다”라고 했습니다.\n\n \n\n안전보다 돈을 우선시하는 물신주의 발언입니다.\n\n이게 이 정부가 사람을 대하는 태도입니다.\n\n혹시라도 기업에 어려움이 갈까봐\n\n사람이 숨져도 처벌하지 말아야 한다는 것입니까?\n\n윤석열 정부가 매기는 노동자 목숨값은 사업장 규모에 따라 다릅니까?\n\n \n\n그러니 사업장 안전사고는 끊이지 않고,\n\n작은 기업, 하청업체 직원들만 희생되고 있습니다.\n\n이 정부가 계속되는 한 반복될 것입니다.\n\n \n\n그랬던 윤석열 대통령은 화재 현장에 와서는\n\n“다시는 이러한 사고가 재발하지 않도록 유사 업체에 대한\n\n안전 점검과 재발 방지 대책 수립에 만전을 기하라”\n\n이렇게 말합니다.\n\n불과 다섯달 전 자신이 한 말을 뒤집었습니다. 세상에 이런\n\n양두구육(羊頭狗肉), 일구이언(一口二言) 정권이 있습니까?\n\n그 두 얼굴에 몸서리가 쳐집니다.\n\n \n\n정부는 화재 사고 원인과 책임소재를 따져\n\n사업주나 법인 등에 문제가 있다면 분명히 벌해야 할 것입니다.\n\n \n\n⌾ 윤석열 대통령이 어제 6·25전쟁 기념식 발언 중\n\n제대로 들었나 하고 의심이 가는 내용이 있었습니다.\n\n“주민들의 참혹한 삶을 외면하고 동포 인권을 잔인하게 탄압하며\n\n정권의 안위에만 골몰하고 있다”\n\n이렇게 북한을 비판했습니다.\n\n \n\n주민들의 참혹한 삶, 인권탄압, 정권의 안위에만 골몰…,\n\n이거 고해성사 아닙니까?\n\n북한을 비판만 했지 자신은 안 돌아보는거 같습니다.\n\n북한 정권 비판으로 자신의 무능과 실정을 감추려는 수법은\n\n이제 먹히지 않습니다.\n\n \n\n그런 와중에 윤석열 대통령이 민생 토론회를 재개했습니다.\n\n총선 선거운동 기간에 전국을 돌며 무려 1000조원이 넘는\n\n예산이 드는 공약을 남발했습니다.\n\n \n\n예산을 어떻게 확보하겠다는 말도 안 합니다.\n\n지금도 마찬가지입니다.\n\n그러니 약속이 지켜질지는 아무도 모릅니다.\n\n대통령 자신도 어떻게 지킬지 모를 것 같습니다.\n\n \n\n역대 최고 빚쟁이 정권이 됐으니,\n\n예산 보따리는 함부로 풀지 못할 것 아닙니까.\n\n민생 토론회를 수차례하고도 민생이 이 모양인데\n\n이번에는 무슨 목적으로 토론회를 하는지 궁금합니다.\n\n \n\n민생은 참혹한데 인권탄압을 일삼는 윤석열 정부가\n\n정권 안위를 위해 빌 공(空)자 공약을 내놓는 형국입니다.\n\n\n경고하는데, 용산 방탄을 할 목적이라면 당장 그만두십시오.\n\n거짓말은 지금 해놓은 것으로도 넘칩니다. /끝/"}, {"id": 217, "filename": "제15차 끝까지간다 특별위원회.txt", "title": "제15차 끝까지간다 특별위원회", "date": "", "category": "끝까지간다위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["사법개혁", "윤석열", "끝까지간다", "내란", "비대위"], "preview": "제15차 끝까지간다 특별위원회 - 조국 비상대책위원장 모두발언 25.10.29. 9:30  <검찰권 오남용 피해회복 특별법 강조>  국민의힘이 국회 국정감사에서 사법부를 향해  이재명 대통령의 재판 재개를 ‘요청’했습니다.  사법부는 가능하다며 ‘화답’했습니다.  사법부가 재판 가능성을 열어둔 건,  재판권을 앞세운 실력행사이자, 국민 겁박입니다.  국민적 사법개혁 명령에 대한 항명입니다.   국민이 생방송으로 지켜보는 가운데, ‘윤석열 정당’...", "content": "제15차 끝까지간다 특별위원회\n- 조국 비상대책위원장 모두발언 25.10.29. 9:30\n\n<검찰권 오남용 피해회복 특별법 강조>\n\n국민의힘이 국회 국정감사에서 사법부를 향해 \n이재명 대통령의 재판 재개를 ‘요청’했습니다. \n사법부는 가능하다며 ‘화답’했습니다.\n\n사법부가 재판 가능성을 열어둔 건, \n재판권을 앞세운 실력행사이자, 국민 겁박입니다. \n국민적 사법개혁 명령에 대한 항명입니다. \n\n국민이 생방송으로 지켜보는 가운데,\n‘윤석열 정당’과 ‘조희대 대법원’이 벌인 \n약속 대련에 분노를 느낍니다. \n질문과 답변 형식을 빌린 짝짜꿍이었습니다.\n\n이재명 대통령은 윤석열 검찰독재 정권의 최대 피해자입니다. \n적법절차 위배와 허위 조작 수사와 기소, 그에 따른 재판은 \n결코 정당성을 가질 수 없다는 것이 국민적 합의입니다. \n대선에서 국민은 분명히 밝혔습니다.  \n\n이 대통령 사건의 본질은, 검찰권 오남용입니다. \n따라서 ‘재판중지’가 아니라, ‘공소기각’과 ‘공소취소’가 맞습니다. \n국회가 대통령 사건이라는 이유로 소극적으로 대응해서는 안 됩니다. \n이것은 대통령 개인의 문제가 아닙니다. \n내란 청산, 검찰독재 청산, 그리고 국민통합을 위해서 \n우리 사회가 반드시 해결하고 넘어가야 할 과제입니다.\n\n민주당이 주장하는 재판중지법은 임시방편입니다. \n근본적 해결책은 조국혁신당이 발의한 \n‘검찰권 오남용 피해회복 특별법’을 즉각 통과시키는 것입니다. \n특별법을 통해 진상 조사·인적 청산·피해 회복의 \n3대 조치가 전면적으로 이뤄져야 합니다. \n민주당이 본질을 직시하고, 조국혁신당과 함께 행동하기를 바랍니다. \n\n<자체 사법개혁 촉구> \n\n“대한민국의 주권은 국민에게 있고, 공무원은 국민에 대한 봉사자입니다”\n대법원 홈페이지에 있는 조희대 대법원장 인사말입니다. \n그러나 대법원은 국민주권을 무시했고, 내란 세력에게 봉사하려 했습니다.\n\n사법개혁을 위해서는 ‘조희대 대법원’에서 ‘조희대’를 지워야 합니다. \n조희대 대법원장의 지휘하에서는 사법개혁은 불가능합니다. \n그 이유는 세 가지입니다. \n첫째, 내란의 밤에 대법원은 계엄사령관의 지시에 따르려 했습니다. \n둘째, 대선 개입 판결로 국민주권 박탈을 시도했습니다. \n셋째, 대법원장은 인사권, 예산권, 행정권을 틀어쥐고 판사들을 통제합니다.\n\n판사는 판결로 말합니다. \n조희대 대법원장 체제의 판결이 점점 노골적으로 드러나고 있습니다.\n최근 특검이 청구한 압수수색영장과 구속영장이 \n특정 판사들만 만나면, 기각되는 일이 빈번하게 일어납니다. \n이와 같은 ‘지귀연 현상’을 끊어내는 것이 사법개혁입니다. \n\n따라서 사법개혁을 위해서는 \n조희대 대법원장이 사퇴하고, 법원행정처는 폐지되어야 합니다. \n그럼에도 조희대 대법원장이 자진사퇴를 하지 않는다면, \n국회가 탄핵 절차를 통해 사법개혁의 열차를 출발시켜야 합니다.\n\n‘사법부의 독립’은 사법부의 헌정 수호 의지가 확인될 때만 보장됩니다. \n‘재판의 독립’은 판사가 자기 마음대로 판결해도 된다는 의미가 아닙니다. \n사법부에 대한 민주적 통제는 헌법의 요청입니다. \n사법부 독립이 모든 비위와 의혹의 면죄부가 되는 시대는 끝났습니다.\n‘신뢰’가 무너졌는데, ‘독립’을 요구할 수는 없습니다. \n사법부 스스로 그‘신뢰’를 회복하는 결단에 들어가야 합니다.\n\n법복 입은 시민인, 법원의 구성원들에게 강력하게 촉구합니다. \n사법부의 독립을 위해 이제는 할 말을 하고, 할 일을 하십시오. \n가장 좋은 개혁은 내부의 양심에서 시작되는 개혁입니다.\n사법부의 독립을 가로막는 대법원장의 퇴진을 요구하십시오. \n그리고 자체 개혁안을 국회에 제출하십시오. \n그러지 않고서는 국민의 신뢰를 회복할 수 없고, \n‘조희대의 그림자’ 안에서 계속 머물 수밖에 없을 것입니다.  /끝/"}, {"id": 218, "filename": "제15차 최고.txt", "title": "제15차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["윤석열"], "preview": "- 2024. 6. 28.(금) 9:30. 본관 316호    ■ 조국 대표    ◎ 눈을 의심한다는 게 이런 말일 겁니다.    채널A, 세계일보 보도를 읽으면서 절감했습니다.  김진표 전 국회의장님 회고록 내용을 접한 모든 국민은  충격을 받았을 것입니다.    2022년 12월 5일 국가조찬기도회에서 윤 대통령이  “이태원 참사가 특정 세력에 의해 유도되고  조작된 사건일 가능성도 배제할 수 없다”고 했답니다.    ‘특정 세력의 조작’이...", "content": "- 2024. 6. 28.(금) 9:30. 본관 316호\n\n\n\n■ 조국 대표\n\n\n\n◎ 눈을 의심한다는 게 이런 말일 겁니다.\n\n\n\n채널A, 세계일보 보도를 읽으면서 절감했습니다.\n\n김진표 전 국회의장님 회고록 내용을 접한 모든 국민은\n\n충격을 받았을 것입니다.\n\n\n\n2022년 12월 5일 국가조찬기도회에서 윤 대통령이\n\n“이태원 참사가 특정 세력에 의해 유도되고\n\n조작된 사건일 가능성도 배제할 수 없다”고 했답니다.\n\n\n\n‘특정 세력의 조작’이라...기가 막힙니다.\n\n세상에 일국의 대통령이 극우 유튜버류의 음모론을 믿고 있었습니다.\n\n국정최고책임자가 확인도 안 된 말을 술자리도 아닌\n\n국가 행사에 동석한 김진표 국회의장에게 말했습니다. \n\n\n\n윤석열 대통령 국정 운영에서는 이해할 수 없는 부분이 많았습니다.\n\n왜 그런지 이제 윤곽이 나옵니다.\n\n불순세력 개입설, 각시탈 기름 살포설, \n\n민주노총 암약설, 운운했던 이만희 전 국민의힘 간사가 왜 그런 망언을 했는지 이제야 이해가 갑니다.\n\n윤석열 대통령이 왜 그리도 유가족을 매몰차게 대했는지도 이해가 갑니다.\n\n\n\n대통령실은 “언론에서 다양한 의혹”을 제기했기에 조사해달라고 했을 뿐이라고 핑계를 댑니다.\n\n그런데 당시 어느 언론이 불순세력 배후 의혹을 얘기했는지 밝히십시오.\n\n\n\n이런 야비하고 악랄한 음모론은 \n\n당시 일명 ‘틀튜브’로 불리는 극우 성향의 유튜브 채널과 \n\n온라인상의 여권 지지자들이 대규모로 퍼뜨렸습니다.\n\n이번 보도를 보면서,\n\n윤 대통령이 ‘틀튜브’의 애청자가 아닌가 하는 의심을 \n\n하지 않을 수 없습니다.\n\n\n\n저는 총선 직후 음주 자제, 무속인이나 극우 유튜버 방송 시청 중단 등 10가지를 윤석열 대통령에게 요구한 바 있습니다.\n\n괜히 그랬겠습니까?\n\n\n\n되도 않는 변명하지 말고, 어느 언론이 그런 보도를 했는지 \n\n국민 앞에 밝히십시오. \n\n그리고 김진표 전 국회의장이 윤 대통령의 발언을 ‘왜곡’했다고 비난했던데, \n\n출판물에 의한 명예훼손으로 고발하십시오.\n\n김진표 의장을 압수수색도 하고 소환조사도 하십시오.\n\n검찰에 있는 수하들이 알아서 척척 혼을 내주지 않겠습니까.\n\n\n\n희생자에 대한 최소한의 인간적 공감을 표하기는커녕 조작을 의심하던 사람이 다름 아닌 대통령이었습니다.\n\n믿기 힘든 초현실적 상황입니다. 3년 길어도 너무 깁니다.\n\n\n\n◎ 채해병 순직사건을 다룬 언론 보도를 보면\n\n두 명의 이상하고 수상한 이름이 눈에 띕니다.\n\n한 명은 강의구 대통령실 부속실장입니다.\n\n\n\n강 실장은 지난해 채해병 순직 사건이 있고 난 뒤\n\n임기훈 대통령실 국방비서관과 여러 차례 통화합니다.\n\n\n\n대통령실 부속실장은 대통령이 아침에 출근해서 저녁 퇴근할 때까지\n\n곁을 지킵니다. 그래서 ‘문고리 권력’이라고 합니다.\n\n그런 대통령 최측근이 자신의 호기심을 충족하려고\n\n다른 비서관에게 전화했을 리 없습니다.\n\n그럼 대통령 지시를 받았기 때문이라고 봐야 합니다.\n\n\n\n두번째 사람은 임성근 전 해병대 1사단장과 관련된 인물입니다.\n\n이 사건에서 국민이 가장 의아해 하는 점은,\n\n‘도대체 왜 국군통수권자인 대통령이 한참 아래 계급인 사단장을 위해\n\n개인 휴대전화를 들었을까’ 입니다.\n\n\n\n그 사라진 고리 부분에 수상한 인물, 이모 전 사장이 등장합니다.\n\n이 전 사장은 해병대 출신입니다. 도이치모터스 주가 조작 범인입니다.\n\n윤 대통령 배우자 김건희 씨와 가족 계좌를 관리한 사람입니다.\n\n이 전 사장은 임성근 전 사단장과 함께 하는 골프 모임을 추진하는\n\n카카오톡 대화방에 들어 있었다는 보도가 나왔습니다.\n\n\n\n어쩌다 한번은 우연이겠지만, 이렇게 일이 겹치면 인연 아닙니까?\n\n임성근 전 사단장과 이 전 사장, 강 부속실장과 임 비서관까지,끈이다 엮여져 있습니다.\n\n\n\n모든 정황은 윤 대통령을 지목합니다.\n\n윤 대통령은 현직이므로 기소되지 않을 뿐입니다.\n\n누구의 눈치도 보지 않고 철저하게 수사할 특별검사가\n\n왜 필요한지를 보여주는 이상하고 수상한 연결고리입니다.\n\n어쩌면 채해병 특검과 김건희 특검이 공조해야 할 수도 있습니다.\n\n\n\n윤 대통령은 차치하더라도, 강의구 부속실장과 김건희씨,\n\n도이치모터스 주가 조작을 한 이모 전 사장을 수사해야 합니다.\n\n대통령실에 대한 압수수색은 제한적일 수밖에 없습니다.\n\n그렇더라도 강의구 부속실장이나 김건희씨 관련된 것들,\n\n사적으로 이용한 윤 대통령 개인 스마트폰은 압수수색해야 합니다.\n\n\n\n국회는 이를 위해 채상병 특검법은 물론\n\n김건희 특검법도 7월 국회에서 함께 통과시켜야 합니다.\n\n향후 윤 대통령의 반헌법적 행태가 낱낱이 드러날 것입니다.\n\n정말, 다시 말하지만, 3년은 너무 깁니다.\n\n"}, {"id": 219, "filename": "제16차 최고.txt", "title": "제16차 최고", "date": "", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["개헌", "민생", "윤석열"], "preview": "-2024.07.01. 본관 316호     ■조국 당대표     조국혁신당 대표 조국입니다.     ◎ 얼마 전 <청년 밥상 문간>이라는 곳에서 김치찌개를 먹었습니다.  이태원참사 희생자 이상은 씨 어머니께서 이곳을 빌려서  방문하는 모든 손님들께 따뜻한 식사를 차려주셨습니다.  어머니께 인사를 드리고 앉아서 한술 뜨는데,  목이 메이더군요.  참사가 없었으면, 상은씨는 친구, 가족과 정겹게 둘러앉아  밥을 먹었을 수도 있었겠구나 싶었습니다....", "content": "-2024.07.01. 본관 316호\n\n \n\n■조국 당대표\n\n \n\n조국혁신당 대표 조국입니다.\n\n \n\n◎ 얼마 전 <청년 밥상 문간>이라는 곳에서 김치찌개를 먹었습니다.\n\n이태원참사 희생자 이상은 씨 어머니께서 이곳을 빌려서\n\n방문하는 모든 손님들께 따뜻한 식사를 차려주셨습니다.\n\n어머니께 인사를 드리고 앉아서 한술 뜨는데,\n\n목이 메이더군요.\n\n참사가 없었으면, 상은씨는 친구, 가족과 정겹게 둘러앉아\n\n밥을 먹었을 수도 있었겠구나 싶었습니다.\n\n희생자 159명 가족과 친구들은 이처럼 주인공 없는 생일을\n\n축하가 아니라 추모하겠구나 하는 생각도 들었습니다.\n\n \n\n그런데 이태원 참사를 전혀 다르게 대하는 이들이 있습니다.\n\n이 나라 국정 최고 책임자인 윤석열 대통령이 대표적입니다.\n\n윤 대통령은 이태원 참사가 “특정 세력에 의
