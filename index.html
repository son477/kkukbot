<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>꾹봇 – 조국은 이렇게 말했다</title>
<style>
  /* ===== DARK MODE (기본) ===== */
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #f0f6fc;
    --accent: #1f6feb;
    --accent2: #388bfd;
    --hover: #2d333b;
    --modal-bg: rgba(0,0,0,0.85);
  }

  /* ===== LIGHT MODE ===== */
  body.light {
    --bg: #f8fafc;
    --bg2: #ffffff;
    --bg3: #f1f5f9;
    --border: #e2e8f0;
    --text: #1e293b;
    --text2: #64748b;
    --text3: #0f172a;
    --accent: #2563eb;
    --accent2: #3b82f6;
    --hover: #e8f0fe;
    --modal-bg: rgba(0,0,0,0.55);
  }
  body.light header {
    background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 50%, #e8f0fe 100%);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body.light .speech-card:hover {
    box-shadow: 0 8px 24px rgba(37,99,235,0.12);
  }
  body.light .highlight { background: rgba(255,180,0,0.25); color: #92400e; }
  body.light .modal { box-shadow: 0 24px 80px rgba(0,0,0,0.2); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif; min-height: 100vh; transition: background 0.25s, color 0.25s; }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a1f2e 100%);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: background 0.25s, box-shadow 0.25s;
  }
  .header-inner {
    max-width: 1600px; margin: 0 auto;
    display: flex; align-items: center; gap: 20px;
    padding: 14px 24px;
  }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #1f6feb, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900; color: white;
    box-shadow: 0 4px 12px rgba(31,111,235,0.4);
    flex-shrink: 0;
  }
  .logo-text { line-height: 1.2; }
  .logo-title { font-size: 18px; font-weight: 800; color: var(--text3); letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ===== THEME TOGGLE ===== */
  .theme-toggle {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 24px; padding: 6px 14px;
    cursor: pointer; font-size: 13px; color: var(--text2);
    display: flex; align-items: center; gap: 6px;
    transition: all 0.25s; white-space: nowrap; font-weight: 600; user-select: none;
  }
  .theme-toggle:hover { background: var(--hover); color: var(--text); border-color: var(--accent2); }
  .theme-toggle .toggle-icon { font-size: 15px; transition: transform 0.4s; }
  .theme-toggle:hover .toggle-icon { transform: rotate(20deg); }

  /* ===== HEADER STATS ===== */
  .header-stats { display: flex; gap: 16px; margin-left: auto; align-items: center; }
  .stat-badge {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    font-size: 12px; color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }
  .stat-badge strong { color: var(--text3); font-weight: 700; font-size: 14px; }

  /* ===== SEARCH BAR ===== */
  .search-bar { flex: 1; max-width: 480px; display: flex; align-items: center; gap: 10px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px 9px 40px;
    color: var(--text); font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(56,139,253,0.2); }
  .search-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 16px; pointer-events: none; }
  .search-clear { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; display: none; }
  .search-clear:hover { background: var(--hover); color: var(--text); }

  /* ===== LAYOUT ===== */
  .layout {
    max-width: 1600px; margin: 0 auto;
    display: grid; grid-template-columns: 280px 1fr;
    gap: 0; min-height: calc(100vh - 72px);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: var(--bg2); border-right: 1px solid var(--border);
    padding: 20px; position: sticky; top: 72px;
    height: calc(100vh - 72px); overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sidebar-section { margin-bottom: 24px; }
  .sidebar-title {
    font-size: 11px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .filter-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 7px 10px; border-radius: 8px;
    border: none; background: none; cursor: pointer;
    font-size: 13px; color: var(--text2);
    transition: all 0.15s; text-align: left; margin-bottom: 2px;
  }
  .filter-btn:hover { background: var(--hover); color: var(--text); }
  .filter-btn.active { background: var(--bg3); color: var(--text3); font-weight: 600; border: 1px solid var(--border); }
  .filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .filter-btn .count {
    margin-left: auto; font-size: 11px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 1px 7px; font-weight: 600;
  }
  .filter-btn.active .count { background: var(--accent); border-color: var(--accent); color: white; }

  /* ===== ACTIVE FILTERS BAR ===== */
  .active-filters {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 24px;
    border-bottom: 1px solid var(--border); background: var(--bg2);
    min-height: 44px; align-items: center;
  }
  .active-filters.empty { display: none; }
  .filter-tag {
    display: flex; align-items: center; gap: 5px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--text);
  }
  .filter-tag button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; line-height: 1; margin-left: 2px; padding: 0; transition: color 0.2s; }
  .filter-tag button:hover { color: #ef4444; }
  .clear-all { background: none; border: 1px solid #ef4444; color: #ef4444; border-radius: 20px; padding: 3px 10px; font-size: 12px; cursor: pointer; transition: all 0.2s; margin-left: auto; }
  .clear-all:hover { background: #ef4444; color: white; }

  /* ===== CONTENT ===== */
  .content { padding: 20px 24px; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .result-count { font-size: 14px; color: var(--text2); flex: 1; }
  .result-count strong { color: var(--text3); font-size: 16px; }
  .view-btns { display: flex; gap: 4px; }
  .view-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; cursor: pointer;
    color: var(--text2); font-size: 16px; transition: all 0.2s;
  }
  .view-btn:hover, .view-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .sort-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text); font-size: 13px; cursor: pointer; outline: none; }

  /* ===== CARD GRID ===== */
  #cards-container.view-card { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  #cards-container.view-list { display: flex; flex-direction: column; gap: 8px; }
  #cards-container.view-timeline { display: flex; flex-direction: column; gap: 0; border-left: 2px solid var(--border); margin-left: 20px; }

  /* ===== CARD ===== */
  .speech-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .speech-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-color, #3b82f6); }
  .speech-card:hover { border-color: var(--accent2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-cat {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    background: color-mix(in srgb, var(--card-color, #3b82f6) 20%, transparent);
    color: var(--card-color, #3b82f6);
    border: 1px solid color-mix(in srgb, var(--card-color, #3b82f6) 40%, transparent);
  }
  .card-date { font-size: 12px; color: var(--text2); margin-left: auto; white-space: nowrap; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text3); line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-preview { font-size: 12px; color: var(--text2); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .tag:hover { background: var(--hover); color: var(--text); border-color: var(--text2); }

  /* LIST VIEW */
  .view-list .speech-card { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; padding: 12px 16px; border-radius: 8px; border-left: 3px solid var(--card-color, #3b82f6); }
  .view-list .speech-card::before { display: none; }
  .view-list .card-title { margin-bottom: 0; font-size: 13px; -webkit-line-clamp: 1; }
  .view-list .card-preview, .view-list .card-tags { display: none; }
  .view-list .card-header { margin-bottom: 0; flex-direction: column; gap: 4px; align-items: flex-start; }

  /* TIMELINE VIEW */
  .view-timeline .speech-card { margin-left: 24px; margin-bottom: 16px; border-radius: 8px; padding: 14px; position: relative; }
  .view-timeline .speech-card::after { content: ''; position: absolute; left: -31px; top: 20px; width: 10px; height: 10px; border-radius: 50%; background: var(--card-color, #3b82f6); border: 2px solid var(--bg); box-shadow: 0 0 6px var(--card-color, #3b82f6); }
  .year-divider { font-size: 12px; font-weight: 700; color: var(--text2); padding: 4px 0 12px 24px; letter-spacing: 1px; margin-left: -2px; border-left: 2px solid var(--border); position: relative; }
  .year-divider::before { content: ''; position: absolute; left: -7px; top: 8px; width: 12px; height: 12px; border-radius: 2px; background: var(--bg3); border: 2px solid var(--border); }

  /* HIGHLIGHT */
  .highlight { background: rgba(255,200,0,0.3); border-radius: 2px; color: #ffd700; font-weight: 600; }

  /* ===== MODAL ===== */
  .modal-overlay { display: none; position: fixed; inset: 0; background: var(--modal-bg); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; max-width: 760px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 24px 80px rgba(0,0,0,0.6); animation: modalIn 0.25s ease; }
  @keyframes modalIn { from { opacity: 0; transform: translateY(-20px) scale(0.97); } to { opacity: 1; transform: none; } }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
  .modal-header-info { flex: 1; }
  .modal-cat { margin-bottom: 8px; }
  .modal-title { font-size: 18px; font-weight: 800; color: var(--text3); line-height: 1.4; margin-bottom: 8px; }
  .modal-meta { font-size: 13px; color: var(--text2); display: flex; gap: 12px; flex-wrap: wrap; }
  .modal-close { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 18px; color: var(--text2); display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .modal-close:hover { background: #ef4444; border-color: #ef4444; color: white; }
  .modal-tags { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
  .modal-topics { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .topic-badge { font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 600; background: color-mix(in srgb, var(--t-color, #3b82f6) 20%, transparent); color: var(--t-color, #3b82f6); border: 1px solid color-mix(in srgb, var(--t-color, #3b82f6) 40%, transparent); }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-body::-webkit-scrollbar { width: 6px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .modal-content-text { font-size: 14px; line-height: 1.9; color: var(--text); white-space: pre-wrap; word-break: break-word; }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 80px 20px; color: var(--text2); }
  .no-results .icon { font-size: 48px; margin-bottom: 16px; }
  .no-results h3 { font-size: 18px; color: var(--text3); margin-bottom: 8px; }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; height: 200px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MOBILE */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: fixed; left: -300px; top: 0; height: 100vh; z-index: 200; transition: left 0.3s; width: 280px; }
    .sidebar.open { left: 0; }
    .mobile-menu { display: flex !important; }
    .header-stats { display: none; }
  }
  .mobile-menu { display: none; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; cursor: pointer; color: var(--text2); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <button class="mobile-menu" id="mobileMenu">☰</button>
    <a class="logo" href="#">
      <div class="logo-icon">꾹</div>
      <div class="logo-text">
        <div class="logo-title">꾹봇</div>
        <div class="logo-sub">조국혁신당 조국 대표의 발언 아카이브</div>
      </div>
    </a>
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="키워드, 제목, 내용 검색...">
      </div>
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="화이트/다크 모드 전환">
      <span class="toggle-icon" id="themeIcon">🌙</span>
      <span id="themeLabel">다크</span>
    </button>
    <div class="header-stats">
      <div class="stat-badge">총 <strong id="totalCount">291</strong>개</div>
      <div class="stat-badge">표시 <strong id="shownCount">291</strong>개</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">📋 카테고리</div>
      <div id="cat-filters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">🏷 주제·의제</div>
      <div id="topic-filters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">📅 연도</div>
      <div id="year-filters"></div>
    </div>
  </aside>

  <main>
    <div class="active-filters empty" id="activeFilters"></div>
    <div class="content">
      <div class="toolbar">
        <div class="result-count"><strong id="resultNum">291</strong>개 자료</div>
        <div class="view-btns">
          <button class="view-btn active" id="btnCard" title="카드뷰" onclick="setView('card')">⊞</button>
          <button class="view-btn" id="btnList" title="목록뷰" onclick="setView('list')">☰</button>
          <button class="view-btn" id="btnTimeline" title="타임라인" onclick="setView('timeline')">📅</button>
        </div>
        <select class="sort-select" id="sortSelect" onchange="render()">
          <option value="date-desc">최신순</option>
          <option value="date-asc">오래된순</option>
          <option value="title">제목순</option>
        </select>
      </div>
      <div id="cards-container" class="view-card">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-info">
        <div class="modal-cat"><span id="modalCat" class="card-cat"></span></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-tags" id="modalTags"></div>
    <div class="modal-body">
      <div class="modal-content-text" id="modalContent"></div>
    </div>
  </div>
</div>

<script>

 국민의 권리로서, 국가가 적극 보장해야 합니다. 사회권 선진국을 목표로 뛰는 조국혁신당은 노란봉투법 시행으로 노동권이 더 꽃 피우길 기원합니다.\n2026.03.10. 조국혁신당 대표 조국"}, {"id": 3, "filename": "2026.3.9 조국혁신당 창당 2주년 기자간담회.txt", "title": "조국혁신당 창당 2주년 기자간담회", "date": "2026-03-09", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["5.18", "사법개혁", "부동산", "지방선거", "민생", "내란", "개헌"], "preview": "2026.3.9 조국혁신당 창당 2주년 기자간담회   조국혁신당 당대표 조국입니다.  오늘 자리에 함께해 주셔서 감사드립니다.   지난 3월 3일은 조국혁신당이 국민의 뜨거운 열망을 안고  창당한 지 2주년이 되는 날이었습니다.  그날 기자간담회를 하려고 했지만 미국과 이스라엘의 이란 공습으로 인한 비상 경제·안보 상황을 고려해, 오늘 열게 되었습니다.   그러면, 기자간담회 모두발언을 시작하겠습니다.   존경하는 국민 여러분!  대한민국은 내...", "content": "2026.3.9 조국혁신당 창당 2주년 기자간담회 \n\n조국혁신당 당대표 조국입니다. \n오늘 자리에 함께해 주셔서 감사드립니다. \n\n지난 3월 3일은 조국혁신당이 국민의 뜨거운 열망을 안고 \n창당한 지 2주년이 되는 날이었습니다. \n그날 기자간담회를 하려고 했지만\n미국과 이스라엘의 이란 공습으로 인한 비상 경제·안보 상황을 고려해,\n오늘 열게 되었습니다. \n\n그러면, 기자간담회 모두발언을 시작하겠습니다. \n\n존경하는 국민 여러분!\n\n대한민국은 내란의 위기를 넘어 정상화의 길을 걷고 있습니다. \n경제와 산업, 부동산, 노동, 지방분권, 그리고 검찰·사법개혁에 이르기까지 \n모든 분야에서 전환과 도약이 이루어지고 있습니다. \n정치인 이전에 국민의 한 사람으로 참으로 기쁘며,\n이재명 대통령님의 지도력에 박수를 보냅니다.\n\n그러나 국민 여러분,\n‘정치’는 여전히 과거에 갇혀 미래로 나아가지 못하고 있습니다.\n\n저는 단호하게 선언합니다. \n내란 이전의 정치와 내란 이후의 정치는 완전히 달라야 합니다.\n\n6월 지방선거는 내란 극복 후 치러지는 첫 번째 전국 선거입니다. \n국민의힘을 심판하고, 지방정치를 바꾸고, 국민의 삶을 바꾸는 중대 전환점입니다. \n전국적으로 민주 진보세력이 하나가 돼서 국민의힘을 심판하고, \n‘내란 이후 대한민국’을 향한 국민적 동력을 총결집하는 선거입니다. \n\n내란 이후 정상적 정치를 열망하는 국민 여러분! \n\n우선 ‘위헌적 선거제도’부터 당장 바로잡아야 합니다.\n\n새롭게 출범하는 전남광주통합특별시가 \n이대로 지방의회를 구성하면 바로 ‘위헌’문제가 발생합니다. \n기존 소선거구제를 통합 권역에 그대로 적용했을 때, \n심각한 인구 편차가 발생하기 때문입니다. \n\n헌법재판소는 지방의회의 지역구 획정 시 허용되는 인구 편차 기준을 \n상하 50%, 즉 인구비례 3대 1로 판결했습니다. \n헌법재판소는 이를 초과하는 선거구 획정은 \n유권자의 평등권을 침해한 헌법 위반임을 분명히 지적했습니다.\n\n실제로 전남광주통합특별시에 현행 선거구를 그대로 적용하면, \n광주광역시 12개 선거구는 인구 상한선을 초과하고, \n반대로 전라남도 11개 선거구는 하한선에 미달합니다. \n예컨대 광주 광산구 제5선거구는 10만 1천 명,\n전남 장흥군 제2선거구는 1만 5천 명으로 인구 격차는 6.7배에 달합니다. \n대대적인 선거구 개편이 없으면 위헌 상태로 선거를 치르는 꼴이 됩니다. \n\n대구경북통합특별시 출범에 국민의힘이 동의하는 경우\n여기서도 동일한 문제가 발생합니다. \n통합특별시의 경우만 문제가 아닙니다. \n충남과 충북, 대구, 인천, 경기, 전북, 경남과 경북 등 \n전국적으로 ‘위헌 선거구’가 속출하고 있습니다. \n\n민주당이 집권당으로 책임지고 응답하십시오. \n조국혁신당은 이미 명확한 해법을 제시했습니다. \n전남광주통합특별시의 경우 \n3~5인 중대선거구제를 전면 도입하면 위헌 요소가 바로 해소됩니다. \n\n민주당이 호남에서의 기득권을 지키기 위해 위헌적 선거제도를 방치하는 것은, \n호남 시민을 우롱하고 민주주의 정당성을 스스로 포기하는 행위입니다. \n호남 정치를 선도적으로 바꿔야 영남 일당 독점 정치의 혁파도 이끌어낼 수 있습니다. \n정치개혁에 나서지 않는 민주당을 국민은 주시하고 기억할 것입니다. \n민주당은 현재의 높은 지지율에 안주하여 기득권 지키기를 선택해서는 안 됩니다.\n\n정치개혁을 지지하는 국민 여러분! \n\n6월 지방선거 이전에 정치개혁을 이룸으로써\n대선 당시 구축했던 헌정 수호 연합을 복원해야 합니다.\n조국혁신당이 집권 여당이었다면, \n정치개혁 법안을 당장 통과시켰을 것입니다. \n\n이재명 대통령께서는 일찍이 2018년 성남시장 시절\n지방의회 2인 선거구제를 강하게 비판하셨습니다.\n“살인마도 공천받으면 당선, 공자도 못 받으면 낙선된다.”\n“거대양당 자동 동반당선 2인 선거구제는 지방적폐로 폐지해야 한다.”\n\n이제 국회가 실천할 시간입니다. \n조국혁신당은 ‘정치개혁 광장’에서 국민과 함께, \n‘중대선거구제, 연동형 비례대표제, \n비례대표 정수 확대, 광역단체장 결선투표제 도입’ 등 \n응원봉 국민이 명령하신 정치개혁 과제를 실현하는 데 모든 힘을 다하겠습니다. \n이러한 정치개혁은 국민주권정부의 기반을 \n더욱 확대하고 더욱 튼튼하게 만들 것입니다. \n\n조국혁신당은 오늘부터 정치개혁을 위한 ‘비상 행동’에 돌입합니다. \n개혁 진보 야당들과 국회 본청 앞에서 ‘정치개혁 광장’을 열겠습니다. \n천막을 치고, 그곳에서 정치개혁을 열망하는 ‘응원봉 시민들’과 함께하겠습니다. \n\n개혁 진보 4당, 시민사회, 응원봉 시민의 힘을 하나로 모아서 \n정치개혁의 과제를 반드시 관철하겠습니다. \n그리고 ‘정치개혁 광장’을 \n‘국민 개헌 연대’로 확장하는 방안도 논의해 나갈 것입니다. \n\n국힘 제로를 명령하신 국민 여러분!\n\n조국혁신당은 지방선거에서 3강(强), 3신(信)으로 \n지방정치의 진보적 3당으로 도약하겠습니다. \n\n조국혁신당은 3강(强) 공천에 나서겠습니다. \n첫째, 진보와 개혁을 위한 비전과 정책에 강한 인물을 세우겠습니다. \n둘째, 지역을 잘 알고 지역 혁신에 강한 인물을 세우겠습니다. \n셋째, 부정부패 근절에 강한 인물을 세우겠습니다. \n\n3강(强)을 바탕으로, 국민께 3신(信), 즉 세 가지 믿음을 드리겠습니다.\n첫째, 국힘 제로와 내란 종식의 믿음입니다. \n둘째, 지방정치가 내 삶의 문제를 해결한다는 믿음입니다. \n셋째, 국민주권정부가 성공한다는 믿음입니다. \n \n조국혁신당이 중앙정치뿐만 아니라 지방정치의 확고한 3당이 되어   \n민생 개혁을 책임지고 실천하겠습니다. \n전국 곳곳에서 사회권 선진국의 기반을 만들겠습니다. \n\n저는 조국혁신당 창당 이후 일관되게, \n연대와 경쟁을 통한 민주 진보 진영의 확장을 주장하고 실천해 왔습니다.\n6월 지방선거의 경우 \n국민의힘이 당선 가능성이 없는 호남에서는 경쟁하고, \n그 이외의 지역은 단단한 연대로 내란 극우 세력을 몰아내자고 강조했습니다.\n\n어제 민주당 정청래 당대표께서 ‘승리하는 연대’를 강조했습니다. \n전적으로 동의하고, 환영합니다. \n민주당이 ‘연대와 통합을 위한 추진 준비위원회’를 구성했고, \n조국혁신당은 이에 화답하여 ‘국힘 제로 연합 추진위원회’를 설치했습니다. \n조만간 양당의 위원회가 만날 것입니다. \n양당은 내란을 격퇴했고 이어 국민의힘 심판과 축출을 열망하는 \n응원봉 국민의 열망을 외면해서는 안 될 것입니다.\n논의만을 위한 회의, 보여주기를 위한 회의가 아니라\n연대를 진전하고 강화시키는 성과를 내는 회의가 이루어지길 바랍니다. \n\n그런데 최근 민주당의 송영길 전 당대표께서 느닷없이 저와 조국혁신당을 향해 \n“호남에서 이삭줍기 말고, 영남으로 가라”라고 말씀하셨습니다.\n\n묻고자 합니다.\n조국혁신당의 호남 출마자들이 어떻게 이삭입니까? \n예컨대, 제가 여수시장 후보로 직접 영입한 명창환 전 전남행정부지사가 \n여론조사 1, 2위를 다투고 있습니다.\n이분이 어떻게 이삭입니까? \n또한 무소속으로 계시다가 최근 입당한 광주 서구 의회 4선 김옥수 의원은\n의정대상 17관왕입니다.\n이분이 어떻게 이삭입니까? 모욕과 폄훼를 멈추십시오. \n조국혁신당 후보들은 지난 총선 시기, 송 전 대표께서 손을 잡으셨던\n극우 인사 변희재, 최대집씨보다 훨씬 훌륭한 사람들입니다.\n\n그리고 반문하고 싶습니다. \n조국혁신당이 호남에 후보를 내지 않으면,\n민주당은 영남에서 후보를 내지 않겠다는 말입니까?\n아니면 민주당과 조국혁신당이 영남에서 \n모두 같은 지역에 후보를 내 경쟁하는 것이 \n극우 축출, 국민의힘 심판에 도움이 된다는 것입니까? 답해주십시오.\n\n고 노무현 대통령께서는 2008년\n“호남에서도 정당 간 경쟁이 있어야 합니다.\n그래야 호남의 민주주의가 발전합니다”라고 말씀하신 바 있습니다.\n민주당이 이 말씀을 잊어서는 안 될 것입니다.\n\n연대의 전제는 상대에 대한 존중입니다. \n지난번 민주당 정청래 대표님의 전격적 합당 제안 후 \n민주당 내 합당 반대파 인사들이\n저와 조국혁신당에 대하여 무차별 공격을 했습니다.\n‘토지공개념’이 빨갱이 정책이라는 터무니없는 색깔론 비방도 있었습니다.\n이런 부류의 저열한 공격이 또 벌어진다면 연대도 어려울 것입니다.\n\n검찰개혁을 명령하신 국민 여러분! \n\n조국혁신당은 정부가 재입법 예고한 검찰개혁 수정안에 박수칠 수는 없습니다. \n국무총리 소속 정부 검찰개혁추진단은 \n입법안을 민주당과 국회에 맡기겠다고 했습니다. \n민주당은 “대통령이 바뀌면 검찰의 수사권이 부활할지 모른다”는 \n국민의 우려를 직시해야 합니다. \n\n여러 문제가 있지만 오늘은 특히 \n공소청법안의 문제점에 대하여 지적하고자 합니다. \n바로 ‘대공소청-고등공소청-지방공소청’으로 이어지는 3단계 구조입니다.\n\n첫째, 검찰이 법원과 동급임을 과시하기 위해 만든 3단계 구조를 \n공소청에 그대로 이식할 이유가 전혀 없습니다.\n이번이야말로 검찰은 법원이 아님을 구조 개편을 통해 확실히 해야 합니다.\n ‘대공소청’의 ‘대(大)’자도 빼야 합니다. \n행정부 기관 중 ‘대’자 붙이는 기관은 없습니다. 대국세청, 대경찰청, 들어보셨습니까? \n\n둘째, 검사장 승진 탈락 검사들의 예우 자리였던 고등검찰청이 \n이름만 바꾸어 존속 되어서는 안 됩니다.\n항소나 항고 업무는 지방공소청에서 담당 부서를 만들어 수행해도 충분합니다.\n현재 고등검찰청의 업무 부담이 일선 지방검찰청에 비하여 \n비교할 수 없을 정도로 널널함은 주지의 사실입니다. \n고검 인력을 지방공소청으로 통합해서 재배치해야 합니다.\n\n셋째, 글로벌 스탠더드에도 정면으로 배치됩니다. \n일본과 일제의 식민지였던 한국과 대만 외에는 이런 3단계 구조를 갖고 있지 않습니다.\n\n요컨대, 공소청은 ‘공소청-지방공소청’의 2단계 구조로 가야 합니다.\n이러한 구조변화가 있을 때 국민도 공소청 구성원도\n개혁을 실감할 것입니다.\n\n조국혁신당은 지난 수년간 검찰독재에 맞서 싸우며 \n검찰개혁을 외쳐오신 국민의 마음과 뜻을 받들어 \n검찰개혁 완수를 위해 끝까지 책임을 다하겠습니다.\n6월 지방선거 이후 전개될 검찰개혁 2단계에서는 \n형사소송법 개정의 핵심인, \n공소청 검사의 보완수사권 보유 여부를 결정합니다. \n여기서도 검찰개혁의 입법 정신이 후퇴하지 않도록 \n저와 조국혁신당이 끝까지 책임지겠습니다.\n\n존경하는 국민 여러분, \n사랑하는 조국혁신당 당원 동지 여러분, \n\n돌아보면, "}, {"id": 4, "filename": "2026.3.5 제35차 최고위원회의 모두 발언.txt", "title": "제35차 최고위원회의 모두 발언", "date": "2026-03-05", "category": "최고위원회", "topics": ["정치·선거개혁", "민생·경제", "조국혁신당", "개헌·민주주의", "외교·안보"], "tags": ["지방선거", "최고위", "민생", "부동산"], "preview": "2026.3.5 제35차 최고위원회의 모두 발언  안녕하십니까, 조국혁신당 대표 조국입니다. ◎ 미국과 이스라엘의 이란 공격으로 시작된 전쟁이 엿새로 접어들고 있습니다. 이 전쟁은 중동만이 아니라 우리나라에도 영향을 주고 있습니다. 대한민국 경제는 대외 의존도가 높기에,  이 전쟁이 길어질수록 피해가 커지기 마련입니다. 기업의 어려움은 물가 상승과 소비 위축으로 이어져, 자영업자와 중소기업의 피해는 확대될 것입니다.  여야가 이렇게 엄중한 상황...", "content": "2026.3.5 제35차 최고위원회의 모두 발언\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n◎ 미국과 이스라엘의 이란 공격으로 시작된 전쟁이 엿새로 접어들고 있습니다.\n이 전쟁은 중동만이 아니라 우리나라에도 영향을 주고 있습니다.\n대한민국 경제는 대외 의존도가 높기에, \n이 전쟁이 길어질수록 피해가 커지기 마련입니다.\n기업의 어려움은 물가 상승과 소비 위축으로 이어져,\n자영업자와 중소기업의 피해는 확대될 것입니다.\n\n여야가 이렇게 엄중한 상황에서 당리당략을 내세워 싸우거나,\n정부 노력만 채근만 해서는 안 됩니다.\n대통령과 정부가 위기 극복에 전념할 수 있도록 초당적으로 협력해야 합니다.\n정부는 국회가 뒷받침해야 할 제도적·정치적 방안이 무엇인지 즉각 요청해 주기를 바랍니다.\n\n◎ 싱가포르를 국빈 방문한 이재명 대통령께서 \n“놀랍다. 정부 의지만 있으면\n부동산 투기 억제가 가능하다는 것을 보여준다”고 말했습니다.\n저는 100%, 1,000% 공감합니다.\n\n좁은 국토에서 부동산 투기 없이 주거권을 제공하고\n성장을 이어가는 모습, 우리에게 시사하는 바가 큽니다.\n국민께 묻습니다. “싱가포르는 되고, 대한민국은 안 됩니까?”\n저는 가능하다고 확신합니다.\n이 대통령의 강력한 투기 억제 의지와,\n제가 제시해 온 토지 공공성 강화·고품질 공공주택 비전을 결합하면 됩니다.\n‘망국적 부동산 공화국’에서 ‘편안한 주거권 선진국’으로 도약할 수 있습니다.\n\n세 가지를 제안합니다.\n첫째, 민간 독점 구조를 깨는 것이 부동산 개혁의 기본 방향이어야 합니다.\n민간이 짓고 국민이 빚을 내서 사는 구조가 지속되는 한\n‘부동산 불패, 아파트 공화국’ 신화는 계속될 것입니다.\n민간과 국가가 짓고 국민이 선택하는 방식으로 대전환해야 합니다.\n공론화와 국회 논의를 통해\n‘주거권 보장을 위한 새로운 사회계약’으로 발전시켜야 합니다.\n\n‘주거’를 현 상태의 시장에만 맡겨둘 수 없습니다.\n싱가포르는 공공주택이 시장의 80%를 공급해 가격을 안정시켜 왔습니다.\n우리는 민간이 80%를 쥐고 흔들었습니다.\n이제 국가가 ‘거대한 부동산 공공 시장’을 만들어 민간과 경쟁해야 합니다.\n\n둘째, ‘토지 공공성 강화’입니다.\n“사회주의, 공산당” 운운하는 색깔론은 이제 먹히지 않습니다.\n토지 공공성을 되살리기 위해 신토지공개념 3법이 필요합니다.\n택지소유상한·토지분 종부세 현실화·개발이익 환수가 골자입니다.\n개발이익을 잘 모아 미래 세대 주거복지 재원으로 재투자하는\n선순환을 만들어내야 합니다.\n이것이 토지 공공성 강화의 핵심입니다.\n\n셋째, 공공임대주택을 대한민국의 ‘랜드마크’로 만들어야 합니다.\n싱가포르는 토지임대부(土地賃貸附) 방식으로 공공이 땅을 소유하고,\n국민에게 99년 장기로 주택을 제공해 주거 안정을 만들었습니다.\n저는 2022년에 낸 책 『가불선진국』에서 이 방식을 제안한 바 있습니다.\n소형이 아니라 방이 넉넉한 ‘국민주택’을 서민·중산층이 \n선택할 수 있도록 만든 점도 배워야 합니다.\n\n조국혁신당은 특별히 ‘한국형 99년 주택’을 제안합니다.\n용산공원·서초동·서울공항 등 핵심 입지 공공부지에 99년 동안 임대할 수 있는\n고품질 공공임대주택을 토지임대부 방식으로 공급하자는 것입니다. \n강남권 등 생활 인프라가 좋은 곳부터, 다양한 평형·고품질로 공급하되, \n장기 주거토록 해 투기는 막고 자산 형성의 길을 열어야 합니다.\n\n이제 실천해야 할 시간입니다.\n이재명 대통령만 고군분투하게 놔두는 것은 책임 있는 정치가 아닙니다.\n민주당 일각에서 지방선거를 앞두고 “표에 도움이 안 된다”며\n몸을 사린다면, 국민은 바로 알아볼 것입니다.\n부동산 투기와 전쟁에서 이겨야만, 국민 신뢰를 얻을 수 있습니다.\n민주당도 대통령의 개혁 의지가 제도와 법률로 정착할 수 있도록 \n조국혁신당과 같은 마음으로 실천에 나서주십시오. 감사합니다.      /끝"}, {"id": 5, "filename": "2026.3.5 지방선거 정치개혁 촉구 시민행진 모두발언.txt", "title": "지방선거 정치개혁 촉구 시민행진 모두발언", "date": "2026-03-05", "category": "현장발언", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["내란", "지방선거", "윤석열"], "preview": "2026.3.5 지방선거 정치개혁 촉구 시민행진 모두발언  안녕하십니까, 조국혁신당 대표 조국입니다.   존경하는 주권자 국민 여러분의 투쟁 덕분에 내란은 격퇴되었고  윤석열 김건희는 감옥에 갔습니다. 그렇지만 극우내란정치세력은 여전히 존재하고 있습니다.  여전히 내란을 옹호하고 윤어게인을 외치고 있습니다.  그런데 만약 현재의 선거제도로 6.3지방선거를 치르게 되면 이들은 잔존할 수밖에 없을 것입니다.  특정 지역에서 행정권력을 장악할 것입니...", "content": "2026.3.5 지방선거 정치개혁 촉구 시민행진 모두발언\n\n안녕하십니까, 조국혁신당 대표 조국입니다. \n\n존경하는 주권자 국민 여러분의 투쟁 덕분에 내란은 격퇴되었고 \n윤석열 김건희는 감옥에 갔습니다.\n그렇지만 극우내란정치세력은 여전히 존재하고 있습니다. \n여전히 내란을 옹호하고 윤어게인을 외치고 있습니다.\n\n그런데 만약 현재의 선거제도로 6.3지방선거를 치르게 되면\n이들은 잔존할 수밖에 없을 것입니다. \n특정 지역에서 행정권력을 장악할 것입니다.\n특정 지역에서 지방의회도 장악할지 모릅니다.\n또한 전국 곳곳에 사라져야할 마땅한 이 세력들이 \n자신의 정치적 기반을 유지하게 될 것입니다.\n\n이것은 내란을 격퇴했던 응원봉 주권자들이 원하는 바가 절대 아닙니다.\n응원봉을 들고 나왔던 주권자 여러분들의 꿈과 희망은 다양했습니다.\n응원봉은 형형색색이고 모양도 달랐고 색깔도 달랐습니다.\n응원봉의 모양과 색깔이 다양하고 다채로웠던 것처럼\n정치도 그래야 한다고 생각합니다.\n\n그렇지 않게 되면 응원봉 주권자들의 꿈과 희망은 \n단지 특정 정당으로만 제한될 수밖에 없습니다.\n이번 6.3 지방선거가 시작되기 전에 선거법을 개정해야\n응원봉 주권자들의 꿈과 희망이 반영될 것입니다.\n\n2018년 이재명 대통령께서 성남시장 시절 이렇게 말씀하셨습니다.\n“2인 선거구제로 공천만 받으면 살인마도 당선이 되고, 공자님도 낙선을 한다”라고 하셨습니다.\n그 제도가 그대로 유지되고 있습니다.\n집권 민주당은 2018년 이재명 성남시장의 문제제기를 받아드려야합니다.\n\n한 말씀 더 드리겠습니다. \n최근에 서울시의원 공천을 둘러싸고, \n민주당 현역의원과 시의원 사이에서 1억 돈공천이 문제가 되어 \n두분다 구속되었습니다. \n\n이것이 단지 서울시만의 일이겠습니까?\n언론 보도에 따르면 시의원, 도의원, 구의원, 구청장 등등 시장가격이 매겨졌습니다. \n이런 부패 끝장내야 합니다.\n이런 부패를 끝장내기 위해서도 정치개혁이 이루어져야 합니다. \n\n주권자 국민이 지난 내란시기 힘을 모아 내란세력을 격퇴했던 것처럼\n다시한번 힘을 모아 정치개혁을 이루어야 합니다. \n우리 모두 함께 합시다. "}, {"id": 6, "filename": "2026.3.4 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-03-04", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "페이스북"], "preview": "2026.3.4 조국 대표 페이스북 메시지  김성태 구치소 접견 녹음에 대한 법무부 감찰 조사를 통하여 검찰의 범죄가 드러났다. 천인공노할 일이다! 관련자들 모두 엄벌에 처해야 한다. 이 사건은 ‘법왜곡죄’가 왜 필요한지, 이재명 대통령 사건은 왜 공소취소되어야 하는지 단적으로 보여준다. 이번 사건은 다행히 전모가 밝혀졌다. 그러나 한명숙 총리 뇌물 사건 등 검찰의 범죄적 표적수사에도 불구하고 증거가 확보되지 못해 진상이 드러나지 못한 사건도 ...", "content": "2026.3.4 조국 대표 페이스북 메시지\n\n김성태 구치소 접견 녹음에 대한 법무부 감찰 조사를 통하여 검찰의 범죄가 드러났다. 천인공노할 일이다! 관련자들 모두 엄벌에 처해야 한다. 이 사건은 ‘법왜곡죄’가 왜 필요한지, 이재명 대통령 사건은 왜 공소취소되어야 하는지 단적으로 보여준다.\n이번 사건은 다행히 전모가 밝혀졌다. 그러나 한명숙 총리 뇌물 사건 등 검찰의 범죄적 표적수사에도 불구하고 증거가 확보되지 못해 진상이 드러나지 못한 사건도 많다. 법무부의 추가 감찰을 통해 또는 조국혁신당이 제출한 검찰권 오남용 특별법 제정을 통해 진상을 파악할 것을 강력히 촉구한다. 강제수사권이 없는 국정조사로는 실체 확인이 어렵고, 실체 파악이 안되면 공소취소도 안된다.\nPS: 내 사건의 경우 12.3 내란 얼마 후 12.12. 내려진 대법원 판결에서 유죄가 확정되었다. 사실관계 파악과 법리 적용에 대한 언급을 하지는 않겠다. 그러나 하급심 판결에서 드러난 검찰의 노환중 교수(딸에게 장학금 주신 분)와 딸 고교 시절 친구들에 대한 회유와 압력에 대해서는 감찰이 필요하다고 생각한다. 노 교수와 딸 친구 한 명은 법정에서 눈물로 수사상황을 토로했다."}, {"id": 7, "filename": "2026.3.2 조국혁신당 창당 2주년 조국 대표 기념사.txt", "title": "조국혁신당 창당 2주년 조국 대표 기념사", "date": "2026-03-02", "category": "연설·기념사", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["사법개혁", "윤석열", "부동산", "내란", "개헌", "검찰개혁"], "preview": "2026.3.2 조국혁신당 창당 2주년 조국 대표 기념사  존경하는 국민 여러분, 사랑하는 당원 동지 여러분, 조국혁신당의 두 돌을 축하해주시기 위해 찾아와주신 내외빈 여러분, 참으로 감사합니다.  귀한 시간을 쪼개 전국에서 찾아와주셨습니다.  당 대표로서 다시한번 고개 숙여 감사드립니다.  ◼불가능하다던 ‘길 없는 길’을 걸어온 2년  창당 2주년을 맞이해서 2년 전 오늘을 돌아보았습니다. 제가 처음 조국혁신당 깃발을 들었을 때 대부분 사람들...", "content": "2026.3.2 조국혁신당 창당 2주년 조국 대표 기념사\n\n존경하는 국민 여러분, 사랑하는 당원 동지 여러분,\n조국혁신당의 두 돌을 축하해주시기 위해 찾아와주신 내외빈 여러분,\n참으로 감사합니다. \n귀한 시간을 쪼개 전국에서 찾아와주셨습니다. \n당 대표로서 다시한번 고개 숙여 감사드립니다.\n\n◼불가능하다던 ‘길 없는 길’을 걸어온 2년\n\n창당 2주년을 맞이해서 2년 전 오늘을 돌아보았습니다.\n제가 처음 조국혁신당 깃발을 들었을 때\n대부분 사람들이 만류를 했습니다.\n지금 저희의 확고한 우당인 민주당에서도\n총선 승리에 방해가 될지 모른다고 하면서 만류하신 분도 많았습니다.\n대신 저에게 무소속으로 출마해서 당선되고 난 뒤에 \n입성하라는 권유하신 분도 있었습니다.\n\n그렇지만 저는 다른 선택을 했습니다.\n제 목표는 단지 국회의원 배지를 다는 것이 아니었습니다.\n윤석열 검찰독재정권을 반드시 조기에 깨뜨리고 싶었습니다.\n이를 위해서 우리 스스로 완전 연소 하자고 제안했습니다.\n동시에 윤석열 이후의 대한민국을 \n사회권이 보장되는 선진국으로 만들자고, 고민하자고, 설계를 하자고 제안했습니다.\n앞길이 보장되지 않았던 그 2년전 많은 분들이 승선했습니다.\n항해사를 맡겠다는 분이 계셨습니다.\n갑판장을 맡겠다는 분이 계셨습니다.\n조타장을 맡겠다는 분이 계셨습니다.\n그 중 제일 소중했던 분들은 \n노 하나라도 젓겠다고 승선하신 바로 여기 계신, 당원 동지 여러분들이십니다.\n그렇게 하여 우리는 가장 뜨거운 색인 파란 불꽃을 내뿜으며\n조국혁신호를 출범시켰습니다. \n\n\"3년은 너무 길다.”다 기억하시죠?\n조국혁신당이라는 쇄빙선에 처음 내건 깃발에 새겨졌던 구호입니다.\n선거법의 제약으로 우리는 마이크를 쓰지도 못한 채, \n생목으로 호소했습니다.\n전국을 돌면서 목청이 찢어지도록, “3년은 너무 길다”를 외쳤습니다. \n아무도 미래가 보장되지 않는다라고 할 때\n국민들은 호응해주셨습니다. \n이 구호가 온 국민의 마음에 불을 질렀습니다.\n우리의 피와 땀과 눈물과 우리의 고함에 국민께서 공감해주셨습니다.\n우리의 손을 잡아주셨습니다. \n바로 그 덕분에 우리가 이곳에 있는 것 아닙니까? \n여의도 안팎에 계신 정치전문가들이 우려했지만,\n모든 국민들은 ‘지민비조’라는 집단지성을 발휘됐습니다.\n민주당도 살고, 우리도 살고 그래서 우리 선거결과가 어땠습니까?\n우리 모두가 승리하지 않았습니까?\n창당 5주 만에 의원 12명, 원내 3당이 됐습니다.\n\n이 모두 여기 모이신 당원 동지들 여러분의 덕분입니다!\n\n국회 입성 후 2024년 7월 20일 전국당원대회에서 저는 \n‘윤석열 탄핵’을 공언했습니다.\n여의도 분들, 다들 말렸습니다. \n급하다 그랬습니다. 서두른다고 그랬습니다. \n어떤 분은 비난을, 어떤 분은 조롱을 했습니다.\n\n존경하는 당원 동지 여러분, 묻겠습니다.\n그래서 우리가 멈추었습니까?\n우리가 그래서 주저앉았습니까?\n\n맞습니다. 우리는 멈추지 않았습니다.\n우리는 그만두지 않았습니다.\n국회 안팎에서 윤석열 정권의 무능함과 무도함을 \n비판하고 싸웠습니다. 그렇지 않습니까?\n아무도 윤석열 탄핵을 외치지 못할 때\n우리가 국회 안팎에서 ‘윤석열 탄핵’을 외쳤습니다. 그렇지 않습니까?\n\n그러자, 윤석열 검찰독재 친일 매국 무속 정권은 \n‘자멸적 셀프 쿠데타’를 일으켰습니다.\n‘술 취한 선장’, ‘일그러진 영웅의 엄석대’ 같은 윤석열은\n내란을 일으켰다가 탄핵됐고, 정권은 퇴진했습니다.\n그리고 우리는 이재명 후보를 우리당의 후보로 내세워\n싸워서 국민주권정부를 만들었습니다. 그렇지 않습니까?\n\n이 모두 여기 모이신 조국혁신당 당원 동지들의 피와 땀 덕분입니다!\n\n◼ 또다시 ‘길 없는 길’로 진군, 다시 쇄빙선 항로로\n\n이렇듯 지난 2년, 우리는 길 없는 길을 열어왔습니다. \n‘절대 못할 것’이라는 통념을 깨고, 불가능의 벽을 무너뜨렸습니다.\n\n존경하는 국민 여러분, 사랑하는 당원 동지 여러분,\n그러나 우리는 다시 신발 끈을 묶어야 합니다.\n대표인 저부터, 국회의원, 당원 동지 모두 그래야 할 시간이 왔습니다.\n왜냐, 우리가 국민께 약속한 것이 있습니다.\n우리가 “3년은 너무 길다”만 약속했습니까?\n내란 완전 종식과 사회권 선진국으로의 도약,\n우리는 그것을 약속했습니다. 기억하시지요?\n\n‘내란 주요 임무 종사 정당’ 국민의힘, 심판받아야 하죠?\n정치개혁과 지방분권, 이뤄내야 하죠?\n신 토지공개념 3법 제개정과 고품질 공공임대주택 실천해야 하죠?\n개헌을 통한 제7공화국, 이루어내야 하죠?\n그렇게 했더니 또 우려가 나옵니다. \n \n어떤 사람은“빨갱이 정책”이라고 하더군요. 가소롭습니다. \n어떤 분들은 가능하겠냐고 얘기합니다. 걱정하지 말라고 답하겠습니다. \n총선 시기에 비해 우리당 지지율 떨어져 있습니다. 모르지 않습니다.\n“12석짜리 정당이 뭘 할 수 있겠어”말하는 분도 많습니다. \n\n존경하는 당원 동지 여러분, 그래서 감히 여쭙겠습니다. \n\n윤석열 탄핵 소추안, 어느 당이 제일 먼저 작성하고 제출했습니까.\n(“조국혁신당!”)\n국민의힘 정당해산 요청, 어느 당이 제일 먼저 주장했습니까.\n(“조국혁신당!”)\n‘도로 검찰’ 소지를 없앤 검찰개혁법, 어느 당이 제일 먼저 작성하고 제출했습니까.\n(“조국혁신당!”)\n그저께 통과된 재판소원 등 사법개혁 3법, 어느 당이 제일 먼저 작성하고 제출했습니까.\n(“조국혁신당!”)\n이재명 대통령도 강조한 고품질 공공임대주택 확대, 어느 당이 제일 먼저 주장했습니까.\n(“조국혁신당!”)\n\n존경하고 사랑하는 당원 동지 여러분,\n\n현재 우리 당이 처한 상황, 녹녹하지 않습니다.\n여러 난관이 놓여 있음도 직시하고 있습니다.  \n그러나 동시에 우리가 해야 할 과제, 우리만이 할 수 있는 과제가 \n놓여 있음도 역시 직시하고 있습니다.\n그래서 여기 오늘 창당 2주년을 맞이해서 기호 3번 조국혁신당이 해야 할 \n세 가지 과제를 강조드리고자 합니다. \n\n첫째, 정치의 다양성을 확대하는 정치개혁의 쾌속정이 되어야 합니다. \n대한민국 정치는 고질병 앓고 있습니다. \n내란 세력은 특정 지역을 볼모 삼아, 내란 세력을 기반으로 삼아 안주하고자 합니다.\n생존하려고 합니다. 살아남으려고 합니다. 이거 나둬야 하겠습니까?\n또 다른 특정 지역에서는 특정 정당이 모든 것을 독점하고 있습니다. \n그 결과 국민의 다양한 뜻이 정치에 반영되지 못하고 있습니다. \n내란을 격퇴했던 그 겨울 기억하시죠?\n그 주권자 국민들이 들고 나오신 응원봉 기억하시죠? \n그 모양은 다양했고, 그 색깔은 다채로웠습니다. 그렇지 않습니까?\n다양하고 다채로운 국민의 요구가 다양하고 다채로운 국민의 꿈이\n정치에 반영되어야 하지 않겠습니까?\n\n둘째, 코스피 6000 기분 좋으시죠?\n여기 계신 분들 주식하고 계십니까?\n매일 매일 기쁘시죠? 놀라운 일입니다. 정말 놀라운 일입니다. \n우리 모두 한 번 박수를 칩시다. \n조국혁신당은 코스피6000을 축하하면서, \n6000을 넘어서 7000, 8000이 갈 것을 기대하며\n동시에 코스피6000의 그늘을 살피는 따뜻한 정당이 되어야 합니다. \n내란 격퇴 후 대한민국은 정상적인 성장의 궤도로 진입했습니다. 너무 기쁩니다. \n대한민국은 명실상부하게 세계 10위권 선진국입니다.\n그렇지만, 민생복지에서는 아직 20세기에 머물러 있습니다.\n불평등을 해소해야 더 큰 성장이 가능합니다.\n\n다시 한번 ‘사회투자 골든 룰'을 제시합니다.\n예산에서 공공투자는 단순 소비와 재정 적자 관점에서 따지지 않고\n미래지향적 투자로 보자는 것입니다.\n이를 통해 10년간 매년 국내총생산 1.5% 정도로만 투자해도\n의료, 돌봄, 교육, 주거, 청년, 지역 \n우리 앞의 모든 힘듦이 해결될 것입니다. \n\n셋째, 국민주권정부의 성공을 지원하는 든든한 동지가 되겠습니다.\n대선 당시 다른 누가 뭐라고 해도, 우리는 이재명 대선 후보\n당선을 위해 싸웠고, 당선시켰습니다.\n이재명 후보 어느 정당의 후보였습니까?\n우리 모두의 후보였지요?\n그점에서 우리는 책임을 져야 합니다. \n국민주권정부가 성공하도록 우리도 책임을 다해야 합니다.\n앞으로도 국민주권정부의 성공을 위해 저부터 매진하겠습니다. \n당리당략이 아니라, 대한민국 성공을 위해,\n대한민국 국민의 성공을 위해 싸울 것입니다. \n\n◼ 더 강하게, 더 선명하게, 더 유능하게, 더 유연하게\n\n존경하는 국민 여러분, 사랑하는 당원 동지 여러분,\n\n언제부턴가 자유·법·질서·공정·애국 등등.\n이런 소중하고 아름다운 단어가 오염되었습니다. \n\n‘법과 질서, 자유’를 주장하는 자들이 내란을 일으켰고,\n‘공정’을 말하는 이들은 자기의 특권을 감추고, \n반대파를 공격하는 용도로 이 개념을 씁니다.\n‘애국’은 극우세력이 불법 점유한 개념이 돼버렸습니다.\n\n조국혁신당은 이 말의 원래 뜻을 살리겠습니다.\n‘법과 질서, 자유’를 파괴한 내란 세력을 심판하고,\n‘애국’이라는 이름 아래 ‘매국’을 하는 극우 세력을 몰아내겠습니다.\n\n존경하고 사랑하는 당원 동지 여러분,\n\n최근 조국혁신당을 향해 통합 논의가 제기되었다가 무산되었습니다.\n그 과정에서 전국 당원간담회에서 표출된 \n여러 당원들 말씀을 다 들었습니다.\n통합이 필요하다는 말씀 있었습니다.\n동시에, 홀로서기를 해야 한다는 말씀도 있었습니다.\n\n지금 우리에게 가장 필요한 것은 자강(自强)입니다. \n우리는 더 강해지고, 더 단합해야 합니다.\n우리 이상은 더 높아져야 하고, 우리 주장은 더 선명해져야 합니다.\n우리가 자강해야, 연대도 가능하고\n우리가 자강해야, 통합도 가능하고\n우리가 자강해야, 미래가 열릴 것입니다.\n\n내란 세력을 상대로 한 투쟁에서는 물론,\n민주진보개혁진영에서 연대와 통합을 추구할 때도 마찬가지입니다.\n우리가 분열하고 약해지면, 아무도 쳐다보지 않을 것입니다. \n우리가 아무리 목청껏 외쳐도, 아무도 들어주지 않을 것입니다. \n\n우리가 단결할 때, \n우리가 유능할 때, \n우리와 손잡고 싶어 할 것입니다.\n\n다시한번 말씀드립니다. \n자강을 해야 연대가 있고 \n자강을 해야 승리가 있습니다. \n\n존경하고 사랑하는 당원 동지 여러분,\n\n우리의 미래는 그 누구도 아닌, 우리의 손으로 만들어내야 합니다.\n당장 임박해있는 6월 지방선거에서 증명해내야 합니다.\n이번 6월 지선에서 다 이루지 못하면, \n2028년 총선에서 증명해내야 합니다.\n우리는 지난 2년간 우리의 존재의미를 증명하려고 노력해왔습니다. \n일부 증명했고"}, {"id": 8, "filename": "2026.3.1 조국 대표 서울신문 인터뷰.txt", "title": "조국 대표 서울신문 인터뷰", "date": "2026-03-01", "category": "인터뷰", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당", "민생·경제"], "tags": ["합당", "사법개혁", "부동산", "최고위"], "preview": "2026.3.1 조국 대표 서울신문 인터뷰  -선거 연대 여부가 정해져야 전략을 세울 텐데.  “민주당이 말하는 연대가 선거 연대인지 답을 달라고 했는데 답이 없다. 늦어도 4월 중순까진 선거 연대 여부가 정해져야 한다. 민주당이 공식적으로 한다 안한다 정해야 한다. 양당 위원회가 합의했는데 민주당 최고위원회, 의원총회에서 뒤집어지면 혁신당은 또 피해를 입는다.”  -양보할 수 없는 연대 원칙은 뭔가.  “극우 심판, 국민의힘 제로를 위한 선거...", "content": "2026.3.1 조국 대표 서울신문 인터뷰\n\n-선거 연대 여부가 정해져야 전략을 세울 텐데.\n\n“민주당이 말하는 연대가 선거 연대인지 답을 달라고 했는데 답이 없다. 늦어도 4월 중순까진 선거 연대 여부가 정해져야 한다. 민주당이 공식적으로 한다 안한다 정해야 한다. 양당 위원회가 합의했는데 민주당 최고위원회, 의원총회에서 뒤집어지면 혁신당은 또 피해를 입는다.”\n\n-양보할 수 없는 연대 원칙은 뭔가.\n\n“극우 심판, 국민의힘 제로를 위한 선거연대가 원칙이고, 상호 신뢰와 상호 존중이 있어야 통합으로 갈 수 있다.”\n\n-존중이라면 민주당의 양보를 말하나.\n\n“연대라 하면 지분을 생각할지 모르겠지만 그 얘기를 하면 연대는 깨진다. 원칙이 몇 가지 있다. 첫째로 혁신당 비전과 가치에 대한 존중이 필요하다. 토지공개념을 ‘빨갱이’라고 하는, 그건 얘길 하지 말자는 거다. 둘째로 대의를 공유하고 시도당 차원에서 자율적으로 선거연대를 처리하는 방법 필요하다. 또 양당 후보 검증에 일괄적으로 적용되는 합리적 기준을 정해야 한다.”\n\n-연대가 무산된다면.\n\n“어느 지역이든 나가 민주당, 국민의힘 후보를 이기고 당선될 각오다. 민주당의 시혜를 받아 국회의원이든 단체장이든 나갈 생각 없다. 자력으로 해야 6월 이후에도 발언권이 생긴다.”\n\n-본인 출마 지역도 선거 연대와 연계되나.\n\n“그런 셈이다. 당의 시간표가 있고 조국의 시간표가 있는데 이를 맞춰가는 작업이 필요하다. 4월 초쯤에는 결정될 것 같다. 당과 정치인 조국 양쪽 모두에 좋은 선택을 해야 한다.”\n\n-전북 군산·김제·부안갑, 경기 평택을 출마설이 나오는데.\n\n“다 열어놓고 있다. 후보 진용을 전국적으로 갖춰야 하는데 완비가 안 됐다. 민주당 현역 의원이 광역단체장 후보가 되면 그 자리가 빈다.”\n\n-귀책 사유가 있는 당의 공천 문제는.\n\n“원래 민주당은 개정 전 당규에 후보 못 낸다고 돼 있었다. 정치개혁 차원에서 여야 막론하고 귀책 사유 있는 당은 후보를 내선 안 되고, 사과를 해야 한다. 아예 후보 못 내는 법률을 명문화해야 한다.”\n\n-합당 논의 국면에서 ‘조국 대권론’이 등장했는데.\n\n“갑자기 밀약론으로 정청래 대표뿐 아니라 조국에 대한 공격도 엄청났다. 우당에 대한 기본 예의와 존중이 없어 불쾌했다. 모든 정치적 기획은 이유가 있고 목적이 있다. 이익을 얻는 사람이 있으니까 그렇게 했을 것이다.”\n\n-이익을 얻는 사람이 누군가.\n\n“그걸 내 입으로 말해야 하겠나.”\n\n-‘뉴이재명’론도 기획의 연장이라 보나.\n\n“이재명 대통령의 진가를 새롭게 알아보는 사람이 생긴 건 좋은 일이지만 이 프레임으로 이익을 얻으려는 사람들이 있다. 이런 갈라치기는 정부 기반을 스스로 무너뜨리는 것이다. 코미디다. 이언주 최고위원은 뉴이재명이니까 옹호해야 되고 유시민은 올드 이재명이니까 공격해야 한다는 게 말이 되나.”\n\n-당 지지율이 답보 상태다.\n\n“이재명 정부가 잘하고 있어 ‘마음 쏠림’ 현상이 발생하고 있다. 지금은 ‘축적의 시간’이다. 민주당보다 더 진보적인 토지공개념, 사회권 선진국, 정치개혁을 얘기하는 이유다.”\n\n-신토지공개념 입법은 언제.\n\n“법안은 이미 준비돼 있다. 5월 9일 ‘다주택자 양도세 중과 유예 종료’ 전후로 부동산 시장이 어떻게 바뀌는지를 보고 발표할 계획이다. 이재명 대통령이 토지공개념 언급을 안 했을 뿐, 공공임대주택은 얘기했다. 이심전심, 아니 ‘이심조심’이라고 해야 하나.”\n\n-‘사법개혁 3법’ 입법이 마무리됐는데.\n\n“법원 입장에선 입법부가 권한을 침해한다고 생각하겠지만 경제협력개발기구(OECD) 수준의 법원 통제가 갖춰지는 단계라고 본다. 조희대 대법원의 책임이다. 6월 이후 법원행정처 폐지도 논의해야 한다.”\n\n-‘조국의 선택’ 책을 냈다. 잘한 선택과 후회되는 선택은.\n\n“혁신당을 창당한 게 가장 잘한 선택이었다. 후회되는 건 법무부 장관을 하지 않았어야 했다. 문재인 전 대통령은 장관 지명 전에 출마를 권하셨다. 이유 막론하고 제 선택으로 가족 전체가 고통 겪은 건 아비 입장에서 고통스러운 일이다.”\n\n"}, {"id": 9, "filename": "2026.3.1 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-03-01", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["검찰개혁", "사법개혁", "윤석열", "페이스북"], "preview": "2026.3.1 조국 대표 페이스북 메시지  ‘법원행정처 폐지‘는 조국혁신당이 추진하는 사법개혁 핵심 중의 하나다. 오래 전부터 학계와 시민사회단체가 주장해온 과제이기도 하다. 민정수석비서관 재직 시절 수사권조정과 공수처 설치 등 검찰개혁과 함께 사법개혁을 추진했다. 온갖 비난을 받았고, 힘이 부족하여 이루지 못했다. 검찰과 법원 모두의 적이 되고 말았다. 양승태 대법원의 사법농단을 경험했음에도 당시 집권 민주당은 호응하지 않았다. 다들 “법원...", "content": "2026.3.1 조국 대표 페이스북 메시지\n\n‘법원행정처 폐지‘는 조국혁신당이 추진하는 사법개혁 핵심 중의 하나다. 오래 전부터 학계와 시민사회단체가 주장해온 과제이기도 하다.\n민정수석비서관 재직 시절 수사권조정과 공수처 설치 등 검찰개혁과 함께 사법개혁을 추진했다. 온갖 비난을 받았고, 힘이 부족하여 이루지 못했다. 검찰과 법원 모두의 적이 되고 말았다. 양승태 대법원의 사법농단을 경험했음에도 당시 집권 민주당은 호응하지 않았다. 다들 “법원 건드리면 안된다”며 손사래를 쳤다.\n이제 상황이 달라졌다. 윤석열과 조희대는 각각 검찰개혁과 사법개혁의 필요성을 생생히 증거하는 사람이 되었다. 불교용어를 쓰자면, ‘역행보살’(逆行菩薩)들이다. 국민들도 필요성을 실감하고 있다. ‘사법개혁 3법’에 이어 ’법원행정처 폐지‘가 이루어져야 한다. 민주당도 호응할 것으로 믿는다. 시기와 방법을 진지하게 논의하길 희망한다."}, {"id": 10, "filename": "2026.2.28 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-28", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["교육", "사법개혁", "페이스북"], "preview": "2026.2.28 조국 대표 페이스북 메시지  어제자로 조국혁신당이 선도적으로 주창해온 ‘사법개혁 3법’이 모두 통과되었다. 대학교수 시절 참여연대 사법감시센터 소장으로 일하면서 연구하고 주장해 왔던 일이 드디어 실현되었기에 감개무량하다. 이제 대법원장이 인사권, 예산권, 행정권을 독점하도록 하고 이를 통해 판사를 통제할 수 있는 기구인 ‘법원행정처’를 폐지하고, 시민이 참여하는 ‘사법행정위원회’를 만드는 결단을 내릴 시간이다. 사법 선진국에는...", "content": "2026.2.28 조국 대표 페이스북 메시지\n\n어제자로 조국혁신당이 선도적으로 주창해온 ‘사법개혁 3법’이 모두 통과되었다. 대학교수 시절 참여연대 사법감시센터 소장으로 일하면서 연구하고 주장해 왔던 일이 드디어 실현되었기에 감개무량하다.\n이제 대법원장이 인사권, 예산권, 행정권을 독점하도록 하고 이를 통해 판사를 통제할 수 있는 기구인 ‘법원행정처’를 폐지하고, 시민이 참여하는 ‘사법행정위원회’를 만드는 결단을 내릴 시간이다. 사법 선진국에는 우리나라와 같은 법원행정처는 없다. 민주당이 이 개혁까지 동의해주길 강력히 희망한다."}, {"id": 11, "filename": "2026.2.27 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-27", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당"], "tags": ["지방선거", "페이스북"], "preview": "2026.2.27 조국 대표 페이스북 메시지  조국혁신당은 6월 지방선거 목표를 ‘극우 제로’로 삼고 있으며, 이를 위해 국민의힘이 당선될 가능성이 0에 수렴하는 지역에서는 ‘경쟁’, 그렇지 않은 지역에서는 ‘연대’를 해야 한다고 오래 전부터 주장해왔다. 현시점 민주당은 ‘선거연대’를 할 것인지 여부를 답하지 않고 있고, 따라서 양당간 ‘선거연대’의 방법과 범위에 대해서는 전혀 논의가 없는 상태다. 그렇지만 봄 기운이 강해지면 긍정적 방향으로 ...", "content": "2026.2.27 조국 대표 페이스북 메시지\n\n조국혁신당은 6월 지방선거 목표를 ‘극우 제로’로 삼고 있으며, 이를 위해 국민의힘이 당선될 가능성이 0에 수렴하는 지역에서는 ‘경쟁’, 그렇지 않은 지역에서는 ‘연대’를 해야 한다고 오래 전부터 주장해왔다. 현시점 민주당은 ‘선거연대’를 할 것인지 여부를 답하지 않고 있고, 따라서 양당간 ‘선거연대’의 방법과 범위에 대해서는 전혀 논의가 없는 상태다. 그렇지만 봄 기운이 강해지면 긍정적 방향으로 바뀌리라 믿는다.\n지난 전남 담양 재보궐선거에서 조국혁신당은 민주당과 경쟁했다(부산 금정구청장 선거의 경우 단일화가 이루어져 조국혁신당 류제성 후보가 사퇴했다). 그 결과 조국혁신당 정철원 후보가 당선되었고, 현재 탁월한 군정을 펼치고 있다. ‘2025년 농어촌 삶의 지수’에서 담양은 전남 1위다. 최근 내가 인재영입위원장으로 여수시장 후보로 영입한 명창환 전 전남행정부지사의 경우 여수 시민들로부터 열렬한 환영을 받고 있다. 여론조사에 1-2위를 다투고 있다. 이 분들이 6월 지선을 포기해야 할까? 전혀 아니다. 이 분들 외에도 여러 능력있는 분들이 합류했고, 또 합류 예정이다. 그리고 조국혁신당 후보는 비호남 지역에서도 뛰고 있다.\n그런데 일부 민주당원들과 정치평론가들이 조국혁신당이 호남에서 민주당과 경쟁하는 것에 대하여 비판을 하면서 ‘노무현 정신’과 배치된다고 말한다. 선거에서 경쟁자를 견제하는 것, 자연스럽다. \n그러나 이러면서 ‘노무현 정신’을 거론하는 것에 대해서는 이의를 제기한다. 이하에 2008년 노무현 대통령이 ‘노공이산’이라는 필명으로 쓰셨던 글을 소개한다. 어떤 것이 진짜 ‘노무현 정신’인지 쉽게 확인할 수 있을 것이다. 호남 정치에서도 경쟁이 필요하고 이런 경쟁이 호남 정치를 혁신, 발전시킨다는 조국혁신당의 입장이야 말로 ‘노무현 정신’을 계승, 구현하는 것이다. 그리고 이런 비판을 하는 사람 중 노무현 대통령 생전 노 대통령을 매몰차게 비난했던 분이 있음도 상기하고자 한다."}, {"id": 12, "filename": "2026.2.27 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-02-27", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["사법개혁", "페이스북"], "preview": "2026.2.27 조국 대표 페이스북 메시지  국민은 사법개혁에 저항하는 법원행정처장의 사의에 관심이 없습니다. 조희대 대법원의 대선개입 판결과 여러 납득하기 힘든 판결 등, 사법부는 입법부가 사법개혁을 추진하는 이유부터 성찰해야 할 것입니다. 영미식 배심제도 독일식 참심제도 없어 국민의 사법참여는 불가능하니 사법부는 일체의 변화와 견제를 거부하는 ‘법복귀족’의 성채(城砦)가 되고 말았습니다. 노무현 정부 시절 시작된 사법개혁, 이제는 매듭지어...", "content": "2026.2.27 조국 대표 페이스북 메시지\n\n국민은 사법개혁에 저항하는 법원행정처장의 사의에 관심이 없습니다. 조희대 대법원의 대선개입 판결과 여러 납득하기 힘든 판결 등, 사법부는 입법부가 사법개혁을 추진하는 이유부터 성찰해야 할 것입니다. 영미식 배심제도 독일식 참심제도 없어 국민의 사법참여는 불가능하니 사법부는 일체의 변화와 견제를 거부하는 ‘법복귀족’의 성채(城砦)가 되고 말았습니다.\n노무현 정부 시절 시작된 사법개혁, 이제는 매듭지어야 합니다. 과거 사법농단 사건에서 확인되었듯이, 법원행정처는 대법원장이 인사를 통하여 판사의 판결에 영향을 끼치는 기구입니다. 민주당의 사법개혁 3법에서 빠진 ‘법원행정처 폐지’까지 이루어내야 사법개혁은 완성됩니다."}, {"id": 13, "filename": "2026.2.27 조국혁신당 공보국 알림.txt", "title": "조국혁신당 공보국 알림", "date": "2026-02-27", "category": "기타", "topics": ["정치·선거개혁", "검찰·사법개혁", "조국혁신당"], "tags": ["지방선거"], "preview": "2026.2.27 조국혁신당 공보국 알림  <송영길 전 대표님, ‘우당(友黨)’에 대한 비아냥을 멈추어 주십시오>  송영길 전 대표님의 무죄 판결과 민주당 복당을 축하드립니다. 그러나 법정 밖에서 이어지는 조국혁신당을 향한 비난에 대해서는 깊은 유감의 뜻을 표합니다. 첫째, 조국혁신당은 지난 총선에서 전국적인 지지를 통해  창당과 동시에 원내 제3당이라는 막중한 책임을 부여받았습니다.  다가오는 지방선거에서 조국혁신당이 거론되는 것은 민주진보 ...", "content": "2026.2.27 조국혁신당 공보국 알림\n\n<송영길 전 대표님, ‘우당(友黨)’에 대한 비아냥을 멈추어 주십시오>\n\n송영길 전 대표님의 무죄 판결과 민주당 복당을 축하드립니다. 그러나 법정 밖에서 이어지는 조국혁신당을 향한 비난에 대해서는 깊은 유감의 뜻을 표합니다.\n첫째, 조국혁신당은 지난 총선에서 전국적인 지지를 통해 \n창당과 동시에 원내 제3당이라는 막중한 책임을 부여받았습니다. \n다가오는 지방선거에서 조국혁신당이 거론되는 것은 민주진보 진영의 확장과 혁신적 경쟁을 바라는 국민적 기대 때문입니다. \n조국혁신당은 부산도 갔고, 대전도 갔습니다.\n혁신당이 가야 할 길은 오직 국민의 명령에 따라 스스로 결정할 것입니다.\n둘째, 송 전 대표님은 지난 총선 당시, 변희재·최대집 등 \n극우 인사들과 손잡고 당을 만드셨던 선택을 국민은 기억합니다. \n심지어 국정농단의 주범인 최순실 사면까지 주장하셨습니다.\n정치적 과오로 말한다면, 충분히 지적될만한 부분입니다.\n필요를 위해 저들과의 연대조차 마다하지 않았으면서, \n왜 검찰 독재에 맞서 함께 싸웠던 우당 조국혁신당에 대해서는 \n날 선 비난과 공격을 퍼붓는지 묻고 싶습니다.\n셋째, 노무현 정신은 남을 비판하기 위한 무기가 아니라\n정치인 본인의 정치적 행보를 비추어볼 잣대입니다. \n과거 송 전 대표께서도 노무현 대통령 재임 시에 \n“누가 대통령 하라고 했느냐”고 강력히 비판한 바 있습니다.\n결국 노 대통령 서거 후 반성문을 쓰셨습니다.\n상황에 따라 표변하기보다 더 진중한 정치를 기대합니다.\n비아냥은 정치를 가볍게 만들 뿐입니다. \n조국혁신당은 오직 국민만 바라보며 검찰 독재 종식과 \n사회권 선진국의 길을 묵묵히 가겠습니다. \n송 전 대표께서도 부디 소모적인 비난을 멈추고, \n시대적 과제를 완수하는 여정에 함께해주시길 기대합니다.\n2026년 2월 27일\n조국혁신당 대변인 박찬규"}, {"id": 14, "filename": "2026.2.26 제33차 최고위원회의 모두발언.txt", "title": "제33차 최고위원회의 모두발언", "date": "2026-02-26", "category": "최고위원회", "topics": ["정치·선거개혁", "조국혁신당", "인권·사회", "민생·경제"], "tags": ["교육", "최고위", "민생", "의료"], "preview": "2026.2.26 제33차 최고위원회의 모두발언  안녕하십니까, 조국혁신당 대표 조국입니다.  코스피 6,000 시대가 열렸습니다.  한국 증시 시가 총액이 독일에 이어 프랑스까지 뛰어 넘으면서  세계 9위까지 올라섰습니다. 국민과 기업이 더 큰 희망을 갖게 됐습니다.   조국혁신당은 우리 경제의 견고한 성장을 뒷받침하는 동시에,  그 성장의 과실이 국민 모두에게  골고루 나누어지는 일에 집중하겠습니다.  불평등을 해소해야 더 큰 성장이 가능하...", "content": "2026.2.26 제33차 최고위원회의 모두발언\n\n안녕하십니까, 조국혁신당 대표 조국입니다.\n\n코스피 6,000 시대가 열렸습니다. \n한국 증시 시가 총액이 독일에 이어 프랑스까지 뛰어 넘으면서 \n세계 9위까지 올라섰습니다.\n국민과 기업이 더 큰 희망을 갖게 됐습니다. \n\n조국혁신당은 우리 경제의 견고한 성장을 뒷받침하는 동시에, \n그 성장의 과실이 국민 모두에게 \n골고루 나누어지는 일에 집중하겠습니다.\n\n불평등을 해소해야 더 큰 성장이 가능하기 때문입니다. \n내수가 커져야 기업의 이익이 커지고, \n기업의 투자와 일자리가 늘어나면서 \n청년과 국민의 구매력이 탄탄해질 것입니다. \n그것이 코스피의 질적 성장을 이끄는 길입니다. \n\n그런데 지금, 우리나라의 소득불평등 지수가 \n위험 수위를 넘어섰습니다.\n\n‘옥스팜 코리아’ 보고서에 따르면, \n대한민국은 대표적인 불평등 국가로 달려가고 있습니다. \n\n코스피 성장에 가려진 \n우리 경제의 그늘에 각별한 대응이 필요한 시점입니다.\n\n특히 교육은 더 이상 공정한 출발선이 아닙니다.\n‘옥스팜 코리아’ 보고서에서 의대와 최상위권 대학에 가는 학생 가구 소득은\n대학 미진학 가구보다 거의 2배 많았습니다.\n개인 소득 최상위 0.1% 평균 한 해 소득은 14억 2,000만 원,\n하위 50% 노동자 평균 소득은 858만 원입니다.\n하위 50% 노동자가 상위 0.1% 연봉을 벌려면 165년을 일해야 합니다.\n\n격차가 커지면 국가는 아래를 두텁게 받쳐야 할 것입니다.\n현실은 그렇지 못합니다.\nOECD 보고서에서 2022년 대한민국 공공 사회 지출 비중은\nGDP 대비 15.3%입니다.\nOECD 평균은 21.2%입니다.\n\n이제, 방향을 바꿔야 합니다.\n조국혁신당의 제안은 ‘사회권 선진국’입니다.\n아프면 치료받고, 빚 때문에 삶이 끝나지 않고,\n일하는 만큼 내일이 보이고, 성실하게 저축하고 투자해 재산을 늘리고,\n성장의 과실이 소수가 아니라 모두에게 균형 있게 닿는 나라,\n이것이 ‘사회권 선진국’입니다.\n\n이를 위해 공공사회지출을 과감히 끌어올려야 합니다.\n계속 ‘저부담-저복지’에 머물러서는 안 됩니다.\n우선은 OECD 평균치를 목표로 올려야 합니다.\n‘중부담-중복지’까지 가야 합니다.\n현재보다 5.7% 포인트 높은 21.9%가 되면\n스웨덴 정도의 복지가 가능하다는 ‘옥스팜 코리아’의 연구도 있습니다.\n대한민국 국력은 이미 그 정도를 감당할 수 있습니다.\n\n그리고 급한 불 꺼야 합니다.\n빚으로 무너지기 직전의 가계가 버틸 수 있게 해야 합니다.\n40·50대 가장이 쓰러지기 전에, 청년 빚이 장기 연체로 굳어지기 전에\n국가가 먼저 잡아야 합니다.\n상환능력에 맞춘 채무조정, 이자 부담 경감, 신용 회복이\n한 묶음으로 이뤄져야 합니다.\n\n이를 뒷받침할 ‘사회투자 골든 룰’ 재정 원칙이 필요합니다. \n의료·돌봄·교육·주거, 그리고 청년·지역에 들어가는 돈은 \n경기가 나쁠 때 먼저 깎아야 할 ‘비용’이 아닙니다.\n지금 적절하게 투자하면 나중에 큰 성과를 내는 미래형 투자입니다.\n저는 지속적으로 매년 GDP의 1.5%를 사회투자 영역에\n안정적으로 투입하자는 제안을 해왔습니다.\n사람에 대한 투자를 국가 운영의 기본 원칙으로 세워야 합니다.\n\n그리고, 국민의힘에 묻습니다.\n국민을 살릴 법과 제도의 발목을 잡는 필리버스터는 도대체 언제까지 계속할 겁니까?\n국민의힘의 ‘웰빙 정치 놀음’에 국민의 신음과 분노는 더 커지고 있습니다.\n이제 그만하십시오.      /끝"}, {"id": 15, "filename": "2026.2.26 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-26", "category": "페이스북 메시지", "topics": ["기타"], "tags": ["페이스북"], "preview": "2026.2.26 조국 대표 페이스북 메시지  코스피 6000 돌파는 엄청난 일이다. 이로서 한국 증시 시가 총액이 독일과 프랑스를 제쳤다.  이재명 정부의 “머니 무브”(money move) 정책이 제대로 먹히고 있다. 이 기조 계속 유지하면서, 코스피 6000의 그늘인 소득과 자산의 양극화를 해소하는 정책을 병행해야 한다.", "content": "2026.2.26 조국 대표 페이스북 메시지\n\n코스피 6000 돌파는 엄청난 일이다. 이로서 한국 증시 시가 총액이 독일과 프랑스를 제쳤다.  이재명 정부의 “머니 무브”(money move) 정책이 제대로 먹히고 있다. 이 기조 계속 유지하면서, 코스피 6000의 그늘인 소득과 자산의 양극화를 해소하는 정책을 병행해야 한다."}, {"id": 16, "filename": "2026.2.25 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-25", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "페이스북"], "preview": "2026.2.25 조국 대표 페이스북 메시지  내가 '법왜곡죄' 신설을 찬성함은 다시 말할 필요가 없을 것이다.  그런데 법사위를 통과한 법왜곡죄 조문 중 \"법령을 의도적으로 잘못 적용하여 당사자의 일방을 유리 또는 불리하게 만드는 경우\"는 본회의 상정 전 수정하거나 삭제할 필요가 있다.  예컨대, 이 조문이 그대로 유지된다면, 민사건 형사건 하급심 법원이 기존의 대법원 판례에 도전하는 판결을 내리는 경우--이런 경우 종종 발생하고 이를 계기로...", "content": "2026.2.25 조국 대표 페이스북 메시지\n\n내가 '법왜곡죄' 신설을 찬성함은 다시 말할 필요가 없을 것이다. \n그런데 법사위를 통과한 법왜곡죄 조문 중 \"법령을 의도적으로 잘못 적용하여 당사자의 일방을 유리 또는 불리하게 만드는 경우\"는 본회의 상정 전 수정하거나 삭제할 필요가 있다. \n예컨대, 이 조문이 그대로 유지된다면, 민사건 형사건 하급심 법원이 기존의 대법원 판례에 도전하는 판결을 내리는 경우--이런 경우 종종 발생하고 이를 계기로 대법원 판결에 변경되기도 한다--, 이 판결을 내린 판사에 대한 고발과 수사가 이루어질 수 있다. 과거 내란전담재판부법 초안에 들어있던 위헌 요소가 삭제된 후 통과되었듯이, 이번 법안도 잘 정리되길 바란다."}, {"id": 17, "filename": "2026.2.25 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-02-25", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "페이스북"], "preview": "2026.2.25 조국 대표 페이스북 메시지  내가 '법왜곡죄' 신설을 찬성함은 다시 말할 필요가 없을 것이다.  그런데 법사위를 통과한 법왜곡죄 조문 중 \"법령을 의도적으로 잘못 적용하여 당사자의 일방을 유리 또는 불리하게 만드는 경우\"는 본회의 상정 전 수정하거나 삭제할 필요가 있다.  예컨대, 이 조문이 그대로 유지된다면, 민사건 형사건 하급심 법원이 기존의 대법원 판례에 도전하는 판결을 내리는 경우--이런 경우 종종 발생하고 이를 계기로...", "content": "2026.2.25 조국 대표 페이스북 메시지\n\n내가 '법왜곡죄' 신설을 찬성함은 다시 말할 필요가 없을 것이다. \n그런데 법사위를 통과한 법왜곡죄 조문 중 \"법령을 의도적으로 잘못 적용하여 당사자의 일방을 유리 또는 불리하게 만드는 경우\"는 본회의 상정 전 수정하거나 삭제할 필요가 있다. \n예컨대, 이 조문이 그대로 유지된다면, 민사건 형사건 하급심 법원이 기존의 대법원 판례에 도전하는 판결을 내리는 경우--이런 경우 종종 발생하고 이를 계기로 대법원 판결에 변경되기도 한다--, 이 판결을 내린 판사에 대한 고발과 수사가 이루어질 수 있다. 과거 내란전담재판부법 초안에 들어있던 위헌 요소가 삭제된 후 통과되었듯이, 이번 법안도 잘 정리되길 바란다."}, {"id": 18, "filename": "2026.2.25 5.18정신 헌법전문수록 개헌 촉구 국민 결의.txt", "title": "5.18정신 헌법전문수록 개헌 촉구 국민 결의", "date": "2026-02-25", "category": "결의문·성명", "topics": ["정치·선거개혁", "인권·사회", "내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["5.18", "윤석열", "지방선거", "내란", "개헌"], "preview": "2026.2.25 5.18정신 헌법전문수록 개헌 촉구 국민 결의대회   광주, 전남, 그리고 전국에서 오신 오월 가족 여러분  조국혁신당 대표 조국입니다.  다들 아시겠지만 5.18은 대한민국 민주주의의 상징입니다. 저는 부산 사람이지만 5.18에서 민주주의를 배우고 익혔습니다. 그점에서 5.18은 광주 지역만의 것이 아닙니다.  광주는 물론이고 경상도, 충청도, 경기도, 강원도,  모든 대한민국 지역의 정신이 바로 5.18 아닙니까?  또한,...", "content": "2026.2.25 5.18정신 헌법전문수록 개헌 촉구 국민 결의대회 \n\n광주, 전남, 그리고 전국에서 오신 오월 가족 여러분 \n조국혁신당 대표 조국입니다.\n\n다들 아시겠지만 5.18은 대한민국 민주주의의 상징입니다.\n저는 부산 사람이지만 5.18에서 민주주의를 배우고 익혔습니다.\n그점에서 5.18은 광주 지역만의 것이 아닙니다.\n\n광주는 물론이고 경상도, 충청도, 경기도, 강원도, \n모든 대한민국 지역의 정신이 바로 5.18 아닙니까?\n\n또한, 5.18은 대한민국만의 것이 아닙니다. \n5.18은 전 세계 국민들이 따르고 배워야 할 정신 아니겠습니까?\n그럼에도 불구하고 5.18은 대한민국 헌법 전문에 들어 있지 않습니다.\n\n이 모두 정치의 잘못입니다. \n오랫동안 많은 국민이 5.18이 헌법 정신에 \n자리 잡길 원해 왔지만 정치가 태만했던 탓입니다.\n\n그렇지만 천만다행으로 이틀 전 2월 23일,\n이제 문이 열리기 시작했습니다.\n국민투표법이 개정되었습니다. \n우원식 국회의장님께서 약속하셨듯이 \n3월 1일 본회의에 국민투표법이 통과되면 \n개헌의 문이 열리는 것입니다.\n\n개헌의 문이 열리면 가장 먼저 해야 될 일은 \n5.18을 헌법 전문에 넣는 것입니다.\n5.18은 대한민국 민주주의의 핵심입니다. \n5.18시민 정신과 대동정신은 지금까지 살아 움직이고 있습니다.\n5.18이 없었다면 지난 12월 3일, \n윤석열 일당의 내란을 우리가 이겨낼 수 있었겠습니까?\n\n5.18이 있었기에 5.18 정신이 있었기에 \n우리는 12.3을 이겨낼 수 있었습니다.\n\n5.18은 민주주의를 지켜내기 위해 싸우고 희생했던 \n국민을 기리는 정신입니다.\n5.18을 우리 마음속에 기리고 보관할 뿐만 아니라 \n헌법에 새길 때 두고 두고 다음 세대, \n그다음 세대까지 우리의 민주주의는 영구히 보존될 것입니다.\n\n5.18이 헌법 전문에 없다 보니까 어떤 일이 생기고 있습니까?\n지금도 정신 나간 극우 세력들은 5.18을 폄훼하고 있습니다.\n\n여기 계신 5.18 가족분들 \n5.18을 폄훼하는 플랜카드 문자들을 볼 때 마음이 어떠십니까?\n속이 쓰리고 화가 나시지요. \n5.18 정신이 헌법에 들어가야 \n그런 반인권적이고 무도한 그런 행태를 금지시킬 수 있을 것입니다.\n\n존경하는 국민 여러분, \n다가오는 6월 3일 지방선거에 \n도지사 뽑고, 시장 뽑고, 군수 뽑고, 시의원 뽑는 것 외에 \n투표지 한 장이 더 있어야 합니다.\n\n그것이 무엇이냐, 5.18이 헌법 전문에 들어가는 \n개헌안에 대한 국민 투표 용지 하나가 더 있어야 합니다.\n\n조국혁신당은 민주당, 진보당, 기본소득당, 사회민주당과 함께 \n힘을 합쳐 6월 3일 지방선거 투표 외에 \n원포인트 개헌 투표 용지가 하나 더 있도록 모든 노력을 다하겠습니다.\n\n만약 우리가 6월 3일 원포인트 개헌을 이루어낸다면 \n다시 힘을 합쳐서 더 많은 논의를 하고 \n더 연구를 해서 2028년 총선 때는 이제 더 큰 개헌, \n더 심도 있는 개헌을 할 수 있을 것입니다.\n\n여러분, 국민 투표 한 번 하는데 얼마 드는지 아십니까?\n\n3000억 원 이상 든다는 추산(국회 예정처 3092억 원)이 있습니다.\n\n이번 6월 3일에 선거를 같이 하면 그 삼천억 원이 들지 않습니다.\n\n별도의 국민투표를 통해서 삼천억을 써야겠습니까?\n전혀 아닙니다. \n이번 6월 3일, 반드시 5.18 정신을 헌법 전문에 넣으면 \n그걸 6월 3일 지방선거와 같이 투표를 해서 \n헌법 정신에 5.18이 들어간다는 것 외에 \n별도의 투표가 필요 없으므로, \n삼천억 원이라는 국민의 예산을 절감할 수 있습니다.\n\n이 점 꼭 알려주십시오. \n5.18 정신이 헌법 전문에 들어갈 때 \n망월동에 잠드신 영령들은 이제 영원한 안식을 누리실 것입니다.\n여기 계신 오월 가족 모두 마음에 맺힌 한이 풀리실 것입니다.\n\n그리고 나아가 여기 계신 모든 분이 세상을 떠나고 난 뒤에도 \n우리의 자식들, 우리의 다음 세대들, \n그들이 5.18을 영원히 교과서에서 배우게 될 것입니다.\n\n우리가 죽고 난 뒤에도 우리의 다음 세대, 그다음 세대도 \n5.18이야말로 우리 민주주의의 정신이고 \n대한민국의 근간을 이루는 정신이라는 걸 잊지 않게 되고 배울 것입니다.\n이런 모습 보고 싶지 않으십니까?\n\n조국혁신당은 비록 작은 정당이지만 \n5.18을 헌법 전문에 넣기 위해서 최선을 다하겠습니다."}, {"id": 19, "filename": "2026.2.24 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-24", "category": "페이스북 메시지", "topics": ["내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "사법개혁", "페이스북"], "preview": "2026.2.24 조국 대표 페이스북 메시지  촛불행동 김민웅 대표께서 정청래 대표와 나를 지목하면서 왜 조희대 탄핵에 나서지 않냐고 비판하신다. 조국혁신당은 작년 10월 17일 이미 조희대 탄핵소추안을 공개한 바 있는 바, 왜 이런 비판을 나에게 가하시는지 이해하기 어렵다. 이하 기사를 참조하시길 바란다. https://naver.me/52cxxuIp 이와 별도로 김 대표님은 나와 조국혁신당의 위헌성 지적으로 수정되어 현재의 내란전담재판부가 ...", "content": "2026.2.24 조국 대표 페이스북 메시지\n\n촛불행동 김민웅 대표께서 정청래 대표와 나를 지목하면서 왜 조희대 탄핵에 나서지 않냐고 비판하신다. 조국혁신당은 작년 10월 17일 이미 조희대 탄핵소추안을 공개한 바 있는 바, 왜 이런 비판을 나에게 가하시는지 이해하기 어렵다. 이하 기사를 참조하시길 바란다.\nhttps://naver.me/52cxxuIp\n이와 별도로 김 대표님은 나와 조국혁신당의 위헌성 지적으로 수정되어 현재의 내란전담재판부가 만들어졌는데, 여전히 수정 전 법안이 옳다고 판단하시면서 법안 수정을 주도한 조국혁신당을 계속 비판하고 계신다. 입장 존중하지만, 위헌성 문제는 조국혁신당만이 아니라 민변 등 진보적 시민사회단체에서도 지적한 것인 바, 추가적 설명은 하지 않도록 하겠다."}, {"id": 20, "filename": "2026.2.24 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-02-24", "category": "페이스북 메시지", "topics": ["정치·선거개혁"], "tags": ["페이스북"], "preview": "2026.2.24 조국 대표 페이스북 메시지2  반복하건대, 국민주권정부 성공을 위해 ‘올드’건 ‘뉴’건 같이 가야 한다. 그러나 자신의 정치적 이익과 목적을 위해 갈라치기나 뺄셈 정치를 하려는 자들과는 싸워야 한다. 도대체 집권 1년 차에 무슨 일을 벌이고 있는 것인가. 국민의힘이 자멸로 가고 있으니 긴장감은 떨어지고 권력욕망은 커지고 있다.", "content": "2026.2.24 조국 대표 페이스북 메시지2\n\n반복하건대, 국민주권정부 성공을 위해 ‘올드’건 ‘뉴’건 같이 가야 한다. 그러나 자신의 정치적 이익과 목적을 위해 갈라치기나 뺄셈 정치를 하려는 자들과는 싸워야 한다. 도대체 집권 1년 차에 무슨 일을 벌이고 있는 것인가. 국민의힘이 자멸로 가고 있으니 긴장감은 떨어지고 권력욕망은 커지고 있다."}, {"id": 21, "filename": "2026.2.24 조국 대표 페이스북 메시지3.txt", "title": "조국 대표 페이스북 메시지3", "date": "2026-02-24", "category": "페이스북 메시지", "topics": ["검찰·사법개혁", "조국혁신당", "민생·경제"], "tags": ["페이스북"], "preview": "2026.2.24 조국 대표 페이스북 메시지3  1. 독일 형법 제 339조[법왜곡죄]: 법관, 기타 공직자 또는 중재인이 법률사건을 지휘하거나 재판함에 있어서 당사자 일방을 유리하거나 불리하게 법을 왜곡한 경우에는 l년 이상 5년 이하의 자유형에 처한다. 2. 법사위 통과 한국 형법 법왜곡죄:  형법 제123조의2(법왜곡) 법관, 검사 또는 범죄수사에 관한 직무를 수행하는 자가 타인에게 위법 또는 부당하게 이익을 주거나 권익을 해할 목적으로 ...", "content": "2026.2.24 조국 대표 페이스북 메시지3\n\n1. 독일 형법 제 339조[법왜곡죄]: 법관, 기타 공직자 또는 중재인이 법률사건을 지휘하거나 재판함에 있어서 당사자 일방을 유리하거나 불리하게 법을 왜곡한 경우에는 l년 이상 5년 이하의 자유형에 처한다.\n2. 법사위 통과 한국 형법 법왜곡죄: \n형법 제123조의2(법왜곡) 법관, 검사 또는 범죄수사에 관한 직무를 수행하는 자가 타인에게 위법 또는 부당하게 이익을 주거나 권익을 해할 목적으로 재판 또는 수사 중인 사건에 관하여 다음 각 호의 어느 하나에 해당하는 행위를 한 경우에는 10년 이하의 징역과 10년 이하의 자격정지에 처한다.\n  1. 법령을 의도적으로 잘못 적용하여 당사자의 일방을 유리 또는 불리하게 만드는 경우\n  2. 사건에 관한 증거를 인멸, 은닉, 위조 또는 변조하거나 위조 또는 변조된 증거를 그 정을 알면서 재판 또는 수사에 사용한 경우\n  3. 폭행, 협박, 위계, 그 밖의 방법으로 위법하게 증거를 수집하거나, 증거 없이 범죄사실을 인정하거나 또는 논리나 경험칙에 현저히 반하여 사실을 인정한 경우"}, {"id": 22, "filename": "2026.02.23 제32차 최고위원회의 모두 발언.txt", "title": "제32차 최고위원회의 모두 발언", "date": "2026-02-23", "category": "최고위원회", "topics": ["정치·선거개혁", "내란·윤석열", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["최고위", "지방선거", "내란", "교육", "개헌"], "preview": "2026.02.23 제32차 최고위원회의 모두 발언  조국혁신당 대표 조국입니다. 오늘은 제9회 동시지방선거일의 D-100일입니다. 나라의 새로운 장을 여는 주요 선거를 ‘주춧돌 선거’라고 합니다. 이번 지방선거야말로 대한민국 ‘주춧돌 선거’입니다.  조국혁신당은 ‘국민주권정부 승리 선거, 국힘 심판 선거, 정치개혁 선거’로 규정합니다. 우선, 이번 선거는 국민주권 정부의 성공을 뒷받침하는 선거여야 합니다. 국민주권 정부의 국정 철학이 전국 곳...", "content": "2026.02.23 제32차 최고위원회의 모두 발언\n\n조국혁신당 대표 조국입니다.\n오늘은 제9회 동시지방선거일의 D-100일입니다.\n나라의 새로운 장을 여는 주요 선거를 ‘주춧돌 선거’라고 합니다.\n이번 지방선거야말로 대한민국 ‘주춧돌 선거’입니다.\n\n조국혁신당은 ‘국민주권정부 승리 선거, 국힘 심판 선거, 정치개혁 선거’로 규정합니다.\n우선, 이번 선거는 국민주권 정부의 성공을 뒷받침하는 선거여야 합니다.\n국민주권 정부의 국정 철학이 전국 곳곳에서 실현되어,\n완전히 새로운 대한민국으로 가는 문을 활짝 열어야 합니다.\n\n또, 헌법 파괴 세력인 국민의힘을 심판하는 선거여야 합니다.\n국민의힘은 여전히 내란을 옹호하고, 반헌법적 망언을 일삼고 있습니다.\n이런 세력이 지방정부와 의회를 차지하도록 놔둘 수 없습니다.\n내란 잔당을 지역 정치에서 완전히 퇴출해야 합니다.\n그렇지 않으면, 이자들은 부활을 시도하며 대한민국을 진창으로 만들 것입니다.\n\n그리고, 지역 정치를 바꾸는 정치개혁 선거여야 합니다.\n지금 지역 정치는 국민의 기대에 미치지 못합니다.\n지역민 뜻을 정치에 제대로 반영해야 합니다.\n‘묻지마 공천, 무능한 행정, 부패한 의회’는 양당 카르텔의 결과물입니다.\n특히 지방의회는 중앙정치의 하수인이라는 비판에서 자유롭지 않습니다.\n바꿔야 합니다.\n지역민이 뽑아준 효능감을 느낄 지역 정치로 전면재편해야 합니다.\n\n조국혁신당은 선거를 앞두고 무거운 책임을 느낍니다.\n혁신의 주춧돌을 놓는다는 각오로 세 가지를 약속합니다.\n\n첫째, ‘내란 극우 심판 연합’을 주도하겠습니다.\n“국민의힘 소속 후보가 광역단체장으로 당선되는 일은 없다”라고 선언합니다.\n민주당 및 개혁 진보 야당, 시민사회 세력을 결집한\n‘새로운 다수 연합’을 만들겠습니다.\n전국 곳곳에서 몇 퍼센트, 몇천 표 차이로 승패가 갈립니다.\n연합과 연대가 절실합니다.\n1대1 구도를 넘어서는 ‘강력한 다수 연합’을 형성하겠습니다.\n\n둘째, 비전과 가치, 인물로 승리하겠습니다.\n내란 세력은 생존을 위해 가장 질 낮은 선거로 몰아갈 것입니다.\n터무니없는 정쟁과 가짜뉴스, 무작정 세몰이 등이 휘몰아칠 것입니다.\n조국혁신당은 부화뇌동하지 않을 것입니다.\n진흙탕 싸움에는 단호하게 대처하되,\n사회권 선진국의 비전과 가치, 이를 대표할 인물을 내세울 것입니다.\n이 인재들이 주거권, 돌봄권, 교육권, 건강권 등 사회권을\n지방정부 차원에서 실현할 조례와 정책을 지역민께 제시하겠습니다.\n\n셋째, 대한민국 지방혁신 모델을 전국으로 확산하겠습니다.\n조국혁신당의 첫 단체장은 전남 담양군수입니다.\n대통령 소속 농어업·농어촌특별위원회의 ‘2025 농어촌 삶의 질 지수'에서\n담양군은 전남 1위를 차지했습니다.\n지역 전문가가 중앙 눈치 보지 않고, 오로지 군민만 받든 결과입니다.\n조국혁신당 지방자치단체장들은 제2, 제3, 제4의 담양군수가 될 것입니다.\n호남과 영남, 수도권 등 곳곳에서 창조적 파괴를 일으킬 것입니다.\n\n마지막으로, 지방선거를 앞두고 민주당에 요구합니다.\n지방선거 때 ‘지방분권 개헌’을 위한 국민투표를 동시 실시합시다.\n이는 지방자치제도의 근본 틀을 바꾸는 지렛대가 될 것입니다.\n민주개혁진영과 국민을 하나로 묶는 ‘개헌 연대’의 아교 역할을 할 것입니다.\n앞으로 100일, \n조국혁신당은 내란을 극복하고 국헌을 수호한,\n민주주의를 지킨 국민이 승리하는 지방선거를 만들기 위해 끝까지 가겠습니다.     /끝/"}, {"id": 23, "filename": "2026.02.23 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-23", "category": "페이스북 메시지", "topics": ["조국혁신당", "개헌·민주주의", "민생·경제"], "tags": ["페이스북", "민생", "부동산"], "preview": "2026.02.23 조국 대표 페이스북 메시지  \"중산층이 살만한 양질의 2,30평대 중형 임대주택을 역세권에 공급해 전월세 수요를 흡수할 예정.\" 조국혁신당이 일관되게 주장한 바와 정확히 일치한다. 양질의 공공임대주택을 대대적으로 공급해야 서민과 청년의 주거비 부담이 줄고 가처분소득이 늘며, 이래야 서민과 청년이 자가주택을 소유할 수 있는 시간이 당겨진다. 이러한 정책이야 말로 '진짜 주거사다리'다.  이에 더하여 용산공원 둘레에 대규모 공공...", "content": "2026.02.23 조국 대표 페이스북 메시지\n\n\"중산층이 살만한 양질의 2,30평대 중형 임대주택을 역세권에 공급해 전월세 수요를 흡수할 예정.\" 조국혁신당이 일관되게 주장한 바와 정확히 일치한다. 양질의 공공임대주택을 대대적으로 공급해야 서민과 청년의 주거비 부담이 줄고 가처분소득이 늘며, 이래야 서민과 청년이 자가주택을 소유할 수 있는 시간이 당겨진다. 이러한 정책이야 말로 '진짜 주거사다리'다. \n이에 더하여 용산공원 둘레에 대규모 공공임대주택을 짓자는 나의 제안을 수용해주길 희망한다. 이는 부동산 공화국을 막겠다는 정부의 의지를 가장 선명히 밝히는 상징적 조치가 될 것이다."}, {"id": 24, "filename": "2026.2.23 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-23", "category": "페이스북 메시지", "topics": ["검찰·사법개혁", "개헌·민주주의"], "tags": ["사법개혁", "페이스북"], "preview": "2026.2.23 조국 대표 페이스북 메시지  오늘 조희대 대법원장이 직접 나서 우리 헌법은 독일 헌법과 다르다면서 재판소원은 안된다고 주장했다. 대법원의 판결이 헌법재판소에 의해 검토받을 수 있다는 것 자체가 싫은 것이다. 우리나라는 배심제나 참심제도 없으니 시민에 의한 통제도 없고, 재판소원도 없으니 헌법재판소의 통제도 없다. 어느 조직이건 외부 통제를 싫어한다. 종래 대법관들은 헌법재판관들을 대법관으로 발탁되지 못해 헌법재판관이 된 사람 ...", "content": "2026.2.23 조국 대표 페이스북 메시지\n\n오늘 조희대 대법원장이 직접 나서 우리 헌법은 독일 헌법과 다르다면서 재판소원은 안된다고 주장했다. 대법원의 판결이 헌법재판소에 의해 검토받을 수 있다는 것 자체가 싫은 것이다. 우리나라는 배심제나 참심제도 없으니 시민에 의한 통제도 없고, 재판소원도 없으니 헌법재판소의 통제도 없다. 어느 조직이건 외부 통제를 싫어한다. 종래 대법관들은 헌법재판관들을 대법관으로 발탁되지 못해 헌법재판관이 된 사람 정도로 인식해왔던 바, 이런 우월의식의 발현이기도 하다.\n그런데 위헌 여부를 판단하는 헌법재판소는 일관되게 재판소원이 필요하다는 입장을 밝혀왔다. 즉, 국회가 재판소원을 도입하더라도 위헌이 될 가능성은 0이라는 말이다. 그리고 독일에서 헌법을 공부하고 온 학자 대다수는 재판소원이 필요하다는 입장이다. 요컨대, 국회는 주저하지 말고 본회의 표결에 들어가야 한다."}, {"id": 25, "filename": "2026.2.23 조국혁신당 기자회견.txt", "title": "조국혁신당 기자회견", "date": "2026-02-23", "category": "기자회견·간담회", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "지방선거", "기자회견", "윤석열"], "preview": "2026.2.23 조국혁신당 기자회견   [국민의힘 정당해산 진정 관련 조국혁신당 기자회견]   6월 지방선거 실시 전 국민의힘의 정당해산이 결정되어야 합니다! 윤석열은 헌법재판소에 의해 대통령직에서 파면되고,  법원에 의해 내란 우두머리로 인정되어 무기징역형을 선고받았습니다.  대한민국 헌정사에서 다시는 반복되어선 안 될  내란 행위가 단죄를 받은 것입니다. 그런데 국민의힘 장동혁대표는 판결이 선고된 바로 다음날,  “판결문 곳곳에 남아 있는...", "content": "2026.2.23 조국혁신당 기자회견 \n\n[국민의힘 정당해산 진정 관련 조국혁신당 기자회견] \n\n6월 지방선거 실시 전\n국민의힘의 정당해산이 결정되어야 합니다!\n윤석열은 헌법재판소에 의해 대통령직에서 파면되고, \n법원에 의해 내란 우두머리로 인정되어 무기징역형을 선고받았습니다. \n대한민국 헌정사에서 다시는 반복되어선 안 될 \n내란 행위가 단죄를 받은 것입니다.\n그런데 국민의힘 장동혁대표는 판결이 선고된 바로 다음날, \n“판결문 곳곳에 남아 있는 판사의 양심의 흔적”과 \n무죄추정의 원칙을 운운하며 윤석열을 옹호했습니다. \n국회 다수당인 민주당과 이재명 대통령이 \n실질적인 내란행위를 하고 있다는 황당한 궤변까지 덧붙였습니다.\n이러한 내란 옹호 발언은 일부 당원의 실언이 아니라, \n12. 3 비상계엄 선포 직후부터 시작되었으며, \n현재에는 사법부가 내란행위의 위헌, 위법성을 선고하고 있음에도 \n당 대표에 의해 공식화되었습니다. \n이는 국민의힘이라는 정당의 목적과 활동 자체가 \n이미 헌법의 테두리를 벗어나 ‘윤석열 내란 세력의 정치적 보루'로 \n변질되었음을 명백히 보여주고 있습니다. \n사법부가 윤석열의 내란행위를 무기징역으로 단죄하였음에도, \n헌법 가치를 수호해야 할 정당이 도리어 이를 옹호하는 것은 \n제2, 제3의 내란이 발생할 수 있는 정치적 토양을 제공하는 행위입니다.\n당내 소장파의 쇄신 요구가 지도부에 의해 묵살되고, \n사법부의 판결조차 정치적 선동으로 치부되는 상황에서, \n국민의힘이 스스로 민주적 질서를 회복할 가능성은 전무합니다. \n특히, 한국사회의 고질적 병폐인 지역주의를 볼모로 \n국민의힘이 내란행위를 옹호하는 정당으로 잔존하는 것은, \n투표 기반의 민주주의 제도로 시정하기 어려운 \n위헌적 상태를 영속시키는 결과를 초래합니다. \n2014년 해산 결정된 통합진보당의 경우 \n내란의 예비단계조차 인정되지 않았으며, \n단지 내란을 선동한 행위를 옹호한 것만으로 해산 결정을 내렸습니다. \n반면 윤석열의 경우는 실제 군 병력이 동원되어 국회를 점거하려 했던\n '실행된 내란'입니다. \n이를 비호하는 거대 정당의 존재는 향후 유사한 반헌법적 사태 발생 시 \n정치적 정당성을 부여하는 근거가 될 것이며, \n우리 민주주의 체제에 대한 가장 직접적이고 실질적인 위협입니다. \n극우정당이 의회 내 소수 세력인 외국의 정치지형과 달리, \n국민의힘은 윤석열의 내란행위 당시 여당이었으며, \n지금도 대한민국의 제1야당으로서 실질적인 집권 가능성을 내포하고 있습니다. \n특히 지난 20일 장동혁 국민의힘 대표의 기자회견은, \n‘정당한 사법부가 구성될 때 다시 심판을 받겠다’면서, \n사법부를 부정한 윤석열의 입장발표와 함께 \n대한민국 민주주의에 대한 거대한 위협으로 잔존하고 있습니다. \n선거만으로 이 위헌적 상황을 해소할 수 없다면, \n대한민국의 헌법이 정한 민주주의의 방어 제도가 실행되어야 합니다. \n이에 조국혁신당은 대한민국 정부가 \n국민의힘에 대한 정당해산심판을 청구할 것을 촉구하며, \n지난해 7월 15일 제출한 진정서에 이은 보충의견서를 제출합니다. \n정부는 ‘내란을 옹호하는 정당에게도 여전히 투표할 수 있다’는 \n민주주의 혼란을 신속히 종식해 주시기 바랍니다. \n2026. 2. 23.\n조국혁신당"}, {"id": 26, "filename": "2026.02.22 조국 대표 페이스북 메시지 및 명창환 입당 기자회견문.txt", "title": "조국 대표 페이스북 메시지 및 명창환 입당 기자회견문", "date": "2026-02-22", "category": "페이스북 메시지", "topics": ["조국혁신당", "민생·경제"], "tags": ["기자회견", "페이스북"], "preview": "2026.02.22 조국 대표 페이스북 메시지 및 명창환 전 부지사 입당 환영 기자회견  제가 인재영입위원장으로 직접 영입한 명창환 전 전라남도 행정부지사 입당식. 여수 경제의 위기를 해결할 수 있는 최적임자입니다. 저와 명 후보를 뜨겁게 환영해주신 여수 시민 여러분, 감사합니다. 지역을 새롭게, 조국혁신당이 뛰겠습니다. ==== [명창환 전 전라남도 행정부지사 입당 환영 기자회견] 조국혁신당 대표 조국입니다. 지난 1월 23일 여수산단 방문 ...", "content": "2026.02.22 조국 대표 페이스북 메시지 및 명창환 전 부지사 입당 환영 기자회견\n\n제가 인재영입위원장으로 직접 영입한 명창환 전 전라남도 행정부지사 입당식. 여수 경제의 위기를 해결할 수 있는 최적임자입니다.\n저와 명 후보를 뜨겁게 환영해주신 여수 시민 여러분, 감사합니다. 지역을 새롭게, 조국혁신당이 뛰겠습니다.\n====\n[명창환 전 전라남도 행정부지사 입당 환영 기자회견]\n조국혁신당 대표 조국입니다.\n지난 1월 23일 여수산단 방문 이후 다시 여수를 찾았습니다.\n명창환 전 전라남도 행정부지사님께서 조국혁신당에 합류해 주셨습니다.\n가족이 는다는 것만큼 기쁜 일이 있을까 싶습니다.\n우리 명창환 부지사님은 제가 직접 영입한 인재입니다.\n명성이 높고 중앙에도 잘 알려진 분입니다.\n삶의 현장을 누구보다 잘 아는 지역 전문가,\n어려운 일을 뚫어내고 국민의 삶을 보듬던 행정 전문가,\n한마디로 ‘행정의 달인’입니다. \n그래서 모셨습니다.\n지난 20일에는 중앙당 행정혁신특별위원장 겸 대변인으로 임명했습니다.\n명창환 부지사님은 제1회 지방고등고시로 공직에 들어오셨습니다.\n그리고 지역과 중앙 정부에서 두루 경험을 쌓았습니다.\n전남도와 행정안전부를 오가며 요직을 역임했습니다.\n10.29이태원 참사 피해자 지원단장을 하며 유가족분들을 위로하고 지원했고,\n2023년 전남 행정부지사로, 지명직으로 최고위직까지 올랐습니다.\n명창환 부 지사님께서 퇴임할 때 전남도청은\n“전남의 미래 100년을 준비하는 전략 산업을 선제적으로 육성했다”면서\n“도정 주요 과제에서도 실질적인 성과를 창출했다”고 상찬했습니다.\n우리 명창환 부지사님은 여수와 인연이 깊습니다.\n여수 주삼동장을 필두로, 여수시청 전략기획팀장, 직소민원실장,\n자원봉사센터소장을 거쳐 2014년 순천 부시장이 되셨습니다.\n명 부지사님 어머님께서는 지금 여수 국동에 거주하십니다.\n결혼을 1997년 여수에서 했고, 김광현 전 여수시장님이 주례를 보셨습니다.\n여수에 대한 애정은 누구 못지않다고 확신합니다.\n여수도 지역 붕괴의 덫에서 벗어나지 못하고 있습니다. \n중국산 저가 제품 때문에 석유화학 산단 생산량이 30% 떨어졌습니다.\n하도급업체도 어려워졌고, 노동자들도 유출되고 있습니다.\n유관 업체들은 물론 관광도 어렵습니다.\n여수 구도심도 낙후돼 재개발이 절실합니다.\n난마처럼 얽힌 어려움은 행정만 알아서도, 정치만 잘해서도 안 됩니다.\n지역 현안을 잘 알고 행정과 정치를 모두 잘하며,\n중앙과 지역 사정을 모두 꿰뚫고 있는 인재가 필요합니다.\n아무튼, 누구라도 탐낼 인재인 명창환 부지사님께서\n우리 조국혁신당으로 오셔서 기쁘고 든든합니다.\n다시 한번 명창환 부지사님, 입당을 환영하고 기대가 큽니다.\n감사합니다.\n2026. 2. 22.\n조국 대표 모두발언"}, {"id": 27, "filename": "2026.2.22 조국 대표 페이스북 메시지1.txt", "title": "조국 대표 페이스북 메시지1", "date": "2026-02-22", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "조국혁신당"], "tags": ["합당", "페이스북", "윤석열"], "preview": "2026.2.22 조국 대표 페이스북 메시지1  <내부 갈라치기가 아니라 연대와 단결이 성공한 대통령을 만든다>(2026. 2.22) 1. 합당 제안 국면이 시작된 이후 느닷없이 유시민 등 소중한 민주진보진영 인사를 ‘올드 이재명', 심지어 ‘반명’으로 내치는 프레임을 전파하는 사람들이 등장했다. ‘윤어게인’을 연상하는 ‘문어게인’이라는 용어를 만들어 나와 정청래 대표에게 붙이고 비방한다. 한겨레신문이 분석한 '뉴이재명' 성향의 국민(보수 또는...", "content": "2026.2.22 조국 대표 페이스북 메시지1\n\n<내부 갈라치기가 아니라 연대와 단결이 성공한 대통령을 만든다>(2026. 2.22)\n1.\n합당 제안 국면이 시작된 이후 느닷없이 유시민 등 소중한 민주진보진영 인사를 ‘올드 이재명', 심지어 ‘반명’으로 내치는 프레임을 전파하는 사람들이 등장했다. ‘윤어게인’을 연상하는 ‘문어게인’이라는 용어를 만들어 나와 정청래 대표에게 붙이고 비방한다.\n한겨레신문이 분석한 '뉴이재명' 성향의 국민(보수 또는 중도였으나 대선 후 새로이 이재명 대통령을 지지하는 사람)이 생긴 것은 좋은 일이다. ‘올드’건 ‘뉴’건 서로 소중하게 생각하고 같이 갈 생각을 하는 것이 정치의 정도(正道)다. \n‘올드’라는 부정적 낙인이 찍혔지만, 이들은 흔들림없이 진영과 이재명을 지킨 핵심 지지층이다. 이들은 새로 합류한 ‘뉴'를 환영해야 한다. 동시에 ‘뉴'는 자신들이 합류하기 전 이재명을 지켜준 '올드'에게 감사해야 한다. 이 대통령은 민주당원의 대표임은 물론, 지난 대선에서 후보를 내지 않고 지지했던 조국혁신당원의 대표이며, 대선 후 새롭게 지지하고 있는 중도/보수층의 대표이기도 하다. \n2.\n그런데 이재명 정부 기간 동안 자신의 자리와 이익을 확보하기 위해 민주진보진영 내부를 쪼개는 사람들이 있다. ‘뉴’라는 이름을 내걸고, 진영을 지켜온 핵심 지지층을 '올드'로 규정하여 배제하고, 자신들만으로 ’주류’를 구성하기 위해 투쟁을 벌이는 사람들이 있다. 이들의 행위는 이재명 정부의 지지기반을 축소, 약화시킨다. 유튜브에는 '뉴이재명'을 내세우며 '올드‘로 분류한 민주진보진영 인사들을 공격하는 수많은 영상이 올라오고 있다. 작성자의 정체와 배후가 의심스럽다.  \n특히 민주진보진영의 반대편에 있다가 근래 반성없이 슬쩍 넘어온 정치인(지망생)들이 이런 행태를 보인다. 현재 ‘뉴이재명’을 내세우고 자신이야 말로 '찐명' 또는 '이재명 지킴이'인냥 행세하는 정치인(지망생) 중 과거 노무현, 문재인은 물론 이재명을 야멸차게 공격, 비방한 이들 쉽게 찾을 수 있다.\n돌이켜보라. 지금은 노무현을 찬양하고 있는 정치인들 중 노무현 대통령을 독하게 공격하고 폄훼했던 사람 많다. 지금 문재인을 맹비난하는 정치인들 중 문재인 대통령 지지율 7-80%였을 때 앞다투어 ‘찐문’ 인증한 사람 많다. '찐문'의 깃발을 들고 이재명을 악마화했던 사람들, '문재인 파문'을 선언하고 윤석열편으로 넘어갔다. “문을 여니 국이”라던 사람들, 내가 이낙연을 지지하지 않고 이재명을 비난하지 않자 내 책 화형식을 벌였다. ‘찐‘을 내세우는 자들은 여건이 나빠지면 가장 먼저 등을 돌린다.\n3.\n이재명 대통령은 2024년 2월 민주당 당대표 시절, 이렇게 말했다. \"친명-비명 나누는 것은 죄악이다\", \"친명이냐 친문이냐 하며 우리를 구분짓는 행위 자체가 저들의 전략이다.\" 정치에서 순혈(純血)주의는 자해의 길임은 현명한 정치인들은 다 알고 있다. 유독 대통령을 파는 자들, 조심해야 한다.\n현대 정치사에서 현명한 주권자들은 친김대중이자 친노무현이었고, 친문재인이자 친이재명이었으며, 노회찬까지 챙겼다. 주권자는 민주진보진영의 역대 대통령들이 각각의 성과와 한계를 가지면서, ‘이어달리기’를 해오고 있음을 잘 알고 있다. \n‘찐'이나 '뉴’는 배제의 언어다. 내부 갈라치기가 아니라 연대와 단결이 성공한 대통령, 성공한 정부를 만든다."}, {"id": 28, "filename": "2026.2.22 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-02-22", "category": "페이스북 메시지", "topics": ["조국혁신당", "개헌·민주주의", "민생·경제"], "tags": ["페이스북", "민생", "부동산"], "preview": "2026.2.22 조국 대표 페이스북 메시지  \"중산층이 살만한 양질의 2,30평대 중형 임대주택을 역세권에 공급해 전월세 수요를 흡수할 예정.\" 조국혁신당이 일관되게 주장한 바와 정확히 일치한다. 양질의 공공임대주택을 대대적으로 공급해야 서민과 청년의 주거비 부담이 줄고 가처분소득이 늘며, 이래야 서민과 청년이 자가주택을 소유할 수 있는 시간이 당겨진다. 이러한 정책이야 말로 '진짜 주거사다리'다.  이에 더하여 용산공원 둘레에 대규모 공공임...", "content": "2026.2.22 조국 대표 페이스북 메시지\n\n\"중산층이 살만한 양질의 2,30평대 중형 임대주택을 역세권에 공급해 전월세 수요를 흡수할 예정.\" 조국혁신당이 일관되게 주장한 바와 정확히 일치한다. 양질의 공공임대주택을 대대적으로 공급해야 서민과 청년의 주거비 부담이 줄고 가처분소득이 늘며, 이래야 서민과 청년이 자가주택을 소유할 수 있는 시간이 당겨진다. 이러한 정책이야 말로 '진짜 주거사다리'다. \n이에 더하여 용산공원 둘레에 대규모 공공임대주택을 짓자는 나의 제안을 수용해주길 희망한다. 이는 부동산 공화국을 막겠다는 정부의 의지를 가장 선명히 밝히는 상징적 조치가 될 것이다."}, {"id": 29, "filename": "2026.02.20 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-20", "category": "페이스북 메시지", "topics": ["내란·윤석열", "조국혁신당", "개헌·민주주의"], "tags": ["내란", "페이스북", "윤석열"], "preview": "2026.02.20 조국 대표 페이스북 메시지  조금 전 조국혁신당이 작년 7월에 발의한 내란범에 대한 사면을 금지하는 사면법 개정안(병합)이 법사위 소위를 통과했습니다. 하루라도 빨리 사면법을 개정해서 내란 우두머리는 사면을 금지하도록 대못을 박아야 합니다.  국회 본관과 의원회관을 잇는 지하통로에는 역대 대통령들의 취임 선서 사진이 있습니다. 그런데 내란 우두머리 전두환의 사진은 없습니다. 민주공화국을 파괴한 중대범죄자의 사진을 국회에 걸어...", "content": "2026.02.20 조국 대표 페이스북 메시지\n\n조금 전 조국혁신당이 작년 7월에 발의한 내란범에 대한 사면을 금지하는 사면법 개정안(병합)이 법사위 소위를 통과했습니다. 하루라도 빨리 사면법을 개정해서 내란 우두머리는 사면을 금지하도록 대못을 박아야 합니다. \n국회 본관과 의원회관을 잇는 지하통로에는 역대 대통령들의 취임 선서 사진이 있습니다. 그런데 내란 우두머리 전두환의 사진은 없습니다. 민주공화국을 파괴한 중대범죄자의 사진을 국회에 걸어두지 않는 것이 상식이기 때문입니다. \n우원식 의장님께 정중히 요청합니다. 즉시 내란 우두머리 윤석열의 사진을 치워주십시오."}, {"id": 30, "filename": "2026.2.20. 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-20", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당", "개헌·민주주의"], "tags": ["기자회견", "페이스북", "윤석열", "내란", "검찰개혁"], "preview": "2026.2.20. 조국 대표 페이스북 메시지  1. 지귀연 재판부의 윤석열 내란죄 1심 유죄판결에 대하여 선고형에 대해서만 비판의 촛점이 모인다. 즉, \"사형이 선고되었어야 하는 것 아니냐?\" 국민의 법감정을 생각하면 공감이 간다. 양형 관련해서는 전두환은 사형, 노태우가 무기징역을 선고받았다는 점을 참조할 필요가 있다.  \"비교적 고령과 \"오랫 공직 복무\"를 감경사유로 넣은 것은 뜬금없는데, 일반 형사사건에서의 감경사유를 기계적으로 넣은 것...", "content": "2026.2.20. 조국 대표 페이스북 메시지\n\n1.\n지귀연 재판부의 윤석열 내란죄 1심 유죄판결에 대하여 선고형에 대해서만 비판의 촛점이 모인다. 즉, \"사형이 선고되었어야 하는 것 아니냐?\" 국민의 법감정을 생각하면 공감이 간다. 양형 관련해서는 전두환은 사형, 노태우가 무기징역을 선고받았다는 점을 참조할 필요가 있다. \n\"비교적 고령과 \"오랫 공직 복무\"를 감경사유로 넣은 것은 뜬금없는데, 일반 형사사건에서의 감경사유를 기계적으로 넣은 것으로 보인다. 내란에 맞서 싸운 국민의 마음을 전혀 읽지 못하고 있음을 보여주었다.\n그리고 재판부는 \"국회에 군대를 보냈다\"는 것이 핵심임을 강조하면서, 내란 성립을 인정했다. 다른 것에 대해서는 다툼이 있더라도 국회 침탈은 확실하니 내란 유죄라는 것이다. 선해(善解)하자면, 이 점이 있기에 이후 2심 재판부 구성 판사들이 아무리 보수적이라고 하더라도 내란 유죄가 뒤집힐 가능성은 없어졌다. 국힘 내부 '친윤' 세력은 꿈깨길 바란다. 이제 더 중요한 것은 윤석열이 사면받지 못하도록 하는 것이다.\n나는 (1) 내란의 목적이 장기독재가 아니었고, 내란 모의가 계엄 이틀 전인 12월 1일에 이루어진 것으로 본 점, (2) 형식과 실질에서 위법한 계엄선포라고 하더라도 바로 국헌문란의 목적의 내란이 아닐 수 있다고 본 점 이상의 두 가지가 이 더 문제라고 생각한다. 2심 재판에서 이 점이 제대로 밝혀지길 바란다.\n2.\n어제 침묵했던 장동혁 국민의힘 대표는 오늘 기자회견에서 세가지를 선언했다.\n첫째, 지귀연 재판부 판결에 대해 \"국민의힘은 줄곧 계엄이 곧 내란은 아니라는 입장을 분명히 해 왔다, 내란죄에 대한 공수처의 수사가 위법하다는 점도 일관되게 지적해왔다, 판결 곳곳 논리적 허점이 있다, 1심 판결로 여전히 무죄 추정 원칙 적용돼야 한다\"고 했다. 이는 '12.3 비상계엄은 내란이 아니어서, 윤석열은 무죄'라는 주장을 다시 반복한 것에 다름아니다.\n둘째, \"대통령과의 절연을 앞세워 당을 갈라치기 하는 세력, 단호하게 절연해야 하는 대상은 오히려 이들이다\"이라고 말했다. 이는 '윤석열 집권 때의 국민의힘에서 달라지지 않을 것이다. 당명만 변경할 것'이라는 소리다.\n셋째, \"헌법 질서 파괴와 법치 파괴를 어떻게 막아낼 것인가, 이재명 정권의 신독재 광풍으로부터 대한민국의 자유민주주의를 어떻게 지켜낼 것인가, 국민의 소중한 한 표, 한 표를 지키기 위해 선거 시스템을 어떻게 바꿀 것인가\"라고 했다. 윤석열은 유사한 주장을 내걸고 내란을 일으켰다. 결국 '2024년 12월과 같은 상황이 오면 다시 내란을 일으킬 수 있다'는 것이다.\n결론은 하나다. 국민의힘은 해산되거나 심판받아야 한다."}, {"id": 31, "filename": "2026.2.19 제30차 최고위원회의 모두 발언.txt", "title": "제30차 최고위원회의 모두 발언", "date": "2026-02-19", "category": "최고위원회", "topics": ["내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당", "개헌·민주주의"], "tags": ["최고위", "윤석열", "부동산", "민생", "내란", "교육"], "preview": "2026.2.19 제30차 최고위원회의 모두 발언  조국혁신당 대표 조국입니다.  ◎ 지난 설 연휴에 저는 우리 사회가 해결해야 할 여러 문제와 해결책을 궁리했습니다. 특히 청년 문제 해결을 고민했습니다. ‘청년의 행복’은 권리여야 합니다. 청춘은 ‘빚’이 아니라 ‘재산’이어야 합니다. 이를 위해 조국혁신당은 ‘청년 걸림돌 제로 정책'을 추진하겠습니다.  첫째, ‘사회투자 골든 룰'을 채택합시다. 이는 재정 원칙의 근본적 관점 전환을 말합니다....", "content": "2026.2.19 제30차 최고위원회의 모두 발언\n\n조국혁신당 대표 조국입니다.\n\n◎ 지난 설 연휴에 저는 우리 사회가 해결해야 할 여러 문제와 해결책을 궁리했습니다.\n특히 청년 문제 해결을 고민했습니다.\n‘청년의 행복’은 권리여야 합니다.\n청춘은 ‘빚’이 아니라 ‘재산’이어야 합니다.\n이를 위해 조국혁신당은 ‘청년 걸림돌 제로 정책'을 추진하겠습니다.\n\n첫째, ‘사회투자 골든 룰'을 채택합시다.\n이는 재정 원칙의 근본적 관점 전환을 말합니다.\n전략적 공공투자를 위한 예산 지출을 단순 소비, 재정 적자 관점에서 따지지 말고\n미래지향적 투자로 보자는 것입니다.\n유럽에서 이미 깊이 있게 논의되고 있습니다.\n\n재정 원칙 전환을 통해 향후 10년간 매년 GDP의 1.5% 재원을\n청년과 서민을 위해 투자할 것을 제안합니다.\n디지털 역량 강화, 녹색 전환 대응 및 직업훈련, 일․가정 양립,\n돌봄 인프라 등에 집중적으로 투여되어야 합니다.\n\n한국은행 자료를 보면, 졸업하면서 취업하는 청년은 10%에 불과합니다.\n이 시점에 정부가 나서서, 직업 교육의 최대 투자자가 돼야 합니다.\n정부, 산업계, 대학이 손잡고 특별 직업교육 프로그램을 개발․진행하고,\n채용까지 연결해야 합니다.\nAI, 반도체 등 미래산업의 인력 부족과 미스매치 문제도 해소할 수 있습니다.\n\n둘째, 청년용 고품질 공공임대주택을 대거 공급해야 합니다.\n주거는 취업과 함께 청년에게 넘기 가장 힘든 걸림돌입니다.\n현행 대출 지원 정책은 ‘주거 미끄럼틀’로, 잘못 탔다가는 미끄러집니다.\n번 돈을 이자로 무느라 등골이 휘는 것은 물론, \n이자가 오르고 집값이 내려가면 나락에 빠진 신세가 됩니다.\n\n천천히 올라갈 수 있는 진짜 ‘주거 사다리’는 바로 공공임대주택입니다.\n정부 조사에서 수도권 청년의 75%가 임대주택에 살고 싶다고 답했습니다.\n저비용으로 고품질의 공공임대주택에 살 수 있으면,\n주거비 부담이 줄어듦은 물론, 가처분소득과 저축액이 늘어납니다.\n지금보다 짧은 시간에 많은 돈을 모은 뒤 집을 살지 말지 선택할 수 있습니다.\n공공임대 월세가 현저히 낮다면, 주변 민간임대 시세도 자연스럽게 떨어질 것입니다.\n\n무주택자들, 특히 청년 주거권을 확보해줄 방안을 논의해야 합니다.\n그게 정치의 역할입니다.\n조국혁신당은 청년들의 도약을 도울 든든한 ‘진짜 사다리’를 마련하겠습니다.\n\n◎ 오늘 윤석열의 ‘내란 우두머리’ 혐의에 대한 사법적 판단이 내려집니다.\n윤석열 일당의 행위에 대해서는 \n이미 여러 차례 사법적 판단이 나왔습니다.\n헌법재판소는 윤석열 탄핵 심판에서 “피청구인의 위헌·위법행위는 국민 신임을 배반한\n것으로 헌법수호 관점에서 용납될 수 없는 중대한 법 위반행위”라고 판단했습니다.\n한덕수 전 총리 1심 재판부는 “국헌 문란의 목적과 실질적 폭동 요건을 갖춘 \n‘위로부터의 내란’이자, 친위쿠데타”라고 규정했습니다.\n이상민 전 행안부장관 재판부도 “국헌을 문란하게 할 목적으로 다수인이 결합해\n유형력을 행사하고 해악을 고지함으로써 한 지방의 평온을 해할 정도의 위력이 있는 폭동, 즉 내란을 일으켰다”고 판결했습니다.\n\n\n윤석열과 그 하수인들은 떠들었던 ‘경고성, 호소용 계엄’이라는 주장이나,\n국민을 계몽하기 위한‘계몽령’이라는 주장 모두 헛소리임이 이미 확인되었습니다.\n국민은 중형을 예상하고 희망하고 있습니다. \n\n오늘 선고는 \n대한민국의 승리, 민주주의의 승리, 헌법의 승리여야 합니다.\n오늘 판결문은 응원봉 국민의 땀과 눈물을 잉크 삼아 써내려간 \n기록물이 될 것입니다.\n\n민주공화국을 파괴하고 왕이 되려 한 대통령의 범죄와 거짓말을 낱낱이 규명하고,\n‘내란, 친위쿠데타는 엄벌에 처해진다’는 지엄한 원칙을\n서릿발처럼 밝히는 선언문이 될 것입니다.\n지귀연 재판부는 이러한 진실과 역사의 무게를 직시해야 합니다.\n사법부의 엄정함은 오로지 판결로만 증명됩니다.\n국민과 함께 지켜보겠습니다.      /끝/"}, {"id": 32, "filename": "2026.2.19. 윤석열 무기징역 관련 조국 대표 메시지.txt", "title": "윤석열 무기징역 관련 조국 대표 메시지", "date": "2026-02-19", "category": "기타 메시지", "topics": ["정치·선거개혁", "내란·윤석열"], "tags": ["내란", "지방선거", "윤석열"], "preview": "2026.2.19. 윤석열 무기징역 관련 조국 대표 메시지  존경하는 국민 여러분의 용기있는 행동으로 내란이 격퇴된 것에 이어, 조금 전 내란 우두머리 윤석열에 대하여 무기징역이 선고되었습니다. 불법 계엄을 선포한 지 443일만입니다. 그동안 많이 불안하셨고 분노하시기도 하셨을 것입니다. 그렇지만 국민 여러분의 오랜 인내 끝에 윤석열에 대한 단죄가 내려졌습니다. 이제 내란범에 대한 사면을 금지하거나 국회의 동의를 얻을 경우에만 가능하게 제한하는...", "content": "2026.2.19. 윤석열 무기징역 관련 조국 대표 메시지\n\n존경하는 국민 여러분의 용기있는 행동으로 내란이 격퇴된 것에 이어,\n조금 전 내란 우두머리 윤석열에 대하여 무기징역이 선고되었습니다.\n불법 계엄을 선포한 지 443일만입니다.\n그동안 많이 불안하셨고 분노하시기도 하셨을 것입니다.\n그렇지만 국민 여러분의 오랜 인내 끝에 윤석열에 대한 단죄가 내려졌습니다.\n이제 내란범에 대한 사면을 금지하거나 국회의 동의를 얻을 경우에만 가능하게 제한하는 사면법 개정이 필요합니다.\n그리고 여전히 윤석열과 내란을 옹호하는 정치세력에 대한 단호한 심판이 필요합니다. \n국민 여러분, \n오는 6월 지방선거에서 연대하여 국민의힘을 제로로 만듭시다.\n감사합니다!"}, {"id": 33, "filename": "2026.2.18 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-18", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "민생·경제"], "tags": ["교육", "페이스북", "민생"], "preview": "2026.2.18 조국 대표 페이스북 메시지  병오년 첫날 올린 글에서 사회권 선진국 달성을 위한 재정정책으로 유럽에서 논의하고 있는 '사회투자 골든 룰'을 제시했습니다. '사회투자 골든 룰'은 청년 일자리와도 직결됩니다. 우리나라에서 '사회권'하면 연금, 실업보험, 기초생활보장 등만을 생각하기 쉽습니다(이 부분은 '보호적 사회권'이라 불립니다). 그러나 더 중요한 것은 산업발전에 따른 국민의 역량 강화를 위한 '투자적 사회권'입니다. 1990...", "content": "2026.2.18 조국 대표 페이스북 메시지\n\n병오년 첫날 올린 글에서 사회권 선진국 달성을 위한 재정정책으로 유럽에서 논의하고 있는 '사회투자 골든 룰'을 제시했습니다. '사회투자 골든 룰'은 청년 일자리와도 직결됩니다.\n우리나라에서 '사회권'하면 연금, 실업보험, 기초생활보장 등만을 생각하기 쉽습니다(이 부분은 '보호적 사회권'이라 불립니다). 그러나 더 중요한 것은 산업발전에 따른 국민의 역량 강화를 위한 '투자적 사회권'입니다. 1990년대 이후 유럽 복지국가들은 고용, 보육·교육 서비스, 출산·양육 휴가제도 등에 집중적으로 투자했습니다.\n현재 우리나라 청년들의 일자리 고충도 '투자적 사회권' 강화로 해결해야 합니다. <조국의 선택>(넥서스. 2026), 68-70면을 소개합니다.\n===\n사회학자들은 노동시장의 문제를 ‘의자 놀이’에 비유하곤 합니다. 한국은행의 자료를 보면, 졸업하며 취업하는 청년은 10%에 불과합니다. 의자 놀이로 비유하면, 청년 100명이 의자 주위를 맴돌다가 음악이 멈췄을 때, 10개의 의자를 차지하기 위해 경쟁해야 한다는 뜻입니다.  ...  이 의자에 앉기 위해 노력하라고 말하는 것은 국가의 역할이 아닙니다. 의자의 개수를 20개, 40개, 80개… 계속 늘려주는 것, 그것이 국가의 역할입니다. \n기업은 ‘즉시 투입이 가능한 경력직’만 원하는데, 사회는 청년들에게 ‘경력을 쌓을 기회’를 주지 않습니다. 기업들의 채용 문화는 신입·공개 채용에서 수시·경력직 채용으로 바뀌고 있습니다. 정규직과 비정규직의 격차에 대한 근본적인 개혁에 나서는 일과 별도로 독일의 이원화 제도처럼 교육과 취업을 연결하는 제도의 혁신이 필요합니다. 최근 한국은행도 이원화 제도의 활성화를 제안했습니다.\n지금 청년들은 대학 졸업장만으로 경력직 위주의 취업 시장에 진입할 수 없는 상태입니다. 졸업 후 폴리텍으로 향하는 ‘U턴 입학’은 하나의 현상이 됐습니다. 정부가 하이테크 과정과 같은 직무 교육 인프라를 청년의 권리 보장 개념으로 접근해서 대폭 확충해야 합니다. 제가 제시한 ‘사회투자 골든 룰’을 통해 직업 교육에 대대적으로 투자하는 시스템을 구축해야 할 시점입니다. 정부가 직업 교육의 최대 투자자가 돼서 국가적 차원의 특별 직업교육 프로그램을 가동하는 것입니다. 정부, 산업계, 대학이 ‘공동’으로 직업 교육을 개발․진행하고, 채용까지 연결하는 방식입니다. AI 반도체 등 미래산업의 인력 부족과 미스매치 문제도 해소할 수 있습니다."}, {"id": 34, "filename": "2026.2.18 조국 대표 페이스북 메시지2.txt", "title": "조국 대표 페이스북 메시지2", "date": "2026-02-18", "category": "페이스북 메시지", "topics": ["검찰·사법개혁"], "tags": ["페이스북"], "preview": "2026.2.18 조국 대표 페이스북 메시지  10일 지난 뉴스를 이제 접했다. 50대 요양보호사가 카드지갑 주어서 분실장소에 가까운 우체통에 넣었다. 차비를 들여 현장까지 왔기에 '거마비' 2천 원을 빼고 넣었다. 지갑 주인이 찾아지자, 수사관을 통해 2천 원 반환했다. 그러나 서울남부지법은 벌금 5만 원을 선고했다. 곽상도 아들 50억 퇴직금에 대한 무죄 판결을 다시 생각한다. 판결은 누구에게나 똑같은 기준으로 내려진다고? 판사는 편견 없이...", "content": "2026.2.18 조국 대표 페이스북 메시지\n\n10일 지난 뉴스를 이제 접했다. 50대 요양보호사가 카드지갑 주어서 분실장소에 가까운 우체통에 넣었다. 차비를 들여 현장까지 왔기에 '거마비' 2천 원을 빼고 넣었다. 지갑 주인이 찾아지자, 수사관을 통해 2천 원 반환했다.\n그러나 서울남부지법은 벌금 5만 원을 선고했다. 곽상도 아들 50억 퇴직금에 대한 무죄 판결을 다시 생각한다. 판결은 누구에게나 똑같은 기준으로 내려진다고? 판사는 편견 없이 판결한다고? 영미식 배심제, 독일식 참심제 도입이 필요함을 다시 한번 확인한다."}, {"id": 35, "filename": "2026.2.17 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-17", "category": "페이스북 메시지", "topics": ["인권·사회", "내란·윤석열", "검찰·사법개혁", "민생·경제", "조국혁신당"], "tags": ["내란", "페이스북", "민생"], "preview": "2026.2.17 조국 대표 페이스북 메시지  병오년 새해 첫날입니다. 선친과 조상님께 인사 올리고 글을 씁니다. 정치 투신 이후 일관되게 검찰독재 조기종식’(=“3년은 너무 길다!”)와 함께 ‘사회권 선진국’을 주창했습니다. 전자는 온 국민의 마음에 불을 질렀고, 크게 보아 일단락되었습니다. 후자는 내란 이후 대한민국에 대한 선명한 비전입니다. 학자 시절부터 꿈꾸고 다듬었습니다. 제가 지속적으로 강조하고 있는 토지공개념도 사회권의 일환인 주거...", "content": "2026.2.17 조국 대표 페이스북 메시지\n\n병오년 새해 첫날입니다. 선친과 조상님께 인사 올리고 글을 씁니다.\n정치 투신 이후 일관되게 검찰독재 조기종식’(=“3년은 너무 길다!”)와 함께 ‘사회권 선진국’을 주창했습니다. 전자는 온 국민의 마음에 불을 질렀고, 크게 보아 일단락되었습니다. 후자는 내란 이후 대한민국에 대한 선명한 비전입니다. 학자 시절부터 꿈꾸고 다듬었습니다. 제가 지속적으로 강조하고 있는 토지공개념도 사회권의 일환인 주거권의 내용입니다. 병오년 새해에는 이를 더욱 구체화하고 실현하기 위해 배전의 노력을 가하겠습니다.\n’사회권‘에 대해 한동훈 등 국힘세력은 ’좌파‘,  ’빨갱이‘ 운운했지만, 개의치 않습니다. 한편, ’사회권 선진국' 비전과 정책에 공감하시면서도 재정이 어디서 나느냐는 비판 또는 질문이 있습니다. <조국의 선택>(넥서스, 2026), 62-64면에서 정리해서 답했으니, 참조하시길 바랍니다.\n정치는 권력투쟁을 필연적으로 수반하지만, 비전과 정책에 대한 고민과 연구가 사라져서는 안됩니다. 그렇지 못하면 정치판은 궁중암투가 되고 말 것입니다. 정치가 단지 권력을 뺏고 더 갖기 위해 갈라치거나 이합집산하는 공학 또는 게임으로 생각하는 사람들이 많은 것이 현실이라, 비전과 정책이 특히 중요합니다. 정치인도 시류에 따르며 움직이지 말고 자신이 정치권력을 갖게 되면 그 권력을 사용하여 ’무엇‘을 하려는지 분명히 밝혀야 합니다. 그래야 국민이 평가하고 선택할 수 있으니까요.\n‘조국의 정치’는 뚜렷한 비전과 정책에 기초한 정치이자, 확고한 연대와 통합을 추구하는 정치이며, 이를 통해 ‘새로운 다수연합’을 만들어내는 정치입니다. 창당시 초심으로 다시 뛰겠습니다. 손잡아 주십시오.\n====\n35. 사회권 선진국의 기반을 구축하고, 지속적으로 추진하기 위해서는 재정적 여력이 관건인 것 같습니다. 재정 확보 방안이 있으신지요.\n저는 유럽에서 유력하게 논의되고 있는 ‘사회투자 골든 룰’(Social Investment Golden Rule)를 참고해서 청년 세대를 위한 한국형 ‘사회투자 골든 룰’을 제시할 계획입니다. \n향후 10년간 매년 GDP의 1.5% 수준의 재원을 인구·기후·디지털 전환기 대응에 필수적인 사회정책 분야, 즉 일·가정 양립, 돌봄 인프라, 디지털 역량 강화, 녹색 전환 대응 및 직업훈련 등에 전략적으로 투자하자는 제안입니다. ‘사회투자 골든 룰’은 미래의 위험 예방과 노동시장 적응을 위한 공공투자인 것이죠. 예산 지출을 비용이 아닌 미래지향적 투자로 전환하는 관점의 전환이야말로 한국이 ‘보호적’· ‘투자적’· ‘기반적’ 사회권을 동시에 발전시키는 핵심 조건입니다. \n기본적으로 재정 운영은 의지의 문제라고 생각합니다. 우리나라의 공공사회복지 지출 비중은 GDP의 약 15% 수준입니다. 최근 10년간 비약적으로 높아졌지만, 프랑스(32.7%), 오스트리아(32.0%), 핀란드(31.0%), 이탈리아(29.8%), 벨기에(29.1%) 등에 비해서는 낮습니다.  \n우리나라가 1인당 국민소득 1만 달러에 진입한 시기가 1995년입니다. 당시 GDP 대비 공공사회복지 지출 비중은 3.5%였습니다. 그런데 스웨덴은 우리보다 훨씬 앞선 1977년에 1만 달러에 진입했는데, GDP 대비 27.8%를 인적 자본에 투자했습니다. 독일은 1979년에 진입했을 때 25.7%, 일본은 1981년 10.4%였습니다. 우리나라가 2만 달러에 진입했을 때도 OECD 평균이 GDP 대비 20.6%였지만, 우리는 8.3%에 머물렀습니다. \n‘사회투자 골든 룰’로 전례없는 과감한 투자를 단행해야 하고, 이밖에 우리나라 실정에 맞는 부유세와 로봇세 등에 대한 진지한 논의도 필요하다고 생각합니다. 금투세도 조세정의에 부합하는 방향으로 시행되어야 합니다."}, {"id": 36, "filename": "2026.2.16 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-16", "category": "페이스북 메시지", "topics": ["조국혁신당", "민생·경제"], "tags": ["페이스북", "민생", "부동산"], "preview": "2026.2.16 조국 대표 페이스북 메시지  토지공개념 정책이 청년의 '주거 사다리'를 치우는 것 아니냐는 괴상한 질문이 있기에 <조국의 선택>(넥서스, 2026) 중 관련 내용을 소개합니다(77-78면). 요컨대, 토지공개념 정책의 일환으로 고품질의 공공임대주택을 대대적으로 공급해야, 당장의 청년의 주거비 부담이 줄어듦은 물론, 가처분소득/저축액이 늘어 자가주택 구매 시간이 당겨지고 기회가 높아집니다. === 43. 역대 정부는 청년의 주거...", "content": "2026.2.16 조국 대표 페이스북 메시지\n\n토지공개념 정책이 청년의 '주거 사다리'를 치우는 것 아니냐는 괴상한 질문이 있기에 <조국의 선택>(넥서스, 2026) 중 관련 내용을 소개합니다(77-78면).\n요컨대, 토지공개념 정책의 일환으로 고품질의 공공임대주택을 대대적으로 공급해야, 당장의 청년의 주거비 부담이 줄어듦은 물론, 가처분소득/저축액이 늘어 자가주택 구매 시간이 당겨지고 기회가 높아집니다.\n===\n43. 역대 정부는 청년의 주거 사다리를 위해 다양한 대출 지원 정책을 펴고 있습니다. 일각에서 청년들에게 대출 문턱을 크게 낮춰서 내 집 마련을 촉진해야 한다고 주장합니다. 국회도 이를 따라왔고요. 어떻게 생각하십니까? \n저는 과도한 금융 지원은 약이 아니라 독이라고 봅니다. 청년의 미래를 담보로 잡는 약탈적 대출입니다. “빌려줄게, 집 사라”는 정책은 ‘사다리’처럼 보이지만, 사실은 ‘미끄럼틀’입니다. 집값이 오르면 대출을 상환하고, 대출을 일으켜 또 집을 사는 것이 일종의 ‘패턴’인데, 그 과정에서 이자에 짓눌려 소비 여력은 떨어지고, 금리가 인상되면 이자는 고통이 됩니다. 그런데 부동산 시장 가격이 안정되면, 좋은 일이 아닙니다. 왜 그럴까요? 기대하는 만큼 집값이 오르지 않거나 떨어지면 이자가 불어나 자칫 경제적 파산으로 내몰리기 때문이죠. 주택담보대출의 역설입니다. \n그래서 대출 지원 정책은 ‘미끄럼틀’입니다. 잘못 잡으면 밑으로 떨어집니다. 위로 천천이 올라갈 수 있는 ‘진짜 주거 사다리’는 공공임대주택입니다. 청년들이 저비용으로 고품질의 공공임대주택에 살면서 자금을 축적한 후 여력이 됐을 때 집을 살지 말지를 선택할 수 있도록 만들어야 합니다. 민간 시장의 시세와 비교했을 때 공공임대의 월세가 현저히 낮다면, 자연스럽게 주변 민간 시장의 시세도 하락할 것입니다. 저는 국가 주도로 거대한 공공 시장을 형성해서 민간 시장과 경쟁해야 한다고 봅니다.\n정부 조사에서 수도권 청년의 75%가 임대주택에 살고 싶다고 답했습니다. 그러나 주택도시기금은 임대주택 융자가 14조 4천억 원인 반면, 주택 구입 대출은 27조 7천억 원입니다. 임대주택을 짓는 것보다 대출 비중이 높습니다. 잘못된 방향입니다. 기금 운영의 원칙부터 바꿔야 합니다."}, {"id": 37, "filename": "2026.2.15 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-15", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "조국혁신당", "개헌·민주주의", "민생·경제"], "tags": ["페이스북", "민생", "부동산"], "preview": "2026.2.15 조국 대표 페이스북 메시지  「 … 이재명 대통령은 “정당한 투자 수익을 초과해 과도한 불로소득을 노리는 다주택자, 살지도 않는 투자·투기용 주택소유자들이 가진 특혜를 회수하고 세제·금융·규제·공급 등에서 상응하는 부담과 책임을 강화해 부동산 시장을 선진국들처럼 정상화하자는 것 … “집은 투자·투기용보다 주거용으로 사용하는 것이 바람직하니 그 반대의 선택은 손실이 되도록 법과 제도를 정비할 뿐” … 」  이재명 대통령의 부동산...", "content": "2026.2.15 조국 대표 페이스북 메시지\n\n「 … 이재명 대통령은 “정당한 투자 수익을 초과해 과도한 불로소득을 노리는 다주택자, 살지도 않는 투자·투기용 주택소유자들이 가진 특혜를 회수하고 세제·금융·규제·공급 등에서 상응하는 부담과 책임을 강화해 부동산 시장을 선진국들처럼 정상화하자는 것 … “집은 투자·투기용보다 주거용으로 사용하는 것이 바람직하니 그 반대의 선택은 손실이 되도록 법과 제도를 정비할 뿐” … 」 \n이재명 대통령의 부동산 개혁 방향에 전적으로 공감합니다. 대통령의 발언은 그동안 제가 일관되게 강조했던 토지공개념과 같습니다. 조국혁신당이 준비한 신토지공개념 3법의 방향과도 일치합니다. \n특히 대통령이 화두를 던진 다주택자의 대출 연장 중단 시사는 그동안 없었던 강력한 개혁 방향입니다. 잠긴 매물을 시장으로 유도하는 것으로 공사 기간이 필요 없는, 신속한 공급 대책 효과를 기대할 수 있습니다.  \n중요한 건, 국회입니다. 민주당은 대통령의 부동산 공화국 해체 의지를 정책화, 입법화하는 데 집중해야 합니다. 조국혁신당은 확고히 뒷받침할 것입니다. 저와 조국혁신당은 토지 공공성을 강화하는 방안을 이미 여러 차례 발표했습니다. 민주당이 적극적으로 검토해야 합니다.\n정부의 비상한 자세가 절실합니다. 다주택자들이 집을 내놓도록 하는 것과 별개로 공공임대주택을 통한 새로운 공급 비전을 추가로 내놓아야 시장이 반응합니다. 1.29 공급 대책보다 더 과감한 계획을 추가로 발표해야 합니다. 조세회피와 전세사기의 부작용을 막을 수 있는 촘촘한 대책도 서둘러야 할 것입니다. \n부동산 개혁의 중요한 목표는, ‘세입자의 안정적 삶의 보장‘입니다. 사회권 선진국의 철학입니다. 1인 가구 청년 세입자부터 40대, 50대 세입자까지 모든 사회경제적 약자와 중산층이 주거비를 걱정하지 않고 편하게 사는 권리를 누려야 합니다. 주거권이 실현되어야 건강권과 돌봄권, 문화권 등도 보장받을 수 있습니다. \n저와 조국혁신당은 ‘부동산 개혁’과 ‘세입자의 안정적 삶의 보장‘을 위해 최선을 다하겠습니다."}, {"id": 38, "filename": "2026.2.14 조국 대표 페이스북 메시지.txt", "title": "조국 대표 페이스북 메시지", "date": "2026-02-14", "category": "페이스북 메시지", "topics": ["정치·선거개혁", "내란·윤석열", "검찰·사법개혁", "조국혁신당"], "tags": ["내란", "합당", "페이스북", "윤석열"], "preview": "2026.2.14 조국 대표 페이스북 메시지  존경하는 조국혁신당과 민주당 당원 여러분께. 설 연휴가 시작됩니다. 윤석열 일당의 내란을 이겨내고 맞이하는 첫 설 연휴입니다.  우리는 윤석열 일당과 정치검찰에 맞서 어깨걸고 함께 싸웠습니다. 대선 시기 이재명 후보 당선을 위해서, 그리고 이재명 정부 출범 이후 각종 개혁을 추진하기 위해서 힘을 모았습니다. 그런데 민주당 정청래 대표의 ’합당 제안‘ 이후 민주당 내부에서 큰 분란이 생겼음은 물론, ...", "content": "2026.2.14 조국 대표 페이스북 메시지\n\n존경하는 조국혁신당과 민주당 당원 여러분
